body:
  text: 文獻集别集類四元提要臣等謹案文獻集十卷元黃溍撰溍有日損齊筆記已著録其為文原本經術應繩引墨動中法度學者承其指授多所成就宋濓王禕皆嘗受業焉濓序稱所著日損齊藁二十五卷溍殁後縣尹胡惟信鍥梓以傳又有危素所編本為二十三卷今皆未見此本止十卷前仍冠以濓序然卷數減十之六則後人有所刋削非濓所序之本卷首題虞守愚張儉同校一行又題溫陵張維樞重選會稽王廷曾補訂一行則二人又有所竄易併非儉所刻之本卷數不同有自來矣明人誕妄凡古書經一刋刻必遭一塗改數變之後遂失其真蓋往往如此然有所私損未必有所私益雖殘缺不完尚可見溍之崖略也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀文獻集序天地之氣日新而無窮文辭亦與之無窮蓋其升降翕張俯仰變化皆一神之所為神也者形之而弗竭用之而彌章氣之樞文之所囿也成周而上六藝興焉禮不同乎春秋春秋不同乎詩詩不同乎書書不同乎易成周以下諸家言雖不能如經亦各以所學鳴龍門則異於河汾河汾則異於昌黎昌黎則異於廬陵廬陵則異於伊洛夫豈欲騁異哉文與氣資神以生其勢則然也近代自寶慶之後文弊滋極唯陳腐之言是襲前人未發者則不能啓一喙精魄淪亡氣局荒靡澌焉如弱卉之泛緒風文果何在乎逮入國朝羣工疊出華而踐朴革􅞏以趨真爛然五色之文照耀於天下沿至先生號為極盛先生之所學雍其本根則師羣經揚其波瀾則友遷固沈浸之久超然有會於心嘗自誦曰文辭各載夫學術者也吾敢為苟同乎無悖先聖人斯可已故其形諸撰述委蛇曲折必鬯所欲言出用于時則由進士第教成均典儒臺直禁林侍講經幃以文字為職業者殆三十年精明俊朗雄蓋一世可謂大雅弗羣者矣今之論者徒知先生之文清圓切密動中法度如孫吳用兵神出鬼沒而部伍整然不亂至先生之獨得者又焉能察其端倪哉於戲蹄涔之水其流不能尋尺通河巨海則涵浴日月一朝而萬變土鼓之聲其聞弗及百武迅風驚霆則振撼萬物衡縱下上無幽而不被此無它神與不神也文辭之出與天地之氣相為無窮奈何不河海風霆之若而瞡瞡蹄涔土鼓閒果誰之過也上而六藝下而諸家言所倡雖有大小之殊其生色之融液至今猶津津然是誠何道哉學者尚以是而求先生也先生薨後之五年家藏日損齊藳共二十五卷縣大夫胡君惟信恐其堙殁亟取鍥梓以傳謂濓嘗從先生學俾為之序濓也不敏何足以知先生追念疇昔侍几杖華川之上先生酒微酡歷論文辭原乎學術每至數百言自顧於道無聞溺志汗漫無根之域不足上承明訓方將刻厲剔去陳腐以振華英而九京不可作矣俯仰今古能無感乎姑誦所聞以書于篇端若先生所以擅一代之盛者則不待序而後見也先生諱溍字晉卿姓黃氏婺之義烏人其官序行業具見臨川危公所撰神道碑銘兹不著門人同郡宋濓謹序
