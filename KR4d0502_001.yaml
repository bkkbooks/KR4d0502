body:
  text: 文獻集卷一元黄溍撰五言古詩雜詩五首日月東西行羣動亦不息寄身萬物中寧獨謝兹役所以魯中叟遑遑走南北聖哲諒已然旅人能乆宅晨起步南園旭日朗以清葵花衆草中曄曄敷丹榮流光非汝私獨爾心自傾覽物有深懷竚立方含情璞玉與寳劒淪落初未偶君看被湔祓各在千年後將身比金石誰當獨長乆悠悠百代下相知復何有孤雲澹無心出山偶為雨長風忽吹散𣺌𣺌歸無處唯餘向來山突兀青如故慷哉魯仲連功成身已去春風著萬物欣欣皆自私可憐兒女花榮悴更相持獨有澗底松偃蹇如不知何疑楊執㦸草𤣥鬢若絲效古五首上山見明月下山月相隨月豈知愛我我行自見之故山日已逺故人不可思殷勤謝明月願爾無時虧女美衆所悅士窮世所輕輕重安足言泥盡水自清淮隂初寄食曲腰跨下行季子黄金多妻嫂來相迎自古已復然歎息空吞聲擊石乃有火石火光不揚攀天亦有路天髙路何長嵯峨萬古雲下覆歌哭塲富貴誠足多貧賤不可忘落花隨風吹各自東西飛花飛既不息水流復無極同生不同歸能勿異顔色木生則有枝豹死則有皮悠悠岐路間多言亦奚為飲酒莫盡醉盡醉無餘懽讀書莫弔古弔古多悲酸蕭艾蔽中野白露摧芳蘭鳯饑不得死鴟梟食琅玕去去復去去采芝青雲端人事如草木人事如草木一氣榮悴之外物何預人而寘喜與悲堂堂異姓王昔者跨下兒窮通本邂逅達者固不疑阮生亦隘人慟哭真奚爲煌煌明月珠煌煌明月珠未害居濁水君看黄河黄豈解汚清濟我方遺吾形寵辱齊一指懸知破琴戴未若摻撾禰㣲雲翳白日㣲雲翳白日羣動何喧喧嗚呼麒麟兒化為猴與猿登髙望四荒但見黄河奔誰哉泝其流與我歸崐崘萎蕤青桂花霜霰日已繁豈不有桃李對之有忘言古意荆人初得玉跅足辭巖阿持獻萬乘君君門正嵯峨誰其尸國工謬以石見訶迷邦誠不忍欺君反同科臣口不自明臣心終靡它抱璞重再拜呼天淚滂沱淚盡血可續玉在良已多是事古則然嗚呼今奈何連雨襍書五首蕭蕭十日雨出門竟何之不愁道路難所懼沾我衣悠悠看屋梁作計誠已非有酒不解飲且遂哦吾詩昔慕栗里翁頗復志耕耘偶入翰墨塲把筆學為文偃蹇獨何成喧啾浪云云念彼荷蓑子窮年愧其勤虚堂坐無言繾綣悲宿昔常時眼中人已如不相識剥啄者誰子令我喜折屐忽去已莫追一笑岸𤣥幘我思仇山人山川莽回互十書九不到木葉歲頻暮頗聞近移居併失夢中路得無挈妻兒倒載入山去今日曷不樂孤倡無與酬兀坐把書卷展玩不自休借問誰所為其人已千秋山雨政可聽撥書置牀頭晚晴洩雲散積雨林水含餘清披衣有竒懷偶從林叟行新晴逺峰麗夕隂孤花明曠日固所虞聊兹息營營夜歸空山四寥寥落日翳榛莽蜿蜒草中徑躡屩度寒雨楠杉窈深黑忽忽疑伏虎林窮澗水明稍聽歸人語陪諸老夜飲世故不可料忽若浮雲移坐令百年内顛倒殊歡悲顧惟我與公異代同一時覽古既深嘅撫今亦餘噫長川去悠悠青山莫委蛇向來逺遊意我行方遲遲咄哉有志士卒歲恒寒飢况復託渺茫欲與千載期盈虚信天運廢興豈人為願公姑舎是一觴聊可持讀忠簡宗公遺事公初起滏陽艱危屬多壘蒼然國家意委身干戈裏隂飈卷翠華朔雪被南紀悠悠虞淵日力盡揮不止寅恭秉齋鉞際㑹開朱邸長安付馮異漢業中興始宫庭數汛掃蹕路無荆杞疚心望鑾輿感激涕如水上表方出師嗚呼孔明死宴安不可懷肉食毋乃鄙巨舟竟未焚三語猶在耳蕭然舊祠下碧草垂堦戺登堂挹光儀赤舄仍几几千載墮淚碑一夫敢殘毁傳家有遺書敘事非虚美勗哉慎失墜庶以禆信史曉行湖上曉行重湖上旭日青林半霧露寒未除鳬鷖靜初散寅縁際餘景閃倐多遺玩㑹心乍有得撫已還成嘆夙予丹霞約乆茲芳洲畔獨往願易違離居歲方換沙暄芷芽動春逺川華亂存期乃寂寞取適豈爛漫小隠倘見招漁樵共昬旦西峴峰層雲抱春岑急瀬洩嵌竇脩蹊入窈窕衆緑蔚以茂名亭標水樂柱折荒碑仆幽尋得緇廬亂石扶結構青精午堪飯碧澗寒可潄平生慕真賞及此成邂逅𡨕探指絶頂有路忽通透縁蘿度蒙密翠氣濕衣䄂寄身泬寥内下睨人寰陋清謳雜風竹大嘯落巖狖東峰在眉睫可望不可就同遊却何時瑶草春已秀夜興秋氣入病骨殘夢翛然驚芭蕉葉間露風過皆成聲攬衣泬寥内搔首天河横飢蟲語不休中宵誰汝令孤鴻亦何苦犯霜度㣲明悠悠念羣動百感忽我并大化倘不爾吾其免營營寒星挂踈林夜色翳餘暝鷄聲驅行客出門路方永亦有山中人熟睡初未醒而我立於獨婆娑玩光景一笑天宇青此意君自領舉頭見殘月葉脫知深秋今我曷不樂歲月如驚鷗常憐古志士辛苦歌飯牛空山夜曼曼政合秉燭遊臨風振吾衣蕭瑟不得留小立殊復佳澗水鳴幽幽陳生詩陳生少也孤秉志何軒軒讀書奉慈母承顔郁春温兀然處膝下不間晨與昏叢叢萬井中陳生深閉門暉暉百花時陳生不窺園常恐去左右或乖覆育恩一朝抱長痛飛霜隕秋萱鹽酪不入口日夜涕傾盆欲娶弗及養矢言終不昏尚頼百歲後兄子父所孫朝來遊子衣忽逐東風翻世方醉糟粕何庸薦犠尊陳生顧謂我是事安足論幸託山水窟放情詠蘭蓀嗟今學步者觸險爭飛奔願爾利鋤钁深斸六籍根願爾進竿艣髙泝百聖源源長流自逺根大枝乃蕃勿揺崔嵬筆誇作磥磈言𢎞惟孝與悌百行茲其元咄哉行勿休日月方沄沄贈言豈予敢情真覺辭繁匪為陳生榮庶感薄俗敦述懷端居有多感求志無餘營夙違金門路緬愛丹丘名謬忝君子顧捧已厠羣英卑棲念逺引窘步迷先征俛黙敦宿尚低徊阻平生伏枕倦中夜攬衣寄遐情上天廓澄穆列宿揚光晶俯視林木改仰悲鴻鴈鳴跂子秉㣲素十年守柴荆希世乖近務慕隠餘衷誠願言良時晚庶保幽人貞寄方子踐子發窮居悵無遂徂歲聿載隂飛翹隕芳華候蟲厲哀音急颸扇叢薄泫露棲喬林撫景慨往古端撡思繼今折蘭間幽佩解纓濯清潯石林窅蔥蒨佳柏鬱蕭森遺世豈予敢匡時非我任覽已謝髙軌即事念所欽纏綿阻道里緬邈眺岡岑委懷竚芳訊貽好在規箴寄俞子易閒居寡歡豫枉駕忻周旋清言邁修夜朱火銷餘煙嘉㑹良不易鬱抱罄所宣揆余徇㣲業春冬屢徂遷著徽怍往哲馳芳謝時賢睠茲企三益揮袂增慨然杪秋淒且厲郊圻曠阡眠振飈卷飛藿積霧迷遐川契闊歲復流瞻望情所牽存期尚勿奪輔仁庶不諐紫芝無新曲白駒有遺篇矢心遂招要贈言比芳荃東園晚歸淟涊嬰近務超遥愛佳辰興言望東菑良苗藹津津鄙人昧時趨曠途夙所遵幸逺簪組累稍欣田圃鄰兀兀登故畦悠悠睇城闉理穢出新竹撼枯落荆薪夕日逗逺川餘暉散衣巾亹亹觀物變依依念農人渠渠長者言惻惻非賤貧送凌吉叟杭州教授浙水西八州惟杭實名都古來萬人海逐逐無賢愚况茲百年後淳朴古不如翩翩誰家兒白馬驕路隅春風樊樓醉一笑百斛珠亦有朱門家齊謳間吳歈綃綺散煙霞繽紛被童奴可憐彼蚩蚩乆為紅塵驅頽俗如波瀾孰障羣流趨又如敗屋壁風雨須人扶博士非冗官豈即無良圖當今歌舞場化作弦誦區行矣循所務辭章信其餘春風摻别衣晴沙秀寒蘆何以贈子行白雲不可呼聊持狂者言用比貂襜褕送朱仲山之京麒麟出渥洼意欲周八極芻豆豈不多未便甘伏櫪念君抱耿耿坐視暄涼易忽辭白髪親去作青雲客應恐鄧仲華笑爾長寂寂鄙人屬有念未辦經世策青燈雨如綫窮巷方偪仄縣知摻斧斤不必睨樗櫟往哉布汝懷庶用副前席勿云萬户侯自可談笑覔百年滔滔内岐路足南北出處會有為聚散奚暇惜歌我辛苦詞送子逺行役崢嶸壯士志慘淡游子色那無平生期慎爾保金石莫將賈生淚先為離别滴贈葉審言别昔人稱好士乃有黄金臺黄金亦何物顧用驕賢才葉君披短褐志力何雄哉北走呌閶闔紅塵指崔嵬終然無苟售自保同嬰孩車服非吾榮黄金直浮埃十年今何官茅屋歌蒼苔豈無琅玕樹鳳飛故低徊一朝脫身去歘觀雲路開葉君善自愛往矣毋嫌猜迷邦古所誚豈弟貴不回願言吐竒胷落落排風雷尚念窮賤者衡門守蒿萊舟中偶書我舟合江滸水清石頟頟念此殊可嬉如何有行役沙頭白髪翁捫蝨了晨夕茅茨八九椽終歲閱過客晚泊釣臺下四山環一水遺臺故巑岏那無漁樵居政復不敢安舍舟衝微雨憑軒俯清灣念昔乘興來無從寄游觀今我有行役乃爾容躋攀山靈豈愛我為解塵土顔落日奠蘋藻清風聞珮環幽尋不可極林暝吾當還却去望層碧孤舟生晚寒登鍾山最髙頂以三山半落青天外為韻得天字平陸漫千里茲山乃穹然猶憐布金地未即辭喧闐嚴液散珠琲春岡走蜿蜒稍欣涉幽邃登頓衣屢褰路細石礧礧崖深竹娟娟洞扉剨開敞峻峰指中天㝠探歴嶔崟垂蘿弱容牽碧潭隠光怪華雨摽崇筵下睨飛鳥背茫茫但蒼煙眇黙園圃期凄凉雲嶠篇休駕將未能惆悵春風前休日集于城南投耒從逺遊牽世乖明畧豈不有簡書未能置丘壑崇岡近盤互春物紛照灼休沐集諸彦迂趾恵前諾稍空林中尊復詠霞上作迢迢歴墟壠靡靡瞰城郭修陽䕃晴渚野櫻散朱蕚撫時悼推斥畢景顧棲託損益向子明才能賈生薄睠言觀歲寒無將媿場藿卞忠貞公墓江左失其御强臣玩天誅歡娛一以乖狂猘無趦趄黄屋播革野彤庭交劍殳事樞始誰秉捧首如奔狐偉兹百世士死與二子俱孤哀耿未沫足以孚豚魚義旗果東指白日開天衢孰最撥亂功之人或其徒伊昔大雅廢清言鄙文儒禾黍已横委衣冠尚舒徐屹然見砥柱獨障狂瀾趨髙風邈難攀捐生乃區區青簡焕遺烈蒼榛閟幽墟日夕悲吹多天髙年運徂世方用骫骳猶將愧𤣥虚江濤渺在望雪涕空漣如制司馬公祠堂朔風破滄溟白浪無餘地可憐甘棠樹乃爾能蔽芾借問誰所遺馬公古能吏當年印纍纍庶務劇于蝟藏龜不待灼騁駿無留轡偪仄兵馬區藹然承平意晏安亦聊爾國步方不易至尊乆嘗膽壯士頻裂眥煌煌青冥鉞可同牛刀試嗚呼豪俊人竟偃風雲志致身豈云卑生世已其季安知潁川守遂非廟堂器嚴祠閉寂寥古木合蒼翠平生瓣香祝毋乃兒女事如何百載下能墮看碑淚永惟茂陵翁苦心抱天藝力耘宜有收黽勉觀來裔渠渠桑梓恭喋喋市井議庶哉瞻前修樹徳毋自畏送人赴盧陽學官播非人所居潭陽實其鄰荒淫雜巫鬼哀怨餘騷臣念予有行役水陸彌數旬乃知臯比座佇承文翰賔遐徼指天末男邦控城闉俎豆當在列冠裳定來臻足明理化盛演溢周窮垠廣陌望八荒出車日轔轔蠻荆孰無適忠信惟書紳簡書有程期取别無逡巡揚鑣觸炎熱振鐸驚逺人沅水春蕩潏楚峰莫嶙峋行行慎其度離别何苦辛曉望城頭鴉鳴曙起坐理冠幘開窓寫遥望煙霧竟川澤喧喧市聲動漠漠井氣白如何山中人歲莫塵埃客發金陵留别一二同志盛名不易居直道我所遵雖枉嘉遯志未渝白圭言罷釣出滄海迥帆遡江濆城闉逺滅沒風水屢崩奔蕭條故交地愴悢遊子魂始雷茂陽澤孤生限窮鱗沈翔自殊勢衰榮實同根戰勝物可遺目擊道已存乘桴詎無取絶絃難具論寄言同心子毋徒念加餐龍灣夜泊乘潮出逺浦日莫北風平髙亭不可望遥遥笳鼔聲月明寒鴈下江空夕煙生非闗川途念沈憂坐自盈敬亭山昔窺謝公作今陟敬亭寺徴素忻始遊賞勝資深詣翛翛緣水木宛宛交蹊術緑縟澗草豐幽颸松飈駛㣲鐘響香障髙閣浮花氣聿熏旃檀妙豈愛岑壑媚憑生實内惕即事多冥契息隂睠松檟褰芳懷芝桂海岳期屢遷石林路深閟經營乖道要迫窄餘物累稽首調御尊尚飲無生恵宿雲黄山作束髪弄文史挂席去瀛壖邂逅乖良會擯落迨茲年息景念生理洗心賔象筵恭惟上皇代異人秘靈詮宗師既逾海茲山亦棲賢金棺滅雙樹寶篋緘紅蓮仰窺攝誘功信知願力堅内愧實菲薄冥通未精専褰裳碧峰雨焚香石林煙綵翠何紛糺苔澗窅洄㳂尋幽匪外適棲眞冀重宣二邊離有無五濁空腥羶豈伊俄頃用庶謝平生緣重登雲黄山茲山實靈竒吐納變舒慘太常闕弗錄名號何黭黮重華秩山川盛典軼封䃭蒐遺侈綸綍蠲潔羅醢酖腐儒世所貸薄藝守鉛槧無能旅駿奔徒取肆游覽霖潦時始收天地餘藹晻嵐光乍璘㻞石狀終黤黲行行恣芒屩往往得洼坎冒進誠近貪自畫將豈敢乆之雰埃豁秀色坐可攬青熒插鋒鍔翕赩披菡萏崖奔馬騑騑石踞虎耽耽髙尋指天路幽矚極𤣥窞前行幾台背後或兩髦髧緣岡既踸踔登嶺仍轁舉頭塔廟湧地平忽如毯天人所食息璚玖化餘糂林輝寶燈燒風語金鐸撼敗壁詩者誰漬墨亂濃淡險盡乃復佳疲極復何憾是節蕤賔初野薦首昌歜煮瀑茶可啜剖石蜜堪噉名談析毫髮苦語瀝肝膽理冥心自珍機湊首屢顉陽烏砉西翥衆色齊慘澹崔巍識楩楠蒼莽辨葭菼暮投僧所寰鐘鏜鼓紞紞羣居肅不吳其飯聲有嗿迴睨夸奪場撫事叢百感趨名蛾赴燭逐利魚投糝何時脫火宅霍若頿去頷綺言息諵諵妙供紛馣馣于焉寄相羊庶以忘坎壈誰云入道苦餘味需橄㰖秋夜觀書作閒居感時駛獨學難為功眷言思古人幽懷極忡忡秉燭起中夜攬卷來清風恭惟千載心皎潔懸無窮氓俗自升降道妙非汙隆後來亦奚為黑白紛相攻華芳昨可恱軌轍何由通吾将離言說庶以觀其同所憂明為累不懼蓄不豐開軒視明河白月當天中怡然掩書坐夜氣方鴻濛覽元次山舂陵行有感近事追和其韻以寓鄙懷惟王始建官民命有所司奈何閱流束手無一施屬者秋夏交上牀殊酸悲赤日紛按行人馬同時疲連阡見標榜不救饑與羸仍聞咨鞭籌慘忉傷膚皮撿覈須再三供張常恐遲哀哀鬻兒女貿貿行安之感茲欲無愬既往何由追尚慚噢咻恩稍緩租稅期云胡有倉卒徴斂更相隨但將充其數肯復計爾貲肉食不自鄙謂我非敢知棲棲甔石儲剝割無或遺言是鄰壤凶藉此敷恩慈寧知是州人俟死他無為出語餘喘息行步須扶持猶令比樂土疾苦喘謂誰俛首州縣問逭責自其宜况迫大府令聫絡飛符移豺狼方在郊鷹隼宜用時區區獮狐兎政爾何增虧吾賤不及議為君陳苦辭登錢山望菰城慨然而賦呉興水為州諸山若浮萍况此一培塿瑣屑世未名所欣漁樵居乃與緇錫并種竹有萬竿結茅無十楹老僧解人意蹝履能相迎芳草被行逕朱藤暗巖扃蕭條空階暮日照莓苔青猶嫌所歴卑未極遊眺情聳身白雲上始見春申城想當髙會時樓觀飛青冥竭海薦罍勺窮山羞鼎鉶安知千載後寂寞無人行煌煌冠葢區壤壤狐兎塋歸來朱門客聴此松風聲逸山過姚紫英别業逸山誠復佳逸人不可逢何言一笑頃得此蒼髯翁今晨過其廬碧苔滅行蹤坐我松竹間野蔌羅甘豐初無驚世談頗多曠士風念昔去巖壑輟耕白雲中白雲故無恙我乃羞樊籠祗應山林癖未易藥石攻髙期出邂逅意氣將無同十年舊泉石忽忽蟠吾胷起視白日低歸禽亂西東㧞地森四壁攙天唯一峰復聞麻谷幽近與金蓋通山態方屢改泉源殊未窮湫然一區内嗟我何憧憧次韻答蔣明府先生文章不經濟耽書或成淫偶從長者游稍窺古人心不琢豈非玉無絃孰為琴歲宴燈火㣲江闊魚龍深願言報嘉貺安得雙南金和方韶父先生以滿城風雨近重陽為韻七首掩書坐中宵堦空葉落滿不見書中人蒼燈夢秋館豈不有膏沐所慕非傾城翠䄂日以薄朂哉歲寒情棲遲憐繫𤓰夢寐追飛蓬去去羊荆州吳帆渺霜風當年白衣人頼以慰風雨不飲政復佳有酒無用湑江瑶配荔枝勝處終不近好醜且勿爭天道有定分聾丞遂已矣目斷山千重煙霞故無志勝會何由逢寒華衰復榮東籬幾殘陽蟠桃亦何好千年期一嘗金華北山紀遊八首靈源偶為山中游逺過雲闗宿蒼燈閃初夜雨氣蒸深屋時聞清梵音窈眇松林曲草堂迢迢上方界水木翳清景山深不可留日暮衣裳冷凄其懷昔游百歲嗟俄頃三洞仙山髙不極萬古積蒼翠清興薄暮移遺跡洞天秘巖阿春寂寥羣仙勿予遲鹿田披榛度空荒突兀崖寺古幽花雜紅白老屋亞雲雨前瞻石徑微咫尺不得取寶峰下山復上山躡屩行沮洳宿雲冒長嶺旭日映髙樹山僧亦何為獨向城闉去濳岳潘公古達人陳迹閟丘壑草生春晝長鳥啼巖花落神交千載上未敢付冥漠山橋行行指木末路逐飛雲上時登巨石憩共聴春泉響尋源竟莫窮即事成幽賞寶石暮投招提境明發首歸路舉頭望山椒遥認經行處重重巖壑間蒼然正烟霧中秋會宿浦陽江上分韻得仰字嘗窺仙華錄勝踐心所仰蹉跎二十秋故爾勞夢想名談出邂逅髙槩餘彿彷節至月仍圎别來山似長百年空中絮此會知難兩欲去吾未能不飲君宜强露蔓多夕滋風竹留晚響岐路方悠悠云何稅塵鞅龍山九日鬢色滄海澨彌年窘将迎屬兹九日至緬愛龍山名欣然得勝踐况乃羣彦并碧蘿引幽䇿凉泉度飛觥志適形可忘神舒體逾輕鄙劣竟何取靦顔結華纓登髙謝能賦狥禄慙歸耕幸此農事休萬寶咸告成庶竭一餉樂持用夸昇平月出衆山靜天空夕雲驚先民貴無荒簡書今有程悵焉難乆留振袂松風生石臺分韻得下字蒼山面長溪勢若飲奔馬層臺跨其脊萬古挹瀟洒登臨茲維要朋從未云寡迢迢歴榛莽靡靡眺原野白雲與翠霧夐在履屐下窮秋向揺落霜菊故堪把賞心孰無同幽抱欣已寫邈矣千載期銘山傒來者雍熙僧舍偶書幽窓悄無寐落葉不可數風驚葉間露中宵聴成雨起視天正碧萬里若垂宇兹予亦何為兀兀守環堵送楊學正還餘姚舜江吾舊游風物殊不惡江水天際來宛宛帶郊郭雲帆渺沙漵翠幛森樓閣别離不可念此日忽已昨想見春水生烟柳仍濯濯君胡久去此三徑獨盤礴空齋耿燈火月冷潮聲落近聞故人書逺致江上作白駒幸無遐淮陽詎云薄招要忻良會緑酒春可酌采芹有遺篇風雩多新樂因君訊同志何用慰離索奉府帖賜髙年帛晚宿孝義山中賦捧檄去州邑承筐布明恩詎敢期稅駕惟知懼乘軒時春雨新已嘉木隂正繁農人有耕作羽蟲亦飛翻感彼物情適念此王事敦悠悠迫長路靡靡窮郊原庶與遺老逢幸聆長者言持以薦芹曝無慙賁丘園低徊白日晚寂寞蒼山根吾行匪游衍此懷誰與論遊西山同項可立宿靈隠西菴薄游厭人境振䇿窮幽躅理公所開鑿遺跡在巖麓秋杪霜葉丹石而寒泉渌仰窺條上猿攀蘿去相逐物情一何適人事有羈束却過猊峰迥遥望松林曲前山夜來雨濕雲漲崖谷縹緲辨朱甍禪房帶脩竹故人丹丘彥抱被能同宿名篇聊一詠異書欣共讀蹉跎未聞道黽勉尚干禄夙有丘壑期吾居幾時卜送祝蕃逺北上春風吹九衢卑卑桃李門明堂待松柏未失山林尊相逢今歲寒是事無深論念子抱逺志此道夙所敦刊條落其葉将使見本根痛恨日月㣲毅然闢浮雲奈何夸毗子聚訟生紛紜瀛洲富才彦冠蓋如雲屯去去當遇合美價傾璵璠惟須用卿法力行尊所聞丈夫必有事寤主在一言上以禆聖學下以安元元我如鶴俛啄豈復思乘軒子如摶風鵬本是天池鯤棲棲文學掾平世何足云朂哉保令徳契闊期無諼陳孝子詩南仲杭陳氏斗龍父所名家臨百丈溪父書傳考亭夫亦人之子胡獨以孝稱維仲適母盛王實生寧馨盛謂我已出無殊祝螟蛉仲父諱弗言王卒不自明睠然舍之去呱呱聞泣聲年運日已往頭角稍崢嶸籲天乞殞滅願以益父齡父沒盛亦亡弔影傷孤㷀或乃告之故曰汝王所生王居清湖上去此無十程時仲新捧檄精廬擬横經悲號棄其官肩輿親奉迎安知世代易人非餘故城鄰有鶴髮嫗叩之乆始譍言我與汝母少小俱娉婷汝母生汝歸去作江東行不知今在無老我尤零丁仲也聞益悲贏糧事晨征六年困逆旅冷雨啼青燈譬彼無母雛投林輒哀鳴永豐有施氏大屋深重扄於焉得母處一夕相合并母子更抱持淚如九河傾三日負母還盜賊方搶攖倉黄與之遇白刃紛交横頓首前致辭覼縷陳衷誠能令激髙義相戒勿敢驚仲昔以至行上天降休禎靈雁既羣集嘉𤓰復冬榮區區彼蝱蟁豈遂無人情聖門語純孝厥有閔與曾未聞樹竒節謡誦傳轟轟此道古或希此事今可徴我歌雖云俚庶感蚩蚩氓上京道中雜詩十二首發大都辭親獨行邁遥遥抵京國胡為突不黔驅馬更逺適至尊有時巡樹羽殷阡陌宿衛必近臣顧問須耆徳陋儒亦何知冗從同執㦸草深原野青雨暗闗塞黑寥寥盛年意眷眷游子色一身萬人中敢不思努力劉蕡祠堂劉君古遺直祠堂在丘園嗟此豪俠窟文雄歘孤鶱平生二三策匪徼明主恩瑣瑣談得失無乃市井言憑髙一長朢苦厭車馬喧㣲風過疎雨青山滿前軒隂晴倐異態浮雲實無根悠悠千載心去去勿復論居庸關連山東北趨中斷忽如鑿萬古爭一門天險不可薄聖人大無外善閉非楗鑰車行已方軌闗吏徒擊柝居民動成市廬井互聫絡幽龕白雲聚石磑清泉落地雖臨要衝俗乃近淳朴政須記桃源不必銘劒閣僕夫跽謂我無為久淹泊山川豈不好但聞風雨惡榆林崇崇道傍土云是古長城却尋長城窟飲馬水不腥斯人亦何幸生時屬休明向來邊陲地今見風塵清禾黍被行路牛羊散郊坰儒臣忝載筆帝力猗難名槍竽嶺憶昔賜第歸吾母適初度蹉跎歲月晚今辰乃中路居人誇具慶游子慙叱馭茲山稱最髙揚鞭入烟霧矗矗多峭峰濛濛饒雜樹崎嶇共攀援躑躅頻返顧陳情未成表登髙詎能賦獨憐山下水逺向盧溝去李老谷縁崖一徑微入谷雙崦窄密林日易曛况乃雲雨積行人望煙火客舍依山色家僮為張燈野老煩避席未覺風俗殊秪驚闗河隔嚴程不可緩子規勿勸客赤城雞鳴秣吾馬晚飯山中行何以慰旅懷赤城有嘉名灘長石齒齒樹細風泠泠時見巖壁間粲若丹砂明溫泉發其陽撝訶勤百靈前峰指金閣真境標殊庭白道人跡稀青崖雲氣生信美無少留緬焉起深情龍門竦身望龍門緩轡行兀兀溪迴愁屢渡雨横驚暴溢兩崖儼相向百水怒爭出人言馬上郎快意毎多失自非渥洼種不得矜捷疾飄飄蟣蝨臣凛凛黿鼉窟皇靈重覆冒利涉用終吉迴睨向所經千嶂隠朝日青林外盤紆黃流中蕩潏後來未渠央君子宜戰栗獨石解鞍及亭午稍欣煙霧收蒼然衆山出歴歴如雕鎪前瞻一石獨靈宫居上頭頗聞去年夏水激龍騰湫走避登屋上夜半齊呀咻幸茲溪澗中今作清淺流宴安不可懷變化誠難求翠華渺在望行矣毋淹留擔子自從始出闗數日走崖谷迢迢度偏嶺險盡得平陸坡陀皆土山髙下紛起伏連天暗豐草不復見林木行人煙際來牛羊雨中牧颯然衣裳單咫尺異寒燠佇立方有懷相逢仍問俗畏途宜疾驅更傍灤河宿李陵臺日暮官道邊土室容小憩漢將安在哉荒臺猶髣髴低徊為之乆懷古增歔欷長風吹曠野飛雨千里至蕭條蒼山根草木餘爽氣常憐司馬公予奪多深意奏對實至情論録存大義史臣司述作遺則敢失墜上都分院晨興過桓州旭日生蒼凉舉頭見觚稜金碧何巍煌洪河貫其前青山環四傍暮投玉堂署鼇峰屹中央趨蹌旅羣彦官燭分餘光琴册森在側談笑來清觴列坐無所為陳詩詠黄唐帝鄉豈不樂父母逺莫将起視雲漢低垂星爛寒芒南飛有冥鴻邈哉天際翔遊寶陀寺十年望滄海臨流不能度蒼茫歲華晚邂逅舟楫具拂衣乘天風挂席隨烟霧且從蛟門發暝投翁洲住前瞻積水深島嶼青無數梅岑特孤絶遥見日出處寄身人境外矯首禪闗路粲粲金砂石離離白花樹髙期愜幽抱歴覽增遐慕俯伏苔磴間庶與真靈遇二邊非可取三觀何時悟㗳然坐忘言目送寒潮去雪竇紀遊八首移舟泊泉口我行已信宿天寒洲渚生峰迴川途曲煙霞蘭若髙别墅在林麓攬衣待明發石路何幽阻日出不見人林深但多虎乳峰稍已近恐懼那復數髙人欣相迎山門帯流水風生珠樹間月窺鏡池裏觸景遂成迷應接殊未已幽尋指山椒崖傾忽如瀉俯身視木末懸水在足下㝠㝠巖岫中宴坐奚為者亭亭妙髙臺逈出千峰上怪松多十圍巨石非一狀心賞孰與同昔賢有餘唱蕭然上方境人稀知地僻中峰路難辨丹山雲仍積徒聞古仙人石上餘足跡詰旦逾西岡草木益深秀梯苔下絶巘坐石看飛溜隂靈多窟宅欲往不敢又興移初出山繫纜長汀樹夜來雪已深溪風水難度猶疑鐘磬音遥遥白雲處送曾止善孔廟司樂周官重司樂典教専成均如何千載下實去惟名存之子負逺志被褐徂冬春低徊不自衒保此席上珍小試特豪末食禄同庶人幸與駿奔齒位卑號仍尊既殊仕伶官况及游聖門金石方在耳頌聲未崩淪聞風苟有作薄俗斯還淳嗟予領胄子四術空遺文鏗鏘尚莫辨論說将何云臨分用自愧贈言聊具陳同王章甫待制校文上京八月十五夜宿龍門驛凉風墮黄榆萬馬皆南馳而我方北首度闗及鳴雞石路更幽阻僕夫慘不怡徐驅待明發泱漭窮烟霏貂裘者誰子怪我逢掖衣為言霜露多遑遑獨安之我非不自愛簡書今有期憶昔州縣間折腰向小兒荏苒二十年白首初登畿同袍如燕鴻去住恒相違悠然慨平生與世何參差暝投龍門驛髙館臨迥溪青崕拱白月水木含餘輝秋色故瀟洒我行殊未遲相從况魁彦炯若珊瑚枝衰暮奚足云一觴聊共持送鄭以道鄭君不羈客漫仕常優游故人滿天上獨佐嶺南州嶺南風土異去天將萬里馹騎如流星衆手挽不止到官定多暇坐對梅花時溪石秀可硯泚筆成新詩詩成付迴鴈動是春冬隔用儒行召君努力崇明徳送王君冕同年歸長安昔忝膺薦送被褐趨上京蒙恩賜清問彚進陪時英束帶仕州縣暫為閭里榮蹉跎二十年來拂舊題名升沈久已判存沒復堪驚忽逢王明府話舊欣合并蕭條逆旅中書帙亂縱横坐閱車馬喧澹焉若無營雖懷帝鄉樂不受世網嬰寵辱端可齊去就一何輕空餘綈袍戀猶軫故人情予方徇微禄未能返柴荆終然無補報白髪日夜生如何同遊處餞此千里行度闗秋風起落木寒蟬鳴相思阻良覿惻愴何由平題杜左司西巖詩卷後吾聞古逹士大隠非山林如何鵷鷺間白駒起遐心遥遥望故山紫塞繚以深峰巒勢交集積翠千萬尋園廬在其下門巷常愔愔軒窓帶流泉花木乆成隂舂秫足新釀亦有書與琴終然戀魏闕未忍投華簪平明奉朝退粉署鬱沈沈披襟坐髙閣獨對西山岑爽氣坐可致塵慮安能侵勿云須吾土始用窮登臨異方苟同得視古猶視今聊為招隠篇往和巖中唫題象山環溪圗崇山標地靈萬古聚清淑堂堂故相家髙風在喬木仙翁上天去逸響今誰續優哉四千石接軫飛華轂夫君冰雪姿乃爾抱幽獨翩然來帝旁霞裾儼初服侍祠明廷上厭直齋廬宿睠言懷舊居結構依山麓軒窓對晴嵐林杪出懸瀑散為百道泉噴薄翻珠玉餘潤之所蒙秔稻豐比屋春事日向深桃源酒方熟往來無俗駕異書仍可讀歸歟定何時専此溪一曲相逢京洛間紅塵眯人目披圗覿佳致山水增新緑先賢止息處杖屨存遺躅愛山錫嘉名恵幸及樵牧于于後來者猶或被膏馥安得從君游青雲兩黄鵠題趙凉公瑞瓜圗慶門集嘉况異瑞呈瓜田生五而成十竒偶出自然觀物可知徳發祥匪由天願言植靈苑永奉君王前合形表同休雅詠流綿綿歲晏歲晏木葉落遥見東城隅雉堞鬱苕蕘列屋何蕭疎悠悠西南望赫赫金張廬退朝集冠蓋鳴珂沸通衢合遝多俊游並轡飛華裾顧盼有光彩行者為踟躕俯慙筋力㣲無從效馳驅日斜坐官舍還拂案上書緬彼川路長感此年運阻遲迴不能去歎息将焉如送陳太祝夫君青雲彦早通金閨籍弁服勞駿奔執事謹朝夕忽乘使者車意氣何輝赫將指固有嚴為務本非劇經營禮文事詎曰期會迫定知多餘暇時復肆游歴向來佳麗地觸目成陳迹西山獨偃蹇不改太古色相逢幾遺老慷慨語疇昔芙蓉君子花足以語使客我方守一官兀坐如龜息當歸更淹留臨别增感激長風吹遠塵浩浩千里白欲附南飛鴻安能生羽翼送王鍊師歸四明飄飄采真侶乃在四明山霞裾朝帝所瓊館留人間忽聞雙鳬舄却向東南還望之若流星邈然不可攀海月照堦戺天風飛佩環我何苦羈旅冰雪生朱顔集淵明句題李中甫員外稼亭東方有一士客養千金軀束帶候鳴雞出則陪文輿代耕本非望暫與園田疎園田日夢想投冠旋舊墟興言在兹春新疇復應畬田父有好懷過門更相呼披草共來往履歴周故居悠悠待秋稼時還讀我書雖未量歲功栖遲固多娛此事真復樂此語真不虚餞送傾皇朝歸子念前塗前塗當幾許直至東海隅古時功名士事事在中都遥遥沮溺心君情定何如集淵明句題胡生嘉樹軒孟夏草木長霜露憔悴之藹藹堂前林冬夏常如兹嚴霜九月中卓然見髙枝如何捨此去白日掩荆扉深谷久應蕪此䕃獨不哀黽免六九年懷此貞秀姿常恐負此懷未足為髙栖及時當勉勵慷慨思南歸親戚共一處日夕歡相持披榛步荒墟登髙賦新詩坐止髙䕃下一觴聊可揮從今至歲寒縱心復何疑永嘉王君自製挽歌辭蓋能安死生而未忘情乎死生者也集淵明句以釋之自古皆有沒我今始知之居常待其盡逝将不復疑人生無根蔕去來何依依既來孰不去奄去靡歸期復得返自然人間良可辭何事空立言念此懷悲悽日醉或能忘一觴聊可揮且極今朝樂千載非所知丙子七月十七日同輝公登紫㣲巖汪生元明許生存仁來會遂宿鹿田寺明日乃由山橋回至芙蓉峰而别追念數十年間並游之士往者已不可作在者又莫之與同兩生顧能不憚其勤相從躡屩行風雨中誠一時清事也第未知後游為何日同游為何人撫事述情成二十韻邀兩生同賦奉呈審言子長吾年未及謝倦飛已知還乃復嬰近務無由縱清歡幸與方外士相從巖壑間小憩遂深入詰曲披茅菅昔人有遺躅縹緲青雲端髙居匪結構異狀如雕鐫志怪固無取懷賢邈難攀停策訪舊游欲去仍盤桓迅飈發中夜衆木號驚湍凉秋變袢暑山深氣先寒泉石無改色四時自推遷交朋半新故念之增慨然兩生亦可人環珮來珊珊攜手恣幽步流目窮遐觀時於林缺處遥見城南山行行度危磴悠悠睇層巔凝隂閟朝采𤣥澤釃神淵嘉穟日已豐藹焉滿中田覽物多所欣賞心殊未闌後期孰與同良㑹當何年湖上即事垂雲晝濛濛湖面惟一色薄暮風更生際夜雪初積凝隂勢方盛塵境喧暫息坐久聞梵音忽然破寥閴試院諸公西湖同泛分韻得儀字秋杪景將晏天髙霧仍披漾舟西城曲散策南山陲重棘幸已撤累觴欣共持及茲酒不空未害席共移會合非可常簡書各有期念之動予懷朂哉慎其儀題清華亭名區匯修渚流望俯平陸飛雨天際來逺峰淨如沐生香餘晚華繁隂藹嘉木秀色坐可攬終然不盈掬觸景幽興多接物道機熟誰能與之遊食芳飲山渌題松聲樓長松四簷間落落無與伍天清嘯歌發肯作兒女語道人有真聴無迎亦無拒尚不知有耳况覔聲處所起視南山髙明月在庭户應念朝市人聞雞走風雨送寧上人歸吳中我如雲問鶴乆厭雕籠養子如海上鷗初不嬰世網胡為逐吾輩飲啄勞俛仰得無坐書癡遂爾生技癢欲於一毫端而現諸萬象重雲連夏秋雨㸃大如掌三州成巨浸百水猶怒長倉忙揖我去風蒲映飛槳有形天地問浮萍依浩蕩向也本非來今焉亦非往臨岐將何贈詩境方渺莽幸子頗聰明莫作離别想至正丁亥春二月起自休致入直翰林夏四月抵京師六月赴上京述懷五首夙予抱微尚漫仕遂浮沈决去不復疑甘以投華簪春天動使星空谷發跫音倉忙遣就道載筆歸詞林弱質幸未朽茂恩一何深義當不俟駕事乃違初心揖與親友别長眺故山岑臨觴不能御朗詠巖中吟揚帆越江淮河水來活活吕梁扼其衝石芒殊峭㧞泝河柁忽摧度洪纜遽絶前途總安流風勁桅復折兼旬涉險艱脫命爭毫髪行行薄畿甸值此正陽月皇輿方北狩前旌曉已發疾驅望清塵我馬不及秣出闗歴峻阪下視原野闊磵谿多縈迥岡嶺互盈缺舊遊如夢寐古道無改轍經時春草變久旱夏雲熱逺行誠苦辛儻免蒙霜雪信宿憩虚館平明玉堂開微風散靈雨階戺無纎埃良會秩初筵芳醪湛罇罍内官出黄封飛鞚天際來承平多故事鄙劣慚非才抃躍向宸廷慶雲欝崔嵬乞身懼再凟戀闕空徘徊日出旦氣清齋祓趨行宫周阹夾馳道大帳垂穹窿鳴鞘下霄漢别殿臨薰風攝衣升玉除穆穆瞻睟容謁拜未及已迴光赫重瞳詔使侍經幄通籍丹禁中斯榮非所希十載庶一逢怵惕乆復前旅進陪羣公願因奉清燕忼慷輸微忠衰遲力不逮勞心但忡忡圎象無停運日馭轉西陸原野多歸人翩翩共馳逐念昔居閒曹未老先納禄蒙恩列外監放浪湖一曲薄田皆舊畬敝廬非新卜白首重見招英遊並華轂寒松雖復凋幽蘭豈再馥宣尼譏患失伯陽貴止足時暮復何言終期返初服仙華方先生析簡齋杏花消息雨聲中之句為韻賦山中社雨七章和者四人先生於第四章見及顧未能屬和今五十餘年諸老皆已下地先生門人在者惟朱仙仲山年八十矣偶逢春社興懷存歿追次前韻以抒鄙情貞居逺人寰屋老四山靜一翁屹靈光二季亦秀整曉聞楓林鼔雨過鄰牆杏翛然發孤詠語盡意方永昔年慟哭地古劒生銅花凄其懷故交中情亂如麻仝彼盛壯時緩轡揚輕撾吁嗟長星墜無復出漢巴淮隂權竒士髀肉老始消長眉已雪色頩顔尚紅潮朋游三數公於焉共逍遥平生經濟策忘言付詩瓢卓哉全歸子離塵返冥極却觀人世間千載猶一息贈言在吾耳風規良可則欲叩封禪書探囊竟無得憶别青嵒翁歸進江上艣書札未相忘歲月遽如許山長春樹深地濶雲濤阻詩筒杳不來今雨非舊雨仙華幾千仞峻絶臨紫清天壇瑶草合石穴隂風生踆踆杖屨末眷眷丘壑情幸有一䕫足雅歌續遺聲前修遂不作良友孰我同兀坐守章句獨學無全功徒操五色筆隨人畫虚空悠悠感存歿惆悵百年中五言律詩寄方韶父先生牢落江南賦知音寄渺茫鹿麋行處有芝草夢中香遥興滄溟濶悲歌白髪長平生今古淚滴破緑蘿裳雨二首兀坐九十日雨聲殊未收花時翻益睡茅屋不禁愁生事吾何望春寒晚故留江波青滿眼萬里付雙鷗泥潦今如此出門知路難蓬蒿春自長桃李夢曾看未覺龍公倦誰憐燕子寒青燈耿蕭瑟千載入憂端雪急雪下不止朔風終夜鳴飢蟲應蚤蟄老鴈故南征生理真何計沈吟獨此情山中歲酒熟不飲竟須傾送友人鄉路三百里獨歸衣正單凉風紫洲水斜月白沙灘燈火期方逺闗山歲欲闌倚門應望汝莫慢駐征鞍寄友人憐君山水意局促守柴扉故里悲秋草凉風滿褐衣滄洲斜日晚白社幾人歸寂寞分遥念天寒木葉稀秋懷五首天末雲猶去山中歲欲徂周流吾道在歎息古人無野鵲疑秋樹新駒怯暝途蒼茫念同志㣲薄忝為儒對酒髙天豁登樓落日曛亂蟬悲暮葉老鴈赴長雲落拓嵇中散棲遲鄭廣文身名竟如此碌碌復何云稍稍秋河落姢姢宿露微天清江不息野逈樹相依回首狂歌數經心昨夢非流螢無思極巧入絳帷飛仰古嗟無及闗情極可哀禰生才見忌賈傅直為災世肯憐樗櫟吾曾悔草萊小詩聊戲耳何乃併生猜風雨仍揺落江山且滯留懶從生事拙閒惜壯心休弱蔓縈欹石空槎卧洑流興懷到㣲物世故劇悠悠柴荆赤日薄烏㡌柴荆無定棲可能詩似錦乍取醉如泥薄業慚漁艇深衣逐馬蹄蕭條江海興芳草故萋萋憑軒信有儒冠誤憑軒意欲迷山深風雨惡天濶羽毛低他日開炎瘴連城送鼔鼙荷殳吾媿爾未敢歎塗泥風雨風雨忽如此閉門方晝眠故應為計拙可復要人憐燈火羌村路桑麻杜曲田悠悠今視昔把卷一茫然山中懷友七首大府趨羣彦修才復壯齡波瀾開白晝羽翼動青㝠弱質悲殊調明時敢獨醒未妨茅屋底寂寞抱遺經望逺空山裏天寒夕夢孤林昏行魍魎江晚變蘼蕪風雨憐同病塵沙感壯圗向來懷古意迴首未能無疎放誰容我交遊重得君論文輕咳唾問俗到耕耘一笑能青眼相思有白雲春風動閭巷還往漫紛紛何事虗齋裏猶分苜蓿盤髙林容偃蹇衆翼避扶摶黑夜文星動青天劒氣寒終南山正好那得悔儒冠自是麒麟種卑棲又幾年故廬南雪下短褐北風前歲暮山林瘦天髙雨露偏肯同兒女輩俛仰事春妍卓犖恒山秀相逢幾抱琴五年風雨别四海弟兄心雪外梅花逺山中桂樹深定知嵇叔夜髙興薄雲林洛社推年少清才照士林春風何處客芳草獨行深遺墨收秦刻新吟學楚音别離無一字目斷白雲岑悼雙林栗上人飛錫遍諸方棲身復故鄉年隨雙樹老人與一琴亡暗草迷春塔凝烟鎻夜堂瀟瀟今日雨誰炷影前香社日重過方子踐東風吹客衣長憶見君時一别驚雲散重來與燕期春深今雨夕花老去年枝莫待空山裏青燈有所思聞子踐卧疾吾子仍多病何人共解顔水聲和藥臼春色閉松闗積雨連三月懷人劇萬山同遊况零落浩蕩可追攀和吳贊府齋居十詠十首焦桐憐爾抱竒質無香亦自焚材髙初偶得音苦竟誰聞天海空遺操氷霜見裂紋中㕑方煮鶴終得舍夫君蠧簡六籍灰寒乆名山餘舊蔵漆痕㣲有字芸草寂無香後死嗟猶及斯文豈遽亡世方珍貝葉掩卷一凄凉破硯巨璞何年鑿磨穿偶至今線紋虚緑潤雨氣失𤣥隂瓦礫看無異塵埃積轉深明光幾攜入往事復何心殘畫勝境不可得㣲綃餘舊圖丹青初彷彿塵土半糢糊蛺蝶飛疑去波濤坼漸無良工今豈有為爾一長吁舊劒憶啓蛟龍匣提攜徑出門紅塵走馬處白日報人恩歲月銅花澁雲烟斗氣昏凄凉中夜舞回首暗銷魂塵鏡古鏡色如墨千年獨此留玉臺塵網暗珠匣土花浮莫笑塵埃滿曽令鬼魅愁盤龍驚已化雲雨夢悠悠廢檠不解照珠翠早同文字盟何言中路棄無復向人明雨宿髙齋夢秋吟廢館情相看幾今夕及此慨平生敗裘襲爾亦已乆霜風兩袖穿甘從穉子笑未受故人憐雅製餘前古深期在暮年素絲今化盡念汝獨依然斷碑零落秋風卧何年廢廟碑圖經愁莫載耆舊說頻移野燒龜趺失荒苔鳥跡疑遥知千載後拂拭轉堪悲卧鐘龍虡乆摧折沈埋奈爾何畊民誰睥睨野衲自摩挲雅奏多年歇銘文幾字譌斜陽荆棘裏長伴舊銅駝過謝臯羽墓識子今無日風流可復尋山林餘楚製弟子解閩音滄海他年夢青天後夜心平生匣中劒零落遂如今元日即事回首人頻異興懷誰與同塵埃欺白苧歲月入青銅雨急蒼茫外春生浩蕩中長憐故園樹一一受東風八詠樓懷古荒碑在登樓晚望賖秋隂垂野薄江勢抱城斜天地悲遊子氷霜感歲華紅塵吹裋褐歸興及清笳溪南即事莽莽長川去行行薄暮時山光連睥睨寒色入旌旗夕鳥歸飛急風㠶逆上遲世情闗物理俯仰寄長思明月樓遺堞何年有飛甍壓上頭鼓鼙分大幙香火望靈湫曲岸舟如失遥沙樹欲浮登臨且吾土未敢恨淹留含香道中殘日亭猶逺輕風帽易斜稻畦低没鶴草逕曲行蛇經世知無策謀生㑹有涯殷勤理黄菊留眼待秋花懷楊仲𢎞離别驚如雨蹉跎媿後塵秪今才有數多爾術能神玉唾春風濕煙霄碧樹新謬慚推吏事吾敢望平津八詠樓遇方子踐風雨三年别登臨一笑同緑莎垂古井碧瓦映踈桐世故違髙枕吾生劇轉蓬相逢感疇昔出處愧匆匆杭州寄子踐樽酒何人共春光著處同乾坤容野馬歲月失飛鴻俗眼能無白風花故自紅向來常處士早已負諸公次韻答子踐不謂飛霞佩珊然寂寞濱相看今雨夕漸近長年人往事驚如夢何峯擬卜隣平生千里駕還往得辭頻劉聲之爐亭夜話儒冠寧誤我壯志自多違昭代尊經術先生尚布衣清言今夕共大隠昔人稀預恐蒼山麓無從候少㣲雨三首湖闊雲如積天空雨正豪風飈兼晝夜井邑帶波濤茅屋垂垂破漁舟故故髙何妨張仲蔚環堵自蓬蒿穉子吾憐汝泥行去不難憑闌真自笑髙枕敢求安天地三辰逺江湖五月寒好將遮日手却把釣魚竿田父愁何訴龍公怒未休千畦沈翠羽百水散黄流小市猶長閉孤城併欲浮誰誇補天漏此事恐悠悠金陵客舍漫書不擬芙蓉珮終然挂寂寥百年多事始千里一身遥巢燕驚華屋韝鷹望赤霄蒼蒼叢桂樹愁絶小山招陪仇仁父先生登石頭城談笑逢諸老登臨失故亭薄遊成汗漫髙步覺竛竮峽水通吳白淮山入楚青平生一盃酒及此慰飄零抱琴三尺枯桐樹相隨年歳深此行端有意何處託知音隠隠青山夜寥寥太古心空擕水仙曲更向海中岑吳賛府挽詩三首鶴去愁滄海鴻飛困朔風𡨕𡨕方獨往已已竟長終莫掛還鄉劒真隨厭世弓向來曾慟哭不是為途窮百代龍川子風流見外孫餘生唯白帽舊業自青門浩蕩期千載蒼茫哭九原仙華雲縹緲愁絶刻舟痕懷古餘哀思憐君尚典刑清談無俗子白髪死遺經客社荒春汐鄉山隕夜星夕陽隣舎笛悽切可堪聽春日郊行雜興三首忽忽時頻異垂垂花正繁登臨聊極目出處可忘言風急江光亂春濃野色昬舊游嗟契闊覽物思空存五畆清江曲為農計末踈那無經世策宜付絶交書野笛吹頻歇漁舟去若虚卜居能有待天地本吾廬髙興真誰共佳辰秪屢經天清風細細花逺樹冥冥勝事今非昔狂歌醉欲醒終南飛鳥外一髪向來青次韻答友人十載論交地才皆第一豪江湖嗟契闊風雨夢蕭騷趨走知無力標題敢自髙期君養翎羽一擊可徒勞九日登石頭城背郭囂塵逺髙秋川岳清幽懷初曠蕩陳迹故縱横遥望龍盤舊長憐蟻穴爭紺園隨處闢粉堞向來傾發草窺眢井看碑驗故塋門開蒼耳路亭愛翠㣲名逺樹淮南出滄江鳥外明人煙川浩渺風物歳崢嶸吹帽仍佳節傳觴但老兵愚生雜蛙黽浪走媿璜珩去去㠶檣盡蕭蕭蘆葦鳴登髙未成賦覽古獨含情政復哀王粲何堪厭禰衡敝廬滄海曲目斷白雲生寄李生有美維仙李孤標見碧梧髙門留雨露短褐混泥途姿悍寧為小機深或類愚洗心須貝葉游藝及摴蒱政爾難藏頴幡然獨抱竽從容觀近效僶俛事羣趨稍廢琴心曲能操犢背書誰將窮罔象莫使避珊瑚它日逢何暮清談動至晡醉醒勞問我喜怒得令渠契闊江湖逈漂零歳月徂青雲悲㨗徑白日仰亨衢秋社枌榆外南包橘柚初飛騰如借順能勿笑蟾蜍次韻答陳君采兼簡一二同志六首憶昔雙溪上相逢暮雨時交游傾意氣談笑挹丰儀草草中年别寥寥大雅詩受材知有分豐嗇竟誰司不謂飄零日求賢網四張胡然卑小技乃爾閟孤芳寳唾非無色江鴻詎有行散材何所以徒愧飾青黄十載西州客論交著處新時時談述作一一望光塵澹月銀河曉暄風玉樹春幸令窺髣髴㣲薄尚何伸黙守知存道清言不廢儒身方同木石名已在江湖此士須前席何人屬後車唯應畊釣者縹緲識霞裾尚想南歸始簪花出禁圍塵沙迷故步桃李借餘輝有日酬天造終身返布衣風流成二老巾屨倘相依亦有貞居子難忘太古情詩筒來絶響茗椀出新烹磊落單傳意蕭條異代名無為念離别惆悵不能平洋山夜發肅肅洋山暮倉忙拜水神吹嘘端有力漂泊竟無津黑夜魚龍界皇天蟻蝨臣生還如偶遂敢憚歴㣲辛陸氏水軒分韻得揚字髙會軒楹敞清秋笑語涼行雲隨度曲野水映飛觴坐挹才華盛衰慙鬢髪蒼新詩穿窈眇何力共游揚寄黄伯陽掺别逢春雨移舟落夜濤忽驚滄海大轉覺碧雲髙楊子多竒字王祥忝佩刀深情空繾綣短髪正刁騷送陳養直歸四明迢迢淛河水同渡不同歸執袂方成别驚㠶已若飛野橋行處酒風雪去時衣瞻望嗟何及天長鴻鴈㣲送胡允文紹興録事斯文千載後一髪渺存亡尚喜衣冠舊能傳翰墨香春秋嚴助對富貴買臣鄉莫厭官曹劇諸生在鴈行讀陳制幹遺事歴歴青雲上飛揚彼一時深春曲江宴清夜郾城詩老去山河在仙成日月遲空言徒有託千載欲誰期隆山牟先生挽章井絡收英氣文昌返列星能官須伐閱仍世覿儀刑漂轉逾三峽森扶並五丁芝蘭紛滿砌橘柚歘充庭它日看空櫪羣公羡發硎鼎湖驚掃迹華表訝摧翎風物嗟王粲心期託管寧乘桴良已後抱瑟匪求聽此道誠何病明時忌獨醒迢迢膽北極衮衮化南溟薦剡多新墨恩袍祇舊青故應氈座冷不愧草堂靈食檗餘深味縣車及暮齡一朝傷永訣千古悶遺經謬忝鴻私乆徒增雪涕零無辭歌薤露有恨寄泉扃入京道中寄同里諸友十年州縣底及此望京華客路時時雨春江岸岸花何方堪報國將老更浮家可得同攜手山顛復水涯送句龍提舉之雲南獨抱文章印驅車背朔風行歌萬里别聲教百蠻通列郡創殘後諸生色笑中誰當偕計吏封殖待新功題天童疊秀軒名山標巨刹樓閣在青𡨕别路通禪窟當軒列翠屏暝禽多雪色偃樹盡龍形負土新成塔非才愧勒銘癸酉四月同子長至赤松子長先去遂獨宿智者之草堂已而子長與正傳俱來同出靈源詣鹿田遊三洞逺過山橋至潜岳謁故中書舎人潘公之墓復迴智者而别昔共張公子翩翩訪赤松重來經兩紀獨去宿孤峯古木蒼陂映襌房側徑通夕隂千嶂黑人靜一燈紅幸及軒車會寧辭杖履從相看如夢寐徤走愧兒童春盡山仍好林深磵忽窮天低時墮雨寺逺但聞鍾弔古田無鹿探竒洞有龍幽尋穿􅌄窱髙步踏玲瓏靈草多成藥踈篁不作叢嵐光凝晻曖野色在空濛下瞰疑無底言旋復向東巖阿棲斷礎烟外落飛淙細路縁苔磴危橋跨石谼泉依山曲曲雲與樹重重巨刹縺名岳穹垣䕶畆宫倚闌斜日下入室老僧逢零落螭頭黑荒涼馬鬛封不才待薄禄終古望遺風弛擔雲闗裏傳觴雪峽中追隨尋道侣述作付文雄急景真流電浮生尚轉蓬後期觀歲晏來往意憧憧送簡縣尹簡氏多兄弟才名萃一家嗟君本朝士出宰向天涯度嶺三冬雪行春一縣花應憐未歸客鞍馬尚風沙送趙仲理御史籍甚聲華舊頻年沐盛恩校書天禄閣執法太㣲垣攬轡炎埃豁揮毫玉露繁庸踈徒自笑投贈欲何言送趙宗吉御史憶共趨龍禁驚聞正豸冠汗顔居館下矯首望臺端去路黄河直飛霜白日寒仙舟如可託歸理釣魚竿送馬伯忱教授卓犖青雲彦飛騰及妙年書成天禄閣座有廣文氊九陌車塵外千軍筆陣前白頭慚倚席臨别思茫然送王道一郎中使者下青𡨕郎官動列星揚旌開瘴癘持斧用雷霆逺俗難馴化儒臣解引經無如多詿誤能勿望平亭送宋顯夫憲僉分題得邵伯埭謝公千載後陳迹在淮壖遺愛傳終古嘉名配昔賢藕花方爛漫使節莫留連移取甘棠樹分栽郢水邊送宋翼卿照磨莽莽闗河路西征獨據鞍借材蓮幕底養望栢臺端指日傳温詔朝天正法冠廣平心鐵石寧憚朔風寒送潮陽蘇縣尹夜水蔵蛟鰐秋天卷瘴雲田多陶令秫石有大蘇文巧宦誠為樂修才况不羣尚煩驅筆陣時復張吾軍同劉遂初脩撰周伯温編脩任大瞻經歴王繼志架閣西山行香次初韻仙馭賔天乆衣冠此出游祗園金地古汾水白雲秋謁拜陪諸彦躋攀展寸眸始知山水窟近在帝王州深岫蔵青靄平蕪映緑疇層臺臨太液環海像瀛洲粤自遺弓劍無從望黈旒明庭虚次舎綵纜舊維舟陛㦸盈千列靈輿副九斿祠官偵伺謹中使往來稠備禮兼今昔求神遍顯幽琅函開貝葉玉瓉薦黄流肹蠁人天合輝光日月侔遥看陳羽衛疑是問龍樓花雨繽紛落香烟泱漭浮重闗羅虎兕簇仗擁螭虯去去簫聲逺㣲㣲扇影收清都成夢境塵刼等浮漚歸逕縁湖尾殘陽掛樹頭舉盃相慰藉分席暫淹留物色迓行轡風寒襲敝裘迴曕天路永坐感歳時周戀闕慙衰朽非才墮謬悠缺休富鴻藻珍贈若為酬題道士熊君夀母詩卷跨鶴出山中春衣密密縫度闗占紫氣賜酒拆黄封介夀慈顔喜承家積慶重蘇耽却來否石上有仙蹤題石門淨勝寺十頃蒼陂上山迴地勢偏屋棲黄面老碑掛赤烏年葉葉風荷顫層層雪瀑懸青燈夜寥閴獨照一僧禪秋至寧海地至東南盡城孤邑屢遷行山雲作路累石海為田蜃炭村村白㯶林樹樹圎桃源名更美何處有神仙縹緲蛟龍宅風雷隔杳𡨕人家多面水島嶼若浮萍煮海鹽煙黑淘沙鐵氣腥停驂方問俗漁唱起前汀試院同諸公為主試官作右轄升庸日秋闈獻藝初端居煩坐鎮妙柬備賢書憶昔興文運惟天啓聖謨教條行九有學業出三餘儒術俄中否詞塲遂乆虚綸言何噩噩髦士共于于吐握承謙德飛揚感壯圖至公留藻鑑成物待洪爐肅穆華星聚涵容化日舒誰歟隨計吏行矣聽傳臚橘柚天庭貢參苓相府儲鋪張須鉅筆衰朽媿荒踈試院同諸公為監試官作文治回亨運羣言協睿謀設科存墜典傳詔及遐陬風動黄簾曉霜飛白簡秋迂臨宣上化精察副旁求懷牒魚鱗集摛辭繭絍抽按行承奬飭鼓舞望甄收氷鑑垂清照淵珠免暗投充庭先品物入彀總英游奏自蘭臺上名依桂籍留神仙司下土桃李在南州使節光華盛公堂禮數優無能禆末論傾詠獨綢繆游法華山回宿樓氏書房遥望嵩頭陀智者國師道塲上清五雲龍夀諸山而未及至其處贈同游傅生國章故廬湖水曲門對法華山百里空荒外三峯晻靄間倦游煩汲引闊步强躋攀老怯髙寒境非縁興盡還小憇虚齋夕何人笑語同青雲一才子白髪兩衰翁節物逢春好名區有路通未能窮勝踐健走媿兒童過永康桃巖立石平如削飛雲近可梯莫窮千古勝但惜衆山低靈草經春長珍禽隔樹啼人言舊朝士感事有留題五言絶句山中偶題古苔隠石色寒花明藥叢有時白磵雨終日青松風夜坐涼風動千里孤坐思滄洲白露洗明月青天此夜秋題趙公畫蘭竹猗蘭幽人操緑竹君子德夭夭彼棘心胡為乆吾側題馬虚中畫人在白雲處舟在清溪曲不聞欵乃聲但見山水緑文獻集卷一
