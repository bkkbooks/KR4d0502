body:
  text: 文獻集卷二元黃溍撰七言古詩可憐行紅顔白面可憐子杖藜飢走荒山裏翠眉新婦雪色兒掩袖嬌啼瘦如鬼道傍朱門照霜㦸腸斷汝翁呼不起金魚象笏供摴蒱紈袴終然愁餓死春風秋月哀思多嗟汝少年奈老何崑崙歌寄吾丘子行翠鸞啼雲天四垂花龍雙雙神姥歸金仙憶君淚如水昌陽落花青蘂蘂曾城珠闕揚素氛開明狺狺環九門羲和走馬不待人鯨魚吸海海生塵若有人兮悵修阻紫玉參差老鳳語笑揮如意教雲舞雲間鶴雛生兩羽歸來歸來勿蹉跎秋風吹折玗琪柯梓山行贈桑生昔聞山中采藥翁問姓但指簷前桐君家本以桑為氏胡不種桑翻種梓桐君采藥不學醫桑君學醫兼采詩朝來索我歌梓山使我閣筆頻支頥問君梓樹家何處青山難尋夢中路但見清風兩袖寬詩筒戢戢多於樹長歌短歌亦奚為坐看藥籠懸蛛絲種桑種梓俱有術也應無術醫君癡采芝曲贈永嘉林道士碧峯矗起三十六老芝千年琢紅玉帝遣仙人下采芝迷花失石憺忘歸忘歸幾載無消息蟠桃積核高數尺何日青牛駕爾還肯念金華牧羊客金華山贈同遊者三十韻杖藜初出城西門萬株紅葉如雲屯芙蓉峯前問行路宛宛一線隨潺湲水聲漸逺山漸近弱蘿纎葛手所捫須臾橫側變峯嶺高岸忽復為平原細泉瀏瀏竹竿直石樹駢立疑同根剝金敗碧逢廢剎猶以第一名其軒天明獨去弔遺迹玉女委蛻空丘墦樓居西起望明滅石扉呀若山之樊罅幽穴險徑沮洳膝行匍匐不得奔剨觀崖廣架寥泬雙龍繞霤蟠蜿蜿紛綸怪狀滿巖腹熊虎踞伏鸞鳳鶱其餘瑣細無不有形求像索難具言前趨林麓却下縋俯矚九地窮涯垠青枝翠羽不復辨但聽風水聲喧喧高燒松炬度其背珠箔忽隨華燈繁聳身上出指絶頂碧桐高下彌山園遙穿蓬艾踏雲雨險艱從此不易論秋毫細路莫容足下瞰不測傍無藩怪藤如鉤草如劒舉首仰歎愁攀援山翁顧之笑引臂前牽後接猴與猿馳坑跨谷欹側過背汗喘息逾包燔陰沈古洞閟星日雖有寒暑無朝昏却行左轉復深入愈覺憀慓搖心魂珠纓縹眇現滿月稽首大士天人尊拂衣徑逐飛鳥下青山出沒波濤翻或云漢人隱身處倣佛肩背餘苔痕蛇蟠磬折又數里龕巖十丈開墉垣夜歸草堂殿突兀坐看雲月吐復吞怡然攜手盡文士頗覺筆下來源源名山石室如可託幸子歲晏來無諼送俞觀光寒忩讀書吻政悲坐聞剝啄走啓扉衝風踏凍至者誰俞子訪我繇剡溪相逢把臂語移時婦女驚笑群兒疑俗物病我不可醫眼明見此珊瑚枝朝來贈我天馬詩忽然掉頭去莫羈鼻端氣息干虹霓詎能折腰向小兒文章技癢聊爾嬉䇿勳聖處今毋遲繄我愛子莫助之臨跂躑躅徒嗟咨讀清江集元祐儒臣煥星斗後有作者非其偶二龍三鳳何繽紛况乃淵源魯中叟適從塵編識英爽想見世澤餘忠厚長公平生二三策大廷披腹驚羣后風流斑斑仲與季茅茨采椽絶丹黝獨追古昔寓陽秋稍抉疵瑕到瓊玖却蟠餘力歸賦詠古硬清圓無不有爰初人文啓河洛下逮百氏分戶牖空言可託匪末藝巨筆待援須好手典刑未墜乃至今吾生已幸何云後青燈照夜雨如線奧論微辭煩擊剖追慕政復慙捧心贊美胡能付鉗口從遊起死不敢期儻挹殘膏注空朽題李坦之詩卷神仙中人世莫識政以文章為戲劇李生也復可憐人手種蟠桃待春色山空歲寒誰念汝青楓墮影霜露白逺遊賦成一朝去翠蓋雲旗暮何適蓬萊烟霧秋冥冥鄧君白鹿無消息袖中驪珠三百顆夜深勿近蛟龍宅金華之山青矗天山人看山忘歲年黃精芝草幸可食安得與子巢其間石牀醉聽松風眠無為長歌怨如哭使汝惻愴凋朱顔甲辰清明日陪諸公入南山拜胡侍郎墓回泛舟湖中作日終甲子斗直辰持觴逺酹胡侯墳兩槳趂鷗背城闉四十有四同州人半為吳語如季真湖窮岸出水陸分舍舟登途指嶙峋少年健走黃犢奔或乃喝道驚春雲老翁繭足仍後塵解衣徑眠草為茵前趨一里趨廟門杖藜不得辭微辛嚴祠高居絶四鄰傍為一邱標石麟升階鞠躬羞藻蘋拜興有相祝有文亦或稽首稱諸孫歸途探幽抉荒榛下睨塵土多虻蚊放舟催發無逡巡勝賞莫許窮涯垠開篷列坐羅羶葷託名鄉飲無主賓誰歟解事強討論欲以窮達為卑尊美人今代王右軍口吐秀句天葩芬鴈行拱立何紛紛爭言我公詩絶倫龎眉被褐兩山民閉目宴坐方申申艤舟黑亭鴉噪昏晴楊吹花灑衣巾裁詩紀實聊云云慎勿浪傳來怒嗔送傅主簿吾聞上古之世比屋皆可封有材不必登王公可憐衛青日尊貴飛將自老風塵中傅公平生經濟手却抱一生今白首隨人騎馬著青衫爽氣如虹射牛斗出門大笑望長安長安萬里行路難行路難知奈何贈君一杯酒請公聽我歌崑崙之山兮高巍巍黃河之水兮清有時洛陽少年休太息東山謝公來未遲燕昭之事不足云陛下聖德如華勛願公功成名遂身早退魯連小兒能笑人苕溪風雨中章德茂同泛黑風翻江白雨傾檣欹柂側斷人行此時惟我與章子孤舟蕩漾煙波裏蒼蒼楊柳黃浩歌擊舷興彌長翩然一葉恣掀舞青山白塔頻低昻朝過城南暮城北舟人問我將誰適章子掉頭作吳語秋水夜來深幾尺忽看大字標竹林寺門對水仍陰陰敲門見竹不見人竹間翠石何蕭森回舟少林雨如注四顧冥茫但烟霧魚驚龍躍吾不知披蓑却入菰蒲去岸傍羣兒拍手呼笑言狂客世所無嗚呼古人今則無後來視我知何如為君留此有聲畫題作扁舟煙雨圖由苕溪出大湖抵陽羡十四韻首陽山人餓至死陶公乃為飢所驅大賢出處自有意腐鼠何得疑鵷雛誰初令我墮世網久抱磊砢行﨑嶇今晨笑與親友别煙波泱漭扁舟孤穹天大澤合為一回睨人境茫如無向來蟻聚安足戀而取窘束同囚拘暮投高館燈閃閃坐談姬孔歌黃虞是間幸可容一息孰與臣朔肩侏儒汗顔俯首飽腥腐咄子所樂非我娛故人殷勤入我夢云我作計陋且愚此生通塞久自斷豈憂一勺忘江湖春風二月花蔽野珊瑚玉樹唯空株丈夫兒女各有事為君起坐生長吁次韻方子踐雪中見寄前年江南雪一尺腐儒共走誇三白寧知有客卧欲僵凍骨稜層撑鐵石今年復此雪塞門江湖無處浮言樽野風蕭蕭日色死看人射虎蒼山根牛衣覆寒夜復夜金石餘音慙慰藉平生萬卷定安施一瓻送我當渠借題陵陽牟公紫陽方公詩卷兩翁風流掃地無文章光焰埋丘墟紛紛小兒政疾走安用佩玉飛長裾憶昔登堂三十載夢想時復瞻眉鬚昆蟲閉關水返壑孰使驪龍道頷珠願言保此勿輕出幸免兒輩相睢盱題大瀛海道院丹山之山青崔嵬隱居舊隱山之隈千年土鼎為誰出深崖古像松聲哀鴻飛天上爪在雪過者莫睨君能來想當月斧乍揮霍奔走屬役皆仙才卷藏瀛海歸一粟顧盼瞬息生風雷森然幻有啓神界白日照耀金銀臺昔聞使者兹入海樓船煙霧何時回君其置此勿復念少須碧水揚黃埃九重蠖濩陛下聖方士未易誇蓬萊琳宮貝闕長望幸天高海濶心悠哉陽山昱上人訪豫吳門寓舍求為湘竹詩豫辭以未見竹上人不逺六十里自山中舁其竹而來好事有如此者欣然為賦長句道人來自陽山麓手攜舊種千竿竹小裁方斛不盈尺中有瀟湘江一曲未信天工能爾竒不知地脈從誰縮晴忩翛翛散烟霧眼底森然立羣玉豈期我乃纍此君蒙犯風埃走塵俗故山方逺重愁絶新句未成慙迫促黃岡之産大中椽政用材美刳其腹願言保此終天年歲莫山中伴幽獨杭州送兒姪歸里空江月滿潮聲怒二兒勇踏潮頭去故園天末渺豫懷夢中識汝歸時路起向江樓遙望汝江上青楓正霜露凉風颯颯吹汝急櫓搖背指龍山渡翩然一葉舞中流嗟汝童心得無懼自我西游歷三紀舉目交朋半新故下車相揖何紛紛白頭朝士猶徒步𤣥都觀裏舊桃花見我重來能幾度緬思疇昔仍念汝倚徙闌干日將暮前潮方斷後潮續層波復浪無重數魚龍出沒相後先疾雷槌山雨如注隔岸峯巒空復多沙際冥茫但烟霧計程知汝已登陸息肩弛擔今何處明朝過我三釡山能勿徘徊起哀暮近聞旱魃肆為虐殺吾手植千株樹且須為我語比鄰莫遣牛羊上丘墓題松溪圖獨騎瘦馬走赤日忽對畫圖雙眼明想見高人茅屋底石牀卧聽松風聲秋風漸高霜露白松根茯苓已堪食鬱紆遲暮祗自憐卷圖還客三歎息題周鍊師雲崖圖我本山中牧羊客偶然失腳紅塵陌矯首丹崖不可攀但見層空暮雲碧樓居仙人元不死天長地久無消息騎麟翳鳳者為誰道上相逢不相識披圖示我舊游處流水桃花尚春色為言白石久已爛茯苓無復成琥珀忽然長揖不肯住飄若流星去無迹若為握手賦歸來永與人間風雨隔贈熊天瑞先輩熊君南州山澤臞敝衣不滿六尺軀年丁七十氣尚粗撥棄舟楫違江湖塵埃掠面冰生鬚北走梁宋至皇都舉頭仰瞻天子居姓名無由達公車何王之門無長裾君惟抱瑟王好竽寒風蕭蕭雪塞廬退從諸生詠唐虞詩成篝燈手自書字如凍蠅密復踈食可無肉出無驢為我屣履來于于曰豫其歸無所須一言用比明月珠我方守官橛株拘嗒然忘言據槁梧童子穰穰環座隅笑我腹笥太空虛感君逺來增歎吁愛莫助之將何如翰林主人揭大夫與君少若同隊魚巖棲穴處多其徒君歸而求宜有餘長歌鼓缶聲嗚嗚青天自高雲自孤番昜周節士歌周君生長番君里長身俁俁鬚仍美師張先生業孔氏夏螢冬雪頻繼晷先生愛君不骪骳君謂先生我知已遭時戰伐多瘡痏賊衆乘之作姦軌郡檄先生俾一洗先生慷慨為之起曰彼蚩蚩聚蜂蟻凶渠本我家奴爾我將笞之用折箠披其角毛脫距觜奴挾兵來速如鬼反噬其主先生死先生諸子俱幼稚周君聞之失箸匕曰古復讐蓋有禮師長之讐視兄弟我今必也書于士走告郡府伏以俟府公義之弗敢止授以殳斨與弧矢或云彼衆我無幾盡募援兵為表裏君奮不顧行益駛賈勇直前無與比賊窮擲金計何詭得金失賊墮其餌亟取貪夫尸諸市士氣復振賊乃靡追奔逐北劘賊壘迅雷不及掩其耳一栅既覆衆栅毁生致賊奴洎妻子刌其心肺獻俎几告于先生辭亹亹凱旋公庭旗旖旎散遣部伍歸耘耔天戈耀日方南指郡將效死弗拜跪周君堂堂衆所恃人咸謂君今可仕細書降表僅尺紙大哉公侯小刺史君言我本不獲已出為吾師刷讐恥罪人已得賊已弭東村西落無荆杞不義富貴寧飲水公毋多談且休矣閉門高卧肉生脾白駒空谷餘四紀歿葬金潭有廟祀鄉人歲時擊羊豕子暾來與胄子齒踵門泣涕言如此嗟君壯節甚竒偉播兹歌詩侑哀誄送李憲使赴燕南分題得烏飛曲臺中樹枝上烏無數當年元只為公來今日從公却飛去趙北際燕南垂道傍緑樹多好枝公之所憩烏所依公毋亟行烏勿飛問公此去何時歸上林春深樹如織公歸但聽烏消息贈夏德頌夏君懷抱何磊落卜居不肯依城郭丙舍新開近墓田雪柏霜松翳丘壑一朝興來不可遏萬里黃塵走京洛叩門遺我尺素書儷玉駢珠相照灼為言家世本臞儒餘力惟知事耕鑿窮年甘與鹿豕遊敢希鴻鵠翔寥廓秪今逺來亦有意求詩元不求官爵華星秋月幸分輝持向山家慰蕭索我聞君言重太息感君望我殊不薄清時雜遝富才彥笞鳳鞭鸞趍館閣揮毫成風墨成雨瑞錦披張分製作一言引重力千鈞青雲驥尾端堪託顧我方為句讀師掇拾殘編味糟粕坐隅童子日呶呶平生雅意渾銷鑠奚暇清吟發天巧剪紅刻紫供嘲謔君歸卉木尚餘春况值新篁初解籜傳家有書故可讀有石可眠泉可酌大勝山人來索價低頭欲就微官縛我雖齷齪坐無氊有客如此良不惡戲拈筆管和竈煤為君聊賦山中樂風樹吟為李生作返照入深林牛羊在丘壟風吹白楊樹葉葉各自動如何當此時孤子萬里歸有琴未成聲遽欲絃吾詩吾懶言詩子姑去抱琴聽子風中樹題錢舜舉畫鳥雀鷹鸇皆羽族強之食乃弱之肉兩雀亦分弱與強一遭搏噬一高翔畫師描貌勞意匠詩人見畫齊惆悵人間萬事無不然雞蟲得失安足言題李氏白石山房名山秀出鄱江曲上有立石如立玉尚書履聲忽已逺隱者新居在盤谷花開鳥鳴春晝永白雲重重養喬木夫君亦復稱其家有書能藏且能讀露鈔雪纂久愈富何啻鄴侯三萬軸山靈翕霍謹呵護夜半虹光發深屋引泉天井助芳潤大勝吳儂飲山渌我欲從之不可到細字長書俄滿幅毫分縷析極根柢大義森然見條目鄙人愧莫知所對叩請安得留更僕頗聞石洞閟遺音龍門餘韻須君續臨風傾詠寄綢繆衰朽終期挹膏馥題張清夫心逺堂吾聞古來賢達士不擇山林與朝市百年塵甕兩醯雞鵬鷃逍遙俱可爾夫君平生瀟灑意俯睨軒裳猶敝屣翩然一舸鱸魚鄉歸來不待秋風起忘言兀兀坐終日天地古今齊一指但見山高湖水深青螺蕩漾銀杯裏柴桑之人去我久風味何妨略相似神交冥寞雲海長目送歸鴻眇千里題醉歌圖翰林主人天上來布帆不為鱸魚開江湖渺渺天一色朝光暮色相徘徊昔賢心賞餘勝處秪有水竹無亭臺碑材久已沒荆棘屐齒不復留莓苔後來視今猶視昔今我不樂胡為哉太官馬湩逺莫致鄰翁緑蟻浮新醅欣然一飲便終夕鼻端氣息如雲雷是間别有一天地不知何處為蓬萊回觀方內海一粟醯雞塵甕何喧豗黃冠祕監太狂態騎鯨供奉非仙才揮毫政要真學士鋒車流水行相催瑤池曲宴多雨露歸歟酌彼黃金罍七言律詩送孫君文判官笑語匆匆似夢中衣裳俄復判西風殘蟬落日那堪别瘦馬長途喜未窮歲事已空南畝稼歸期應老故山桐興來尚有平生棹載酒何時覔釣翁感舊華屋山丘不可期峴峯依舊緑參差空懷下榻延徐孺無復乘舟訪戴逵日暮更聞鄰舍笛歲寒賴有角弓詩舊遊寂寞成今古冷石秋花處處悲鳳凰山滄海桑田事渺茫行逢遺老色凄凉為言故國遊麋鹿漫指空山號鳳凰春盡緑莎迷贊遒雨多蒼薺上宮牆遙知汴水東流畔更有平無與夕陽開元宮誰使藏舟一夕移紅樓翠幕未全非曾聞帝子乘鸞去疑有仙人化鶴歸煙徑月明瑤草歇石壇露冷碧桃稀赤闌橋畔多時立閒看楊花作雪飛早起漠漠晴簷散薄雲獨搔短髮立清晨春風入樹無行迹曉月窺簾欲近人旋覺新吟隨夢寐不知清霧濕衣巾何人正踏長安陌想見看花拂面塵寄陳君采江淹文采碧雲消潘嶽才華玉樹雕後爾千年開捷鑰森然作者見風標琪花夕日輝相並金匱名山路未遙賸欲傾心數還往高期無使竟蕭條次韻答吳正傳諸老雕零半九原後來英發見蒼然高標能復居人下緩步猶須出我前天馬為誰生月窟仙禽有日到芝田論心待取同傾蓋可使空回雪夜船寄葉審言千里相思黃葉初喜傳消息慰離居姓名漫入山公啓懷袖元無賈誼書已分耕藝供賦斂胡令汲引到樵漁臨歧躑躅頻回首風雨蕭蕭鴈正踈獨立數盡飛花一愴然壯心迢遞夕雲邊十年人事空流水二月風光已杜鵑過眼青春寧復得汚人黃土絶堪憐故園尚有平生約可使蒼苔到石田即事南陌東阡草色齊愔愔門巷客來稀受風燕子輕相逐著雨楊花濕更飛緑樹無言春又盡紅塵如霧手頻揮浮生莽莽吾何計獨立香雲竟落暉豫與劉君師魯為文字交十有四年而固未嘗相識也兹過武林偶遂良覿有喜而賦邂逅神交十載餘青楓落月幾愁豫何言此日同傾蓋勝讀平生未見書天上玉堂容可到山中金匱得長虛故多餘事宜商略可待秋風怨索居九日獨立憑高發興新霜清露白復佳辰緑樽到手不解醉黃花滿頭應笑人檮邊老僧幽期失巖南闕新句頻秋犬此日併回首鵝鴈寄書愁未因次韻山南先生遣興二首稍覺春風入剪裁更無魂夢到塵埃苔枝自送黃昏影寶篆頻銷白晝灰世態漸應隨日别老懷可復向人開擁爐坐聽蕭蕭雪載酒攜琴也莫來蒲團兀坐久忘機何暇重尋是與非老鴈長雲天渺渺晚花寒蝶思依依起看丹竈春無恙欲試青鞋雪未晞鵬鷃逍遙端可耳玉堂何必愧柴扉寄仇仁父先生一官十載尚沉淪門巷蕭蕭白屋貧自有陶公為社友從呼杜老作詩人兒曹故復輕前輩俊步誰當出後塵招隱詩成無處寄莫雲凝碧坐愁神寄朱十八丈判官金榜凄凉已十年風流文采故依然香山老去誰同社栗里歸來尚有田懷古坐看西日落得春寧問北枝偏清泉白石多深趣千載心期入近篇寄朱仲山異縣關心朔鴈飛酒燈棋雨計頻違寄書全覺嵇康懶入夢多疑李白非黃葉閉門方寂寂碧雲回首故依依相逢賴有梅花約試踏東風走翠微寄友人繫舟一别雲水鄉暮川葭菼空蒼蒼漳濱卧病它年憶渭北題詩春日長蕪菁作花已爛漫楊柳飛絮苦顛狂聞道茯苓已堪斸遲子青鞋經澗岡夏日漫書枕上初殘柏子香鳥聲簾外已斜陽碧山過雨晴逾好緑樹無風晚自凉芳歲背人成荏苒好詩和夢落蒼茫求羊何不來三徑門掩殘書滿石牀逢葉伯幾水煙沙雨送歸航楓葉蘆花已十霜瑤曲天風春夢逺墨池秋草故遊荒碧峯又是新回鴈白石依然舊化羊一笑相逢却成别暮雲千里思茫茫宿賈氏山房暝色蒼茫赴逺岑獨追燈火下荒潯寒沙細水通幽徑修竹高楠走翠陰草草悲歡中夜語悠悠醒醉百年心石霜煙月寒無寐坐聽踈鐘出二林送友人之京偶緣送逺接清遊煙雨東城晚樹幽離别自應多感慨笑談未害各風流百年芳草頻頻合萬事孤雲故故浮大華黃河入回首春風愁絶李膺舟答友人芝掌峰前一杯酒别離歲晚遞相望野梅如雪遙入眼曉鴈連天寒呌霜閉門窮巷燈火冷回首蒼山雲樹長幾時抱被却同宿愧爾詩筒逺送將憶友人無復高談慰索居壯心零落竟何如人間漫有金臺夢身後誰傳玉枕書半畝蒼苔埋璧地一聲白雪斷絃初芙蓉峯下聞吹笛淚滴春天草木踈哭李無逸青春未受二毛侵談笑俄聞變古今千日却醒徒有望九原莫作遂何心平生缺荷劉伶鍤此夜誰彈子敬琴水樂亭西煙草碧舊遊回首重沾襟過烏傷墓丹青像設始何年翁仲遺墟自古傳時有北人來下馬不知秦樹幾啼䳌牧童解指看碑路野衲分耕祭墓田回首長安西日外茂陵松柏正蒼煙雜興三首昔從六客堂前客共買何山渡口船杉松夾道得古寺風雨漫山連杜鵑憶别老僧如昨日待分幽事及他年春江正緑不能去勝踐蕭條秪可憐幾回擬作送春詩出戶春風去不知葉底孤花猶入眼竹根稚筍欲過眉久拋書卷都如夢閒看香煙偶似癡寄語平生張仲蔚一歡相屬竟何期劉生去滌相如器朱子新裁賈誼書百代風流今視昔十年懷抱我憐渠故應曽對談諧樂也復能容禮法疏風雨瀟瀟守環堵秪今可望故人車山中夜歸漫山松葉行徑迷獨穿犖確幽步遲驚風低草山虎過寒月掛樹天星垂泉鳴荒冡夜牢落露洗青林光陸離茅簷抱膝者誰子歌闋飯牛聲正悲旅夜歷歷飛螢度眼明獨搘高枕數殘更薄遊已倦新彈鋏舊業猶餘未棄檠一雨送晴初月色百蟲專夜故秋聲情知三十非年少已覺人間有後生三月三日西湖舟中黃塵奔走愧平生對客猶稱舊姓名此事正堪三太息秪今忍負四難并放舟乍落空濛境送酒元無窈窕聲金谷蘭亭嗟已矣不妨時暫濯吾纓金陵天津橋五雲零落渺天涯陳迹蒼茫日自斜畫角已吹邊塞曲紅藍新長內園花可憐遺老埋黃壤曾倚春風望翠華好在北山猿與鶴依然同住舊煙霞送人歸豫章已覺棲遲懶曳裾可能為我強躊躇一帆秋色紅塵外千里江關白鴈初建業水清誰共飲潯陽潮斷定無書黃金未盡朱顔在笑種桃花學隱居哭陳茂卿多病文園鬢未霜可人風味故難忘豈期夜壑舟無定竟使春天草不芳賣藥幾時來海上遺文須我訪襄陽誰憐後死仍漂泊雲白山青自故鄉宣城客中偶書眼看春霄擁勝流漂零回首愧沙鷗黃塵烏帽知誰為白飯青芻復此留未必嵇康能作吏何妨李廣不封侯敬亭雲鳥知無恙欵段惟須逐俊遊梳頭得白髮偶逐飛雲别澗岡解纓聊爾濯滄浪襟懷久已無山水客鬢誰令有雪霜未必丹砂真却老闕首更為郎前修未逺斯文在努力無愁歧路長送韶父先生遊京不到南徐三十春好將夢寐弔遺民闕知往古闕流水秪想重來是後身棹響官河風色暮雲離野服鬢毛新舊遊偶失扶桑路煩向滄江一問津山南先生挽詩仰驚喬嶽失嶙峋千載風流可復聞鼎有丹砂輕縣令囊無薏苡詫將軍苧袍歲月孤青簡石室文章閟白雲淚盡侯芭悲獨立短衣高馬秪紛紛喜方韶父先生至兼懷山南先生夢覺秋宵失薜蘿尚煩青簡慰蹉跎山中舊别期猶在歲晚相逢感易多華表神仙成寂寞靈光風雨見嵳峩百年珍重斯文寄趼足修程可奈何韶父先生有詩復次韻以和兩翁故復可憐人傾蓋長安四十春華屋山丘如隔日夜牀風雨得彌旬書籖藥裹仍仍在橘刺藤梢一一新漫寫餘哀寄冥漠大荒誰見下麒麟寄張如心謬羡侏儒飽一囊舊遊搔首獨凄凉連天斷鴈初沈日匝地寒花欲有霜聞道為郎須白髮未殊高枕待黃梁紅顔好在張公子坐聽松風春晝長送王傅朋靜江教授二首丞相威名震百蠻蕭條異代得吾賢宦遊忽過三湘去家學應令四海傳北望犬牙連上國夜占鶉尾直中天炎風朔雪皆王土未覺青春雨露偏碧蓮峰下駐飛驂風土遙知久自諳會有新書禆禹貢坐聞舊俗化周南深篁盡日迷山鬼毒草無時起瘴嵐珍重斯文強餐飯漫誇丹荔與黃柑送揚州傅學正全淮控制列城遙尚想青春虎豹驕一日江山走珠玉萬家燈火沸笙簫喜逢才俊登文署好頌升平答聖朝芍藥瓊花兒女事可緣風月逗華鑣余山春雲牢落鴈無聲沙岸參差石有稜雙屐漫窮芳草徑一龕長愧白頭僧晴濤閃閃翻孤日山木昏昏卷翠藤後夜清風滿遙念夢遊空指上方燈龍潭山二月清江照眼明避風舟楫滿回汀斷雲挾雨時時黑密葉藏花樹樹青習隱未成陶令賦行歌聊共屈原醒碧潭光景無消息坐看魚兒㸃翠萍遣興青雲如夢慨平生白髮驚春忽數莖漸覺交遊隨日别強知顔色逐人行百年松檟誰能去五畝煙霞故可耕妄念掃除渾欲盡少游何得尚相輕次韻方子踐觀潮潮生潮落有時休朝暮吳兒幾白頭被髮祗誇迎駭浪側身寧解障奔流江吹碧瓦人聲曉雲閃朱旗海氣秋後夜月明天在水有誰能此試登樓次韻子踐秋社歸巖南久悟清都是夢中未嫌短褐任飛蓬時情冉冉心如醉世議紛紛耳欲聾會種枌榆依漢社共談禾稼續豳風蹉跎偶負平生約已復人間歲一終杭州寄里中一二同志故山有路去無從燈火關心夢不通浪走紅塵真自笑舊遊白社竟誰同胸中好貯千巖秀眼底徐觀萬馬空風雨未休鴻鴈斷此懷渺渺故難窮客樓雨中江城飄泊動經年盡日高樓閲過船睡起小忩初聽雨岸旁垂柳已生煙坐拋歲月今如此每望雲山欲泫然尚喜游從得諸彥時將樂事寄新篇次韻答蔣春卿不謂紅塵拂面時軒然談笑一舒眉晴風石鼎浮花乳夜雨春盤冷碧絲握手遽成三宿戀論心那覺十年遲酒船漁網歸無計未必山前白鷺知送楊山長歸錢塘百里鄉心海鴈飛三年官况野鷗知兒童早已占歸信弟子應能頌去思茅屋荒田春草草杏花深巷雨絲絲人生適意須行樂駟馬高車恐未遲章德懋同登車蓋山城南日日望蘇灣碧樹童童蓋一山何意茲辰成邂逅與君攜手共躋攀鈎衣亂石通高步著面和風啓醉顔尚愛銘碑多楷則俗書且勿鬬妖􅈺重遊毗山十載重來思惘然勝遊邂逅一開顔高林有色煙雲淨曲徑無香草樹間漫遣金樽催白日絶憐紅粉涴青山南朝舊迹今誰記腸斷風流不可攀湖州遇葉士心因寄郭祥卿架閣謝公城下踏春暉最憶東園夜不歸落月清樽波㶑㶑高花銀燭霧霏霏未愁強醉羅衣濕政恐重來燕麥稀大地風濤竟如料九霄一鵠看橫飛大卿牟公挽詩二首雲光一夕失崔嵬多上相逢淚雨推夾道共看丹旐去遺民猶憶繡衣來蕭蕭悲吹蘋花冷渺渺鄉山杜宇哀哭盡貞元舊朝士臨歧無語重徘徊後生無復望儀刑青史徒煩列姓名窮有遺文成巨冡死無新爵上銘旌瓜田方任蓬蒿沒玉樹偏依雨露生舊笏滿牀知未墜翰林風月向來清次韻牟主簿南湖客中遙望仙橈度碧湖翩然高興不枝梧也知白髮行相待無奈青山不受呼過眼光風殊獵獵霑衣多露已塗塗相逢幸及南枝好一笑聊須引百壺次韻姚子敬教授筠菴别業故園煙樹渺江關長愧求閒未得閒客路獨愁黃葉下高人正在白雲間闕鄰儻遂容依止載酒終期共往還未害看山仍拄笏一竿付我釣滄灣次韻别程晉輔教授落拓江湖久不歸相逢還及試春衣忽聞煙際蘭橈動誰共花前玉斚飛青眼故多知已在黑頭未覺壯心違赤霄孔翠吾何望喔喔鄰雞爾自肥花信已覺尋芳去較遲千林紅紫想紛披幾經夜雨能無恙試問春風竟不知斜日游蜂應有夢野亭立馬已多時殷勤却是江南客曾擘冰霜寄一枝草意淡煙斜照舊離離吐漫芳心欲向譙可是忘憂能自得若教指佞定無私東風江上何人識南國春來有夢知留取青青承雨露术應紅紫浪相疑闕下口號遹駿先猷在作人忝陪多士奉明綸端闈乍啓清光近臚句高傳茂典新奎璧照臨回景運風雷鼓舞契昌辰不才何以酬天造徒詠菁莪樂至仁賜第後歸謁郡府承為置宴口號拜賜才霑雨露香又驚盛典出黃堂鳴騶合遝迂千騎坐席雍容纍百觴他日同鄉修故事不才終古被餘光承宣得意逢明牧諸彥能無共激揚郡㕔宴集之明日鄉先生復為置酒重述口號去年此日宴瓊林雨露光華映古今稱慶謬承賓禮重徼榮彌覺主恩深少須天詔從容至坐看宮花取次簪千載斯文寄來哲可應外物纍初心北山歸路呈古心師兼簡方外諸友尋幽偶向靈源宿却過雲關望翠微初日映空千樹立驚風繞澗百泉飛舊題歲月人頻異乍别烟霞路易非幸有潘郎遺事在何時一鉢去如歸喜趙繼道至有懷陳君采匆匆聚散定何常耿耿心期故未忘草木關情人事異雲霄回首路岐長交游歷落銀河隔製作紛綸瑞錦張為語何時共傾倒秋床風露已生凉寄曹子訥于壽道二同年憶同鵠立簉天關清漏無聲虎豹間黃榜未開齊望拜紫衣高唱遽分班已驚恩出尋常表更羡身居季孟間海國鄰疆幸無逺可容接武向蓬山寄别宋推官目斷仙帆去莫從翩然心逐北飛鴻未忘緑幕追遊盛况忝黃堂禮數崇南國幾人歌召伯漢廷有日相于公悠悠聚散何堪計趨走終期出下風送姜學録短褐蕭條兩鬢蒼逢人猶解說春坊雲霄有路新推轂風月傳家舊佩囊此去官曹雖冷落不妨門戶暫輝光况聞寮友多華胄休暇過從樂未央送鹽官傅都目春風匹馬去翩翩老佐名州鬢未班遙數驛程知到日坐令官府靜如山河塘燈火機聲裏墟落鹽烟海氣間歷歷舊遊如夢寐可容乘闕一追攀送貢教授致仕歸里宦情鄉思兩依依獨裹寒氊去若飛歲晏忍為千里别林間驚見一人歸官河逺樹迎仙棹夕日暄風揚綵衣漫使臨歧生悵望可容泉石借餘輝陳山晚泊一拄孤撑杳靄間人言此是客星山流風百世今誰嗣應詔諸生故未還荒冡草深迂石路高齊月滿閟松關窮年漫迹滄江上及此維舟獨厚顔送三高祠陸主奉垂虹古祠煙樹新昔賢高致久無聞畫圖想像空陳迹譜諜流傳喜到君春水白鷗分座席寒泉秋菊薦爐熏臨歧何限滄洲意目斷風帆天際雲送陳推官之信州三朝兩世掌絲綸異代仍瞻玉樹新尚喜傳家餘宦譜又聞議獄用儒臣中年離别情何限南渡風流迹未陳遙想郡齊多暇日肯憐州縣正勞人送胡古愚兼簡道傳博士坐擁臯比十載餘忽聞飛鶚上公車此行未可輕投筆隨處猶須小曳裾燈火尚慙餘事在雲霄轉覺故人踈為言留滯今頭白無用諸公薦子虛送淮海書院丘山長遙望官河駐綵橈春深絳帳不蕭條已驚雨露恩光厚還喜山川物色饒盡日樓臺人載酒隔江燈火夜吹簫定知館下多才彥政樂風雩對一瓢留别錢翼之矯首清標二十霜白頭傾蓋鄭公鄉忘形肯厭追遊數借潤頻飛翰墨香世態浮雲看不定别情流水去方長杏花時節霏霏雨誰共春風舉一觴諸暨休日偶書一室蕭然似冷官更無車馬駐江干天清不斷絲絲雨春淺猶生陳陳寒公事癡兒何日了雲山圖畫要人看輕風正滿微黃柳誰與相從試憑欄湖心寺夜坐蕭蕭凉月滿池臺水檻風櫺四面開一柱殘燈何熠煜半簷衰柳故崔嵬謬持微祿知無補未謝餘緣得重來塵土馬蹄何日事可容良夜廢銜杯次韻答徐文蔚一别溪頭十五春歸來烏帽尚黃塵故應用意﨑嶇外未忍忘情寂寞濱圖畫雲臺非我事掛冠神武獨何人也知州縣徒勞耳相見空慙白髮新送顧仁甫上計京師憶昔曾隨計吏行浮湛州縣竟何成凉風嫋嫋仙舟去夕日依依魏闕情金匱故藏多巨典石渠高論盡鴻生棲身朱墨非君事早晚公車上姓名送沙彥文架閣分題得西山憶昔寒江破浪歸西山回首落烟霏忍逢朝士登舟去如望仙人拔宅飛游戲何妨依緑水追趨早已到黃扉公餘若過滕王閣為捲朱簾挹翠微題金明宴遊圖危樓縹眇碧波中曲檻方櫺面面通雲氣傍花如欲雨柳絲垂地不驚風千年華表人非是九奏鈞天樂未終更有殘山并剩水煩君回首六橋東上巖寺訪一公曉色微茫尚帶星修蹊犖確斷人行獨支瘦竹身猶健高入重雲地忽平落月正當山缺處細泉頻作雨來聲上方燈火青林曲隱隱踈鐘一再鳴寄題高逺樓聞道危樓架泬寥樓前物色不蕭條忩臨謝傅祠邊樹門對曹娥渡口潮解使詩人爭應接也知老子極風標倦游已忘山陰路勝餞仍須折簡招題東柯谷圖長松密竹翠交加洞府新開碧海涯石上仙人留足跡春深澗水出桃花流傳圖畫來千里生長兒孫只一家目斷飛鴻那可到舊遊空指赤城霞聞趙繼清調安陸縣尹慈恩塔上墨猶鮮一别重來十七年相見都門驚判袂又聞澤國去鳴絃素衣久出風塵外青瑣行依雨露邊跂馬望君先數日縣花雖好莫留連送畢縣尹歸途環佩曉珊珊白日青天映羽翰疑是省親辭太學驚聞出宰用郎官花迎墨綬春光暮風引仙舟海色寒想見捧觴仍綵戲鄉人爭作錦衣看題雪竇妙高臺偶為清遊宿梵宮凌晨試上最高峯水翻雪色寒猶落雲掩丹光逺更重舊有一僧能跨虎近聞三洞盡藏龍下方車馬應難到烟際唯聽日暮鐘題觀海圖昔年解纜岑江上初日團團水底紅鼉吼忽搖千尺浪鷁飛仍挾半帆風遙看島嶼如星散祗謂神仙有路通及此棲身萬人海舊游却在畫圖中次韻題劉氏石壁精舍佳城杳杳隔千峰精舍寥寥一徑通夜靜寒泉猶映月秋深老樹不驚風舊題尚喜苔碑在高卧無令蕙帳空我已倦游今白髮有山如此願長終送葉仲輿巡檢重著儒冠望帝鄉翩然一舸犯晨霜秋來鬢髮依前黑日射河流徹底黃此去乘槎須有路可容執㦸更為郎絲綸閣下多知已握手應分滿袖香和外舅主簿公自為挽詩五十年前馬上飛青春如水去難追一從玉樹歌殘後數到黃粱夢覺時李賀元無樓可記劉伶漫有鍤相隨少須海上蟠桃熟歸簉仙班恐未遲留别一公琳公浪走紅塵鬢已絲此身端合老巖扉興來復舉山陰棹别去仍留海上衣夜聽泉聲如雨落晴看天末有雲歸浮萍飛絮何時定空使詩人賦式微送趙繼清潮州推官相國南遷有故居理官高選出新除承恩特與金魚袋訪舊爭迎駟馬車春入圜扉庭草暗天低驛路嶺梅踈鳳池不隔同年面歸及梅花鴈影初送傅汝礪之安南南徼車書路不遙秋風使節下青霄頗聞僚佐登才彥應有文章達教條日照樓船江水活天低銅柱瘴雲消歸時嶺上梅花發想見詩囊未寂寥送式公歸高麗一錫凌空海上飛星河蕩漾宿雲披頗驚遼鶴歸來晚正值驪龍睡覺時百尺珊瑚無地種六花薝蔔任風吹高秋蘭若烟波外此樂應須久自知題寧節婦詩卷春旗柳色映門閭華扁新題節婦居作傳小裁青竹簡疏封近降紫泥書河壖松柏風烟外階戺芝蘭雨露初三釡及親殊未晚花前何日奉安輿送孔御史歸曲阜清流共喜聚羣賢新渥時聞下九天東觀紬書何日了中丞遺笏要人傳過家莫久依林廟封事先須徹御筵千載斯文寄來哲臨分握手重懸懸送龍南歐陽縣尹絲綸閣下半同袍獨上南船去莫招出宰不嫌官俸薄過家未覺驛程遙長溪白石晴雷轉深洞黃茅毒霧消想見行春有佳句坐令逺俗變風謠送謝仲連小鹿巡檢而翁許史舊家聲遺子黃金不滿籝坐擁齊爐驚歲晏出乘邉障屬時清遊山定復多新句飲酒何妨得老兵愧我白頭官尚冷夜深仍對讀書檠送烏編修代祀海嶽南鎮兼簡明善隱君承明退直馬如龍將指祠庭禮數崇嶽色非烟生近甸川靈藏器出幽宮周原共識皇華使禹穴誰陪太史公亦見安陽韓處士為言客鬢已秋蓬贈黃資深凉風蕭蕭吹敝裘三年小作周南留相逢傾蓋盡青眼肯抱遺經空白頭捧檄定知毛義喜著書非有虞卿愁春秋次事待公等莫戀寒氊成久遊題張武定公死事詩卷後古稱馬革裹尸還祗有空言世共傳一死如公良偉甚百年遺廟獨巍然要從身後觀餘烈試聽軍中奏凱還文武衣冠方迭起後先奕葉更綿綿題王君冕同年芳潤亭花縣歸來晝寂寥終南山翠湧亭臯林深未覺蘭蓀變天逺何妨雨露高此去溉根須食實誰分賸馥與殘膏行看小試揮毫手香霧霏霏滴鳳毛題丁文苑同年哀詞後自别瓊林雨露邊江湖目斷繡衣前禹門尚想龍初化遼海驚聞鶴已仙烈日秋霜空耿耿重山宿草正芊芊不才後死知何用坐對諸郎獨泫然送尉彥誠道州經歷一别垂垂四十年朔風吹鬢兩蒼然寒氊久坐歸何日上幕初登望若仙莫使催科書下考盛談名理繼前賢春生馬首逢回鴈併寫相思入近篇送陳季和高齊燈火正蕭條忽溯天風上泬寥共喜彈冠如貢禹豈期投筆學班超時清桴鼓元無用歲晚弓旌倘見招雪後江南春水活重來莫厭驛程遙送陳君歸江西咫尺清光近玉除姓名何不達公車也知賈傅今無䇿猶幸虞卿舊有書江上歸帆隨去鴈年來旅食厭騎驢諸公正索山人價能勿相招學隱居送張良卿學士之淮南坐厭流塵拂面紅行攜凉月下青空三千里外揚州鶴四十年前御史驄先廟鐵衣猶挂壁兒郎玉帳已生風貞元朝士今無幾歸及花時一笑同次韻蘇侍郎平村暮歸中臺多暇獨儀曹退食歸來路不遙扶老未須蒼玉杖行春聊過赤闌橋揮毫風雨傾三峽聽履星辰接九霄愧我白頭方倚席敢將巴曲和仙韶送尚子正理問上相分臨控列州理官高選用儒流風生使節聲華舊地近台垣寵數優南土政平多暇日西山氣爽入新秋公餘若過滕王閣煩為題詩在上頭送蘇伯修憲使久參法從侍凝旒忽擁幨軺按列州太史山川皆熟路淮南草木自生秋遙瞻龍節辭中禁尚想鼇峯接俊游樗散鄭䖍無所用幸搜巖壑副旁求送王止善檢挍官無失政吏無私鈎挍寧煩事細微遙想名曹多暇日不妨高詠發清暉潮生江上仙舟迥春到湖邊驛使稀送盡北來南去客石田茅屋幾時歸送高唐李知州來登延閣預時髦出守名州領教條已羡漢儒知吏事要觀齊俗變風謠雙旌前路方迢遞八座家聲未寂寥此去行須歸報政鳴珂幾日造昕朝送傅汝礪廣州教授恥學山人赴辟書勇隨使者駕軺車橫經久合居高座上冢應須過舊廬黑夜文星南斗外青冥鵬路北風初來期莫落梅花後待詔先生席正虛送劉遂初修撰近聞退直自承明忽報揚鑣出鳳城未老已嫌金帶重暫歸不著繡衣行故人尚作瀛州客歲晚無忘魏闕情臨别贈言聊復爾誰能持酒勸公榮送于指揮歸密州故山東望路何長逺奉靈輀返壽藏豫告公朝存舊典疏封泉壤發幽光總戎行復開油幕儤直仍須赴玉堂它日過家如上冡歲寒松柏正蒼蒼書巢張君挽章歲晚巢居寄一枝上林無樹可相依不隨葉縣飛鳬去竟作遼東化鶴歸架上牙籖書在否門前珠履客來稀春江如箭船如馬忍見舟旗揚落暉題莫氏山莊圖旋移小隱傍南峰逺有咸平處士風山態近人猶偃蹇湖光無雨亦空濛行春杖屨時時到臨水軒忩面面通别作新亭供戲劇青帘搖曳杏花中次韻伯雨臘月八日雪中同登來鶴亭興來欲泛山陰雪不奈舟膠野水凝朝士白頭愁獨步仙人赤腳傲層冰招來盡是雞羣鶴趍附空慙驥尾蠅夜久松龕同擁毳絶勝儤值有青綾豫與江陰何鼎叔鉉别三十六年乃相見於錢塘感舊述情漫成四韻月寒霜樹久相依春去風花各自飛逺信已隨潮水斷故交渾若曉星稀綈袍可戀知誰在青鏡頻看歎昨非正欲從君共傾倒莫言興盡便須歸至大庚戌正月二十一日豫與儒公禪師謁松瀑真人于龍翔上方翰林鄧先生適至豫為賦詩四韻諸老皆屬和焉後三十一年是為至元辛已正月二十三日過伯雨尊師之貞居無外式公劉君衍卿不期而集輒追用前韻以紀一時之高會云廬山舊事誰能繼三十年前此㑹同偶爾共來今日雨蕭然猶有古人風坐深遙對花如霧興盡徐歸月在空仰止前修那堪作聊追餘響託無窮送內史府孫知事還京春風朱邸雪初消野宿貔貅靜不驕緑水芙蓉分上幕青雲騕裊度輕軺龍庭會祭包茅貢豹尾宸居佩玉朝下土微臣今老矣淹留敢望小山招送史景福十年相望各天涯上幕新開鬢未華日出公庭來鴈鶩風生老筆動龍蛇蜀鄉路逺春多雨江國雲深樹有花若見君家彭澤令為言且莫問桑麻府判謝公挽章換得朝衣不稱身勇辭新爵號遺民鍊成偃月爐中藥閲遍銅駝陌上人魯國靈光俄委地謝家玉樹正傷春忽聞舊唱貞元曲衰涕能無灑石麟六月十二日上京翰林開院喜雨院長開府公俾為詩以志之雨浥鼇峰長緑苔佳辰良會玉堂開凉生薰殿宸居近恩豫官壺詔使來盡醉不愁騎馬滑新詩可待片雲催作霖正爾須公等行見文星入上台安南遣使入朝用故事奉贄納謁于翰林其歸也上介黎括以贈言為請賦詩四韻以遺之上聖敷文格逺人外藩修職用儒臣並馳使介踰丹徼特設朝班覲紫宸炎海計程歸路永都亭燕餞寵光新祗承德意勤宣布鼓舞鳶魚詠至仁送徐志尹赴安鄉縣尹自為從史直鑾坡幾見鄉山爛斧柯能事正宜參筆削借才聊復試弦歌屈原故國蘭都長陶令公田秫最多應笑衰翁苦留滯汗青無日欲如何送陳元達代祠補怛洛迦山天下名山小白花鯨波帖帖度仙槎函香祕宇祈靈貺出節宸廷振使華殿榜舊誇韋誕筆錦衣重過買臣家相門喬木殊無恙萬古清風碧海涯次韻答胡古愚博士麻衣草坐老仙翁曾及清時侈際逢行殿曉趨開豹尾禁林秋宴出駝峯休官尚想英遊並愛客何嫌異味重况乃東陽山水窟主張風月有詩宗送李師曾蔣仲善赴春官憶隨飛鶚上秋天夢斷慈恩四十年及此鬢毛俱秃盡見君頭角共嶄然計偕已趣軺車動臚句行聽衛士傳紫陌紅塵衣易化看花得意莫留連七言絶句寒食舟中東風溪水碧漣漣溪上青蘿獨繫船正是落花寒食夜水煙沙月又鳴鵑哭御史王公十首有人新自甬東來别後音書第一回欲問布帆無恙否豈知塵世隔蓬萊被髮胡為竟渡河由來魑魅喜人過不須待聽山陽笛一曲箜篌哀思多早歲棲身擬鳳池桑田為海已多時路人方為乘驄止流水生涯遽可悲玉堂政要謫仙人何意先成采石墳人物渺然時事異漫今平地有青雲金阜原頭草未生兒郎俄已去騎鯨黃泉會有相逢處轉見人間母子情掉頭東下苦匆匆徑挾羣仙入貝宮眼底珊瑚高百尺釣竿吹折一絲風膠液中流事可歎海雲飛雨失青天陸郎地下驚相見應訝來遲二十年孤兒思父母憐兒忍見銘旌獨返時畢竟江魚與螻蟻世間何物最堪悲楚客猶疑刻劒痕秋風已到孟嘗門殘潮落月天涯夜剪紙誰招萬里魂天吳罔象正縱橫誰認鼇山頂上行海氣昏昏風雨惡夢中無路弔先生金陵客中送友人歸里青陽河畔杜鵑啼歸路如弦定不迷應到故山叢桂裏笑人騎馬學聽雞有感二首橘柚青黃照眼垂秋風籬落自紛披頗聞玉食登蠻果不獨涪州有荔枝漢室需材拔隱淪鼓刀屠狗正求伸可憐風雪南山下未有他年射虎人葉審言張子長同遊北山知者寺既歸復與子長至赤松由小桃源登煉子山謁二皇君祠回宿寶積觀賦絶句十首天風吹我度崢嶸春著千巒滃滃青紫陌紅塵寧有此十年空負北山靈芙蓉峰下南朝寺水秀山明兩絶竒更向水窮山盡處一菴高貯碧雲師却問仙山去幾程白雲如簇近相迎直須不脫登山屐行盡松聲與水聲山中今是太平民尚與人間隔幾塵流水桃花三百曲莫教重誤武陵人偶看飛花逐水紅不知身過亂雲東回頭旋覺峰巒别惟有青天面面同雙鶴冲天歲月多至今香火壓嵳峩劉郎不是無兄弟奈此丹雞白犬何坐愛春泉響翠微玉花吹濕薜蘿衣何人為擘冰壺破共看青天白練飛削立城心雙白塔幾疑日月費撑支一朝頓在闌干底始悟從來見處卑遙憶仙華鶴髮翁清泉白石滿竒胸若為此日千峰頂更試平生九節笻一宿山中竟莫留可能長伴赤松遊殷勤好去張公子休愛人間萬戶侯避暑圖一丘一壑古遺民十里清風不屬人閒對青山揮白羽世間何物是紅塵圍棋圖有客圍棋洞口歸天荒地老已多時人言此客殊癡絶畫裏看棋我更癡陶學士驛舍圖一笑相逢亦偶然浪將恩怨向人傳無端更被丹青汚狼籍春風數百年次韻章兄雨中卧聽風水共喧喧起視青空白雨懸秪謂桑田可無恙不知江勢欲吞天茫茫平陸一尺水瑟瑟凉飇五月秋莫謂天公無皂白誤將陰雨怨鳴鳩故山回首杜鵑啼客舍誰憐寄一枝賴有四門章博士不緣風雨廢談詩春盡餘寒去却回江天五月未聞雷南風秪在浮雲外彈折朱絃喚不來草長故山懷獨往苔生今雨歎離居誰能共飲桃源酒一醉千年不願餘偈二首久謂聲聞難作佛今知龍女解成男分明信有旁人分五十三身第一參息心無想成無記有見還同有相存不盡普賢殊勝行隨方願啓一城門松江舟中偶書二首山房偶為故人留又領飛雲過别州白浪千花帆一葉茫茫天地此生浮移舟夜泊華亭縣却聽吳歌思渺然最憶澱山湖北寺白雲堆裏看青天青山白雲圖十年失腳走紅塵忘却山中有白雲忽見畫圖疑是夢冷花凉葉思紛紛桃竹畫眉圖說盡春愁貌不成翠深紅逺若為情江南有客頭空白腸斷東風百囀聲追和景傳新店客舍壁間韻我夢方酣子遽醒絶絃可復要人聽梨花寒食東風惡淚盡重山宿草青灤陽邢君隱於藥市製芍藥芽代茗飲號曰瓊芽先朝嘗以進御云君家藥籠有新儲苦口時供茗飲須一味醍醐充佐使從今合喚酪為奴芳苗簇簇遍山阿珠蕾金芽未足多千載茶經有遺恨吳儂元不過灤河春風北苑鬭時新萬里函封效貢珍羡爾託根天尺五不勞飛騎走紅塵次韻虞閣學上京道中欲去仍為一日留玉堂中夜有詞頭歸鞍曉逐南飛鴈猶及西山半夜秋題李早畫馬平沙如雪草如烟想見春風士馬閒玉勒錦韉塵土化畫圖流落尚人間水仙圖翛翛翠羽映鳴璫誰遣乘風過我傍歲晏高堂空四壁一簾烟雨夢瀟湘石節婦詩伯也南征去不歸舅姑長慟小兒悲元戎奏徹鐃歌曲來聽完州節婦詩宣和畫木石石邊古木尚青枝地老天荒石不知故國小臣誰在者蒼梧落照不成悲題高公畫竹木木葉蕭蕭半欲空竹竿裊裊不成叢絶憐意匠經營處都在風烟慘淡中山水圖老樹無陰石有稜亂山高下白雲層夢中猶識江南路惟恨舟人喚不應海月圖憶曾夜叩潮音洞海濶天高月正中坐對畫圖如夢寐六街塵土晝濛濛送許參政歸武昌别業九衢蕩蕩緑槐風旌斾搖搖馬首東惆悵鳳凰池上客青天萬里一冥鴻待漏東華霜滿靴掛冠神武意如何也知久歷中書考若比汾陽恐未多氈筆書題墨尚新杏花零落故園春一從今日公歸後身到黃扉復幾人曉日都門祖帳開路人嘖嘖歎賢哉東風無限新桃李不敢煩公手自栽片雲為雨出山時羣物欣欣各自私收斂神功去無迹尋常草木竟何知住近韓家晝錦堂不將牙纛詫同鄉翻嫌相國歸來日腰下猶懸太守章白𫀆鵠立漫紛紛遙聽車音共候門相見唯須飲醇酒看山看水坐忘言南游聊食武昌魚莫學騷人賦卜居天子若思真漢相可云吾亦愛吾廬五十人間富貴年山中道士早求仙石田茅屋歸無計愁絶燈前老鄭虔龍門尚想舊同遊藥籠深慚晚見收新築沙隄却何日欲歸且復為公留飲後示陳生歲終博士不超遷便腹先生醉欲眠匡鼎若來猶自可後堂無處著彭宣題金德原所藏元暉小景床頭書畫正縱橫忽值今朝醉眼醒起向米家船上看青山元是舊儀刑題洪崖出遊圖靈仙飛化事難言驢背春風度市門不到人間今已久多應醉卧古藤根贈寫真自是清時翰墨流水邊林下莫淹留漢皇正在麒麟閣欲畫將軍博陸侯送傅梅溪遷任福州往歲從君直禁林相於道義最情深公車承詔莊行日莫怪頻頻酒屢斟題王南谷大夫自作墨梅詩送傅君時教授南歸何遜揚州跡未陳染衣不是洛城塵毫端一線陽和力中有江南萬斛春題宣和御畫青城塵土晝濛濛百二山河一夕空收斂神功歸化筆野花啼鳥尚春風題陸山長柳州簇簇春山紫翠圍瀰瀰烟水白鷗飛東被正作西湖長一曲空慙賀監歸題清鏡閣投老歸來賀監船何時結屋鏡湖邊羡公高坐毗盧閣萬水同波一月圓題趙伯容鶴巢平原公子去翩翩獨遡剛風直上天家近孤山春樹好歸期莫落後千年次韻答濟公三首舊遊零落如星散坐對孤山似守株聽徹貞元供奉曲羞將短髮照西湖病須藥餌親丹竈老厭書帷徹絳紗幸有文殊來見問更無天女散天花白頭朝士方徒步欲過六橋愁路賖目斷紅雲花鳥上樓居縹眇梵王家桃源圖山容慘慘將為雨雲氣垂垂欲傍花莫問前村何處覔垂蘿盤石即吾家瑤池春宴圖西飛青雀幾時還貝闕琳宮縹眇間筆底春風殊未老蟠桃積核已如山次韻題墨梅一自攜家湖水東放舟時度玉花叢因君貌得橫斜影間却孤山月一篷題先照樓初日團團出海東凌晨先照最高峰不知今日華嚴界樓閣新開第幾重武王扇暍圖一夫偶爾獲清凉四海仁風孰奉揚有道曾孫不忘逺幸均此施遍羣方題平章康里公春日杏園西即事詩後鏘金戛玉音聲古抉石奔泉氣勢雄目斷雲車天路永小樓春雨杏花風題明公畫蘭吳僧戲筆㸃生綃嫋嫋幽花欲動搖夢斷楚江煙雨外秋風灤水暮瀟瀟東陽縣西道中柿葉成陰緑滿村桐花覆地草連雲百年舊事無人記猶指前朝御史墳壬辰春三月遊左溪癸巳春三月遊天宮有感而賦頻年謁拜祖師庭祗有山光與水聲尚想𤣥珠密相付免令我漫肆譏評文獻集卷二
