body:
  text: 文獻集卷三元黃溍撰賦離居賦慨豫後古人而生兮恆潔志以好修慿祖先之遺業兮援往烈之餘休粵總角以授經兮歲行汨其已周獨貿貿吾何故兮庶逺悔而違郵攬雋哲以我弼兮懿前志之為謀非夫人察豫之衷兮孰蹭蹬而見收胡閔勉抱兹獨兮矌周旋於窮陬廓私處而莫伍兮愴增思以懷愁昔回路之相贈兮竭所獲以交投卒並轡以疾驅兮入聖域而彌優彼獨何人兮豫顧忍恥而䝉羞惟昔者之擇從兮極逺討而旁搜衆雜遝其既多兮邈異趣之交鉤紛詡詡以徴逐兮咸胥顧而勸憂曰豫行之不可兮矧將朂豫以良猷居怏悒其誰語兮弦豫歌之幽幽恫惚慌以顧懷兮耿孤倡而無酬哀下土之坌濁兮駭奔飛其呀咻大龜視豫以吉卜兮曷去之而遐遊廣輪曼曼而靡極兮忽又惑其所由非識路為之先道兮懼九折之摧吾輈羌冗豫以狐疑兮悵臨岐而夷猶軫中情之戀嫪兮思勃鬱而莫抽噫遺行之已纍兮固吾以為贅疣弗瞑眩之是圖兮何厥疾之能瘳堅所秉猶未怠兮悼年嵗之易遒諒豫懷之既騁兮雖坎壈其敢偷苟非豫之所存兮夫又何求結煩言而招要兮遂矢心以綢繆夫有恃以為善兮詎無成而淹留太極賦厥初馮翼以瞢暗兮維𤣥黃其孰分爰揭揭豫中立兮配天地以為人曩既學而有志兮紛遑遑其求索曰道不可名兮孰無徴而有獲繄皇羲之神聖兮感龍馬之負圖得妙契於俯仰兮何有畫而無書豈至道之𤣥逺兮非名言之可摹懿尼丘之降神兮廓人文以宣朗揭日月於中天兮啓羣昏之罔象指道妙於難名兮曰以一而生兩是謂太極兮非虛無與惚恍高下以位兮天尊地卑燥濕以類兮五行順施南乾北坤兮西坎東離萬物錯綜兮殊巨細與妍蚩孰主張是兮兹一本之所為厯兩都而江左兮胡亂說之紛霏豈清言之弗美兮去道逺而偉先哲之獨詣兮重指掌於無極揭座右以為圖兮開盲聾於千億謂斯道之匪它兮在夫人而曰誠幾善惡猶隂陽兮兹吉凶之所生嗟竒論之後出兮穴牆坦為户牖析同異於一言兮或曰無而曰有蕕終不可使薰兮堊終不可使黝道惟辨而愈明兮貽話言於不朽昔聖門之多賢兮繽入室而升堂端木氏之穎悟兮僅有覩其文章雖亞聖之挺生兮猶歎其前後之無方疇敢索無聲於窅默兮孰能求無形於渺茫惟下學而上達兮炳聖謨之洋洋諸生之貿貿兮方鉤深而摘隱探賜也之所未聞兮誇神竒而捷敏持空言如繫影兮曽不滿夫一哂曰豫未有知兮何太極之敢言秉思誠之遺訓兮矢顛沛而弗諼庶返觀而有得兮明萬里之一原申誦言以自詔兮聊抒意於斯文贊閒間贊并序客有談𤣥教嗣師閒閒公於僕者曰夫閒無為也無事也公固方外士亦既登鈞天之庭而主列仙之籍烏乎間僕聞而笑曰嘻蠛蠓不足以語扶搖之高蛭蚓不足以語溟渤之廣安得執迂儒曲士之見以窺夫强名者哉請贊公之道以祛子之惑可乎客曰唯唯乃為之贊曰謂之仕也而委廊廟於泥塗謂之隱也而等山林於蘧廬衆方昭昭我且于于孰知夫大白若辱大方無隅出入消搖與道為俱放情八紘之表游心萬彚之初是固軒裳所不能繫丘壑所不能拘夫閒之又閒者非斯人之徒也歟擊蛇笏贊於烈孔公碩大且方麟鳯在郊百怪斂藏爾蟲何知乃罔畏忌怵彼蚩蚩改聽易視維是手版猶古璧圭千鈞則重鼷鼠則微憤激於中有弗遑計寧使妖血狼籍沾漬展也先覺俾民不迷九原莫作物是人非人之非兮鰌鱔之舞尚其聞孫曰豫禦侮李御史畫像贊瞳如㸃漆顔如渥丹法冠朝服望之儼然人見其有威之可畏容止之可觀而孰知其精神心術之妙非畫史所得而傳耶學軒贊器必琢而後成道必學而後知玉之不琢不失其為玉人之不學不失其為人也幾希是以有志之士莫不務學而求師虛以為受教之地明以察進善之幾蓋深造以道固貴於升堂而入室取其虛明則於軒為冝居焉朝斯嚮晦宴息尚要其歸請為學軒之贊亂以心齊之詩程楚公小像贊并序故楚國文憲程公以宏材碩學被遇世祖歷事四朝為時名臣延祐紀元之初溍舉進士至京師因拜公於安貞里第後三十有三年溍起自休致入直詞林則公捐館已久幸從公之孫世京獲覩公遺像撫時運之推遷慨前修之莫作贊以一辭非敢曰美盛德之形容聊志歲月云爾贊褐衣角巾瀟灑出塵仰羡夫消搖於丘壑緬想其際㑹於風雲覬一言之寤意罄崇論而敷陳灼灼乎龜蓍之可覆洋洋乎魚水之相親激揚奮勵以紀綱乎憲度鋪張潤色以黼黻乎人文雖不以進退百官為職未始一日忘吐握之勤凡楚材之晉用皆藥籠之儲珍咸懷誠而秉忠共尊主而庇民奚必坐乎廟堂之上然後大展其經綸嗟儀刑之已逺儼丰彩之如新古稱逹賢者有後是將在其來昆董御史畫像贊質厚而豐神完而充生乎相閥初無貴驕之色立乎朝著常存肅穆之容挺拔於翠竹碧梧之表泳游於祥雲麗日之中挹其光儀者猶可想見夫喬木世臣黃閣清風也騷訟魃皇亶正直兮冒下惟仁肇育嘉種兮誕生蒸人胡汝魃之暴亢兮盜威柄以自神禍凶是司兮俾閼厥伸窮千里以逞毒兮豈此土為匪民歲丁未而孕孽兮俶九厄之遘凶乘陽竊出兮霍霍隆隆斥棄輿馬兮謂肥􅖆其猶龍絳㠾彤靷兮疾走如風揚氛壒於澮涂兮瞻我野其童童餱糧殫於草木兮搏塊礫之不可食旄倪僵尸兮强敓死力首丘而弗遑兮胡愍隸之可得狐狸飽而跳踉兮腐胔縱橫藜藿出户兮室無哭聲野蓁蓁其誰闢兮粦火煜其宵行皇保下人兮曷椓喪而極斯樂人之死兮職魃所為耗賊大和兮遏𤣥澤於既施朋殃友厲兮出入敖娭仰九關而往訴兮豫踆踆其屢止曰無往而勿復兮其悔禍之汝俟胡披猖而薦肆兮將窮菑乎今兹扇虐𦦨於熒熒兮導伯强使先之怒氣㶿其如饙兮憯薄人之四肢挺刃歘至兮狼顧睽睽曽遺民其幾何兮矧有秋以為期咨汝魃兮誠忮忍而險愎慿妖矜孽兮畔戾聖則謂吾莫汝燭兮何裸身頂目而辟易有赫臨汝兮顧微臣其何力命不可久斁兮威不可久乘孰怙終而稔毒兮能自逭於天刑皇斯震怒兮叱咤雷霆斧鉞孔利兮百神效靈害戕屏絶兮鬯嘉生於百齡磔棄妖膂兮沈溺清冷嗟魃弗悛兮後雖悔其何懲答問答客問僕大德中忝被選舉一時後進之士多見拔擢而僕方退居田里或譏其苞苴不修以為迂濶乃倣昔賢述其問答之辭云客問主人曰蓋聞周於道者不貞於小諒通乎變者不偭於俗度所以超尋常而建榮名者也是故劉澤捐百金而王全燕不韋資竒玩以相强秦由此言之豈非仁者固以財發身邪今吾子餐醇和襲芳華畢弋文翰之林而藩道德以為家有日矣生逢熙洽之朝名厠英俊之例曽不能披金閨厯絳闕騰驤翕赩揚眉鼓舌使聞之者膽寒炙之者手熱下是猶不得輸筋力效智能於斗食之末然且僶勉䞱趄擇地而趨持下執雌以踸踔乎泥塗子之為術不既疏乎於是主人瞪然而視囅然而笑曰若客之言毋乃眩勢交之榮悴昧俗化之隆庳賭攆橇之利用而將乘之階戺也曩者王途墋濁􅘀狡接足恈恈婞婞壤壤矗矗川奔猋馳爪拏角觸富者蹈顯榮貧者嬰賤辱當是之時毁廉爽行懷膏潤以賈媚悅者蓋不可勝録也一旦恩移勢奪權傾位軋金銷石毁星離電滅信夫以膏沃火者膏盡則火微以利錮交者利盡則交絶爾其便翾捷疾更起迭僕朝躆要津夕僒羇旅曽得喪之幾何而䝉詬於終古是宜顔子殉志於簞瓢魯連唾睨於商賈長鶩獨立蟬蛻滓溷而勿顧也今國家陶泰和㵐淳源軼燧農轢羲軒龎恩濊澤旁魄布濩圓顱方趾之民濯沭神化者無不抱信讓揭貞素籍禮義之袵席服中正之冠屨時則羣公庶尹濟濟鱗列騰聲發采作世玉雪譬若以伯夷為太傅曾參為司徒公儀休為御史孟公綽為尚書原思為博士於陵仲子為大夫鮑焦給事於黃門黔婁待詔於公車邈哉此非常之際亘億齡之所無由是遐陬裔壤嵬岸之士莫不舒翹振華纓冠縰履喁喁于于以觀羔幣之所抵雖以眇䯢邅迍朝占夕呻亦且睢盱批捩羞沒齒而無聞也然而淹速有時顯默有宜故甘生以童孺都上卿而太公白首乃為萬乘師此理之固然而物之不可必齊者也今吾子處盛時而談叔季當羣居而言財利奈之何笑鳴玉曵履之舒徐而欲挾纖離騕裊以助其駛邪客乃憮然有間曰夫市井之言不足以陳於先生之前固也敢問君子之將售其志者亦潔名以為高矜已以自熹而已乎主人曰何為其然也昔百里用秦鬻身五羊鞅介嬖豎厥開富疆毛生重趙引錐脫囊孔舍魯而厯聘摯匿媵以要湯是皆韞不世之閎略將圖伯而謀王誠懼夫厥志之弗究寧畢已而遑遑夫以鯫生黭淺豪補縷拾退若失九牛之一毛進若增太倉之一粒固宜量簣而容度綆而汲亦安敢肩聖哲而駢立哉乃若樹不貪以為名宋司城之寶也弗枉尋以合汙鄒孟氏之道也斯吾徒之所知而百世之師表也且豫聞之時盈時虛天理之常乃仁乃義人道之綱是以君子立不易方故曰勿行爾悔無患名不大勿信爾欺無患祿不隨客獨不觀夫蘭滋九畹珠媚重淵無脛以自致無舌以自宣至其流光晶吐郁烈則人亦莫得而棄捐也若夫卜生投間於乏興張季藉勢於雄資相如發軔於武騎次公奮跡於沈黎是亦非窶人子之可幾獨共已俟命而奚疑策問上都鄉試䝉古色目人䇿問問天下事可言者多矣未易以遽數也姑舉其一二言之可乎人材有短長而惟限於資格民力有高下而同困於征徭儒術非不尊而未能崇雅黜浮吏治非不嚴而未能發姦摘伏因循積久莫知所以為變通之方識時務之俊傑詎可默默而已乎願攄所藴以俟為政者擇而行焉母徒為甚高論也國學䝉古色目人䇿問問學者將以行之也所學何道歟所行何事歟絃歌之化本於四科之文學後世専門名家猶有以儒術飾吏者以經義决事者夫何古道湮墜士習日偷羣居則玩思空言而指簿書錢穀為細務從政則苟逭吏議而視仁義禮樂為虛文不幾於所養非所用而所用非所養歟二三子䝉被樂育以幼學為壯行之地可無所熟講而素定歟孔門逺矣西漢之士有不可企而及者歟願試陳之無以讓為也問欽惟天朝建國學為育材之地二三子以公卿貴胄而齒於諸生其相與言者無非天人性命之理若夫五射六御干戈羽籥凡古所用以為教者皆未嘗以接於心目豈不曰彼所習者器之末此所講者道之本歟是冝成材就實有卓乎其特異者乃或不能無愧於古何歟先儒之論學蓋曰不可厭末而求本古人為教之具亦有可用於今者否歟願推求其遺法將以復于上而與二三子講習焉毋徒以空言為也問國家之患盜自古而然矣方今朝廷清明天下無事而民間椎埋搏掩之習猶有存者以為養之未至窮而無賴歟教之未盡愚而無識歟則農桑學校之政嘗舉矣以為郡縣之治有未善苦吏急而致然歟則守令之選又未嘗不精也願推言夫不能使民不為盜者其失安在弭之之方宜何如毋諉曰此有司者之事非諸生所知也問進賢退不肖古之道也國家設官分職以理庶務而俾持風紀者司其黜陟夫何州縣問絓於吏議者往往而是登于版牘者曽不多見歟有虞氏所舉十有六人所去四人而已由是推之三載之所黜陟概可知矣豈今不古若賢者寡而不肖者衆歟孔子曰十室之邑必有忠信安可厚誣天下無君子歟願試陳之以袪所惑焉問君子小人如隂陽之相反用君子則治用小人則亂不待智者而後知也然稽之前古雖治世未嘗無小人果可盡去乎夫所以處之者必有其道矣聖人推隂陽之消長以為處小人之法或尚剛決或貴於不惡而嚴何其不同乎方今明良相逢君子道長時之所以為泰也欲保其泰有急於處小人者乎聖人所為剛决與不惡而嚴者今宜何先二者以對問養士將以致用也養之於未用之前者有教法焉用之既養之後者有選法焉為法雖不同而首尾相資有不可偏任者夫向今也拘於法守莫能相通漢之徒三千不盡登於銓曹唐之吏八百不皆出於學館所養非所用而所用非所養選法在今為甚密教法視古則已疏法制之疏密既殊事任之重輕不得不異此勢之所必至歟是果出於立法之初意否歟品調消息之使無彼此輕重之偏亦有道歟此區區之所欲聞也問古之為國者必務訓農其民富而俗醇良有以也方今朝廷重臣既専領司農之官郡縣長吏又兼任勸農之職而田里之間地有遺力人多遊心談者率以為田不井則背本而趍末者衆是固然矣夫井地之法既未易卒復若何而能使守本業者有以盡其力遂末作者有以易其心幸試陳之問古之為治者必正習俗夏之忠商之質周之文所尚不同故其為俗亦異董生為漢冝損周之文用夏之忠漢人所習尚者果周之文否歟方今之俗以為文耶則士多因陋而就寡以為質耶則民多澆淳而散朴以為忠耶則為吏者又往往舞智以御人所尚果安在歟欲救其弊宜何先歟諸君子他日獲備官使出而任承流宣化之責於當代所冝損益者可無夙講歟試言其略問除盜救荒非無良法然莫思患而豫防之乃今聖仁在上威行惠孚蟻聚之衆固已肅清菜色之民殆將蘇息及是時也警戒無虞蓄積備具有不可不素講者二三子儻有志焉於從政乎何有請試陳之以俟有司之采問昔者孔門弟子之問答言必以實聽其言而其志之所趍學之所造可知也去聖日逺後生小子類以空言相高端木氏之所不得聞者若已有聞漆雕氏之所未能信者若已可信雷同勦說併為一談雖有知言之君子亦莫能察其所志之逺近所學之淺深也惟自知之明者其為言也實二三子宜審於自知矣幸因答問少攄其素藴以見夫所志所學之實何如也問為國者皆欲吏之亷不知所以致其廉皆患吏之貪而不知所以去其貪談者謂祿秩厚則廉者有所勸禁令嚴則貪者有所懲是固然矣今之祿秩非不厚而廉吏不為之多禁令非不嚴而貪吏不為之少其理安在乎問聖賢之論治未嘗不取法於古顔淵問為邦而孔子告以四代之禮樂滕文公問為國而孟子告以三代之井田學校何所取之不同歟由施設次第言之必養之以井田教之以學校而後禮樂可興也其法果可偏廢歟孔孟所言布在方冊顔淵無其位而不得行滕文公有其志而不能行後世雖或行之而未盡也今亦有當講者歟尚畢其說問民貧則國無獨富民富則國無獨貧此理勢之必然而無可疑者今天下之民以為貧耶木土被文錦犬馬餘肉粟者亦或有之以為富耶裋褐不完含菽飲水而不免於飢寒者蓋已多矣國家之調度將一切取贍於富家固不能無朘削之患欲使均無貧而皆有以待公上之須又慮夫兼并之弊終未易除然則為國計者如之何其可也問蓋聞君子學道則愛人小人學道則易使今之君子知學道者誠有之矣小人而能學道者初不多見也伊欲以斯道覺斯民使化行俗美而比屋可封則為君子者不得不任其責請試言之以觀二三子之自任者何如也問為法必有先後之序知所先後則舉而措之斯易耳蓋昔之言治者曰明黜陟也抑僥幸也精貢舉也擇官長也均公田也厚農桑也修武備也減徭役也覃恩信也重命令也此十事者孰於今為急而在所當先孰於今為緩而在所當後二三子習為明體逹用之學必嘗深究其要矣盍悉陳之問昔安定先生之教學者有經義齊有治事齊治事者人治一事又兼一事故其出而仕多適於世用若老於吏事者由講習有素也夫窮經而不能致用則經為空言矣作事而不師于古訓則其為事亦苟焉而已矣是果可岐而二之歟然以其成效觀之則又如彼何歟諸君子朝斯夕斯所談者無非經義也所治果何事歟幸試以素所講習者言之毋讓問錢出於古而交會創於近代然所謂交㑹者必以錢為之本蓋合券所以取錢非以彼易此使之捨實錢而守虛券也方今鈔法獨行而錢遂積於無用之地立法之初固有因有革及其既久亦宜有變通之道焉請試言之以待執事者之財擇問禹湯文武其道一也而有忠質文之異尚子丑寅之異建何歟至若夫子又有行夏從周之說其去取之㫖可得而聞歟記禮者有曰虞夏之質殷周之文至矣由是言之有虞氏亦有所尚歟殷之前夏已尚質周之前殷已尚文歟三代而下以迄于今所用固夏時也今之為文果皆周之文否歟時務蓋莫有大於此者不可以不講也幸究其說國學漢人策問問選舉之法其來尚矣說者率以為古之取士以實不以文後世反是故其人才不古若也稽之經史則有虞氏之敷納以言近於文成周之賓興以六德六行近於實謂有虞氏之法不及成周可乎若漢之以孝亷察於有司者即古之所謂德行唐之以直言極諌對於天子之廷者即古所謂言也然以唐人詞章之習較之西漢之儒術東漢之名節固自不侔夫豈文勝其實誠如談者所云雖有虞氏之遺法亦不能無弊乎此皆有司所甚惑也幸相與推言其故問漢儒言灾異者焦延夀京房以易夏侯勝劉向歆父子以洪範五行故延夀作易林而向作洪範五行傳論至班固始述歆言以為河圖雒書相為經緯八卦九章相為表裏蓋二者莫可偏廢也曷為而古書獨五行有志乎近世學士大夫皆以易言吉凶而不復以洪範言休咎豈非欲矯其偏乎漢儒之牽合拘泥誠若未足盡信固所序次禍福徴應之實果可廢乎然考之周官則太卜所掌三易之外無所謂洪範五行者豈古之隂陽占驗一以易為斷而洪範不預乎箕子之言安所用漢儒之言何所本乎易洪範並列於六藝五行灾異之學豈但小道可觀而已今亦有能通其說者乎請聞其略問為學必求師而取友師之尊未若友之親也樊遲問仁與知夫子既告之矣退復質諸子夏始喻夫子告之之意當時學者既問於師又辨諸友其務實如此非後進所冝取法歟二三子羣居終日求於師者為甚詳而取於友者則已略是固知師之可尊矣亦知友之當親歟在易麗澤兑君子以朋友講習釋之者曰兑為說朋友講習說之大者也知講習之為說則知友之當親矣其相滋相益豈淺淺歟願以古者須友而成之義相與荗明之毋苟曰歸而求之有餘師也問成周鄉飲酒之禮厯漢唐猶存漢唐行於郡邑而西晉行於辟雍今顧以非著令所及莫之敢舉惟偏州下邑守令之有志於古者乃或講行之固未必能盡合於舊典也蓋古之鄉飲酒或以蠟祭或以習射或飲國中之賢者唐惟三歲賓興略用其儀今又廢矣升歌笙入問歌各三終皆以小雅合樂三終則周南召兩漢惟鹿鳴騶虞僅傳其聲今亦亡矣然則古禮之存者幾希伊欲搜輯遺文以諗於朝而肄習於庠序之間諸君子倘有意焉幸相與商訂之問漢耿夀昌奏設常平倉蕭望之非之而宣帝不聽常平法既行民果以為便後世因之莫敢廢也夫以望之論議有餘材任宰相豈迂闊於事情而不知變通者歟若夀昌者徒以能商功利得幸於上何以使法施於人如是之久歟近代常平義倉領以専使逮至我朝乃有義倉而無常平頃嘗有以復常平為請者事下有司將行而輒止或者夀昌之遺法至是不能無弊而望之之言為不謬歟徴古驗今以究其得失而折衷之有司之所願聞也問班固志地理條其風俗最為詳悉按禹貢周官職方氏辨九州山川土地所宜皆未始反乎風俗而十三國風之變獨見於詩說者謂盛治之世天下大同故無風俗之可言國異政家殊俗而風聲氣習隨之故不得不論其風俗作史者兼而取之所以備著古今之本末云爾然以其時考之禹有反道敗德之苖民周有怙侈滅義之殷士則於其同之中有未盡同也曹之失奢魏之失褊鄭衛之失淫而唐有堯之遺風則於其變之中有未盡變也文翁倡其教相如為之師而蜀之文章冠天下韓延夀先之以敬讓黃霸繼之而潁川之教化大行則風有時而移俗有時而易似未可専以地分為斷也夫語時務者莫大於移風易俗而於經史之指若有未喻幸有以袪所惑焉問尚論昔之言治者必推賈誼董仲舒而劉向稱仲舒雖伊吕無以加誼雖伊管未能逺過則是誼仲舒皆伊尹之流也然而一則曰伊吕一則曰伊管豈仲舒所言純乎王道誼所言雜出於霸道歟向子歆不以向之稱仲舒者為然而於誼無所貶誼果非仲舒所及歟至歆叙七略誼仲舒又何以與伊尹太公管子並列於諸子歟若夫治安之䇿天人之對乃班固所謂功於當世之事而二三子所夙講以待問者也請托其言之無怍於古人可施於今日者條陳之問職田之制其來尚矣而今也謂之養亷職田職田而以養廉為名則是吏之廉否特視夫所養何如耳然以田之在官者有限有田則給焉無田則弗給也不幾於穀祿不平乎若夫人品之不齊又未易以槩論廉者固不待養而有養者未必皆能廉也豈非無恆産而有恆心者惟士為能乎伊欲使上之所養也均下之自養也厚其道何由可得而聞乎問曹參避正堂舍蓋公而齊國安集周亞夫得劇孟若一敵國而知吳楚無能為班固於本傳備著之者以其有關於治亂成敗云爾至為司馬遷傳贊乃譏其先黃老而後六經退處士而進姦雄其㫖安在乎固又謂道家者流清虛以自持卑弱以自守合於堯之克讓易之謙謙布衣游俠之倫溫良泛愛振窮周急謙退不伐亦皆有純異之姿其稱之如此豈猶有取於遷之遺意乎方今治教休明風俗醇美為士者既不屑道虛無之言為民者又莫敢以豪桀自任諸君子亦嘗覽古今習尚之變而考前史論議之同異得失乎願聞其說問古者士有常業官有常守故其為事専而成效易見也夫何後世之用人惟以歲月序遷而不復審其能否至於官數易其守而士數易其業以儒名家者不得専意於稽古禮文以吏為師者不得専力於簿書期㑹自非以數術方技執藝事為世守鮮有久於其職業者授以不素習之事而欲委任責成焉亦難矣豈當世之士皆有非常之材而措諸事業者無施不可歟抑為士者徒知計官資之崇卑而未能如數術方技執藝事者之安其所守歟不然則古者任人之道不可行於後世歟必有其說問談者謂秦尚申韓故其治刻薄而少恩晉尚莊列故其俗浮華而無實其說是也我國家尊尚儒術褒孔子之道以昭示乎四方縉紳先生言必以孔子詩書執禮而非敢為申韓法家之言也教必以孔子之文行忠信而非敢為莊列道家之教也是宜刻薄之風流於世者為之丕變乃猶有一二之或存而未盡去者何百家邪說入人之深而儒者之效顧若是緩歟夫豈為士者溺於口耳之末而昧於當世之所尚歟不然則承流宣化者未能諭上㫖歟願聞所以轉移而興起之者其道何由也問昔之大儒蓋有以習文法吏事見稱於史氏者然則文法吏事亦君子之所冝知也安可忽乎孔子曰古之知法者能省刑本也今之知法者不失有罪末矣惟夫使之無訟而後可以省刑是誠難能也苟非有以得其情鮮或不失有罪者豈易然乎律學之廢已久理官所掌固非諸生所得與聞乃若先王立法之意考諸載籍猶可見也二三子姑以所知者究其本未而極言之可乎問自古有國者不能去刑必設官以主之虞之九官明刑者有士焉而折民惟刑者秩宗之官也周之六官掌刑者有司寇焉而以鄉入刑紏萬民者司徒之官也既有刑官而又以它官分任其職何歟豈其為事固有不同歟今之刑曹即古之士與司寇也禮官無所謂折民之刑而教官無所謂糾民之刑職任可謂専而不分矣夫職任専則事易治何古之人慮不及此歟二三子姑為之解問古者家有孰黨有庠術有序國有學蓋無地而無學亦無時而不學也王制諸侯天子命之教然後為學則凡天子之命所未及者不得有學矣將輟而弗教歟千乘之國為鄉術與二十五家之閭者有幾而建學立師悉聽命於天子為法何若是之煩歟小學在公宫南之左大學在郊此諸侯之國學也豈當時國學須天子之命乃立鄉學之設不待稟命歟夫學校之政亦時務之大者也考經傳之遺文以祛所惑敢俟來對問古之造士必以四術而莫尚於樂有虞胄子之教典樂専焉成周國子之教司樂總焉考其名官而所重可知也豈不以樂者學之所以成終歟漢唐去古日逺詩書禮之文雖僅存而樂之缺有間矣然猶有以樂立於學官者有請以樂教諸生者其為樂果皆出於古歟我朝沿襲近制雅樂之設於成均者惟釋奠乃有合樂而未始用以為教也其為樂果不通於今歟孔子適齊以童子視端行直而知韶樂之作樂之善人心其效如此而可希闊弗講歟伊欲如帝王盛時俾為士者無不成於樂亦有其道歟二三子逰於庠序之間蹈德詠仁不為不久願具陳古樂之本末與其可施於今者有司得以詳擇焉問若昔三代之士論於鄉者必升於學然後官爵加焉其取之也詳故其為材也備漢之四科不皆養於學校唐之六館不皆擇於鄉閭至宋之方州舍法遂判焉兩途而亦足以得人何歟洪惟國朝自至元間建首善之地於京師以風四方逮延祐初乃以科目取士著於令如種之穫適適其時三歲登賢能之書於天府僅百人以博士弟子而預其列恆不若偕計吏者之衆豈取之有未盡歟抑教之有未至歟或者閥閲貴游恥與寒畯爭長歟伊欲考古之制自鄉而學自學而官爵之其可行於今否歟後世之法亦有可參用者歟幸試陳之毋隱問國朝之制策士必以經史時務時務誠未易知經出於聖人亦不容擬議也姑以史事言之左氏之所傳太史公之所紀立法何不同歟班固荀悅范曄袁宏陳夀之流互有祖述孰為得失歟歐陽子唐書法太史公者也司馬公通鑑法左氏者也而皆不能免先儒之譏是蓋有其說矣然綱目之作或因其舊或革而正之其是非去取可得而聞歟方今六館之士奮自儒科而居編摩論撰之列者踵武相接也二三子於昔人之是非得失安可無夙講而為之折衷歟願試陳之以觀所學問古之為國者四曰井田曰封建曰學校曰內刑其存於今者學校而已夫阡陌之已開者不可復矣何以使民無甚貧而遂其生歟郡縣之已置者不可變矣何以使吏無數易而成其治乎箠令已定則法之輕者不可加重矣何以使人無易犯而不陷於罪戾乎若夫學校雖以著令僅存而知仁聖義忠和之教不及於萬民直溫寬栗剛簡之教不行於胄子何以使之成其材就其實乎先生之遺制廢而莫之舉者既如彼存於今者又如此其弛張損益亦有可議者乎二三子游於庠序之間而務為有用之學得無夙講於此乎其酌古今之宜以對毋以勦說為也問一代之興必有一代之俗風聲既立氣習繄焉東漢尚清議而名節日以崇西晉好清談而禮法日以朁得非好尚之殊遂以成俗歟然夷考其人無所回撓戮力王室者清議激之也而亦有遜辭恭色取媚於時者焉清議果安在歟任放為逹廢弛職業者清談啓之也而亦有撿攝衆事未嘗少間者焉清談何嘗為之纍歟豈士君子之制行有不隨風聲氣習轉移者歟稽前言往行之得失以自鑒而防其好尚之偏不亦學者之切務歟幸試陳之以觀所趨嚮者安在江西鄉試漢人策問問三代法制見於經者惟周官一書大綱小紀詳略相因其言人事悉矣然稽之尚書王制孟子之書有不能盡同者何歟或以為周公致太平之迹或以為六國隂謀之書果何所折衷歟周衰諸侯惡其害已而皆去其籍是書何以獨存歟漢除挾書之律是書最後出而冬官亡矣時以考工記足之或者排其非是考工有記果出於誰歟或又謂三百六十之屬已散見於五官冬官果未嘗亡歟國家以經術取士而是書不列於科目豈以劉歆蘇綽王安石輩用之而不驗歟抑他有可議者歟厥今朝廷內建六曹蓋古六官之遺意也豈其成法固在所取歟抑猶有可舉而行者歟諸君子為有用之學冝熟講之矣願聞其說江浙鄉試䝉古色目人策問問先儒以經義治道分齊教諸生而水利居其一然則水利亦儒者之所當知也古所謂水利曰河渠曰溝洫溝洫施於田間故其效易見河渠限於地勢故其功難成方今言東南之水利莫大於吳松江視古之河渠與溝洫其為力孰難而孰易其為利孰少而孰多諸君子習為先儒之學必夙講而深知之矣幸試陳之以禆有司之餘議江浙鄉試南人策問問事有不本於古而可施於今者君子所不廢也然亦安可徒守故常而不究其始終乎漢之取民者有更繇有算賦而除天下田租之令時出焉唐之兩稅與之孰輕孰重而迄今以為定制乎漢之任人者有察亷有課最而舉可為將相之詔間見焉唐之循資與之孰得孰失而迄今以為定格乎其果皆無弊乎推本而言則取民莫善於井田任人莫重於封建自秦開阡陌置郡縣千載之下迄今遵為成憲者大抵皆秦之舊也何以能使其法施於人久而不變乎漢之限民名田唐之襲封刺史非盡泥於古也亦莫有堅持其說而卒行之者豈時殊事異通於古者或戾於今而上下之所便安者無古今之間乎民苦於兼并而無以樂其生吏病於數易而不得善其治又非可謂便安之也其弛張損益猶有當議者乎它如交鈔引鹽近倣於宋以立法者又未可遽數也請姑以其大者考厯代之㳂革原其始要其終而折衷之庸俟上之人采擇焉毋苟謂此儒者之常言而雷同勦說以對策題㑹試漢人南人策題問孔子告門人以既庶加富既富加教牧民而事具則王道成矣其設施之略可得而知歟稽之周官則所以庶之者有九兩保息本俗所以富之者有九職土㑹土宜土均荒政職事所以教之者有八統十二教三物八刑五禮六樂其經制之詳可得而聞歟孟子之語時君無非周公之法孔子之意也推而行之果可通於今歟漢唐盛時亦云庶且富矣君子或以為其教無聞焉或以為未知所以教也伊欲盡三事之責若何而可以去漢唐之陋若何而可以比成周之隆抑有其道歟其酌古今之冝而折衷之以對雜著賈諭曷嘗觀於賈區乎吳之鹽蜀之布㑹稽之美箭代之名馬至於漆枲巵茜筋膠藥物之衆無不叢聚區别而貝璣丹銀重淵邃谷怪珍之産又皆篝火腰組冒百死之禍乃能奪而出諸虎豹蛟鼉之宅亦且畢致而錯陳焉彼其役傭工費舟車遑遑顒顒心計目察笥者間者在箇筥者櫝而藏者辨之患弗良聚之患弗豐耳辨而良則售益博聚而豐則獲益厚其貨誠千金也人且以千金至矣求其張虛肆負枵槖自厠其間而能以操竒贏者無有也於是日昃鼓起囊金適市者莫不鱗集蟻合辨物以奠賈焉方囂譁烟壒之中一旦有委千金於販夫販婦而未嘗少見德色者誠將交致其利而向之千金非以施愛云爾也仁義忠信士之大寶而爵祿車服國家之千金矣夫其為寶也非必燭幽縋深涉死地而後能有也彼飾虛懷枵號呼以望售者何憧憧耶儻人之直而能無德色者又幾人耶嗚呼市井之事學士大夫所共賤鄙而羞以汚齒牙也今之稱乎大人君子者果何如哉果何如哉讀賈生傳屈原死後百有餘年而漢有賈生賈生以謫去過湘水乃投書以弔屈原太史公蓋合二子以為傳夫亦徒見生之為文愁痛無聊發憤一鬱不殊於原而未極其趣者也夫懷王受欺於張儀疏屈原而不用身陷國蹙為天下笑頓襄親值其亂而曽不悟反怒原遷之江南而楚亦尋滅彼屈原者誠悼夫存君興國之志終無所伸而為是發憤無聊也生之在漢非有肺腑之親厯試之久顧於卒然過王之頃欲盡去其舊而惟已之所欲為一不見用則遂自附於原而待其君以亡國之主誠何理耶夫改正朔易服色法制度定官名興禮樂事至不輕也大臣不聞議士不與而遽自草具其儀法可不可哉綘灌之屬皆先帝舊臣苟逺嫌而不言則誰當言者且此三四公位為將相爵為通侯權寵之盛豈復有過於是亦何忌而不容一新進之賈生耶然則謂生以讒去而遂以配於屈原者甚不然也夫生之始欲改定制度也將無以天下為既和洽與至其論厝火積薪之勢顧在乎數年之後凡其言之可行而必效者大抵皆南遷之餘也吾意生以憂患怵迫習於世故未必不悔其前言之易而尚肯尤人之短已哉然則今之疾視絳灌之屬而比之上官子蘭者又非必生之志也周人之詩曰肆成人有德小人有造絳灌之屬安足以知此徒使如賈生者不得盡其材反以年少初學而見斥逺則其䝉蔽賢之譏非不幸哉陸君實傳後叙僕為此叙時固已不敢悉以客語為信及來京師將取正於太史氏而新史所紀二王事乃與皇朝經世大典自有不盡合者史既成而鄧氏光薦家始以其填海録等書上進又不能無所見所聞之異辭謹托逸其一二附注於舊文之下以訂其訛舛補其闕陸公秀夫之死楚人龔先生開既為立傳且曰君實死事得之里人尹應許尹得之翟招討國秀翟得之辛侍郎來莘而君實在海上乃有手書日記日記藏鄧禮部光薦家數從鄧取之不得故傳所登載殊弗能詳至公之官位為丞相為樞密使亦且二其傳而莫能定因字稱之曰君實而不爵蓋闕疑也僕往在金陵客有來自畨禺者頗能道崖山事云宋益王之踐帝位也不踰年而改稱景炎歲丙子五月乙末朔宋丞相陳宜中等立益王於福州以為宋主改元景炎升福州為福安府新史所書無非其實而大典據傳聞之辭誤以景炎為咸熙云明年南遷化之䃃洲景炎改元之十一月御舟入海泉而潮十二月次甲子門明年正月次梅蔚四月移廣州境次官富場六月次古墐九月次淺灣十二月駐秀山一名武山一名虎頭山入海至井澳一名仙女澳風大作舟敗幾溺復入海至七州洋欲往占城不果遂駐碙洲鎮碙洲屹立海中當南北道隸化州見新史及填海録又明年四月戊辰殂於舟中自井澳遇風驚悸成疾以至太漸遇風之日新史以為丙子填海録以為丙寅越三日庚午衛王襲位是日黃龍見海上羣臣皆賀乃升其地為翔龍縣庚午龍見海中書於新史而填海録以為是日午登壇禮畢還宫御輦所向有龍拏空而上身首角日俱全暨入宫雲隂不見非見於海中也翔龍縣填海録以為祥龍又以為龍興拜張世傑少傅樞密使蘇劉義開府儀同三司殿前都指揮使陸秀夫端明殿學士簽書樞密院事餘進官有差景炎新造之初世傑為檢校少傅兩鎮節度使少樞密副使兼福建廣南宣撫大使劉義為檢校保節度使主管殿前司公事兼諸路經制鎮撫大使廣東西策應大使秀夫為中書舍人兼直學士院纍遷權尚書加端明殿學士尋謫潮州明年七月劉義能經制等使免兼殿司十月秀夫還行朝除同簽書樞密院事祥興嗣立世傑以樞副秉國政秀夫以簽樞禆助之皆木書進拜惟劉義以官纍加開府儀坰三司填海録所載視新史為詳而秀夫之官位與新史異㑹雷州失守而六軍所泊居雷化犬牙處乃稍北徙廣州之境五月寓梓宫於香山縣尋葬其地上廟號曰端宗陳宜中以宰相為山陵使事畢宜中一夕浮海去莫知所之上廟號以四月辛巳梓宫發引以八月乙亥永福陵攢宫復土以九月壬午朔皆非五月亦非先寓於香山先是冝中辭相位而以樞密使都督諸路軍馬御舟次碙洲衆舟皆來㑹惟冝中自南蕃洋轉拖往古城纍召竟不至山陵使乃觀文殿學士曽淵於非冝中也見填海鎮而新史不書六月世傑等遂奉御舟抵崖山崖山者在新㑹縣南八十里巨海中與竒石山相對立如兩扉潮汐之所出入也山故有鎮戍世傑以為此天險可扼以自固始不復事轉徙矣六月己未御州發碙洲乙亥至新㑹縣潮居里之崖山起行殿庚辰升廣州為祥興府見填海録而新史謂升廣州為翔龍府宜中之去劉義追之不能及夜泊仙女灣俄有天火飛集其舟延燒衆舟幾盡劉義追冝中事無可考八月庚申月貫南斗己巳夜復有星大如缶衆小星千百隨之自西北流墮東南海水中聲隆隆如雷蓋天狗云己巳星墜海中書於新史而填海録以為癸亥夜一鼓後墮廣州南初隕紅大如箕中爆裂為五既墮地殷如鳴鼓一時頃止非墜於海中也其年十月䝉古漢軍數路並進江東宣慰使張𢎞範以舟師由海道出漳潮江西行省參知政事季恆以步騎出梅嶺𢎞範拜䝉古漢軍都元帥恆為副元帥大典所書可考而恆廟碑謂恆為都元帥江淮省亦遣𢎞範至自漳潮明年正月乙酉朔宋改年祥興行元㑹禮丁已登海舟世傑就崖山港碁結巨艦千餘艘為方陳中艫外舳貫以大索四圍起樓櫓如城堞以待敵見大典新史及填海録已未𢎞範兵至崖山庚午恆亦以兵來㑹乃先遣斷其汲道舟人茹乾糗餘十日渴甚則下掬海水飲之海鹹不可飲飲者亦輒病嘔泄軍中大困事見大典及填海録新史不書二月戊寅朔世傑部將陳寶降陳寶以二月戊寅朔降見新史而填海録及其所撰祥興本紀於正月乙丑書統制陳寶與撥發張逹忿爭而降又書統制陳忠與撥發張成不協而降其實一事而月日亦與新史不同癸未大戰恆南向隨潮下𢎞範北向隨潮上夾攻之恆乘早潮退改其北至午潮上𢎞範攻其南見新史恆廟碑碑書而𢎞範廟碑詳書之但誤以癸未為癸未之明日云自朝至日中戰未决㑹日莫雨暴作昏霧四塞宋師部伍大亂秀夫朝服抱宋主赴水死世傑命小舟取幼主入已舟秀夫懼世傑舟或不免或反為人所賣被執辱於是擁之負璽綬自沈後宫及百吏士從死者以萬數國秀等文武班行之降者猶百餘人是歲實至元之十六年也國秀官承宣使見大典其父貴以復州遞降而國秀在海上為神龍衛四廂都指揮使㳂江招撫使時貴已死填海録所載已詳至叙國秀事乃多誤書其名曰貴云世傑知大事已去乃挾鬭艦十八潰圍奔南恩州五月庚戌逺至海陵港遇颶風舟敗死焉餘衆盡沒自是嶺海間無復宋軍幟旗矣世傑劉義等三十餘艘斬纜乘潮而遁世傑出仙女澳得風入洋追兵不及而還舟至山東欲向占城土豪强之回廣東乃回舟艤南恩之海陵山散潰稍集謀入廣擇宗室子立之六月庚辰颶風大作將士勸世傑登岸世傑慮為人所圖即登拖樓露香以祝風濤愈甚隨水溺死諸將焚其尸函骨葬潮居里赤坎村劉義出海洋後為其下所殺見填海録其事往往傳所不書竊嘗有志論録附傳而行以備本事然恨其不能記陸公終何官秀夫終於端明殿學士同簽書樞密院事見填海録新史書秀夫景炎之初為簽書樞密院事祥興之初為左丞相而大典於秀夫之死第稱之曰端明殿學士盡丞相文天祥家傳謂秀夫以樞密兼宰相者言其以簽樞行相事耳恆廟碑又誤以端明為資政云又慮所談三十年前事道里時日不容無小失謬故久未敢稱述後遊宣城有蘇寶章者縣小吏也僕邂逅見之戲謂曰前朝貼職乃有寶章誰以是字汝縣吏亦帶職耶其人無所對旁一人曰是人乃蘇劉義之子以恩補官嘗直寶章閣人習呼之而莫能變非字也劉義次子景由直寶章閣見填海録僕為之矍然起將以向所記客語質之其人故為不聞者徑去僕嗟惋久之因念曰祀宋大國也其不足徴久矣它何譏焉姑叙客語傳末庶幾傳疑之義云爾至大二年春二月東陽布衣黃溍謹叙說水贈蔣春卿陽羡蔣君春卿嗣主安定教事於吳興以秩滿去友生金華黃溍送之苕溪之陽酌之水而與之言曰君知水之為物乎嵌巖礨空一掬之多遺針墮芥可指而取非不冷然氷骨雪齒也無搖焉無溷焉斯可耳及其去而為湍為澗也驀山跨谷厯百折而弗顧不既壯歟然而迫於風則驚扼於石則怒矣若夫釃為三江鍾為七澤茫洋演溢涵烟霏而滔日星者漫不知其幾百里泊乎其休汨乎其不可留沈沈乎黃龍之所宫穹龜巨魚之所家蝦蛤生焉而不以為隘也來牛去馬飲焉而不以為耗也鳬鷗出沒焉而不以為䙝也蟯蛔投焉而不以為汚且辱也神妖物怪居焉游焉而不以為異也千漚萬泡交起互滅瀇滉爾浡潏爾泄之莫能害其蓄撓之莫能亂其澄潛淵之珍參錯朗耀而荒查醜石屑瑣附麗之物亦無所不容也嗟乎水一而已其量之相逺顧如此非夫所處者異勢耶今君之去山谷也久矣接天潢度瀛海且有日盍亦拓七澤以為襟舒三江以為帶而無以是氷雪者沾沾自喜哉雖然水行天地間其適也逾逺則其趨也愈下孔子蓋稱智者樂水夫不激不流非智者不足以與此君非智者歟持涓滴以相波瀾祗强顔耳離歌既闋風帆遽張因次第其語書以識别勸農文諸暨州勸農文古之有民社者未嘗不以農事為先拊循勸率具有其法我朝參稽故典郡邑守令悉以勸農入銜事莫重焉比以受任之初延登耆年詢以風土咸謂是州地産素薄兼之㯲山帶湖旱潦相半仍歲凶歉民多阻飢夫不知盡在其人而一切聽其在天可不可也昔魏文侯使李悝作盡地力之教以方百里之地為田六百畝理田勤則歲增粟百八十萬石不勤則歲减粟百八十萬石勤與否之利害相逺如此然則欲盡地力者亦在乎盡人力而已誠能率而子弟竭共四肢之力以從事於南畝將見富嵗之入弗减益增蓄積既多縱有旱潦可無乏食之慮矧今聖仁在土茂育羣品至和之應必有豐年乃若奬厲而成就之固長民者之責也茲以東作方興率遵故常躬秉耒耜為爾農勸其尚勉之毋苟以為具文而藐藐其聽也樂章三皇廟樂章降神黃鍾宫三成之曲九變於皇三聖神化無方繼天立極垂憲百王聿崇明祀率由舊章靈兮來下休有烈光降神大吕角二成之曲帝德在人日用不知神之在天矧可度思辰良日吉藏事有儀感以至誠尚右享之降神太簇徴二成之曲大道之行肇自古先功烈所加何千萬年是尊是奉執事孔䖍神哉沛兮泠風馺然降神應鍾羽二成之曲雅奏告成神斯降格妥安有位清廟奕奕肹蠁潛通豐融烜赫我其承之百世無斁初獻盥洗姑洗宫之曲靈斿戾止式燕以寧吉蠲致享惟寅惟清挹彼注兹沃盥而升有孚顒若文於神明初獻升殿南吕宫之曲齊明盛服恪恭命祀洋洋在上匪逺具邇左右周旋陟降庭止式禮莫愆用介多祉奠幣南吕宫之曲駿奔在列品物咸備禮嚴載見式陳量幣惟茲篚實肅將忱意靈兮安留成我熙事捧俎姑洗宫之曲我祀如何有牲在滌既全且潔為俎孔碩以將以享其儀不忒神其迪嘗純嘏是錫初獻盥洗與前同初獻升殿與前同太皥宓犧氏位酌獻南吕宫之曲五德之首巍巍聖神八卦有作誕開我人物無能稱𤣥酒在樽歆監于兹惟德是親炎帝神農氏位酌獻南吕宫之曲耒耜之利人賴以生鼓腹含哺帝力難名欲報之德黍稷非馨眷言顧之享于克誠黃帝有熊氏位酌獻南吕宫之曲為衣為裳法乾效坤三辰順序萬國來賔典祀有常多儀具陳純精鬯達匪藉彌文配位酌獻南吕宫之曲三聖儼臨孰侑其食惟爾有神同功合德丕擁靈休留娛嘉席歷世昭配永永無極初獻降殿與前同亞獻終獻南吕宫之曲緩節安歌載升二觴禮成三終申薦令芳凡百有職罔敢怠遑神具醉止欣欣樂康徹豆南吕宫之曲籩豆有踐殷薦亶時禮文既洽廢徹不遲慎終如始進退無違神其祚我綏以繁釐送神黃鍾宫之曲夜如何其明星煌煌靈逝弗留飊舉雲翔贍望靡及德音不忘庶回景貺發為禎祥望瘞姑洗宫之曲工祝致告禮備樂終加牲兼幣訖薶愈恭精誠斯罄惠澤無窮儲休錫羡萬福來崇祭文祭朱叔文山長文嗚呼世其家者雖古或希豈光華之莫續顧習尚之易非惟君之秉心也諒以直而制行也粹以夷若良玉之不琢況可得而瑕疵是固出于天性或者有得乎家庭之遺謂宜益大於先列遂襲紫而傳龜奈何乎步武之初啓而遽尼於斯嗚呼哀哉晝夜之道天人之際蓋君之所夙講齊死生於一指兮尚窮達乎奚疑君之自處雖可以無憾吾黨所未能釋然者悼故家之遺俗方就陋而趨卑曰賢者之有後幸百聞而一窺攀靈車於道周望喬木以增欷跽陳辭而薦酒為有知乎無知嗚呼哀哉祭永康胡先生文嗚呼先生古之豪英清風峻標孰可狀名弗崇為髙顧以文鳴其文斯何出史入經汲書魯簡武戒湯銘下逮百氏名墨縱橫旁行敷落律令章程包羅揆序弗猥弗并維蓄之厚故施之宏紛其百嘉鬯達滿盈藏英斂華根柢一貞以歸于極以集于成金舂玉撞發其和平逺彼聵聾勿使震驚獨抱厥器旅于天庭胡不廟郊薦之䪫韺乃弦乃歌乃佐武城人趨易良俗失悍獰稚耋熙熙怙為父兄於穆昌辰文事聿興乃謝馽鞿乃專鑑衡賤華貴實樹之風聲磬咳所及驅飈走霆學徒嚮方俊良用登藐此陋微亦纍品評贊邑海壖遺則是徵擇士藝闈緒言是承庶終惠我勉夫兢兢曷使中路奪其依憑嗚呼先生為幽為明有煒斯文揭若日星重江復山煙慘雲冥瞻言逺而泣涕雨零馳辭侑觴式昭哀誠祝文謁先聖忝繇諸生蒙恩錫第洋洋聖道實佑啓兹覆載生成名言罔既欽承睿㫖展謁告䖍聖神臨之敢負夙學諸暨州謁廟祝文先聖昔者夫子之論政蓋曰子欲善而民善矣溍忝繇諸生與聞有政請事斯語以對越夫子在天之靈三皇維三聖人為郡邑之通祀厥有著令溍秪事云初肇以禮見遵舊典也城隍溍被命佐州與有民社祗役告䖍式遵故常治人事神敢不夙夜維爾有神尚鑒臨之國學遷設先師配位祝文釋奠上丁國之通祀四賢竝侑厥有舊章穆卜靈辰具嚴廟像奉遷改作伏慮震驚庀事云初敢修䖍告大成殿修造祝文禮殿有嚴妥靈兹久旅楹故敝惟新是圖飭材庀工諏辰興作廟庭清謐伏懼驚喧菲薦陳誠尚祈照鑒巍巍聖師廟祀惟舊增新崇構有覺其楹既固既完式芘俎豆吉蠲薦告冀兹妥安神之格思永世無斁謁胡侍郎墓祝文維至正二年二月壬寅朔越二十有二日癸亥具位姓某等敢昭告於故宋兵部侍郎胡公之神維神生為名臣沒有廟祀維桑與梓是庇是依巋焉兹丘髙山仰止展謁之禮大懼弗時爰考舊規祗薦俎豆有引弗替神其鑒之先大夫封贈祝文維至正二年歲次壬午五月辛未朔二十七日丁酉孝子奉政大夫江浙等處儒學提舉溍敢昭告于先考祕丞府君溍蒙賴教育竊有祿位疏恩分土已表生榮進秩升朝載揚恤典伏奉至正元年十月制書贈奉政大夫祕書監丞驍騎尉追封義烏縣子慶澤所被下逮一門秪念厥由不任感慕而溍繫於職守不得躬展彛儀謹遣弟溥淇詣墓次以告謹告維至正六年歲次丙戌正月庚辰朔三日壬午孝子中順大夫祕書少監致仕溍敢昭告于先考太常郡伯府君先妣郡君童氏溍忝有仕籍垂三十年幸免曠官克承委祉陳情歸養而奄罹大故乞身得謝而獲被加恩伏奉至正五年三月制書先考贈中順大夫同僉太常禮儀院事上騎都尉追封江夏郡伯先妣追封江夏郡君今雖無燎黃之法而禮有可以義起莫之敢廢是用祗薦於墓下音容如在命數維新瞻望松楸不勝感咽謹告太廟時享祝文二首青陽届候雨露既濡永言孝思有懷先烈吉蠲致享來燕來寧錫羡降康益綿寶緒太宫奕奕列聖端臨藏祀有常夏享以禴禮文告具昭薦孔時茀祿是承永世無斁表翰林國史院賀正旦表一氣洪鈞肇協始和之序九天黃道肆陳元㑹之儀寰宇均歡臣鄰胥慶欽惟陛下堯神廣運湯德懋昭月竁天池揚風霆之號令蘭臺石室煥雲漢之文章茂對三陽誕膺百福臣等叨榮鼇禁簉跡鵷班黼黻丹青莫寫化工之妙梯航玉帛惟觀夀域之同國子監賀正旦表二首𤣥枵紀嵗新歷象以更端太極受朝肅儀文而稱慶覆臨所暨抃蹈惟均欽惟陛下駿惠先猷丕昭嗣服體元建號道允協於重華備物隆名孝益嚴於長樂克承天貺式迓春祺臣等忝職教庠參陪班序鴻鈞一氣難名有造之仁眉夀萬年申衍無疆之祚七政旋杓回陽和於蒼陸一人當寧展朝㑹於彤庭凡在生成實同慶賴欽惟陛下宅心至正撫運重熙春育海涵播仁聲於庶類風行雷動敷治象於多方候應泰來祥開履吉臣等忝司六學獲旅千官曕就日之清光載逢昌旦祝齊天之寶算永固丕圖國子監賀聖節表二首虹流華渚肇開出震之祥龍見中星式應純乾之候三宫均慶百辟騰歡欽惟陛下祗遹文謨丕隆舜孝雲行雨施等天地以無為日就月將與春秋而俱富斂時五福賴及萬方臣等忝職儒黌欣逢瑞節播南薰之至化鈞奏九成曕北極之常尊嵩呼三祝頒度明堂允協乘離之候紀祥甲觀肇臨載震之期喜溢大庭歡騰同宇欽惟陛下宅心淵粹凝命穆清長樂承顔昭聖人之孝治金華勸講開天下之文明茂對正陽益增神策臣等忝司教事欣覩朝儀律應薰絃並奏九韶之舞香浮合殿同稱萬夀之觴國子監賀冊太皇太后表德為聖人治有光於舜孝養以天下禮益謹於漢儀備物隆名熙朝盛典欽惟陛下誕膺駿命寅御丕圖黼座端臨念皇慈之保佑綸言播告極鴻號之尊崇事逺邁於古先慶旁流於中外臣等幸專教席獲旅廷紳傾向日之微忱遙瞻廣內祝齊天之睿算永奉慈闈國子監賀冊皇后表顯冊誕敡肇正宫闈之號鴻圖增重益隆宗社之基慶輯邦家歡同華夏欽惟陛下道尊皇極治本人倫與日俱新剛健允符於乾德自天作合順承式表於坤儀命出楓廷禮成椒掖臣濫司教事欣覩彛章關雎正始之風四方來賀既醉太平之福萬夀無疆國子監賀太皇太后正旦表獻嵗發春肇正孟陬之序隆名備物載新長樂之儀嘉與外廷肅稱元㑹欽惟殿下道光內治德配先朝尊極宫闈誕舉推崇之禮慶流宗社彌章擁佑之功履兹端辰裒時多祉臣等忝司教育獲預班聨絳闕天開恭展三朝之拜瑶池日永歡騰萬嵗之呼國子監上太皇太后賀冊皇后表禮行當寧丕昭文定之祥尊極重闈茂衍徽音之嗣歡騰禁掖喜浹寰區欽惟殿下德備儉慈功參覆載承先朝之付託克協孫謀建中壼之表儀式資婦順流輝華於椒屋增鞏固於蘿圖臣等忝職上庠欣逢盛典二南正始大義本於家人萬夀無疆介福歸於王母中書省賀正旦表嵗臨析木藹瑞氣於神臯天近太微赫清光於黼座三朝嘉㑹萬福來同中賀欽惟皇帝陛下凝命上𤣥宅心至正典學與春秋而俱富知人侔日月以並明震器夙成俾橫經而就傅謙光下施加備物以展親惠綏羣黎函䝉慶澤臣某等忝司政柄獲領朝紳金鉉調元莫贊皇猷之盛玉卮稱夀願增寶厯之長中書省賀聖節表嵗舍在庚應虹流之紀瑞月臨于已瞻龍御之當陽縟典載行輿情胥慶中賀欽惟皇帝陛下居富盛之業撫熙明之期地重青宫崇教事以端國本天開華閣陳古訓以宣人文茂對嘉辰荐膺多祉臣某等忝居政府肅領朝儀接武泰階莫贊無為之化發祥神策願綏有永之年箋翰林國史院賀皇后正旦箋春回椒掖茂迎百福之祥天近楓宸均備三朝之禮歡騰廣內喜溢羣工敬惟殿下淑德純全徽音夙著中襲黃裳之美恪謹柔儀上侔紫極之尊永綏吉履肇臨穀旦並介蕃禧臣等忝職文詞獲倍班序化行宫壼願新彤管之書慶衍家邦敬上玉卮之夀國子監賀皇后受冊箋嘉禮備成正柔儀於內壼隆名載舉孚大號於外廷治首六宫歡形八表敬惟殿下性全淑哲德並神明玉冊金相茂輯彌文之盛翬衣䄖翟光昭象服之崇稽合舊章亶為巨典臣等叨居黌序獲綴朝班瞻北極之四星祥開吉旦祝南山之萬夀慶衍齊年箋中書省賀正旦璣衡密運回玉律於青陽翬翟令儀應軒星於紫極慶行中壼喜溢大廷中賀敬惟皇后殿下德並神明功參覆載體家人之正位肇立化基志卷耳之求賢助成治道春生穀旦天錫蕃禧臣某等庀職宰司簉班元㑹載新椒頌展盛禮於三朝永固蘿圖登齊年於萬夀公文代浙東憲使請立耶律文正公書院公牒竊謂人能𢎞道學必有師仰惟碩德之間生實繼先儒之正統流風未逺世澤猶存不有專祠曷彰遺烈伏見故昭文館大學士兼國子祭酒贈資德大夫河南江北等處行中書省右丞上護軍追封漆水郡公諡文正耶律公前代賢王之貴胄本朝上將之諸孫負深沈不器之資懷耿介拔俗之志爰親師而取友用修已而治人粵若世祖之時咸宗許氏之學克嗣其業允屬於公卓居輩行之先式膺付託之重一貫忠恕之妙獨傳於曽參三千弟子之徒同師於有若凡升堂而入室必蹈矩而循規一從國學之建官三為祭酒以設教啓前賢之藴奧示後學之楷模青青子襟覩時髦之傑出戔戔束帛承天寵之褒嘉逮請老而縣車復興歎於當寧特馳乘傳加錫上樽髙明令終既疏封而告第華結一節已定諡而易名孰知鄉國之舊居尚缺禮祠之精舍當職久司風紀博采輿言謂後人苟獲瞻其儀刑雖異世亦將知所觀感宜立書院而修其祀事仍置山長以領其生員庶幾人材之作興可備國家之任使誠非小補是用申明啓謝鄉試主司徐照磨啓三月十三日䝉恩賜同進士出身者祗命以還撫躬無措載循忝冒亶有寅緣竊以詩詠思皇侈成周之多士史稱間出彰大漢之異材垂照來今蔚為盛際然必鄉書上獻乃登天府之名計吏與偕方署太常之籍凡皆重乎其始進是故擇焉而愈精昔在熙朝率由兹道矧右文而興治若先烈以敷猷搜矌典於三紀之餘徠羣英於千里之外戔戔束帛殆幾跫然而有聞于于纓冠孰甘瞪若以自後棘連圍而並樹袍何白以太紛惟薦送之定員實抑損於舊制加以文非故習蕩無矩度之可稽業有專攻競出管窺之餘見習辨麗者或乖雅馴之體獵幽眇者或昧精深之原乃欲定去取於一日之間而使論安危於九重之上其所繫者大矣豈不戞乎難哉自非精鑒裁以持衡攬英雄而入彀妍蚩並照細大不遺則何以闢賢路之初程承天光之下燭肆時盛舉屬我宗工宜搜傑異之材佇副詳延之意如溍者器質窳陋術業踈蕪簉迹英躔猥玷譽髦之造睎光華旦謬充跅弛之求敢期小枝之曲迂亦借大方之品目忘其瑕垢不俟三獻而遽收出諸泥塗輒與十朋而前列辱采甄之及此顧庸謭其奚堪粵陪方物之陳荐入春官之考綸言俯被雍容衢室之諏櫝奏森羅煥爛上方之札盍少俾於末議庶無負於殊知夫何鼓已至於再三威實臨於咫尺厪終條對靡中題評挾以先登徒愧大宫之士存而勿去偶同矍圃之賔叨綴第以為榮省流恩之有自兹蓋某官先生導揚德意底厲文風假華衮之寵褒曲垂薦藉致黈旒之過聽獲預并容溍敢不勉企前修益圖後效鞭驚附驥豈十駕之難追磨鈍為銛尚一割之可用上酬享遇次答隆私激烈情深鋪棻語淺賀周縣丞啓策名昕陛贊邑海壖榮命載行輿言胥慶惟古有詳延之禮肆時多間出之材於皇昌辰聿新曠典文場初啓類霑優渥之恩英彀重張果極俊髦之選科目見謂得士州縣豈徒勞人蓋將任以事功必先養其譽望某官卓乎懿行充矣令儀獨抱遺經詞章固為餘技究觀當世設施匪事空言粵䇿雋於鄉闈逮旅陳於方物褒然髙舉籍甚能稱可緣再鼓而少衰仍與十朋而前列用膺妙東式副旁求日昃彤庭既親承於大對天臨黼座宜密近於清光侈是際逢胡然引却姑一登於選部不再轉而為丞庶出緒餘稍蘇疲瘵佇聽疇庸之美亟觀圖任之新某猥以陳人覿兹盛事雲霄直上詎為儒者之榮膏澤下流上慰斯人之望聊攄悃愊少助欣愈通李州判啓晉登上第臨佐偏州偶緣臭味之同遂託雲仍之雅輒憑書間庸候車音共惟某官流慶仙源飛英學海故家舊物陋杞宋之莫徵大冊髙文卑眺董之所對科目之士於斯為盛州縣之職夫豈徒然竚展材猷力禆治化風行草偃里無珥筆之民川泳雲飛座有彈冠之客載新觀聽允賴作成屬當視籀之期敢後典籖之詗某衰遲漫迹愓息素餐忝冒謂何久自慙於揚粃瞻承伊邇幸母爽於及瓜拱俟晤言悉攄下悃書上憲使書某烏傷之鄙人也郡縣不見菲薄猥以克貢由是昧昧於一來庶幾求伸其所欲為重惟呈身識面昔人所恥輒不敢踵門納謁以速誚讓庸藉不腆之辭致其區區於下執伏惟少垂察焉某聞國之所與立者曰人才人才之所由興者曰風俗而風俗之所恃以不墜者曰大人君子古者士之仕也上有求下之制下無求上之法故夫學修于家行孚于人者其鄉之老之大夫若列國之諸侯且以禮而賔送之漢非古矣然而州郡之所舉公府之所辟要非有待於人之求之也唐宋以來士子得以投牒自試而下之人始有求於上覬幸之念生趨競之俗成矣國家剗除前弊改試為課以教不爭其貢士之法即鄉舉里選之遺制也立法不殊於古而得人之效闕焉未著豈風俗實為之與且古者舉一人而不仁者逺今也一有所舉而巧取豪奪者不知其幾人雖有瓌偉傑特之彥且逡巡引却而羞與之比又安能俯首匍匐以事迂曲於其間哉故所得非鄉里之富民則貴游之子弟耳蓋夫睥睨而欲前也其言以為凡物之適於欲者未有不求而得之奈何世之操豫奪之柄者亦且曰是宜有求於我者也然則亷恥之不立豈獨忘身狥勢者之咎耶伏惟明公以君子之德居大人之位義適以觀人風為職其於俗化之變遷固宜有以品調消息之是未可以為細故也某生而寒微賴家世遺緒不失身於農工商賈之列幼而知書年十五六而能屬文時之巨工宿學皆幸而與之進莫不玩其華而望其實也其於是忽然以疑釋然以悟盡棄俗學之陋而務極其業於力之所至凡聖賢精神心術之妙古今廢興治忽之由固嘗竊窺之而未始敢以為有得也不意今兹誤玷選舉俾受察于下執是用囊書裹糧而來且庶乎親承明問以少舒其平生之素計日俟命不為不久而寂焉無聞倣徨躑躅欲進而不能欲去而不敢上之人未聞有求於某而某方汲汲焉若有求於上者其為滯留淟涊之狀寧不起人厭薄之心而重風俗之不美也哉某於門下既不得有私謁又不容默默而遂已也輒敢顯誦所聞於左右若夫引而進之抑而絶之明公事也非某敢知也惟明公不以某之進退為嫌而以人才風俗為念幸甚幸甚傳柳立夫傳柳立夫者名森當塗人也祖父世醫至立夫遂以其技知名立夫於醫善為脉其治疾决人生死多竒驗然志在德物未嘗挾以為市也人以病叩門不擇貧富輒往或委金錢率謝弗取即取取足自養而已亦用是見稱士大夫間而參知政事吳公淵尤遇立夫厚立夫亦喜為之留吳公乃買田築室居立夫不使輒去也初立夫兄嘗誤殺人就逮當死立夫曰兄先人世嗣又有子且吾母老矣吾自度生無益於兄終不能為兄愛其死乃自言有司願以身受刑贖兄罪吏感其誼而悲之乃議出其兄而立夫亦竟得不死然重以立夫故廢法遂論黥立夫當吳公盛貴時士多以善為方出入門下者而特敬重立夫嘗用比貴客不獨以其技也吳公有愛姬無子將出以嫁立夫立夫聞之輒先自娶婦亡何婦死吳公卒欲以姬妻之立夫乃謝曰吾婦雖亡母固在爾吳公曰娶婦非以養姑耶立夫曰不然是方豢貴驕襲美飾而能躬井臼以事吾母耶於是吳公止不復言姬聞而歎曰吾乃為刑餘之人所棄吾終不可以事人即日脫簪珥入道終其身諸公聞之以為吳公所得姬侍賔客皆非常人也以此賢吳公而益重立夫吳公既病殁立夫乃去賣藥黃池上里中子或求立夫愈疾弗為報立夫嘗為稱貸於富人又弗償也㑹復得疾乃不敢致立夫而更迎它醫它醫以藥溫之病加劇不得已始召立夫立夫診之曰病得之勞而伏暑奈何以剛劑慘之方冬沍寒而立夫言如此它醫素害其技乃謂病家彼固有嗛於君不可信病家將遂謝罷立夫已而念立夫素長者卒聽不疑竟如其言而效乃奉幣物重報立夫立夫輒罵曰公市人何復以市人處我趣歸而逋無用是汚我也里中子乃大慙悔盡償所貸錢由是鄉閭皆慕化立夫行有不可者惟懼立夫知之也立夫後以髙夀終贊曰先左曹君布衣時客吳公與立夫游而善嘗弟畜之亟稱立夫賢有道者皆寓於醫云以豫所聞立夫為人已疾其治驗甚衆而立夫所著有診脉圖有可用方今江淮間類多襲用其書以故弗論論其卓恑殊絶之行著於篇俞器之傳俞器之者名時中金華人也其先事錢氏最貴顯錢氏亡子孫世仕宋凡十一世乃至器之器之自少時知讀書能屬文年十六盜起里中器之盡室走辟匿旁近山谷間㑹大軍南下或直其叔母劉氏藏處遂為所得將殺之劉懼祈哀器之識其聲知為叔母急走從叢薄中出曰此吾母也即欲殺吾母者當以身代母耳軍士壯其語乃釋劉不殺而心獨竒器之因挾以去是嵗至正十三年也器之既與其家隔絶然幸得不死乃惕然自傷思隱忍以有所就于是常盡力其所事蚤夜如恐不稱以此得無辱困更善遇之其年冬至京師遂以見公卿貴人公卿貴人憐其儒家子且得所以北來狀莫不歎竒之乃使受學羅郎中所羅郎中者蜀人號倜儻喜士且又貴幸當是時兩都賢士大夫皆延頸慕交之器之事羅郎中數以材見稱因為其子壻由是名益聞諸公間稍得推擇給事尚書吏部為令史居久之用薦者以布衣對禁中被㫖入翰林與纂次本草事遂為太醫令史由太醫遷都水監用例補官監通州樂嵗倉秩滿當改調器之自念拔羈虜官七品是有以復其父母矣乃以親老求便養遂得諸暨州判官以歸初父母既失器之數從人問求其所在莫能得或言死矣去十二年聲問始來又十九年乃歸閭巷之人皆為欷歔歎息焉其里中少年子弟多器之去後乃生無識器之者問器之至爭共來聚觀之不知者見器之以為北人也器之歸時父母殁已久劉亦死再期器之乃為位制服晨夕號慟如初喪且自為文以祭其言悃愊惻怛皆可流涕也贊曰豫睹器之踆踆然為卑讓君子哉迹其遭值艱難蹈白刃而不讋誠亦能勇矣至身為係纍摧剛下志窮而不能自財又何盩也彼固隱忍畏約以有所待獨死為難乎故曰生有輕於鴻毛死有重於泰山無所愧而已耳嗟夫以器之之材窮不失仁逹不失義豈俟它日然後信耶黃節婦傳節婦蔡氏者鄞黃君天驥妻也黃君之先閩人六世祖龜年宋髙宗時為殿中侍御史論罷右僕射秦檜纍遷給事中及檜再相遂以貶去隱于鄞其後子孫多為美官至黃君乃弗仕節婦年十八歸黃君明年有子曰傳孫甫晬黃君死又明年其舅亦死婦屏華采服艱勤以奉其姑以保其孤子三十餘年猶一日家既裕而姑已老子亦能自樹立所與為師友多顯者由是知名得察舉補儒學官節婦之名亦因以著聞有司上其事于中書用例旌表所居及其里門曰孝節云東陽黃溍曰豫讀詩至柏舟未嘗不歎古女婦之賢傳於今者少也共姜之名由詩以顯得孔子而詩益傳女婦之以義自守獨共姜邪世無孔子若蔡氏者非尊官要人為之引重惡能彰彰如此閭巷之人砥行立石堙滅而不稱者可勝道哉可勝道哉梅孝子傳梅孝子者名應發居吳郡閶門市中不由學問而知人之行莫大於孝行之克盡其誠蓋天性然也母有疾醫不能療則剔股肉以食之疾良已它日母又有疾危甚更求良醫投以藥皆弗效莫知所為乃露立北面稽首以名香然頂灼臂叩天乞减已年以益母夀是夕天將雨陰雲四合俄剨焉而開若啓半扉盡見北斗之六星惟一星及輔星不見頃之雲復合而天深黑及還至母所則母已擁衾坐床上言有衣白衣者六人以水來灌灑遂霍然而蘇不覺疾之去體也詰旦母平復如常時今年已八十餘身愈康强四方大夫多為詩美其事蜀郡虞公為之序云金華黃溍曰曽子固氏有言古今豪傑士傳論人行義不列於史者往往務托竒以動俗亦或事髙而難為繼或伸一人之善而誣天下以不及雖歸之輔教警世然考之中庸或過矣以豫所聞梅氏子事談者誠近於過夫欲使中人以下觀過知仁恥躬不逮則載而傳之曷可已哉行述山南先生述先生姓劉氏諱應龜字元益世為婺之義烏人自曾大父祖向大父夢龍父景辰無仕者先生少恢踈常落落多大志宋咸淳間游太學馬丞相髙其材將女焉先生不可乃已由是名稱籍甚非直用文墨出小異也於時同舍生掇其緒論或取髙第而先生故為博士弟子員亡何當以優升解褐值德祐失國乃返耕築室南山之南賣藥以自晦人勸以仕輒不答然亦不為激詭嶄絶事昡俗矜衆也居久之㑹使者行部知先生賢强起以主教鄉邑先生始幡然出山即席於是至元二十有八年矣終更調長月泉有司以纍考合格上名尚書親友白當詣謁先生笑弗顧銓曹謬以年未及出其名復俾正杭學先生競不自言明年遂以疾卒於家夀六十四大德十一年八月二十日也先生偉䫉美髯談辨絶人然任氣好臧否閭里少年以為厲已而與謀中傷之相卒亦無以害也先生學本經濟而以簡易為宗讀書務識其義趣未嘗牽引破碎以給浮說至其為文雄肆俊拔飈駛水飛一出於已無少貶以追世好世亦未有能好之者凡所著為夢稿六卷癡稿六卷聽雨留稿八卷藏于家先生蓋有祿食於世矣而未顯也故識與不識皆稱之曰山南先生如隱者焉初娶吳氏卒再娶許氏子子男一人曰鼎孫男女合三人既卜宅于永寧鄉白茅之原將以某年月日窆而未有以昭不朽也溍惟我曾祖左曹府君以文章家知名當世先生以外孫實得其學顧溍之蒙鄙劣弱猶幸弗失身負販技巧之列以隕先業者先生教也先生之庇庥我厚矣而溍安足以永先生之存庸疏其世系出處卒葬之嵗月以諗夫志同而言立者尚幸為之銘若誄以揭諸幽云制二程子加封制二首朕惟三千之徒莫先顔氏眷言往哲式克似之故河南伯程皓體備至和躬承絶學元氣之㑹鍾於獨得聖人之道賴以復明翳百世之真儒豈追崇之可後爰搜盛典爵以上公於戲緬想德容儼揚休而山立聿新禮命孚渙號以風行服此寵靈益綿道統可加封豫國公主者施行朕惟孟氏以來千有餘嵗不有先哲孰任其承故伊陽伯程頤本諸躬行動有師法謂初學入德始乎致知格物謂隨時從道在乎觀象玩辭遺書雖見於表章異數尚稽於封冊胙之大國庸示褒崇於戲規矩凖繩庶有存於矜式火龍黼黻匪徒侈於儀章懋相人文以對休命可加封洛國公主者施行針朋樂齊針伯陽甫取孔門記言名齊居之室曰朋樂豫竊嘉其能得朋而懼夫樂之或過其節也為之針曰天壤之間並生者人矧曰同類其有弗親孰豫之從來之紛若匪善何信匪信何樂相古易象示人以朋母敢適莫惟德是徵復而朋來實用無咎坤以喪朋厥慶終有一陽之至我其俟焉三陰之聚我其舍旃豈兹記言與易殊指便辟佞柔既曰損矣二人同心其樂也康比之匪人其樂也荒猗伯陽甫式謹爾類交游司規敢告閽𨽻行狀元故翰林學士承㫖中書平章政事贈舊學同德翊戴輔治功臣太保儀同三司上柱國追封魏國公諡文忠李公行狀曾祖執皇贈濟美功臣光祿大夫平章政事柱國追封韓國公諡康惠祖昌祚皇任潞州招撫使贈保順守正功臣金紫光祿大夫司徒上柱國追封韓國公諡文靖父唐皇任徵事郎略陽縣尹致仕贈推誠保德佐運功臣太傅開府儀同三司上柱國諡忠獻母王氏追封韓國夫人本貫公諱孟字道復系出後唐李氏世為潞州著姓康惠公金未舉進士不第以行義見稱於時文靖公歸皇朝佩銀符使潞州卒於官忠獻公始去家而仕於秦蜀四十餘年乃致其事樂漢中風土之勝因家焉公生而頴悟十嵗能屬文稍長益肆力於學讀書日記數千言學既淹貫文愈超卓每考論古今治亂盛衰之故慨然有志於當世然恥於干進屏居閭巷開門授徒逺近負笈而至翕如也時之名公巨卿如商公挺王公博文魏公初至漢中往往折行輩與之交郭公彥通於公為父執名能知人見公魁頎偉岸謂忠獻公曰此郎骨相殊常公輔器也至元十九年時忠獻公留四川藩閫聞公名將辟置幕下辭不就改辟主晉原縣簿文辭臺府交章舉之亦不起一日幡然曰大文夫固不能俯首州縣方今朝廷更化政治聿新招徠衆正材俊林立獨不可與之並游乎乃束書如京師行中書右丞楊公吉丁一見輒加器重薦之裕宗皇帝得召見於東宫未及登用而裕宗賓天楊公遂延致家孰俾諸子弟師事之翰林諸大老竒其材剡上于中書謂宜置之館閣而銓曹調公主梓潼縣簿非其志也忠獻公方為䕫府經歷乃往省焉未幾從忠獻公出峽沂襄江還漢中日以奉溫凊具甘㫖為事忠獻公勉之入仕復北上三十一年成宗皇帝臨御首命詢訪先朝聖政以備史臣之紀述公過關中陜西行省因俾公與諸儒討論彚次成編馳乘傳以進時武宗仁宗俱未出閣徽仁裕聖皇后求名儒職輔導公首當其選大德元年武宗撫軍北邊仁宗特留宫中公日陳善言正道從容啓沃多所禆益受知於成宗特㫖除太常少卿當國者以公不及其門沮格不行改禮部侍郎命亦中寢昭獻元聖皇后幸覃懷公以宫僚從戢衛卒無敢侵奪民居在覃懷四年夷險一節信任益專十一年春成宗陟遐神器暫虛宗王大臣密謀搆變國勢危疑人情洶洶公從兩公還京師遂與丞相哈喇哈遜達爾罕等力贊仁宗削平內難中外晏然定策迎武宗入正大統仁宗即承制以公為中書參知政事公久在民間於閭閻之幽隱靡不究知損益庶務悉中其利病逺近無不悅服然以抑絶僥幸羣小多不樂公不為之少自撓也居亡何言于仁宗曰執政大臣宜出於嗣天子親擢今鑾輿在道臣未見顔色誠不敢冒當重寄仁宗不許則逃之許昌築室於陘山潩水間若將終身焉夏五月武宗即皇帝位仁宗為皇太子物色得公所在白于上遣使徵詣闕下至大三年春正月入覲武宗于玉德殿上指公謂宰執大臣曰此先太母命為朕賓師者宜亟任用之三月特授榮祿大夫平章政事集賢大學士同知徽政院事四年春仁宗皇帝正位宸極真拜中書平章政事進階光祿大夫推恩其先三世且諭之曰卿朕之舊學其悉心以輔朕之不逮公感上知遇毅然以國事為己任慎賜豫重名爵核太官之濫費汰衛士之冗員貴戚近臣惡其不利於已而莫敢言也前所建新法有未便者奏請革去百司庶政一遵世祖皇帝成憲而行焉仁宗素崇儒且察見吏弊欲痛剗除之公曰吏亦有賢者在乎慎擇而已上曰卿儒者宜與吏輩氣類不合而曲佑之如此真長者之言卿在朕前惟舉人所長而不斥其短尤朕所深嘉也同僚有積與公忤者人意公必銜之及其坐事見黜公乃力言于上俾殿外藩且優加賜賚以慰其意聞者莫不服其有容方是時朝野乂安民康物阜號稱極治公欿然不自以為功士大夫或譽之輒謝曰此聖天子之德也吾何力之有焉乞解機務上曰朕在位必卿在中書朕與卿君臣當相為終始自今其勿復言尋賜爵秦國公上親授印章仍錫書命以褒寵之上在潜邸嘗因公所自號命集賢大學士王顒書秋谷兩大字御署以賜公至是又命繪公象敕詞臣為之贊入見必賜坐與語移時而退惟以字呼之曰道復而不名其見尊禮如此皇慶元年春正月特授翰林學士承㫖知制誥兼修國史依前平章政事尋謁告歸葬其父母于潞州之先塋上勞送之曰卿襄事畢宜亟還毋久留孤朕所望冬十二月入朝上大悅公因請謝事優詔不允然重違其意乃命以平章政事議中書省事依前翰林學士承㫖知制誥秦國公大詔令皆公視草史冊所記亦公手自刋定辟置官屬多時之聞人二年夏請歸秦國公印綬不允章三上乃如其請先是上與公論用人之道公曰自古人材所出固非一途而科目得人為盛今欲取天下人材而用之捨科目何以哉然必先德行經術而後文辭乃可得其真材以為用上深然其言遂决意行之延祐元年冬十二月復拜公中書平章政事依前翰林學士承㫖知制誥兼修國史二年春遂命公知貢舉及親策多士于廷仍命公為監試官秋七月進階金紫光祿大夫加勳上柱國改封韓國公職任如故公頻年扈從上京數以衰病不任事乞歸田里六年乃從所乞解其政柄復授翰林學士承㫖知制誥兼修國史散階勳爵如故公既退居散地日以文史自娛每入侍燕間禮遇尤至七年春仁宗奄棄羣臣英宗在諒暗中太師特們德爾再入相以公前共政時不附已妄構誣言盡收前後所頒封拜制命降授集賢侍讀學士嘉議大夫意公必辭因中傷之公受命欣然就職夏五月分治院事於上都至秋乃還略不以利害得失介其意恆謂人曰吾待罪中書無補於國聖恩曲宥俾遂閒適今既老矣何以報之上聞而悟其為譛也恩意稍加焉入望公將復見柄用至治元年春瘡發于股醫莫能療公知不可復起乃區别家事手書付家人使治葬地於燕遂以夏四月三日薨于大都和寧坊居第之正寢享年六十有七以其月十八日葬宛平縣石井鄉之某原遵遺命也公薨後臺臣纍疏辨其誣乃給還所收制命而復其元官令天子念舊圖功加贈舊學同德翊戴輔治功臣太保儀同三司上柱國追封魏國公諡文忠配劉氏前公二十一年卒納哈塔氏昭獻元聖皇后所賜前公一月卒並封秦國夫人改韓國夫人俱合葬焉繼室何氏封韓國夫人有子一人曰獻今為資善大夫御史中丞知經筵事能世其家者也公宇量閎廓材略過人三入中書事關休戚知無不言援古證今務歸於至當苟有益於國家雖違衆而行無所憚四方之士為時所推許者甄拔無遺汲引後進未始有吝驕之色品題所及後多知名公退一室蕭然留連觴詠言笑竟日無異布衣時其為文跌宕有竒氣要其歸一主於理詩尤清壯麗逸人爭傳誦之蓋公之歷官行事及平生大略可見者若是而止中朝大謀議既非外間所得聞它所奏陳亦皆自削其藳莫得而詳也公已定諡於奉常而國史之傳未立許昌有公祠堂翰林學士歐陽𤣥為之記公詩文有秋谷集御史中丞許有壬為之序溍幸辱從兩人之後濫厠公門生之列公嗣子獻命溍為之狀以俟太史氏之采擇義不敢辭謹撰次如右謹狀辭白雲辭為陳生作秋風起兮白雲生親之命兮子奉以行秋風落兮白雲歸倚閭望子兮子歸遲遲膚寸而起兮大廕周乎八極求仕與道兮焉往而弗得子兮來歸毋使兮心惻文獻集卷三
