body:
  text: 文獻集卷四元黄溍撰題䟦題陳茂卿詩卷茂卿贈予詩稱古來賢達士不蘄當世知朂哉保令徳千載以爲期嗚呼其望予至矣而固茂卿所自志也夫窮一世之賛毁不足動其心而獨有待夫寥寥無情之後世誠亦可悲矣今其自託於千載者何如哉攬卷及此流涕而已題山房集孟子稱王者之迹熄而詩亡夫詩生於心成於言者也今之有心而能言者與古異耶山謳水謡童兒女婦之所倡荅夫孰非詩彼特莫知自名其爲詩耳或者幸能探幽發奇使組繡之麗被於草木是固知以詩自名而非孟子之所謂詩也吾少嘗學文而知自名其爲詩顧其用恒在於山高水深風月寂寥之鄉措心立言能自異於童兒女婦者無幾耳自吾去丘壑而吾詩併亡今讀姚君山房集乃知吾所以爲詩失之此而彼得之非果亡也他日從先生長者山水間尚因吾詩以求孟子之所謂詩者其有所得乎䟦六經直音周都官爲汴都賦至使人不能讀雖以樓宣獻公之博洽而爲之音釋其弗知而闕焉者盖多矣嗟乎聲韻母也文字子也子非母不生執其子以求其母而不得乃憧憧如是耶易書詩禮春秋之文昭揭千古學士大夫童而習之非若夫賦汴都者之鉤奇摭隠而使人不得其讀也直音盖舊有其書陳君是編不過蒐其脱遺摘其舛謬爲力亦易耳雖然不能讀汴都賦何害六經之書一失其讀則二三聖人傳心之奥㫖經世之大務所賴以存者幾希矣夫使之日星垂而江漢流者陳君是編不有助乎方之樓公竭精憊神於魚蟲石樹之細者不又有間乎然予聞有直音有反切反切之法本於西土今譯人所用二合字是也陳君目是編曰直音而兼用反切者盖變例也誠懼夫音之未易以直盡也是抑可尚也䟦竹靜齋記竹植物非動物宜若静矣夫一寸之萌至於劍㧞十尋而上者氣化而形生之也是果能離夫動耶乃若其初則固靜矣翾飛跂行未有不本於静者豈惟竹然耶夫知竹之爲静未若夫未始有竹之爲静也方其未始有竹也猶未能忘乎静也是故竹物也動静境也物我混融境智㝠合則静且不有而况於竹耶世盖有執昔人之言而求太極於梅枝者矣先生獨於竹乎若有見焉是非善觀物而不物於物者耶欲知先生者固不必以竹求先生也書呉善父哀辭後右呉善父先生哀辭永康胡氏穆仲作始予未識先生得先生所爲詩而讀之其氣盈而不肆志伏而不折言無縁飾而忠厚惻怛之意躍如也私心慕焉元貞丙申秋予游僊華寶掌間因得拜先生浦陽江上先生顧予喜曰吾二十年擇交江南有友二人焉曰方君韶父曰謝君臯父今臯父已矣子乃能從吾㳺乎子其遂爲吾忘年交予謝不敢先生盖予大父行也然自是間歲輙一再㑹㑹則必歡欣交通如果忘年者先生間爲予上下古今人物使審所擇而尚友焉先生之心其有望於予者哉大徳庚子秋有越客道浦陽境上謂予先生且死已而知其妄也厥明年某月或又謂先生死矣予不敢即哭盖猶幾其爲越人之傳也旣閲月而韶父之子育以訃至育先生婿也嗚呼先生真死矣先生之先處州人由大父婿龍川陳氏故又爲婺之永康人先生嘗以父任入官仕未顯而所爲要以直遂其志中歲頗慕管㓜安陶淵明之爲人因自放山水間時與畸人静者探幽發奇以泄其羈孤感欝之思遇意所不釋或望天末流涕其所居室扁曰愚隠先生古冠服不妄笑言樵兒牧䜿或戲紿之先生不疑欺我不知者以先生誠愚也晚乃取古所謂全而歸之者自號全歸子云先生死時年六十有四嗚呼先生之壽不必滿於徳而其存逺矣志不必究於物而其行得矣稽其存不可謂夭徵其行不可謂窮先生雖死何憾矣顧天之所以佑善人者君子恒若以爲歉焉此哀辭之所爲作也先生之死予旣哭之以詩故弗復為辭以相之始追叙疇昔以志予感愴之私云爾䟦李北海永康帖宣和内府所蔵李公十帖此其一也今人徃徃喜效李書而罕得見其真蹟余幸獲見之而又不能學安得相求而適相值哉題黄給事山居圖予讀紹興正論小傳未甞不三復而悲之方秦檜起勢立威小不附者輙欲寘之死地而忠鯁之風不為少衰嗚呼何其盛也然皆僅足以掇禍固莫有得行其言者嗚呼又何不幸耶獨故給事中黄公居殿院時䟽檜姦狀檜由是去相位使當時聽言類如此正論可無作矣他日檜卒用公卒斥我瞻四方蹙蹙靡所騁嗚呼悲夫公之去也屏居海外馬秦﨩上蒼崖崛起長風怒濤中覽是圖猶想見其孤標峻節當與之並存於天壤間也書石曼卿館直詩後曼卿仕凡再入館康定二年二月四日以祕閣校理卒於官距作此卷時厪四浹旬耳安知非曼卿絶筆耶嗚呼曼卿之卓然不可朽固不必在是歐陽子所謂軒昻磊落突兀峥嶸者覽卷猶可槩見也䟦蘇公父子墨迹右文安黃門二帖所言皆私家細事至煩碎而靡宻無足深論學士大夫相與存而傳之者豈不以其人哉夫不能以古人自任千載自期而欲恃區區之文墨以爲不朽者可以慨然於此矣䟦東坡贈巢三詩右蘇文忠公墨跡上有秦熺私印盖其家藏舊物也章蔡秦氏父子人品無大相逺或與公同時而不相容或異世而相慕愛之如此談者類以爲公論須乆而後定豈不然者䟦山谷贈元大師詩元符二年公在戎州有寄題祖元大師此君軒詩明年公自戎州放還以十二月抵江安又明年是爲建中靖國元年公以正月發江安元師自榮州來送之故有是作其詩今載别集中而蜀刻小本以爲祖無大師盖傳録者以元爲无故又譌而爲無幸真迹尚在可證其誤也䟦崇國公墓誌銘宋宗室崇國公墓誌銘翰林學士鄭居中撰知淮陽軍米芾書今題曰元章真蹟者世知寶愛其書而已夫以公胄系之貴爵秩之尊子孫又衆多且光顯若是而今無稱焉獨賴此書爲好事者所存傳而不廢故其官伐世序猶可考見嗚呼士君子所恃以不朽者書云乎哉書先聖先賢圖賛後右孔子并七十二弟子像上有宋髙宗賛附以尚書左僕射同中書門下平章事秦檜記不知何人書檜所謂搢紳之習或未純乎儒術顧馳騁狙詐權譎之說以徼幸於功利盖指當時言恢復者昔齊襄公復九世之讎春秋大之則夫言恢復者未必與孔子異意也詎可一切以功利目之乎檜作此記時距其卒僅七十六日其罔上誣民之心至死而不已也今其説猶與圖賛並存庸表而出之以俟覽者詳焉䟦朱張二先生帖慶元學禁方厲爲士者至更名他師其問遺尺牘之偶存者未必非毁棄之餘也乃今遂如壁書冡簡復啟其祕是孰使之然耶俗好之向背固足占氣運之盛衰士君子政不當随世爲歆艷簡薄也林生出示所藏朱張二先生墨蹟因書以諗焉記止善集止善集者上虞劉先生自名其所爲書也先生名漢儀字山甫伯氏侍御史忠公以直諫有名宋理宗時爲史嵩之所毒以死其季華文公亦以材爲名監司獨先生用特㤙補官仕稍不顯顧能以道自任旣沒而言立嗚呼何劉氏兄弟之多賢也溍生也後不及拜忠公之子婺州史君而辱與華文公之孫彦徳游獲觀所謂止善集者盖先生之學得於雲源何氏雲源得於建安蔡氏然先生書所述皆其真知實踐不苟牽引取合乎師説世之剽掇近似以資口耳者不可少媿哉表而出之以自警也亦以厲吾徒也題脫鞾返櫂二圖嗚呼古之所以取亡者非一而漢唐之亡獨與宦者之禍爲終始豈不悲哉當理宗時宋祚微矣盧董之憸謀狡智非不能爲甫節士良也衣冠之禍所以未至如建寧太和之烈者夫亦一時之清言勁論有以殺其勢而遏其衝乎故資政殿學士牟公之守姑孰也嘗畫脫鞾返櫂二圖而爲之賛宋臣怒其譏已風臺臣論罷公公去未幾而宋臣輙斥他日公旣召還宋臣亦輙進然竟以公䟽卒不復用君子小人勝敗之機實繫於此是雖若無救於趙氏之亡其遂不亡於二三豎之手者天歟人歟覽是圖者未可第以爲一時之清玩也二圖作於寶祐丙辰後六十年爲今延祐丙辰公之孫溧水教授君更購善工縮圖爲小卷以便觀者且俾其門生黃溍識焉實是歲之九月九日也䟦續歸田賦續歸田賦黃山李先生擬漢張衡之作也衡賦不録於漢史唐李周翰稱衡四十不仕順帝時閹宦用事欲歸田里故作是賦以予考之殆不然也衡事安帝爲郎中太史令永初中謁者僕射劉珍等請衡參論東觀時衡年未四十然則謂衡四十不仕者非也順帝時衡以侍中在帷幄諸侍共讒之衡乃倣離騷賦思𤣥而歸田之遣言寄意無及宦䜿者然則謂衡此賦作於順帝時者又非也盖衡初游京師舉孝亷不行辟公府不就大將軍鄧隲奇其才累召不應賦之所爲作乎衡後由侍中出爲河間相徵拜尚書終其身未始一日歸田也豈衡少作此賦晚復悔之耶今先生年逾七十以郡文學滿三歲解印綬去非效衡爲空言也欲知先生者尚以予言求之書王申伯詩卷後始予弱冠時學爲詩同郡栁道傳王申伯陳茂卿方子踐子發皆以能詩稱者也栁初效粤謝臯羽後自成一家方受學尊父存雅先生而雜出於謝陳與謝不相識乃酷似之獨申伯别出機軸十數年間星離雲散凡予所與游與居而以文字相娯樂者又一時之人物矣延祐庚申秋予忝預校文鄉闈㑹申伯繇閩閫白事中書行署相與握手道舊故出所爲詩如干篇清粹圓美庶幾霜降水涸而涯涘見者於是茂卿死已乆道傳方入爲國子學官子踐兄弟亦遯迹仙華山中不復與世接顧予乃得從申伯相傾倒於邂逅之頃聆其詩豈非所謂跫然之音者耶申伯之子餘慶尤善爲古章句且將小屈蟠以求合有司之繩尺而子發之婿呉萊竟以言春秋取鄉薦抑又一時之人物矣然則予於申伯能勿重跫然之喜耶因泚筆書卷尾以志嵗月書餘姚新學詩後餘姚學正楊君請於府若州撤廟學而新之予友彦實旣爲作記歸美其守長邦人士樂君之志有成而懼來者之弗嗣也復相與播之聲詩以垂無窮之思焉昔者魯修頖宫孔子不書而史克頌之盖美其君而爲之師者弗與也何楊君之得於羣公者閎侈若是哉記春秋之所不書法之變也歌詩人之所不頌情之不可已也情之不可已而至於法之變夫亦禮以義起者也凡礱斵之宻丹黝之麗紀詠備矣故予爲本詩春秋之㫖系之末簡云題徐君行卷人莫不有親也聖賢之於塗人無以異也謂事親必若曽子而後可者盖欲夫人以曽子自爲固非曰曽子爲獨然而人不能皆然也古者比屋可封而人人有士君子之行豈惟曽子然乎予於徐君之事則重有感矣徐君以一文學掾弃官歸養其親時之文人才士相與稱道之不置者得不以其事爲甚高而難行也耶夫以徐君之事爲甚髙難行者非知徐君者也謂徐君爲能然而人不皆然者是厚誣天下之君子也由徐君之道充而至於曽子其可也孝子不匱徐君則庶幾矣景行行止尚奚以多言爲哉記石經漢石經自北齊徙鄴隋復徙長安至唐初已不啻亡其什九而拓本猶藏開元御府由開元迄今六百年石之僅存者不可知拓本之可見者若是而已未知後六百年其存幾何好古博雅之士所宜珍䕶以謹其傳也恭䟦御書奎章閣記石刻天厯二年春三月上肇開奎章閣延登儒流入侍燕間冬十月臣多爾濟作頌以獻至順二年春正月御製閣記成秋某月某甲子大學士泰禧宗禋使臣阿榮傳旨以刻本賜焉臣多爾濟抃蹈而退襲藏惟謹以臣溍待罪太史屬俾紀其嵗月於下方臣竊聞前侍書學士臣集爲臣言皇上以萬幾之暇親灑宸翰書奎章閣記刻寘禁中凡墨本悉識以天厯之寶或加用奎章閣寶應賜者必閣學士畫㫖具成業特詣榻前四復奏然後予之非文學侍從近臣爲上所知遇者未嘗輕畀臣多爾濟當上踐阼之初以保寧等處萬户召對明仁殿持詔發兵河東陜西尋以前鋒迎敵遂廵鎮拊安河南山東又被㫖督諸將平雲南陛辭之日旣賜之弓矢及他服用貴珍之物以重其行逮凱旋而復命也顧以辭藝進而特預是賜殊常之恩夐絶前比兹盖時清主聖弛武而隆文示之意嚮以風厲於四方將使中林兎罝之士莫不鼓舞變化於雲漢昭回之下甚盛徳也一嚬一笑豈虛乎哉臣多爾濟以周通之才出入文武動恊上意抑可謂不辱君賜矣臣是用備著之若夫天縱聖能心畫超詣有非疏賤下愚所得而窺測者不敢賛一辭也跋李西臺書考亭朱子與尤公延之評西臺書足以見前軰不務爲苟同洪公景盧旣不敢可否於其間樓公大防又不過署氏名而已後學尚何言哉跋晝錦堂詩祁國杜公草書晝錦堂詩紹興間嘗歸之内府詩中適有御名故刋去之然此字本韓氏家諱而祁公用之不疑古人臨文不諱之意尚可見也跋韓令公真贊居士集此贊末句作丞相魏公按公以嘉祐八年封衛國公治平二年迺進封魏贊作於元年之八月曰魏公者蓋後人追改之幸真跡尚存可考也跋黃希明字説易大象離之體十有六或爲火或爲電獨離晉明夷四體爲日大明日也故傳不曰日而皆謂之明用易者之於日取其明而已然予觀易之稱名取類也不一晉之彖象同稱明出地上而彖言麗乎大明者明在彼也象言自昭明徳者明在我也新安黃君名晉而字希明夫希之爲言觀也慕也惟無慕其在彼而觀其在我者焉斯有以合其明矣君以字説來求予題識其後乃爲本諸易而申言之如此云書肯齋李公遺墨後賈傅以喪師去國朝士中與之不合者或從而追數其罪以爲可殺及得一郡而去則賣降恐後君子恥之李公本以忤賈一斥十年其復官進職起師長沙賈已在謫籍雖力詆之孰曰不然而公此帖顧謂入謝表啟只須引咎不可怨尤至其盡瘁事國視死如歸英風偉烈乃如此孔子曰君子欲訥於言而敏於行又曰有言者不必有徳豈非然哉讀譚汝楫傳予乆留京師竊觀四方之士論述時人行事未有若豫章王武所譔譚汝楫傳使人讀之而不厭者豈武之文爲可尚哉亦汝楫之事有足稱道故武得以馳騁其筆力如此爾昔歐陽子爲桑懌傳謂司馬遷所書皆偉烈奇節士怪今人如遷所書者少疑遷特雄文善壯其説古人未必然及得懌事乃知遷書不誣今人固有而不盡知也夫以汝楫前後捕執大盗百三十有五人旣已無愧於懌矣然懌惟以交趾獠叛嘗被命一往殺之而汝楫連引兵攻徭賊手射殺其酋又縱兵殱其衆而生致其酋六十一人九洞悉平其討叛黎也與主帥分軍鼎立以相掎角而獨擊敗賊數千人又以偏師突賊圍拔其守將曁麾下十九人而乘勝斬首四十一級他奇謀㒞功有未易遽數者視懌爲孰多乎至其以寡敵衆往往挾數十騎出入賊衆三五萬人中子戰殁而弗顧人馬俱中流矢身被七十一創而戰益力及救兵不至潰圍而出猶反弓射殺數人爲事蓋有甚難而其所遇與懌甚不同也然懌與汝楫崎嶇簿尉間名位畧等懌以吏匿其閥用例得兵馬監押而汝楫亦牽於吏議功狀乆格不下隨牒調補邊郡録事判官兹非有志之士所爲太息流涕者耶嗟夫使汝楫與歐陽子生同時宜愈信遷書之不誣而懌不得專美矣世無歐陽子而使武得著録其事汝楫倘藉是而有見於世復何憾歟庸表而出之以俟後之秉史筆者跋荆公帖廣漢張子言公書如大忙中冩新安朱子以爲切中其病而又謂先君喜學公書今觀此帖風神閒逸韻度清美臨學之家宜有取焉評書者未可以彼而廢此也跋米元暉帖翟耆年伯壽好古博雅君子也元暉因伯壽識桂勛而傳其術則勛之爲術精矣不知今亦有傳其術者乎跋宋諸公遺墨淳化閣帖張華桓温王導王敦四丞相並居晉人之首而總題曰名臣法帖蓋特取其翰墨之工而於人品之邪正有不暇計也此帖自范歐陽司馬氏下至章蔡凡十人皆宋宰執人品不同而同爲一卷者豈亦閣帖舊法乎卷中一帖不書名而標其旁曰宋宣公恐是宋宣獻耳題呉興趙公書洛神賦此趙公被㫖書寶陀寺碑時所寫公是行遇暴風昌國鉅海中舟垂覆而免殊不以爲意方且游戲翰墨及乎屏翳收風川后靜波之句豈非善謔者哉即此亦足以觀其雅量矣跋平雲南頌右平雲南頌亞中大夫保寧等處萬户舒嚕公多爾濟作初文宗皇帝以南詔弗靖師乆無功特命公往督諸將深入叛境殄其兇渠餘黨悉平公旣凱旋入奏因作頌以進仍録其副而傳焉今上皇帝謀元帥俾坐鎮西南夷而廷臣無以易公於是距公之作頌蓋已十年朝廷清明逺人嚮化兵寢不用四方無虞乆矣公下車之日宜用昔人銘燕然故事勒諸堅珉以宣皇威於遐方萬里之外然則此卷豈直可傳於學士大夫而已哉書唐誥後右唐誥逸其首尾姓名以石刻完本考之則顔公真卿也始比公山濤叔孫通者公嘗爲吏部尚書大厯十四年代宗崩而公爲禮儀使也其後公以直不見容於楊炎換太子少師猶領禮儀使者徳宗嗣位之明年改元建中其年八月遙尊母沈氏爲皇太后時也故事置使必因事乃置事已輙罷公之爲使不以一事者若韋縚之在開元以禮儀使而掌五禮也凡制勅冊命皆出於中書是時郭子儀官中書令而不預省事楊炎同中書門下平章事而官門下侍郎惟舍人于邵獨在中書起草署行者邵也新史邵本傳稱邵以諫議大夫知制誥進禮部侍郎而不言其爲中書舍人者意必以舍人秩卑於諌議而畧之也其用吏部尚書吿身印者尚書實承而行之官尚書省者之氏名石刻猶可見也就其可知者疏之如此其殘脱而不可知者不敢以臆説參焉亦闕疑之義也題東坡臨鍾繇書古者臨書多取其意而不專求其形似予所見唐人臨二王書無不然非獨蘇公此帖爲然也今之善爲形似者可謂極天下之工矣豈古今之智巧未足以臻此耶記水樂亭詩東陽婺大縣爲長吏者恒憚其不易治若唐于君興宗宋王君鮑君極率以暇日寓情山水間苟非能使政平訟理而田里安於無事雖窮觀游之美誰與樂此然則地固未必難治獨患夫吏之知以簡易爲治者少也王君爲縣在熈寧時嘗從賓寮登西峴山作亭泉上名水樂眉山二蘇公咸爲賦詩亭旣廢好事者或以其詩刻寘杭之南山水樂洞猶存其舊題曰東陽云天厯二年秋某月今縣尹趙侯某始即其故處作新亭且買石復刻詩亭中侯之爲治不煩而餘力之所及亦可槩見矣視前人何歉乎輙爲志其嵗月於下方庶後之從政者有取焉跋米南宫帖元章負其才氣傲睨一世而推服道祖如此道祖之爲人可知也世徒以其善書並稱之曰米薛而此帖無一語及之則其可推服者豈直翰墨之工而已題雲山圖予不解畫凡古今名筆皆莫識其所以爲工近留南屏積雨彌月遙望羣峯隠見於煙雲杳靄間倐忽之頃變幻百出宛然他日畫中所見乃知良工之意匠真能窺造化之妙者昔人誦杜子美夜深殿突兀以爲親涉其境始悟爲佳句豈虚言哉先世墓銘後記右墓誌銘二通前銘黃夫人宗氏於溍爲七世祖妣實故京城留守兼開封尹贈觀文殿學士忠簡公澤之從妹作銘者夫人之姪潁忠簡子也忠簡薨於汴數日將士去者十五汴人以潁嘗居戎幕得士卒心相率言於朝請以繼其父任時已除杜充留守乃以潁直秘閣爲其判官尋與充議不合去秦檜枋國李泰發參政得罪貶潁坐貽泰發書有忽聞逺適豈勝惶駭等語降三官銘作於檜死之月曰右朝奉大夫者其元官也又兩月遂爲兵部郎中終其官後銘居士黃公夫人第三子是爲溍之六世祖公第二子諱紹祖則溍之五世祖也作銘者公之甥喻良能前銘叙女適喻葆光者其父也以子貴累贈中散大夫子男五人皆黃氏出而其四人俱以文章知名良倚良能同擢紹興丁丑第良材國子進士良弼國學進士龍川陳先生稱烏傷四君子叔奇者良能字季直者良弼字其二人則何恪茂恭陳炳徳先也良能仕於朝嘗以太常丞兼權工部郎官積階朝議大夫爵義烏縣開國男有香山集行於世而此銘不載集中居士樂府蓋題秦檜所建太平樓佞臣謂檜也公沒迨今百四十有五年遺文皆散落惟所賦樂府猶爲人所傳誦溍嘗訪求得他詩文與樂府合五千餘言第爲三卷間又從宗氏得此二銘謹録而蔵之併記其後庶來者有考也先居士樂府後記右居士公題太平樓滿庭芳即誌銘稱公所作樂府也舊傳樓秦檜所建按宋史紹興五年五月神武中軍統制楊沂中發卒輦恠石寘太平樓殿中侍御史張絢劾奏其事沂中坐罰金是時檜已去相位則樓之建當在檜秉政初曁檜再相和議成日使士人歌誦太平中興之美樂府所爲作也時檜命察事卒數百游市中聞言其姦者輙捕送大理獄殺之上書言朝政例貶萬里外忠正之士多避山林間公亦歸隠不復出矣溍旣録二銘并以公樂府及何公茂恭跋文附見其左茂恭蓋龍川先生所謂四君子者而龍川茂恭兄子壻也跋景傳遺文嗚呼此景傳絶筆也予尚忍言之哉景傳長予十五嵗與予爲忘年交而其子克讓予壻也景傳始屬疾陰陽家爭來言所穿新井不利景傳曰死生有命井非所獲罪也皆謝遣之時克讓方從予鄞江上於是有待汝不歸我行有程之語克讓旣歸則又有忍死待兒而兒歸之語嗚呼予尚忍言之哉景傳之先有爲邵州新化縣主簿者仕稍不顯主簿君之父篤厚長者宗忠簡公父事之其殁也公實銘其墓逮景傳之尊府君希聲先生遂以文學爲後進師而景傳負其不羈之才浮游物表人見其寓笑扵文字間類若依隠玩世至於死生之際處之裕如合乎聖賢之學而出乎性命之正者人固未或能知之也其季景宗朝出畊夜歸讀古人書薄已而厚物近乎昔之獨行君子者予尤畏慕焉景傳謂克讓汝非季父不立汝非外舅不成嗚呼景宗視克讓蓋猶予也而景傳望予之厚如此予亦安能有以慰景傳於地下而尚忍言之哉景傳之死予旣無隻字以爲之銘又無片辭以爲之誄姑輯其遺言録而蔵諸以示無忘或者克讓因是尚有警也跋景傳新店彎詩新店彎在諸曁東北三十里景傳十八年間凡三題詩頃予忝佐景州以故事謁郡府道過其處覽最後所題嵗月蓋余以督運吏居鄞時景傳攜其子克讓來爲予壻嘗寓宿於此也追計之已六年而景傳與予永訣者亦四年因次其韻以志存殁之感今相距又五年矣偶閲舊槀不勝愴然輙録爲二通一以授克讓蔵於家一以寄新店主人俾附後題之末跋張監丞代祀虞帝廟詩有虞氏距今三千餘年廟而祀之蓋非一日張侯將上指以香幣走祠下遽能致其昭受而響答此皆聖神在御徳恊古先故其感孚有同符契張侯固若無所容其力矣雖然君猶天也其徳有不可名言者是以昔之詩人歌祭祀之盛惟美夫駿奔顯相而已張侯駿奔顯相之功不旣多乎播之頌聲亦清廟詩人之意也覽者盍以是觀焉書王氏忠孝堂記後僕所居里於漢爲烏傷縣蓋秦人顔君以孝稱負土𦵏其親而羣烏銜土以助之烏吻皆傷故曰烏傷其後有宗公澤宋元祐進士靖康時守磁州高宗以親王北使過磁公力止之朝廷尋以爲天下兵馬大元帥而公爲副元帥遂建中天之業公以京城留守殁於汴諡曰忠簡縣人至今奉公與顔君合祠於學官號其堂曰忠孝云夫以數萬家之邑上下幾二千年乃得此兩人其子孫或不克大振或已泯絶無聞若潼川王氏萃忠孝之名於一門而嗣人又能侈大之俾彌乆勿墜雖晉卞氏不得專美於前吾鄉先哲固有所弗如也因觀侍講虞公所撰王氏忠孝堂記輙識其賛美之私於篇末焉跋劉聲之詩僕年二十餘識聲之先生於錢唐時聲之方以經學教授媿莫能執弟子禮後因讀周官將質所疑於聲之而聲之已死今年秋始獲觀其門人瞿君士宏所集遺文凡如干篇劉君師魯實序其首於是聲之同時軰流人物凋落殆盡與聲之游最乆而兄事聲之者今唯師魯而已士宏得師魯以爲聲之不朽之託尚何憾哉獨惜其所纂録殊有未備以僕所蔵聲之遺墨校之集所不載者五七言古律詩猶十有二首輙書而歸之俾寘卷中僕所弗及知者固不止此也聲之之子某能保其父書先王之大經大法見於論著必尚有可徵者士宏其合而傳之述作之家或有取焉跋俞好問記外家遺事記外家遺事者前有陶公淵明後有蘓公子瞻朱公元晦皆旣沒而言立故其傳至今俞君好問以外孫記沈君遺事而不能必其如昔人之傳與否是以汲汲焉有求於人而託之以傳四十年間所得前朝故老若一時公卿顯人之文數十通好問今年七十有六而求之不厭雖以某之蒙陋晚出亦將使附氏名其末欲報之徳昊天罔極凱風寒泉之思詎有旣乎沈君約已裕物爲善而未始近名傳不傳於沈君何失得竊獨感好問之爲足以厲薄俗而有功於名教甚大故弗辭而爲之書題觳觫圖客有持觳觫圖過予者作而言曰漁陽嚴君大徳中由殿中知班爲川州判官州有屠牛者詐爲病牛詣州上狀君臨視之則牛自其家逸出昻首屈膝望君悲鳴若有所訴蓋牝牛始孕不病也迺按治屠者罪牛母子獲全今所畫騎而立者嚴君也持文書跪牛前屠者也右顧受屠者文書若擁跪者後趨騎者旁君所從吏卒也其事亦異矣里父老旣爲之圖且率士友爲賦詩竊妄意太史氏辱爲之叙余聞昔有以詩遺史官願書桃花犬事者有識之士或譏之曰史官書事無大於此犬者乎觀嚴君之愛物而其仁民爲可知固不必計夫牛之異可與桃花犬比否也序而歸之覽者尚無誚焉書趙繼清詩集後延祐初予以非才叨綴末第浮沈州縣十有六年晚通朝籍乃與繼清相見京師追數慈㤙舊題升沈存殁殆相半不能不爲之永嘅於是吾同年之在朝行至大官者凡若干人入則奉宴間退又各有事乎其職業獨繼清方侍班而予以卑官備員冗從得以暇日數過繼清繼清亦大出平生所爲詩文相與誦咏之以爲樂余毎愛其詩極清婉而骨氣森然評者但美其不事雕飾殊不知吾繼清非復異時東塗西抹乆矣居亡何而繼清隨牒調補一縣去臨分握手於繼清之詩未及改評姑故識嵗月以道其離合之思云耳跋進學工程易曰君子進徳修業欲及時也記誦辭章云乎哉記誦辭章末矣後生小子猶有廢而弗事者程君敬叔排年工程之書所爲作也敬叔以文學行誼髙一時其傳蓋本於考亭門人㬊氏進修之功不必盡出是書夫亦度中人以下所可企及姑爲是以誘掖之云爾古者大學之道比年入學中年考校一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達强立而不反謂之大成即其排年之功程也學者苟能因今人之所可及而求古人之所必至敬叔將於是書之外有私淑艾焉行逺自邇登髙自卑在乎勉之而已跋胡氏家蔵公牘予家蔵先世以京削外改時舉主五員照牒皆有奏撿而此悉無之不知偶失之邪例無之邪凡自判司簿尉關陞須舉主三員其舉堪充縣令者謂之令狀右選中乃得以校尉徑舉縣令又不限所舉員數觀此亦足識當時故事也跋蘭亭五字損本宋景定咸淳間賈氏枋國定武舊刻流落人間者鮮不以資其清玩嘗俾其客廖寺丞參較諸本異同擇其字之尤精善者輯成一帖命婺之良工王用和刻之經年乃就尋補用和勇爵以酬其勞其石後歸京師今在故執政呉公家此本有悦生印必嘗備選擇者可寶也跋蘓黄二公帖蘓帖稱元鈞殿院者吕陶元鈞也陶起進士累遷司門郎中哲宗即位拜殿中侍御史朱光庭時爲左司諫奏翰林學士蘓軾撰館職䇿題譏議先烈乞正其罪陶亦奏軾素疾程頥光庭爲頥報怨此洛蜀二黨所由分也蓋蘓與吕俱眉州人云黃帖不著稱謂莫知以災去職者爲誰當别考也跋晦菴先生帖右朱文公先生與侍郎馬公十一帖先生以淳熈八年冬爲浙東常平使者九年知累疏劾知台州唐公仲友而唐公亦自訴於朝丞相王文定公與唐公居同里且有連頗陰右之亟俾以江西憲節而去先生抗章不已乃罷唐公新任而以先生填其闕先生以爲蹊牛奪田三尺童子知其不可力辭不赴改江東又不赴乞祠而歸十四年秋復命先生代馬公持江西憲節未赴而十五年夏五月去相位六月先生入對除兵部郎官以林侍郎栗論奏有旨仍赴江西竟辭避不赴帖中雖謂馬公爲交代而實未嘗交承也先生旣用磨勘轉官除職予祠尋召入主管西太一宫兼崇政殿説書未及上俄俾以秘閣修撰奉外祠前兩帖結銜稱朝奉郎主管嵩山崇福宫方辭論撰而未允也逮得㫖依所乞仍舊職且降詔褒諭次兩帖迺以直寶文閣入銜帖中云所請亦幸開允更被褒詔是也又其次兩帖止稱階官貼職者時已有旨起先生將漕江東即帖中云不知除授所由者先生方授辭故祠官使職悉不以繫銜也婺相蓋指文定所謂邪説姦心陰自憑結廟社之靈實紏殛之者言若有激恐未必專以前事爲憾也此六帖皆在十六年夏秋之間最後兩帖一稱權發遣漳州事在紹熈元年春一稱秘閣修撰主管鴻慶宫在其二年秋餘三帖則問眷請委之副楮也先生文集所載尺牘分時事出處問答三門共四十卷而此諸帖皆不見集中謹備著其嵗月庶俟采録以補闕逸云爾跋淳熈名公帖異時士大夫尺牘往還稱謂封題咸有定式文雖涉太繁然其貴而不倨卑而不詘亦有足觀者焉此四十七帖自宰執侍從庶僚至於京官選人總二十有四其交際之間流風遺俗猶可槩見也跋綦毋潜詩唐綦毋詩見於殷璠所序河岳英靈集者六篇而璠獨稱其題鶴林松覆山殿冷不可多得題靈隠塔影掛清漢鐘聲和白雲歴代未有龍興在呉中與兩山相望不逺此詩必一時之作豈璠偶遺之耶抑其去取或自有意也因觀間上人所刻墨本輙識其末以俟覽者詳焉題真文忠公小像溍嘗從仇仁父先生觀此卷於金陵今二十又六年重觀於京師寓舍撫嵗月之逾邁慨前修之渺然景行行止無以多言爲也書仙都王公遺墨後碩畫仙都王公手書孔明見先主下至冦凖出師澶淵凡九事號曰碩畫公之以古人自任不輕矣公伯氏魯國文定公事宋孝宗持政枋者十有五年其功烈在史氏而公廑宰百里未及大有設施以殁尚頼此書之存其志猶可槩見公之子是爲魯齋先生以授其猶子且謂或有發揮於後者今故家日益凋落而王氏子孫以材自見列於仕籍者斑斑相望魯齋之待於其後者宜不乏人公之遺志將有託以不墜手澤在焉非直記事纂言而已與仲子書魯齋先生學爲世師其承傳之自夫人能推言之而其得於父兄培植之素以爲受道之地者世或莫之知也夫以公間生之質又蚤有志於學家庭之間於一言一動之細猶諄諄吿誡使致其謹如此蒙以養正聖功也安可忽哉今之顔狀嬰孩言談性命者觀此帖可以自警矣跋葉南康遺墨學必有師觀南康史君葉公銘俞先生墓其本末源流可見矣今去公僅六十年新學小生往往務求名位尊顯爲人望所屬而能相引重者稱以爲師習俗之不古甚矣覽此銘不少媿哉讀蘓御史奏藁伯修三爲御史在中臺僅四閲月而章四十五上自聖躬至於朝廷政令稽古禮文閭閻幽隠苟有關乎大體繫乎得失知無不言尤以進賢退不肖爲急所劾五人皆權要所舉百有九人則世臣耆徳與一時之名流而於外官下吏草澤之士有弗遺也竊惟國家稽古建官擇正人㑭司風紀固將使分别忠邪而爲之進退今臺司計簿毎嵗最其以甚罪坐免官若干人以微文抵吏議若干人而以亷能見識察者無幾意以爲世道衰薄故賢者寡不肖者衆而未敢必其然頃因發䇿上庠嘗以爲問諸生咸莫知所對兹獲觀伯修奏章始知天下未始乏材特患夫司黜陟之柄者好出聲威以立名譽一有所引重輙以附麗爲嫌而止是以斥棄常多甄拔常少也雖然陽城居諫官七年視伯修爲已乆所論唯陸贄裴延齡兩人視伯修則已畧而又不能如伯修得行其言非城之賢不逮伯修蓋伯修遭逢盛際與城所遇之時有不同也昔之序名臣奏議者不專以盡言爲功而獨以聽納觀人主之徳豈不然哉跋項可立序舊仲舉家故官族四世祖謝公廓然仕宋孝宗時爲名執政仲舉以世殊事異淪落不偶變姓名食於一技人莫識也可立以家世之契且有連獨識之邂逅逆旅中旣與之飲酒又爲文與之序舊士大夫始知仲舉本閥閱子弟稍加禮遇焉可立爲誼則厚矣亦豈仲舉之志哉予觀昔之隠者往往混迹庸衆人之間要以自全而已近世所謂髙人逸士身居物表而名聲常赫然諸公貴人之右其智顧出仲舉下何耶予固非敢謂仲舉爲賢於今之髙人逸士竊獨因世道之不古而於仲舉之事重有感也然則可立之文曷宜無傳乎跋致慤亭紀詠梁棣州之先大夫秘監公作亭祖墓之側以爲嵗時汛掃饋奠之所名之曰致慤按商人之詩稱綏我思成而不言所以思成之道記禮者始發其義以爲致慤則著蓋少威儀之謂慤有合乎商之質禮以質爲本兹其所以能思成歟墓祭固以義起禮而公之名其亭則可謂知禮之本者矣夫至哀無文至敬不飾墟墓之間至哀也偶人象馬雕刻如生不已文乎宗廟之間至敬也一宫三室施以采繢不已飾乎文飾盛而哀敬衰是則公昭示後人使無忘其本之意也孔子之先實商人其嘗而奉薦也慤雖子貢猶疑焉去聖日逺安知不有致疑於公名亭之義者誠不宜無述也凡記載序録賦詠總若干首棣州旣輯成巨編以某嘗託年家之契復㑭題識其末如此跋何節婦詩僕舊聞曽大父戸部府君倅呉時永康何公以閣職導㫖樞庭奉詔察訪江淮招集射陽湖流民道過呉興戸部府君慷慨劇論時事竟夕而别未幾丞相呉許公去國言者希㫖目公爲丞相黨人戸部府君亦坐與丞相兄厚善奉祠而去僕與何氏故契家也節婦吕氏之夫實都承公之子僕以契家居同郡而莫能知之僕誠鄙人哉若都承公兄弟材猷之美業履之盛與節婦父母家衣冠奕葉望扵一鄉則僕知之乆矣節婦之能以義自守皆家庭濡染之素與閭巷之間砥行立名者固自不侔竊意節婦方以不得終事其所天爲大戚諸公顧以有司之所旌異動色相慶而永歌之不知果出於節婦之所願欲否也謹附氏名卷末以志其媿而質其疑焉書曽氏家譜後韓魏公有言謹家諜而不忘乎先塋者孝之大也家諜之不謹祖先文字之不傳欲究其宅兆而嚴事之其可得乎贑人曽魯卿於少師文清公爲六世孫官游南海上最乆一旦歸而理其先墓之尚存者復其墓田之奪於豪右者奉其墓祭之廢不舉者凡以家諜之未墜猶有可考見也魏公之言豈非信然哉夫以魏公精搜博訪僅能推及先塋之八世而止今魯卿所譜至於十有八世墓在州里者亦十有三所雖魏公弗如也魯卿之友著作郎麥君出示此譜因識卷末惟爾後人克謹其傳焉跋思親堂記思親堂者廬陵彭氏兄弟登其親之堂而思慕之不忘故以爲名堂非以思親而作也則凡可以寓其思者奚獨斯堂哉竊意其布武而前必曰此吾親所行之庭也拾級而上必曰此吾親所歴之階也入而窺其奥必又曰此吾親所居之室也不寧惟是至於盤杆几杖物噐之微苟傳蔵而不廢者必曰此吾親氣澤之所存也是宜於目觸心接無不託以寓其思亦無時而不思豈必當祭而齋始思其居處如記禮者之云乎雖然此猶其末耳身也者父母之遺體也不辱其身不羞其親可謂孝矣人莫不有親也而不能人人皆爲孝子者弗思而已能致思焉則一舉足而不敢忘父母矣一出言而不敢忘父母矣彭氏之季曰斗字宗建者乆遊京師示予以堂記求申其説宗建之去斯堂也旣日以逺敢吿以近取諸身而廣其爲思之義云跋思存堂記新安呉氏之先墓是爲存山即其冡舍作堂曰思存盖因其山之名以名其堂庸寓夫事亡如事存之意云謂之思存者其存與否視夫思與弗思而已祭義曰齋之日思其居處思其笑語思其志意思其所樂思其所嗜又曰祭之日入室僾然必有見乎位周旋出戸肅然必有聞乎其容聲出户而聽愾然必有聞乎其歎息之聲此言將祭而齋當齋而思如其親之存焉詩所謂綏我思成孔子所謂以時思之者其思有時也若夫知事君不忠之非孝則言必思忠知涖官不敬之非孝則事必思敬知居處不荘之非孝則色必思温貌必思恭仁人孝子之不忍死其親固無時而弗思其親之沒而不亡者亦無時而弗存不必齋明盛服以承祭祀然後見夫如在其上如在其左右也輙以臨川先生之記斯堂者申言之如此呉氏之嗣人何日而忘之哉跋奉先堂記奉先堂者廣平趙君家祭之堂也古者大夫士之家皆有廟庶人無廟則祭於寢三代而下廟制廢已乆則凡可以致力於其親者宜無不得爲矧今之堂非古之廟而所謂祭者直薦而已是固無害於禮亦何憚而不爲乎人不能爲而趙君獨爲之諸公之所稱述未可謂溢美也庸表而出之以風於有田禄而儉其親者焉跋和靖先生帖東坡謂先生書似李西臺西臺書蓋屢見之而先生書顧不多見山陰僧舍有先生所書詩數十首多集中所無此帖字畫與之正同可寶也跋誠悦堂記濟南程侯子敬敭歷州縣間治行甚著旣而棄官歸養其母廬陵王君吾素與侯有雅故又與侯之子益同在史館爲名其所居之堂曰誠悦且作文以記之蓋治民本乎事親而悦親本乎誠身其説具於孟子之書記不釋其義而獨稱侯政事之美者因末以見其本也夫善言理者必有徵於事是以君子言貴乎有物苟徒𠞰取昔人之成説而侈爲空言將焉用之覽此記者由其仁民愛物之功而得其誠身悦親之實斯可爲知言者矣跋常掾平反序晉寧府掾常元亨從其推官劉君慮囚稷山有張甲者坐殺兄獄具已乆元亨閲其牘知有寃白於劉君直而出之劉君深服其詳敏自以位卑莫克論薦迺序其事而傳焉漢史稱于公爲東海郡决曹决獄平顧其可見者獨孝婦不殺姑一事耳而太守不能聽至令抱具獄哭而去嗟乎婦之不殺姑與弟之不殺兄事正相類元亨能爲于公之所不能爲者非元亨之才有大過於于公蓋其所遇不同也然則劉君賢於昔之爲太守者逺矣劉君方居北門握史筆倘因撰述而有所登載亦足以見當今吏稱其職而天下無寃民前代所不及也安可以爲小善而略之哉跋臨汝記臨汝記者前進士楊舟爲江西行中書掾申屠子迪作也撫州民呉甲以貲致身郡吏又欲援其子乙領臨汝書院錢榖計山長萬士元持不可甲怒假他事属郡倅廷辱之士元不能堪歸自剄而不殊乙遽來受事士元益痛憤引刀絶吭而死士元無子唯一力甲欲㓕其口復假他事㑭有司逮繫之諸生皆駭散鄰僧収士元尸而瘞焉乙後自陳考滿挾憲府公牒於堂補儒學官子迪時爲都曹掾按儒臺故牘得士元死與乙受事月日白其狀罷遣之且爲文弔祭士元御史來監洽者欲爲乙地而莫能奪其議也子迪旣調官去乙得行其計遂取臨江儒學録其在臨江數自警謂萬山長至云凡舟之記亡慮二千言其大略如此嗟乎向使士元死而事覺子迪得閲其獄暴殺人者罪而誅之則記之所述宜有大於此者顧以嵗月相去已乆且㑹赦故所記止是予所以哀士元之死悲子迪之志爲之掩卷而太息也輙刪其要而論著於篇書申屠公墓表後孔子之贊易蓋曰善不積不足以成名又曰積善之家必有餘慶而孟子論君子之澤直斷以五世嗟乎名之成否慶之有餘不足亦視夫善之積與不積何如耳子子孫孫勿替引之雖百世可也内翰臨川呉先生旣以善人表申屠公之墓且登載其爲善之迹甚具人知公之無媿於其名而不知公以考城君爲之父御史君爲之子諸孫又往往能以材自見而致顯融於時所積之厚非一世矣公之名則以暴著餘慶之未艾詎易量哉繼述之善是在後人庸志諸下方以俟跋蘭亭序呉興公臨禊帖予所見亡慮數十本此其最佳者然嘗觀唐馮承素所臨極蕭散朴拙殊與此不類好事者能合而求其同則王氏筆意所在可得矣跋御書明良二大字皇上在宥天下端拱無爲清間之燕時游心於藝事雲章奎畫夐出前古帝王之上而臣下罕有獲拜賜者惟翰林學士承㫖開府儀同三司扎拉爾公以開國元勲之胄世長宿衛清忠粹徳簡在帝心親御翰墨書明良二大字以賜焉仍命公因以爲字臣溍忝以非才載筆從公之後公出以示臣㑭志於下方臣竊惟君尊臣卑者分之殊休戚同之其體則一是故舜之作歌臯陶之賡載皆取諸人之身而以元首股肱爲喻元首之明君徳也股肱之良臣道也合明良之二言以爲賜而因以字之於以表君臣之一體也非世家重臣與國同休戚者何以堪此乎雖然舜臯陶之賡歌所謂元首明哉股肱良哉者臣之良由君之明也武丁之命説所謂股肱惟人良臣惟聖者君之聖由臣之良也然則公之圖爲補報者宜何如哉臣不佞不敢徒以公衣被昭囘之光侈爲一時之榮遇而獨以大人之事君者有望於公罔㑭昔賢專美於前也跋御書慶壽二大字今上皇帝改元至正之明年翰林學士臣多爾濟巴勒嘗一日侍燕間於宣文閣上親御翰墨作慶夀兩大字以賜焉後七年臣溍以非才待罪翰林臣多爾濟巴勒由遼陽行中書省平章政事入爲中政使出以示臣㑭謹志之臣欽惟皇帝陛下以天縱之多能聖學之餘事形於心畫如雲漢之昭回在上非下土愚臣所得而窺測然竊聞之皇極五福以夀爲先兆民所賴一人之慶夫以勲賢貴胄爲國世臣錫之睂夀以保其家宜也乃若推廣上㤙均慶於下使八荒之臣同躋夀域豈非所謂彰君之賜乎臣於名言之所不及者旣不敢強賛一辭而屬望之私有不容自已者謹以志於下方跋御賜永懷二字文皇以萬幾之暇游心藝事神文聖筆冠絶古今間嘗以佩刀刻蘆菔根作永懷二字亦妙具乎八法因摸爲墨本以賜近臣今翰林學士承㫖哈喇巴圗爾時方以禮部尚書入侍燕間與被是賜襲蔵已乆恐人無知者出以示臣某㑭志於下方臣竊惟永懷之義猶大雅之詩所謂永言孝思也昔周成王剪桐葉爲圭徒以實其戲言而上之孝思造次不忘乎聖念度越三代之人主逺矣後之史臣宜有述焉跋袁翰林鹵簿詩昔我世祖皇帝肇建太室武宗皇帝始親祼獻逮英宗皇帝乃行時享之禮而備鹵簿之儀蓋太平極盛之際也翰林直學士致仕袁公時爲祕書監著作郎寫以爲詩使窮鄉下士一覽觀焉如身在輦轂之下而覩熈朝之彌文何其幸歟漢應劭唐王象皆有鹵簿圖宋王欽若有鹵簿記三卷宋綬増爲七卷後累増爲三十三卷公乃括以六百言曲盡其鋪張之妙亦奇矣詩曰雖無老成人尚有典型安可忽諸跋武學博士朱公誥宋理宗開慶元年七月故敷文閣學士朱公由史館校勘授武學博士我曽大父戸部府君由通判慶元軍府事授武學諭實與公並命後九十年是爲今至正九年乃獲觀公曽孫業所述公年譜誤以武學爲太學謹録當時所被吿詞歸之以補其闕而訂其偽跋王江州誥右王江州誥詞中書舍人樓鑰行宋三百年吾烏傷第進士者實始於王氏皇祐癸巳則㤙陽令固紹聖甲戌則知福州贈正議大夫永年福州之孫寅乃弗取世科而用蔭入官歷守七郡其以朝請大夫知江州則慶元元年正月也凡州郡守臣差則出勅除則給誥而誥必有褒詞故尤以爲榮江州之七世從孫褘從予游京師予因閲官書於史局得此誥詞録而歸之以備其家乘之闕文跋危公墓誌銘宋崇寧選人七階判司簿尉爲迪功修職郎有舉主三員則闗陞令禄即從政郎也自從政四遷至承直郎是爲兩使職官留守判官猶是選人有舉主五員則班引而改合入官以職事官改者則吏部具鈔外改則免班引改官後例差作縣謂之須入若他有除擢而理爲須入則免作縣也危公已自從政兩遷至文林故超授通直郎蓋迪功而上則改京官文林而上則改陞朝官謂之合入通直乃其合入之官仁和赤縣故公以陞朝官知其縣事也若夫所謂轉官者又與改官不同京官以上四年一磨勘轉至前行正郎止待制以上六年一轉至諫議大夫止之類是也因陳君論誌銘誤以改官爲轉官以知縣爲縣令謹考舊制附見於後云跋宋諸公遺墨右宋人尺牘十有二凡十人雷知院孝友宇文簽樞紹節同事茂陵而呉節使瓌憲聖猶子曽開府覿夀皇潜邸舊人此卷先執政從官次宗戚近臣以及庶僚而不復計其時軰之後先又以蔡尚書㓜學爲中書故亦寘於鄭侍郎作肅之後贉卷紙有小墨印曰臣陳瑾重背造是必嘗歸於祕府矣此十人者不皆以善書自名當時相去又未乆不知何以貴重之如此徐君於六十年後得之五千里外豈不可爲奇玩也哉跋宋兩朝遺墨二首理宗與賈似道書右宋理宗付賈似道親筆按續通鑑長編景定三年二月丁亥朔李松夀來納欵上諭宰執曰情偽難憑又曰切須審處似道當與之要約如能歸漣海之地方可取信十二日戊戌都省言漣海已遂収復而新史歸地在二十四日庚戌乃因李直是日有建節封王之命而連書之耳璮即松夀也此親筆以初十日午時下曰來意真確又曰不可失信必在已要約之後未歸地之前蓋是月之初十日丙申故事禁中處分事付外謂之内批又謂之御筆皆内夫人代書而所謂御寶批者或上批或内夫人批皆用御寶惟親筆則上親書押字不必用寶璮之去就事繫機宻上不批示外廷而獨以親筆付似道故正史及他傳記皆無所登載庸考次月日以備闕文度宗與賈似道書右宋度宗答賈似道手書命之曰師相而不名體貌之至矣其稱謂之過雖見譏於史氏若夫實藉鈞庇伏丐鈞照等語如士庶之施於敵已者君臣之分幾於盡廢此紙流落人間乃搜訪之所不及是以史氏無譏焉孰知夫禮先亡而國隨之非細故也庸表而出之以俟後之秉筆者焉跋米元章書蘭亭序臨禊帖者得其貌似優孟之效孫叔敖也得其意似魯男子之學栁下惠也世所傳三米蘭亭乃是以右軍書摸勒上石此則元章臨右軍書貌不必同意無少異可寶也跋傅氏所受誥命溍八嵗入學受書於傅先生後七十年乃辱與先生從孫藻游因獲觀其先世所被誥命蓋修職郎致仕思聰於先生爲曽大父迪功郎致仕大中於先生爲大父修職故有官以長子時中得觧而加封其第二子即迪功亦以長子奎得觧而受封迪功第四子翼則先生之父藻之曽大父也傅氏世業儒異時甞有第進士者僅霑一命而止先生之上世又皆以慶典推㤙懷才而不試藻妙齡秀發委祉所及將於是乎在先生名肖説字商佐云跋金縢圖尚書正義分金縢一篇爲四節呉郡顔直之用龍眠遺法書其本文而畫其所書以爲此圖其所書蓋第二節之冊祝第三節之卜吉祝與卜同在一時篇終所記乃後來事故略而弗及也經文可見者植璧秉珪啟籥納冊而已此圖於鼎爼樽爵豆籩筐篚之屬靡所不備亦畫家以意爲之而曲盡其形容耳跋方承奉墓誌銘承奉方公大冶丞諱應龍之父也虞公與大冶俱嘉定癸未進士故承奉之沒虞公爲銘其墓因及吾邑諸同年景雲者朱公元龍字元齡者樓公大年字處善者龔公應之也龔公以經義受知穆陵歴踐清要官至右史終於中大夫直寶謨閣朱公由宗正丞兼樞宻院檢詳諸房文字左司郎官國史院編修官實録院檢討官累遷知台州虞公由尚右郎官兼國史院編修官實録院檢討官累遷知瑞州樓公亦以吉州倅攝郡事入爲提領戸部犒賞所正管文字惟大冶先已有官鎻應換授僅得一階未及陞改而以選人先其父卒人莫不悼惜焉後虞公作銘一百有四年是爲今至正十二年大冶曽孫道禪以嵗乆銘文失其傳來訪於某謹録而歸之跋歐陽文忠公帖右歐陽文忠公帖奉職者公第十三姪與其弟十四郎名皆未詳帖中云十四郎自縣中來三班奉職右選卑官必爲監當於一縣也公以皇祐四年三月丁鄭夫人憂五年八月自潁歸𦵏於吉而此帖作於是年之正月蓋因遣人求墓誌而附致之也别一帖云只十六程可到必潁之鄰郡但墓誌不傳莫詳所稱知府舍人爲誰或誚公不當言官職難得只教以修天爵奉天職可也伏觀此帖雖不據古經傳爲無髙論而勸戒之辭真切懇到出於至誠與家人語當如是也蘓文忠公嘗跋公與十二姪司理等帖云凡人勉强於外何所不至惟考之其私乃見真偽此歐陽公與其弟姪家書也又云聞公之子季黙編公牋牘爲一集此數帖尤有益於世當録以寄季黙蘓公真知言哉跋乾淳四賢墨蹟朱文公與大愚帖淳熈丙申公用執政薦除祕書郎而羣小問之尋降御批曰引虛名之士恐壞朝廷公亦辭不拜且有與東萊書時公新作草堂於雲谷以待來學故帖中云諸况已具恭兄書中腐儒之效如此豈復敢有傳道授業之意但欲杜門念咎以畢餘生也公以六月辭除命七月不允再辭十月乃奉祠崇道故帖中云一請往來動踰兩月也大愚任四明倉曹在壬寅冬距公之得祠首尾七年帖中稱之曰監倉者必作於其需次之時也張宣公與東萊帖乾道辛夘春詔以知閤門事張説簽書樞宻院事公時以左司兼侍講手䟽極言其不可命中寢而宰相陰主之乃出公守袁州壬辰春遂伸説前命帖中云元晦之約竟能成否宜春在來年六月若不被汰斥果成赴上則明秋可邀二兄過彼相㑹然公自去國退居三年袁州之闕竟不及赴淳熈甲午乃起帥廣西東萊以正字丁外艱是年夏服除奉崇道祠秋入越故帖中稱之曰主管正字且問其留㑹稽幾日公作此帖於冬初廣西之命蓋未下也吕成公與某少卿帖少卿莫詳爲誰公以宣教郎繫銜者帖作於乾道辛夘七月改京官以後九月除館職以前也吕忠公與石應之帖應之名宗昭越之石氏東萊門人公作此帖於紹熈甲寅之正月云妹子姻事嵗晚已畢而同月有祭妹文則作此帖之日妹猶無恙也帖中後一段蓋應之哭内已乆故公欲其得賢配爲内助而公有女將適其子故帖中云此自君家事累紙叨怛近於强聒又云然渠成亦秦之利也其稱應之曰正字者應之乾道壬辰乙科進士至是已餘二十年必召試入館也書曽大父代朱簽判作啟劄後遯山朱公蚤從我曽大父户部府君逰户部府君奇其才以仲弟望江令之女歸焉公年二十有六擢龍飛乙科初筮處之幕職祗事伊始例修竿牘之敬自通於臺閫守倅交代同僚皆户部府君爲之具槀蓋以文爲贄在盛時固有之其爲禮之煩苛則至季世而極重緘疉幅累百千言間有以一二聫援据之功偶儷之工而被知遇者精搜巧琢尤不敢率易焉場屋之士甫就選調門無食客佐其操觚染翰鮮不資於父兄師友渡江後名公别集所載可見也逮今盛時風俗復還於淳古上下之交際以實而不以文公雖勞神州縣垂三十年莫有責以向來煩苛之禮者矣自公得謝而終老於家又不啻四十年當時故事有後人耳目所不及接者焉溍近因裒輯户部府君遺文而得此槀凡爲啟劄總若干通輙録以授公之孫濓㑭謹蔵之濓篤於學而酷嗜爲古文若無用此爲或者觀其舊俗而有以騐今昔質文之異尚也跋跋唐臨王右軍二帖右唐臨王右軍二帖其精詣如此而不著臨者氏名蓋當時士大夫類能書非獨二三鉅公顯人爲可傳也跋東坡臨明逺帖古人臨書不求形似而能得其遺意今則愈工愈不近也好事者盍於此帖乎觀之跋泰山碑泰山碑字多磨滅唯二世詔粗完嶧山碑亦有此詔蓋當時欲使來者知石刻是始皇帝所爲故皆刻此詔於其後也跋嶧山碑歐陽公謂嶧山無此碑觀杜子美贈李潮詩則歐陽公之前無此碑已乆新齋李公嘗以模本刻于金陵郡學其石今亦弗存此是徐鼎臣模刻舊本可寶也跋館本十七帖唐貞觀元年詔京官職事五品以上子嗜書者二十四人隸宏文館習書出禁中法書以授之尋又置搨書三人此館本之始也開元六年命整理御府古今工書鍾王等蹟得一千五百一十巻視貞觀時無所増成龍朔三年􅏻進館内法書至九百四十九卷然則當時館本必不止十七帖此十七帖特以世所共傳而其後有勅勒充館本故名之曰館本十七帖耳巻尾有僧權二字不完是梁之徐僧權云跋唐御史臺精舍記漢史列傳具載包咸劉淑檀敷李充所立精舍而唐御史臺精舍史缺弗録蓋彼四人者皆以講授諸生此則以奉浮屠氏故畧之耳幸有此碑可存當時故事也跋李西臺書涪翁稱西臺書出羣拔萃膳不剩肉如美女豐肌而神氣清秀但恨摹手失其筆意耳今獲觀此真迹而窺見其筆意寧復有涪翁之遺恨乎跋林和靖詩予嘗見先生手書詩一巻多集中所不載此三詩則皆有之而亦不盡同竊意集中是後人改定也跋范文正公書伯夷頌范文正公爲蘓才翁書伯夷頌後有秦㑹之太師賈師憲太傅兩人圖記宋南渡後此巻必流落江左而嘗入其家至李侯戡得之於燕則宋亡之明年也范氏所居近在呉中兩人不能舉而歸之卒有待於李侯而公之子孫乃獲敬受寶蔵焉豈偶然哉蓋自西方兵寢不用公歸而均逸外藩因得以暇日游心於藝事才翁善書而深服公楷法之妙求公寫乾卦而公以字數多眼力不逮故爲寫此頌巻末第云書法亦要切磋未是處無惜賜教而已後來一二大老乃推廣其説謂公書此實爲天下萬世綱常計至哉言乎末學之士毋庸贅述也跋范文正公與尹舍人帖尹公自謂與范公義兼師友而其言談罕及於性命至尹公處死生之變尤人所難能非知道者不足以與於此蓋是時風俗醇厚士大夫多不言而躬行未至立名字以相高此宋三百年極盛之際也伏觀范公遺帖安得不爲之撫巻而三歎乎跋徐州鹿鳴燕詩序此叙視東坡先生集所載少六字不同者十三字按先生以嘉祐元年舉進士此巻云嘉祐之初而集中作嘉祐之末幸真蹟尚存可正傳刻之誤也跋東坡書秦少游龍井題名元豐元年東坡先生謫黃州少㳺以二年秋至龍井三年秋先生乃爲書此題名而記其後言與兒子邁棹小舟至赤壁西望武昌山谷喬木蒼然雲濤際天而先生作赤壁賦則五年之秋冬也溍兒時即能誦少㳺題名不意垂老獲見先生真蹟因考其嵗月而謹志之跋黙成潘公帖考亭朱子稱公所居僅庇風雨郭外無尺寸之田經界法行獨以丘墓之寄輸帛數尺而已此帖所言歷仕二十六年無一畆可耕一椽可居是也朱子文謂公前後在官不過八百六十餘日然則二十六年之中所歴實不滿今之一考俸賜蓋亦無幾宜其清苦貧約也吾鄉先達貴而能貧者惟公及徐文清公而公之襟度尤爲灑落嗚呼賢哉跋靜修先生遺墨某弱冠時甞手鈔靜修先生丁亥集悉能成誦後五十餘年始從汝南張君獲覩先生遺墨蓋君之先大父受業先生之門故先生書此以授之其言小學書不取鄧伯道朱夀昌事善發明朱子言外之意某旣得以快覩前修之真蹟又有以竊窺先儒之微㫖抑何幸歟跋翠巖畫先生盛年客於信國趙公頗欲以奇偉非常之功自見遭值聖時海宇爲一老無所用浮湛俗間其胷中之磊落軒昻峥嶸突兀者時時發見於筆墨之所及後生小子乃欲一切律以尋常書畫之品式宜其傳於世者少也某以大徳戊戌春見先生於錢唐今已五十年因觀先生所爲孟浩然詩意圖聊識其後云跋趙魏公書歐陽氏八法近世錢唐金氏一之以善爲歐書得名曁趙魏公出學者爭慕效焉歐學遂廢而不知公之教子實用其八法頼此帖故存本末源流尚可考也雖然梓匠輪輿能與人以規矩不能使人巧父子不傳之妙必有出於此帖之外者矣臨學之家宜深造而自得焉跋錢翼之千文呉興趙公早年學書用工至精宻迨其得於心而應於手縱横曲折無不如意之所欲出以公之學名其家者務於速成往往摹倣公暮年所書而求其形似如不由其户而欲升其堂入其室也得公之用功精宻又參以古人而别出新意自爲一家如吾翼之者殊不多見此巻千文四體皆其得意書尤不易得今翼之已不可作而有子能傳其業亦以予言爲然否乎跋餘姚海隄記書叙禹之治水備著其濬導之功孟子亦稱禹䟽九河瀹濟漯決汝漢排淮泗其於海惟曰入於海注之海而已蓋至此無所復用其力是以太史公河渠有書班孟堅溝洫有志至於海則存而不論也餘姚居天下之東南而地訖於海居人數有海患其故爲縣時宋慶厯間知縣事謝景初嘗爲隄二萬八千尺慶元間知縣事施宿嘗爲隄四萬二千尺而其中爲石隄者五千七百尺其用力於海皆古所未及可謂難矣國初易縣爲州四十餘年而葉君恒來爲其州判官所作石隄以尺計者前後總二萬四千二百二十五視前人不愈難哉先儒胡文昭公毎以經義治事分齋教學者所治之事水利其一也自世儒務爲髙論而不屑意於事爲之末或者遂指經義爲無用之言以相詬病亦已乆矣君以經義釋褐入官而善於治事至於水利亦能用力於古所未及大書深刻登載已詳今獨推其能爲人之難能者由其知先儒爲學之道而經義之果不爲空言也跋南豐曽公諡文定覆議宋制文臣光禄大夫武臣節度使以上法當定諡者皆太常博士議之考功郎中覆之乃以上於朝而降勅紹興初欲旌死節之臣始有賜諡徑令中書舍人行詞給吿太常考功咸不與焉由是應得諡者亦援以爲比乾道末臣寮言其非故事而申明之淳熈中遂詔特命諡者竝經有司議定取旨出勅曽公官止四品因鄉郡之請而賜諡其議於太常覆於考功者用近制也然其發揚褒美雖書贊之辭殆不是過豈以降勅給吿爲輕重哉劉公自嘉熈戊戌訖淳祐壬寅凡兩兼考功又真除員外郎不知此議作於何時今言者方建白重修宋史考其嵗月上之有司以補曽公列傳之闕可也書賈氏家譜後宋南渡後婺之東陽第進士者自蘭隰賈公始公諱廷佐字子野父奉直公用故宰相魏國文元公恩補官而公自真定還居東陽家譜幸完可考縣志載公爲刪定官以忤秦檜去國而公主桐盧簿時乞罷和議三書皆缺弗録人無得而傳焉檜㑭其君稱藩於敵國史諱不書但謂之和而臣僚章奏如忠簡胡公所謂朝廷宰執盡爲陪臣者自不可掩公書亦曰陛下爲敵國諸侯臣爲敵國陪屬與忠簡不謀同辭尤可見當時事實初非過爲是激切之言也夫和者東都盛時嘗以施於隣國何獨紹興之事能使人感憤若是乎詔諭之使受書之禮蓋不止形於空言矣予友呉正傳爲公畫贊叙謂言一至此其君所不能堪是猶以史氏所諱而疑其言之過於激切也正傳又謂世知有忠簡之書而不知有公嗚呼自古忠正之士危言讜議湮沒無傳者豈獨公哉公之所言則有足徵者不可使終無傳也庸因正傳所序而備論之以俟著述之家訪問焉書葉信公年譜後宋制文臣少卿監武臣正刺史以上在先朝薨卒者實録内例有附傳國史列傳之所本也今言者方建白重修宋史而丞相信國葉公之薨在徳祐失國後三年無附傳之可据某嘗過公故第而拜公遺像於甽忠堂退又得故禮部尚書王公所撰公墓誌銘而知公平生大節歴官行事之槩兹獲觀公家所述年譜視墓誌銘爲尤詳竊意當時名卿大夫相繼淪沒於徳祐以後者宜不止公一人未必皆如公之有後而能以儒世其家也文獻之不足徵者旣如彼幸其猶有存者宜謹襲蔵以俟有司之詢訪焉若夫考其時事而著論賛之辭則有秉史筆者在非吾徒所敢知也跋右丞葉公上書副本宋景定甲子秋七月彗出栁詔求直言三學之士皆有書言朝政缺失故尚書右丞葉公李時游京學與同舍生唐棣等八十三人叩閽上書斥言宰臣賈似道專權誤國尤爲剴切似道知奏藁出於公八月令京尹劉良貴捕寘於獄以僣用金飾齋扁爲公罪竄漳州徳祐乙亥似道以喪師謫漳州乃放公自便初世祖皇帝親總六師駐江上而憲宗皇帝奄棄羣臣世祖歸正宸極鄂州圍觧似道方宣撫京湖邀爲已功遂入據相位公書所謂適有天幸克成厥勲是也中原士大夫往往能傳誦之國朝旣取宋至元十四年命御史大夫相威行臺江南訪得公於杭州即以公提舉儒學二十四年尚書省立由提舉召拜左丞尋遷右丞二十八年卒於官東山朱君伯清少與公同師事太學博士施先生南一公之獲罪人莫敢近朱君獨具服食之物遣所親䕶送以行及公居政府士多由公以進公數遣迎致朱君訖謝弗往以布衣終公南去時朱君之子文韶甫七嵗臨别以所上書副本授之文韶襲蔵惟謹迨今八十年莫有知者文韶沒後其子天驥始出以示某㑭志其嵗月於左方以俟秉史筆者采擇焉跋禇河南書兒寛賛子固以此賛與三龕孟法師碑用筆不同定爲河南晚年書碑有嵗月誠可信不疑然石刻視真蹟自不無少異蓋其轉摺精神處有非摹勒之巧所能盡也跋閻立本畫宣和内府所蔵閻相畫三十有二予嘗於故祕書少監吕公家觀其房宿蓋大徳中先朝所賜宣和舊物也今乃獲覩此五星東海徐公謂所見三本皆不逮此則其所畫宜非一本此巻雖無内府印章而徐公在宣和間已鑒定爲真蹟誠可寳矣跋蘭亭圖右蘭亭圖趙千里作永和禊集四十有二人其不見於史傳者世或莫知其姓名千載之下乃有能摹寫其儀刑風度以補史氏之闕者非直可資一時之清玩而已李伯時有觴詠圖好事者已爲刻石以傳此圖纎麗微宻雖有善工亦未易刻尤可貴也題唐臨蘭亭舊見馮承素米禮部及趙魏公所臨禊帖未嘗為苟同今觀此本筆勢翩翩風神秀發又絶異欲取而參較之不能不以四者之難并爲恨也跋晦庵先生帖國朝善書者稱秋磵王公評考亭朱子之書曰道義精華之氣渾渾灝灝自理窟中流出又曰道義之氣葱葱欝欝散於文字間其評書如此則其善書豈直㸃畫之工而已葢自許魏公推明朱學而立其説於學官且用以取士朔南聲教所暨咸知尊信之罔有異辭至其翰墨之妙類以爲儒者細事寘而弗論秋磵公可謂目擊道存者矣道傳赴玉堂之召攜考亭手帖北上玉堂諸老善書如秋磵公者爲不少幸求其試評之跋朱椽辨誣詩卷後人莫不有是非之心充是心也行於朝廷則爲公道發扵士君子則爲公論公道廢而後公論興公論息則天理滅矣敬之以剛直取惄受誣而臺府爲别白是非以昭雪之朝廷之公道行矣奚以士君子之公論爲哉諸公猶嗟嘆之永歌之而不已者非專爲敬之發也葢將使在髙位而無是非之心滅天理窮人欲者聞敬之之事足以戒也敬之之事前序已詳兹故弗論獨論其所以不宜無傳庸俟夫觀人風者焉跋温公通鑑草温公通鑑書晉永昌元年事視此尤爲詳備此特其初藁耳而作字方整未嘗爲縱逸之態其敬慎無所苟如此宜其十有九年始克成書歟今之文人類以敏㨗爲髙貴輕揚而賤持重使温公復生未必能與之追逐也三復之餘唯有掩巻太息而己文獻集卷四
