body:
  text: 文獻集卷六元黃溍撰序送李子貞序始豫忝由進士起而署督運吏數檥舟鄞江上李君子貞時為儒學官方從容揖諸生升降酬酢於俎豆間顧豫冒不測之險躬執賤事日夜與持籌小吏較其錙銖暇日過豫輒為之太息不已後豫秩滿受代去而子貞隨牒逺方為巡官括蒼山中進則降氣卑色以偵伺其上官退則與邏卒同其甘苦於重山密林煙火寂寥之境豫聞之又未嘗不為子貞太息也今年秋相見京師則子貞已改調婺郡文學豫亦承乏教國子于上庠既與子握手道舊故以相慰藉子貞行有日謂豫盍以一言志其别夫任人之道必其材與事稱是以習而安焉然人之才品有萬不齊非有司所能周知也為士而不得守其職業豈獨豫與子貞然哉今天子明聖慎簡輔弼侍從之臣以秉鈞持衡俾吾徒獲返其初服甚幸若夫指道德性命之言為吏議所不急而惟以簿書出納為問此則儒者自失其職業而非有司之過也子貞閲歷之久識量絶人必能舉其職業而不以是瑣瑣者自纍矣豫故婺之諸生也他日歸而從先生長者遊于鄉校觀人才之秀出而樂夫教之成其為慰幸又奚止向之所云而已耶是用弗讓而志其歲月以俟送饒安道序天子之學以教國之貴遊子弟而田里之秀民亦得用舉者受業其間餐錢固不以煩縣官而滿百人輒止後至而久次者必員有闕乃得補其處此今之定制也豫以非才忝預教事饒君安道自臨川攜其子而來既俾奉贄堂上以禮見顧以限於常貟未及執經就列與諸生齒安道告豫將與俱歸家食以需次願得一言為别嗟夫古之秀士升于司徒升于學者皆近在王畿六鄉六遂之中今也乃使之挈挈然亟往亟返五千里不啻何以能無銷沮其志氣乎大學之法當其可之謂時是故人生十三而學樂誦詩舞勺十五而舞象學射御二十而學禮舞大夏今也乃使之曠日以俟逺者或十年近者猶四三年何以開發其聰明而能蚤有知乎國家施教導民之初意宜不若是子所為太息而末如之何也豫聞安道通古醫經而精其術其在京師未始少出以自售徒為其子來耳計其復來豫必已代去而不得與其子卒成師弟子之禮安可無以識其别乎魯人之詩曰無小無大從公于邁鄭人之詩曰一日不見如三月兮蓋未有拒人於五千里外而持以十年之久者雖然此諸侯之學也况天子之學乎幸而有能陳詩以諷于上用古之道變今之法則安道父子之來豫猶及旦夕待也庸識其所望者於羣公贈言之篇端以俟焉東郡志序南山宋公以侍御史致政居滑州滑領二縣而治白馬白馬故東郡地也公暇日閲前史及他傳記得東郡事參以舊聞作東郡志十有六卷屬溍序之溍竊惟昔之言地理者有圖有志圖以知山川形勢地之所生而志以知語言土俗博古久逺之事是以成周之制職方氏掌天下之圖而道地圖以詔王者有土訓之官焉小史掌邦國之志外史掌四方之志而道方志以詔王者有誦訓之官焉凡皆達於朝廷而關於政令不特以資學士大夫之泛覽而已後世列郡或有志無圖或以圖合於志而未嘗領於王官有司率謂非吏議所急漫不加省幸其士之有文學而好事者奮然欲以述作為己任而偏州下邑僻陋之境無故家大老文獻之足徴其書雖粗具而莫能詳核甚者遂缺而弗具儒臣史家卒有所詢訪往往無以應遺文軼事不得附見簡牘之末者多矣况其大者乎滑固名州公又以耆哲為是州之望文獻有足徴者宜其為書纂輯也備考據也精所記人才消長風俗盛衰上可明教化之得失而禆益乎治道古今文華事實沿革之故下可俟采録而垂之無窮豈託於空言以為著述者可同日而語哉溍是用序其大略如此使覽者知是書非獨為一州之榮觀也科名總録序登科有記尚矣而鄉貢之士未有記之者昔未始有而今記之以昔之所取者衆不易殫舉今之所取者寡可以遽數也取之衆則其來也廣取之寡則其擇也精於至廣之中而得其至精者焉則今之上於春官者皆昔之宜登于天府者也况夫或被特恩而躋顯仕為時聞人或由辟舉而能以材自奮可使其氏名無所考見歟鄱陽徐勉之當場屋之初廢褎然偕計吏來京師所謂登科記已不可復續乃會萃國朝凡預鄉薦者之姓名合若干人次第成編號曰總録蓋以士之歌鹿鳴而來亦一時之榮遇非謂祖宗菁莪豐芑之澤為止於是而已也上方宵旰渴士赫然下明詔網羅四方之遺逸豈不以向之待士也使之拘而不得肆卓詭魁傑之彥有夫盡在吾彀中者乎廣求而精擇焉不有得於此必有得於彼矣昔泰山孫明復眉山蘇明允皆嘗試有司不合而以布衣召拜官伊川先生亦以廷試執聞後乃應聘而起詎知今不有其人耶是固不待勉之以傳而勉之此編則不宜無傳也乃弗讓而序焉彭克紹詩序鄱陽彭克紹來京師示豫以其詩曰學餘稿者若干卷豫愛其出新意而不傷於巧未始規規然求古人之形似而不失其髙為之展玩數四叩其家世則故四川制置副使忠烈公其祖也豫竊觀宋之季年疆圉雖日蹙而文武材智之士足任方面之重者未為乏人公又傑出其間而能以竒偉非常之功自奮者也謀人之國者視此為何時而使全軀保妻子之臣得以媒蘖其短一斥而不復廢興存亡固皆夭運抑有人事焉凡公已試之效著於簡册藏之史官者世既莫得而見其平生所韞未克究於設施者史亦莫得而詳也而克紹以異代事頗諱言之蓋自國家臣一四海弛武不用朝野多暇文治日興為士者惟知涵煦德澤而相與詠歌太平之盛欲訪百年之遺事而故老盡矣顧豫與克紹生今無事之時飽食終日而得以文字相娛樂豈非幸歟克紹之詩有吳仲退先生所為序稱之曰竒材而又勉之曰未可以是為足其望克紹厚矣兹不復云送吳生歸黃巖詩序豫觀今之有逺行者無不俯伏伺候以求贈言於先生長者之門得之必動色以喜不得必悵然自失觖望而去古亦有是哉老子云富貴者贈人以財仁人者贈人以言則夫贈言者古有之矣其為言也豈苟然而已乎施之於身則可以成其材而就其實措之於事則可以酬酢萬變而不窮述之於書則可以惠幸乎來者傳曰仁人之言其利溥哉故惟仁者為能贈人以言若夫借齒牙之餘論為之道地使一介疏賤有所引重以取名譽於當時而用瑣材薄技躋攀分寸者亦得侈為榮遇以夸示乎庸人孺子此皆古所無有而今有之非古人不能為是言也有德必有言顧其所言者在彼而不在此耳今也求而得之則喜求之不得則觖望而去果何為者耶惟吳生則不然其為人好修且有文言若不能出諸口與人交乃煦煦有恩意而未嘗欲人之譽已也其來京師受知於侍從近臣而以名聞于天子遂獲齒於國之貴遊子弟及較其藝又數出衆人之右解褐將有日矣未嘗欲以為閭里之榮也今方去而省其親於東南五千里巨海之上懼夫離羣索居無所恃以為善也故欲聞一言於先生長者以自壯其求之也亦異乎人之求之者矣庸以其意題辭篇端庶幾有樂告以仁人之言者焉至於感時物之變遷念川途之修阻苟可託以慰其永懷者亦君子所不廢也送徐生歸吳中序始豫留錢塘辱與豫遊者僅十數人欲相率推豫為之師豫謝不可則皆曰諾而徐生本中以豫與其父有雅故猶執契家子之禮不廢其後十數人者往往取鄉薦或連中甲科或遂魁天下士獨徐生試有司輒不合抱其所著書三十卷來京師宰相有知其人者為言于上乃得與國子齒豫方以非才叨長學官徐生用故事執贄升堂與豫為師弟子之禮豫不容卒辭也亡何徐生謁告歸吳中省其母求豫言以識别豫將何言哉豫聞古之為師者言行而身化之道在我矣視夫不與道合者約之使歸於道焉爾是以善學者必就正於有道善教者不徒勦取前人之成説而瀆告之也苟惟勦取前人之成説而瀆告之則粗通於句讀者無不可以為師而豫向也與徐生為師弟子之禮久矣奚俟今日乎蓋今之為師者曰我之資歷當為是官彼固不得以道責於我也為弟子者曰彼之品秩宜為是官我固不敢以道望於彼也夫如是則徐生雖與豫為師弟子之禮非果以豫能言行而身化之也而豫亦安能言之哉然豫觀徐生所著書類多出於前人之成説無待豫勦取而瀆告之也徐生能不専以資口耳而務躬行焉固非外是而他有所謂道在夫勉之而已尚何言之求哉於其行也姑書此以塞其意昔之同遊者今或仕于京師或官於吳中徐生試以是訊之其以為然乎否乎劉忠公奏議集序嗚呼君子小人之勝敗國家治亂安危繫焉誦其言而欲知其人尚論其世可也宋亡久矣自熙寧而元祐而紹聖而建中靖國姑置勿論故侍御史守戶部侍郎致仕贈中大夫劉忠公之事理宗其處君子小人勝敗之幾者乎初史嵩之以右相出督専務張皇邊事遙制朝廷暨入據相位引援私人布列要途持權自恣益甚言事者有及之輒斥去公為御史彈奏侍從兩制而下九人葉賁以嵩之腹心居言路公不少貸賁左遷而公竟以是去國君子小人之勝敗未分也嵩之父憂起復三學士論沸騰而朝臣率皆瑟縮顧忌噤不敢言能言之者僅數人耳理宗亦患苦嵩之之專而未知所處念公素強直無所附麗可屬任以太常少卿召諌長劉晉之臺臣王瓚胡清獻龔基先皆嵩之所倚以為肘腋亟請寢公新命理宗覽其奏夜出御筆逐四人擢公左司諫未至改侍御史君子小人勝敗之幾至是乃決也公既引見連劾執政金淵從官鄭起潛濮斗南而下八人其言馬光祖奪情總餉實嵩之預為引例之地尤中其姦於是邪黨漸解而理宗猶豫不斷公纍章密奏乞早命相言逾剴切理宗悟嵩之訖不復用此君子小人勝敗之分也夫何國論甫定綱已舉而目未張天不憖遺遽使人懷殄瘁之痛嗚呼悲夫公始在庶僚應詔上書輪對進講隨所開陳咸有補益非徒掇拾細微苟備故事而已前後凡再入臺皆不及兩月盡言無避蹇蹇匪躬至其崇論宏議既已載之國史所不勝書而見于家集者固不宜無傳也公殁逮今垂百年曽孫德輝懼其遺編久且墜軼探舊藏得奏草及經筵所上輯語附以館職䇿總二十有七篇以授溍使志諸篇末庸俟後之秉史筆者他詩文雜著則别集存焉或謂徐元杰以説書入侍語及嵩之事大契埋宗之意晉之瓚等四人急攻元杰理宗悉黜之起復之命亦罷不行傳聞雖異辭實一事也公與元杰之死人皆以為嵩之所毒朝廷獨疑元杰無疾暴亡為興詔獄至公與元杰俱被恤典則同一憫悼之辭殆有深意乎考之內翰程公許所撰墓志既稱公感末疾卒又以與元杰並言且反覆致意于天運人事而嘆世故之不可料其旨微矣疑以傳疑亦史家所當知也故并著之徐氏詠史詩後序孟子曰王者之迹熄而詩亡詩亡然後春秋作蓋古者盛時之為詩薦于郊廟則有以見其盛德陳于朝廷則有以知其政之廢興施於邦國鄉人則出於上而被於下者又有以為教及其衰也先王之政教號令雖不行而流風遺俗有未盡泯是以風雅之變往往陳古以刺今至於王澤竭盡而無餘其詩始不足以使人創艾而興起故曰詩亡聖人不得已因魯史作春秋褒善貶惡以示勸戒是則詩已亡而其可使人創艾興起者賴春秋而猶存也後之君子有作其文則史其義則於春秋無取焉仁人志士覽其事而有慨於心莫不為之發憤一鬱嗟嘆而詠歌之然或因一人或因一事以為言若王仲宣曹子建之於三良張景陽之於二踈謝宣逺之於張子房虞子陽之於霍將軍是己惟左太沖所賦頗及戰國秦漢事未有窮搜極討上下古今備究其得失而無遺者唐之詩人間有興懷陳迹章聯句續至於纍百而止顧其言多卑近徒以資兒童之口耳於名教何預乎蘭溪徐公夙有聞家庭所傳先儒道德性命之説而尤精於史學凡司馬氏資治通鑑所紀君臣事實可以寓褒貶而存勸戒者人為一詩總若干首大義炳然一本乎聖經之旨誠有功於名教者也春秋作於詩之既亡而詩之能使人創艾興起者乃復見于春秋絶筆千百年之後豈非先民性情之正有不亡者存詩與春秋固可迭相為用乎公殁已久仲子津始出其詩求許先生謙張君樞為序以傳不鄙謂某盍為後序某竊觀先師朱子感興之作挈提前史之要領為言至約而有關于名教甚大朱子嘗謂學不可徒博亦不可徑約今之學者不由公之博何以入朱子之約乎是用志諸末簡以驗于同志其亦以為然否公諱銞字秉國其父兄師友源流之懿見於前序者此不具六藝類要後序先王之教內施於國子外被於萬民其教之者有三德三行六德六行之别而均教以六藝為法至詳且密為事至煩且勞而人生其時無弗學焉後世經殘教弛専門之士有不能知其名物而通其意者矣况夫貴遊子弟與凡民哉幸其遺法散見於經傳而雜出於他書後生小子雖以殊時異制不得身習其事猶可誦其言而粗窺其倣佛先儒朱子懼寖逺且益墜爰輯而彚次之以詔于方來其凡目存于小學之書而其𢎞綱大義微文小節悉著於儀禮經傳通解朱子自序禮之通行者及鄉射大射已略見諸篇樂經亡逸遺聲久絶而書數日用所須不可不講取周禮鄭注太史公淮南子前後漢志杜氏通典為鍾律篇取唐開元十二詩譜為詩樂篇取許氏説文解字序説及九章算經為書數篇廢不可考者惟御法而已然其書作於朱子之晚年喪祭二禮既以屬之門人嘗欲請于朝以鍾律别為一書而奏不果上大射而下俱未脫稿書數則闕而弗具朱子之有志而未遂者能無望後之君子起而成之乎此六藝類要之書所為作也某竊觀其所述五禮之義六樂之歌舞五射之法五御之節六書之品九數之計一本諸經而參稽乎傳注史氏百家之説推尋其端緒以廣先儒之未備折衷其抵牾以啓先儒之未發有功于新學固多矣豈徒足為好古博雅之一助哉顧今之為士者類皆慕逺大而忽細微穿穴性命窮極髙深而不察夫制度文為皆聖人精神心術之所寓道之與器未始相離也明先王之所以教而成朱子所欲為之志不在是書乎書凡六卷臨江周氏剛善父述有翰林揭公曼碩與某之同年王君師魯所為序某獨遡其源流之自以為是書實繼先儒而作庶幾同志之士共謹其傳焉霽峰文集序宇宙間清靈秀淑之氣未有積而不發天不能閟藏而復出以為文遭時遇主詠歌帝載黼黻王度則如五緯麗天下燭萬物有目者孰不仰其餘光退而託於空言以俟來哲則如珠捐璧委而輝山媚川終不可掩蓋有得於天者不必皆有合於人顯晦雖係乎時天之所不能閟藏者人亦不能閟藏之也此理之所必至夫何疑焉寧海為縣在東南斗絶處其地多連山穹林而大海距其前清靈秀淑之所聚至是而止瑰偉之士隨所受之豐嗇發而為文或簡雅而峻潔或博贍而𢎞麗往往各名其家霽峰李先生則並遊乎英傑之林而以才自奮於其間者也先生年甫弱冠從流寓之士試藝漕闈籝糧笥書而來者以萬計先生微見所長輒為其第一暨登名於天府筮仕於邊邦則國步己蹙運去祚移杖䇿東還屏迹海上簞瓢晏如垂將兩紀達官貴人有知先生者強起而致之京師先生因作大都賦以進一時館閣諸公咸共嘆賞交薦于上擢教授杭學而其賦遂為人所傳誦先生後由杭學遷教授臨江尋以黃巖州判官致其事竟不及以崇論宏議施於大撰著由是學士大夫靡得而稱焉然先生嘗上書闕下懇懇數千言所陳六事皆有關於政理格不行而其稿具存他歌詩古文下至近世駢儷之語筆勢橫放如懸河注水愈出而不竭與夫屑屑然刻雕藻飾以求工於片言隻字者固自不侔也延祐初朝廷設科取士溍以非材叨預薦書先生實預秉文衡後十有五年而先生以髙夀終又十有五年某亦以年逾六十上謝事之請歸休于田里先生之季子栗始裒輯遺文詮次為二十卷俾某序之豈非顯晦有時天所不能閟藏者人亦莫得而閟藏也哉昔揚子雲以奏賦受知當時為郎給事黃門而子雲之意本欲以文章成名於後世太玄法言所由作也子雲殁既久法言乃行玄猶不顯學者苟徒誦先生之賦而挹其膏馥以為希世資身之助何以異於向之知子雲者乎必也即其閟藏於昔而顯於今者盡大觀而無憾則先生之為言可得而知矣先生諱洧孫字甫山世系年夀卒葬某既志于墓上兹不復云吳正傳文集序某竊聞昔人之論文率謂文主於氣氣命於志志立於學者也蓋三代而下騷人墨客以才驅氣駕而為文驕氣盈則其言必肆而失於誕吝氣歉則其言必苟而流於諂譬如一元之運百物生焉觀其榮耀銷落而氣之屈伸可知也惟夫學足以輔其志志足以御其氣者氣和而聲和故其形於言也粹然一出於正兹其所以信於今而貽於後歟若吾亡友吳正傳氏可謂有志之士矣正傳自羈丱知學即善記覽工辭章才思涌溢亹亹不巳時出為歌詩尤清俊麗逸人多誦稱之弱冠因閲西山真氏遺書乃幡然有志於為己之學刮摩淬礪日長月益訖為醇儒初紫陽朱子之門人髙第曰勉齋黃氏自黃氏四傳曰北山何氏魯齋王氏仁山金氏白雲許氏皆婺人正傳金氏里中子不及受業其門而耳濡目染其微詞奧義於遺編之中間以質於許氏而悉究其旨趣是以近世言理學者婺為最盛然自何氏以來並髙蹈逺引遺榮弗居正傳生今聖時值文運之聿興始以才自奮浮沉常調幾二十年所至能使政平訟理民安其業取知上官用薦者通朝籍同志之士方相與慶幸國人有所矜式俄以憂去尋移疾上休致之請遂不起惜夫所試者小不得盡展其志之所欲為可以信今而貽後者獨其文而已正傳既以道自任晚益邃於文剖悉之精援據之博議論之公視古人可無愧其所推明者無非紫陽朱子之學其好已之道勝則昌黎韓子之志也正傳冡子深前卒仲子沈裒其詩文彚次成若干卷以授某曰先人所與遊相知之深而居相近者多已凋謝而執事與東陽張君獨存先人之葬張君已揭表於墓道惟是家集宜有序以傳非執事將誰屬某不敢以不敏辭謹考論其師友源流之懿使覽者知正傳之文非徒以才驅而氣駕其夙知而莫成由其有志以基之而又能成之以學也正傳諱師道延祐辛酉進士調髙郵丞歷寧國録事遷建德尹入教國子由助教為博士以奉議大夫中書禮部郎中致其事制下正傳已卒他所著有某書若干卷某書若干卷不在集中送索御史詩序至順紀元之冬今監察御史索公以史館掌故久次進職編摩而某忝繇常調供奉詞林簉屬史氏與公為同僚命同日下明年夏又同扈蹕上京公自處清約介焉特立若不可犯中實樂易色溫而氣夷然亦未嘗見其苟於言笑深切敬畏之無何而公用辟舉入臺後十有闕年遂持部使者節分按浙河之東某方倦遊不俟引年預請納祿而歸實受廛於屬郡辱公臨貺者再握手道舊故殊欵洽今年春公以御史召赴闕士之見知於公者相率賦詩以道其繾綣之意俾某序於篇端蓋古者臺諫異官御史主分察六司百僚巡按郡縣而糾其過失凡刑獄功賞選補出納朝儀祭祀燕會之事咸涖焉若夫侍從贊相規諌諷諭則諌官之職也我朝不設諌官而臺諫之任悉歸於御史今之視昔其責不已重乎以陽公城之行誼范公仲淹之材且賢而為諫官韓退之歐陽永叔猶疑其失職或著論以譏之或貽書以誚之逮其上疏伏閣力爭國家大事皆人所難言乃卒以諌顯然後知其始所以不言者不欲徒為細碎姑以塞責也於是退之永叔又從而推述稱揚之豈非要其終而服其識大體乎方今治化休明羣臣遵法澤及黎庶海宇乂安固非有闕政之可議主上不自神聖每懷兢業虗心納采片言不遺念公久於馳驅而熟於當世之務擢置左右寄以耳目竊計公之從容獻替苟涉於國家大事必能極陳人之所難言至於本正而末治綱舉而目張振風紀飭憲度以舉其職業直易易耳使退之永叔復生何以致其愛助乎他日聞朝廷有骨鯁之臣天子有從諌如流之美某雖衰退無從載筆立公下風而頌歌明良相逢之盛猶可與田夫野老蹈詠太平於畎畝之中也庸因序詩而并及其屬望之私焉送周明府詩序古之作史者必為循吏立傳漢西京二百年間傳所書僅六人蓋才難自古而然尤難得者循吏也皇元統一函夏吾烏傷領於職方逾七十年某生乎其時而獲事其大夫之賢者固多求可擬於古循吏者清江周侯其庶幾乎先是為政者務以平易近民或奉贄納謁以自通皆弗之拒習為故常人不訝也侯至一切峻却之是可謂之亷矣而世未嘗乏亷吏也異時屢建局以核田糧而隱匿飛并之弊有未盡革侯始令民得自實且躬任其鈎考之勞一無所憚期月而簿書井井有條愚民無知喜爭豪猾之徒誘使相告訐而陰持其豫奪之柄以為利事未竟家已破而猶弗悟侯遇其有所赴訴悉委曲譬曉調護而遣之去負其不直者悉皆慙伏悔罪詘者以信部使者郡長吏數委以鄰境之疑獄及纍歲不決之訟侯折以片言人莫不服其明允官府既以無事用其餘力大治土木營尉廨葺儒黌創常平義倉而分貯公私之榖以實其中完舊益新百廢具舉是可謂之能矣而世未嘗乏能吏也惟夫所居民富所去見思至於生為立祠樹碑廪廪庶幾循吏之遺風乃絶無僅有者也而况漢之循吏皆郡國二千石今也以百里之邑而得一循吏焉不愈難哉侯書滿解印綬行有日吾黨之士各賦詩以道其戀慕之私俾某序于篇首侯初由湖北海南憲掾入湖南廣西帥幕以招兩江叛蠻有功超擢宣閫都司歷江東劇郡元僚績用甚著其來烏傷治行為諸邑最憲府方交章列薦于中朝行嚮用矣輒因序詩而附見侯行事之大略俟他日傳循吏者采擇焉送慈溪沈教諭詩序鄞沈君久遊金華部使者薦其材于宣閫署慈溪縣學教諭其行也金華之鄉先生士友咸為賦詩而屬豫序之昔者河南二程子沒門人各尊其所聞各行其所知人自為學至考亭朱子出而集其大成程子之道賴以復明然學術之散未有甚于此時者永嘉之經制永康之事功姑置勿論臨川陸氏與朱氏並以性理為學而其為説莫適相通雖鵝湖之會終不能挈而合之也言陸氏之學者以慈溪楊文元公鄞袁正憲公父子為巨擘士生其鄉知有陸氏而已宗正少卿黃公亦慈溪人始以朱子之學倡於其間而務以躬行為本其大意謂陸氏以簡易自髙而以支離病朱子是徒見其窮探極討為説之詳似乎支離而不知真修實踐所守之約固未嘗不簡易也使宗卿與文元生同時寧不足發鵝湖所未決之餘論乎國朝承平日久治教休明建學立師設科取士悉主於朱子之説至是而鄞慈溪之士於朱子之書莫不家傳人誦之沈君在金華嘗登許先生益之之門而卒業於吳君正傳其所受實朱子之學今去而涖教事又適在文元宗卿鄉邑夫學術之分合重事也為師儒者所宜盡心焉故豫於其行舉以告之乃若山水遊觀之樂交朋離别之思已具於篇什作者之意不待序而可見也贈余生詩序昔西山蔡氏善言地理先師朱子有取焉而朱子之門不必人人皆西山也蓋地術者之事以儒者而兼通其説特博聞多學之一端耳曷嘗以是為學者所急乎後生小子羣居終日視記誦詞章為不足為而獨以不知地理為恥探竒勦説憑虗造言人自為家務以取勝俗習所尚相師成風抑又西山氏所未有也觀其記辨馳騁出人意表誠若可喜是以孝子慈孫甘受其欺而曽不悟反疑術者未睹此祕往往委已以聽焉甚者闕變置百年之丘壟使先世體魄不得寧於地下有人心者所不忍言豫之病此久矣故先人之葬凡擇地一付之術者士友或來咎豫不學地理而輕信人言且為圖説以見告其圖則一岡一阜悉加以醜穢之名其説則旁引曲譬抑揚開闔詭怪莫測每更端必助以嗟哉悲夫可為太息流涕等語大抵皆場屋中譁世之浮詞豫固已厭其強聒逮今十有五年其説迄無所驗而術者之言可徴不誣豫於是益信地理果非學者所急欲擇地但當擇術者而已蘭溪余生今之所謂術者而樂交於吾徒持所得贈言若干篇求豫為之序豫方懼書生以遊談亂其術余生乃不自以其術為可恃欲藉諸公之餘論以收名定價於一時豈亦未能免俗乎余生誠能益進於其術而無速於自售俟有如西山者出徐起而就正焉彼沾沾動其喙者將自息矣余生之術不患其不行也鄙野之言不足序作者之意同志之士倘有槩於心乎師友集序師友集者張君伯雨所得名公贈言及倡酬之作也伯雨之生去宋季未久其大父漳州通守公雅不欲諸孫豢於貴驕而縱為異時華靡遨放事延儒先以為師教之甚篤而伯雨特聰悟爽朗頴出不羣丱歲即務記覽弄翰為詞章方是時前朝遺老宿儒魁士猶有存者數百年之文獻賴以不墜然皆尊其所聞人自為學未嘗凌髙厲空併為一談以事苟同伯雨覿其光儀而聆其緒論如企嵩岱而得其髙臨河海而得其大且深佩服之素固非一日年運而往諸老相繼淪謝伯雨乃以壯盛時去為黃冠師間出而觀國之光屬當文明之代一時鴻生碩望文學侍從之臣方相與鎔金鑄辭著為訓典播為頌歌以鋪張太平雍熙之盛伯雨周旋其間又皆與之相接以粲然之文如塤嗚而箎應也逮伯雨倦遊而歸入山益深入林益密並遊之英俊多已零落而伯雨亦老矣後生晚出如春華夕秀竒采遞發欲一經伯雨之品題者無不挾所長以為贄而伯雨皆莫之拒雖細弗遺宜其所積之富如此嗟夫伯雨負其超邁卓絶之材不徒有聞於家庭而脫落綺紈之習遂能遺世獨立周覽六合必欲盡大觀而無憾其髙風雅致固可槩見也雖然四十年間氣運有升降人物有盛衰而文章之變化與之相為無窮述作之家尚有考焉詩文總若干篇其次第不係乎齒爵位望而一以歲月為後先方外一二士既編輯而校讎之復俾某為之序而刻置伯雨所居靈石山之登善菴某之鄙陋言不足以盡意序續集者寧不為之畢其説乎紀夢詩序自先王夢祲之法不傳後世史家所紀夢之竒驗可徴不誣者固多而人莫不有夢不必皆可驗於事也重紀至元之元年春豫忝以非材備員國子學官其年秋校文上京夜夢觀新進士上謝恩表褎然出班前立者諸生痕都斯坦其氏拜珠其名明善其字也豫既竣事而歸則聞明善已預在京薦名既以上於春官而科舉事遽廢豫頗疑夢之不足徴明善退自有司歸就弟子列尋以憂去服闋而來私試數占首選時豫猶居國學其夢如初私試之法以入學之先後貢十人而止明善適在十人之外方待年而未及釋褐豫益疑夢之不足徴及豫請外南還而中書用臺臣之請計奏被上旨復以科舉取天下士豫亦復夢如初至正改紀之年也是歲明善果再薦于京師二年春以正奏召入對大廷遂為進士第一豫夢於是始驗其兆見於科舉將廢之初其應在於科舉復興之後天者素定久矣夫豈人力也哉蓋古者卜以三兆筮以三易必參之以三夢夏曰致殷曰觭周曰咸陟其術皆亡粗可考者獨周有占夢之官所掌六夢一曰正二曰噩三曰思四曰寤五曰喜六曰懼而六夢之占有二其善而吉則以獻而歸美于上其惡而凶則贈送而去之豫向之所夢以為噩歟則明善族系之貴學殖之富溷以一第不足驚愕也以為思歟則六館之士數百人豫所思者不止明善也以為寤歟則明善之氏名非豫覺時所嘗道也以為喜歟懼歟則豫於明善未嘗喜其得而懼其失也無所感動而自夢殆正夢歟兆見於科舉之將廢而夢固不惡應在於科舉之復興則夢可謂吉矣時之文人才士內交於明善者聞豫言往往為詩以紀之好事者因會萃成卷求豫志于卷首以實其説豫聞詩言牧人之夢其占以魚為豐年旐旟為人衆釋之者謂此即所獻之吉夢也矧今聖神在上文運方新其事有大於牧人之所夢者顧豫疏賤不得如古之牧人獻其吉夢而歸美焉若夫諸公嗟嘆之不足而咏歌之則小雅詩人之意也雖然廢興得失之故固出於天者之素定苟未能修其在人而徒欲取必於在天可乎孟子曰命也有性焉此豫與明善之所夙講不敢以瀆告之也族譜圖序古者圖譜有局掌於史官局廢而士大夫家自為譜言氏族者或謂黃氏嬴姓陸終氏之後或謂黃氏出於帝髙陽者自柏翳賜姓嬴而其後有江黃諸國為楚所滅子孫之仕楚者有黃歇出於金天氏者自臺駘封汾川而其後有沈姒蓐黃諸國為晉所滅子孫之仕晉者有黃淵皆以國為氏或又謂黃之得姓始於柏翳祖臯陶而本金天可盡據乎漢尚書令香太尉瓊父子江夏人唐之江夏暨會稽零陵巴西東郡江陵洛陽晉安八郡各有黃氏而今也同望江夏何以别乎官失其守而譜學墜絶乃欲旁引曲證而推及於千載之上固難矣惟婺之黃氏由金華徙越之剡洪之分寧豐城信之弋陽江陵之監利為五大族而某之九世祖八世祖仍居婺之浦江舊譜以為自分寧來歸而郡志所載黃氏墓在浦江者見于開元十道圖則浦江之有黃氏已久似未可以舊譜為信要之其言必有所本無從考質也七世祖始徙義烏族日蕃衍系序之承傳支屬之分異斯可得而詳焉六世祖隱居弗仕用薦者當授官未命而沒五世祖亦隱弗仕逮我髙祖乃以子貴纍膺贈典其以進士登於科者我曽祖一人而已先祖先考在異時俱嘗補官而不及祿某際今盛世叨備官使而獲推恩於二代顧以鄙劣無似弗克負荷駸尋暮景懼一旦殞滅以為大憾安可無使後人知夫源流之自而思亢其宗乎昔太史公庭堅自序本出於金華而其譜止及於分寧七世以上皆略弗著蓋慎之也庸敢竊取斯義斷自九世祖而下丘壟之尚完祭享之不廢者為之圖若譜逺不可知疑不能明者悉闕焉凡為圖譜之法親者宜詳疏者宜略為子孫者各詳其親則其可略者自可互見今不以親踈為間而有所或遺者恐諸房子孫不必人人能有其圖譜而於所親各致其詳也來者當思補其所未備而無厭其傷於繁哉族譜圖後序某作族譜既闕其所疑與其所不知舊譜所無者亦不敢妄有增加然尚有當考訂者我七世祖妣宗氏觀文殿學士忠簡公澤之女弟忠簡之子直祕閣頴志其墓孫男五人其二人曰公顯公煥今見於譜者孫男七人惟上三人與志合其下有無咎少亮潛之揚祖而無公顯公煥志乃當時所作必無謬誤非名之更易則譜之脫遺也浦江之花橋有黃將軍廟在我九世祖墓之旁將軍名仁環鄉先生倪朴為立傳載其捍衛鄉井之功甚悉子孫至今不絶同里細人之家皆黃姓而散處于邑中者多士族疑上世必同所自出歲久而失其世次譜所以不及也義烏之蘆寨有紹熙四年進士名耕字子野仕至郡通守按登科記於我曽祖為諸父行不知何以亦不入於譜也抑嘗觀太史公庭堅自序其先金華人七世以上失其譜而豐城乃於七世之上又遡求得其四世且謂其先由秀而婺由婺而洪越之新昌有庭堅同年進士某推序昭穆知為兄弟而進士之從曽孫禮部尚書度乃謂黃氏居江浙者大抵出於建之浦城其先由建而婺由婺而越二説尤異併識於此以待咨訪焉送髙節書院劉山長序尚論兩漢之士必曰經術名節自公孫𢎞至張禹孔光之流皆以經術致位宰相而持祿保位未能免阿諛之譏不有名節孰矯其失所謂名節則嚴子陵實倡之迄今千三百年其故所居及嘗釣遊處猶為之立祠即其旁置書院而奉之以釋奠于先師之禮焉其有功名教賢於章句儒逺矣蓋古之先師詩有毛公書有伏生禮有髙堂生樂有制氏初不以其賢而尊事之行其學則祭其人示有所本云爾唐制孔子廟由顔子而下為先師者二十二人有毛公伏生髙堂生而無制氏詩書禮存而樂亡也孔門髙弟惟顔子子夏並為先師子夏詩有序易有傳固學者所共宗顔子非有遺書可傳而以賢有德克配于先聖其後復列子夏于十哲而獨推顔子為先師者詎不曰講習其言未若儀刑其德乎今之道學一出於濓洛乾淳三數大儒此學者之先師也夫既立其書于學官而躋之從祀矣其為書院者又取前史所載髙人逸士若子陵者以為先師子陵矯前人之失不過答侯霸之兩語他論議風指則皆寂寥無聞世特以其人之賢而尊事之如此爾夫道一而已發於文則為經術修於行則為名節豈若九流百家人自為學莫適相通乎建陽劉生仲寶以選署餘姚之髙節書院山長餘姚子陵故所居也豫聞仲寶之先少師文簡公受業考亭讀論語至豫欲無言喟然而嘆謂言語非所以學由是一意務為躬行實踐其出處之際與子陵雖殊而修名姱節視子陵可無愧仲寶家庭之傳必有異乎區區以呻吟占畢為事者矣諸生在列仲寶進則風勵之以儀刑夫前哲退則以家學私淑之使羣居而講習焉不亦可乎仲寶之行也同志之士臨别贈言凡若干篇京兆杜君伯原甫實序之及來錢塘復求豫為後序杜君隱居武夷山中聘使在門而不為起庶幾善學子陵者仲寶試以豫言質之何如資正備覽序至正九年冬詔以中政院使榮祿大夫札剌爾公為資政院使涖事伊始首詢官府之沿革及所總政務之本末次第前徽政院紀源之書部帙汗漫而序述弗詳披閲再四莫得其要領蓋設官之始在東宫則曰詹事院在東朝則曰徽政院互為廢置間嘗改建儲慶使司及儲政院而詹事徽政之所掌悉𨽻焉今天子始錫名資正院以奉中宫由其更易靡常新舊交承文案填委舛錯隱漏猝難窮竟故於戶口之登耗財計之盈虧人材之升黜工役之作輟皆無從周知公以為古之君子居其官則思其職苟非有舊典之可稽則雖欲舉其職不可得也乃謀於院官令架閣庫出所藏故牘俾經歷司官與提控掾史等精加考核會萃成書院官後至者咸樂贊其成凡本院暨所統諸司官屬之員數品級係籍人戶撥賜土田方物貢輸歲賦徴納銓選格法營造規程彪分臚列細大弗遺釐為三卷號曰資正備覽挈其大綱而萬目畢隨舉而措之斯易易耳以溍承乏𨽻太史氏俾執筆題辭於篇端昔漢文帝問周勃陳平天下一歲決獄幾何錢榖出入幾何勃皆謝不知平對曰有主者問決獄責廷尉問錢榖責治粟內史帝曰君所主何事平舉宰相之職以對帝稱善夫周勃陳平均有所不知而平知責之主者故勃自以為不如矧今資政領以専使皇上為官擇人非執政侍從近臣莫克當其選倚注之重豈羣有司比乎公乃不敢諉于主者而一以身親之他日入侍燕間上承清問必能枚舉以對雖使陳平復生必自以為不如也抑是書之作不特搜羅故實以備闕文且將貽於方來為不刋之典其用意深且逺矣來者尚無忽諸送徐彥禮赴冀州尹序上即帝位之十有五年並相勳賢更新庶政念民者國之本長吏實民命所繫而承宣撫字或未克悉舉其職由其選輕也乃妙柬廷臣之清方詳敏練達於民事者畀以郡寄仍召對於便殿親臨諭遣之羣臣苟預在行莫不俯伏就列頓首受命懼無以稱塞上意則相率詣政事堂聽所以教宰執大臣既為敷繹聖訓且告以利害有須興除宜亟以聞而見於施行不至徒為虗文臺司尋導旨于部使者俾奬勵之以俟其成效言事之官又建白勿委以煩碎之務使得專心於職分之所當為責任之重前所無有也以天下之廣郡邑之衆未盡得人以充其選故所臨遣闕十有闕人皆首及於要地而兵部郎中徐君彥禮得河北之冀州古者郎官出宰百里冀領五縣最為名郡而尹為尊官視百里之宰不愈重哉彥禮奮自儒科待詔翰林編摩史館博涉於古今而究觀其治亂盛衰之故矧嘗簡在眷知擢居六察於民生之休戚吏治之得失靡不周知授之以政固無施而不可黃霸漢丞相也史家以其材長於治民特置之循吏之列而為立傳彥禮其勿為汲黯之於淮陽而為黃霸之於潁川他日秉史筆者誠能以彥禮之氏名列於循吏則黃霸詎得而専美乎彥禮行有日僚友及士之工為文者咸賦詩以送之夫詩之有雅以言王政之所由廢興政有小大之殊故雅有小大之别仲山甫徂齊而尹吉甫送以蒸民之詩序詩者不曰送仲山甫而曰美宣王且以其詩入於大雅蓋宣王之任賢使能致周室中興乃王者之大政尹吉甫之詩非獨以慰仲山甫之永懷而已今天子臨御日久無幽不燭鑒內重外輕之弊而為官擇人甚盛舉也播為詠歌鋪張聖德以配蒸民有不容己者矣豈直私於彥禮而慰其永懷之心耶庸推本昔人序詩之義而題諸篇端如此隆山牟先生文集序若昔宋東都盛時眉山蘇氏父子出而蜀之文章被于海內渡江後疆圉日蹙衣冠流散而蜀之文章萃于東南及其既久也百年之遺老相繼淪謝而陵陽牟氏父子遂巋然為蜀士之望以耆年宿德擅文章之柄而雄視乎東南者大理公一人而已隆山先生大理公冡子能世其家業而不隕者也先生之大父大資清忠公為時名法從所交皆當代鴻碩先生無不趨其下風而接其餘論大理公既與世相違優遊事外先生居家庭之間父子自為師友日以經學道義相切磨母夫人鄧氏太史李公外孫女又從而有聞於史學大理公殁學者有所不知必之先生考質焉先生於前朝制度之損益故家文獻之源流歷歷如指諸掌寒門下士窺見一斑於殘編斷簡中者固不足以與此至於白首窮經孳孳矻矻而忘其老閥閲貴遊挾清才雅藝以馳騁於英俊之域者亦未易企而及也凡先生所撰著言必有實而要其歸一本於理昔之善為品評者謂有山林之文有臺閣之文先生蓋兼之矣內翰蜀郡虞公稱先生警敏過人志趣髙邁援引根據不見涯涘其文沛然若河江之決不極所至不止真知言哉嗚呼墜緒茫茫千鈞一髮剝果不食萌芽方新斯文之未喪豈但為蜀士之幸乎先生有子五人獨必達必勝在必勝襲藏遺稿懼歲逺或致放逸乃彚聚為若干卷而刻焉書來俾溍序於篇末惟大理公仕宋季與溍之曽大父太常府君同為郎于吏部溍生也後猶及拜於牀下而辱贈以言際今承平復著取士之令異時科第中人物存者無幾先生乃應聘出持江浙文衡而溍以非才忝與薦送故必勝以序為託溍之鄙陋衰朽安能知先生而發揮作述之旨邪姑次第其梗概云爾先生諱應龍字成甫其先由陵陽徙吳興先生辭京官之世賞而以咸淳辛未取世科調光之定城縣尉仕未逹而國事已非先生既不有祿以貧強起為儒學官晚乃教授溧水州尋以建康上元縣主簿致其事先生之世系卒葬與其言行虞公已為志于幽堂此不具順齋文集序故贈袐書少監順齋蒲公既殁仲子御史君機裒輯遺文曰間居叢稿者為二十有六卷以授某俾序之孟子曰誦其詩讀其書不知其人可乎是以論其世也按公行狀公生而嶷岐丱歲就學強記過人未成童已通經大義弱冠文聲藉甚諸老多折行輩與之交逮乎立年復以濓洛諸儒之説倡于漢中而漢中之士知有道德性命之學蓋公之求端用力務自博以入約由體以達用真知實踐不事矯飾而于名物度數下至隂陽醫學無不究其精微教人具有師法大抵以行檢為先而窮經則使之存心靜定而參透于言語文字之外郡縣長吏或有所取正亦必引以當道而使之行其所無事臨終却藥弗御飲酒賦詩夷然而逝由是觀之則公之為人可知也粵自國家統一宇內治化休明士俗醇美一時鴻生碩儒為文皆雄深渾厚而無靡麗之習承平滋久流風未墜皇慶延祐問公入通朝籍以性理之學施於臺閣之文而其文益粹譬如良金美玉不俟鍛鍊雕琢而光輝發越自有不可掩者矣時上新即位方嚮用儒術設科目以網羅四方之賢俊而御史君以公在班列之日䇿名於昕陛士大夫尤以為榮論其世則太平極盛之際也某浮沈州縣白首登畿忝以非才承乏胄監實公去官十有五年之後無從接聞緒論兹幸獲以疵賤之士名自附於公是用忘其衰朽荒落而序其梗概如右後之覽者論其世而知其人則於公之文思過半矣公諱道源字德之系出漢蒲將軍至晉安西大將軍遂避亂入蜀而宋資政殿學士贈太師楚國公宗孟居眉之青神公之皇考贈禮部郎中諱政午又以國初徙興元公嘗為郡學正終更絶口不言仕進晚以遺逸徴詣京師編摩史館供奉詞林尋以博士教國子居歲餘輒自引去詔起公提舉陜西儒學訖不就後用御史君貴以有今贈其年夀卒葬與言行之詳壙有志神道有碑兹不贅述焉繡川二妙集序吾里中前輩以詩名家者推山南先生為巨擘傅君景文陳君景傳其流亞也先生曩遊太學未及釋褐而學廢士散束書東歸遁迹林壑問覽物興懷一寓于詩悲壯激烈有以發其邁往不羣之氣自視與石曼卿蘇子美不知何如近代江湖間呫呫然動其喙者姑勿論也二君之年稍後於先生而皆有能詩聲景文之詩精切整暇如清江漫流一碧千里而魚龍光怪隱見不常莫可得而測也景傳之詩涵肆彬蔚如竒葩珍木洪纎髙下雜植於名園終日玩之而不厭也其以氣自豪則同宜乎能接先生之俊軌而與之參翺翔非餘子可得而預也豫年復後於二君而於先生為中表子姪行自丱歲侍先生杖屨而知愛先生之詩顧以材器劣弱局量褊小不敢窺其涯涘徒有望洋而歎可以配先生者二君而已豫嘗因先生自序夢稿癡稿聽雨留稿者重加詮次為二十卷題曰山南先生集而先生之交朋皆已凋謝後生晚出有嗜好酸醎之殊由是未克大行於世二君與先生相繼死而其遺稿亦僅藏於家因訪而求之得景文所作若干篇景傳所作若干篇合若干卷題曰繡川二妙集而序其梗槩庶二君之遺風餘韻有在而不遂泯滅也先生韜光弗耀十五寒暑部使者強致之俾主教事不得已為之起後卒歸隱而終二君從俗浮沈嘯歌自適與先生俱能不以名自纍名且不有詩之傳不傳蓋無足為其重輕也雖然物之顯晦固自有時天下之寶當為天下惜善而藏之以待後世之揚子雲不亦可乎先生姓劉氏諱應龜字元益景文諱野景傳諱堯道云送鄭仲舒詩序浦陽鄭仲舒以才學受知今太師丞相由布衣入經筵為檢討會參贊官闕即命攝其官豫與仲舒同里閈而託三世之契至是又以官聨而申僚友之好休暇過從尤密暨豫以老得謝而退付田里仲舒亦以外艱南歸服除當還朝朋友咸為賦詩而徴豫以序為贈言之首蓋贈之為言增也古之贈言者將以增益其所未至而今之贈言者直欲為延譽俾增重於一時仲舒之先聚族而居逮今九葉朝廷既旌其門閭而復其徭役士大夫莫不為之紀詠以侈其事仲舒染濡家庭義方之訓厚自樹立卓然有過人者豫固無以為其增重而仲舒有國之元臣以為知己凡所納交皆鴻生魁彥亦無俟豫為之延譽而有所增重若夫攄瑰竒之素藴酬特達之殊遇以增崇乎逺大之業此則豫區區愛助之情不容已於言者矧今明良相逢夙夜圖治網羅衆彥靡或遐遺仲舒諸父昆弟宦遊於京國有同升館閣者仲舒踵蟬連奕葉之盛衣被雲漢昭回之光使澤加於人名垂於後在此行矣豈但躡尋故步取一資半級以為州里之榮哉顧豫衰朽殘生無所可用結廬墓左待終天年追念向來英俊之並遊恍若隔世於仲舒之行雖不能無歆豔贊慕然以心思凋耗筆硯荒落無從藻飾雅談鋪張盛舉輒因序詩而附見豫屬望之私焉石門六觀詩序東陽多佳山水涵碧有亭肇見於劉賔客之品題戴峴鮑巖水樂環翠至於郭氏之石洞蔣氏之南園凡名公紀詠所及入於圖志者不一而足石門在縣東南七十里山益髙水益深尤為竒境而埋沒於榛莽翳薈之間久未有啓其祕者李君公澤厭城邑之囂煩始闢其地建别業而居焉既大治臺榭亭館據其要會以極遊眺之美又旁攬其勝槩號曰六觀各為一詩鄉先生與時之俊流咸共屬和而太常胡君為序於左方公澤復出以示豫求題辭於篇首唐史載太尉中書令西平王李晟之子十二人咸有仕祿願憲訴聽並至節度使而訴為左僕射同平章事聽為檢校司徒涼國公或曰願即韓文公所序居盤谷者韓公述其言大丈夫之遇不遇為出處可徴也信如或者之説則願嘗秉旄鉞専方面不可謂不遇豈非願身為達官而心有所不樂遂逺引而去乎公澤故宋嘉定進士吏部尚書寶謨閣直學士之玄孫淳祐進士通判慶元軍府事之曽孫而其祖父俱以世賞補官其兄仕於皇朝者或以教官從宣政使辟舉入幕而出臨絶域或遊上庠登乙科而纍佐名郡公澤亦嘗被命倅一州獨避不就而甘於肥遁由公澤兄弟視西平諸子名位固不侔而公澤之志則與願無以異也雖然自有宇宙便有此山千載之上盤谷與石門等耳盤谷得願而地始重願得韓公而名益顯石門之有公澤猶盤谷之有願安知世無韓公之鴻筆能鋪張其事以為之序乎非豫所敢僣也矧豫以衰退之餘強顔復起而竊食於輦轂之下奔走伺候趦起囁嚅其為人視公澤何如尚安能形容其清標雅致之髣佛乎公澤曰豫不敢自附於前賢可謂善揣分矣以區區陋微而擬於古之大人君子無乃非其倫乎姑置勿論而以一言相慰藉於風月寂寥之鄉可也豫應之曰敢不諾因次第其語書而歸之是為序文獻集卷六
