body:
  text: 文獻集卷七上元黃溍撰記湖州路總管府題名記古者諸侯之國必有史官太史公始托其所述年經而國緯之合以為表蓋將使有民社者幸而覽觀焉必且曰某年為何時某侯為何人而我何如也自秦置郡縣既不容有私史猶幸有所謂題名者而可闕與吳興為郡曰內史曰太守曰刺史曰知州事由晉王羲之而下凡若干人亦既列其氏名于貞石矣粵自聖化南被國家遴選仁哲以惠幸茲土者聲相聞迹相接而迄未有所登載也今總管某公始合長二立石為題名而屬豫以記豫惟題名之設本以昭嵗月辨爵秩觀其氏名與其所以去來而其人之賢不肖可知也善善惡惡而懲勸存焉此太史公之深旨而春秋之微權也昔司馬文正公記諫官題名而繫之以忠詐回直之目使來者知所避就嗚呼豈獨諫官也哉山南先生集後記右山南先生集凡二十卷記曰辭必已出古也騷不必如詩玄不必如易而太史公書不必如尚書春秋十三國風之作大抵發乎情矣然而止乎禮義發乎情故千載殊時而五方異感也止乎禮義以天地之心為本者也其為本不二故言可得而知也有如先生之閎材傑志百不一施而其言猶莫為世所貴則言豈誠易知哉蓋先生自少時為舉子業已能知非之逮其年邁而氣益定支離之習刋落盡矣故其為文逸出橫厲譬如風雨之所潤動雜葩異卉不擇地而輒發人見其徜徉恣肆惟意所之而止耳世之善為近似者方竊竊然揣摩剽掇譁衆以立的而曰吾古學也陳性命者躐幽微辨名數者殫毫末而先生之文遏而不行矣孰知夫繇繇儃儃浮沈俗間其自視吾言蜩甲爾蛇蛻爾豈復纍於稱譏者耶溍受學於先生最久且親誠悼其餘芳溢流無所記以被於後乃因先生所自序夢稿癡稿聽雨留稿者合而一之目曰山南先生集嗚呼是其為言也非出於古非不出於古也夫能不二於古今而有不以天地之心為本者乎綿千祀貫萬彚而無遷壞淪滅者莫壽於是物矣區區之篇櫝尚奚為哉姑用以致吾意焉爾先生之氏名與出處大槩溍既為之述兹不復云明正書院田記宋南渡後衢之先賢忠簡趙公而下六人蓋尸祝之舊矣景定末王侯已守是邦始諗于朝即故吏所據祠地為道院者闢書堂曰明正且以其沒入之田百七十有六畝𨽻焉咸淳間繼之者趙侯孟奎又益以他田六十有三畝祠事以備國朝因之建書院額設山長員而茲田之奪於浮屠老氏者什七八有司漫弗加省也皇慶初上新即位垂意庠序之事凡田之在學官者冒取有禁於是總管申侯為閲纍嵗之訟牒而核其實悉返所侵田有挾教門檄來爭之者侯弗為動乃賂吏瞰侯在告謬為可疑上其事於宣閫今山長葉君謹翁白侯破其計而閫復下于郡侯為徵圖籍覆按具有本末田以卒歸蓋九十年間祠三徙而始有田不二十年遽失不守又三十餘年乃復葉君念其得之難而保有之不易也求書于石以圖永久溍竊惟三代而降師廢民散儒失其守而奪於二氏者匪直吾疆畎而已矧夫威怵利誘有甚於二氏者乎嘗試觀馬公之在建炎連拄大姦一斥終其身不悔逮紹興權臣擅事汪公既坐切直擯弗用趙公竟以不苟合去相位貶且死至若范劉小汪公委蛇仕止之間又莫或少自撓是凛焉不可奪者區區之土壤猶外物也賢師帥祗奉德意幸惠斯文甚厚繄六君子之胄若士之從葉君登斯堂者敬共以承事感慕而振飭必有名人傑出其間嫓美於前哲夫能寶其不資之軀則一物之細有不難守矣溍既為書其槩且道其所望於諸君如此初田之未復也劉公五世孫衍嘗以己田百畝代其匱汪公五世孫誼亦以己田三十畝相焉至是兩家因捐其田戒子孫勿復有是抑可書己申侯名伊嚕特穆爾高麗人上海縣學田記上海由鎮為縣之三年縣始有學又十年學始有田又九年乃改作學于縣東如千步延祐元年冬張侯如砥來涖縣事厥既延見諸生視其居則齋廬未備也庖廩未充也按其籍則田之折於郡庠若出於是邦之寓公者嵗為米不盈四百石惕焉深懼士失其養而學政之弗舉謀大其規制為久遠計而未知所出也上人善能者聞之請入私田四百九十五畝有竒為學官永業以佐經費侯既納其請則白狀于縣而輸券于學主教事者方君遇以為向之克有學有田不易如此而上人一念之頃遽能不愛其所有以弛吾乏絶之慮是不宜使後之君子無述也乃伐石來徵文為記嗟乎大道隳裂九流百家之異趨久矣是果不可同歟易稱同人于野亨而謂同人于宗吝夫與善不擇其類致亨孰大焉施惠而不私其黨去吝孰先焉由其通舍其蔽茲所以合異而為同也侯與吾從其有取乎此矣上人亦嘗學於是耶上地之利其末爾竊獨嘉乎是舉也庶幾乎吾聖人之旨而有非苟同者故為原其大趣而為之記其目之細則碑隂存焉常熟州學田記常熟故吳地州之西子遊宅在焉當孔子時吳通上國已久北學冝非一人獨子遊以身通受業列於七十有七人之間而其言行見於記録為甚具逮今千有七百餘年生其地而好學能文者猶彬彬焉風氣之厚俗習之盛誠非旁州比縣之所及然自其為縣時已有學而所占田多薄瘠以嵗之不易也諸生往往無所仰食學校之養顧出他州縣下弦誦之聲希闊寂寥前後為是州若職教事者思有以裕之而未知所以為計學之賔老以為州之有力而名好事莫如曹君乃相率造君以為言君欣然為輟田之可耕者若干畝山之可樵者若干畝以佐之士之羣居聚食始無所乏絶莫不德君之為而願得豫文以記之豫聞古昔授田建學悉有成法民之為士固不必廩於學宫而大家巨室亦不得有羡田以資施豫也自先王之法壞而不可復見説者蓋以為三千之徒聚而食於孔子或又以飲食之人為子遊氏之儒何言之無稽耶今之去孔子日益以遠有能聞布衣養徒之事而興起焉可謂難也已若夫為弟子員而藏修息遊於斯者皆生於子遊之鄉而得其風氣俗習之美者也苟無幸乎居之安食之飽而必有事焉將見其處也必無愧乎子遊之文學其出也必無忘乎子遊之學道而愛人一簞一瓢不足為其儉萬鍾之祿不足為其泰孰得以區區飲食之細厚誣君子也哉是用弗讓而為之記以告諸來者云爾曹君名某嘗為某官東陽縣門樓記古者國無小必為臺門所以嚴等威重教令非苟致崇飾而已也以為不若是無以習民於上下之分而一其觀聽也古今殊時郡國異體所謂麗譙者不皆出諸侯三門之制其以樓易臺或猶有取禮之以髙為貴者乎春秋譏新作南門非謂夫修舊而加其度也蓋失時也東陽婺壯縣提封幾二百里民堵至四萬區不啻如古子男國縣署之大門故有樓庳仄下陋嵗久且就圮丞耿君某以為是不稱古者嚴等威重教令之意爰合其鄉之大家俾撤而新之尋有二尺以為基之崇參其基以為屋之崇修去屋崇五尺廣參其修而益五尺凡修廣視舊率加什二而崇倍焉為間者五而加其舊者二焉君之惠孚于人故民樂獻其力智周于物故工喜薦其伎始作於延祐二年冬十月而訖役於三年春二月又不失乎土功之時是宜舉之易成之亟也學校之士咸相與言吾黨不可拱手視具乃買石而以書來曰吾耿君之興壞起廢可稱述者非一而樓為大願紀成事來者尚有者也溍不倿無能贊美頌勤然竊觀是役也有禮之貴而無春秋之譏能勿喜聞而樂書之哉動而法於禮春秋則夫所宜書者茲樓云乎哉程工屬役之凡庸可略也松陽縣惠洽巡檢司記處之松陽所部六鄉其一曰惠洽至元某年始置巡檢其地以教官而假巡檢則自吾嶽君始先是居其官者凡若干人咸即寓舍以為治所卒伍散處墟落問緩急呼調輒後會期莫有以為意者至治二年冬十月君實來明年秋某月始買地作新廨為屋以間數者若干費錢若干而其什七出於君之私槖不足則其吏士洎鄉之大家合力以成之又明年冬十有二月功以訖告門廡堂室器械之須靡不具完君既諏日之吉入據廳事而休吏士于旁舍乃以書來曰願有紀俾後之人勿廢也夫尉巡檢均以求盜為職而尉得與令長連署常治其邑中巡檢所治率在乎荒郊林莽山區海聚幽昧曠絶之境其為力視尉難矣矧處為山郡而介于甌越國家初定南服患其竊發之不時也嘗選用重臣建牙分閫以涖焉雖以積安日久而椎剽之習或未盡去巡檢之為力不加難乎是以來者幸其苟逭於吏議則望望然計吾嵗月而去之固無以居處之崇為也君儒者按職甫及期枹鼓不驚而田里之人甘食以安寢又能致其餘力以樹立官府如此向之所謂難者君直易處之其設施之整暇何如哉是有政焉非特土木之功而已世恆譏儒者迂且憚事若君之為武夫俗吏不可少愧耶為之記所以昭作始之自亦所以釋儒者之譏也君名自修字德敏宋太師鄂忠武王五世諸孫今為常之宜興人平江西虹橋記泰定元年冬十有二月庚午平江閶門外新作虹橋成古者辰角見雨畢而除道天根見水涸而成梁有司之常事耳春秋之法常事不書此何以書在有司常事也而此非有司之常事也按郡志橋之載於圖籍者三百五十九而為虹橋者三其一在城西若干步即此橋也去年夏大雨水暴溢橋居兩水之交所施材甓皆腐缺莫能與水抗一夕盡圮其地適控通衢凡徵令賜豫布政於方國若奉貢輸賦修職於京邑者悉由是而之焉執事者奔走迎勞無虛日懼舟楫不足以嚴使客則筏木以俟之方謀所以復其故而官帑不可輒發又重以其役厲民未知費所出郡民鄧文貴聞之請分家資之半更為石橋以利永久既又以為此有司者之事非細人所得干也乃飭材用庀工徒以聽要束焉事聞于府府上之行中書已而報如其請遂以八月乙丑始事閲八甲子而告訖功橋之修四百尺而其高十分修之一五分而殺其二乃與岸等脊之廣得高之半而趾之廣加其什伍上設扶欄為之周阹其下為門如半月以釃漕河而隄其雨垂以度挽者所用錢以緡計者十二萬五千有竒役以庸計者二萬四千有竒今總管郭公既率僚屬觴酒橋上以落其成且謂文貴編户民非有名田稍食貨殖竒贏若他大姓比川梁逵路官實領之而文貴顧能輟其衣食之餘以紓有司之急不宜無以示勸相乃伐石俾溍執筆書其凡而刻焉夫以一夫尸利物之功而長民者能表樹之以寓其風厲之意是皆有司常事之所不及而於法冝書者溍不得辭也傳曰一家仁一國興仁一家讓一國與讓是邦之人誠知所感發而慕效焉則夫可以修廢舉墜而出於有司常事之外者其屢書不一書尚託始於兹橋也文貴之可稱道而不繫於橋事者兹不書諸暨州鄉貢進士題名記溍佐諸暨之明年州人士有同升於春官而旅進於天子之廷者其調補而歸也學正陳繼龍既合鄉薦之士為題名而虛其左以俟且屬溍記之溍惟國朝以科目取士著於令列聖相承守之如一上以繼志述事下以立邦家太平之基甚盛德也越於東南號稱都會異時人材輩出起進士至宰相者有之自版圖入職方章逢之流相與蹈詠為日已久如種待穫適惟其時是以詔下之日莫不爭翔競奮以自厠於英雋之列獨是州閲十年而偕計吏第奉常者始接踵而起後先相望滋不乏人其科級之優又旁州比縣所未有也惟其發也不亟故其就也愈偉則其進也孰禦焉雖然士非科目不能以自達至其措諸行事足以被今而埀後者恆有在乎科目之外苟徒誇榮侈盛而以為稽古之所蒙豈賢師儒昭示上德風厲學者之意哉肆成人有德溍與諸君子求無怍焉可也小子有造溍於承學之士蓋日望之鄞縣義役記浙水東州縣𨽻慶元大府者六凡所入田租鄞以一縣當其什五諸名額及非時之須稱是取民為最夥而其為縣在巨海上號東南一都會牧伯守將若他司以轉漕市易鹽策之利有事于海者悉涖治其處一切趣辦用民為最繁富者巧自辟匿貧者日削而弗繼吏鰓鰓焉惟期會之或後為懼而公私交病矣天台周公之為丞也會國家申嚴役法豪右以他名數自占者毋敢弗與周侯進父老具宣德意且教之為義役於是縣西南五十里林村之民次當受役者三十有五家首相與謀視物力之薄厚各捐已槖得錢七千五百緡為子本推執事者五人操其竒贏以供百役之費而存其母常勿絶復推其五人日詣有司以聽徵令嵗終則更休焉厥既條上于縣周君合長佐白狀大府而定其要束因廷酌父老以為衆勸旁鄉比井爭慕為之其致力也均其待事也易姦胥悍卒不得舞手其間而民亦忘為役之勤其效可覩矣周君以秩滿去父老過豫而請曰願有紀庶幾夫嗣為政者知有以相之俾後之人毋棄其成也昔者孔子稱子産使民也義夫義也者固古之所以使民也今也田里之人不愛其力相率以聽於有司而謂之義役非上之人以義使之而能然哉是蓋子産之所以為鄭而孔子之所與也其孰得而廢之然則可託以永久者有不在豫文矣周君名仔肩延祐五年進士其來以七年二月而義役行於至治元年正月其去以三年三月云傅氏義田記烏傷之北鄙有義門者里人傅氏之居也傅氏之長曰某過豫而言曰家故有田四百畝合族而食五世矣以羣從子姪之蕃衍也嵗率用八畝之入食一人而籍其餘可當十人之食以給賔祭百須之費吾懼夫久且弗繼而無以善其後也吾竭吾私焉耳矣蓋得田凡若干畝别儲其入為子本而權其竒贏俟他日更購田以附益焉是不可無告來裔使成吾志以惟子也請嗟乎義之名孰從生乎親親仁也因時制宜義也禮之所由起也蓋豫聞之古之制禮者為之井田以同其利為之比閭族黨以均其安夫然後教以有急相賙有喜相慶死葬相恤疾病相養猶患其未足以勸親親也於是乎有宗族焉而非會居聚食之謂也服窮於緦而同姓殺於袒免是以祖遷於上聖人莫能存也宗易於下聖人莫能止也戚也而日以疏勢也繫之以姓而弗别綴之以食而弗殊則是疏可使戚也其所因者本也循其勢故教易行達其本故道可久聖人惡有術以強合之哉大雅曰飲之食之君之宗之王者之大政也田制壞宗道廢仁人孝子下得由乎先王之禮之盛而各以意行之假區區生養之具以收聖人之所不能合夫亦有取其義云爾也充其義而仁不可勝用也記曰一家仁一國興仁一家讓一國興讓在乎勿替引之而已書而歸之俾刻諸石豈非其所望以扶吾義於百世而弗墜者耶旌異之實存乎舊記條約之凡具於碑陰茲不書潛窩記剡源先生當題其居曰縮軒從之遊者陳君養直亦以潛窩扁其宴休之室君之云云則有所受之矣蓋縮之為言退也潛之為言藏也是故以世為莫足用吾聰明而務為退藏者也古之善為退藏者豈隤然伏其身窅然閉其言而已哉昔者先生方盛壯時高視濶步英雋之林舍者必避席煬者必避竈庸人小子却立而睨之如萬斛之舟順流而東騏驎騕裊薾浮雲而上也可謂進耶退耶一旦倦遊而歸逡巡乎山砠海涯而時出以浮沉俗間所居而屨滿於戶外矣鴻聲駿望猋起水涌庸詎知夫退之非進耶惟夫不為物首而墨以為守是以恆瞪若乎人之後不知孰吾進孰吾退而吾未始與之俱進退也君之於先生則幾矣然而未嘗進也惡乎退未嘗行也惡乎藏顧獨弊弊焉於其名迹之間是將有窺其藏者矣夫湛盧豪曹固不蘄一割之用其光氣煜然星辰之上者雖千仞之土有未易以掩遏也善刀而藏亦有其道乎誠有莫吾用而未始不行莫吾舍而未始不藏者則其退藏也斯密矣而豫安能知之安能言之慥慥齋記天台項君可立甫周君彥德甫俱以慥慥名其齋今國子祭酒集賢鄧公各為之大書其顔蓋以旌其志之同也二人者復俾豫合為之記以繹其義焉夫慥慥者所以美中庸之君子言與行相應者也而齋也者謂夫間居以養其心若於此而齋戒也方二人者各適其安而嗒焉以休言不與物交也行不與事接也惡睹所謂慥慥者哉蓋人之感焉而易動者物也其來無時而常使人善惑者事也揆事物之理以酬酢萬變而不窮者人之心也平居養之無其素一旦出而卒然與夫事物遇易動者或怵之善惑者或眩之口之於言身之於行有不暇擇也其無繆迷而顛錯者幾希二人者誠深知乎此故其晝談夕講之隙退而即於私室各著其志以自警焉此中庸屋漏潛伏之功古之君子所以成其慥慥之美者未始不出於此也在易風自火出其卦為家人其象為君子以言有物而行有恆釋之者蓋曰火內也風外也由內以及外是以能有物而有恆也夫二人者求美其言行而圖之於養其心之所內外賔主之辨其審如此豈不可謂知所務矣哉是道也苟知擇乎中庸者宜無不然而非二人者為獨然也彼慥慥之名又豈二人者所得專而有哉書而歸之所以記也亦以厲同志也鄉學記霸之益津人宫君琪即其西鄉所居作學舍合諸莊子弟俾肄業其中且為廟像先聖先賢以春秋旦望奠謁如學宮法念不可無以示永久爰狀其事走京師請奎章閣侍書學士內翰虞公為之記公方有大論撰未暇如君琪請乃以狀授溍俾執筆而書之溍惟古之施教導民有本有原必由鄉以達於國是以六鄉之吏去民愈近者為教愈詳一嵗之中州長之屬民讀法者四黨正七族師十有四而閭胥則無時焉若夫二十五家之閭則又有門孰以仕焉而已者為之左右師雖閭胥弗親也故上之教不煩而民之為士者恆足賴故其詩曰攸介攸止蒸我髦士人生其時獨何幸歟今郡邑用著令既咸得立學承宣德意而崇厲之厥有師帥而鄉閭之教希闊弗講雖有朴茂之質何以培其根而達其支也哉君琪不自耀其材以取顯仕而主昌平之候館固非有長民者之責乃能汲汲焉圖所以私淑其人如此可謂有志于古矣昔者魯修泮宫而春秋不書説者類曰此有國之常事爾君琪之為蓋禮之以義起而出於常事之外者也可無書乎凡廟學總為屋若干楹費錢若干緡經始於至順二年春二月而落成於秋八月翰林直學士趙公子昌與君琪居相望實有以相之其來請記則冬十有二月也浦江縣三皇廟記醫有學三皇有廟尚矣合廟學為一而俾醫師領其祠事有司以春秋之季發公帑具祭料而折爼升觴焉今制也蓋三墳之書世莫得見可見者非必其本書百家所録又多怪迂鄙野而爽於用能推其所承傳而措諸民生日用之間惟言醫者為然耳三聖人開物成務之功有託以弗泯其在茲乎凡立學必釋奠于先聖先師禮也仲尼祖述堯舜憲章文武而其徒無敢推唐虞成周之君以為先聖醫家者流乃得上援羲農黃帝氏而尸祝之希世之盛典歟國家仁育庶類將悉躋之壽域埀意於醫事至重而不輕崇廟祀以表章其學著在令式而偏州下邑或不能奉以從事非知為政之緩急者莫肯盡心焉浦江自版圖歸職方踰四十載逮至治初始克有廟於邑署之西南不久輒壞天歷間嘗繕完之而猶未有學也今達嚕噶齊博迪蘇巴哈以廷對第二人由中祕外補再轉而長是邑既興學宫以嘉惠章甫逢掖之士尋又以為今之建學立師醫與儒等爾隆於彼而嗇於此非所以欽承天子之命教也乃捐俸資倡衆而改作焉中為殿堂具嚴像設兩廡旁列四墉外周前植櫺星門而齋宿之次論説之所無不畢備經始于至順三年之某月落成于明年之某月書來屬溍記之溍竊惟三聖人之法被于萬世其大庇乎斯人者若天覆而地載不可以一事名言也百藥齊和湯火針石之施與易大傳所稱網罟耒耜衣裳舟楫臼杵弧矢棟宇棺槨均之為一事爾其不可名言者孰得窺測而擬諸形容哉乃若賢侯之敬恭秩祀道宣靈休不宜無以告來者庸弗辭而為之記餘見於舊刻者茲不重出焉永嘉縣重修海隄記溫為郡俯瞰大海江出郡城之後東與海合直拱北門枕江為亭榜其顔曰四時萬象候館在焉使指所臨長吏迎勞無虛日亭之西為市區百貨所萃廛氓賈豎咸附趨之江滸故有大石堤延袤數千尺舍舟登陸者阻泥淖不得前其俗率於隄之旁為石路外出以屬於舟次為之馬頭凡為馬頭者二一以俟官舸一以達商舶云先是江水遏於沙洲由江心寺之西逆流而上勢奔突莫支隄數毁繕治之費公私交以為病至順二年秋水暴溢括蒼山中被郡境颶風激海水相輔為害隄傾路夷亭隨仆永和鹽倉亦圮水怒未已且將破廬舍敗城郭永嘉蓋郡之治所縣尹趙君大訥謂是不可緩急議興作俾大家之役于官者分任其事或輸以財或薦以力經畫勸相則身親之以潮汐之盈縮有時也投其隙而賦功焉列巨木為柱而設栿柂其上內攢衆木圍之三周外施其芒以撥浪次填以石次積以瓦礫而實土其中加橫木備其欹側而帖石其背以便行者隄若路暨亭之址悉如之而亭亦復其故始事于三年之春二月訖役於冬十一月費不益於舊而功倍焉伻來俾記其嵗月溍惟春秋之法有直書其事具文見意者敢竊取斯義敘次梗槩不復效近人之記事謬為諛言以亂其實續郡乘者尚有考於斯昌平縣石橋記由都城北抵上京其驛十有二而昌平之為縣當其第一驛溪水徑闤闠中橫絶通衢霖潦暴至則水湍悍益甚人莫利涉縣尹畢侯以為昌平今畿縣大駕時巡次舍在焉凡侍從之臣宿衛之士與夫外頒教令內奉職貢使客傳遽之往來率由乎是為長吏者曷敢弗謹乃規貨食募匠傭揆日之吉架石為橋其修六十尺而其廣得修四之一自始作至訖功為日若干車者無濟盈徒者無厲深而民不知有役咸相與誦美之掌其驛事者宫君琪持父老之言來諗曰吾畢侯之為人素慎重雖居劇縣善操簡以御煩見謂材敏然以亷平不苛民樂其業田里安於無事用能以暇日致力於兹橋願有紀而附見其治行之槩勒諸岸左以貽永久古者列國有四鄰賔客之交入其境而門關逵路廬館川梁修除之不時猶或譏其失政矧今百里之郊警蹕所臨有能勤其官敬其事而不忘乎嚴飭具備如此可謂無失政矣豈徒一時興作之功有足稱道哉庸弗辭而為之書善觀政者有考於斯則他治行固可推而知也畢侯名文質濟南士族其出宰也由翊正掾外補云蘇御史治獄記至順二年冬十有一月趙郡蘇公天爵由翰林為御史南臺時方用中書奏遣官審覆論報天下獄囚三年春正月公甫就職即分涖湖北湖北所統地大以遠其西南諸郡民獠錯居俗素獷悍喜鬭爭獄事為最繁公不憚山溪之阻瘴毒之所侵加遍履其地雖盛暑猶夜篝燈閲文書無少倦囚有言其寃狀者公曰憲司嵗再至不言何也囚皆曰前此慮囚者應故事耳聞公至當受刑故不得不言公為之太息事無巨細必盡心焉辰之沅陵民文甲無子育其甥雷乙後乃生兩子而出乙乙伺兩子行賣茶即舟中取析薪之斧並斫殺之既沉斧水中而血漬其衣迹故在事覺乙具服部使者顧以為三年之疑獄而釋之公曰是事二年半耳不殺人何以衣有血污何以知斧在水中且其居去殺人處甚近何謂疑獄遂復置于理有龍光祖者買官得同知某州事用例奪官家居其子及家奴言胡孫溪有吾家故所請射官地而宋某來耕其上今宋已死冝募佃者光祖從其言而宋之子乙來爭此地光祖以牛米鹽遺洞蠻使與佃人夜持兵圍宋所居盡縛其家人以去佃人指乙兄甲謂洞蠻曰不殺此人恐走出洞事泄遂射殺之而散賣其妻子於諸洞甲既死乙竟脫歸訴其事吏受賕止以占田坐其佃人置光祖不問公曰殺人而坐以占田可乎乃諭洞蠻悉出宋家人而正殺人者罪沅之麻陽民張甲彭乙爭溉田水交惡張以禾方熟夜往視之彭適過其處張因殺之而誣以盜禾取其家竹虆實禾為驗吏以為所殺者真盜也將貰其罪公曰彼盜汝禾用手取之耶抑用鐮也曰用鐮耳公問鐮安在不能對乃論如法有黃天發者兄子四人仲獨富而其季性剛愎與諸兄數有爭且陵侮天發仲欲殺季乃告于天發而以錢與謝某者使共殺之季妻發其事仲謂天發曰兄殺弟則罪重叔承之則罪不至死叔婦子某能衣食之天發許諾尋就逮自言實出錢與龔某者使殺之龔蓋仲之舅而其妻則謝之母也仲賂吏如其言文到成獄公疑有寃訊之果然乃以始謀者為罪首常德之桃源民盧甲莫乙江丙同出求傭工於人甲誤墮水死甲弟之為僧者欲私甲妻不得訴甲妻與乙通而殺其夫乙不能自明言實與丙同擊之至死慮其復蘇斷首棄草間而棄尸與杖於談某家溝中吏往視之果得髑髏而尸與仗皆無有公曰尸與仗縱存今已八年未有不腐者呼談問之則甲未死時其目已瞽而謬云曽見一尸為水所漂去公知其誣語吏曰此乃疑獄且不止三年也卒釋之楊乙者始娶而得悶風疾其妻惡之逃歸父母家乙往追取其聘財婦翁以訴于官事未決而乙於屠者燕甲家見其妻因與甲鬭毆既去而至屠者燕丙家責所貸又與丙鬭毆而去中路病發死其母知無它而恐官以前事來索之故極以聞吏不察乃捕繫兩屠者治殺人事公問其母得乙風狀兩屠者賴以免印社子者問同里民家女為妻未及娶而周某者耻與為婭壻止婦翁使勿嫁社子恨周而殺之楊惠孫黃文德皆里中大家故有怨社子本受傭惠孫所又適僦文德屋以居文德因嗾社子援楊父子造謀使殺周惠孫強服而不能言其故初言周捕其子姦事而殺之次言周通其妾而殺之後徙其獄龍陽則又言過洞庭遇風禱于神許採生以祭而殺周取心肝祭之公閲其牘曰前二説既非是使如後説有尸可驗猶未足信况無尸乎及詢得其實則教之自誣者衛推官也於是社子已瘦死乃出楊父子破械遣之州人劉文貴死妻弟同郡朱德來省其姊文貴養子飲以酒數日而患腹脹文貴次子與養子爭家財有隙因謂德曰得非中蝦蟇毒乎搗烏桕根和酒飲之得暴下視之無它毒而病愈劇德歸具以養子言告其母其母以聞于官未及逮問而德死録事及武陵縣官來驗其尸皆以銀叉探口中色不變定為病死衛推官者先以他事怒録事欲假定驗不實為其罪更命龍陽知州聚檢作中毒死辭連三十餘人養子已誣服公疑有寃為訪諸路人且諭使吐實衆皆曰獄辭盡衛推官教我云然公既反其獄併按衛推官罷之凡此皆死獄公所平決未有不得其情者也富者以佃客家人死而蒙非辜公則直其寃貧者以年飢取他人穀因擊傷之而傅重議公則薄其罪所活又數十百人澧之齊氏沅之曹氏駱氏靖之唐氏並雄於資而善持吏短長為民害齊因湖泊官不聼其撲買而汙以他事曹與駱有罪例當施粉壁著其過惡遂藏去省檄以滅其迹唐以白身為黃平府判官追奪之令下而拒不納公至吏始克舉其法無所避有以婚田來訴者公雖歸其事於有司後必詢所處當否即有未當折以片言莫不心服而去公既召還兩入臺為御史湖北之人思之不置而士之有文學者大祝周君歷敘其事焉昔者于定國嘗為御史矣而其為廷尉也居十八嵗乃遷夫以十八嵗之久事之可書者宜不一而足史僅存其父于公爭孝婦不殺姑事而于定國之事一無所登載第稱之曰民自以不克而已豈非當時軼其傳而史家無述歟竊用是有感於公之事輒因周君所敘刪取大略為之記以慰其人之思後之載史筆者或尚有考也公今由中書禮部侍郎出為江北淮東道肅政亷訪使云自怡齋記山林肥遁之士遺世而絶俗聲色狗馬金珠服玩之美舉無足動其意而其意之所樂猶有寓乎草木禽魚煙雲荒忽風月寂寥之間是雖若與世俗異嗜而不相入其不能無待於外則一而已自夫外物者言之金珠草木均之無知也狗馬禽魚均之無識也果奚取奚舍焉苟無纍於取舍則稊稗也螻蟻也瓦甓也萬物之職職未有不可寓其樂也獨煙雲風月乎哉仁者樂山而未始資夫山以為仁知者樂水而未始資乎水以為知君子之樂固無所待於外也豫嘗與客造乎自怡之齋叩其主人之名齋者則華陽陶隱居詩語也噫謂白雲不堪持寄而可自怡悅者華陽之戲論爾夫既已遊乎方之外矣白雲何物能為之纍耶賢主人不愛其重圭疊組一旦蟬蛻而去由由然立乎萬物之表蓋有不屑為山中宰相者聲色狗馬金珠服玩安足多道華陽之白雲固不能為之纍也今之名齋顧有取乎其自怡之云者是其中必有真樂者存而外物不與焉昔者孔子之門有以浴乎沂風乎舞雩言其志者矣非有自得乎其中則夫所待以寓其樂者曽何異於山中之白雲乎雖然濠上之遊魚之樂莊子不必知也莊子之不知魚之樂惠子不必知也白雲之可怡悅與否賢主人固無庸知之而賢主人之自樂者豫亦不得而知也而安能言之姑識其與客語者如此主人哈嚕其氏台哈巴哈其名嘗以嗣襲長萬夫云巽菴記餘姚楊君名其宴休之室曰巽菴而徵豫言所以名之義夫巽之義聖人之作易既言之矣其又奚言顧君之名其菴者不可無辨焉耳蓋菴也者山林枯稿之士木茹澗飲而託焉以休其身者也巽之為卦其象辭曰利有攸往利見大人其象傳曰君子以申命行事由是言之則離世異俗者固無用乎巽矣而况君遭時承平方以材見推擇且寖有顯職宜其席不暇暖寧能久居此耶雖然觀象玩辭居者之事也君退而家食藏修遊息于斯其於有攸往見大人者揆之必至審而於申命行事者究之必至悉動則觀其變玩其占而已以言乎變則巽自遁來遁而為巽四乃得位得位而近君其動之占所以悔亡而有功者四以一陰處四陽之間而上順於五皆以正而相得巽之善者也君果遁而不變者乎誠使之進居近列必有以處此矣豈若山林之士離世異俗木茹澗飲嗒然休其身而無所用心也哉抑豫聞聖人之言易取義非一端是故巽為有攸往見大人申命行事而或為隱或為伏竊懼昧者疑君之寓迹乎兹菴有類夫以潛隱屈伏為巽者於是乎言江浙行中書省題名記昔太史公於漢之將相名臣不皆立傳而為之表悉著其氏名嵗月使覽者尚論其世而有以知其人後世官寺之題名實本於此故雖偏州下邑無不記諸其廳壁江浙行中書省涖治錢塘五十又六年題名有記尚矣至正二年夏四月省署燬于災而石亦仆今丞相適下車亟使計工程材拓故址植廣厦增崇其壯觀以昭示乎等威而未及搜遺舉墜補題名之缺平章政事喀喇公視事伊始命掌固考舊櫝合前宰執之氏名嵗月伐石而大書深刻焉令溍敘次梗槩以告來者溍幸嘗以文字為職業而效趨走於屬部何敢以不敏辭載惟我朝稽古建官以來厖臣碩輔入則保兹天子而儀刑乎百辟出則正是國人而屏翰乎四方體貌之尊內外均一所以聳萬民之具瞻折千里之遐衝也今天下為行省凡十有一而江浙當東南之都會生齒繁夥物産富穰水浮陸行紛輪雜集所統勾吳於越七閩之聚訖于海隅旁連諸畨椎結卉裳稽首內嚮挈兵民二枋而臨制於閫外事任至重非元勳懋德兩有文武莫克膺其寄丞相繇中書平章政事進位端揆來鎮兹土紀綱號令煥然聿新群工庶尹奔走率職賜履所及咸為之改視而易聽皇上嘉其有興壞起廢之功特敕詞林宗工作記并書篆以賜一時宰執大臣都司僚佐亦已衣被昭回之光而流榮耀於無極若夫題名之設蓋他日表將相名臣者之權輿是宜與蘭臺祕閣之所纂名山金匱之所儲相為經緯氏名嵗月之存否所係甚大豈偏州下邑廳壁所記可槩論乎然竊聞溫國司馬公記諫院題名以為居是官當志其大舍其細先其急後其緩專利國家而不為身謀有言責者固不容不事斯語充乎是道雖秉國之均任天下之重無難也則其為記又不徒取氏名嵗月之可見而已矧今聖神撫運巨人並生更進迭興均其勞佚猶有虞之九官奮庸於內成周之三后協心於外畫一之治罔間後先述作之家遡觀其時而睹其餘澤之未泯指事載功埀之竹帛不亦廟堂推美讓善追紀前人之盛心也哉江浙行中書省左右司題名記中書之有行省行省之有左右司國朝之制也蓋自唐分三省肇置都司為尚書丞轄之二以天下之大百官之衆而任是職者止於一人其選不輕矣考之六典則其所掌付諸司之事舉正稽違省署符目執直簿以知省內宿直等僅僅數事而已位有常貟職有常守也今政本一歸於中書而以左右兩司為元僚小大之事罔不與聞列曹掾有所關白得執文墨議論相可否僉議既定乃以聽都堂之裁決而署行之較之往昔事權輕重固大不侔其在行省曰郎中曰貟外郎曰都事官稱命秩悉視中朝宰士而恩數無內外之異合左右為一司以兼總乎六曹而分守無彼此之殊位序已崇而職務尤劇委任之重敻絶前比非清方敦實閎敏周通之材莫冝居之由是而歷從班登政地者踵武相望號為宰相之儲誠要官之高選也學士大夫往往觀乎題名而指其顯融於時能以雋功偉烈自見者侈為盛世之美談安可無以考其去來之嵗月哉江浙行省左右司重新於災燬之餘爰命溍記其題名而刻諸廡下溍竊惟古之記題名者不特以謹嵗月必因其所居之位而寓規誡焉今之都司上以彌綸乎相業下以綱紀乎曹務至於邊隅之厄塞閭閻之幽隱靡所不當問非若羣有司效一官守一職而可以一事名言也庸敘次其設置之沿革以為之記凡參贊之功有可稱述而非題名所能盡記者茲不得而詳焉義烏先達題名記義烏邑庠禮殿之西南故有文昌祠宋先達題名在焉祠廢而石毁已久至正七年春主教事者暨先達諸公之後人始復修其祠事而買石重刻置其中昔我世祖皇帝既定天下于一萬邦黎獻共惟帝臣特旨以宋咸淳甲戌進士第一王公龍澤為行御史臺監察御史公邑人也鄉大夫先生莫不動色胥慶以為科目之設茲其權輿逮仁宗皇帝臨御伊始承平寖久文運之開適惟其時誕布詔條光揚祖訓著貢舉令以興賢能法行於延祐之初而兆見於至元之末公之用舍乃科舉廢興之幾名不稱則無以風厲乎四方搜其缺軼而表顯之不獨為一邑之榮觀而已矧今聖天子在上稽古右文分命儒臣撰定前史因其善惡以寓勸懲列傳所載盡瘁事國如忠簡宗公正色立朝如文清徐公皆邑之先達也覩其名而知感慕激發則兩公不得專美于前而後賢之踵武相接又豈止為科舉之士哉是宜有以彰千載之盛際非徒可存一代之故實云爾詩曰自古在昔先民有作遺風餘烈固未泯也又曰高山仰止景行行止吾儕小子敢不勉諸題名舊刻溍之曽大父左曹公實志之茲俾溍嗣書其重新之嵗月溍不得辭也義烏縣學明倫堂記義烏故有先聖廟在縣南宋慶歷中徙于縣東而立學以應令崇寧初命縣皆置學又徙于縣西尋燬於寇今廟學在縣北則紹興間所徙也其後又斥廟西地以為學而規制寖備逮入國朝有司以時繕治惟謹天歷二年冬達嚕噶齊特哩始盡撤而新之奧殿邃廡夷庭穹門崇高修廣悉倍其舊且改作論堂直廟之北墉面勢甚正而地脈隱隱隆然以起堂適據其脊或挾宫宅地形之術審其方向謂宜避勿犯由是未及就緒而遽輟工後來間有不為其所怵者率憚於役殷費巨罔敢自任顧假術者之言以為解閲嵗滋遠莫或以動其意至正三年夏五月縣尹周侯自強來涖事展謁而退覩斯堂之塈茨不施欹仄敝漏殆將覆壓問其故而為之太息亟令鳩財僝功易其已壞而補其弗具杇墁瓴甓必堅必良棟杗豐碩櫺檻顯敞飛榱步簷周于四阿左右齋序為屋十間基而未構者半完舊益新畢潰于成什器之須待用無缺先賢之祠曰忠孝堂寓于廡下則遷而位于廟之西南巨石偃蹇當乎前軒則因其自然輔以土壤及它山之石使就平坦甃其上為杏壇修五十尺有竒而廣加其修五之一始事於是年之冬訖役於眀年之春主教事者欲圖賢侯之績俾永勿墜爰狀其實屬溍記之蓋古者惟有學而無廟後世或有廟而無學廟學之制莫備於今詔書屢下風厲作成視昔有加可謂盛矣義烏為名縣其有學亦已久夫何一旦倐興忽廢春秋行事駿奔走執籩豆濟濟在列而考德問業羣居遊息皆無其所弦誦之聲希濶寂寥幾若向之有廟無學何以廣教道稱上旨哉冝乎周侯鰓鰓焉致其力而不恤於流俗也凡先王建學明倫之本意與是邦人材風俗文物之大槩有晉陵胡公珵鄉先達朱公如璋陳公炳及溍之六世祖處士君所為記論著已詳石多不存而其文並傳於今未泯溍不敢勦取前人成説以瀆告于同志之士姑為記其顛末如此俾來者有考焉徐偃王廟碑後記衢州徐偃王廟有韓愈氏所為碑文其别廟在今蘭溪州者里人徐畸實為之記畸辨其未嘗稱王而建安袁聘儒記江山之别廟直謂孔孟之徒無道偃王事者古昔帝王事迹不載於經而雜出於傳記百家之書固多矣况偃王事見司馬遷史記范曄後漢書張華博物志本末甚具至愈之文出而學者家傳人誦之偃王仁義之心遂以暴白於天下後世由愈之言可信不誣也若愈者非所謂孔孟之徒歟衢人柴某家于蘭溪既與州之士民修其祠事且摹刻愈碑文立石殿廡而屬溍志其嵗月于下方溍竊惟湯武以仁義興偃王以仁義亡興亡雖異其為仁義未始不出於心之同然是州之人誠能於愈之言信而不疑則其致力於神將弗懈而益虔祥慶之來下蔭庥之所加未有止也庸附見畸聘儒之説而論次之庶覽者得以詳焉忠簡宗公祠記義烏滿心寺鐘記宋名臣忠簡宗公之文也石毁弗存已久寺僧曰直曰謐實公七世諸孫直先示寂謐今以甲乙之傳嗣為住持爰輟衣盂之資購田若干畝祠公於西廡探家集得舊記重刻諸石而俾溍志于下方謹按公諱澤字汝霖世為義烏人元祐六年中進士第調館陶尉歷龍遊膠水趙城令政和三年改官知萊州掖縣差通判登州忤道士得幸用事者既丐祠而歸猶坐削奪羈置鎮江國卜居焉經郊恩敘復監鎮江酒靖康元年以臺臣薦召對假宗正少卿充和議使公奏名不正更其名計議使訖不行會選易河北帥守乃擢公直祕閣知磁州河北義兵都總管就遷祕閣修撰高宗以親王奉使過磁州力止之朝廷即授以兵馬大元帥公為副元帥暨高宗正位宸極命公以龍圖閣學士知襄陽府俄徙知青州又徙知開封府遂以延康殿學士為京城留守兼開封尹升資政殿學士公方身任中原之事時宰忌公者從中沮之公以憂憤成疾而薨建炎二年也有旨拜公門下侍郎御營副使而遽以遺表聞詔贈觀文殿學士尋賜諡忠簡公階正郎恤典初行止用侍從恩數進四官後乃以通議大夫告其第纍加至開府儀同三司云公墓在鎮江之京峴山而立廟於鄉郡從祀於邑庠並著為有司之彛典謐之生上距公殁二百餘年且去家為浮屠而不忘乎賢其賢親其親祠事之興又禮之以義起者也溍是用序次其作始之自并以公官伐之概系焉公平生大節及功施于社稷者有傳在國史有遺事行於世茲不書重修釣臺書院記漢嚴子陵先生會稽餘姚人史稱先生少與光武同遊學光武即位令以物色訪之得於齊國拜諫議大夫不受去耕於富春山按圖志是時齊為郡而未為國其遺迹已漫不可考今建德之桐廬實富春故地先生釣臺在焉所謂嚴陵瀨也不獨以嚴名其地而且以嚴姓其州先生高風盛烈之所存於此為最著崇立而表顯之使人知所嚮慕奮發不亦為民師帥者之職歟釣臺有祠創於范文正公作州之日而重新於蕭侯燧其有書院則自陸侯子遹始更王侯佖趙侯汝歷規制乃備國朝仍其舊設師弟子員而鄰僧怙勢悉奪其恆産以為已有訴之於官僅復其半所食者瘠田五十畝而已間嘗入錢佃其旁官山三十頃取鬻薪之竒贏以佐營繕之費豪民欲擅其利搆訟連數嵗不決至正元年秋總管羅公下車首務修明學政偶閲其牘亟命度其地之肥磽均而為二俾分佃之咸以為平而各安其業山長沉元鼎方謀銖積寸纍以興壞而起廢公復諭士人合私錢二千五百緡助其弗給土木之須靡不畢具元鼎尋書滿徐天麟繼之公以元鼎經畫有素留使同竟其役會達嚕噶齊高昌公適至與公併志一慮臨事勸相焉寮佐亦克交贊其事而躬程督之勞則縣達嚕噶齊伊埒穆爾丹也屋以間計凡四十有九完舊者曰燕居殿曰祠堂曰清風堂曰招隱堂曰客星閣曰山高水長閣曰遂高樓曰羊裘軒曰懷仁輔義兩齋增新者曰三公不換亭曰天下十九泉亭曰錦峯繡嶺亭曰東臺西臺兩亭於登臺之路而為門以識之又作門其外榜曰釣臺曰富春山庀事于是年之十月而訖役于明年之五月寓公遺老來學之士共樂其成于是馬君泰之以書來屬溍識其嵗月夫以二千石之重而荷承流宣化之任所以導揚上德扶世覺民者非可家至而户曉也本諸名教樹之風聲待其目擊而心惟氣感而機悟將有惕焉於中不能自己者矣諸君子藏修遊息於斯顧曕江山想像儀刑聞先生之風而莫不興起尚無忘賢師帥新美之功哉若夫先生之行義與出處之大致見於前賢所論述者溍不敢贅陳也高昌公名間爾仕於中朝歷章佩監中尚卿羅公名廷玉興和人以監察御史纍遷江北淮東道肅政亷訪使今由兩淮都轉運鹽使來涖茲郡云海鹽州新作大成樂記古之釋奠折爼升觴而已其為禮也略故其用樂之始莫得而詳記曰凡釋奠者必有合也説者或以合為合樂然則釋奠之有樂其出于古歟若其音節器數則自漢儒未嘗言之前史所載元嘉之六佾特施于太學開元之宫懸僅設於兩京政和造雅樂名大晟始頒行於天下而紹興著令郡邑釋奠其樂三成蓋至是而州縣學有事於先聖先師無不用樂者矣國家有因有革存其聲音器物之舊而變其稱號以新一代之觀聽今所謂大成樂是也海鹽昔為縣時既立學而廟祀孔子逮版圖入職方朝廷以其地大人夥易縣為州而廟學之制猶循其故禮具而樂缺有司以吏議所不責久置弗講至正元年夏四月陳侯某來知是州首務興舉學政問其籍則為士者百家為田者萬畝問其春秋之事則有牲幣而無樂侯為之惕然與寮佐延諸儒以圖之僉言儀真有周君者善樂事老而不仕寓迹于雲間欲正雅樂非君不可侯即俾持書幣迎致焉君曰樂以導和不和不足為樂僕觀江淮間所用樂雜出于伶人賤工之手器不中法音不中律左右高下參差混淆惡足以致和哉苟徒捐厚費而飾虛文僕弗為也侯曰作樂以和神惟君言是聽君乃為考其度數齊量範金為鐘而協以古律管彼此適均吹其律而鐘自應至於琴瑟亦悉自製惟笙磬之屬擇善工使受指畫而為之集諸生三十有二人教之肄習而以明年春二月上丁合奏焉在列者無不欣豫於是教授陳某以狀來屬豫書於麗牲之石用垂永久蓋古之設教莫重於樂非止用於釋奠也侯之於樂不但欲辨其鏗鏘又必求通其義者相與討論之可不謂知所本乎諸君子從侯修其時事周旋升降於堂序之間必有聞其樂知其德而鼓舞於鳶魚飛躍之下者矣是舉也有功於教道甚大非徒偹其闕典而已可無書乎德清縣學祭器記德清縣學新作祭器成主簿潘君以書來曰縣有學學有廟尚矣前教諭蔣釣所置祭器僅四十有九吾縣尹蘇侯之始至也首以興學為務勒褒封之辭以昭國典飾嚴奉之具以崇廟貌增廣生員而訓迪勸勵之尋用今教諭胡宗海之請按舊圖補造祭器之未備者百三十有九樽爵簠簋豆登罍勺槃玷之屬如式告完費錢以緡計者千七百五十皆富而好禮之家慕嚮而悅助之者也蓋侯之撫民有恩馭吏有法而濟之以無倦今達嚕噶齊與侯下車同日克篤於寅恭之義併志一慮俾伸其所欲為僕居其間雖無能為役亦左右交贊之故未及期月而庭無滯訟姦豪屏息官府事益以簡餘力所逮自社稷壇三皇廟至於公署賔館亭臺庫廄以次畢新凡侯之所設施可稱道者非一而莫重於禮器之大備願舉其所重為之記他善狀得以附見焉豫惟古之釋奠為禮也略為器也容不必備今既廟事孔子在著令為中祀牲幣物器咸有定制其禮自朝廷達于四方而偏州下邑迫於米鹽細故日不暇給春秋之薦幸不廢而已蘇侯獨識其若緩實急而不苟於因陋就寡考儀文之缺而於器數之末有所不遺能盡其職分之當為而敬其事如此餘可知也庸弗辭而記之達嚕噶齊名布哷齊河西右族蘇侯名靖世居濮之臨清潘君名子陽豫同郡金華人也祭器之目及助錢者之氏名悉列于石陰云南山題名記婺之宦學於杭者每嵗暮春必相率之南山展謁鄉先達故宋兵部侍郎胡公墓仍即其廟食之所致祭焉竣事遂飲于西湖舟中以敘州里之好大德八年春三月癸亥會者四十有四人魏國趙文敏公時方以集賢直學士領儒臺溍幸獲從先生長者之後而趨走於公履屐之末逮今三十有九年乃以非才補公故處暇日從鄉僧遊龍井覩公舊題而與道其故事咸謂不可久廢而莫之舉亟以白于宣政副使王公令同郡大夫士暨方外交四十有一人以至正二年春二月癸亥復會于南山追數向之四十有四人存者殆無幾或顯融於中朝或隨牒調補於遠方或已倦遊歸休於家林惟溍忝有祿食于此而得齒茲盛集未知後三十有九年今之四十有一人重來者誰歟古人云後之視今亦猶今之視昔此題名之所為作也諸公謂溍宜題識其首是用弗讓而直書其嵗月以俟後之覽者焉通濟橋記婺瀕溪為郡二水薄城南合流而西其勢滋大距城一里所故比舟為浮橋以達往來霖潦暴溢絙弱弗支舟數敗散水湍悍不容篙櫓或有急而冒險以進多致覆溺西峯及菴禪師憫人之病已甚謀伐石作橋以利永久禪師名德之重尊官大吏豪商富民莫不慕嚮之輸財薦貨狎至宣慰使哈喇岱金吾公為移閩閫徵善二而授役焉度地於浮橋西若干步排積沙以定其基布橫木以實其底絫石于淵者十有三旁為兩隄中為十一頓凡頓之形西正方東則小撱而剡其上以殺水怒起大德四年秋九月訖十年春三月兩隄十一頓皆集未及架木為梁而禪師遷湖之道場尋委順示寂杭遊民沉甲斷髮為頭陀走京師紿權貴人言我及菴弟子願假外護以畢橋事權貴人不知其詐為請于東朝既得請南還則並緣取民財奪商人木衆共患之郡長吏亦遭其凌侮而弗堪也乃發其姦陳之臺司以聞于上正其罪沒入其錢遂罷橋局而毁石頓石堅緻不易動僅仆其五而止延祐元年冬十有二月也禪師之法子雪牛芻公嘗以橋不可廢訴於官議久不決元統二年春部使者徐公甫下車即詢民間利害當興除者未幾友雲龍公時主西峯法席亟以兹橋為言徐公矍然謂人之為民害者宜繩以法橋以利民不宜因人而廢親署公牘為申明之未報會徐公入參議中書省事白於宰相執政咸以為橋梁與不急之役異詔旨甚明有廢必舉無可疑者符下龍公首罄衣盂以倡興作江浙行中書省既給以前所沒入之錢二萬餘緡行宣政院亦命開壇集衆僧受具戒得香幣之資為錢五萬緡乃市大木於處之遂昌募良匠於閩南江左以至正二年夏四月庀事今工部尚書慶喜公前刑部尚書張公並持部使者節而來躬涖視之且輟俸金以增役費寮佐及所部吏民佽助恐後二公復併志一慮殫其勸相程督之勤於是諸頓悉完頓之高去水四十有一尺貫以木梁被以石甃高出頓上又八尺而橋成橋之修七百八十尺廣若干尺覆以屋如其修廣楹間五十而為殿者三為亭者二殿以妥觀音大士泗洲僧伽元天上帝之神亭以置四天王因浮橋之舊名榜曰通濟其年冬十月既望張公率憲府暨文武官屬以落焉伻來俾為之記古者辰角見而雨畢則除道天根見而水涸則成梁有司嵗一治之耳是役也遡其造端之始已不啻四十年而一作一輟卒有待乎任風紀者力振舉之援著令以從事乃克就緒其廢興所繫固非有司之常事可以槩論夫何以措其辭哉昔泉州守蔡公記萬安渡石橋第敘役要而不及其他蓋春秋之法所謂直書其事具文見意者也某不倿敢竊取斯義考其廢興之故而備記之用謹嵗月貽諸後之君子云爾博古堂記故翰林待制僉淮西江北道亷訪司事申屠公至元間名御史也公平居無他好玩惟見以古彛器法書名畫求售者輒援厚直取之所蓄既富緘縢庋置覆以傑屋名曰博古之堂公殁逮今闕十有闕年嗣子耀州史官傳藏護視惟謹升其堂如見其親之存焉間嘗諗于某曰我先君燕休之所曰九思堂吳文正公實為之記别號忍齋則翰林侍講學士揭公記之武昌别業有篛谷則翰林待制柳公記之作樓以儲書曰墨莊則翰林學士承旨歐陽公勒銘其上獨博古堂僅存治書侍御史李公魏國趙文敏公所書扁榜而未有為之記者幸畀以一言俾我後人永保而勿墜不亦可乎某生也後不及從先生長者登公之堂而區區陋微於諸大老無能為役然把雅故於耀州非一日安敢以不敏辭昔者孔子言夏殷之禮而謂杞宋之文獻為不足徵當孔子時杞用夷宋圖霸已久典籍散亡而賢人之存者無幾其不足徵尚何怪乎秦人焚詩書而博士所掌故無恙蕭何從沛公入咸陽第能收其丞相府圖籍以知天下厄塞戶口多少強弱之處至于先王之舊典儀物則一切委棄弗顧而墮於楚人之手以同歸於煨燼有識之士所為追恨痛惜而不已也國兵南伐趙氏納土既封其府庫以入于有司而一代之儀章物器皆公為江浙宣閫都司時親受於其主者以上于朝廷武夫俗吏莫敢壞傷斷簡殘編亦靡亡失其有功於斯文甚大中原文獻流落東南者固不得比隆夏殷公之賢於蕭何則已遠矣而又能以餘力窮搜極訪因山巖丘隴屋壁之遺而窺見皆人制度法象之所寓精義之所存公之有志於古豈徒以資耳目玩好而已哉矧以耀州為之子克謹其承久且弗忘不待當祭而齋然後思其居處思其所樂思其所嗜也來者詎可忽諸公諱致遠字大用東平壽良人其歷官行事有永國文康閻公所為碑銘此不著耀州名駉以清方直諒世其家云述古堂記吳郡繆仲素好古博雅之士也平生所嗜惟古器物卒然遇之輒購以重資並置一堂之上其目若干所寶用者有宋內府故藏紹興丁卯邵諤所進述古圖圓研因以述古名其堂而求豫記之述古圖本李伯時效唐小李將軍用著色寫雲泉花木及一時之人物按鄭天民先覺所為記坐勘書臺捉筆而書者為東坡先生喜觀者為王晉卿憑椅而立視者為張文潛按方几而凝佇者為蔡天啓坐盤石上支頤執卷而觀畫者為蘇子由執蕉箑而熟視者為黃魯直憑肩而偶語者為陳無已據橫卷而畫歸去來圖者為李伯時按膝而旁觀者為李端叔跪膝俯視者為朝無咎坐古檜下擘阮者為陳碧虛袖手側聽者為秦少遊昻首而題石者為米元章佇立而觀者為王仲至坐蒲團説無生論者為圓通大士偶坐而諦觀者為劉巨濟凡著幅巾者十有一人烏帽者二人而其一為道帽仙桃巾琴尾冠者各一人衣深衣紫衣褐衣者各二人青衣者四人黃衣者三人而其一為道服繭衣紫氅黲衣各一人一童執靈壽杖一童捧古研兩女奴雲鬟翠飾則王晉卿家姬也石床錦褥玉巵瑤琴以次陳列大溪峭壁怪石淙流曲徑危橋映帶左右松竹蘭蕙紅蕉紫茂蔭翳聮絡天民又謂有羽流名動四夷師表千古伯時偶未之及乘間寓意繪而為圖以資好事之玩莫知其所指為誰記作於政和甲午後一十又三年諤乃以研進研蓋端溪紫石其形正圓隆其中以受墨環其外以為水委而旁刻兹圖其物采雖不可辨而服飾位置猶倣佛可覩所謂述古圖圓研也豫聞商書記遲任之言曰人惟求舊器非求舊惟新夫所以欲求器於新者豈忽遠而貴近哉取其新以適於用而已三代先秦古器往往流傳至今使兑之戈和之弓垂之竹矢離磬崇鼎一旦歸于士庶之家固無所用惟研也者自王公達於庶人所通用也矧茲制作之妙備存人物儀刑之舊而其用則日新而不窮冝為仲素之所貴重歟堂以硯得名記為堂而作仲素所蓄有出於茲研之前而非堂之所以名者豫不得而盡著也西湖書院田記昔天下未有學惟四書院在梁楚間今江浙行中書省所統吳越間之地偏州下縣無不立學而其為書院者至八十有五大抵皆因先賢之鄉邑及仕國遺迹所存而表顯之以為學者之依歸不然則好義之家創為之以私淑其人者也獨杭之西湖書院實宋之太學規制尤盛舊所刻經史羣書有專官以掌之號書庫官宋亡學廢而板庫具在至元二十有八年故翰林學士承旨徐文貞公持部使者節涖治于杭始崇飾其禮殿而奉西湖上所祠三賢于殿之西偏行省以其建置沿革之詳達于中書畀書院額立山長員異時書庫官之所掌悉𨽻焉顧所以贍之者田皆薄瘠且逺在他州縣富嵗所輸猶多不登營繕廩給之須猶或匱乏而弗繼未有餘力及其書也郡人朱慶宗以二子嘗肄業其中念無以報稱乃捐宜興州泊陽村墟田二百七十有五畝歸於書院遵著令減其租什二實為米一百三十有二石請别儲之以待書庫之用而毋移他費凡書板之刓缺者補治之舛誤者刋正之有所未備者增益之主教事者既白於儒臺而轉聞於憲府俾有司蠲其田之徭役慮後人昧於所自而墮其成規徵文為記以示永久昔蘇文忠公記李氏山房藏書以為物之悅於耳目適於用而不敝不竭隨人之才分求無不獲者惟書耳李氏於其書既取而用之而書固自如未嘗少損也夫書誠可悅而適用不敝不竭矣使傳刻者嵗滋久而常無弊則摹造者日益廣而豈有竭哉向之書院若白鹿洞若嶽麓非朝廷所賜無以得書今也以布衣之士而垂意於學校之事不患其居之不崇食之不豐而患其書之不完此仁者之心無窮之惠也學者宜無求而不獲能玩味其英華而究極其根柢者幾何人哉蘇公所以嘆古人得書之難而其學非後世所及後世之書多且易致而學者益以苟簡也蘇公書院之先賢顯誦其説而推明之以為記庶幾來者主張是而勿廢且以勸夫束書不觀遊談無根者焉沈氏義莊記湖之歸安東七十里是為花城為其鄉之望者曰沉君家故業儒君之父處士公遺外聲利不有仕祿而樂出私財以賑人之急謂親親仁民宜有本末次第首圖創義莊以教養其族人未及就緒而殁君以為前人之志不可不續爰以至順辛未捐田五百畝建義孰搆殿宇妥先聖先師像其中以春秋修釋奠之儀闢講舍齋廬延宿儒為之師而聚族之子弟俾隨材以受業鄉人來學者弗拒也尋復以至正乙酉捐田五百畝即義孰之南立義莊屋以間計者若干嵗取其田之所入以實之擇族中之長且賢者同主其出納貧無以給昏喪諸費者量厚薄之宜制隆殺之等而周給焉大抵本於昔人之成規而微有所損益懼來者弗克嗣其事則以聞于外宰相執政及部使者咸報如所請沉君既求里之寓公記其義孰而義莊未之有記乃敘次其事以屬筆於豫古之有國家者必度田授民以厚其生立宗收族以教之親愛自其法不行於後世而民之失其養者日多風俗亦日衰薄然而萬古一心萬心一理田制壞而此心不與之俱壞宗道廢而此心不與之俱廢仁人君子苟充其一念之良心推吾有餘資彼不足使得遂其生而發其油然親愛之心豈非禮之以義起者哉是則生乎千載之下猶為三代之民也傳曰一家仁一國興仁一家讓一國與讓有能慕沈君之為而興起焉將見人各親其親而周宇之內無一夫不獲其所矣子子孫孫勿替引之善繼善述者所宜盡心也戚戚兄弟莫遠具邇秉彛之良心誰獨無之豫弗辭而為之記者非徒以朂沈君之後人纂承而弗墜亦以為富而好禮者之勸也敏學齋記吳郡施允文好修之士也築室於城東為齋居之所匾曰敏學四方士大夫來吳允文必踵門請見來者亦莫不樂與之遊會豫將北上艤舟姑蘇驛允文來求豫記其所謂敏學齋者豫告之曰六經之言學肇見於武丁之命説而論為學之道曰遜曰敏而已遜者欲其謙退而如有所不能敏者欲其進修而如有所不及退則虛而受人進則勤以勵已二者固不容偏廢也孔子大聖人而不自聖故曰我非生而知之者可謂遜矣然而又曰好古敏以求之者則其求之也曷嘗不貴於敏乎他日與顔曽二子言仁與孝而二子皆自謂不敏其遜抑可見矣回之仁參之孝三千之徒未能或之先焉豈其不敏者乎苟徒為自卑而不思所以自強是謂知退而不知進蓋遜雖美德然必敏則有功由是言之則為學之道所重尤在於敏也允文取以名其齋誠知所務矣而允文不自以為足汲汲焉欲求豫言申其義以記之豫聞孔子教人以訥於言而敏於行又以敏於事慎於言為好學允文平居奉親孝交朋友有信敏於行與事者也因其所已能勉其所未至進進不已必有深造自得者焉奚以豫多言為哉姑以此復于允文云爾是為記間止齋記錢唐張子英生宦家且居今盛時而雅不樂仕進日以篇翰自娛尤嗜淵明詩摘其語匾所居室曰間止齋而屬豫記其所以名之義豫觀淵明止酒詩章首即以居止城邑逍遙間止為言則其所謂止者不止於止酒而已夫天壤間事物有萬不齊是非之相傾利害之相乘妍媸之相形強弱之相陵莫知其所終極而人以眇然之一身與之周旋而左右酬酢乎無窮之變孰能於膠膠擾擾中求其止乎山林枯稿之士棄事絶物而寓情於風月寂寥之鄉仰雲嵐而俯泉瀨若可以止矣是猶為有所待而未能無纍於外也惟放於自得之場物任其性事稱其能而吾方且遺其所寄不知城邑之為山林山林之為城邑斯可以無往而不得其所止此非莊生之所謂逍遙而淵明取以為言者乎抑其言不止於止酒亦不止於及其居止也坐止於高蔭而不知孰為輪奐之美步止於蓽門而不知孰為康莊之達味止於園葵而不知孰為食前之方丈歡止於稚子而不知孰為侍妾之數百非去彼而取此也間放不拘逍遙自適耳又安知孰為莊生之遊孰為淵明之止乎子英清修好古處城邑如在山林未嘗弊弊焉牽於名迹宜其聞淵明之言而有契於心也然豫聞孔子可以止則止苟未可以止而止與可以止而不止蓋胥失之當其可仕則如淵明以弦歌為三徑之資當其可止則如淵明之不為五斗米折腰解綬而去無纍於物而異方同得何適而非逍遙是乃善學淵明而得其真止者也子英屬豫記其為止之義豫之所知若是而止耳昔者曽子以緝熙敬止釋止善與淵明以逍遙間止詠止酒其取義皆非尋常梏於章句訓詁者所能通豫方欲見好讀書而不求甚解如淵眀者共論斯事子英可謂淵明之流非歟倘能為豫言之請留更僕而筆受之以為後記記高祖墓表後右迪功郎黃公墓表公溍之高祖其葬也宗正丞兼左司郎官朱公元龍方奉祠里居故我曽祖户部公求為之文表于墓道曰迪功者宋紹定辛卯公以東朝慶典受封初階也後以户部公景定間再遇明堂恩庚申贈宣義郎癸亥贈承議郎咸淳丁卯又以郊恩纍贈朝散郎髙祖妣宗氏纍封安人後公二十七年卒年九十有二曰孺人者亦其初封也子男四人長諱夢炎即户部公是為溍之曽祖幼能屬文年十有一鄉先生或戲謂曰小甘羅之一嵗早已能文應聲曰加孔子之數年可以學易鄉先生大竒之表所謂挑以文應口輒對是也既而以紹定戊子嘉熙丁酉連請兩浙轉運司文解表云再薦于漕者時猶未第也公殁後八年乃以免解擢淳祐庚戌進士第仕至太常丞樞密院編修官左曹郎官以朝請大夫致仕後公三十年卒年七十次焱初户部公客于觀文殿學士少師吳公淵假以男爵使就試於漕闈非其志也掇俚諺為啓以辭曰舉子忙槐花黃早已覺壯心之動時文熟秀才緑要須取本色而歸吳公嘉其志而不容其卒辭乃以回貤於焱後纍遷忠翊郎權安慶府望江縣令炳蓋其舊名也後公四十八年卒年八十有五次煥所後父曰伯恭公之母弟次熒以公殁前一年補太學生後公二年卒年二十有八女二人長適王囦金嘉熙戊戌殿試第五人授從事即昭慶軍節度掌書記未上而卒表不書帥鎮軍號而書州名曰安吉者取其易知也次適劉瞻孫即時孫也户部公二子長垓次承節郎諱諤是為溍之祖一女適劉景辰有豫應龜太學內舍生望江令三子長埴次壔咸淳己巳户部公似明堂恩當任子輒推以與壔故户部公之子無用蔭入官者壔未命而户部遭內艱尋更名君澤以進武校尉試有司名不見于表者時猶未生也一女適朱叔麒登咸淳戊辰乙科授從事郎處州軍事判官遷國子監書庫官太學一子埈生一女適劉璨埈生于嘉熙初元而承節公生于隆興寓舍表所書皆小字時猶未名也其後埈又改名景山云孫女實三人而表云四人莫得而詳也惟我髙祖妣之葬户部公所為壙志有墨本傳藏至今而高祖墓表石弗存已久溍生于高祖既殁三十五年之後今七十始於朱公家集獲見其文追慕感泣不能自己大懼嵗月寢遠墜逸不傳謹録而藏之並疏其纎悉委曲俾我後人尚有考也曽元而下表所不及者家譜存焉文獻集卷七上欽定四庫全書文獻集卷七下元黃溍撰湯氏義田記湯氏在龍泉為巨族宋南渡時岐國公思退以文章家致位宰相族益著岐公之伯祖太中大夫後九世是為武翼大夫節武翼生望以父蔭讓其弟始不有世官有子曰鏞字伯韶生十三年而德祐失國遂隱不仕人稱之曰石屋處士云處士君既不仕則混迹民間務為生産作業家以苟完自奉甚簡薄而樂振人之窮急謂仁民愛物宜始於親親乃置義田以贍同族其為田二百畝嵗可得穀四百石擇族人亷謹而有幹局者俾任其出納月給人五斗有喪者二石葬則半之産子者一石再有子則倍之子始入學豫錢三十緡嫁女如入學之數娶婦則減三之一年七十者每嵗帛一匹能自業者弗預不知檢飭而有子弟之過者罷之大略倣范文正公之成規而微有所損益其為施貧活族之義則無以異也蓋范公有志於是者三十年暨出臨方面入踐政途位充而祿厚始克終范志歧公方貴顯時未及為而處士君乃以一布衣為之可謂難也已然嘗觀三王之民皆有常業食飲服用之須不必仰於人而後具公卿大夫所受田祿亦有等差而不得過其制安所取羡田以為相賙相恤之資乎若夫合族之道又非衣食於我之謂也厥今田制之壞宗道之廢亦已久矣有能以義起禮而崇其恩愛於服窮親竭之餘不愈難哉處士君三子長濵次溱次京溱不幸先卒濵與京是繼是述弗懈益虔而京不逺數百里走錢唐求豫書其事于石以告後人俾勿墜孝子仁人之用心何其深且逺歟是固豫所喜聞而樂書者也處士君之言行前進士葉峴既以銘其墓兹不復云寶忠堂記翰林學士公多爾濟巴勒以寶忠扁其所居之堂而貽書於溍曰昔我魯國忠宣忠武兩王佐太祖皇帝肇造區夏克有夫勳慶賞所加爰及苖裔為國家之世臣兹已八葉忠武始嘗以太師國王都行省承制行事建牙於燕而今京師迎陽里第則吾祖同知通政院事府君之所作也豫不幸少孤痛自策勵獲底於成人蒙被眷知備員禁從恆廩焉以隕其家聲為懼竊聞古之人或以善為寶或以仁親為寶而吾家世之傳則以忠為寶子孫宜謹其承相與保守之而弗失是用名吾堂曰寶忠庶幾退食於斯心在帝室夙興夜寐靡敢忽忘不可無告後人俾繼吾志願有述而刻諸某厯觀漢初之豪傑並起而從髙帝馳驅於中原髙帝既定天下異姓之臣裂地而王者八國類皆鮮克有終張耳頗以智自全亦僅至其子而止獨吳芮受知髙帝稱之曰忠著於甲令由衡山而長沙傳號弗絶迄今千四百年猶廟食於一邦孰不曰德之薄者其流卑德之厚者其流光推本而言則為德之薄厚特係夫能忠與否耳惟扎刺爾氏之先奮其雄材翊扶興運元功茂烈載於彞常自時厥後享有茅土訏謨廟堂出入帷幄者莫不世濟其美德業之盛有光於前雖古帝王輔弼之臣殆不是過非僥幸於一時之際遇而謂之豪傑者可同日而語也然自魯兩王父子下逮東平之三世易名節惠悉冠以忠與向之著令稱忠者若無以異令聞長世不亦宜乎蓋人材與時髙下固有不齊至於事上之貴乎忠無古今一也公以宗臣世胄日侍天子清間之燕而謙退不伐克念厥紹休沐在外輒與鴻生駿士探討儒家者流之言而知忠之為貴奉以周旋如恐弗勝既以受之前人者昭揭而自警又圖有託以貽方來俾永勿墜為慮豈不深且逺哉詩曰錫爾介圭以作爾寶此所謂寶上之賜也公之所寶家世之傳也能不失其家世之傳則能久有夫上之賜矣百世之下尚鑒於兹學齋記伯溫甫以學齋扁其居室而來諗于某曰豫幸以國子獲執經於館下忝釋褐而備官使於西陲者二十載異時同舍生類能以文學論議自見已獨無稱焉大懼去師友日逺墜失不得附於英俊之列爰以學名吾齋庶幾退息於斯有所自警以為進修之地匪但求無愧乎今人苟未至乎古人不敢不勉也子其為我記之某聞魯論所記子夏氏有仕優則學學優則仕之言説者謂斯言非為學而弗仕者勸乃為仕而弗學者戒也然則學之優或不必於仕仕之優曷可以無學乎蓋古者由家而鄉以達於國固無地而無學其賢能之興於鄉者必還以長而治之嵗時屬民射飲讀法使之習容間禮考德問業莫不有教學相長之道焉則亦無事而非學無時而不學也今之為學既不皆與古合其仕者又率以鈎托趨辨為大務而無暇從容出入升降酬酢於儒服俎豆之間若夫隨牒逺方邈焉海隅徼塞萬里之外則弦誦之聲益以希濶年未至而不視學者皆是也有能不為事物之所奪風氣之所移而卓然以古人自任如伯溫甫者不亦有志之士歟厯觀書傳所載能終始於學者無如衛之武公年九十有五猶作詩以自警曰相在爾室尚不愧於屋漏先儒以為此誠意正心之極功則其所學可知也伯溫甫揚厯之久譽望甚著年踰強仕以選擢外宰相之元僚而居是室也忘其齒之長身之貴不怠於自警如此其亦武公之徒矣由是而登於武公之年所造詎易量哉且老之為言考也庸謹記之以俟他日考其成焉敕賜丞相冀寧文忠王祠堂記故丞相冀寧文忠王以至正七年秋九月十八日丁巳薨於位二十六日乙丑祔葬京城和義門外之先塋八年春某月某日某甲子建祠堂順寧府宣平縣宫家莊之景賢書院冬十一月十二日甲辰宰執大臣奏事明仁殿而退諭上旨俾臣溍撰其先塋碑銘并以祠堂記命臣溍製其文賜王母弟今大司農達實特穆爾使書于石仍勑平章政事議中書省事姚庸篆題其首而刻焉武宗皇帝昔在潛邸出鎮朔方故丞相和寧忠獻王以宿衛重臣久侍帷幄上既嗣大厯服忠獻遂以佐命元勳入秉國鈞夙興夜寐勤勞帝室將置其家於北土令就髙爽而逺歊袢乃以上所賜宫家莊之地築别墅居之而延師教其二子俾有成立為時名臣即文忠及大司農也里人化之無不悅學忠獻以父老之請為創精舍聚其子弟而教育之有司以狀白於中書畀之額曰景賢書院立山長為學者師忠獻既殁因作堂而祠焉其構興之初今上皇帝特出內帑金錢幣物以相其役東朝及中宫致助有差逮其訖功上復遣使函香具牢醴以落其成詔詞臣歐陽玄為之記至是别為堂以祠文忠事聞又命臣溍記之臣溍竊考古者天子之公卿有大勳勞則祭於大蒸後世之廟廷配享是也諸侯有國大夫有家則設廟祧壇墠而祭之後世之羣臣家廟是也傳所謂釋奠有合有國故則否説者以為國故若唐虞之有伯夷后夔周之有周公有則自奠之無則合於鄰國今學校各祠其鄉之先賢猶有取其遺意也夫唐虞成周固非有鄰國之可合舍夷夔周公而誰歟忠獻以雄材偉略出則膺爪牙之任入則荷腹心之寄至於處危疑之際不動聲色而施轉旋闔闢之功民志以之而定國勢以之而安可謂社稷之臣矣文忠用貴王賤霸之術佐今天子於重熙纍洽之餘以親附百姓鎮撫四夷為己責而務使官得其職物遂其宜雖古良相殆無以過而況前作後述濟美象賢位冠百僚爵超五等是宜配侑於蒸祭享祀於廟室豈鄉國之間學校之士所得而專乎其相與尸而祝之者蓋以事夷夔周公之禮事之也臣溍庸因記事推述而論著焉文忠諱特穆爾達實官中書左丞相録軍國重事階開府儀同三司勳上柱國贈開誠濟美同德翊運功臣太師中書右丞相階勳皆如故追封冀寧王諡文忠餘見於前記及上所賜勳德之碑者此不具監修國史題名記宰相之職掌佐天子正百官於軍國之政令無所不統惟領史事則特給印章别設官屬而敕尾以之入銜重其事也昔在世祖皇帝中統二年翰林學士承旨王公鶚奏請立史局纂修先廟實録及遼金二史其國史則請以右丞相史公天澤監修上悉從之至元元年始置翰林國史院十三年乃制授平章軍國重事耶律公鑄監修國史建官實始於此其後恆以上相専綜監修之務或並命次相則曰同監修委任可謂重矣若稽往制詞臣史官班列不同職掌亦異今既合為一院而史事獨屬之宰相者蓋紀録天地日月之祥山川封域之分昭穆繼代之序禮樂師旅之事誅賞廢置之政布在方册垂於萬世其所繫之重非它司比抑可知也故凡大拜之後必諏告視篆於本院廳壁固宜有其題名然自史公天澤耶律公鑄逮托克托太傅公兩入中書相今天子九十年間領史事者之官位名氏嵗月皆未有所登載於是院長謀於寮友而訪於中書之掌故得右丞相旺扎勒太傅公而下總闕十有闕人礱石大書而深刻焉其莫得而詳者皆不著亦闕疑之義也翰林國史院題名記世祖皇帝中統元年初設翰林學士承旨官止三品至元元年乃建翰林國史院而備學士等官八年院升從二品成宗皇帝大德九年院升正二品仁宗皇帝親攬御筆點定置立學士承旨六員學士侍讀學士侍講學士直學士各二員皇慶元年院升從一品迄今遵為永制先是蒙古新字及伊斯提費並教習於本院翰林國史集賢兩院合為一仍兼起居注領會同館知祕書監而國子學以待制兼司業興文署以待制兼令編修官兼丞俱來𨽻焉其後新字既析置翰林院而復立集賢院如故今興文署已廢本院於起居注會同館祕書監國子學之事悉無所預回回學士亦省而伊斯提費以待制兼掌之今上皇帝建宣文閣而不設學士詔以經筵崇文監皆歸於本院崇文監言其非便而止惟於學士承旨而下摘官判署經筵之文移頃因纂修后妃功臣傳又以執政兼學士承旨等官而無常員此建置沿革之大略也自中統至元以迄於今題名久未克立是用搜羅故牘考其姓名資秩遷次而刻諸石庶來者有考焉夫題名雖非古而唐宋以來偏州下邑莫不有記矧以文學侍從之臣於焉萃止安可覩其闕文而弗之講乎覽者因其人而尚論其世則國家之聲明文物名公大人之遺風餘烈猶可槩見也僚屬參佐具於别刻者此不書上都翰林國史院題名記凡官署咸有題名記之者必述其職分之所當為以寓夫官師相規之意焉粵自世祖皇帝作别都於灤陽一遊一豫無非事者列聖相承遵為典常文武百司扈從惟謹翰林國史職在代言以施命於四方載事以傳信於萬世天子出御經筵則勸講進讀啓沃聖心退則紬繹前聞以待訪問任重而地親上所識擢必勳閥近臣儒林大老與一時名人魁士實侍從之髙選非他有司比也由至治元年逮今二十有七年分院題名嵗各有記於其職分之所當為論之備矣兹不復勦取舊説而重陳之第記其官位氏名嵗月庶來者有所於考焉爾蓋大駕以至正七年四月十九日發京師五月十二日駐蹕上京八月十三日回鑾院長而下除拜則書或將指而行或賜告而去不悉書也經筵之職曰領曰知曰兼無専官惟居翰林者獨主其文移出納故合本院與其曹屬並列於左云中書省右司題名記官署之有題名尚矣覽之者問其人可以知其政故記之者必本其職分之所宜為以寓夫規警之意而風厲焉烏克遜公良楨之為右司郎中也以題名未建命考諸故牘得其氏名嵗月將刻石於廡下未及成而出持閩中部使者節尋復召入參議中書省事乃屬今右司諸公緒成之而俾溍為之記溍竊惟都司以彌綸省闥為職於事無所不預較之舊制則唐之三省尚書有左右丞管轄衆務而左司右司為之副宋之三省左右丞升為執政中書門下别設檢正之官而尚書之左司右司居其次逮至我朝政本一出於中書而丞轄檢舉之職悉歸於左右兩司其委注之専前所未有也而況右司所掌付受兵刑之政最號雄緊而百工之事尤為叢劇豈它有司限於官守而可指其職分之所宜為以寓夫規警乎雖然今之任是官者皆天下之選昔人所謂學為宰相者也後之人覩其氏名知所歆慕而奮發焉則其為風厲也大矣庸弗敢辭而謹記之上都御史臺殿中司題名記天子時巡上京則宰執大臣下至百司庶府各以其職分宫扈從國朝舊典也凡公署必立題名以志其去來之嵗月御史臺殿中司之有題名始於至順三年率皆剡本為方板而書之至正八年今殿中侍御史額森呼敦博囉特穆爾慮其久或蠧敝乃命代以石大書而深刻焉且俾溍記其作始之自謹按漢御史大夫有兩丞其一曰中丞居殿中蘭臺外督刺史內領侍御史受公卿奏事與劾按章亦謂之中執法則居殿中者實古中丞之職魏以二御史居殿中察非法大朝會則簪白筆側陛而坐乃殿中設侍御史之始也其後殊時異制沿革靡常在唐則兼知庫藏出納宫門內事京畿諸州諸衛兵禁而政務非一在宋則三院並得言事兼察事而官守不分逮我世祖皇帝至元五年肇建御史臺置殿中侍御史二員而以殿中别為一司正名舉職糾察朝儀外廷稱慶則對立於龍墀之下而不與庶僚序列大駕行幸則畢從於豹尾之中而非若他官可以更休委任既専地位復密臣僚有所敷奏無不與聞而其命秩之崇品在第四視唐宋以七品官為之重輕之不侔從可知也自非勳賢貴胄秉清方直亮之節夙為衆所嚴憚莫宜當其選由是而致位卿相未始乏人誠欲使來者知所慕效而思繼其風烈則所託以昭示於永久者曷可缺歟蓋物莫壽於金石然自古及今名垂天壤與國家相為無窮者固不獨恃夫金石以為存也請以是為記可乎是嵗乘輿以五月屆灤陽八月回鑾十月甲子朔記杭州路儒學興造記杭於宋為行都士之所聚為京學凡著籍其間得以類申補太學諸生人以比古之外雍四方之士咸附集焉以厭於太學故其規制褊迫庳陋顧出他州郡下擔簦負笈而至者殆無所容德祐納土杭為外藩聖化所暨無間逺邇士風之盛不減異時廟學悉沿其舊久未有所改作禮殿之東有論堂宋理宗書養源堂三大字故在左右前後環以十齋曰進德曰興能曰登俊曰持正曰賓賢曰崇禮曰致道曰尚志曰養心曰率性每齋前列屋為間者五而後為爐亭題扁則文丞相天祥陳參政文龍諸名公書之堂之北為髙閣以藏書榜其顔曰尊經者國朝行中書省平章政事髙公興所書也大德七年王教授去疾始撤尚志一齋以廣殿基至大四年倪教授淵遂撤養心率性兩齋以營學宫廨舍至治元年進德興能兩齋燬於災總管呼都克婁斯又即其地構廳事僅存而可居者五齋率皆局於地勢前阻逵路後逼廛居雖欲充拓使就顯敞而遺囂煩不可得也至正二年夏細人之家不戒於火飛燎及殿簷而止持正賔賢崇禮致道四齋與廟垣外比屋而居者數十家盡燬弗存執事者請割學西隙地益以錢若干緡易其廢址改建論堂四年夏儒學提舉班公惟志方理之度木簡材而李君祁來為副提舉亟命學正録直學等揆日庀工適當總管趙公璉下車伊始教授謝君池亦至趙公既鋭然以學校為己任謝君亦克併志一慮而趍事赴功乃從閣於四齋之故位且為屋掖其兩旁而以堂之故位作新堂及前軒設大小齋東西對峙輦石刻置閣之北數百步而為亭以覆之殿廬門廡官廳吏舍及故所有登俊一齋下至庖廩之屬仆者起之缺者完之丹采之剝蝕者飾治之屋之因舊繕葺更新創造以間計者總若干甓堂塗自門屬於閣二百餘尺土木匠傭之費為錢若干緡為米若干石悉出於贍學經用之餘未嘗以匱官勤民為士者亦無所與始作於六年冬十一月訖役於七年夏四月謝君狀其實馳書京師屬溍記之夫政事由人而廢興制度隨時而損益必人與時會乃可以舍舊而圖新今天子嚮用儒雅嘉惠斯文羣臣承宣德意如恐弗及經之營之室苟美矣息焉遊焉士何事乎誠能充類致思而知吾之所居廣居所位正位所行大道非人之所能廢興非時之所能損益必有感厲奮發求至於聖賢之域而升其堂入其室者則賢師帥振起作新之功不止若今所記而已溍既序其工役之槩併志所望於其士者如此云趙公至治辛酉龍飛進士今為禮部尚書班公前集賢待制李君至順癸酉廷試第二人謝君宋丞相太師魯王五世孫也胡侍郎廟碑陰記胡公仕宋為時名卿婺之永康實公鄉邑公嘗讀書方巖山中殁而為神發祥其處宣和間封佑順侯紹興末乃賜廟額曰赫靈者初封誥命中語也佑順之號既纍加以嘉應福澤靈顯極於八字淳祐間遂進爵為公更號顯應尋加正惠寶祐初再加忠佑杭之南山龍井源公墓次有顯應廟敕命在焉廟不書賜額而以顯應名者因初進封之號也公本以助王師殄巨冦廟食於一鄉而其光靈無逺弗被能出雲為風雨農人咸以望嵗者望於公凡村墟里社必為祈報之所故公之别廟布滿於郡境不啻數十百區其在吾烏傷之稠巖者里人方氏倡衆為之也宋初婺之第進士者自公始至其季年方氏有大冶丞應龍以進士起家而族日益大其子孫相率致力於祠事彌久弗懈者蓋亦視公為鄉先達而知所敬慕不徒效俚俗徼福於公而已廟之創造以至元二十六年重興以至正九年新廟告成以記來謁於溍曰公之陰佑乎斯民而變化不測有以驚動其耳目者庸夫孺子皆能言之至於公之奮由一第逮事三朝十握州符六持使節選曹計省厯踐要塗晚以從官全身而退其有德於人有功於國與夫出處之大致非薦紳先生莫能言也願備著之溍竊惟公之官伐治行有傳在魏國韓公所修宋實録而文正范公所撰公墓銘論次尤悉謹書而俾之使刻諸石且為之記其作廟之顛末附見於石背若郡志言公嘗奏免衢婺身丁錢民被其賜而為之立廟則傳與墓志皆無所登載姑俟博洽之君子而考質焉樊川記樊川長安勝處也額森呼敦殿中君别業在焉間嘗謂豫曰吾先世家隰州之永和五世祖雍郡公薄遊關中愛其風土完厚遂徙居鄠雍郡之仲子是為吾髙祖雍國貞獻公被遇世祖於略畔山之陽眷遇甚至而恬於進取足迹不至京師以京兆鄂羅總管終於家吾曽祖太師奉元忠貞王吾祖太師涇陽忠宣王再世掌上京留鑰前後四十餘年忠貞既歸老關中而忠宣亦返葬於鄠蓋視鄠為鄉土久矣吾父佐今天子位為丞相匪朝伊夕陟降左右而吾又以大臣子叨被上恩入則侍間燕於內廷出則奉溫清於私室去鄉土日以逺鄠杜異縣而壤地相接樊川在杜之封內即吾土也頃嘗買田築室將以佚吾私而不可得蓋無一夕夢寐不在其間幸為之記庶幾時一展玩以自慰焉按圖志漢京兆杜縣之樊鄉有樊川以樊噲所食邑得名一名後寬川以其水出秦嶺又名秦川有佛廬號華嚴寺俗但稱之曰華嚴川京兆今為奉元路杜廢入萬年而萬年今為咸寧縣其南三十五里是為樊川西為韋曲東為杜曲則唐人所為城南韋杜去天尺五者也夫氣運之消長往來無窮人事之盛衰每與之相為終始秦樹隴雲斜陽衰草城是而人非無復向來冠蓋追遊之盛而原隰之平泉流之清陸海之富饒民物之蕃阜不減於異時雨露所濡佳花美木生意充周未嘗少息也唐宰相杜岐公甲第在長安而樊川有别墅中有桂林亭卉木最為幽邃日與公卿燕集焉後以太保致仕遂居於此家廟石室遺迹故存岐公孫牧之尤愛樊川傾俸資以治其墅其知中書制誥也每退直亟召密友往遊其地自謂吾老為樊川翁要有文章數百首號為樊川集殿中君與牧之生宰相家則同執法殿中又同所不得與牧之同者昔之城南去天尺五今則去天半萬里矣欲朝而往暮而歸於竹洲藤岸苔徑花齋不可得也能勿緬然而長望渺然而遐思乎豫聞古之達人以太虛為家無何有為鄉視半萬里皆吾室吾闥也而況鈞天清都之樂又安可與下土同日語殿中君曰是有以慰吾平生之懷矣遂次第其語書而歸之是為記白牛鎮戴氏義孰記嘉興郡城東北六十里曰白牛鎮居人數百家為其鄉之望者曰暘谷處士戴氏諱某字某患鎮學之弗立而後生小子無所受教規創義孰以私淑乎里人有志未遂而沒後二十年其子曰光達字君實始因其經畫之素度地於鎮東若干步廣袤可二十畝而贏程土物略基址考正面勢召匠蕳材揆日興作先聖先師之殿峙其中論堂踞其後齋廬翼其旁邃廡穹門下至庖湢庫庾直舍之屬為屋總四十有五間陶甓黝堊縝壯而不華圖史之藏什器之須纖悉畢備周以繚垣環以幽篁佳木花徑果蹊而瀦其流泉為芰荷菰蒲之區又十畝不啻起至正某年某月訖七年某月而告成八年春二月乃延儒師招來學用仲丁行舍萌之禮退即講席俾序進而請業焉四齋職教者各一人生員恆百五十人割上腴之田五百畝以贍之既卒成前人之志又將有以昭示於後人而圖其永久於是慈溪黃伯成甫以髙文宿德主領教事伻來求豫記之豫聞昔人有言惠有術也養有道也惠不在豐而在乎不費養不在大而在乎不窮豐而多費是知愛於彼而不知愛於此非其術也大而易窮是知愛於今而不知愛於後非其道也惟其不費故可尚也惟其不窮故可貴也戴氏父子其深知夫惠之之術養之之道矣乎古者五家為比五比為閭門側之堂為孰大夫士年老不仕者為左右師而閭中之子弟學焉今之義孰猶有其遺意若夫屋室之多為間至四十有五則不止於門側之兩堂學徒之衆為員至百有五十則不止於閭中之子弟是皆非古之所有其為惠也豐矣古者步百為畝而以百畝為一夫之私田民無不受田之家而士不必仰給於學今俾以田五百畝則十家之産也而况今一畝為步至於二百四十又不止十家之産而已是則出於古之所無其為養也大矣天之生人也莫不賦以仁義禮智之性聖賢與塗人本無以異因其根於心者使之親師取友朝益暮習而日趍於善逮夫深造而自得皆其本然之固有初非損於此以益於彼斯不亦惠而不費乎物之聚也有數而其用也易耗雖封君之富欲以萬鐘為弟子之養尚恐廩人之粟有時而弗繼今乃欲以布衣養徒之事自任而致其力焉使之因地之利嵗取之而不竭利於今者有以施及於後斯不亦養而不窮乎蓋設教必有先後次第此特導以幼學之節而養其良知之本云爾它日由是而以俊選論於鄉以賢能登於天府授之以政將見利澤之加於人為惠益豐為養益大戴氏父子之功奚獨善於一鄉而止乎按郡乘宋名臣陳公舜俞其地人也舉進士應制科皆在前列以山陰宰召試館職不就而上書力詆青苗法忤執政意謫為監當官公以直道自信無所回撓每跨犢往來山中自號白牛居士人遂以名其故里諸生息斯遊斯仰企前修儀刑未逺誠有所感慕而興起安知無如公者出於其間戴氏父子且與之同不朽矣此又豫所厚望庸因記事而并志之以俟焉婺州路新城記婺在吳為東陽郡在梁為金華郡隋肇置婺州國朝即州建路設總管府而郡城之創始靡得而詳圖志載宋宣和四年知州事范之才重築周十里基三丈面廣三之一而髙倍之舊為門十有一後窒其四而存其七東曰赤松南曰八詠曰清波曰長仙曰通逺西曰朝天北曰旌孝逮今二百有三十年圮壞勿葺非一日矣聖人有作一視同仁八荒之內莫非我室我闥林林總總之衆相安乎鑿飲耕食無分乎此疆爾界而皇靈所被封守有截隱然若天險之不可陵不假參以人力也顧以承平滋久執事習於因循忽於細微不測之變起乎倉猝中區俶優而旁州比縣民訛不寧于是行中書省用江東浙西列郡之請俾治其故城而新之以備非常謂浙東地瀕巨海尤關於要害併下其事於帥閫令郡府相其便利而講行修築之政焉婺實肅政亷訪司治所今副使巴扎訥奉政公僉事圗們特穆爾朝列公奉議王公武暨照磨某官王君某咸以為有備乃可以無患此古之良規今之切務屬總管太中陳侯巴延巴哈亟謀興作僉事闕奉議公適至交贊其議陳侯亦自任為己責而不敢後爰頒其役于州縣州縣之長吏各率所部之民來聽要束資糧既具匠傭既集乃揆日以庀事大家則量地而賦工中産則輸材而佐費牆落屏蔽次第就緒然以古之言地利者蓋曰髙城深池今外濠堙塞城已髙而池未深也不可憚其勤而諉於方來由是役既輟而復舉籍向之役所不及者使出錢為僦直募間民來即工而官給其食推求故道疏鑿而濬滌之州縣長吏則更休迭進以董其役副使公首尾親臨督視命寮屬某等相繼總其功程而為之經畫勸相經厯某官某繼至副使公藉其攸眆為多焉城之綿亘悉仍其故址以尺計者一萬七千七百九十厚二尋有四尺髙二尋有二尺以今昔之度凖之俱有加於舊縝壯雄峻則昔之所無也七門並啓扃鍵如式而西北二門皆環以甕城甃石為路修與城等絫甓為堞其崇五尺屋於門觀之上者七以謹候望屋於雉堞之間者三十有六以嚴徼巡其南因大溪以為險北東西三面壕之修以尺計者八千六百二十有五廣六尋二尺有八寸深二尋有六寸跨以三釣橋遏以三石壩壤髙水絶則列樹七星樁以防其空郤屋於壕塹之旁者三十有六而棲戍卒於其中凡城之役起至正十二年春閏三月己亥訖其年秋七月乙酉積日為百有七壕之役起是年冬十月丁卯訖明年夏五月甲申積日為百九十有八而畢潰於城居者有恃而無恐往役者以分之所宜為而忘其勞陳侯使序次顛末以授某曰其為我書而鏤諸城隅用昭示於後人某竊惟易於萃戒不虞而重門擊柝有取於豫使節所蒞婺為會府民物萃聚殷盛叢劇警戒無虞而陰銷潛弭姦覦之萌誠有不容緩者鄰境之枹鼓相聞而婺獨按堵如故居安慮危思患豫防及是間暇而汲汲焉圖所以固吾圉夫豈過計也哉矧今風紀之司𢎞宣德化而人知尊君親上撫字之官博施恩信而人樂趍事赴功且將以民心為垣墉士氣為樓櫓精神翕合與山川之脈絡相為流通益重金湯之勢而於地利人和兩盡之矣國之保障永永是賴嗣為政者所當知也可無書乎松溪縣新學記建為先師朱文公之闕里松溪建屬縣士生其間身親受業於公之門與聞公言論風指於淑艾之私者踵武後先其地雖褊小而士習為最盛逮入皇朝治教休明人才尤彬彬焉縣故有學規制甚備至正十二年大盜竊發於河南而江淮閩粵繹騷不寧山谷愚氓相挻而起侵軼縣境蹂踐民居兵燹之後惟夫子廟若魯靈光之巋焉獨存識者知為天佑斯文之兆匪朝伊夕必有起其廢者今天子方慎擇守令惠綏黎元十四年夏六月今縣尹凌侯實來視篆之三日用故事欵謁於先聖禮成而退左右顧瞻徘徊太息曰學校之廢興長民者之責也我其敢不以為己任即命鉤考簿書徵理厯年贍學田租在豪民黠吏之手者凡得米若干石資以召匠市材揆日庀事侯躬涖教護屬功而課其章程縣人攝尉事葉𢎞道暨教諭李璿訓導傳子實皆悉力以相焉自禮殿論堂齋廬寢室至於門廡庖廩咸撤而新之崇其垣墻端其術道暨茨瓴甓黝堊髹彤舉稱其度始於秋七月訖於冬十月而告畢工安神有位配侑在列範銅為祭器而他所宜有者靡不具完藏修息遊各適其所佩襟來集弦誦相聞饋膳之須亦無乏絶侯既行舍萌之以禮以落其成不逺千里俾諸生揚垚奉書走金華山中以記為請昔杜子美題詩衡山縣學稱陸宰以雅才新意修儒服俎豆事于干戈之餘其辭逸出橫厲氣誼激烈數百嵗之下讀者猶為之悚然侯下車之初即以興學為先務披荒殘植棟宇甫十旬浹而畢潰於成其雅才新意視陸宰孰多乎竊觀魯人之頌僖公曰既作泮宫淮夷攸服固非衡山之事可同日而語也賢侯導宣上化以振起士類將見魯人之頌復作於今雖子美未易贊一詞矧以眇焉末學衰朽悖眊猥令載筆為之記何能鋪張偉績以昭示于方來也哉姑序次其廢興之嵗月云爾侯名説吳興人大父祕書少監公夙任風憲父集賢直學士公治郡有聲家學淵源所從來非一日矣宜其為政知所本而不謬于緩急之序如此云杏溪祠堂記杏溪祠堂者鄉先生傅公之祠也先生諱寅字同叔幼嗜學經史百家悉能成誦比長益求異書而讀之間從説齋唐公質疑問難皆有援據可反復説齋喜曰吾益友也及聞其升陑分陜之説語門人曰職方輿地盡在同叔腹中矣先生於天文地理明堂封建井田律厯兵制之類世儒置而不講者靡不窮究根穴訂其訛謬資取甚博參驗甚精事為一圖纍至於百號曰羣書百考大愚吕公閲其禹貢圖考曰是書可為集先儒之大成矣揭其圖請申言之而坐諸生以聽且曰以所能者教人所不能者受教於人理之所在初無彼此先生亦樂為之盡亹亹不倦先生於文中子人不里居地不井授終苟道一章屢嘆息而言周禮太平之書於時九等授田家給人足泉府之設特以備凶荒未必常用也况是書體有本末用有先後若大綱不舉而獨行所謂國服為息者是猶取名方中百品之一而服之及其害人則曰是藥出於名方云爾常恨熙寧諸賢未有如此辨之者故百考之書於成周之授地賦兵封國制軍增地制域畝步溝洫稼穡貢賦特詳焉亦足見先生之學可措於實用而非虛談矣先生又嘗遍遊江淮縱觀六朝故迹南北形勝詢諸史諜而得其成敗廢興之故厯厯如指諸掌是豈徒以登臨之適為快也哉先生之教人每謂下學上達自有次第不先其近者小者而驟語其逺者大者後生淺薄學益不實故於小學尤所留意來學者恆以百數必先授以曲禮內則小儀鄉黨諸篇使於日用之間與義理相發明而知道之與器未始相離也先生論古軍制纎悉備舉而不欲人讀兵書曰胸中無論語孟子為權衡遽聞譎詐之言則先入者為主害心術矣此先生之所學與所以教之大方也先生世居婺之義烏父孝儼篤行君子母樓氏禱於石姥山而生先生骨秀神聳蚤有器識事親孝謹處兄弟子姪均一無間鄉閭有事輒以身任之非公事不至官府縣長吏之賢者必造而問政言無所隱人有陰被其賜而不知者里居之日與馬公師文孫公居敬為同志永嘉戴公少望聞先生名奉贄願交大愚在朝行數稱先生之文學行義彭公子壽章公茂獻葉公正則吳公德夫汪公季路黃公文叔黃公商伯無不推敬文叔欲與同列奏補以官知先生不可屈乃止惟館於商伯最久賔主之間日以義利相針切不為無益語他所與遊亦皆顯人至其為臺諫為執政則絶不與通先生既不有仕祿又不屑治生業商伯持浙西庾節遺以錢五千萬先生悉散於宗族鄰里一無所留晚益貧郡守孟公聞而嘆曰不可使賢者飢餓於我土地乃輟俸資倡其親友為買田築室於東陽之泉村而先生遂為東陽人于是大愚及一時名公皆在黨籍相繼放逐先生亦杜門不復出矣先生好為詩間逺古淡有陶靖節邵康節之風焉子七人皆克紹其家學大東尤敦慤克肖其德大原試漕闈為本經第一先生既遣猶子定受業朱文公之門得其微言奧旨歸與諸弟共講而大原亦從慈湖楊公遊楊公亟稱之程子謂君子教人有序非先傳以近者小者而後不教以逺者大者先王之所以教皆程子之遺意也先生年六十有八以嘉定八年卒於家後百二十年曽孫師蒙師佐懼人易而世疏乃即家建祠嵗時以享祀燕私合其族祭主於先生者始遷之祖也上援其父者明有所本也下及其子者示有所傳也堂成於重紀至元之二年師蒙已卒因以侑食堂師蒙作也祠室堂軒為間者三翼以齋廬為間者六有田三十畝子孫更掌之以供祠事師蒙兄子似翁將圖其永久爰以狀來謁記且曰祠之作本以寓子孫追逺之意而邑之士友以為古者鄉先生殁則祠於社其禮久闕弗講乃相率為文以祭牽聨得書屬序其興作而首著先生學術源流之懿者庶幾後人知有所矜式也來者能聞風而興起焉則是祠也有功於名教甚大奚止可以合其族而已乃如其言併書之逺懷亭記東陽蔣君子晦作亭名逺懷京兆杜君伯原為之篆題而未有發其所以名之義者子晦既不可作其子相與謀而以記來屬於豫蓋子晦之先家於東陽者十一世乃定縣南二十五里之橫城曽大父迪功府君生於宋季用入粟佐邊補初品官而不汲汲於求進乎君淡然無營惟務擇師朂其子弟於學且將推以淑其一鄉未及有所為而逝大父建昌府君有材幹而倜儻尚義纂承先志以景定元年即所居之西建講堂寢室齋廬直舍及庖廩之屬為屋以間計者總若干割田租一萬以𨽻焉號橫城義孰迎致故禮部尚書方公為之師公時自著庭歸卧蛟峯下欣然為之出其立教先德行而後文藝凡所揭示一本於先儒月書季考具有程式擔簦負笈者不逺數百里而來居無何聞廷議欲畀以婺之郡符東陽婺屬邑也公遂撤皋比而去鄉先達見山喬公霽月陳公存齋吕公繼之四明東洲吳公又繼之為教悉遵其舊法户外之屨亦無減於昔名人魁士項背相望後生晚出頭角嶄然見於題名石刻者六百八十有五人建昌之諸父元善兩膺鄉薦從弟合猶子朋龜並登上庠領胄舉長子國光尋升學館仲子國賔從子國華國珍俱取漕薦咸淳六年建昌為仇家飛語所中不得安其居而孰廢矣天朝奄有南土至元十五年命左丞廉公行中書省於江右聞其久在廬陵亟遣招之見其磊落不羈論議亹亹知為竒士力加甄拔授進義副尉南康路建昌縣主簿時已年踰耳順拜命之官不久辭歸距祖居三里所營别業於南溪上以處其季子即子晦之父穀城府君也既又遷義孰故宇之僅完者於溪東更號城南精舍謀復合子姪及里之俊秀羣居而肄習焉二十一年精舍甫就緒而建昌殁穀城逢時休明慨然以材自奮久留京師且有官簿於朝暨出為穀城尉倦遊而退休於家林遽以疾終精舍亦廢矣子晦自以生晚不及覩家孰之全盛而其美意不可不續圖起其廢而有不暇給爰卜地於精舍故址之南百步曰黃金塢雙峴擁其後鄰邑之桃巖龍門諸山拱揖其前而東岡獨據乎勝處以至正元年六月搆屋其上為楹間者三舁石刻置其中外為小軒以憩來客而便觀眺曰逺懷亭者示子孫使勿忘也故翰林學士侍讀尤公序東陽縣志稱其大家多創書院作好飯招延名師以教鄉黨子弟詩書講誦相聞旁郡他邑所不及指石洞西園南湖安田先賢過化之地及金龍四孰而言也山空嵗晏遺響寂寥而蔣氏一門百年五世君子之澤猶有餘潤明發有懷前人未逺如將見之而親聽命焉考其成規舉其墜典使賢材興於昭代義聲動於遐方豈非子晦之初意乎此豫所厚望於其嗣人也其可大書特書屢書不一書者奚止若今所記而已穀城之墓豫實銘之得以互見者不贅焉書東陽徐氏族譜圖後記宋奉議郎兩淮宣撫大使司幹辦公事徐公諱彬字文伯溍之曾外祖也徐為東陽著族七世以上名皆闕而以行稱六世祖曰增兄弟五人增最長次永次極次諶次逸族大而分增居縣南號南徐諶居縣東號東徐兩族尤盛掇巍科躋膴仕者代不乏人增之子曰起起之子曰壽公髙祖也曽祖曰元輔祖曰楠免解進士考曰炘公以太學上舍生登淳祐七年進士第補安慶府教授堂差泗州教授召除國子正寶祐六年與溍之曾祖户部府君同在兩淮制幕為主管機宜文字淮西則公淮東則户部府君故户部府君為我祖考請婚焉祖妣之來歸景定元年也時公已不祿一子亦早夭二女長即我祖妣次適永康章氏溍生未晬遽自免乳去母氏之側而荷祖妣之撫育教誨者二十年祖妣沒已久而溍忝有祿食德薄位卑所以榮其先者寵數有限莫伸罔極之報衰退之餘誤蒙收召入直翰林備員侍講始用著令推恩於祖考祖妣比年兩膺錫命溍既得謝而歸虔奉制書展告墓下族姻里黨咸會祖妣之再從姪文泰亦在焉因出徐氏譜圖俾溍以祖考祖妣之年壽卒葬贈封官爵系於下方我祖考諱堮卒於大德八年五月草四日壽六十有五祖妣卒于大德七年八月草四日壽六十以十年八月合葬於義烏縣所居東北三里崇德鄉東野之原祖考前承節郎初贈中順大夫禮部侍郎上騎都尉追封江夏郡伯再贈嘉議大夫本部尚書上輕車都尉進封本郡侯祖妣初追封江夏郡君進封本郡夫人文泰字伯通有學有文庶幾能亢其宗者徙居義烏三世矣按此下凡雜説七條原刋本佚其標目而參校危素所訂溍集又不載此數條之文無可考補今姑闕之鶴山魏氏曰朱文公以十為河圖九為洛書引邵子之説為據而邵子不過曰圓者河圖之數方者洛書之文戴九履一之圖其象圓五行生成之圖其象方是九圓而十方也安知邵子不以九為圖十為書乎朱子雖力攻劉氏而猶曰易範之數誠相表裏又曰安知圖之不為書書之不為圖則朱子尚有疑於此也朱子發張文饒精通邵學皆以九為圖十為書朱以列子為證張以邵子為主嘗以乾鑿度及張平子傳所載太一下行九宫法考之即所謂載九履一者則是圖相傳已久矣知非河圖也鶴山素尊信文公之學獨於此圖書之辨不能無異論然而又曰靖士蔣得之云當以先天圖為河圖生成數為洛書亦是一説又若有取焉往年閩人吳蟾者來京師自言從謝疊山得異人所授河圖朝野諸公多傳之而祕不輕出其詳雖莫得聞大抵亦是以八卦為河圖未必不與蔣説同所自出也按孔安國尚書顧命傳曰伏羲氏王天下龍馬出河遂則其文以畫八卦謂之河圖王肅曰河圖八卦也王充論衡亦曰伏羲王河圖從河水中出易卦是也伏羲得之非作之則以八卦為河圖自昔已然鶴山之説似不可不考也尚書古文益稷篇在治忽今文作采政忽史記作來始滑漢書作七始詠采與在滑與忽音相近來與采始與治七與在詠與忽文相近政與治義相近諸儒皆隨字解之獨鄭玄忽作曶而謂曶者臣見君所秉君亦有焉是以禮記曰文王舍伯邑考而立武王帝王世紀謂文王囚羑里時伯邑考已為紂所殺則是伯邑考既死武王不得不立非舍也史記云文王崩太子發立豈伯邑考未死文王已舍之而立武王為太子耶禮記曰凡祭宗廟之禮羊曰柔毛雞曰翰音注謂異其名所以别於人用也而今之致餼於人者反借以為雅稱是以鬼事人也世之好用古語而不詳其文義若此類者極多此特其一耳春秋左氏傳聲子襪而登席杜預曰襪足衣也程泰之演蕃露曰戰國䇿已稱人主為陛下按大戴禮成王冠周公使祝雍祝王有陛下永永與天無極則陛下之稱周初已有之或謂家語載成王冠頌蓋曰率爾祖考永永無極疑大戴所記出於秦漢以後之所增飾然則戰國䇿所稱又安知非後人所增飾耶辨史十六則史記黃帝幼而徇齊家語大戴記並作睿齊司馬貞曰徇亦作濬蓋以徇與濬音相近濬與睿文相近而言也又曰濬當讀為迅則又因裴駰訓徇為疾而以迅為疾義相近而言也去古既逺經史中魯魚亥豕若此者不一學者必欲以意強通之豈闕疑之義乎太史公以百家言黃帝其文不雅馴擇其言尤雅者著為本紀書首故取公孫卿獲寶鼎迎日推䇿之説而不取其仙登于天之語直書曰黃帝崩葬橋山乃於封禪書備述卿言黃帝騎龍上天至武帝問黃帝冡則又稱或對曰黃帝已仙羣臣葬其衣冠或者疑辭也其敘事可謂婉而直微而顯矣史記書軒轅與炎帝戰於阪泉之野諸侯咸尊軒轅為天子代神農氏是為黃帝審如其説則以征伐得天下自黃帝始湯之放桀何以謂豫恐來世以台為口實仲虺作誥何以不引阪泉之事為言乎孔子序書斷自唐虞而下繫易稱黃帝堯舜垂衣裳而天下治學者考信於六藝而闕其所不知可也史記武帝紀及封禪書所載黃錘史寬舒封禪書注引徐廣曰錘丈恚及錘縣黃縣皆在東萊武帝紀注引韋昭曰黃錘人姓名一以為地名一以為人名前後自相矛盾漢書郊祀志注引孟康曰二人皆方士顔師古曰錘直垂反其不取徐廣之説蓋以一人不應係兩縣也然寬舒之名數見於後而無所謂黃錘者又似可疑耳漢書沛公引兵至薛秦泗川守壯兵敗於薛走至戚沛公左司馬得殺之顔師古曰得者司馬之名今按史記本文云沛公左司馬得泗川守壯殺之師古蓋因班孟堅刪去泗川守壯四字而誤以得字屬于上文小司馬索隱知其誤而疑左司馬當有名遂以為曹無傷無傷之名僅見於沛公入關之後而前無所考姑存所闕文可也漢髙帝紀吾以布衣提三尺取天下謂三尺劍也杜周傳三尺安出哉謂以三尺竹簡書法律也王充論衡凡引髙帝語却皆有劍字作文而好用歇後語以為竒者不可不知也漢文帝紀年有後元景帝有中元有後元葛勝仲曰謂之後則疑若有極乃不諱避何耶按劉貢甫兩漢刋誤元鼎四年方得寶鼎無緣先三年而稱之封禪書云後三年有司言元宜以天瑞命不宜以一二數自元鼎以前之元皆有司所追命也由是言之則所謂中元後元者豈亦後來之追命乎宜其無所諱避也然以漢之武帝紀考之元鼎元年得鼎汾水上四年得鼎后土祠旁應邵於元年注曰得寶鼎故因是改元貢甫因封禪書後三年之語不取應邵之説而謂四年方得鼎似當漢元朔元年有司奏古者諸侯貢士一適謂之好德二適謂之賢賢三適謂之有功乃加九錫然則九錫者先王賞功之常典耳後世顧假以為篡器何耶漢遊俠傳茂陵守令尹公注謂守者朱真為之或以為宋之權行守試即其遺制非也傳稱門下掾説尹公曰一旦真令至復單車歸為府吏蓋宋之時暫權攝者也若夫權行試守皆正除之官特以是别資序之崇卑而已其所謂行尤與漢不同臣賀以太僕行御史大夫事張湯韓安國皆以御史大夫行丞相事宋制必寄祿官髙於所任之職事乃為行也資治通鑑綱目考亭朱子續經之筆也其推蜀繼漢本於習鑿齒絀周存唐本於沈既濟而感興詩第六章第七章皆不及之蓋天理之在人心初無間於古今先儒所見適與前人暗合而非有所祖述學者誦感興詩則不可不與史氏所記並觀也僧瑩湘山野録卷首書真宗即位之次年賜李繼遷姓名進封西平王按宋實録繼遷以太宗淳化二年賜姓趙名保吉授銀州管內觀察使封天水郡侯以其叛服不常所賜姓名兩經削奪至道三年真宗即位因其歸順仍呼之曰趙保吉非始賜姓名也其授夏州刺史定難軍節度使銀綏宥靜等州觀察處置押蕃落等使但加食邑而不進封制下於是年十二月甲辰亦非次年咸平六年繼遷陷西涼府為潘羅支所殺終其身未嘗封王也其子德明既立奉表納欵乃以景德三年封西平王大詔令及今新修宋史所載並同而野録無一與之合繼遷建節之制見於實録及大詔令者本云先帝早深注意方議推恩值軒鼎之俄成築韓壇而未暇逮眇躬之纂位俄封疏以貢珍彰厥逺圖冠於當代宜伸懋賞式勸忠勳野録所記既多異詞且易推恩二字曰真封以實其封王之説皆未可盡據李氏續通鑑長編及陳均編年備要乃獨有取焉其書太祖開寶九年十月壬子夜之事亦是捨正史而取野録筆削之意莫得而詳也周公謹齊東野語曰禮家如聚訟雖兄弟不容苟同其大者無如天地之祭東坡主合祭頴濵主分祭朝廷迄從合祭之説以至於今按宋史郊議始於神宗元豐元年至六年乃罷合祭哲宗元祐七年詔復行合祭以伸始見之禮俟親行北郊則修元豐六年之制仍集官詳議以聞禮部尚書蘇軾主合祭從之者五人樞密都承旨劉安世主分祭從之者四十人請以十月神州地祗之祭易夏至方丘之祭者三人請上不親祠而通爟火於禁中望拜者一人遂再令詳言安世等復執前議蘇轍時為門下侍郎請降旨罷議而安世議狀竟不得上二蘇之主合祭固未嘗不同也其後合祭罷於紹聖三年而北郊亦未及行至徽宗政和三年以後凡四祭地謂朝廷從合祭之説以至於今尤非也齊東野語卷首記孝宗聖政史闕不載者十餘事其一曰淳熙中張説為樞密都承旨奏請置酒延諸侍從上許之説退約客獨兵部侍郎陳良祐不至説殊不平上遣中使賜以上樽珍膳説因附奏臣奉旨集客而良祐不至是違聖意也已而上命再賜説復附奏良祐迄不肯來夜漏將上忽報中批陳良祐除諫議大夫坐客皆愕然按宋實録陳獻肅公良翰傳載此事甚具非良祐也良祐亦同時從官公謹誤以良翰為良祐而不知良翰傳未嘗不載也且説為都承旨亦非淳熙中蓋説以隆興初為樞密副都承旨乾道初落副字而良翰之際大坡在五年十二月八年説已為簽樞纍進知院事淳熙元年即罷去矣記一事而三失焉於秉史筆者毋責可也靖康元年宗忠簡公留守京城嶽忠武王飛時𨽻麾下犯法當斬忠簡見而竒之曰此將材也遂釋不斬而留之軍前會金人犯汜水乃授以五百騎俾為踏白使已而凱旋補為統領尋遷統制飛由是知名此事與漢王陵之於張蒼滕公之於韓信暴勝之之於王欣大抵相類漢史備著三人之事以彰其竒遇飛孫珂撰飛行實乃獨諱而不録幸忠簡家傳今行於世而新史得以備著之嘉熙四年庚子六月吳公淵自隆興改知鎮江是嵗大祲明年辛丑改元淳祐公力行荒政分置粥場以哺兩淮流移之人先曽祖戶部公時客吳公所從吳公親行視諸場識汪公立信於稠人之中而竒之亟言於吳公公與語大悅即令授館而禮遇焉供張服御之盛比它重客有加人咸驚訝既而立信與先户部相繼登丁未庚戌第寶祐三年乙卯吳公以觀文殿學士開閫景湖辟立信幹辦公事先户部凖備差遺五年丁已正月一日吳公拜參知政事請致仕未報而沒於江陵府治閫檄立信同先户部護送歸葬宣城而先户部為撰行狀上於史官其後立信入躋從班出専方面名位略與吳公等人始服公有知人之明而不知立信實先戶部之所舉新史於立信傳雖備著其事而不能詳先戶部之名誤以夢炎為應炎是猶可諉曰庶官名不登於史册無所於考立信以七年丁未取進士則題名有託亦弗之考而旁采傳聞之異辭以七年為六年則嵗在丙午又以為見吳公之次年則嵗在壬寅殊不思兩年皆非䇿士之嵗後之秉史筆者所宜考焉開慶元年七月朱公貔孫由史館校勘授武學博士而先曽祖户部府君忝差通判慶元軍府事授武學教諭實與公並命同一告詞是年十一月貔孫除監察御史而先户部奉勑兼樞密院編修官後九十年是為令至正九年獲觀公家所述公年譜乃以武學為太學蓋不詳當時典故而疑武學為武官故以意擅改之云耳殊不知國子太學博士正録武學士諭皆師儒之清選也間嘗録家藏先世所被告命歸之以補其闕而訂其訛近閲新宋史貔孫本傳乃止據其家傳作太學博士告詞首云勑史館校勘朱貔孫等古者文武同方云云尤足驗其為武學而非太學也謹識於此以俟後之秉史筆者刋正焉雜辨十三則許由事不見於經故司馬子長楊子雲皆以為疑或曰堯始讓四嶽四嶽舉舜乃讓於舜春秋左氏傳云許太嶽之後四嶽即許由也按周武王封伯夷之裔孫又叔於許為四嶽之嗣則四嶽在唐虞時未嘗封許安得預以為氏乎大抵莊子多寓言如必欲旁引曲證以實其説所謂子州支父石户之農者又為誰乎姑闕其疑可也鄧名世上進姓氏辨證有兩繆姓謂音穆者為宋繆公之後音謬者為秦繆公之後按史記秦本紀前書繆公後書穆公二字蓋通用而秦穆之見於詩書春秋傳皆正作穆未聞穆可讀如謬也繆固有兩音一與謬同秦繆可音謬安知宋繆之不音謬乎古人固有以紕繆之繆為諡如漢之張勃晉之何曽者若唐皮日休追咎秦伯舍重耳置夷吾而作秦穆公諡繆論乃後世文人出竒立説以寓褒貶云爾非有其實也安可遂以為據乎漢有謬忌字正作謬文非可與宋秦二君之諡混為一而忌之名亦辨證所不及辨證之可疑多此類漢翟方進汝南人而謂方進之翟音狄汝南之翟音宅何其自相矛盾也漢因秦官置御史大夫掌副丞相所居曰府曰寺亦謂之憲臺朱博傳但稱御史府而後人多引博故事稱柏臺烏臺蓋御史有兩丞其一在蘭臺謂之中丞其後大夫廢遂獨存與尚書謁者並為三臺齊有都水臺隋有司𨽻臺唐御史臺嘗改憲臺又改肅政臺而門下為東臺中書為西臺祕書為塹臺不専以御史所居官署為臺也若夫所謂大行臺者自魏晉至隋唐皆有之其官有令僕尚書丞即郎官猶令之行省而所謂外臺者漢以稱州郡唐以稱三司監院之帶御史者宋之監司既不帶御史人以其掌紏察之任亦循習呼之曰外臺云千字文篇首曰勑周興嗣次韻世言此時未以詔命為勑當是誤以梁字為勑也程泰之考古編力辨其非引南史賈希傳勑注郭子既以帝命為勑而興嗣傳云勑制寺碑尢可為證按漢書馮異傳以詔勑戰攻宣秉傳勑賜尚書祿董宣傳勑強項令出然則以詔命為勑自漢已然泰之特以興嗣傳切近可證而但引南史耳米元章自書其姓名及所用圖記米或為芊芾或為黻黻與芾猶可通用芊乃楚姓米氏自出西域米圖故人入中國者因以為姓唐有回紇米懷玉五代有沙陀米至誠非若樓之與婁邵之與召同所祖也姓固不可改字音之相近者寧可混而一之耶或曰山谷極稱引初平初起豈皇與黃可混為一姓乎是不然所謂金華仙伯金華牧羊客者蓋言其先金華人耳非指初平初起為同姓也然他傳記初平初起亦或作黃而山谷則自謂七世以上失其譜於金華之族尚莫適相通蓋未嘗以初平與初起混皇黃為一姓也俗呼人之婦翁曰嶽丈曰泰山説者以為泰山有丈人峯故有是稱然古者通謂尊長曰丈人非特婦翁也或又以為張説因東封而其壻躐遷五品故稱之曰泰山其説尤鑿按漢郊祀志大山川有嶽山小山川有嶽壻山嶽而有壻則嶽可以謂之婦翁矣世俗之稱謂未必不以是又因嶽山而轉為泰山耳龔頥正續釋常談最號詳傅按酒二字出儀禮注乃遺而弗及蓋其所釋者當時南方之常談耳檠者定弓體之器周禮弓人注音景漢書蘇武注又音巨京反蘇文忠詩云大弨一弛何緣穀已覺翻翻不受檠陸放翁曰檠作平聲押用漢注也燈檠亦謂之檠音與漢注同李義山詩云九枝燈檠夜珠圓漢地里志朝鮮民飲食以籩豆顔師古曰若今之檠音其敬反韻書檠字注曰有足以凡物也義山以檠為去聲蓋本於此又與前二音不同范元實詩眼曰豫誦少遊詞杜鵑聲裏斜陽暮山谷曰既云斜陽又云暮即重出也欲改斜陽為簾櫳豫曰既云孤館閉春寒似無簾櫳山谷曰亭傳雖未必有簾櫳有亦無害豫曰此詞本模寫牢落之狀若云簾櫳恐損初意山谷曰極難得好字當徐思之寶祐間外舅王君仲芳隨宦至郴陽親見其石刻乃杜鵑聲裏斜陽樹一時傳録者以樹字與英宗廟諱同音故易以暮耳蓋其詞一經元祐名公品題雖有知者莫敢改也外舅每為人言而為之永慨或曰傳録者既以廟諱同音而為之諱少遊安得不諱乎是不然陸放翁引北史齊神武相魏時法曹辛子炎讀署為樹神武怒其犯諱杖之則二字本不同音今皆諱避則以為一音矣由是言之則樹字本不必避禮部韻略諱而不收者失於不考也况當時諸公詩篇中所用樹字不一姑以大蘇集中所載而言則庭下梧桐樹及樹頭初日挂銅鉦暗風驚樹罷琅玕孤城吹角煙樹裏清風欲發鴉翻樹等句作於熙寧元祐紹聖元符間未嘗以為諱何獨疑少遊之不避耶陶靖節詩曰昔在黃子廉彈冠佐名州湯伯記注云三國志黃蓋傳曰南陽太守子亷之後劉潛夫詩話亦云子廉之名僅見蓋傳按後漢尚書令黃香之孫守亮字子廉為南陽太守注及詩話舉其孫而遺其祖豈弗深考歟子亷乃守亮之字亦非名也趙與時賔退録曰諺謂物多為無萬數漢成帝紀語也按繹山碑云世無萬數則秦時已有此語矣漢有兩韓信同為髙祖將兩張禹俱明經兩京房俱治易兩王商皆成帝時由外戚輔政兩杜子夏皆附王氏北斗垣內星南斗二十八宿之一宿羽流列祠為二斗非也南斗於次為星紀在正北人以其見必於南故謂之南斗以别北斗耳若所謂斗覆為豐年者乃天市垣之斗斛星又非此二斗也附録大元故翰林侍講學士中奉大夫知制誥同修國史同知經筵事贈中奉大夫江西等處行中書省參知政事護軍追封江夏郡公諡文獻黃公神道碑至正十七年閏月丙午翰林侍講學士中奉大夫知制誥同修國史同知經筵事金華黃公年八十有一薨於家是月己未其孤梓與門人劉涓王禕朱世濂傳藻等葬於所居義烏縣東北三里崇德鄉東野之原明年以門人翰林國史院編修官同郡宋濓之狀至京師屬臨川危素銘其神道之碑素宦學京師辱公為知已公入直翰林素為供奉同日命下及遷宣文閣授經郎從公於經筵有詔修后妃功臣傳素復為供奉從公於史館居則同巷嘗舉酒相屬曰我死子其銘吾墓嗚呼孰知卒承公千載之託哉公諱溍字晉卿姓黃氏世居婺至集賢校理文節公著於分寧集賢之從父眆生景圭家浦江景圭生琳娶宗忠簡公之女弟始徙義烏琳生中輔力學尚氣節秦丞相檜枋國殺議已者獨奮然題樂府太平樓上有磨劍欲斬佞臣頭之語人至今誦之晚以轉運使薦當官命垂下而卒中輔生紹祖紹祖生伯信迪功郎纍贈朝散郎于公為髙祖曽祖夢炎淳祐十年進士仕至朝散大夫行太常丞兼樞密院編修官兼權左曹郎官以朝請大夫致仕祖堮以進納恩補承節郎以公貴贈嘉議大夫禮部尚書上輕車都尉追封江夏郡侯父鑄以朝請府君遺澤補將仕郎纍贈中奉大夫江浙等處行中書省參知政事護軍追封江夏郡公初朝請之外孫女王氏歸浙西提舉常平茶鹽司幹辦公事丁公應復實生參政府君及禮部府君以疾廢故朝請以為其後妣童氏公之在妊二十四月始生母夢大星煜煜然墜於懷生甫睟即自免乳祖妣徐氏撫之比成童不妄出門能背誦詩書逮學為文下筆頃刻數百言著弔諸葛忠武侯辭前太學內舍劉君應龜太常公之外孫也見而嘆曰吾鄉以文鳴者喻叔竒兄弟耳稍加工其不與之抗衡乎因留受業弱冠遊虎林故都之文獻具在咸得徵焉大理卿牟公巘期公甚逺歸從仙華山隱者方君鳯遊為歌詩相倡和絶無仕進意其友葉君謹翁力挽之出大德五年春舉校官七年舉憲史皆中其選已而復退隱於家延祐元年貢舉法行縣長吏強起就試作太極賦傳於世明年殿試對䇿以用真儒行仁義為言賜同進士出身授將仕郎台州路寧海縣丞縣地瀕於鹽場而亭户恃其不統於有司厲民為甚編氓之𨽻漕司洎財賦府者尤為橫暴公皆痛繩以法吏因以利害白弗顧也有後母與僧通而鴆殺其夫者反誣夫前妻子所為獄將成公變衣冠陰察之具知其姦偽卒直其寃逺近以為神明巡兵捕盜販者急遂沈鹽於河帥衆以拒巡兵怒為取它私販事以實之民有在盜籍者謀乃劫殺未行邑大姓執之以圖中賞格初無獲財之在驗事皆久不決公為之疏剔以其獄上各論如本條免死者三十餘人部使者董公士恆行縣廉知治狀事悉委焉公為黜其以賄敗者軍百户一人縣吏二人在官無祿者四十餘人愚民訴昏田鬬訟下其狀多至數十百公録其當問者一經論定翕然畏服不敢重有詞世以法家自名者有弗如也嵗大旱禱於龍湫大雨境內有年踰再期會有詔改鹽法江浙行省丞制遷石堰西場鹽運命仍舊階石堰視諸場為尤難居是官者常以稱盤折閲及不能檢防私鬻被譴公規措有法無毫分入於吏議閲四載以功超一資升從仕郎紹興路諸暨州判官新作捕盜司巡海官船例以三載一新費出於官而責足於民有餘則揔其事者私焉公涖是役撙節浮蠧還其餘錢爭歡呼而去姦民以偽鈔鉤結黨與脅人財官若吏聽其謀挾之以往鄰境諸縣株連所及民之破産者數百家府俾公鞠治官吏除名同謀者各杖之百捕盜卒陰置偽鈔板於良民家乃白於官往索之惡少年持挺從者幾百人公遇諸野詰傔人曰弓卒額止三十安得此曹耶可縳送於州皆相率遁去有盜繫錢唐縣獄遊民賂獄吏私縱之假署文牒發來為之鄉導逮捕二十餘家公疑而訊焉悉得其情以正盜宜從重議持偽文書來又非州民俱械送錢唐證者自明奉省檄監稅杭州僅三閲月增羡錢十二萬緡至順二年用馬文貞公之薦召為應奉翰林文字同知制誥兼國史院編修官進階儒林郎扈從至開平作紀行詩十有二篇世盛傳之丁外憂去官服闋轉丞直郎國子博士未始以師道自居輕納人拜所親厚者業成而仕皆有聞于時時欲移禮殿四配位東坐西嚮學官或議分置於左右同列不敢爭公獨面折之其人恚甚日坐堂上以危言相加御史斥其無禮乃竟如公言居六年請補外換奉政大夫江浙等處儒學提舉年六十有七不俟引年亟上納祿之請俄有旨纂修遼金宋史丁內憂不赴服除以中順大夫祕書少監致仕居四年中書右丞多爾濟巴勒公今中書左丞相太平公力薦之命落致仕仍舊階拜翰林直學士知制誥同修國史至正七年六月至上京中書傳旨兼經筵官召見慈仁殿上語多爾濟巴勒曰文臣年老正宜在朕左右八年夏升侍講學士中奉大夫知制誥同修國史同知經筵事修后妃功臣傳數被金幣之賜上章求歸田里不俟報而行上聞之遣使者追及武林驛敦迫還職十年夏始得謝南還江浙丞相達實特穆爾公承制起公商議中書省事以疾力辭其薨也士林為之傷悼所著文集三十三卷義烏志七卷筆記一卷公娶王氏纍封江夏郡夫人先一年卒子男一人梓也杭州路同知海鹽州事女一人適惠州儒學正陳克讓孫男四人瑄琛瑭珣公天資介直博極羣書而約之於至精有問經史疑難古今因革與夫制度名物之屬旁引曲證亹亹不能休至於剖析異同讞決是非多儒先之所未發見諸論著一根本乎六藝而以羽翼聖道為先務然其為禮布置謹嚴援據精切俯仰雍容不大聲色譬之澄湖不波一碧萬頃黿鼉蛟龍潛伏而不動淵然之色目不可犯凡典册詔令銘述功德多以命公它求文者日盈於門力麾之而弗去雖絶域殊邦亦皆知所寶愛性篤孝親沒營冢域於三釡山有乳虎馴狎之異月旦望必展省大暑寒不易先世遺文嵗久頗有殘缺極力搜訪補綴成編在州縣清白自將所至無圭田鬻産以佐其費在朝不事造請逢覃官者一減資者五銓曹或失於收敘亦不自言與人交無鉤距不事矯飾以為容悅而誠意獨懇至然剛中少容觸物或弦急霆震一旋踵間煦如陽春曽不少留礙焉素寡嗜欲甫四十即獨榻處外及登法從蕭然不異布衣時遇佳山水則觴詠終日忘去世之議者謂公操行孤潔類陳履常文辭嚴簡類王介甫筆札俊逸類薛嗣通第非真知者未數數然也銘曰黃出春申著於金華或徙豫章蔚乎名家定居烏傷當宋中世故笏有傳在其來裔仁宗御極拔擢俊英公起南土對䇿明廷精敏之才小試州縣供奉詞林陶鑄時彥乃振文鐸蚤懸其車召還經幄載筆石渠皇眷甚隆宦情彌薄挂冠歸休翺翔寥廓維昔文節學行允臧代序雖逺聲華相望老成淪亡公則蓍蔡文獻之丞來者攸賴八十考終是為歸全述銘著德東野之阡中奉大夫參議中書省事兼經筵官臨川危素撰請諡文移太常博士傳亨嘗謂天啓文明之運時生純德之賢擅一代之文章為諸儒之軌範既有功於名教宜加贈以褒崇切見故翰林侍講學士中奉大夫同知制誥兼修國史同知經筵事黃溍天資端介德操剛方早擢秀於翰林遂登名於科第初任將仕郎寧海縣丞升從事郎諸暨判官擢儒林郎翰林應奉除承直郎國子博士遷奉政大夫江浙儒學提舉不俟引年自行致仕授中順大夫祕書少監居間未久今上以史事特召為翰林直學士兼經筵官未幾升中奉大夫侍講學士同知經筵事屢蒙召見殿庭賜以樽酒金織紋段寵遇優渥迹公之筮仕州縣則民庶懷德而詠仁入教成均則士類樂育而從化至於供奉翰苑職典祕書侍講讀多獻納之功知經筵有規諫之益三考卿薦於行省繼知貢舉於會闈主文既公得士為盛言性理探程朱之奧妙論著述繼韓栁之雄深德業昭著文章炳煥太極一賦為治朝之大雅古文諸作垂奕世之𢎞規四方學者覩之若星鳯仰之若山斗年既老耄優遊鄉里文墨自娛多所撰述至正十七年冬十二月翰林修撰曽堅出使江浙還言本職已於是年閏九月初五日病終於家亨以匪材親侍几杖詩書之澤久承指授道德之腴每霑膏馥知其博極天下之書洞達古今之制為縉紳所推許為學者之依歸如蒙轉呈移文合於部令此依翰林侍講學士袁桷鄧文原例依上裦封贈諡仍行翰林國史院為之立傳甚愜公議今將翰林國史院編修官門人宋濓所撰行狀録連在前合行移關請照驗轉呈施行諡議乾坤清淑之氣在上者為日月星辰在下者為山川草木賦於人者為道德文章則又贊天地之化育厯萬古而不朽也皇元龍興朔方聖神繼作天下混一其賢才之盛興起一時以文章道德黼黻皇猷為當世之儒宗者未嘗無人焉乃若故翰林侍講學士中奉大夫同知制誥兼修國史同知經筵事黃公負端介之資抱髙逺之志早奮迹於儒科繼登名於法從試郡邑有惠愛之政教成均得養育之方其在翰林屢蒙眷遇掌絲綸而𢎞帝制修紀傳而寓王法其學術之精微道德之崇邃六經羣史窮其淵源諸子百氏究其根底故我國家典册詔令及勳賢碑銘必命公為之海內冠帶之士以至浮屠老氏之流凡以文為請者嵗無虛日每出一篇家傳人誦書善真草或得之者不啻隋珠趙璧其文章根本乎六經而能羽翼乎聖人之道謹嚴精密紆徐而不煩山髙水深金鏘玉戛皆雍容自然追配漢唐諸作為學者之模範有元以來其如公者蓋不可多數也天下學者僉無間言迹公之行業想公之儀刑書之史册銘之奉常允符公議易名定諡國有彛章謹按諡法博聞多見曰文學該古訓曰獻請諡曰文獻前應奉翰林文字承事郎同知制誥兼國史院編修官新除文林郎太常博士傅亨謹議文獻集卷七下
