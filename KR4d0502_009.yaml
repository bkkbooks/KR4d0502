body:
  text: 文獻集卷九上元黃溍撰墓志銘慈溪黃君墓志銘慈溪黃君卒于嘉興之寓舍其孤玠將返柩以葬來諗於某曰葬宜有銘敢以為請往者屬子銘吾母而子久未及為幸牽聯書之某之曽祖户部公與君之大父宗卿府君同仕宋季夙有雅故而玠又與某託文字交誼不得辭君諱正孫字長孺姓黃氏世為明之慈溪縣人曽大父諱一鶚以子貴贈奉議郎大父諱震擢寶祐丙辰進士第厯知撫州提舉江西浙東常平茶鹽其在江西又嘗提㸃刑獄終於宗正少卿積階朝奉大夫父諱祖勉䕃補將仕郎母林氏君生有美質雅志恬靜年十二而宋亡即絶意于仕進父歿事母盡孝與仲父季父患難相從不異資産逮今雍睦罄已槖嫁孤妹三人皇慶癸丑出遊西州玠負笈以從嘉興縣東魏塘之上有義士吳君聞君父子名遣幣馬迎致之君欣然弗拒遂止居焉君履行端粹為學者所尊慕雅不喜記誦辭章之習文成無留藁晚自號尚絅翁以見其志云至正乙酉正月七日以疾卒享年八十有一屬纊之夕戒其二子曰吾祖一部州符三持使節枲麻葛越之衣菜茹魚鮭之食淡素終身日抄等書今方盛行遺風餘祚彌久弗墜汝等善繼承之無忝為清白吏子孫言畢而逝玠奉柩東還卜以某月某日葬定海縣靈緒鄉澤山之阜從先塋也君夫人陳氏諱潤字汝玉同郡奉化人父著宗卿府君同年進士由太學博士知台州公年二十出為贅壻居十有七年乃歸夫人于夫婦之間相成以道執箕帚侍巾櫛無違禮治絲繭縫衣裳無廢事主饋食共祭祀無曠典而又不憚劬勩致養于姑得其歡心詩書語孟及女誡女則等篇皆能成誦玠方幼口授以書程督嚴于外傅尤喜觀易所占多驗間作小詩亦有思致嘗為二子賦詩若干韻有關於倫紀可裨於治化學士大夫咸稱誦之君居魏塘之明年玠即奉夫人來就養以泰定丁卯十二月十日卒年六十有三天厯戊辰九月某日歸葬奉化州剡源之三石子男二人長即玠次瑋女一今適戴幼儒故婺州路儒學教授帥初先生之子也孫男二人曽紹孫女一人曽孫男一俊民惟宗卿府君以直道為時名臣而其學一本於躬行所著書不為空言以相髙公親傳家學不自表襮而教其子玠克有成立遂以文名於一時世顧罕有能知君者銘不可以無作也銘曰汲黯之直侃侃宗卿義方之訓聞孫是承戰兢自持以孝謹稱如萬石君不言躬行學以為己善不近名逮爾嗣人復用文鳴發潛闡幽式鴻其聲惟石可久薦以兹銘化州路儒學教授王君墓志銘化州路儒學教授王君諱勳字仲昭生十嵗而孤能以禮持其身以信義交於人資産置弗問而護視先塋惟謹冠昏喪祭必考諸古之遺制而不苟同流俗文字之外無它嗜好宗族朋友稱焉仕未顯輒止而以夀終其賢乎人亦多矣君嘗教授肇慶逺郡事多率略學有田而無籍嵗所入為租四百石而已君始至諭佃人令自實稻增其額為六百石廪食有餘而俗習鄙陋士氣弗張使者行部君請擇其知學而有文者試以經術辭藝得七人焉上其名于宣閫悉補儒學官由是諸生莫不知勸暨取士之令下廣海數十郡不薦一人而肇慶首以陳祖義充賦有司遂與中州之士並進於春官人皆以為君作興之效也君初以江山教諭遷慈湖山長年已垂四十又二十年乃拜肇慶之命及再調化州而君已老故其才不究於用可見者若是而止人又皆思慕之蓋王氏上世有仕吳越為鎮城使者從其王歸宋居睦州其後又徙家于青溪又徙越之山隂始居青溪者曰仁厚於君為九世祖曽王父諱遂良以恩贈訓武郎王父諱灝擢慶元丙辰右科終於武經郎權發遣鬱林州事父諱集當用䕃得官推與其弟而以布衣取鄉薦母汪氏繼母趙氏薛氏而君周氏出也自訓武府君而上皆葬山隂其居衢開化之馬金則自鬱林府君始山隂之最著者曰佐以進士第一至某部尚書君改葬鬱林府君于崇化鄉松公里之莊山尚書四世孫修職郎易簡實志之君卒於重紀至元之嵗五月十四日年七十有七以至正改紀之明年三月十二日葬于鬱林府君墓左娶余氏先卒子男四人長曰墉次曰圻為伯氏後次曰堪曰坰女一人適單父蓋士直孫男八人巨鑑銖鑄鐖鎌錡鈺女二人適汪某黃梓君葬有日堪以書抵某曰君之子辱壻先人孫女宜能道吾家世之詳敢以銘為託某不得辭然竊觀自昔運去物改大家巨室鮮不隨之惟君之先厚積薄發雖閲世已久而流澤未艾君又亷於進取不盡享其有而以畀來人可託以永存者固不繫銘之有無序而詩之聊以慰君於冥冥云爾銘曰有濬其源其來不窮用之也舒蓄之也豐有沃其枝遺澤是䝉歸乎何憾妥兹𤣥宫承直郎潮州路總管府知事孔君墓志銘君諱濤字世平姓孔氏先聖之四十三世曰後周曲阜令襲封文宣公贈兵部尚書仁玉又二世曰宋給事中贈太尉道輔又二世曰提舉江南西路常平茶鹽公事贈中奉大夫傳南渡初自曲阜徙衢州又二世曰迪功郎監潭州南嶽廟贈少傅行可則君之髙祖也曽祖諱從隆迪功郎祖諱應祥從政郎主管尚書刑工部架閣文字入皇朝隱居弗仕考諱純西安縣儒學教諭以君貴贈承事郎濟寧路同知兖州事妣陳氏贈宜人君幼有異質五嵗知讀書八嵗能屬文架閣公愛其警敏俾受業默齊留先生間出游郡庠别駕陳公剛中大奇之年二十舉茂才異等一時名士大夫如永康胡先生吳興趙公巴西鄧公無不器重焉婦翁徐聖豫從事江東憲府携君以行涿郡盧公柳城姚公前後持使者節君皆為之執弟子禮由是學益進聲譽益起用察舉署寧國路儒學録逮朝廷著取士令延祐元年曲阜首以君充賦東平曹公子貞得君所為古文歎賞不已是嵗以鄉薦上春官所對傷太直且微譏切主司竟不合用特恩補溧陽州儒學教授君既新其廟學而士多苦於徒役為白諸臺府悉蠲之七年再貢于東平未行江浙行中書省辟為掾史曹務雖劇君隨事緩急關白以行訖無所壅杭之商稅比嵗不登俾君趨辦旬月而集時宰以為能而風紀之司頗欲躡尋其過誤後乃察其無他事遂釋至治三年復試東平第一以泰定元年賜同進士出身用有官超授從仕郎平江路崑山州判官未上丁內艱服除改吳江州判官用覃恩轉承事郎被省檄㸃浙東諸倉庫餘姚因仍前弊糧不宿倉官吏惶駭莫知所為君知而不發使自為之所糧既充而官吏亦得自逭乃皆感服君始視州事囚有張甲以擅殺盜錢乙坐逮獄已具君謂所殺非平民卒貸其死嵗饑民多事剽掠君設計捕致數十人謂此皆迫於凍餒而然不可以強盜論杖而遣之州瀕太湖故柴埭以禦水繕修無時病民特甚君為改作使可支久民力以紓水嘗暴溢君跣禱于市橋移時水降人恃以無恐而四郊之外有溺死者君親收瘞焉鄰州飢憲府俾君往賑之全活甚衆御史蓋公耘夫率同院舉君治績為諸州最未報㑹霖潦害稼君所檢視當免輸田租者衆使者覆按左右承風指誣君私庇之居無何誣君者以賄敗投逺方而君得調桂陽州判官天大旱禱于神弗答君探獄有寃出其無罪者三人乃雨廣寇竊發君獨任軍旅供億氏不擾而軍食亦無乏絶州民與蠻獠雜處素號難治知州方思廣以貪虐啓其爭殺人置弗問反加告者罪君與之辨莫能直即日解印綬去韓公德新乘亷車按是州劾罷思廣勉君復留君單騎直抵獠冗諭以禍福皆讋伏聼命人賴以安秩滿遷潮州路總管府知事用入廣升承直郎先是君在桂陽感永疾而歸疾稍間潮州迓吏至乘傳行次武林驛疾復作移寓龍山保和僧舍一夕卒至正二年四月十七日也年五十有七妻徐氏封宜人子男一人思構女三人適張日新陳煥盛驎君易簀之夕惟思構及季女在側發書笥得遺訓數十百言凡身後事區處甚具思構遵治命奉柩涉江還衢州以其年七月四日葬西安鄉孝悌里先墓之次初太尉世父既襲文宣之封五世至端友與中奉公同南遷由端友至洙襲衍聖之封者又五世至杭十九年秋七月有詔令洙赴闕架閣公以族長被命與俱中道而返洙獨入對廷議俾仍嗣襲洙力辭乃以為國子祭酒提舉浙東學校洙所居室扁曰存齊君惜其以存自號而不能欽承德意存其封爵因自稱存存齊云君所為詩尚俊邁文渾厚不事纎巧有存存齊藁未及詮次惟闕里譜系一卷為成書君九嵗時祖母黃氏有疾露香密禱乞減夀一紀以延祖母之年疾遂愈後十年乃終人謂君得年不永所禱殆有徴焉架閣公及兖州府君相繼下世弟洧方孱弱君獨治葬祭資産皆委而不較且援近比請授以官存齊之子崇安尹楷卒于杭君輟錢營護歸葬其子公溥暨兩女淪落民間咸訪求得之今公溥已強而仕兩女亦各有家公溥兄割地為報却弗受其孝友出于天性然也郡文學孔某系出永嘉族人以其疏逺而弗之親適以事置對憲府時君甫八嵗力為求直而出之同里徐伯潤託其息女于君而沒君鞠之如己子既長為嫁于士人術士顧知幾來謁遽以疾亡君為具衣衾以斂而緘其行槖惟謹妻子聞訃而至悉以授之皆感泣請以其術為獻拒弗納有同與計偕者見黜于有司貧不能歸君為貸錢一阡緡於富人而代償之其人後亦取進士有祿秩或謂可責償矣君不聼而焚其劵其急于人之患難窮厄多此類胡先生沒君集同志之士弔祭而上私諡焉默齊之喪主辦甚力溧水州判官朱性初與君聯事于省尹到官未幾而卒喪過杭君迎致於其家而為位以嚴親舊皆感動爭來歸賻其篤於師友之誼又如此君與人交歡然無間然尚氣不阿有過必面折之聞者若不能堪久乃服其識量平生無苟取嘗預書大藏經有㫖賜幣亦辭弗拜家居不事生業有書五千卷而已君之葬也思構已記嵗月納諸壙復以狀來謁銘豫締交於君最久且親自謂知君莫子若而狀之所述多豫未及知者豫固不得而略也庸備著以為序而銘以系之銘曰古有六行以教萬民比屋可封孰非全人矯矯孔君生今之世無待而興六行兼修直道以行視險若夷出其緒餘卒不大施爰擇斯藏里曰孝悌銘彰其存用諗來裔明威將軍管軍上千户所達嚕噶齊遜多台公墓志銘公諱圖卜特穆爾字可與系出䝉古遜多台氏其先有事太祖皇帝為開國元勳者曰齊拉衮名在國史公髙祖也曽祖納古爾御位下筆且齊繼領衛兵取遼破金屢策殊功後攻西夏而歿於王事祖察喇從上親征西域以功為聶哷城子達嚕噶齊又從太宗皇帝於潛邸經略中原立功尤多太宗即位賜金符改授隨州軍民達嚕噶齊父哈納襲前職以隨州孤絶涖治南陽府之昆陽愛鄰境郟縣風土淳美因家焉至正十三年世祖皇帝命相臣總兵伐宋公以管軍萬户實預在行渡江後加金虎符為湖廣等處行樞密院判官南土既平兵寢不用纍持憲節終於江西湖東道肅政亷訪使以長子職列鳥臺貴贈江東建康道肅政亷訪使又以公貴贈通議大夫僉樞密院事上輕車都尉追封陳留郡侯諡景桓母博囉珍封汝寧郡太夫人哈塔錦封陳留郡太夫人公以勳舊家子蚤備宿衛大德十年用臺薦佩金符為武德將軍蘄縣萬户府東平等處管軍上千户所達嚕噶齊延祐二年遷宣武將軍泰定三年轉明威將軍分城坐鎮自明而越前後三十餘年以老致其事公性至孝陳留府君之為湖南憲長有德於民其歿也相與繪像而祠焉公不逺數千里求遺像以歸事之如生存搢紳先生皆以詩文美之公於人有善稱歎不容口有不善則為之不懌者終日至㦸手怒罵之其善善惡惡亦天性然也宋南渡初越人蔡定父年七十餘以事繫獄法當贖而吏持不可請以身代又不報乃自沉於府河以死郡守為出其父具棺槥以葬嗣為郡者立廟卧龍山之麓請勑額號愍孝嵗久廟廢而居民侵其地官不之省公攝萬户府事慨然曰孝子不祀人奚以勸㑹使者行部亟以為言使者顧為守令曰承宣風厲郡縣責也若等寧無恧乎即日使歸其侵地廟以復完國朝取宋之兵至天台民婦王氏為軍士所得自誓不辱至剡之清風嶺齧指出血題詩石上投崖而死公移文有司為立廟迄今不廢剡有隱士吳君與公友善嘗謂吾死得附葬於二戴無憾矣逮其既卒貧不能喪公輟俸資倡鄉人葬于書院之側其好義又如此公為人亷介質直不喜紛華講閲之暇日與賢士大夫游清言雅論亹亹不倦懸車之後養髙城南闢齊閣懸弓劔著壁間聚古今圖書布列左右延名師教其子每遇風日清美輒緩轡郊外徜徉竟日或幅巾藜杖命家童抱琴自隨散步閭巷間稚耋迎笑扶擁而娭亦不拒也禮部侍郎台哈布哈出守越作新學校行鄉飲酒禮迎致公居僎輔公升降拜起不愆于儀人皆望而敬之公生於至元二年正月三日卒於至正四年十二月二十八日享年八十有四夫人哈魯氏封陳留郡君髙氏朱氏俱范陽郡君子男五人長大都以武德將軍襲職東平等處上千户所達嚕噶齊次哈喇未仕次伊嚕布哈元統元年進士纍遷承事郎南陽府穰縣逹嚕噶齊兼夲縣諸軍鄂囉勸農事次圖烈圖至正五年進士授將仕郎衡州路衡陽縣丞次諤勒哲布哈方治舉子業女四人長適宣武將軍莘縣翼上千户齊巴延徹爾次適圖魯卜岱次蚤卒次適國子學生呼都克岱爾孫男七人諸孤遵治命奉柩歸郟縣卜以至正六年某月某日葬先塋之次示不忘本也以溍於公父子間有一日之雅奉鄉貢進士趙俶所為狀來徴銘溍竊惟自昔帝王之興必有命世之材為之股肱心膂披攘經營元啓鴻業功在社稷澤在生民故天之報施也往往使後人保其祿位以承太平君子無為之治其德厚者其流光豈不然哉而况公以陳留府君為之父武德及穰縣衡陽為之子公居其間優游自適享有上夀其存其歿皆可無憾顧溍之鄙陋衰杇無以贊揚萬一庸悉取狀所述為之序而銘之銘曰國家之興必有世臣由夲而支彌久益振時方承平垂衣當寧息馬投戈以文易武靖共爾位弗震弗驚禮義干櫓舒舒扞城賔客在前圖書左右載懸吾車長歌擊缶我弓我冶世適是承爾仲爾季人遺一經發藻儒林踵武相接趨而過庭圭重組疊生榮死哀雖歿不亡式克有譽為前人光瞻言故丘返柩而祔念兹厥初祁連之墓穀城縣尉蔣君墓志銘故將仕佐郎襄陽路穀城縣尉蔣君諱吉相字迪卿其先以國為氏代有聞人系序可見者唐吏部員外郎曰則則之子曰勳仕吳越為其檢校司空兼御史大夫始家于婺之東陽勳三子其仲曰承郢承郢之子曰駟由駟八世至君之曽大父諱顯又卜居縣南之橫城大父諱天廙宋紹熙中補迪功郎父諱沐特逹多材智推先志立義孰延時之巨儒尚書侍讀方公逢辰以為之師後進賴其淑艾率為佳士里人孫祕丞德之時宰賈魏公似道客也嫉其得士譽譖於賈復使人怵以禍福俾獻其所蓄珍玩之物弗為動則中以飛語坐徙廬陵賈以誤國獲罪去乃得自便逮世祖皇帝統一海內簡拔南士可官使者江東宣慰使左丞亷公以其名聞授進義副尉南康路建昌縣主簿年已踰六十謝病而歸終身不復出君幼警敏年十一罹寇難能計免宗黨咸奇之暨成人循循雅飭晦迹林泉間以溪逸自號示無仕進意㑹亷公之壻平章政事孔公宣慰浙東亷公念主簿公不置屬之訪其子若孫孔公一見君深加器重居館下未幾而孔公拜湖廣行中書省左丞尋被召遂與俱北上時亷公已捐館舍孔公以見成宗皇帝有㫖令備宿衛君驅馳兩京侍上起居服御以恭謹數被稱奬孔公欲命以官而廷議有不合弗果用君將南歸值仁宗皇帝入定內難正位東宫因留事焉時初置利用監擢君為其知事特下令畀承事階而執政疑非舊法乃已亡何以使事至閩中感瘴癘成疾還過蘭溪去家僅二百里移疾而歸疾稍間將遂退休以就閒適上既登極春坊僚屬並以恩超遷有單祓者君為知事時所任佐史也亦得儀封尉君已升朝官品在第八乃止調君穀城尉階不過初品人皆以銓曹失其平謂君盍自陳君曰此上命也敢計其崇卑耶即日就道其縣長官故給事於省闥未嘗獲與君齒一旦為竂而君顧位其下恆不自安事無大小必咨於君兵燹後民多非土著往往輕生而喜鬭其不能自業起而為盜者尤衆舊以主簿兼警曹政既不専人益以慢至是設尉君首為之鎮之以靜紏之以嚴俗為變而盜亦衰息民有訴仇者縱火者君呼其鄰訊之曰火自內出乎抑自外入也乃逮其仇屏箠楚以情詰之則惶恐具服其察理之明感物之誠又如此部使者聞之欲辟置幕下君語人曰尉雖卑官猶得以伸吾志奈何持文書俯仰偵伺為其所不欲哉固辭弗就君讀書不屑屑於章句而能通其大義處事之中節殆非偶然主簿公夫人曰劉氏而君戴氏出也以咸淳十年十有一月辛巳生君於廬陵寓舍故主簿公以州名命君甫閲月而戴氏死旅殯廬陵餘四十年君每語及之輒泫然泣下穀城書滿代者不至謀於故人金同曰奉遷改葬是有著令吾將由漢入江泛湖以達廬陵子其護吾家㳂江東下同曰舟行千里風濤不測我不能獨任斯責其俱歸而陸走衢信以往可也君如其言民聞其去皆遮道請留委曲勞遣久之乃羅拜而别君既抵家將治行而前所患瘴癘之疾復作情愈迫切飲食寢處惕焉靡寧疾竟不可為以至治元年正月丁酉卒於家享年四十有八臨終無他語惟戒其子𤣥曰汝能返葬吾生母吾死瞑目矣君先娶施氏宋國子博士郁之孫女逾年而出再娶朱氏故上虞縣尹文魁之女子男一人𤣥也女四人長適道州路總管府推官李裕次適同邑胡珣浦江趙友淳金華許元孫男四人允同允興允亨允畀女四人先是𤣥以泰定四年正月丙辰葬君仁夀鄉載初里水齧其墓乃以至元二年十有二月乙酉改葬于乘驄鄉御史里夏山之陽虛其右以為朱夫人之夀藏作祠堂於墓前百步以生母戴氏慈母曽氏祔食其别室仍卜地墓旁造竁穴俟戴氏之柩既返而並瘞焉其改葬後七年𤣥始奉君壻李裕所為狀以銘來屬竊觀君服勤先朝遭逢之際亦盛矣而不得在顯位及隨牒外補俯首下僚尋常資級猶可序進而遽止於是小試之效雖班班可覩蓋未足展其平生素藴之萬一也歿又無以振之於幽可乎庸弗讓而為之俾刻焉銘曰士之用舍恆係其逢乘時捷出或取顯融嶷嶷蔣君鱗攀翼附不自奮飛獨行其素雨露所濡蔚乎良材孰尸繩墨奪為桷榱有隕自天豈不謂命嗇不使年莫俟其定夏山鬱紆清淑所鍾兆兹新卜以寧君躬尚俾嗣人飲其福澤龍光是承賁于松柏將仕郎建德録事劉君墓志銘君諱環翁姓劉氏其先自婺之金華徙台之寧海居縣東北之閬風山曽大父皓宋文林郎昭慶軍節度判官大父應球宋迪功郎慶元府慈溪縣主簿父圭年十六入太學遂家于杭仕皇朝為進義校尉寧海縣東奧等處海船上百户母陸氏君生三年而不能言既成童敏悟絶人讀書至忘寢食母懼其以勞致疾禁弗與燈燭君竊篝火閉窗隙坐必至四鼓年踰弱冠出從名師受春秋學取元統元年鄉薦㑹科舉事廢執其業不少懈若有待者逮今天子更新庶政科舉復行遂以至正四年再薦于鄉登五年進士第授將仕郎建德録事有在君弟子列而與君為同年者曰文宣死於疫君經紀其喪事無所避因染疾遷寓門人亷氏家而卒五月某日也得年四十有三君初娶費氏前若干年卒後娶顧氏合卺甫五日而君應薦北上費氏之媵方孕而未生也君卒之日手自為書奉束帛為母夀苐言旦夕南歸未幾而亷氏家以其書與君柩俱至費氏媵之子邵祖生已兩月君不及知矣母與仲兄饒翁哀慟幾絶時進義府君歿已若干年猶旅殯于杭饒翁乃啓其殯并君之柩返于寧海卜以某年某月某日葬某鄉某原且以狀來謁銘豫筮仕寧海聞風山中有兩先生曰劉公某曰舒公嶽祥並以文章大家師表一時心甚嚮往之而兩先生之不可作已久暨辱交於君乃知君於劉公為從曽孫舒公之子叔獻則君所從受業也木水夲源有自來哉君為人介潔不阿然不喜臧否人物與之游者莫窺其涯涘其訓諸生於杭學具有師法識者多以逺大期之際逢聖時賢才彚進而君獨遽止於是可哀也已始進義府君有子年十二而夭臨終言我死當復為劉氏子後十年見夢於父母曰我至矣果再得子八嵗而又夭後二年復見夢於父母曰父母撫我厚豈忍捨去已而生君遂取昔人識環事名之曰環而字之環翁其再薦也適感異夢乃以字為名曰環翁云銘曰不有時兮孰甄而拔之不有命兮孰夭而閼之得於彼而喪於此兮孰豫而孰奪之母倚門而啼兮兒呱呱而泣靈之歸兮何嗟及兒勉學兮天不忘往必復兮後其昌贈奉議大夫大名路滑州知州驍騎尉追封白馬縣子王府君墓志銘故贈奉議大夫大名路滑州知州驍騎尉追封白馬縣子王府君以至元庚寅八月二十四日卒於宣城之寓舍享年六十有八即宣城郭外西南岡下治地以葬而府君元配劉氏前十有四年卒安厝開州已久繼室張氏後二十五年卒尚旅殯于揚州至元後丁丑府君之子大有始並遷其柩合葬于府君之墓自為文刻石以志焉初大有為江南湖北道肅政亷訪司知事援著令乞推恩其父母贈府君承務郎大名路同知滑州事大有張氏出也故張氏與府君同被命為恭人及大有遷平江路總管府推官而劉氏恭人之命亦下大有既升五品乃加府君以今官階勳爵而劉氏張氏並追封白馬縣君大有使來諗于某曰志所以昭世系謹嵗月已納諸幽室惟是先人劬躬樹德以承其先以啓其後者宜有辭揭于墓之原以示子孫顧猶闕焉敢以為請按王氏之先實金之宗室完顔氏世居磁州有諱逺者為金統軍使府君之父也自統軍而上遭亂失其譜莫得而詳府君諱思孝字移忠幼警悟年方羇丱脫身兵間東至大名居開之濮陽乃易姓王氏子孫至今因之稍長喜讀書能屬文自處甚簡薄是時國家新取中原海宇未一殊無仕進意泊天下既平朝野無事可以出而仕而府君則既老矣惟資其子使為學庶幾它日能自振拔而大用首以材見推擇尋入江東按察司為書吏亷訪司立更留以為奏差府君委蛇就養久之乃以夀終府君有子男四人長即大用次圭次大有也今為奉議大夫廬州路六安州知州兼勸農事次大慶女一人壻曰㑹稽縣主簿郭郁孫男九人女五人蓋金之將亡大家貴族違親戚去墳墓散之四方而其後泯沒無聞者多矣府君既有以自全而不墜其宗又能教其子至於成立以備官使晚乃卒食其報豈偶然哉矧今大有厯官所至有聲其在湖北平反辰沅常潤諸死獄人尤以為明允臺府屢薦稱之其顯融未艾府君之宜見來崇者不止若今所書而已雖不克於其身措諸事業平生之志尚何憾乎序而銘之俾後世知完顔氏之為王氏王氏之在宣城皆始于府君也銘曰完顔之支别為王氏逺迹于南由府君始惟時府君有韞弗施一其初終靡間險夷保厥嗣人使有祿位貤恩所加草木衣被其升在上神遊故墟降形在下兆兹坤隅中為同冗昭穆左右勒辭紀實式示爾後贈文林郎江浙等處儒學副提舉許公墓志銘前進士許廣大為武義之明年以內艱去銜哀致辭于某曰昔吾父之棄諸孤也廣大年甫十有七後八年乃以非才叨掇末第獲備官使又十有四年始用例贈吾父文林郎江浙等處儒學副提舉封吾母太宜人廣大祇奉命書將以告于墓下且求時之文人勒諸貞石以昭先德而侈上恩詎謂吉凶同域吾母遽以疾不起風木之悲罔極奈何忍未即死以終大事願推述吾父啓慶諸祉源流之所自及吾母為之佽助者合而銘之惟許氏逺有世序其占籍台州路之天台縣莫詳所以徙提學公諱嗣字繼可曽大父某大父某父某俱弗仕自曽大父時以子孫衆盛俾人專一經故許氏明經者代不乏人提學公少受尚書而於諸經無不通然未嘗資以事進取為名譽朝益暮習皆為己之學其為人純慤靜重不妄言笑動以禮自持父喪哀毁骨立衰麻之制哭踊之節必求合于古諸弟尚幼撫育訓誨至于成人而授之以室先世所遺資産惟其所用無靳賔祭百須及門户事悉心任之諸弟咸感化而父事焉其教子尤篤延師必一時名人躬承事之如弟子禮寢疾病之三月預為詩示廣大詩僅百四十言而處已接物之道靡所不該廣大佩服不敢忘訖能有所樹立擢元統元年進士第調昌國州判官以選入行宣政院為掾吏用資格序遷而來武義居亡何百廢具舉刑清訟簡民安其業受知上官見謂亷能皆提學公之教而宜人相之也宜人張氏同邑官族提學公之歿率諸子奉窀穸惟謹事舅姑以孝治家勤儉而有法待宗黨恩意甚至遇貧乏必周之諸子既蚤失所怙宜人遵遺訓戒勵之尤切廣大在武義迎至宜人就養每晨出必告之曰臨事貴詳審不可奪於私喜怒莫歸則詢于僕𨽻有少不厭其意輒戚戚不樂前是武義數有水患謀作隄以捍之而或者憚其勞勩先聖廟及學舍屢徙而多未完欲繕治崇飾之而或者以為非所急廣大慨然以為已任宜人曰德惠未施於人而並興土木之役得無為民病乎後知廣大以身先之而人樂趨事乃喜其賢有識如此談者多謂提學公雖老於山林而貤恩所及在其身後一門之內死哀生榮可以無憾矣溍竊觀其示廣大詩有曰金馬誇豪貴吾謂非世傑惟能師古道乃與禽獸别然則穹官峻爵固非其所慕惟後之人能以斯道自任以古人自期乃其所望也廣大既有以成其志曷可無一言以慰之於泉下乎提學公卒於泰定二年七月某日享年四十有五以其年十二月某日祔葬於某鄉龍山八世祖墓次宜人卒於至正六年七月九日享年六十有九以某年某月某日合葬焉子男三人長即廣大文林郎婺州路武義縣尹兼勸農事次彌大喪明而卒次小戊方業儒女一人適趙景良先卒孫男一人孟浩女五人提學公有詩若干卷因其自號名之曰得靜齊集溍嘗序其篇端以為清髙而不失乎迂平實而不近乎俚兹故弗論獨序其平生大槩而銘之銘曰許出太嶽古之封君後以國氏世多顯人公居盛時乃不有聞卒以不施藏器於身爰有淑德嫓于名門克生材彥孔敏而文惟君子使有社有民潤澤實豐水必有源遊者如斯不亡者存龍光下賁耀於無垠公侯之復在爾子孫龍山之原巋焉丘墳木則已拱合祔惟新歸歟同冗表以貞珉成全郎江浙官醫提舉張公墓志銘故成全郎江浙等處官醫提舉張公諱去非婺之東陽人世祖亮與宋政和中舉八行賜號冲素處士曰志行者實兄弟行歿葬縣南乘驄鄉木掘嶺荷塘西原子孫因家于荆浦父諱潤以修德尚義為鄉善士母顧氏有子五人公其季也少警敏有大志既壯而隱於醫其為術深超徑詣精驗如神然不專於為人已疾尤善以太素脉言人吉凶貴賤夀夭率皆奇中公自號實堂人罕用為其稱而直以藝配其姓稱之曰張太素云至元二十有六年大盜竊發於鄰郡蹂踐縣境尚書左丞史公弼宣慰浙東督諸軍討捕之一夕氣填膺逆上結塞脹滿寢食併廢公授以一劑立愈因留置幕下及移屯永康縉雲皆預在行將卒道病與藥輒效事平計功行賞當得官公謝非其夲志不就乃署公夲郡官醫提領史公入朝或詢以江南名醫必首及公且遺書招致之大德五年公至京師而史公由僉樞拜平章政事行省江西後二年召還樞庭見公歡甚陛對亟薦公于上李叔固丞相時領太醫奏用公為尚醫奉御食五品祿明年扈從上京阿古圖楚王疾劇有㫖命公往視之王既平復入謝上嘉奬焉又明年王被命巡朔漠回次和寧三孫明安特穆爾有奇疾衆醫莫知所為遣府僚孫司馬者詣闕請輟公以來公以體氣漸衰不任逺役懇辭上再三勉諭出尚方襲衣重裘安車善馬資之以行仍勑有司厚贍其家公既至施之針焫投之湯液閲月而疾良已王為之刲羊刑馬大㑹宗戚餞公南還且遺以交鈔五千緡白金百兩內謁者章格司徒復言于上及東朝加賜交鈔五千緡文綺四端以旌之由是聲動朝野太醫剡上其名于中書以聞擢江西等處官醫提舉階成全郎某年也公過家上冡即抵官下居三嵗職事修舉省臺交譽之以秩滿去官僚屬皆泣拜而别公性溫厚家食之日待鄉鄰有恩意以疾來告者赴其急無難色方且於一丘一壑以怡神引年而江浙之命下矣到官數月俄拂衣而歸遂以天厯元年三月二十有四日卒於家享年八十有三重紀至元之某年十二月某日葬荆浦之北原元配何氏繼室馬氏皆前卒至是合祔焉子男二人長安道何氏出終於杭州路醫學教授次至道馬氏出前昌國州醫學教授俱能襲父業以醫名女一人適厲闕孫男六人女二人曽孫男五人女二人公之葬已久而墓上之石未刻於是至道以狀來取文為銘且曰先人在京師時至道與先兄留治家事凡先人所遊從與治療之曲折言人禍福之徴應皆莫能知其詳所可知闕是而止先兄因赴銓謁參知政事張公某公言昔吾尚少求而父切脉即知吾後當居政路不自意忝竊至此而父可謂精于其術者也今豈可復得哉由公之言而推其所不及知闕軼固多矣獨先人自序太素脈訣出於蜀之清城山王璞仙翁而歙人張子元子發嘗校其書傳至楊上善而豫得之始奏請以行于世其端緒之相承可槩見也昔劉歆序七略醫經之言人血脉經絡隂陽表裏者黃帝扁鵲白氏內外經及旁篇七家而已蓋太素之書尤祕而未出故無得而述焉庸備著公所序於銘文之首庶史官傳方伎者有考云爾銘曰太素之學古有别傳卓哉張公窮幽極𤣥爰取諸身以知來物活人之功抑其仁術帝謂斯人醫師之良畀以制書歸榮故鄉幡然勇退遂考終命前知孔灼順受其正公則逺矣公書具存發潛明微在爾子孫謁文訂實推述源委薦諸石章用裨信史成全郎江浙官醫提舉葛公墓志銘公諱應雷字震父世為平江人其先仕宋季而未顯宣義思恭於公為大父進義校尉從豫於公為父公少從季父某受周禮為舉子業國朝取宋場屋事廢公無仕進意若將終身焉初進義府君業儒而于九流百家靡所不通尤工於醫公既不得以文學自見退而取家庭所聞靈樞素問諸書之說研窮精核見世之言醫者執方拘論而莫究其源委多與古法背馳於是推五運六氣之標夲察隂陽升降之左右以定五藏六府之虛實以合經絡氣血之流注而知疾病之候死生之期其處方劑施砭焫率與它醫異以此名動一時浙西提刑按察司判官李公某中州名醫也嘗自診視其父疾復以咨决於公聞公言父子相顧駭愕曰南方何以有此邪則盡出所藏劉守真張潔古之書與公討論所見無不吻合江南言劉張之學自公始公所著書大㫖以為醫當知時盛衰劉守真張子和輩值金人強盛民悍氣剛故多用宣泄之法及其衰也兵革之餘饑饉相仍民勞志困故張潔古李明之輩多加補益之功至若宋之季年醫者大抵務守護元氣而不識攻伐之機能養病而不能治病失在不知通其變也書凡二十卷名之曰醫學㑹同摘古語扁其齊曰恆蓋用術貴於通變立志則不可無恆也士大夫聞公名奉幣馬迎致之無虛日延譽益廣大德十年用薦者補平江路醫學教授治廟宇闢土田教育其弟子員後多為良醫尋用省臺交舉擢江浙等處官醫副提舉遂為其提舉階自醫愈郎升成全郎延祐五年也公前後在官十年其學大行於東南至治二年丁母憂而歸居喪過於哀毁如不欲生竟以三年春正月十八日卒於家享年六十娶盧氏宋某官鉞之孫女子男二人長震孫先五年卒次乾孫女一人適胡就矩亦已卒孫男四人公資禀和粹識量明逹外嚴而內寬事親孝而友愛其弟鄉鄰有急拯救之如恐不及人以長者稱焉乾孫既以泰定元年春二月二十八日奉柩葬于吳縣至德鄉望墅墩先墓之次後十有三年始以前宋進士顔先生堯煥所為公行狀屬豫為之銘豫觀前史傳扁鵲倉公華他皆厯言其已試之效先生狀公行皆略弗著惟論次其所以為術之夲可謂善序事者也是用悉取而備陳之公雖寓迹方技而未嘗廢詩禮之傳遭時承平復以經術網羅天下士獨周禮為無所用乃俾乾孫學為詩以應有司之求乾孫篤於學而敏於文庶幾能成公之初志者銘曰猗葛公抱一經訖不試以術鳴帝有命公是膺樂其職不近名尚有子斐儒英際聖時伏必興貤茂恩耀泉扃發其兆在兹銘錢翼之墓志銘翼之姓錢氏諱良右世為平江人曽大父世昌大父格父宗慶俱弗仕而大父用其仲子台州路總管府判官宗顯恩贈承事郎鎮江路丹陽縣尹翼之生而不凡長益闓敏徐文貞公持浙西部使者節台州君處其幕下翼之因得侍公左右公見其言談舉止謹節有禮大奇之台州君同幕多名流公語之曰錢生濟濟有儒者意度令親簡編必成令器翼之亦感勵自力於學公所為詩文必出以示翼之其取重如此翼之既游文貞之門至於前代遺老若辨陽周先生淮隂龔先生當世宗工若剡源戴先生隆山牟先生永康胡先生翼之無不接其緒論其餘中州雅望若薊丘李公漁陽鮮于公暨一時賢雋之士亦皆折行輩與翼之交故其聞見最為詳博而吳興趙公巴西鄧公遇翼之尤厚數引拔之翼之殊無仕進意至大中行中書省署翼之吳縣儒學教諭翼之欣然就職已代去輒不復出閒居三十年安貧守約未始有求於人一室蕭然坐客常滿詠歌酣嬉無虛日里中子弟來就學亦弗拒也御史聊城周公舉翼之宜在館閣未報而中書連被上㫖擇工於書者俾書農桑輯要大學衍義有司悉起翼之以應令竣事薦章交上亦不報浮光王公與翼之生同嵗居同里公由户部尚書參領河南江北行省事念故人之存者獨翼之將力援之於朝而翼之素志丘壑至是亦既老矣翼之性夷曠與人交無町畦篤於故舊往來尺牘裒輯裝治惟謹時出以示人曰吾非以此衒其識人之多特以其間有情辭諱切關於世教者不可廢耳然不喜於苟同人有不善或面斥之以其行孚於人不以為異也大參金源天公嘗問翼之曰錢氏起五季有吳越子孫多在東南且世有顯人君豈其裔耶翼之曰此無從稽也蓋某之先有甓壚沽酒者每見故書紙輒手拾聚而焚之曰吾子孫其有興於文學者乎公聞翼之言深服其質直翼之晚自號江村氏人因以江村先生稱之至正四年五月八日以疾卒於家享年六十有七疾已革猶正巾危坐秉筆作弟姪書頃之而逝初室徐氏廣德縣尉逢吉之女無子繼室丘氏宋龍圖閣學士贈特進嶽之曽孫承奉郎稷之女子男一人曰逵女二人長適張元善前卒次適吳某孫男某女三人皆幼逵既以其月十有八日奉柩葬吳縣靈岩鄉黃山徐涇先墓之次而刻石志其嵗月且遵治命以狀來徴銘豫辱游於翼之父子間甚久别去十年而翼之遽不可作其以銘見屬望豫厚矣逵又好學有文能嗣其世業而汲汲焉用意於不朽事豫何敢辭翼之有詩文雜著若干卷奎章閣侍書學士虞公已為之序以故弗論翼之於古篆𨽻真行小草無不精絶豪家貴人往往傳藏以為珍玩或有所挾而強使為之雖奉以百金弗顧也人多以是敬服之而罕有論其出處之大致者序而銘之庶幾來世有以知其人也銘曰由學而升不近乎名既仕而止不失乎已藏之若虛以浮湛於里閈優游卒嵗匪依隱而玩世惟以求夫志欲知其人視此刻文饒州路儒學教授許君墓志銘君諱熹字華甫婺之東陽人宋宣和中睦寇竊發八世祖瓊聚民丁衛鄉井被州將命赴援有功得官尋以城中兵食不繼力戰而死里人至今廟祭焉大父諱文昌號空雲處士無子弟文奎實生君年十五育以為己子處士兄弟素嚴張若左右侍養各盡其道先意承志咸得其歡心於同産弟兩人友愛尤篤先世之田廬一無所較公上徴求百役之須皆身任其費子姪化之靡有間言異時處士兄弟從鄉先生石公游有雋聲後二十年復遣君兄弟受業石公之門君幼警敏既長務以靜專自持同門中推為髙弟用舉者試憲府例當補縣教官隨牒赴儒臺初筮得浦江㑹朝廷欲重師儒之選俾職官一縣者悉改調於外省君解職以名剡上俄又命更其法從宣閫署置同時捧檄而去者一百四十人皆以次補授序遷間以舉子業自奮君獨恬于進取有司強充賦試不合輒棄場屋家食者久之始分教于武義再調處之麗水丁夲生親憂服除或謂稍增加所厯月日則當升君不可遂復調台之天台用纍考充湖之東湖書院山長在武義取豪民所據山塘歸于學在天台預鄉薦者三人輟官俸斥私錢禮遣之募好事者捐田以助養士東湖創於里之大家事多綿蕝亦勸之割田附益焉秩滿調饒州路儒學教授拜命而卒臨終戒其子曰爾等入當善事而母出當善事而叔父扶植吾門户使勿墜它則平日誨爾熟矣言訖而逝重紀至元之元年十二月二十一日也享年六十有一六年十月四日葬所居西北二里某鄉某原娶劉氏子男二人曰怡曰愈女二人壻曰王濟川蔣世安孫男四人女四人君貌癯而志俶儻自奉殊儉薄而客至館穀必豐贐必厚産不踰中人而輕財急義族姻里黨老而無依幼而孤者衣食之未嫁者擇士族歸之嵗饑鄰里不能自活者賑恤之故其善日積而家日耗歿後囊無餘蓄久乃克葬諸孤既志嵗月求豫填諱納壙中仍蹐門請豫銘以揭于墓道豫幸獲執弟子禮於石公與君為同門知君為深庸托志所述參以豫所知序而銘之按東陽許氏出晉孝子孜孝子史有列傳其子孫至近世愈蕃衍居邑中者為西南兩族而君之先别居近郊之梅峴邑居之族掇世科踐朝著若以延賞入官者數十百年相望不絶而君之先獨不大顯雖能捍大患以死勤事後之人未有食其報者君生今聖時而以文學起家人謂其將致身華要又邅回而不進甫霑一命竟不及祿其不可哀也夫銘以慰君亦以告于嗣人庶有知其委祉之自而思亢其宗者銘曰九軌之塗衆方疾驅長裾佩玉行之徐徐與物委蛇世或謂迂銖稱寸量月計有餘成之匪亟得而莫居載其榮光歸賁幽墟善積于家穰穰所儲有謹其承其發必舒鸞翔鵠翥亢其門閭惟銘有徴永世不渝鄒府君墓志銘無錫鄒君以至順二年十一月二十六日卒元統元年九月某日葬後十有四年為至正七年其子師尹乃奉故禮部尚書宛平曹公所為行狀來徴銘謹序而銘之銘曰鄒氏之先世居晉陵宋有忠公以剛直稱正色立朝不震不懾元符三疏光于史牒子孫蔓延散處吳中還居錫山家日以豐君之曽祖厥諱聞善祖諱成大再世不顯遇事有勇及物以仁人憚其嚴而懷其恩父諱仁聲始列仕籍將仕初階不有祿食恢其先業益厚于資嗇已裕人遂大厥施君諱德修字曰君永生而慧朗長而凝靜志學嚮方器識愈宏時無科目不以文鳴遺榮自通優游卒嵗持身清約不事侈麗人有衣服美錦纖絺君則弗御終身布韋人有室廬穹檐邃宇君則弗居取庇風雨推其所有惠子宗姻由近而逺恤其鄉鄰爾弱我扶爾匱我給力苟可為靡有弗及或觸機穽深憫其窮排難解紛不自為功青青者筠內虛外直以名吾軒用厲厥德髙蹈物表若與世違行孚于衆譽望所歸展也吉人宜膺多祉六十八齡云何不起君配華氏子男一人是曰師尹有學有文其孫有七二男五女男侃與儼克肖其父女適顧璋暨錢允臣餘皆幼艾在室未婚泰伯之鄉崇德之里為君宅兆其葬以禮君所結交時之豪雄知君最深莫如曹公謂君為人卓越醇厚其言有徴可垂不朽瞻彼佳城松柏丸丸有子承考謁辭圖堅顧慙不敏簉屬史氏畀以刻文昭示無止蔣君墓碣蔣君敬之名宗簡生三十有一年而死其友王厚孫以狀述遺言來屬于余曰宗簡生不及從子遊死而得一言為不朽之託猶不死也嗚呼余之固陋何足以知敬之敬之之望余則至矣敢不諾敬之上世居潤之金壇宋南渡時七世祖兵部尚書少師莊簡公猷始遷四明其後多至顯官而敬之曽大父應鼇大父與可父復祖皆弗仕母方氏敬之幼爽敏有雋聲程先生端禮歸自江東敬之以弟子禮見留居旁舍數嵗凡天人性命之夲古今治亂得失之迹靡不察究郡庠延敬之為少學師諸生多貴游以其年少頗易之敬之于疑義數語而決以文來就正隨所治為加潤色頃刻數十篇乃大悅服尋挈其徒寓湖心僧寺聚易詩春秋諸家之說而折衷焉試有司不偶輒散棄其舊作或謂敬之不以盛壯時挾所長取祿仕獨以古文自詭奚益敬之笑曰使吾理明氣充其為文于決科何有得不得命也文有古今之異邪既而稍出游江湖間遇臨川危素于金陵語意合欲偕之至京師以母老不能去買未見書數百卷以居翰林柳先生貫得敬之所為文擊節不已方為具薦櫝而敬之已屬疾遂不起至正元年十月十二日也貧無以治喪天台陳廷言嘗主郡教為言於太守及寓公率朋游之士合錢為助乃克以其年十一月某日葬鄞縣陽堂鄉桃奧先墓之次敬之娶趙氏有子男一人曰僖女二人所著有易集義詩答問春秋三傳要義總若干卷文集十卷藏於家敬之為人介潔篤於自信重然諾恥為小亷曲謹人多稱其經學詞義而其卓然欲有所樹立以自附於古人者未必盡知之也昔之豐於材而嗇於年如王逢原邢惇夫輩蓋有之矣此兩人得臨川豫章而其名益彰敬之有程先生以為依歸視昔人可無憾尚奚以區區之言為子不讓而銘之者姑以慰其來意云爾銘曰進而未見其止若有以為而今已矣昭明在上其藏在此水西翁吕公墓志銘府君諱汲字仲修姓吕氏吕氏於婺為著姓而非一族人因以其所居地望為别居永康縣之太平鄉者號太平吕氏宋之中葉有以經學教授于鄉里者曰遵遵之子曰迪功郎師愈仇家搆飛語中其長子約而連及之父子同時與龍川陳公俱下天獄次子皓先以賑濟受知倉使朱文公奏補郡文學用漕薦再上春官時年二十有四叩匭上書乞納所得官贖父兄罪丞相白無例孝宗正色曰義事安用例立命出之緣坐得釋者五十餘人幼子源是為府君五世祖纍贈通直郎髙祖諱介曽祖諱羔皆承節郎祖諱野承信郎父諱懋咸淳間嘗與計偕試禮部入皇朝版授知永康縣至元十五年也母何氏知樞密院兼參知政事夢然之從孫女府君少嗜學至老不懈讀書務窮理而於百家數術靡不旁通其說平居致養於親為具必豐族人不能自食者月有廪年當入學者家有孰列為成規守而不廢子女㛰嫁必擇故家名族未嘗論財接賔友情文兼至各盡其歡而止鄰里有急必周之嵗大祲為粥食餓者所全活以千百計至於自奉乃極簡薄衣無美飾食無珍味器用苟完出入無傔從唯以一僮挾策自隨人望之蕭然山澤之癯也其恭儉出於天性孝友行於家仁愛及於宗族鄉黨可見者如此而又多材能遇事明敏所處必中於理衆咸厭服為人排難解紛勇於赴義不以為憚里中無賴之徒或假私鹽誣平民蔓延所及甚衆為之力辨於官以免人尤德之初知縣公遭值江南新附官府未立毅然出任縣事而弗辭既撫定其民使無失業且為之捍衛以備非常人恃以安及朝廷為置吏即奉身而退蓋志在用權以全其鄉井不籍是為進取之階也其後大盜竊發官軍進討復強起之以為嚮導府君甫踰弱冠實預在行身踐重山密林荒昧阻絶之境而直探其巢穴事平口不言功識者推其雅量晚益務韜晦自號水西翁云前娶朱氏鄉貢進士環之女先四十三年卒後娶趙氏參知政事資政殿大學士順孫之女先五年卒子男三人長曰梓夲伯兄之子次曰權曰機皆朱氏所出府君既早失內助三子又幼弱因鞠兄子俾持門户事而悉畀以知縣公所遺田宅權既長遣從鄉先生許公益之受學八華山中業成未及見於用而先府君十五年卒無子府君以繼體之重為之斬衰三年仍命以機子烜為之後而機亦先府君三年卒女二人適同邑陳至寶東陽胡道隆孫男七人熙忠燧炯燁烜煥女四人曽孫男六人女九人府君生於宋咸淳四年戊辰閏月三日乙卯卒於今至正六年丙戌二月三日壬子享年七十有九諸孫以其年十一月三十日癸酉奉柩合葬于東陽縣西部鄉西郭先室朱氏之墓而以狀來謁銘昔歐陽子有言為善無不報而遲速有時豫觀水心葉公銘迪功之墓曰治生能富教子能賢後溪劉公銘通直之墓曰宗族稱其孝弟鄉黨敬其仁義蓋吕氏之積纍其來久矣至府君家益昌而其材又有足用者苟出其緒餘稍自見於世宜不止為一鄉之善士而已顧乃斂藏弗耀而優游以卒嵗豈不曰為善之報自有其時乎府君諸子雖早世而孫曽蕃衍生今昭代必有能自致顯融而大亢其宗者為之銘以朂之且以俟也銘曰有伏必興斯理之常惟德之厚其流乃光吁嗟府君隱居行義澤施於人而不有位保其世德望于一鄉繩繩子孫積善之祥亦既有子胡又夭閼百年之積鬱而不發是繼是述在其孫曽尚克有聞天寵是承貤恩所加賁及窀穸惟銘可徴勒此貞石奉訓大夫婺源州知州致仕程公墓志銘公諱郇字晉輔姓程氏其先廣平人唐御史亮以直言忤㫖謫通義令通義宋眉州也子孫家焉髙祖諱符孫承事郎贈大中大夫曽祖諱公許嘉定四年進士官至刑部尚書兼侍讀以龍圖閣學士致仕贈宣奉大夫諡忠文始出蜀而僑居於今之湖州祖諱子泳贈奉直大夫考諱繩翁朝散大夫將作監入皇朝以公貴贈奉訓大夫台州路黃巖州知州飛騎尉追封烏程縣男妣陶氏追封烏程縣君公幼聰慧又生於名家耳濡目染能蚤有知年十二入鄉校出儕輩間稍長游心聖賢之學於書無不讀為文博敏閎肆有奇氣下筆頃刻數千言觀者莫不駭服前代遺老如尚書陳公存參政文公及翁大卿牟公巘與公居同郡咸器重之用薦者署嘉興路儒學録丁外艱服除升平江之和靜書院山長書院故在虎丘為寺僧所據既徙置城中豪家又欲奪而有之賴公力爭而止秩滿上名中書適值銓曹行限年法再調紹興之和靜書院山長書院舊有田七百畝籍於郡學公取而有之用纍考合格授將仕郎台州路儒學教授新殿宇及禮樂之器增置養士之田百餘畝調將仕郎鎮江路總管府知事郡當南北往來之衝前是為幕僚者窘於將迎事多留滯公獨處之裕如遷從仕郎衢州路江山縣尹為政務平易官府日益無事以餘力造舟濟行者且買田百餘畝使為久逺計使者行部郡守縣令多坐事免公獨以亷介見禮遇再遷徴事郎武岡路綏能縣尹縣鄰於溪峒民夷雜處竊發不時公拊循以愷悌之政人咸感化境內以安㑹廣寇猖獗犯全道兩州長二而下以供億軍需出境公獨任縣事師旅經從枝梧遣發戒令嚴明士卒帖帖不敢肆行省檄發屬郡民兵公選義勇應之皆慷慨赴敵戰數有功縣有義倉糧二萬餘石積為豪強所侵公悉徴理之嵗適大祲賴以全活者甚衆有僞鈔獄十年不決公力辨其非辜既而朝廷遣官慮囚閲其始末見稱明允升承事郎慶元路慈溪縣尹慈溪密邇帥閫事尤叢劇公設施注措若不經意咸盡其宜縣故以食鹽額重為民病公規畫有方賦足而民不困縣東花嶼蓀湖受諸水溉田可六十頃豪民或請堙湖為田而輸糧于官吏以成案請署公毅然不可事遂寢湖旁農家乃均獲其利公三為縣涖事之暇尤垂意于庠序之事年垂七十預請納祿遂以奉訓大夫徽州路婺源州知州致仕公既歸老于家杜門不出手植五柳于前庭扁曰柳軒舍下環以松菊時與諸老留連觴咏置家事不問四方來求文者應酬無倦色有柳軒退藁十卷藏于家俄感微疾既痊而復作却藥謝醫談笑如平日忽命具湯沐斥女侍呼子孫立左右端坐而逝公生于宋咸淳己巳四月一日卒于今至正六年七月二十五日享年七十有八娶史氏中書舍人某之孫女封烏程縣君子男四人長游兩浙都運鹽使司海沙場鹽司管勾次濤次洽次潛女一人適孟良實孫男八人權模楷植楫同生文孫住孫女七人曽孫男一人游等遵治命以是年十月二十九日奉柩葬於烏程縣永新鄉桃塢先塋之旁公為人溫良易直未嘗髙自標榜與人交無畦畛與後生談前朝文獻厯厯如指諸掌喜誘人為善不深於疾惡故賢者親而愛之不賢者敬而畏之初龍圖公事宋理宗為兩制侍從權臣枋國憸黨盈庭鋤姦衛良靡遺餘力凡五立朝而五速煩言每一去國更得盛名公際遇聖世朝廷清明而又恬處下列得以從容進退者與龍圖公所遭之時異也某幸嘗辱登公之堂而接聞公之緒論游等又不逺數千里奉國子助教宇文公諒之狀來徴銘誼不敢辭銘曰程顯唐世由御史君龍圖仕宋乃振於文危言正色匪躬之故寧與百壬更起迭仆髙風盛德增光前人垂休委祉逮其曽孫以名師儒為賢長吏視龍圖公世殊事異非有盤錯利器焉施長歌鼓缶式全其歸人之所瞻百年喬木世其家者是似是續承務郎杭州路富陽縣尹致仕倪公墓志銘公諱淵字仲深姓倪氏其先汴人宋靖康時五世祖南以武辨扈從南遷于錢唐四世祖某又徙家烏程故今為湖州人曽祖後民弗仕祖椿年用同知樞密院事謝公堂奏補官終於某路兵馬監押父守真輕財尚義鄉稱善人入國朝以公貴贈承務郎松江府判官母濮氏贈恭人公生而卓異精敏絶人讀書過目成誦德祐失國科舉事廢公年甫九嵗猶能習為其文既長乃棄去而刻意聖賢之學三山敖先生繼翁深於三禮而尤善易公從之游於節文度數之詳辭變象占之妙靡不博考洞究參知政事文公大理少卿牟公皆前代遺老莫不器重焉用薦者署夲郡儒學録髙公克恭持風裁慎許可時為江浙行省左右司郎中聞公名欲識之一見與語降歎不已曰君大才不可小用也及為南臺治中侍御史首以敖先生及鄧公文原陳公康祖姚公式與公五人並薦于朝未報而行省調公杭州路儒學正河南王孛憐吉䚟嘗受業魏國許文正公之門方以平章政事行省江浙聞公講說大契其意即遣子從公受業且移文中書舉公可教國子而中書已定擬臺章所薦五人各補郡文學乃以公為杭州路學教授視事伊始承歉嵗之餘倉庾枵然絃誦息響適嗣嵗小稔則量入為出節縮浮蠧既又復民間冒沒之田為米三百石資用稍寬乃嚴飭從祀補造祭器自禮殿論堂書閣至官屋室皆一新之先是列郡釋奠多用俗樂公訪得故太常樂工兩人俾以雅樂教諸生胄監聞之因招致兩樂工為國子樂師今諸郡備金石之樂實自公倡之秩滿當改調於是髙公已為吏部尚書舉公可任史事中書左丞高公昉前在行省雅知公即欲處以編摩之職公微聞之亟具啓事以親老乞便養遂以公為湖州路儒學教授未上丁外艱服除中書左司都事王公克敬知公不樂逺宦諭詮曹授以元缺復需次于湖州家食者十有五年恬然若與世相違泰定丙寅江南三省交聘公校文鄉闈使者同日至公辭不獲遂應江浙之命士論翕然歸之湖學自虞君志道主教事重搆先聖殿而圬墁藻繢多待公始完既又葺稽古閣改建講堂考安定先生湖學舊法列經義治事諸齊以惠來學又創仁智軒為其游息之所其後學者為公立生祠公移文止之不得躬往撤之用纍考入流授將仕郎太平路當塗縣主簿時長官皆以故免去公獨理縣事延祐初經理田土考核多失其實賦斂不均公私咸以為患公為分畫編次以為圖籍出其隱匿而去其增加二稅乃如期而集縣有定塘溉田可十頃豪家據而有之民以病告中書下其事于版曹議以還民吏憚豪家莫敢奉行或告闕之和州民有田在縣境富家與為交易券成而負其直民訟于官而富家執券自辨有司莫知所裁乃赴江來訴公探得其情始懼而以其直歸之縣民立異姓為後者所後父母沒已久有非其族而姓偶同者賂吏給憑改立而盡奪其資産公焚其憑而釐正之里父老數十人羅拜馬前曰公神明之政也嵗適大祲民以狀言災傷郡戒縣勿受公爭之不得即解印求去郡中驚悟遣吏謝公且以檢視之事悉諉之公躬履阡陌不避其勤民賴以蘇元公永貞為江東亷訪副使巡厯而還謂其使王公士煕曰吾分按太平池州亷能吏惟一當塗主簿而已王公亦素知公聞之喜力薦公才堪風憲元統乙亥江浙行省參知政事富珠哩公翀復聘公司文衡禮遇尤至部使者舉公可上縣令而公以年垂七袠告老而歸授承務郎杭州路富陽縣尹致仕公天資粹美而輔之以學造次必由於禮家人未嘗見其有惰容居官朝出涖事暮歸讀書課子弟或至夜分不寐少嘗從星官厯翁治其術運算尤精既老于家杜門罕與人事接潛心於易著易集說二十卷圖說序例各一卷十年之間精力盡在是書矣公寡嗜欲善攝養老而氣貌益充無衰憊態俄以疽發背而卒病已革猶置易說於几案間時諷誦之語其子曰死期至已夫復何言須臾翛然而化至正五年夏六月二十九日也娶鄭氏先十八年卒贈恭人子男三人長驤已卒次駿松江府儒學教授次侁女二人長適楊福孫亦已卒次適陸元瑾孫男六人長璨用公廕為紹興路錢清務副使次璛琰璋瑛瓚女三人曽孫男二人女二人公昆弟四人伯叔季皆早世叔有遺孤甫四嵗撫而教之踰於己子伯季皆無嗣則以駿侁為之後駿等遵治命以其年冬十月某日奉柩葬烏程縣德政鄉毗山先墓之次與鄭恭人同兆域後四年乃命璛走京師屬某為之銘蓋髙公所薦五人惟鄧公掌制命侍經幄仕最顯公雖與有民社而未足以展其材餘三人又權止於文學掾然皆能脫略名迹而以道義相髙有識之士莫不服髙公之知人而嘉五人之不負所舉也五人相繼下世已久今天子以鄧公先朝舊臣用臣僚奏請特賜以神道之碑銘而某以門生忝被上㫖與聞論撰兹又執筆而銘公一時之人物至是凋落盡矣何能無感愴於斯文也哉銘曰知人之明古以為難聲求氣應夫豈偶然公初有逢連茹而進孰不望公爭翔競奮大道甚夷公行徐徐既揚其英發而不舒白首一官老於文學夲闡聖謨以開後覺晚乃佐邑未究所施俄復引年納祿而歸加恩增秩不煩以事鼓缶而歌優游卒嵗儲祉則豐畀于來昆尚克自振益亢其門史氏作銘言無溢美寫之方珉揚芬千祀文獻集卷九上欽定四庫全書文獻集卷九下元黃溍撰中憲大夫淮東道宣尉副使致仕王公墓志銘公諱良字止善姓王氏越之諸暨人曽大父諱天祐大父諱一榮俱弗仕父諱理用公貴纍贈朝列大夫祕書少監騎都尉追封太原郡伯母祝氏方氏並追封太原郡君所生母厲氏贈宜人公少受業郡庠篤行勵學克自植立每慨然以康濟為志故祕書少監凌公時中為江北淮東道肅政亷訪司知事雅知公辟為書吏督辦富安場嵗課場距海遠潮不時至鹽丁負水取滷力疲而賦不充乃為相其地形鑿渠以通海潮公私咸便之考滿調將仕佐郎廬州録事司判官淮東道宣慰使司辟為令史掌織染之事所轄官府久廢不治乃日臨視之為修作坊募工匠至於攻金治絲設色具為區處迄今守為成法兩淮鹽綱病於運河淺澀事聞詔遣都水監官疏治之公從分閫至淮安之鹽城有司部役夫三千束手以俟都水之來公言不宜坐靡日食促令興工仍立法每十夫一治炊爨九操畚鍤日所穿廣四犬修一丈深五尺比都水至河可通舟者已四十五里遂自新興五祐兩場屬于髙郵次第訖功而它州役議猶未定乃俾悉用公法行之調將仕郎峽州路總管府知事入江浙行中書省為掾史㑹朝廷遣使復立諸市舶司公從之至泉州建言若買舊有之船以付舶商則費省而工易集且可絶官吏侵欺掊克之弊中書報如公言凡為船六䑸省官錢五十餘萬緡升承事郎建德路建德縣尹以方郡君憂不赴服闋擢兩浙都轉運鹽使司經歷越守王公克敬以郡民若干計口食鹽言於行省未報而王公為轉運使乃俾與新守于公九思集議咸謂宜稍損其額以紓民力沮之者率以為有成籍不可改公毅然曰民實寡而强賦多民之錢今死徙已衆顧重改成籍而輕棄民命乎且浙右之郡商旅輻輳未嘗以口計也移其所賦散於商旅之所聚何不可乎於是議嵗减越鹽五千六百餘引俄有㫖改畀王公以湖南憲節後運使復排前議公以去就與之爭丞相脫歡答剌罕公聞之亟遣留公而議遂定被本司檄分治浙東力除私販誣指之害按劾書吏奏差尤無良者黜之所徵贓為錢萬六千餘緡懼而以贓自首者為錢萬三千七百餘緡丁少監公憂服闋擢海道漕運都萬户府經歷越之官糧入海運者十萬石城距海十八里嵗令有司拘民船以修短送舟人為之失業不足則勒陸居之民厚直轉僦以給之程期峻急吏胥得並緣以虐民及至海次主運事者又不即受而有折閲之患公抗言曰運户既有官賦之直何復為是紛紛也衆莫能奪乃責運户自買知送之舟運艘為風所敗者例當核實而除其所陷之糧文移往還連數嵗不絶公取吏牘躬自披閲除其糧二十五萬二千八百餘石鈔二百五十二萬二千五百餘緡布囊一萬九千有竒而運户免於破家遷承務郎楊州路總管府推官以厲宜人憂不赴服闋除江浙行中書省檢校官有詣中書訴松江富民瞿氏包隱田土為糧一百七十餘萬石沙蕩為鈔五百餘萬緡者乞立行大司農司勸農營田水利總管府以糾察追收之中書移行省議擬遣官四員踏視其地而松江獨當十九公至松江七日而歸援古證今條陳曲折以證其妄且言其意不過欲多摏田蕩鈔以竦朝廷之聽而報宿怨請創設牙門為徼名爵之計耳萬一民心動搖患生不測豈為國家培養根本久安長治之䇿哉同列聞公言皆相顧失色公處之泰然它所遣官聞公歸亦皆還行省以公言上於中書事遂寢遷廣州市舶提舉輟俸資造庫屋舶商欣然出私錢為助不踰月而告成先是吏胥恣為姦利凡舶貨擇其善者出而售之不善者積久不售公始為設法均配立號募商人掣籖取物庫藏為之清居數月除江西行中書省左右司員外郎吉之安福州有小吏誣其民欺隱詭寄田租九千餘石者初止八家前後四十年株連至千餘家行省數遣官按問吏巳伏其虛誑而司屬之喜功生事者復勒其民具報實有合徵之糧六百餘石憲司纍援詔條革撥莫能止也公到官首言是州之糧比元經理已增一千一百餘石豈復有所謂欺隱詭寄者乎准憲司所擬可也行省用公言悉蠲之州人相率為生祠以報撫之金溪有陸氏三先生祠堂豪民據其屋而奪其田陸氏子孫三走訴於京師竟不得直公按其籍使悉歸之公所至興除利害多此類其詳見於省臺薦牘及安陽韓先生國子監丞陳君旅諸君所為善政記惠政歌者不可殫舉也公在江西嵗餘年甫六十有六拂衣徑歸遂以中憲大夫淮東道宣慰副使致仕家食者五年扁所居室曰止止齊仍自號鷃游子以見其志云公質貌魁梧心地磊落讀書務明理以致用不苟事言說為名髙弱冠時出游錢塘與浦城楊君載鄜州劉君汶友善論作詩宜取法古人之雄渾而脫去近世萎薾之習間挾其所為文登諸大老之門最為隆山牟先生永康二胡先生趙文敏公鄧文肅公所賞識公處家庭涖官臨民各盡其道平居慎重寡言故言必有中至於委蛇進退之際莫可得而瑕疵人尤以為難能卒於至正八年正月癸亥其將終也神完志定無異平時正冠肅容端坐而逝享年七十有一以其年七月丙申葬於州東長寧鄉之龍塢娶劉氏封某郡君子男三人長仲揚用公廕為揚州路如臯縣主簿次仲廬福建道宣慰使司都元帥府令史次仲淮大寧路儒學正前卒女三人適方泗陳嘉績虞尚忠孫男十一人女七人公葬之明年某以久居詞林老不任事納祿而歸抵家甫一日而有召還之命於是仲揚仲廬相與謀來請文為銘而使者與仲廬至同日敦迫有嚴未遑即如其請載念某納交於公踰四十年知公為深不可以遂巳也乃以退直之暇追記其所可知者論次而顯詩之遺焉銘曰惟士先志惟官先事志不可奪事乃有濟表表王公時之偉器抱負千里出僅一二竭蹶而趨劬躬盡瘁拾級而升不懈于位好是正直周而不比表裏洞達初終一致古今殊時學與政異公起文儒敏於吏治詢其職業匪專撫字士飫其德民酣其惠所去見恩如古循吏沒世不忘仁言之利修涂九軌方駕而稅用雖未竟志則已遂薦斯銘詩賁於封隧有之似之在爾來裔贈太常博士危府君墓志銘府君諱永吉字德祥姓危氏撫之金溪人年五十有七以致和元年夏四月壬戌卒於家秋七月甲申葬白馬鄉范田之原其子素博學而有文間出游京師一日隱然名動公卿間莫不交口薦譽之今天子稽古圖治誕開經筵即以素為檢討未幾上復用言者建白妙選儒臣纂修三史又以素為史官史事既畢中書奏以素為國子助教用資歷及恩例階承事郎遂追贈府君承事郎太常博士至正六年也其年冬素由助教遷應奉翰林文字文林郎同知制誥兼國史院編修官而某以退休之餘蒙恩召入寓直詞林與素命同日下而同官為僚且有平生之雅素以墓道之銘來屬誼不得辭按狀危氏出於姫姓其先自洛徙汝南又徙江南唐泉州録事參軍凝有子曰亘銀青光祿大夫檢校刑部尚書洪州别駕亘之子曰全諷曰仔倡居撫之南城當江淮寇盜充斥之時合鄉人立壁壘以自衛而大破賊兵朝廷因命以官全諷金紫光祿大夫檢挍司徒守撫州刺史兼御史大夫上柱國錢塘縣開國男纍加太傅封南庭王仔倡特進撿挍太師䖍州防禦使守信州刺史汝南郡開國侯仔倡後歸吳越子孫皆仕於其國賜姓元氏宋之盛時起進士至大官者參知政事太子少保章簡公絳為最顯而危氏在南城者皆祖全諷由南城徙金溪則自全諷六世孫怦始怦五世孫光大有子曰鼎臣府君之髙祖也曽大父諱時發宋贈承事郎大父諱炎震景定三年進士調吉州司理參軍治獄明允用舉者改秩以通直郎知臨安府仁和縣事年未六十以不能媚權臣乞休致而去父諱龍友入皇朝為潮州小江等處鹽司母劉氏府君好讀書而深於易工於詩文聞儒先格言輒書於屏間以自厲事親盡孝小江嵗課不登督責甚峻不憚竭力服勞傾私財以紓父之急母病刲股和藥仍籲天願減巳年益母夀徙居雲林三十六峰也陽身服田畝以為養而薄於自奉一布裘至十年不易嵗凶出粟賑其鄰里而為粥以濟路人未始計家有無學問之餘兼善於醫有醫說一卷傳於學者平居氣剛而和警敏善料事親故有過必加規正有患難必力排解之素過庭之際嘗告之曰世有學未充而已為利祿計者既得之又恐失之竟何為哉汝其求師取友痛自修飭期無愧於古人貧賤乃士之常不足念也素出告反面問孰與遊聞其賢也則喜否則必深戒焉晚過九江登廬山有終焉之志無何而屬疾遂不起娶同里鄧氏忠義社統領克志之孫女今封宜人再娶建昌黃氏奉訓大夫瑞州路總管府判官順翁之女子男七人素為適長黃出也今改擢宣文閣授經郎次蒼次白次舟次赤次㑹次㸃女二人適陸鉉傅權孫男二人偃斿女一人府君之葬素自為阡表稱道先德甚具而未及叙其世系之詳至於贈典所加又在其十有五年之後是用備著之不嫌其詞之繁而不殺也素方進用於時所以為親榮者未知其止固當屢書不一書姑為之銘碑刻以俟焉銘曰危出於姫顯於唐伯仲並起尸一方或變其姓後乃昌為宋巨人司文章綿綿大宗多才良仁和身退名愈彰垂芳奕葉逮太常有子承者沒不亡發於皇朝耀休光賁以命書煒煌煌增髙益崇未渠央琢石以俟於其藏將仕佐郎台州路儒學教授致仕程先生墓志銘先生諱端禮字敬叔姓程氏其先遠有世序而譜牒莫詳所可見者漢有海西令曽唐有太子左衛率府胄曹參軍某其自鄱陽徙家於鄞則由胄曹之大父珍始故今為慶元之鄞縣人歷五代至宋仕者恆弗絶曽祖振父承務郎平江府百萬倉司門祖在孫通直郎知平江府常熟縣事父立鄉貢進士入皇朝贈從仕郎郊祀署丞母王氏徐氏並封宜人先生徐氏出也初用舉者為廣德之建平池之建德兩縣儒學教諭歷信之稼軒建康之江東兩書院山長用纍考及格上名中書授鉛山州儒學教授秩滿遂以將仕佐郎台州路儒學教授致仕其在建平興舉廢墜諸生之貧者必周給之縣尹王君起宗日率僚友聽其論說且築室赤巖上命其子楚鼇受業焉楚鼇後出入臺閣卒為時之名人繼王君為其縣者復倡好事之家為買書萬卷覆以傑閣永康胡先生長孺記之其在建德增學舍以居其徒盡復民所占田其始至也有田三百畝比受代而去有田一千畝稼軒前賢遺迹多為人所據悉按其籍奪而歸之江東新畀院額有司奉臺府之命選辟先生以闡教事學者翕然知所宗仰文宗在潛邸遺近侍子弟來學賜以金幣牢醴禮遇甚至於鉛山則新其廟學豪家築室侵入仭墻內地久莫能正先生白於部使者命毁其室乃懼而請以腴田二十畝易之鵝湖書院之旁有道觀先生偶至其處有驢跑觀前隙地驅去復來默卜之曰地下果有物驢當復至已而驢果來跑益力乃訪觀主求發之得石碣十餘刻群賢像因為作群賢堂先是平章政事趙涼公及王御史理嘗舉先生可教國子趙御史承禧舉先生可提舉儒學俱不報先生歸後郡守王侯元恭踵門禮請先生為學者師帥閫及旁郡廣行鄉飲酒禮皆俟先生討論而後定郡故有宋丞相史越王所置義廪以助仕族儒家昏喪之不給自先生為之督視貧者始實受其惠先生素所厚一二達官魁士相繼凋謝先生若有所不樂一日拏舟遊東湖諸生載酒追及之飲於中流酒半酣指所卜葬地曰若豈知我之歸於斯不久也耶學問之道具在聖經賢傳吾嘗述之矣真知實踐則存乎其人尚懋之哉諸生為之黯然各奉觴為壽而歸自是多以病不出久之病加劇客有將上京師者過而言别相與論宋季事娓娓不倦既正冠送客顔色忽變痰氣作醫者以丹劑進先生却之曰不敢服也目已暝而頭微偏門人樂良進曰先生頭容稍偏矣復張目端坐而逝至正五年夏六月甲子也享年七十有五以六年某月某日甲子葬陽堂鄉之陶奧娶潘氏潘為建平望族先生主教事時慕其才以女歸之卒因葬於建平至是奉遷而合附焉子男一人衍女四人孫男一人循理女三人蓋宋季之士率務以記誦辭章為資身取寵之具而言道學者亦莫盛於此時四明之學祖陸氏而宗楊袁其言朱子之學者自黃氏震史氏蒙卿始朱子之傳則晏氏淵大陽先生某小陽先生某以至於史氏而先生承之黃氏主於躬行而史氏務明體以達用先生素有志於當世惜其仕不大顯故平生藴蓄未克究於設施而私淑諸人者不為無功於名教也故禮部郎中韓公居仁嘗學於小陽先生其仕於先生之鄉與先生論議無不合行省屢聘先生較文鄉闈先生以為國朝設科初意專取朱子貢舉私議今多違之吾往宜不合力辭不往其源流本末可槩見也先生色莊而氣夷善誘學者使之日改月化而仲氏太史公端學克謹師法學者尤嚴憚之人以此河南程氏兩夫子云先生所著有進學規程若干卷國子監以頒於郡縣學使以為學法有畏齊文集若干卷藏於家先生葬後二年門人徐仁等若干人相與謀俾樂良奉宣文閣授經郎危素之狀來謁銘某幸嘗辱交於先生徵於狀無不合乃併以平昔所知者論次而銘之銘曰大道孔夷聖賢同趨政龎俗裂師異指殊真儒有作乃發其蔀先生之傳遠有端緒左規右矩蹈夫大中居之以寬休休有容道之將行夫豈弗仕委蛇進退時行時止志局於位厥施未豐惟其教施垂於無窮門人謁辭論撰遺德畀於方來永有矜式金溪曽君墓志銘撫之金溪有篤行之士曰曽君諱嚴卿字務光以致和元年六月辛丑卒年五十有三門人相與私諡曰恭貞先生至元某年十月某甲子葬所居陶原里明山之麓其子堅辱交於某謂先世在異時嘗有同年好以銘來屬其不得辭按曽氏世譜曽子後十四世當王莾時避地豫章之廬陵凡六世始徙臨川今撫州也又十二世至康刺史司空洪立乃徙南豐洪立生散騎常侍延鐸延鐸生仁昭仁旺宋中書舍人鞏尚書左僕射布翰林學士肇皆仁旺之後仁昭生贊堯贊堯生易祥易祥生千復居撫之金溪千生學學生應臣應臣生仕欽仕欽生濬濬生綱綱生彥明則君之髙祖也曽祖諱徵隱居弗仕祖諱子良擢咸淳龍飛進士第終於淳安令父諱正言國子進士並以文學行義師表其鄉母黃氏澧州司理參軍庭蘭之女生君於淳安故名嚴而字光君質厚氣完不妄言笑雖晏休必正襟危坐事親至孝父有疾呼天乞以身代父命疾旋愈自祖父以來皆推先世故業與其兄弟君亦以所居室讓其叔有四妹悉營嫁之逮其有子皆教育使至成人平居不汲汲於生事視勢利漠如也讀書日有常程務求知聖賢微言大㫖而不徒事記覽為文主於理未始與人較其短長而一時負才氣者皆自以為不及同里以士名者無不受業焉君接之色溫而莊恆以經術教授誦說若不能出諸口及有所問難分章别句類數辨名無不究盡隨才誘掖以成其美而不病以其所不能與人交無圭角崖岸不矯矯為異亦不翕翕為同人自不得而親疏之鄰里有見侵侮者未嘗形於言色咸服其長者家人化之雖僮僕不聞有穢惡之聲史稱黃叔度言論風㫖無所傳聞而見之者靡不服深逺去疵吝君庶幾近之然君遺文有南明齊藁三十卷傳於學者言論風㫖之在人固多矣娶何氏後十六年卒合葬焉子男二人長堅鄉貢進士博學有文能世其家次大年早卒女二人適南城歐復同邑黃里孫男五人侁偕儕仰佺曽孫男一人立銘曰嗚呼先生學足以褆身待足以範俗無欲而心自正不言而民自服前人之光是迓是續世其德而不世其祿天運有常其周必復惟爾嗣人有轟其伏葉審言墓志銘至元元貞間部使者振學舉校悉延至前代遺老以主教事一時英俊之士咸立下風惟審言夙負材望以弱冠之年與之並登於師席衆皆羡慕焉審言顧獨恬於進取筮仕垂四十年猶俯首常調隨牒遠方後來居上者不知其幾及審言以六品官致其事而竟不得從容享一日之安嗚呼悲夫審言姓葉氏諱謹翁審言字也世為婺之金華人曽大父大冶縣主簿邽受業呂成公之門以所得於成公者授徐文清公僑文清後為朱文公門人髙第而於大冶君執弟子禮沒身不衰大父榮發深自韜晦罕與物接父霖始復以家學私淑其里人故端明殿學士王公野知南康軍葉公閶咸敬禮焉仕皇朝卒官將仕佐郎婺州路蘭溪州儒學教授致仕母曹氏有賢行審言性明達而蚤有知於書無不讀由家傳之端緒沂儒先之原委卓然自立諸老無不樂與之游舉教官歷浦江義烏兩縣教諭升衢之明正書院山長丁外艱服除上名銓部借授處之縉雲縣官政鄉巡檢丁內艱服除遷吉安之吉水州學教授秩滿調泉之晉江縣主簿階將仕郎同僚有與之不合者力搆陷之部使者雖莫能察而心竊疑焉不及竟其事而去後使者得審言受誣狀而不欲自為異同乃貰其罪而解其職頃之仍舊階改調婺州路司獄在官五年以老請謝事授承務郎溫州路同知瑞安州事致仕命下審言已以疾不起審言事親孝父子自為師友念母老不可一日去左右所至必侍奉以行仲弟無依贍之終身平居寡欲治家有法吉凶慶弔一遵成公家範曰吾有所受之也資産素簿而室廬再厄於災至無一椽以庇風雨僑寓說齊精舍久之乃得老屋數楹僻在東郭外教子之暇日以種蒔為事暮年徙居城西北隅間得微祿不足自給處之晏如時從朋舊飲酒賦詩陶然自適易簀之日有書數卷田數畝而已審言所居齊室扁曰四勿自號贅翁歸自泉南又自號曲全道人所為詩文和易平實無纎麗之態有四勿齊藁若干卷曲全集若干卷藏於家審言生於宋咸淳八年四月十六日卒於今至正六年十月十日年七十有五娶蘇氏文定公某世孫女後三年卒以某年某月某日合葬於金華縣赤松鄉羅家橋之原子男三人長敬之處州路慶元縣榮慶鄉巡檢前卒次復之未仕次泰之廕補江浙行中書省廣濟庫子女七人其五適同郡嚴𢎞道趙嗣滋杜宏喻德順潘繼善其二以疾在室孫男一人囝女二人其一適浦江張禋其一尚幼審言所交皆四方名士里居之日最所友善者許文懿公謙翰林待制栁公貫太常博士胡君助禮部郎中吳君師道翰林修撰張君樞而溍而幸獲陪諸公之末至是諸公多已凋謝惟胡君與某獨存故泰之求胡君為之狀而屬某以銘嗚呼悲夫載念某之少也從先生長者詠歌先王之道於寬閒寂寞之鄉將以是終其身審言力挽之出而遊宦不遂晚通朝籍以親老請外遂納祿而歸審言適已掛冠往見之雙溪上握手道舊故殊款洽别去甫一月而審言逝矣又一月而某蒙恩錫召欲伸繐帷之一慟而不可得銘固不敢以諉於他人也嗚呼悲夫審言分教兩縣所至以教養為務興壞起廢之功尤多其在明正書院復道流冒占之田二百餘畝吉水號多士教官良不易為審言處之有道由是士論厭服審言為巡官則能使盜息而民安為獄官則能使囚徒不失其所誠可謂得其職而審言之所以不朽者不專在是也茲不詳述焉銘曰有作而興載揚其英胡不奮飛徐徐吾行黽勉從事靡愛其力執虛若盈戰兢夕惕不疑於人蹈夫危機困而能亨罔間險夷皇仁在上天日臨照朱紱之來于光有耀鼓缶而歌式全吾歸孰昭其昧曰有刻辭上海縣主簿吳君墓志銘君諱福孫字子善姓吳氏其先有為宋執政者曰正肅公育自建之浦城徙汴之新鄭南渡初有自汴之新鄭徙武義者曰克立逮君闕世矣父東又自婺徙家於杭故今為杭州人母施氏君生而俊爽稍長强學好修元貞元年君猶未冠用浙西憲使東平徐公察舉補嘉興路儒學録遷寧國路儒學正江東憲司治寧國涿郡廬公按臨之暇略其勢分而與之遊數以詩篇相倡答君既書再考例當序進絶口不自言前代名流及時之雅望若戴先生率初仇先生仁近胡先生汲仲鄧先生善之咸加愛重莫不折行輩與之均禮魏國趙文敏公待之尤親密文敏以善書名天下慕而效之者往往逼真然罕有若君能得其早年楷法之妙者君兼工於篆籀文敏極稱許之皇慶二年詔起文敏入侍講於集賢挽君俱行中朝賢士大夫禮遇甚至君泊然未嘗有所造請至治二年乃以教官借授潮州路潮陽縣青洋山巡檢遐荒之地縣長二久闕君攝縣事獲强盜之逋誅者八人脫平民被誣於盜者若干人而獲其真盜者若干人廣東憲府有疑獄多以諉焉未幾移疾而歸至順二年赴選集於京師某月某日天子坐奎章閣阿榮大學士以其所作小楷書數萬字上進因得召見庫庫學士方侍書於閣中前奏曰臣濫得能書名如吳福孫所書雖臣亦有所不及上頷之命侍臣引金鍾酌酒以賜將用為閣職有沮之者而止今上皇帝至元元年調常州路儒學教授君氣岸素髙又在師儒之位不肯為諂曲以事上官竟坐是去改調嘉興路澉浦務稅課大使君承命欣然就職殊不以為歉也晚益務恬退足迹不涉達官貴人之門日與方外大老𤣥覽王真人及名公之歸休弗仕者湖南帥于公有卿道州守徐公叔清翰林次對劉公時中徜徉湖山間不復以仕祿為意至正六年銓曹考其資歷當升授將仕佐郎松江府上海縣主簿到官之始嵗適大旱有禱立應遂為豐年理民田為豪强所據久而不歸者諭止婚姻之訟積數嵗不決者它利害有當興除方次第舉行俄奉省檄詣溫台兩郡臨給鹽埸工本七年秋執事於鄉闈甫畢復俾馳傳督閩中稅賦以疾還上海八年正月十三日卒於所居之廨舍享年六十有九以某年某月某日還葬錢塘縣欽賢鄉西溪花塢先墓之西娶唐氏宋朝請大夫天麟之孫女前五年卒合葬焉子男一人肅女一人適宜興嶽榜早卒孫男繼善君明敏出於天性豪邁不羈談辨絶人娓娓不倦好客之名聞於四方自儒釋老氏至於岐黃汜勝之書無不讀嗜古彛器法書名畫其書篆施於金石為尤宜奉贄幣求之者無虛日禮部尚書台哈布哈嘗為扁其所居曰清容軒因自號清容野叟所著有清容軒手鈔若干卷樂善齊集若干卷古文韻選若干卷古印史一卷藏於家君入仕時年甫十有六至四十有三始被初命及出佐一縣已六十有七矣間一嵗遂不起士患不遇君可謂有所遇否乎後來者居上而君僅止於斯天乎人乎肅以狀來謁銘謹托其所述附以平昔所知者序而銘之銘曰先發而後至進難而退易不汲汲於富貴類依隱以玩世欎欎而不衰者浩然之氣俯無怍兮仰無愧不贏於躬兮來者之畀武略將軍海道漕運副萬户曹公墓志銘曹氏之先出於宋名將冀國武惠王林南渡時由汴徙吳今居平江常熟州之祿莊里者號福山曹氏最為望宗聚族二百餘人仕國朝多顯者而公之曽大父昌大父通俱晦迹弗耀父文富始以公故贈武德將軍平江等處海運千户驍騎尉追封長洲縣子母王氏追封長洲縣君公諱某天姿剛直動必由禮事親善色養以孝謹稱服用尚儉素戒子孫以為法治家井井有條積而能散私帑不蓄羡財聞人有善喜形於色不啻出於巳里中俊秀貧不能就學者必周給之不喜暴人之惡有小過必委曲化導使知自悔鄉人有不能制其儇子者公呼之來前喻以人心天理其子感悟卒為善人公每謂人生於世但當設心坦夷仰不愧俯不怍足矣奚必泥古人之陳迹事事求合乎識者以為名言年踰弱冠猶未有宦達之意㑹朝廷創開海道以通漕運首以材選而服其事大德四年制授金符敦武校尉海道運糧千户秩滿授元降金符遷嘉定等處海運副千户公律巳以亷處事有法所部之人咸畏而愛之嘗開洋而遇風濤大作舟人震駭公神色自若徐喻之曰委質為臣當忘身而徇國進思盡忠天必佑之衆莫不服其量大府或以事咨詢於衆多俟公言而後定至大三年超授金符武略將軍海道漕運都萬户府副萬户公數以漕事往來南北而深察其利害視事伊始凡所興除公私咸以為便四年夏部海艘八百所漕米以石計者百七十四萬八千六百四十有九晝旗宵析號令肅然舳艫相銜首尾不絶旬日之間已達海口舊傳海道有神司之人恃以無恐公蠲潔致禱感應如響有相之道焉玉音奬諭宴勞錫豫視常嵗有加人以為榮而公雅志恬退既受代即屏居丘園優遊自適幾若與世相忘同列有惜其去者言於當路乞挽留之至治二年有㫖起公為平江等處海運香糯所千户三年夏督運至京師賞賚尤渥廷議復用公為萬户未命而公遽以疾卒泰定元年四月某日也享年六十以其年某月某曰葬於福山塘之西丘公埀屬纊命割上腴之田一百九十有八畝築精舍擇方外之人主之俾以嵗入供晨香夕燈汛掃百須之費顧語諸子曰吾不以身後事纍汝也夫人蘇氏封長洲縣君以禮自持克配君子嘗發私笈造輿梁以濟行者成公之志也子男八人長文華將仕佐郎平江路崑山州稅課大使贈奉訓大夫徽州路婺源州知州飛騎尉追封吳縣男次思聰將仕佐郎兩浙都轉運鹽使司永嘉場鹽司丞次思溫徵事郎溫州路稅課提領次思恭不仕次思賢將仕佐郎平江路長洲縣尉次思忠次文英次思問皆未仕女四人孫男二十人文華長子圭襲公職佩金符為忠翊校尉平江等處海運香糯所副千户次額森由伊囉勒昆筆且齊纍遷從仕郎宣政院崇教所知事餘皆未仕曽孫男十三人初武德府君早世王夫人躬靡他之誓教育其三子訖有成立長即公次王良承務郎冀寧等處稻田同提舉無子公命以思賢為之後次濟滿從仕郎常州路宜興州判官贈集賢修撰承直郎公沒二十有六年而圭來亰師以銘為請蓋公先三世皆厚施而不食其報故公遭逢聖代克承天寵久欎必發乃理之常雖所用未究而諸子嗣有名位適孫遂世其官餘慶所及未見其止推本積纍之自而昭示於後人所以使之引而勿替也銘其可無作乎銘曰海於兩間為物最巨孰能以力與為勝負有偉曹公孔敏具武出長萬大訓齊行伍風檣浪楫若鵬斯舉精忱所格百靈呵扈天吳􅤾象莫敢豫侮千艘並集灌輸天府克有成績徹聞當寧傳宣宴勞秩秩樽俎筐篚之將便蕃錫豫公不自矜翩其逺翥鋒車召還不留不處為官擇人諉以印組上方用公還領故部公忽已仙返於帝所有子成考咸躋官簿惟時聞孫大纂遺緒從事賢勞無忝爾祖如漢世官氏以倉庾福山之西匪堂伊斧史官勒名垂輝千古華亭黃君墓志銘始豫校文鄉闈華亭黃璋首以薦書比上試有司不合而歸益肆其力於學無少懈及豫起自退休入直詞林被㫖預聞試事璋以再薦而來竟不偶豫能得之於二十年之先而不能不失之於二十年之後方用自愧而璋殊不以欣戚纍其意蹐豫門再拜而言曰吾家上世未有以官業知名於時者璋州嵗就學吾大父暨吾父延名師開導而飭厲之甚至庶幾躋攀分寸為閭里之榮而吾大父已不及待大父沒且葬十年而吾父未有以表於丘隧蓋有望於璋而璋又鄙劣不克自振無以復於吾父及今弗圗懼久遂廢缺辱賜之一言俾吾大父沒而不亡吾父亦有以自慰璋雖為明時棄物無憾也豫竊矜其志而嘉其言之有禮乃序而銘之序曰君姓黃氏諱允恭字敬翁松江之華亭縣人自曽祖昌祖原長父文榮逮君皆弗仕君為人謹厚而嚴恪服食不事侈美江南新附之初愚民未洽於教化多相率為盜君年二十餘痛其家焚掠無遺夙夜苦心勞形期復先業絲蓄粒聚家以苟完久益充裕或有急而求假貸必如其請貧不能償則折其劵與人交篤於信義或以非理相加忍弗與挍也性至孝母吳氏年垂百君之年亦踰七十溫凊定省未嘗輒廢遭喪致毁不嫌其過乎哀嵗時子孫捧觴為夀必諭以勤儉保家為務元統元年有詔旌髙年耆德之士府以名上于行中書省命縣長吏詣其家表署如式御史安公為大書其里門曰旌德云君結廬先隴之側優游息偃既壽而康出入動作無異少壯時偶感微疾而遽弗起屬纊神識不亂大斂面如生其善自持養可知也君生於宋寶祐元年十一月十八日卒於今至元五年二月十八日享年八十有七以其年三月某日葬於胥滿鄉泖環里父墓西若干步娶許氏子男一人曰鉞璋之父也女一人適許庭芝孫男三人琛本君庶子命為鉞之子圭無錫州新安巡檢璋以天歷二年至正四年兩取鄉薦今用特恩當補官未調女一人曽孫男三人女七人元孫男二人女一人豫聞之歐陽子曰為善無不報而遲速有時君積纍之素傳於再世以其時考之不為不久矣為善之報果何如哉姑為之銘使刻以俟銘曰繄君之先未有顯聞積善自躬傳子及孫既菑既播而又肯穫不以無年輟而弗作其穜其稑物之不齊日至而熟食之有時惟銘可徵刻此貞石告於後人用勸無懌南稜先生墓志銘先生姓王氏諱炎澤字威仲學者因其别號尊之曰南稜先生其先系出太原五季時自㑹稽徙婺之義烏者彥超官至節度使其諸孫固早遊安定胡公之門登皇祐五年進士第宋三百年縣人取科第自固始卒官恩陽令石正言知制誥李公清臣銘其墓固諸孫從用生說贈宣奉大夫工部尚書郭公三益表其墓說生永年喬年永年登紹聖元年進士第嘗仕於京師而喬居於濟南後復歸義烏而占籍焉終於中大夫知福州文安縣開國男贈正議大夫子鑄通判嘉興府贈金紫光祿大夫儔從政郎嚴州司法參軍娶陳忠肅公子直祕閣正彚之女其沒也正彚志其墓鑄子寧提舉廣東常平茶鹽贈中散大夫寅歷知宜連藤栁峽饒江七州積階朝請大夫喬年子濤承奉郎濤子寓江東轉運司幹辦公事其世序官閥見於譜牒如此餘以賞延入官十有五人其通朝籍部郡符者不可悉舉運幹則先生之髙祖也曽祖諱誠祖諱衛道並潛晦弗耀考諱濟以景定二年應薦為國子免解進士妣葉氏軍器監丞䕫路轉運判官蓁之孫女通齊隱君由庚之女先生少嗜書稍長治舉子業穎出儕輩間運去物改而場屋事廢因得專意探索聖賢之微㫖家庭所受既得其素而通齊為外大父又從徐文清公傳考亭朱子之學風聲氣習之所存感發尤多而操行愈堅窮居約處開門授徒絶口不言仕進久之乃用部使者察舉起為東陽常山兩縣教諭遷石峽書院山長所至以善教養得士譽在石峽嵗餘即棄官而歸徜徉於家林逾十寒暑至順三年八月十三日以永疾卒享年八十其年十月十日葬縣南崇德鄉湖陽山先墓之次先生氣貌充偉而襟度疏暢待人一本於誠言論磊落無所隱蔽莫不敬服焉為諸生講說務推明其大義不事支離穿鑿文簡質而主於理詩極渾厚而間出竒語不屑以雕刻求工也有南稜類藁二十卷初考君無子嘗鞠其族子而弗克家復選族人得先生以為子俾盡有其田廬先生辭曰凡為人繼嗣貴能紹其先業耳田廬固非所計而田廬之不均先業未有不因以隳者也考君賢其言卒成其志而均給焉族黨以是多之娶傅氏前三十年卒先生之葬實同兆域子男二人長良玉常山縣儒學教諭次良珉女三人適傅保許文俊傅復亨孫男四人裕褘補初曽孫男三人良玉葬先生殆將兩紀乃來諗於溍曰先人家居教授前後及門數十百人而無顯者不朽之託非子其誰顧以子方效官於中外未遑有請子既得謝而退失今弗圖懼流風遺範日就堙沒謹命次男褘疏其行實以俟采托而論撰焉溍竊惟吾里衣冠望宗莫有先於王氏文獻之相仍亦莫久於王氏先生引而弗替畀付有人見其進未見其止豈必亮都髙位而後為能世其家也哉溍自總角忝預弟子列今也髮種種矣嗟逝者之如斯愧前聞之荒落言不能文而義不敢辭銘曰婺女之墟孝子之里以儒起家肇自王氏世科世祿恆不乏人重圭疊組萃於一門是似是續蟬聫十葉復抱遺經修其世業先生承之弗墜益振如木有夲如水有源教施於鄉佩襟濟濟道之將行乃止不仕尚克有子而又有孫餘潤所蒙有林彬彬趾美於前垂休於後嗚呼先生是謂不朽贈承事郎同知奉化州事葉府君墓志銘君諱應咸字心可姓葉氏處州麗水縣人葉於處為著族君十世祖襄自松陽徙麗水遂占籍焉髙祖冠宋季再領鄉薦善言性理而尤深於易有起進士至敷文閣待制者曰宋其伯兄也曽祖一鳴舉進士未第而卒祖正大登仕郎父天與仕皇朝為美化書院山長秩滿當教授一州輒棄不就母青田潘氏宋祕書丞復之曽孫女君少有經濟志嘗慨然曰窮經將以致用也非精無以造微非篤無以道遠乃發先世遺書朝誦暮習凡聖賢授受之奧古今治忽之幾至於儀章度數圖書歷象靡不研究山長公知其將適於用試使綜理家務外內修飭日有餘暇山長公正衣冠坐堂上子孫環列左右俾君援引經傳典故參以當今事宜而訓戒之雖隆寒盛暑不廢前史官鄭陶孫以子壻銘登仕公之墓稱君通朗秀潤詳雅善幹蠱人以為無愧辭科舉初行有司以君充賦試不合以親老不復入場屋專意色養甘㫖之奉必夫婦躬親之或燕飲它所遇時新之物未薦於祖未進於親者則不敢嘗子守以為法天歷戊辰山長公卒既祥􅎭益不出築室菜山之西扁曰肖堂蓋山長公自號則堂君示不忘也母氏生君而卒君始生之旦則母之諱辰每至其日必變服號慟如初喪子孫無敢言稱夀者始君既失所恃登仕公之侍人方氏鞠育之及長事之如母奉繼母王氏曲盡孝敬撫弟有恩教子有法第三子琛為通政院宣使至順辛未以公事自上京至江浙行省便道省侍君曰父子天性也五年一見面豈不願為旬日之留然簡書有程小子初仕不可不戒抵家之日即命遄謁先墓信宿遂行且告之曰能愈加亷謹以自持則可再見我如今日矣琛去又五年未及再見而君以至元乙亥四月庚申卒於家得年五十有二臨終以山長公墓石未刻屬諸子緒成之語不及他其又明年丁丑十二月壬辰葬於某鄉岑原之清風臺去家五里而近娶同邑湯氏都縣尹垓之女有婦德生與君同嵗後君六年卒合葬焉子男四人長珂蚤卒次玘後君五年卒次即琛歙縣丞辟行中書省掾史考滿而遭君之喪服除乃得調今為承事郎處州路青田縣尹次瑾未仕女二人壻曰湯奎何達孫男六人女三人曽孫男三人君所為詩文有棲間集一卷其言務去健羡而甘淡泊不事華藻以諧世好也琛官正七品法當封贈父母如其秩至正九年春得請贈君為承事郎慶元路同知奉化州事君配湯氏為宜人其明年琛用治最受知憲府諉以核田於吾婺之屬邑㑹豫歸自京師乃奉君妹壻松江府儒學教授練晦孫之狀來謁銘狀稱君材可用世特以㔓於孝養不仕故所施僅及其家傳曰是亦為政奚其為為政君蓋有得其㫖矣惟夫知君之深是以言必以實而不苟過為夸大可謂善叙事者也豫何能贊一辭庸備著其語而作銘以系之銘曰士之為善兮不與名期歷久必發兮名斯我隨君則有材兮又有其時曷賈弗售兮卒以不施安常處順兮乘化而歸儲祉多實兮嗣人之貽寵靈所加兮長世光輝樹此碑板兮昭以刻辭戚君墓志銘豫為仲咸銘其父墓後若干年而仲咸亦卒其子莞復奉眷友朱濓之狀以銘為請豫衰年多感不忍銘人父子而莞固請不已敢不諾君姓戚氏諱崇僧仲咸其字也上世占籍婺之金華為宋官族髙祖諱如琥朝奉郎知袁州軍州事曽祖諱宋祥從政郎廣德軍司户參軍祖諱紹入國朝隱居不仕私諡貞孝先生父諱象祖信州路道一書院山長母朱氏前鄉貢進士環之女君兄弟二人兄某以材見推擇從事於憲府用例補官君獨不以榮進為念端居苦學間弄翰於詩文皆積麗綿密可喜年二十有七始盡棄其學而從鄉先生許公講道於東陽之八華山用意堅確蚤夜弗懈博通經史旁及諸子百家尤潛心於儒先性理之說探幽發微必極其根柢而後已同門推為髙弟初袁州府君與從兄如圭如玉並受業東萊呂氏之門而許公之所承傳本於考亭朱子君以得於許公者歸而稽諸家庭之所聞無不吻合自信愈篤克己厲行為人所難能衣粗食淡待親朋一以清約不曲徇時尚而改其度每謂人知富貴之可欲而不知貧賤之可樂也先廬適毁於菑君備殫勞勩以復其舊山長府君漫仕而非其志厭居闤闠間偶訪壻呂公汲於永康太平山中僑寓久之因君往省遂卜居焉君性恬靜默坐一室環以書數百卷非有故不妄出呂公既遣諸孫來學於君復創義孰聚族人之子弟使就學諉君主其教事君克謹師法持規嚴學者敬憚之扁其室曰朝陽以表鄉土之懷人稱之朝陽先生云君有春秋學講一卷蓋其少作晚嵗所著有春秋纂例原指三卷四書儀對二卷後復古編一卷昭穆圖一卷歷代指掌圖二卷以六書之學世儒率置而不講所傳經籍之文多致訛舛乃考許氏說文參以近代諸名公之所訂定用古篆繕寫易書詩儀禮春秋孝經論語大學中庸孟子將獻於有司而乞頒行於四方以儀禮一經未既弗及上又嘗為書言時政欲詣闕陳之亦弗果行人見君髙蹈物表目以為畸人靜者而不知其未始忘情斯世第不屑苟售耳至正十三年十一月十三日君以疾卒於太平其年十二月十一日葬於義烏雙林鄉下頓後祝之原娶朱氏從事郎揚州路崇明州判官復淳之女母氏之姪也有婦德諸子惟英非已出撫而教之均一無間前三十年卒君之葬與之同兆域子男五人長即英次蒙次莊次莞次多早卒女一人適金華頁逄慶亦已卒孫男一人欣遷尚幼莞懼君之遺志逸行無以表襮於世故求託於銘以傳豫竊以為古之歿而不亡者在乎承之得其人不係乎銘之有無也君多男子能讀父書他日必有出而顯其親者姑為之銘俾刻石以識焉銘曰戚之家學宗吕氏百年遺響君克嗣私淑諸人祖朱子遡其承傳歸一揆君先群從皆進士季由師氏為刺史流芳五葉未渠巳孰無望君復其始時之可行君則止世其學弗世其仕杜門著書逾紀兩書成未出君不起俾以銘章示源委後人母忘趾其美樓文翁墓志銘君諱如浚字文翁姓樓氏樓之得姓出於東樓公子孫散處四方皆為官族在婺之竹山里者吳有侍中𤣥散騎常侍畯宣威將軍陟齊有給事中幼瑜梁有侍郎偃名見史傳圖志竹山後更號智者里更及近代亦有掇儒科通朝籍者君之曽大父諱幹大父諱紹祖父諱某雖世其官業所居猶故里也母陳氏君本黃山童氏子出嗣樓氏江南新附之初人心未寧愚氓因而搆亂本生父死焉君方髫齡能以智自全鄰人適見而負之以歸衆皆駭歎以逺大期之甫踰弱冠復罹家難母子相依以續前人之遺緒君識見多出人意表族人或忌之君伯父謂曰是兒骨相不凡它日將亢吾宗宜善遇之君自少讀書不習為記誦詞章以希世取名而能知其大意故其事親孝奉先有禮且善治生有餘力則推而及於族姻鄉鄰作義孰以教其子弟窮乏則周之舅氏嘗託其孤於君始終經紀其家事纎悉備至大德丁未嵗大饑道殣相望賴君以活者甚衆間出粟貸之踰年而來歸所貸皆不取息貧不能償亦不問公上之徵斂必先期而集尤謹於將迎縣大夫有所詢則别白是非以告而無隱有隂受其賜而不知者人有患難赴之恐後而無德色居常以氣槩自髙而性本自寬厚有雅量人莫不樂與之交四方賔客之來留連欵洽無虛日母年九十而終治喪寧過乎厚㑹葬遠近畢至姦胥大俠閭里惡子譁訐成風人多以小不忍務力勝之君悉不與較順受之而已久而各自悔服無敢復相侵侮故同邑資相埓者惟君家久而獨完君素有幹局精力過人兼通當世之務而安於素分無慕乎其外人勸以仕皆不聼至正壬辰朝用兵誅反者出粟二千餘石遺其子輸于官以佐軍餉有司剡上其子名轉達於中書乞授以官君聞之殊無喜色蓋非其始望也中嵗頗好老氏清淨虛無之說更創道院延羽流與居與遊君一生少疾疢年既耄而耳益聰目益明飲啖步履不異少壯時蒼髯如㦸氣貌充然其所養可知矣將終命悉焚積逋之券細書纍紙區畫後事雖細不遺氣息奄奄猶據榻危坐左右懼其疲􅉵扶之就枕乃瞑君生於宋咸淳庚午正月二十七日卒於今至正甲午五月十二日享年八十有五娶王氏先二十三年卒次葉氏子男六人長國華保義副尉湖州路德清縣主簿次士祥次璋管領拔都民户總管府王龍千户管民司長官皆王氏出次士庸衢州路開化縣儒學教諭次士毅次為許氏姊後更名煥女二人孫十五人鉉鐵鋼欽鈞鉛鋭鉞鑌鉦鎮銓鏻鐘鍔女七人曽孫男一人淮女一人國華等卜以君卒之年十月十八日奉柩葬於所居西五里東塘山與先室王氏合前期以傅生藻之狀問銘於豫今年春傅生來自君所徼豫同遊金華之法華山升髙望遠裴徊久之明日還過君家止豫宿張鐙灑酒促席道舊故追計之不至君家已二十有六年又明日君欲復與游嵩頭陀智者國師道場上清五雲龍夀諸山豫以興盡留詩為别而歸孰知遂成永訣乎豫少君七嵗而蚤衰行將與草木俱腐何足以任不朽之託乎雖然詎可然忘言乎輒因狀撮其大要為銘以畀之聊以抒豫哀云爾銘曰嗚呼文翁素分之安雅量之寬處世能順保家能完養生能夀教子能官人一能之斯以為難翁之於是殆幾乎全其可以無傳耶許君墓志銘君諱熊字吉甫姓許氏婺之東陽人晉孝子孜之裔為近代衣冠巨族居邑之南者曰南許居邑之西者曰西許而君之先居昭仁里之梅峴則由西許而支分也宋宣和中睦冦猖獗八世祖瓊集丁壯捍州城有功補秉義郎以城中食盡援絶力戰而死鄉人為立廟而祭之曽大父諱榮之大父諱元凱父諱文奎值宋社之阽危群盜充斥挈家僑寓州治西南之桐齊坊而君生焉其復歸也君生六年矣即使就學朝益暮習孳孳不懈父性方嚴君左右敬承克盡子職特鍾愛焉長兄熹為伯父後雖異居而有無相通不以彼此為間仲兄勳與君同資業凡理家務應官府之需皆君獨任其勞而遺之以逸仲兄倜儻好客終日趍待無厭倦之容仲兄歿止一子甫十嵗教育之至於成人而授之室君於族黨以嵗時㑹拜正尊卑之分以祭祀飲福序親愛之情貧窶則加周恤推而及於鄉鄰凶嵗賴以獲全者甚衆遇急難必扶持拯救之事之以闕者輒欣然為之倡每誦昔人寧人負我無我負人之語故與物無忤樂道人之善而不欲指摘其過人以是稱之君鬚眉秀爽氣貌端重平生安於素分而無慕乎外自號樵隱以見其志焉君生於至元戊子二月十一日卒於至正辛卯六月十一日享年六十有四以其年十二月十五日葬家南五里之西許山遵治命也娶義烏徐氏寶謨閣待制文清公之曽孫通判闕州鏄之孫江東總領所幹官通之女子男五人欣恂悌恆歡孫男七人震享蒙享大有巽亨大同益享鼎享女六人長適同邑陳應昌餘在室君孝友出於天性父無恙時愛西山之勝有終焉之意欲購其地不可得及既歿而葬於柏墩其人始以地來售乃營兆域改葬而治冡舍於其旁以酬先志按儒先遺法創祠堂於所居之左而饋薦以禮八世祖廟久壞弗葺發巳槖撤而新之仍畀以祭田若干畝俾族人之無所歸者掌其祠事月有廩給焉又以外氏徐文清公之夲支雕落將為之立後建祠有志而弗遂也君葬後三年欣等以婺州路儒學正王君龍友之狀來謁銘王許故有連君之父與王君之伯氏御史公同師事鄉貢進士石先生而王君又與君二兄繼登先生之門故知君為最詳狀所述其目有八文繁不可具載謹撮其大要以為序而銘之銘曰嗚呼許君學足以持其身行足以律其家接物常存於寬厚處世不奪於紛華豈非所謂一鄉之善士者耶退藏山人趙君墓志銘君諱若磬字仲和姓趙氏其先於宋有屬籍君所祖曰德雍天平軍節度觀察留後咸寧郡公贈宣德軍節度使同中書門下平章事兼侍中追封廣陵郡王諡康簡實魏悼王第四子廣陵生承亮感德軍節度使秦國公贈樂平郡王諡恭靖樂平生克愈封魏國公諡文思文思生叔茝內殿承承制制生堅之南渡初自開封徙衢州終於闕大夫纍贈正奉大夫正奉之子承事郎平江府常熟縣丞公傳則君之髙祖也娶婺州蘭溪徐氏又自衢徙蘭溪之甘棠鄉新豐里曽祖諱彥鉷迪功郎福州長溪縣丞祖諱旴夫從政郎處州遂昌縣令父諱時堯本成忠郎夫所生於常熟為曽孫故遂昌育以為子母徐氏主管尚書禮兵部架閣文字介之孫女君幼開敏授以書輒能通大義年十有二而宗國顛覆又二年而失所怙時新附未久君朝夕奔走以聽科繇恆惴惴焉恐不克保其家姻黨莫為之援反侵虐之母子相顧憂蹙弗堪君不得已俯首刀筆間蘄以禦外侮遂僑居於郡城既而見推擇為主獄吏數辨繫者之寃所活數十人部使者以為能升本郡列曹掾用例遷衢州府公之賢者咸加禮遇而權貪以不附已深銜之君強直自信無所回撓竟不見容而免君太息曰始吾以門戶多艱姑寓迹於是家幸稍寧不貽親憂可以止矣乃歸理舊業因以退藏自號君家居孝於母友於諸弟尤篤於教子待姻黨有恩未嘗以疇昔之故為芥蒂人有善必亟稱之至赴人之急難雖莫夜風雨無所憚母年七十四而終遷父柩合葬東陽縣懷德鄉之勝湖山且以其自號者扁諸墓廬云君疾既革命內外靜默無譁惟戒其子嗣鴻以謹祭享保丘墓言終而卒重紀至元之二年九月三日也享年七十有二娶陳氏何氏李氏何氏太府寺主簿自之女前君三十年卒陳氏有子嗣淇與俱後君五月卒子男三人長即嗣淇次嗣鴻嗣滋皆何氏所出也女二人適金華楊森翁義烏陳善新孫男八人古忠古憲古愚古怡古性古懌古恆古悅女六人其四巳行二尚幼君沒後十年是為至正某年嗣鴻乃克治地於金華縣婺女鄉夫容山之原卜以其年某月某日奉柩以葬爰狀君行蹐豫門再拜而言曰始先人遣嗣鴻受業於鄉先生許君語嗣鴻曰吾衰朽無成汝兄既早失學汝弟又以疾廢三百年詩禮之傳天其或者不汝絶乎汝其勉之嗣鴻無能奉承教命大懼世叙之可徵者子孫日逺日忘而先人之承其先開其後者無以昭示於永久願備叙而銘諸豫既答拜遂按狀所述為之序而系以銘俾歸刻焉銘曰行其權曲以全執其節剛以折晦而明心則亨歿不朽惟有後承務郎松江府判官致仕王公墓志銘公諱肖翁字傳朋姓王氏世為婺之金華人宋太師左丞相魯國文定公諱淮之𤣥孫中大夫太府卿贈少師東陽郡開國公諱棟之曽孫中奉大夫直較文閣福建路轉運計度副使金華縣開國男諱佖之孫朝奉郎將作監主簿諱竒之子也公生而岐嶷長益清敏才學兼茂為宗邦所欽仰又其姿表明秀風矩醖藉雖當乎運去物改之餘望而知其為相門子弟矣起家衢婺二郡儒學録大德中升婺郡儒學正考滿當得教授一郡而國制教授必年艾以上始得為之公名上天官蓋未四十也是時奎章閣侍書學士蜀郡虞公集與公生同嵗亦以儒學正滿考同在選中而年皆不及格有司以常制持之廷臣言虞集雍忠肅公孫王肖翁魯文定公孫皆前代名宰相家子且學藝不羣不得拘於常制於是虞公得教授京畿而公為靜江教授南方歊暑多瘴公到官居亡何即移病而歸家食十年延祐末復起教授南康㑹白鹿洞書院山長缺郡守崔公翼之請公攝山長事書院久廢公為復興之新其屋宇廣其田租而來學者滋衆士譽翕然至治初辟江西行中書省掾史贑人有因核田虛增糧額萬餘石而生變者事數年不決公以謂民變雖靖而糧之虛額宜在所必除儒學官待選者以千數先是持選衡者皆顧憚不敢理日致壅滯公閲選簿為之銓注數日而畢由是宰臣器重之惟其言是用休聞以彰泰定四年積年勞除將仕郎海道漕運萬户府知事海道嵗漕東南百萬之粟供億京師以軍興法從事其任至重自漕帥至僚吏率以選居闕居幕中三年上下克協漕事訖辦僉以為能仍紀至元二年轉從仕郎嘉興録事適嵗侵部使者檄公行視田公為具實以聞得免荒租數萬石它州郡有奸利事部使者悉以諉公決公決之無或不當者惠利及人甚衆政績益著未幾屬疾請致其事遂以承務郎松江府判官致仕命未下而公卒其年十月癸巳也享年六十有五以五年二月壬寅葬於金華縣婺女鄉施家塘之原公娶唐氏子男六人長萱泉州德化縣主簿次藻杭州路海寧州判官次蘭鎮江録事司判官次荃次葵次藥奉化州儒學正女三人長適劉文同次適申次適吳儼孫男十二人女八人公天性孝友事親無違禮養寡姊弱甥無失所者教諸子必由於禮法家庭之內肅然有儀所得祿秩多以周親黨振貧乏內顧不足不以為纍髙懷雅興一寓於詩而尤善筆扎論者謂其酷似吳傳朋短章醉墨人爭寶愛之初魯公在淳熙間久居相位是時南比講解中外無事一用柔道佐時絀尚利喜功之說以休養其民人以故百年之間江左元元得以養生送死而無憾南渡以還論相業者莫於斯為盛魯公之從子是為文憲公柏實學於黃文肅公幹以傳考亭朱子之道學而敷文又受業於文憲以及撝堂劉先生炎雙峰饒先生魯其學皆本於朱子於是言道學者推為朱氏之適傳矣維公之生上承世德相業之隆道統之重萃於一門者家庭之所見聞為多而纍世文獻之傳逮於其身不可謂無所託也惜乎不大顯融不足以究其志之所就然論天道者謂王氏宜有後而公侯之子孫當必復其始後之來者尚有徵焉銘曰大山穹林良材所生世家名閥是生賢能婺衣冠家孰盛王氏相業道統聨徽襲軌奕葉載德委杫于公公繼承之文獻在躬際今昭代仍有祿仕用世其家克濟厥美君子之澤維衍益延曷觀水木繇有本原斫石刻辭爰志陵谷尚其嗣人是似是續故處士金華王君墓志銘君諱蕙字光庭姓王氏其先太原祁人徙婺義烏之鳯林鄉又自鳯林徙居郡城凡六世至宋政和間有以進士起家者曰登卒官湘潭令贈太師魏國公於君為七世祖魏公之仲子曰吏部尚書贈少師莊敏公師心丞相魯國文定公之伯父君之六世祖也曽祖諱僑迪功郎台州臨海縣尉祖諱琰將仕郎父諱入皇朝為婺州路廣盈庫副使君六嵗失母攀號頓踣寢食俱廢哀慕沒齒不忘里中偶不戒於火君年甫十六亟詣家廟奉遺像以出他悉置不顧東軒書院祠堂由始祖而下不以世數逺邇為間咸合食當屋壞弗葺君繕完使一新且割田為經久計先墓祭田族人迭主之春秋之事或廢不舉君為修其缺墜惟謹念上世獨莊敏公有傳在太史氏其後纍世歷官行事年夀卒葬皆未之有述將狀其實請於時之聞人有志而竟弗遂君平居孝於父友於兄弟推以及其宗族尤樂周人之急篤於愛子而訓誨甚嚴臨終戒之曰汝能以孝友繼吾志吾死瞑目矣君幼頴異稍長受業儒先尤精於音韻文字之學有司以君善譯語薦於翰林而君以侍養辭不就遺榮自適優遊卒嵗未嘗以窮達動其意也君生於至元己丑正月十七日卒於至正甲申閏二月二十三日得年五十有六娶戴氏子男三人浩存元功漢章女一人許嫁曹道寧孫男一人女三人其明年乙酉九月十六日浩存等遵治命奉柩葬金華縣婺女鄉槐龍里馬鋪嶺先塋之次其葬也浩存既刻石志嵗月復介豫友張君樞來謁銘吾婺故宰相家無若魯公之族最為蕃衍衣冠奕葉後先相望至於運去物改出而仕今聖時者猶彬彬焉積纍之素固非一朝一夕考其源委則功烈著於當世福澤被於後人實自莊敏公始德厚流光餘慶未艾而君謙冲退託如弗克勝與世浮湛耻於衒襮觀其孝友行於家持身接物始卒無疵可以謂之全人也巳奚必傳圭襲組然後為能世其家乎銘曰大山穹林良材生焉逭彼斧斤以保其天孰終奪之嗇不使年樂哉斯丘尚歸夫全龍泉章府君墓碣銘龍泉章府君以至治辛酉八月壬申終於家後八年當天歷己巳十二月己酉夫人李氏亦卒又二年至順辛未七月庚申合葬縣北西寧鄉古萊山之柯林墓上之石未有刻文又十有一年其子遇孫以狀來謁銘豫雖不敏嘗執筆從太史氏之後以文字為職業不敢以不敏辭按狀府君諱格字元夀姓章氏其裔出康州刺史鵬刺史居泉之南安未幾徙浦城再傳至檢校太傅仔鈞仕於閩王朝其子若孫多顯榮於時章遂為建之著姓太傅第三子撿校司徒仁燧生校書郎文錫文錫生都官郎中重又自浦城遷處之龍泉重生告告生順順生公探公探生世安世安生舉舉生宗宗生輔輔生聞義聞義生用之則府君之髙祖也用之生强宗强宗生煥文煥文生斯立則君之曽祖祖父也府君自髙祖以來咸不樂仕進一以儒術自娛至府君尤能外去聲利髙蹈物表白髮蒼顔衣冠甚偉見者皆指為前代人然不以弗仕而乖恤民之志性篤嗜黃帝內經甲乙靈樞之學晝夜研劘之弗厭多居善藥疾病者疕瘍者咸走藥之而不求其償或訕府君曰行藥如行師將非其人則民生葅醢子非世習或證不宜藥藥即殺人奈何府君笑曰君言固當吾心將以巳人之疾非若粗工然欲售醫以為市也彼蒼者天君詎知不吾佑乎閭井之間倚府君以生者甚衆果不違其言府君孝友出於天性父齡逾八十不良於行雖多傔媵府君朝夕給侍左右未離去父既沒奉其愛姬如母人疑府君為過府君曰父母之犬馬亦當愛之況人乎哉聞者嘆服親屬有利府君多金者數至豪奪巧攘府君笑弗較居亡何又搆誣府君倚官勢而鉗劫之府君曰子何必爾欲金當持去又弗與競於是大慚服不敢復有所文府君不嗜酒每嘉賓至必陳壺觴以為燕樂共談歷代治亂纚纚如貫珠聽者欣然忘倦客或沉酣擊節為長歌亦弗之厭蓋府君局度凝廓遇物有容類如此夫人出於宋之望族克相府君以成厥家而所以奉尊章和娣姒飭子孫又各盡其道人有貸錢者久不能償輒勸府君焚其券府君享年六十有三夫人之夀視府君而嬴十有一焉生子一人曰遇孫女一人錦川季源其壻也孫男三人曰圭曰璋曰溢惟府君生於簪纓之胄雖不出仕以流聲問於時然在家以孝友稱其存心復以澤物為務揆於古者肥遁之士亦若斯而已如府君者可使泯泯而無傳哉是宜銘銘曰澤則有蘭兮山則有薇我采我食兮我佩我衣銀黃雖貴兮獲之或非曷惇孝友兮保家之肥我民疾痛兮況切我肌完其熙醇兮起其枯羸人已一視兮我道在兹萊山欎葱兮有石如脂昭幽廓潛兮勒以貞辭青槤居士鄭君墓銘至正癸巳秋九月十又六日鄭君子敬卒於家其子渙以冬十月二十又七日葬君於浦江縣東三十五里閔子塢之阡今年春二月五日奉太常博士胡助狀來徵豫銘按狀君諱欽字子敬姓鄭氏子敬其字也其先出後魏建威將軍華華生中書博士茂茂生白麟有七兄弟號七房鄭氏皆多子孫謂白麟之後不傳者史失之也白麟十六世孫宋歙縣令凝道始自榮陽遷於歙凝道子殿中侍御史自牖復自歙遷遂安牖生祕閣校理安仁安仁生淮又自遂安遷婺之浦江今為浦江人淮生照照生冲素處士綺綺字宗文通春秋穀梁學撰穀梁合經論三萬言事父母甚孝父以非罪繫獄當入死綺上書郡守錢端禮請以身代母張病風攣綺保持若嬰兒但適厠必抱就之三十年弗懈教子孫不分財異爨至今九世無敢違其言朝廷旌之為孝義門綺生聞聞生運運生政以孝謹稱淳祐中大疫有至滅門者人恐惑四奔父子不相顧恤政與妻賈奉病母陳益勤終無他虞政生德璋處州青田縣尉德璋生大和建康路上元縣龍灣務提領君之父也龍灣厖凝端恪有魯騶士君子之至行其司家事嚴而有恩雖家庭中凛如公府子弟小有過頒白者猶鞭之每遇嵗時出坐堂上君帥羣從子皆盛衣冠鴈行立左序下次進拜跪奉觴上夀畢皆肅容拱手自右趨出足武相銜無敢參差者見者謂有三代遺風雖石奮家有所未及名聞天下自皇太子暨丞相諸公卿多作大書及賦詩以美其行部使者武威余闕行縣以其孝友七郡或莫之復篆東浙第一家以褒之蓋大和喜學君益左右之得一言必籍記而力行之冠昏喪祭一從朱子家禮而老子浮屠悉罷弗祀子孫從化馴行恭謹不知㕓市涼薄事執親喪哀甚三年不御酒肉食貨田賦之屬各有所司無敢私凡出納絲毛事有文可復挾日則㑹不公則監視發之諸子晝趍功入夜則聚棣華軒中溫溫語笑至更餘始休雖列顯仕不敢挾以自驕諸婦但事女紅不使豫家政內外極嚴輿臺通傳不敢越堂限然其所以致是以龍灣親攬其綱而衆目之翕張則於君乎是賴及龍灣采先世所行定著家規五十八則君復著續規七十三則以補其未備文多皆不載初龍灣無子其弟心水府君文厚實生君即命為嗣甫十三生母葛氏亡毁瘠如成人俄心水得羸疾君晝則侍湯藥夜則哭禱於天或謂人血能治之乃刺膚和藥以進然病已劇終莫能差君雖出為人後而服喪三年痛悼終身但語故即哽咽不自勝未幾母周又病復三度爇頂灼臂以哀籲焉卒賴以安及長撫弟妹惟恐不至未寒而與裘先饑而推食雖盛怒中見之必欣然改顔弟妹安之不知身之早孤也遇一家如一身長幼有疾一夜六七起或竟夕目不瞑病勢稍減津津喜溢眉宇間族子可出仕者資而勉之至於以歸不翅已得之者與弟銖同掌義財拓腴田二千畝貯之嘉禮莊中嵗入其粟以為婚嫁之費其遇疏族則有續食之粟禦凍之衾胤絶者擇良嗣繼之性敏者營義方教之至於恤異姓周窮匱又有推仁之財免利之黍嘗自訟曰民吾同胞彼病吾病彼辱吾辱吾可不盡心乎哉或陷危難奮身救之雖利害不顧有紛爭弗決者得片言則曲直自明羅拜而去愚氓無知視骨肉如塗人君至其家開陳大義至懇切處潸然為出涕民多悔悟自新君為人外雖嚴肅而內多慈惠尚氣節英特異常不能隨世浮沉喜於聞善勇於行義遇事變通如丸之轉曽無滯留苟涉過差則批頰自訟故人樂勸之以善道云有薦君才可用者君力辭焉家後有古槤大十圍乃冲素處士所植者君每舍其下因以青槤居士自號示隱操也龍灣既即世君哭之過哀因以疾卒壽僅六十三娶傳福字世昌少房徐偉字妙英皆前君卒同葬縣東二十八里之金村子男五溢渙瀛汪瀱溢瀛汪皆夭孫男三桐柎栴豫家與君相去不兩舍交君父子間者凡三世矣今年夏四月龍灣以疾不起豫來弔哭甫及六月而又哭君焉嗚呼天喪吉士何其忍耶然君之二子能以才猷自見群從子姓之賢者又濟濟然各敦孝友之行以能保厥家則君雖亡為不亡矣昔者豫既銘青田之墓今復從狀所述備著君纍葉之美以垂勸於方來復系之以銘曰倚歟鄭氏世有哲人君繼起之孝友彌敦九世同爨罔間疏親旁推其餘恤我里鄰榮辱疾疢視同一身苟用於時澤將被民既弗欲展修於家門堂筵之上煦如春溫百世之下善孰可泯有崇斯阡厥石維珉紀美揚休以朂後昆文獻集卷九下
