body:
  text: 文獻集卷十上元黄溍撰碑文宛平王氏先塋碑今上至正六年秋八月中順大夫江浙等處財賦都總管王公得請於朝疏恩二代爰狀其實來諗於溍曰是宜有述以章示上賜庶假寵我子孫於無窮敢屬筆於子溍辭不獲則序而銘之按王氏上世家遼之盖州總管公之髙祖諱璘知金將亡與二兄禧祺擁衆歸于我太祖從睿宗南攻汴愍二兄之死事感激奮勵誓不與敵俱生摧堅擊強所向輒克屢以捷聞汴既下計功行賞授虎符管領女真漢軍都元帥奉二兄柩葬于燕之宛平因為其縣人髙祖母曰伊喇氏曽祖諱德璋襲父職仍為管領女真漢軍都元帥曽祖母曰烏庫哩氏祖諱堮通文史尤善譯語事憲宗為筆且齊而以材學受知世祖擢禮部侍郎於是國家龍興垂六十年上方注意稽古禮文之事所以潤色鴻業者左右佽助與有力焉居歲餘出為真定路鄂囉總管真定於河北為巨鎮民多占籍軍伍撫馭之甚有恩意人皆德之祖母曰李氏鄂爾根氏父諱承良好修而嗜學歴觀古昔興廢失得之故而慨然有志於當世鮮有能深知之者嘗由行工部齊哩克昆總管府令史補徽政院掾史調將仕郎冀州等處納綿提舉遷從仕郎崇祥監知事監陞為院以承事郎為其院都事又以承務郎為其院之規運提㸃母曰李氏魏氏四世皆祔葬宛平先墓之次此其系序官業之可見者也初總管公由晉王内史府掾陞記室遂入掾中書以文林郎任禮部主事始贈其父應奉翰林文字文林郎同知制誥兼國史院編修官及公以殊祥院都事遷宣政院經歴轉奉直大夫參議院事乃贈其父奉議大夫樞宻院判官驍騎尉太原縣子其後公自大宗正府左右郎中改授大都兵馬都指揮使又贈其父中順大夫兵部侍郎上騎都尉太原郡侯至是公以中正院判官拜今命遂追贈其祖翰林直學士亞中大夫輕車都尉太原郡侯李氏鄂爾根氏並太原郡夫人加贈其父嘉議大夫禮部尚書上輕車都尉太原郡侯李氏魏氏並自宜人累遷至太原郡夫人公妻孫氏亦以從封至太原郡夫人盖自尚書府君而上四世咸有官序而藴蓄之素未克大施福祉所儲總管公實承之公名洪字彦𢎞少受學於鄉先生同門莫不敬服事鄂爾根夫人定省之節衣服飲食之供靡所違缺寒夜則捧其足而卧病目則每旦以舌䑛之至病愈乃巳尚書府君既殁家事悉咨於魏夫人而後行得祿必歸之且舉孫夫人匳具以奉焉先世所遺田廬則盡以畀其子慶不幸慶早世䘮之過哀人尤以為難有餘貲輒分惠其三族貧無所依與不能具吉凶之禮者則贍給之所引拔登仕版者二十餘人其居家孝友如此至於莅官臨民績用尤著始入内史府來謁選而六七年不得調者三百餘人亟為闗白程其材品較其資歴而補署焉天厯初通州三河潞縣之人為東兵所殺掠兵未息而又苦寒公時在宣政院中書傳上㫖俾徃賑之賴以全活者甚衆収瘞其死者四千五百餘人誘還其俘虜者三千五百餘人兵馬司主求盜事最叢劇而能使庭無留訟皆其灼然可紀者也觀公名位之進則積善之慶為可知觀公行治之修則義方之教為可見是用牽聮而備書之公有子二人長曰惟德國學生次曰螟蛉女三人皆在室其蕃衍盛大未艾嗣是宜有屢書不一書者銘曰王氏之先奮自遼東際逢興運克有伐功來居于燕蟬聮奕葉踐敭中外珪重組疊志局于位厥光未光委祉後人五世而昌煌煌宻章貤恩父祖升華禁從疏封胙土惟神在幽被服褒嘉假兹寵靈大啟厥家史臣作頌庸侈上德勒諸堅珉昭示無極廟碑故陜西諸道行御史臺御史中丞贈攄誠宣恵功臣榮祿大夫陜西等處行中書省平章政事柱國追封濱國公諡文忠張公祠堂碑故濵國文忠張公家濟南而其别墅在歴城縣北十里華不注鵲山之陽歴山之隂號曰雲莊公自㕘議中書省事退休其中者垂十年至治泰定之間詔使沓至皆堅卧不起文皇御極以翰林侍讀學士召未至改陜西諸道行御史臺御史中丞公乃幡然就道時公年甫六十到官厪三閱月而薨于位天厯二年七月壬午也始公嘗謂吾居雲莊而樂且宻邇吾先世大墓吾死必以昭穆序葬而於是乎祠焉九月丙辰公嗣子今秘書郎引遵治命奉柩以葬而以清河郡夫人郭氏祔至順二年三月戊子乃作祠堂凡屋之為間者四堂居其三而室居其一妥神有位物器備完歲時蕆事饋奠惟謹以溍忝綴公門生之末俾有述以告來者溍竊惟公初尹堂邑撫人有恩用獄不失有罪能使豪強讋伏而盜賊化為良民為御史則抗言尚書省不可立其變更法度易置官府將厲天下且擅除御史大夫中丞非祖宗故事疏時政之弊萬餘言力拄權姦幾蹈禍而不悔在中書則諫止内廷燈山之戲卒以忠直受上賞暨執法西臺屬闗右薦饑壹以荒政為己任有禱于神其應如響乃傾私槖斥公帑奏請大發錢粟下輸米授爵之令用便宜通鈔法以來商旅由是人始得食至于疾病死亡皆具為區處有司怠於奏行則分遣察官臨視之委曲纎悉竭盡其力賴以少甦者雖甚衆而公竟以憂勞悲感奄及於大故捐館之日奉元鼓樓梁木自壞濟南里第有光若隕星者民之無禄庸非天乎事聞制贈公攄誠宣恵功臣榮禄大夫陜西等處行中書省平章政事柱國追封濵國公諡曰文忠䘏典之優異先帝憫悼深矣公所務學致於實用而一語一黙之細亦無所苟仁宗時公居禮部為侍郎尚書兩持文枋克廣賢路深契上衷新進士銜刺來謁輒拒不與為禮書方寸之紙令閽人諭之曰但思報國無以私謝為也所譔著施於朝廷行於四方萬里人莫不傳誦之盖公之莅民政多卓異宜如循吏之立祠直道以匡君而勤事以死宜如功臣之祭於大烝文學論議存乎淑艾之私宜如先賢之祀於學固非其家所得而専也然以公居此為最久從容去就之際聞者至今為之咨嗟歎息過而見其平生釣游處池深水寒猶將低徊不忍去况登斯堂而仰公之遺風餘烈可使貪夫亷懦夫立其於名教殆非小補尸而祝之豈獨仁人孝子用以厚其親哉溍遂不敢辭而序其槩復為銘以系焉公諱養浩字希孟世次官閥行事之詳有傳在史氏今皇上义申勅詞臣勒諸石章昭揭墓隧矣非有闗於祠事者此不著銘曰瞻彼樂郊齊山兩間山之幽幽水清且漣孰遄公歸而止于此使者在門公不為起止非無所行也以時大君有命賁然來思曰予赤子汝饑予哺庶幾當宁寛是西顧盡瘁以仕不有其躬神游故墟有寧一宫公像在斯皇皇卷服生氣凜焉過者必肅故參知政事行中書省事國信使贈榮祿大夫平章政事上柱國追封閩國公諡忠愍王公祠堂碑至元十五年秋七月閩國王公以福建道宣撫使覲于上京世祖皇帝與語大悦朝退首命左丞張公即公寓邸傳㫖詢日本事公對以日本蕞爾島夷不足煩天討因畫招徠之䇿以進深契上衷將使預聞國政公懇辭迺降金虎符授公中奉大夫刑部尚書福建道宣慰使兼提刑按察使仍為御便殿曲宴以遣之俾左丞吕公為公起舞霑醉而止公既還治閩中具宣徳意十六年夏五月舉家入朝明年正旦上眷禮有加擢户部尚書數奏事稱㫖嘗命之坐而輟御膳以賜以廷辯薄百官俸非便忤權臣意丐外十九年春二月拜正奉大夫參知政事行中書省事將之官江西即政事堂條陳二十四事丞相齊魯國文忠公大喜恨得公晚留公毋行二十一年春正月進對言日本未易以力服而可以計取誠令臣等備一介之使以招徠之事成可無殘民匱財即事不成亦無損國威重上嘉納之因以公為國信使凡所須一惟公意公以為臣他無所須祇須一印佩之擇參佐數輩奉詔以行足矣有㫖命公視草且賜公玉環連絛納瑟瑟袍帽鞾馬鞍各一俾丞相善䕶視公妻子之留質京師者公既陛辭以夏四月發慶元五月抵躭羅躭羅人或勸公勿輕徃公不聽秋七月至日本境上先令持旗榜諭其國中并移事國王及用事者日本遣使郊迎甚謹請遂以詔書入辛卯望艤舟對馬島丙夜俄有舉火譟讙島上者公竟遇害而薨得年五十有六夫人葉氏携諸孤跣哭赴愬闕下上聞訃震悼命頒其家衣廩如故給夫人驛劵乘官舸五南還究其事尋諡公敬愍侯錄其季子從仕郎南劍路順昌縣尹都中為少中大夫平江路總管府治中即平江賜宅一區田八千畮厥後都中累遷荆湖北道宣慰副使言公雖已得諡而爵秩未稱有司以聞仁宗皇帝覽其奏皇慶元年春三月詔加贈公榮禄大夫平章政事上柱國追封閩國公改諡忠愍於是夫人亦從公爵封閩國太夫人既以告其第太夫人母子相與感泣懼無以昭上恩侈前烈爰卜呉縣至德鄉白蓮橋之西二百步構堂肖公像而祠焉公姓王氏諱積翁字良存其先光之固始人世為宋世族髙祖諱戩贈太保髙祖妣陳氏東萊郡夫人太保南渡時嘗仕閩因家焉故又為福之長溪人曽祖諱椿贈太傅曽祖妣陳氏通義郡夫人林氏平原郡夫人祖諱萬全登淳熈二年進士第任處州青田縣令贈太師祖妣林氏贈衛國夫人考諱方大贈少保妣陳氏潁川郡夫人初少保無子禱于顯應崔府君之神而生公性至孝博學工為文辭年十八領國子舉明年用叔父參知政事忠文公伯大䕃補承務郎調監嚴州都酒務故宰相呉公潛分閫四明辟奉國軍節度推官改沿海制置大使司幹辦公事累數十年不决之訟悉以諉之凡所剖析三百餘事有平心錄四卷除提領户部犒賞所檢察官貽書漕使趙公與訔捐和平十二酒庫積逋十七萬和平三百家為之少蘇馬公光祖以執政尹天府辟浙西安撫司幹辦公事奉朝㫖决六縣獄單車夜至餘杭閱獄囚一百七十悉得其情當坐者僅數人餘皆平民明日召縣官盡釋之所平反他邑疑獄全活甚衆辟淮東總領所措置糴買官江東轉運司幹辦公事用舉者改秩差知富陽縣治辦為諸邑最皇族有縱家僮殺人者論如法無少貸人尤快之秩滿堂除兩浙轉運司主管文字力請寛版曹催科之限東南諸郡咸便之除監左藏封椿上庫差通判臨安府除提轄文思院主管諸軍審計院遷太府寺丞兵部郎官出知徽州兼都督兵馬府參議官軍師李銓據城謀為變勢張甚公以計柔服之且施恩信離其黨民恃以無恐加兵部侍郎仍舊任俄除江南東路提舉常平茶鹽改福建路提㸃刑獄行次永嘉復以為天下兵馬都元帥益王府司馬辭不就改知南劍州兼福建路提㸃刑獄兼招捕使進兵部尚書除寳章閣學士福建路制置使兼職仍舊於是德祐内附三宫巳北上而景炎新造未久又航海去迺抵福州行省以八郡圖籍上之行省承制以公知建寧府尋充福建道宣撫副使部將李雄挾淮兵為亂殺同知宣撫司事潛説友而屠其家公収潛尸為治後事且以計紿雄而厚結其麾下因大閲擒雄誅之以功陞宣撫使福州路總管兼府尹兼提刑按察使已而淮兵亂復作公率郡民捕其黨悉斬以殉閩生齒數十百萬卒賴以完亡何而入覲鄉國之人至今思之公夫人曰陳氏曰林氏皆封安人先卒曰葉氏今閩國太夫人也其為比丘尼而在者曰圓明静慧慈照大師住持杭州明慧寺吹斯母已卒者曰宏宗圓明佛日大師住持平江妙湛寺普貴子男七人曰時中易名為僧以卒餘悉以公奏補官曰琦明威將軍同知肇慶路總管府事曰權中從仕郎同知循州事曰昇中從仕郎寧海縣尹皆卒曰建中從仕郎建安縣尹閩國太夫人出也從太夫人留質而歸卒于維揚驛無子以都中之子為其後曰端中從仕郎尤溪縣尹亦卒曰都中今正議大夫兩浙都轉運鹽使女六人四適名門二為尼孫男七人女四人曾孫男五人女一人堂成後三年都中以太夫人之命來徵文將刋之兹碑溍竊惟公之忘身徇國亦既簡在帝心而足以暴白於天下太夫人勤懇壹意為天所祐年幾八袠貌端神澤福祉未艾正議又以材猷德望嚮用於時有光于前人盖人紀之大者三公之為臣太夫人之為婦正議之為子可謂盡之矣欲勿書得乎太夫人之弟茂辰嘗以公薦為武德將軍管軍總管公之殁也為之七走京師而致力於詞事尤悉夫亦有功於王氏而可書者也其銘曰於赫世祖總攬羣雄委質自奮時惟王公千載之逢由一言始歸䕶全閩惟天子使相彼林林孰完其生繄公是怙弗震弗驚迺疇民庸迺踐朝著迺啟迺沃迺居政路蠢兹島夷敢有不恭抗言請使出次于東溟波浩浩其下不測長風大颿萬里一息天聲所加咿嗢雎盱韃櫜帕首頫伏路隅煌煌英蕩使事有指庶公其歸赤舄几几胡蹈大難而以訃聞舍生取義哀動帝宸疏封進爵易名節惠于飾其終罔不備至公則逺矣遺烈不冺孰其承之惟後有人一畆之宫百世之祀麗牲有碑刻示無止中書右丞相贈孚道志仁清忠一德功臣太師開府儀同三司上柱國追封鄆王諡文忠神道碑至正八年春正月五日皇帝御興聖宫便殿中書省臣以故右丞相鄆文忠王神道之碑未建奏請勅臣某為之文以賜其家俾刻焉臣某竊惟王之宏模偉度山髙而海深非末學小臣所能窺測懼無以稱塞明詔顧以待罪太史屬職在記述不敢伏闕控辭則退而考其世次官閥行事之實序而銘之昧死以上謹按王諱拜珠系出扎拉爾氏六世祖諱崆根果斡從太祖皇帝伐奈曼以巳馬濟太祖步戰而殁贈推忠効節保大佐運功臣太師開府儀同三司上柱國追封魯國王諡忠宣六世祖妣諱庫克追封魯國王夫人五世祖諱穆呼哩從太祖皇帝滅克哷太祖即帝位以為左萬户從破金入燕専征遼東西諸郡授太師國王都行省承制行事建牙于燕以經畧中原金主南奔齊魯趙魏晉秦之地次第悉平臨終以金人未滅為憾贈體仁開國輔世佐命功臣太師開府儀同三司上柱國追封魯國王諡忠武五世祖妣諱布哈爾追封魯國王夫人髙祖諱博囉嗣國王奉太祖皇帝命攻西夏定河北平山東以功食東平郡贈純誠開濟保德輔運功臣太師開府儀同三司上柱國追封魯國王諡忠定髙祖妣諱罕都呼追封魯國王夫人曽祖諱巴圖爾從世祖皇帝伐宋為先鋒元帥已渡江與世祖會鄂州而憲宗崩世祖俾總師留屯而還殁於軍贈推誠宣力翊運功臣太師開府儀同三司追封東平王諡武靖曾祖妣鴻吉哩氏諱特穆倫昭睿順聖皇后女兄追封東平王夫人祖諱安圖事世祖皇帝掌環衛之政令位百僚上拜中書右丞相食四千户佐皇子北平王出鎮北邊十年而歸復拜中書右丞相贊上册皇后皇太子議規襄陽以取宋所薦史忠武公天澤姚文獻公樞許文正公衡商文定公挺皆時之宿望以阿哈瑪特桑格尚書之政誤國害民而力斥之立御史臺以正朝綱立太常寺以崇典禮定強竊盜賊論罪輕重法以止濫殺語國朝之賢相必以為稱首贈推忠同德翊運功臣太師開府儀同三司追封東平王諡忠憲加贈推忠守正同德翊運功臣上柱國進封魯王餘如故祖妣竒􅚕氏諱布延呼圖克累封魯王夫人考諱呼都克台成宗時襲掌環衛以大司徒領太常寺事贈輸誠保德翊衛功臣開府儀同三司太師上柱國追封東平王諡忠簡加贈宣力迪慶保德翊運功臣進封兖王餘如故妣都克塔氏諱托色嘉琿累封兖王夫人忠宣忠武兩王故有廟于東平英宗皇帝特賜以碑額曰元勲世德别贈忠憲王開國元勲命世大臣之碑勅翰林侍講學士元明善製為銘辭樹于王所食采地范陽之通逵因臨幸而觀焉號其地曰駐蹕莊云王生五歲而孤兖王夫人撫育備至令知文學者陳聖賢孝弟忠信之説以開導之聞輒領解大德十一年武宗皇帝入正大統王甫十歲迎謁道左上親執其手慰藉久之人見王嶷然公輔之器相與屬目謂有祖風至大二年襲掌環衛歴事仁宗皇帝眷注尤深延祐二年擢資政大夫太常禮儀院使四年加榮禄大夫司徒仍領太常五年遷金紫光祿大夫六年進開府儀同三司七年春三月英宗皇帝嗣位拜中書平章政事初上在儲闈王之令譽日聞於左右遣使召見王謝曰以扈從之臣而往來宫邸嫌疑之際不可不謹臣之獲罪固無所避亦豈太子福邪上嘉其有識可屬大事由是首登用焉故事天子即位之日必大會諸侯王讀太祖寳訓是日命王啟而讀之王風儀峻整音節鴻亮聽者肅然夏五月加上柱國錄軍國重事進拜中書左丞相先者柬朝嬖倖怙寵干政首相特們徳爾頗與之相為表裏仁宗不悦解其政柄無何上崩英宗在諒闇中遂復出居相位睚眦之怨必報一時善類遭其誣衊多陷于不測之罪其黨與以權勢相軋而日生釁隙亦莫能自全王與之並相獨堅持正論不少囘撓遇僚佐闕必公選掄而用之臺臣奏疏謂君子小人不可同處首相以為譏已而深銜之顧未有以發至治元年監察御史言太歲在酉不宜造寺於西山遂指以為謗訕言者既横加酷罰因盡斥舊臣而援特克實為御史大夫又以其子巴爾濟蘇為宣政中政等九使索諾木為治書侍御史姻黨分據要途秋某月王至自上京視事于中書首相稱疾不出以伺間而謀為中傷已而言疾愈將出上使止之氣乃沮二年秋遂以病死巴爾濟蘇與姦人妄獻民田而冒受其直王奏誅之又奏黜索諾木以通言路冬十一月王拜中書右丞相監修國史上為虛左揆之席以示圖任之専仍降詔布告于中外王舉前平章政事張珪與之共政集大臣及故老詢所以弭日食地震之變士大夫遭擯棄者咸以所長収叙文學之臣則待以不次之除格内降待銓者六七百人振舉學校而士知所作興修明條制而吏有所遵守減江南民租八十餘萬石設宗仁衛贖蒙古子女之奴於民間者以𨽻焉朝廷政令聳然一新四方之人無不動色胥慶上之始臨御也以察罕諾爾行宫亨麗殿規制褊迫命改作而侈大之王引節用愛人使民以時之言極諫而止又將以元夕結綵為山張燈禁中參議中書省事張養浩上疏諌王亟以聞即命罷之仍賜美錦以旌其直仁宗當升祔而廟無其室王傳㫖集諸儒議僉以為廟之始建前殿而後寢今寢已燬于灾宜更作前殿為間十有五其中三間為太祖室以備祫享列聖神御間為一室東西兩間為祧而以今殿為後寢上可其奏廟制乃完上欲躬行享祀之禮王進太常所纂儀注詔頒下有司卜日有事于太廟始備大駕鹵簿建太常十有二斿列黄麾仗五千人上服通天冠絳紗袍出自崇天門衆庶聚觀儀衛文物之盛莫不感歎以為三代禮樂復見於今及行事王攝太尉上親被衮冕執圭瓚祼獻禮成還宫王率羣臣稱賀于大明殿推恩錫賚有差上嘗坐穆清閣顧謂王曰今亦有如唐魏徵之敢諌者乎王對曰槃圓則水圓盂方則水方有太宗納諫之君則有魏徵敢諌之臣上稱善或勸上純任釋氏之法以治天下上問王何如王曰釋氏之道貴清静寂滅可以自治而不可以治人帝王之仁義禮樂乃所以為治也上黙黙有㫖俾王提調大司農王曰宰相之職無所不統寧獨大司農耶上以為知大體嘗賜以金脊殿車又嘗閲寳玉於章佩監命惟意所擇皆力辭尋詔姻宗室女又辭命國工繪王像勅翰林侍講學士袁桷為之贊御書唐皮日休吾愛房與杜魁然真宰輔黄閣三十年清風億萬古之詩以賜之盖期望之也至矣王亦感上殊遇自任以天下之重事有當弛張知無不為既盡發故首相欺悖之迹削其官爵仆其碑籍其家背公死黨者多謀不利於王左右請為之備王曰吾盡吾心上不負吾君吾祖父下不負吾士民而已何備為然深患讒言之興因侍燕閒從容奏曰陛下不以臣年少無似使備員宰相方務彰善癉惡期致隆平苟有沮之者則臣不能有所為矣上曰卿第勉之果有間言朕不聽也三年夏上時巡甫至上京夜寐不寧趣大作佛事王曰財從民出國以民安殫財困民未見其福上矍然曰朕所創惟夀安山餘皆完其舊爾民亦以為病乎自今其輟土木之役既而負罪懼誅者復隂訹羣僧言國當有厄非作佛事而大赦無以禳之王叱曰爾輩不過圖得金帛而已又欲庇有罪耶姦黨聞之皆失色而巴爾濟蘇之罔上為姦利事連特克實恐不自保遂與齊琳特穆爾等潛蓄異謀其年秋乘輿還次南坡帝崩王亦及於難王生於大德二年春三月八日薨於至治三年秋八月四日享年二十有六以是年某月某日葬于大都宛平縣某鄉田村之原秋九月晉王入繼逆臣族誅命奉王像祠於海雲寺泰定元年贈清忠一德佐運功臣太師開府儀同三司上柱國追封東平王諡忠獻今上皇帝至元元年又勅翰林直學士歐陽𤣥贊王像藏于秘書監某年加贈孚道志仁清忠一德功臣進封鄆王改諡文忠太師開府儀同三司上柱國餘如故祖考皆加贈進封焉夫人諱托克托呼太府卿實喇布哈之女婦道母儀恊于閫範王薨省臺各奏賜鈔十五萬緡今上又賜金五十兩鈔五萬緡歲給諸王供膳衣物仍勅奎章閣學士庫庫大書表其所居曰貞節之門夫人生於大德四年夏五月二十日薨於至正三年夏六月八日享年四十有四以是年某月某日合葬於王墓由東平王夫人進封鄆王夫人賜諡貞静盖異數也子男二人長達爾瑪實哩虎符宗仁蒙古衛親軍都指揮使後王缺年卒次音咱納實哩文宗時賜名都稜特穆爾襲職環衛虎符宗仁蒙古衛親軍都指揮使時十有一上見其朝服列於班行神采煥發甚愛重之命受經於奎章閣歴崇福司太常太禧兩院使大宗正府伊克扎爾古齊宣徽使知樞宻院事中間惟兩翰林院皆再入為學士承㫖今以特㫖遷大司農仍舊階開府儀同三司端粹博碩尚文而下士當承平無事時侍上起居弗懈益䖍人以為能世其家臣溍歴觀帝之肇基立極必有元才鉅德應期而出以翊扶昌運十亂造周三傑興漢載籍所記垂輝千齡然閎散之後相業無傳蕭張之家侯封莫續有如王之恢張先烈乘時奮庸為國世臣同休共戚委祉於後繼述有人可謂卓冠古今夐絶倫比也已矧惟昔之名臣或前規後隨以相成或應變守文而共濟未有不同心戮力而能光輔帝室者王以勲賢貴胄夙受主知魚水之親脗合無間而所與共立者非其人王獨精白一心盡瘁事國力摧百壬之鋒訖使朝廷百官四方逺近莫敢不一於正蓋其事視古人為尤難雖遭值變故而平生大節彌久益著又亘古之所未有播之聲詩以震于無垠夫亦勸忠之道也百世之下尚鑒于兹銘曰大明麗天赫赫英皇巖石爾瞻侃侃鄆王惟王之先鷹揚朔土手挈中原歸奉真主異才間出騰風躍雲克濟其美為國虎臣聖神撫運統一寰宇轉旋鈞軸篤生碩輔垂紳正笏乾清坤寧綸經之業惟王敬承左右三朝服勤帷幄靖共正直執事有恪乃世其官典領奉常乃授以政乃登廟廊崇儉抑奢諫行言聽乃宅百揆以佐出令仁漸義摩文恬武嬉禮樂之興適惟其時龍旂承祀肅肅在廟惟時顯相丕揚聖孝德教所加望治有期孰使共兜接武夷䕫緬彼滔天屹乎砥柱不震不竦衆正所怙福善禍淫天道之常魁柄既専化紘乃張曀霾滌盪天青日白檮杌嵬瑣莫掩其迹蹈于危疑構兹閔凶萬姓之悲攀髯抱弓金枝翠蓋神游寥廓英姿爽氣清風延閣増崇位號惟帝念功勒辭圖堅于以勸忠尚其嗣人咸有一德與國同休永永無極勅賜喀喇氏先塋碑喀喇氏三葉疏王封者六人踐相位者四人咸有石章以紀勲德而其塋域在京城和義門之外者顧未有以表于封樹至正八年冬十一月十有二日皇帝御明仁殿中書宰臣用今大司農達實特穆尔之請以聞詔臣某為之銘以達實特穆爾素善書有㫖就令書丹别勅平章政事議中書省事姚庸篆其額以賜焉臣溍忝以非才待罪太史氏職在論撰不敢控辭喀喇古髙車國也我太祖皇帝親征而略其地其國之近屬有二孤子曰庫魯克曰雅雅其母臧宻古瑪里氏賢而有識以二子寘褚中負以槖駞而來朝則太祖巳賔天乃以二子獻于太宗曰此吾國之遺𦙍也不可為人所得而辱於奴𨽻敢以來歸幸他日為天子使上憐而撫育之暨憲宗御極二子既長召入宿衛領實保齊遂扈從伐宋母迴喀喇而復來值憲宗陟方諸將皆北還二子獨後禱于神祠若有稱好者再問而知為吉兆比至家則二子亦至矣世祖皇帝入正大統疇其勞績給以土田人户俾居興和天城之大羅鎮母後以子牙牙貴追封雲中郡夫人雅雅贈宣忠翊德開治功臣開府儀同三司上柱國追封雲中王諡缺配呼都克台氏封邢國夫人繼和坦氏封康國太夫人丞相順寧忠烈王阿實克布哈丞相和寧忠獻王伊納克托克托皆雲中缺王之子丞相冀寧文忠王特穆爾達實則和寧忠獻王之子也順寧忠烈王年十四入侍世祖以占對詳明特見親幸令門者勿納以試之遂由水竇而入上嘉其志乃命聽其出入無禁嘗早朝露未晞跣行而前上望見尤歎異焉使掌門衛以察非常久之以西手千户領實保齊從成宗北征與海都戰數有功入為大宗正府伊克扎爾古齊浙西豪民朱清張瑄以海運取顯官有罪抵死王奉㫖簿錄其家一無所私詔賜王宅一區鈔萬五千緡命兼兩兵馬指揮司達嚕噶齊姦軌不作輦下肅清武宗即皇帝位拜中書平章政事軍國大事並聽裁决尋加特進太尉依前平章政事有盗内府金者王退朝適與之遇訝其倉惶失措詰之果得黄金五十兩白金百兩上命以金賜王而誅盗王辭曰盜誠當誅金非臣所宜得請入金贖盜罪上為貸其死有㫖出内府鈔十五萬緡賞蹴踘者王力持不可訖弗予一日入侍於五花殿覩上玉色而進薄滋味寡嗜欲之戒上嘉其忠忱命進酒王曰陛下既納臣言不足取信也上為罷酒進中書右丞相行御史大夫尋復為平章政事加錄軍國重事兼廣武喀喇衛親軍都指揮使封康國公遷知樞密院事薨享年四十有七贈純誠一徳正憲保大功臣太師開府儀同三司上柱國中書右丞相追封順寜王謚忠烈配塔喇海德濟氏追封順寧王夫人博囉珍氏布古魯特氏並封順寧王太夫人和寧忠獻王少從其兄阿都瑪勒獵於燕南阿都瑪勒使獻所獲世祖皇帝見其骨氣沈雄步履莊重即命入宿衛暨武宗撫軍朔方王在行間與諸將大敗海都軍于杭愛手斮一士之首連背胛以獻武宗壯之兵之始交也武宗鋭欲䇿馬出戰王執轡力諫上怒揮鞭抶其手不退上不得已而止後與大將逹勒逹哈語及之逹勒逹哈曰太子在軍中如身有首如衣有領脱有不虞衆安所附托克托進諫可謂忠矣上深然之成宗大漸丞相哈剌哈斯逹爾罕稱疾卧直廬中王適以使事至京師乃俾馳告武宗以國恤且勸進安西王乗間入朝窺伺神器既而仁宗奉太母至自懷孟忠烈諜知姦黨謀偽賀千秋而舉事亟白于仁宗先二日而發内難悉平武宗聞太母詢所宜立於隂陽家遣王還察事機時太母以武宗遲迴不至巳命忠烈徃道宗室諸王貴戚元勲推戴之誠忠烈至野馬川上見之甚喜行次翁果察圖而王繼至趣使疾驅與之共載聞王致太母及仁宗之語乃大感悟釋然無疑暨忠烈還報仁宗即日命駕奉迎于上都武宗皇帝正位宸極尊太母為皇太后立仁宗為皇太子三宫恊和而無間言王兄弟之力也先是武宗嘗命王同知樞宻院問曽視事否王對曰今正殿未御宗親未見德音未下而扈從之臣攙取名位失四方之觀瞻寧不上累聖德是以未敢祇事上嘉歎不巳知樞宻院濟爾噶呼侍上於潛邸嘗有不遜語將寘于法王諫曰陛下新即位大信未立而輒行誅戮知者以為彼自有罪不知者以為報仇恐人人自危况濟爾噶呼習於先朝典故今固不可少也上乃宥之上京大宴故事命一近臣敷宣王度以為告戒王薦濟爾噶呼令具其言以進果稱旨上歎曰博爾濟博勒呼前朝人傑托克托乃今世人傑也即以所進之言授王及諸王大臣被宴服就列王即席陳西北諸藩始離終合之由去逆効順之義聴者莫不領服王自同知樞宻院中書平章政事拜御史大夫遷南臺御史大夫召拜錄軍國重事中書左丞相知無不言言無不行人以賢相稱之尚書省立以王為右丞相王辭曰爵賞者帝王所以用人也今爵及比徳賞及罔功緩急之際何所頼乎中書所掌錢粮工役選法刑獄十二事若從臣言恪遵舊制則臣願與諸賢黽勉從事不然用臣何補上乃為下令俾濫受宣勅者赴所屬繳納僥倖之路既塞奔競之風頓衰中臺有贓罰鈔五百萬緡王請出以賑孤寡老疾諸窮而無告者莫不舉手加額宗王納古爾部人告其主為不軌王辨其誣抵告者罪宗王伊克圖徵其舊民於齊王班布爾實部中鄰境諸王欲奉齊王攻伊克圖齊王懼奔伊克圖以避之遂告齊王反王簿問得實釋齊王而徙諸王于嶺南邊將托和齊請以新軍萬人益宗王綽哈廷議俾王徃給其資裝王言時方寧謐不宜挑變生事辭不行遂遣丞相圖古勒平章政事額森特穆爾徃給之幾以激變尋復為中書左丞相仁宗眷之彌篤欲使均逸于外拜江浙行中書省左丞相下車伊始進父老問以利病咸謂杭城故有便河達于江滸湮廢巳久若疏鑿以通舟檝物價必平僚佐或難之王曰吾陛辭之日密㫖許以便宜行事民以為便行之可也俄有㫖禁勿興土功王曰敬天莫先勤民民蒙其利則災沴自弭土功何尤不一月而訖工人至今便之王以疑似召赴闕杭民數萬號慟遮道不得前既至賴仁宗察其無他厚賜而遣之還鎮王至杭未幾遷江西行中書省左丞相英宗嗣位召拜御史大夫塔齊隂忌之奏改南臺御史大夫復嗾言者劾其擅離職守將徙之雲南㑹塔齊伏誅乃解王家居不出者五年泰定四年二月二日薨享年五十有六王階至開府儀同三司勲至上柱國爵為馮國公兼官為集賢使仁虞使中都留守司達嚕噶齊開寧路達嚕噶齊領崇福司囘囘司天臺中衛廣武衛親軍都指揮使贈推誠全德守義佐運功臣太師中書左丞相階勲皆如故追封和寧王諡忠獻配額森氏封馮國夫人武宗又妻以輝和爾氏伊嚕呼圖克仁獻章聖皇后之同乳也封薊國太夫人冀寜文忠王以大臣子事明宗于潜邸宏才雅量好學下士夙負公輔之望歴事累朝由同知都䕶府事為工刑兩部侍郎擢監察御史遷秘書郎除禮部尚書遂參議中書省事擢西臺侍御史未行留為奎章閣侍書學士除大都留守遷同知樞宻院事上既總攬權綱用托克托為中書右丞相王為右丞以更新庶政科舉之廢也王在參議府爭之不得訖不署其奏牘至是力為上言前代科舉得人之盛遂復行焉金山大雪上遣王及知樞宻院衆家奴齎鈔一千萬緡衣表裏各二萬疋往周給之王被命即行雖皸瘃無所憚拜中書平章政事每入直上為御宣文閣詢以治道往往至夜分乃退上親祀南郊王言熈事慶成宜均惠于下詔賜民明年田租之半嶺北地寒不宜稼嵗饑賑以鈔無從糴王請轉京倉米百萬石貯和寕由是備先具而民不告病兩浙閩廣鹽額累増而課愈虧王請嵗減十萬引以紓亭户之力中政近臣謀發番舶規取息王言與商賈爭利恐逺夷得以窺中國事遂已日本海商百餘人遇風漂入髙麗表請沒入其人扵有司以為奴王以為天子一視同仁四方皆吾赤子豈可乘人之險以為利宜資其還上從之日本果上表稱謝無何日本有僧告其國遣人至京師刺探國事王曰刺探者在敵國固有之今六合一家何以刺探為果有其人正可令睹中國之盛歸告國人使知嚮慕旁觀稱嘆曰真天朝宰相之言也拜御史大夫務以静重持大體不為苛嬈以立聲威建言近嵗大臣獲罪重者族滅輕者猶籍其妻拏祖宗聖訓父子罪不相及請除其法上從之遂著為令飢民集扵輦下奏出贓罰鈔糴米萬石即近郊寺觀為糜以哺之所活不可數計居嵗餘復為平章政事進位次扵端揆大駕時巡留鎮大都舊法細民糴扵官倉出印劵月給之者其直斗三百文謂之紅貼米賦籌而給之盡三月止者其直斗五百文謂之散籌米豪民貪夫得買其籌貼以為利王請别發米二千萬石遣官坐市肆使人持五十文即得米一升姦弊遂絶民蒙其惠乞觧政柄不允拜錄軍國重事中書左丞相領經筵事王入則告上以帝王之道出則正紀綱修法度奏立内外通調之制朝臣外補許得陛辭上親臨遣責以成効郡邑賢能吏亦次第甄拔分海漕米四十萬石置㳂河諸倉以備凶荒先是朝廷患僧徒擁厚貲事兼并抑使與齊民均受役扵官柄國者右之法遂中變王奏復其舊延登故老俾預大議旁求遺逸待以不次之擢加孔子後嗣襲者秩二品嵗一冄詣國庠進諸生而奬勵之使士咸知勸王天性忠直學術正大剸裁庶務片言立决重輕予奪各適其宜上嘗問為治何先王對曰莫先扵法祖宗上因稱王文統為竒才而有不同時之歎王前奏曰世祖行仁義而文統輔以功利此所以為世祖之罪人也使文統復生扵今猶當逺之何足闗聖念乎盖王扵書無不讀尤喜聞儒先性理之説而明扵義利之辨相業之隆實基扵此從幸上京還入政事堂甫一日暴得危疾上命近臣挾名醫狎至疾已不可為以至正七年九月十八日薨年四十有六葬以其月二十六日上命有司護其葬仍給賻鈔二十五萬緡兩宮皇后及太子致賻有差王階至開府儀同三司勲至上柱國兼官為實保齊右手萬户左阿蘇親軍宣忠俄羅斯親軍都指揮使司逹嚕噶齊提調留守司武衛太醫院廣惠司寕徽寺事贈開誠濟美同徳翊衛功臣太師中書右丞相階勲皆如故追封冀寕王諡文忠配楚庫勒氏追封冀寕王夫人執政大臣言相位不可久虚上曰特穆爾逹實有兼人之才後難為繼朕當徐思之金山嘉鼐巴使者入見上顧謂知樞宻院昂吉爾曰特穆爾逹實籌邊事皆與朕意合斯人豈可復得哉因俛首太息不已按喀喇氏世譜雲中王之配邢國夫人生四子曰巴拜實喇曰哈齊濟贈推忠宣力保徳佐運秉義功臣太保開府儀同三司上柱國追封榮王諡忠武曰布斯必遥授甘肅行省右丞曰阿都瑪勒繼康國太夫人生二子一女二子則忠烈忠獻兩王也忠烈子男二長哈扎爾順寕府逹魯噶齊次伯嘉訥前尹京時平反海商被誣為盗者所活一百十六人累遷中政院使女一阿爾必斯黙色適上都兵馬都指揮使伊斯瑪音封雲中郡君孫男一托和齊女二忠獻子男九長巴圖仁虞都總管府逹嚕噶齊贈禮部尚書次即冀寕文忠王次伊蘇烏爾圖華同知樞密院事次逹實特穆爾嘗以平章政事行省江浙首行視忠獻所浚杭城便河而除治之父老多忠獻之遺民無不感泣入為大司農拜銀青榮禄大夫湖廣等處行中書省平章政事次哈達布哈次鄂爾和特穆爾皆早卒次圖烈太府太監次哈逹特穆爾大都副留守次旺嘉律同僉資正院事女八長哈逹和塔拉適衛王喀巴次特穆倫適禮部侍郎布哈次伊嚕勒適集賢大學士兼内史豐國公齊哩克次拜呼圖克適大宗正府伊克扎爾古齊吹斯丹多爾濟次策喇實戩適諸王曼濟次托克托倫適中書邢部侍郎巴拜托克托倫卒次保僧繼之次布爾罕呼喇早卒盖忠獻九子惟文忠及今湖廣行省平章政事薊國太夫人出也孫男十女七文忠之男二長巴圖爾襲領實保齊次天保努女三長拜徳濟適中政院判官三閭次諤勒哲徳濟適衛王子策喇實巴次徳濟伊蘇烏爾圖華之男一耨埒女缺逹實特穆爾之男一旺扎勒實哩女一招童圖烈之男二長夀安次某哈逹特穆爾之男二長萬次某女缺旺嘉律之男一博囉特穆爾曽孫男缺女缺巴圖爾之男二長圖嚕仁虞都總管府達嚕噶齊次諤勒哲特穆爾海口屯儲侍衛親軍都指揮使始忠獻嘗建書院于順寕宣平宮家莊之别墅賜額景賢後即其中為忠獻文忠兩祠堂春秋有事于先聖先師則侑食焉忠烈忠獻兩王異母兄之子孫惟榮忠武王之子雅克布琳雅布薩爾台拜布哈巴咱爾為最顯雅克布琳卒官遼陽行省平章政事太保興國公贈推誠效節佐運翊亮功臣太師開府儀同三司上柱國追封興寕王諡忠襄雅布薩爾台大司農拜布哈嶺北行省平章政事巴咱爾由御史大夫累遷江浙行省左丞相餘皆至大官莫得而殫紀也臣溍欽惟太祖皇帝肇基朔漠世祖皇帝統壹方夏溥天率土共惟帝臣傑出其間而膺國家之重任者固非一族有若喀喇氏之先老母弱子不絶如綫祖宗所以長育成就之以詒燕扵後人者天實佑之豈偶然哉一門三相豐功茂烈未易以筆舌擬諸形容今獨取其關扵宗社之安危民生之休戚者序次而顯詩之乃若今大司農之尊君親上好賢樂善發其素藴紹休前人珪傳組襲方興未艾屢書不一書是在後之秉史筆者銘曰山川出雲膚寸之微緜緜𤓰瓞天實培之猗康里氏家有賢母保其遺孤克開厥後有相之道俾熾而昌蟬聮奕葉四相六王相業之傳由忠烈始惟王忠獻厥績愈偉被堅執銳出從撫軍佩玉瓊琚入侍嚴宸塤箎伯仲股肱左右奔走後先獻替可否陽九之戹國有危疑民心靡止孰為龜蓍桓桓忠烈乃心帝室明炳㡬先不俟終日繼以忠獻載驅載馳風騰雲躍夾日以飛大憝廓清徳音布濩九廟尊安三宮悦豫天子有命忠獻是膺乃位弼輔以秉國成百度惟貞六服承徳寕有一夫不被其澤帝睠南服爰資保釐克勤小物靡有遐遺秉其忠貞夷險一節髙朗令終休有餘烈積慶儲祉畀扵文忠世濟其羙乘時奮庸紬書金匱談經旃厦堯舜其君貴王賤覇咨詢故老延登逸民量能授任内外惟均懐柔逺人務全國體威行惠孚無間逺邇埀紳正笏泰山四維天胡弗憗當宁興思大事之書厥有顯冊史臣奉詔表此幽穸江浙行中書省平章政事贈太傳安慶武襄王神道碑至正八年春正月二十日丁已詔贈故江浙等處行中書省平章政事伊蘇岱爾推忠宣力守正佐理功臣太傅開府儀同三司上柱國追封安慶王諡武襄扵是王之薨五十年矣皇上纉承鴻業追念舊勲不以存亡久近為間渙頒異數以照臨之甚盛徳也臣溍承乏詞林既推述聖意形諸賛書三月丁酉朔上復用中書奏勅臣溍考推功業勒兹樂石臣被命而退謹即王之孫今上都留守衮諾爾訪求王世系官閥行事之實序而銘之王元名特穆爾成宗御極避而易今諱曰伊蘇岱爾系出烏蘭哈逹氏其先曰哲勒黙生哈凖哈凖生哈巴爾扵王為曽大父有子二人曰哈勒琿曰蘇布特俱以驍勇善射稱哈勒琿則王之大父也以哈必齊百户事太祖皇帝哈巴爾嘗從太祖飲班珠爾河之水遇盗舉槍欲刺之為哈勒琿反鋒所刺人馬俱踣又嘗從太祖避奈曼追兵扵長城之南哈勒琿射却其渠帥餘衆夜自相驚而潰中原既定方論功行封不及禄而卒父曰哈坦太宗正府伊克扎爾古齊母曰某王生扵朔漠資禀雄毅沈重有謀讀書能知大意弱齡入侍世祖皇帝列職于環衛以忠議深被眷知蘇布特之孫是為丞相河南武定王阿珠受詔伐宋王扵武定為從弟武定察其材智絶人可為巳貳言扵上挾與俱行從武定破樊城下襄陽至元十一年世祖命丞相淮安忠武王巴延與武定大㑹師于襄陽分軍為三道並進忠武與武定由中道將濟江忠武宻謀扵武定為擣虚之計王從武定以昬時泝流行二十里夜半絶江徑渡黎明與宋將夏貴大戰陽羅堡㧞之遂取鄂州順流而東宋都督賈似道與大軍相拒扵丁家洲其前鋒孫虎臣來逆戰武定俾王乘髙覘之見其陣勢首尾横决以戰艦衝撃之似道先遁十三萬軍一時俱潰王從武定追奔逐北百五十里所至禁部曲不得侵暴敵人委棄資仗悉以與將士莫不畏其威懐其惠而樂扵趍事赴功十二年有旨行中書省駐建康行樞宻院駐鎮江别勅武定攻揚州武定俾王率蒙古軍鏖戰揚子橋出竒兵斷真州餫道宋將張世傑以巨舟萬餘艘屯揚子江中流王從武定領伉健善榖者夾射而急擊之繼以火矢灼其篷檣大敗世傑于焦山下自是宋人不復能軍凡大軍與宋人接戰王無不在行間十三年宋以國降十四年朝廷第功行賞授行中書省斷事官階懐逺大將軍十五年轉昭勇大將軍十六年除淮東道宣慰使遷鎮國上將軍奉省檄馳報邊事王謂機事不可不宻入對便殿出牘于懐上大竒之召近臣知文墨者使進讀而左右適無其人王拜而言曰臣亦粗知文墨乃誦其文而釋以譯語音吐明暢辭旨精切上悦令縱横行殿中而黙察之知為偉器諭宰臣俾與共政遂以參議中書省事它日奏事殿中問居何職王以實對上詰宰臣曰朕初意以為卿同列置之僚佐何耶二十二年丞相魯國忠武王安圖自北邊歸秉政為世祖言特穆爾蒙古人而扵漢人語言文字無所不通久淹下位宜升用之其言適契扵上意問居其上者為誰對曰叅政郭佑參議圖魯格貝降即日命為中奉大夫中書參知政事位郭佑上仍勅之曰自今事皆責成扵汝二十三年進資徳大夫中書左丞二十四年尚書省立拜榮禄大夫平章政事甫視政而宗王納延叛扈蹕親征給餉運籌備殫其勤既平納延羣臣從屬車奏凱而歸王復與諸將留兵討其餘黨金家努塔布台悉戡定之乃還上以王生事素薄賜鈔五千緡王因奏臣前出軍至伊竒喇斯之地有來供餽郷導者上命厚賞之二十七年武平地大震姦人乘灾異相扇摇藩王為其言所動者三人民大惶惑上慮納延之黨因而為變遣玊引兵五百人往撫定之王率有司齋沐禱于山川百神以便冝蠲田租弛商稅除酒禁發鈔四萬二千緡運米萬石轉海而至以賑其乏絶教民無惑扵訛言捕斬乘時為盗者無少貸收三藩王而鞫之始皆倔強不伏既得其情徐諭以禍福之重輕乃伏其辜事聞上甚韙之遼賜行省治懿州驛道自北京至上都頗迴逺王因奏請徙由髙州以北而減去五驛其三以備它驛人户物力之乏絶其二以𨽻虎賁司給土田牛具俾之立屯公私咸以為便方是時僧格在相位巳久專恣日甚誣陷忠良賣官鬻獄設計局以求遺利毒及編民王既還居政府乃列上其罪狀㑹侍從近臣亦有顯斥其姦者僧格及同惡皆誅死王以是益為上所親信某年拜江浙等處行中書省平章政事仍舊階榮禄大夫成宗皇帝以王先朝舊弼委任愈專江浙省治錢唐實宋之故都所統列郡民物殷盛國家經費之所從出而又外控島夷最為巨鎮非朝廷重臣莫克任蕃屏之寄王威望素著涖事伊始風采一新屬部帥守重足而立以俟要束權貴無或敢撓其政豪強震懾田里晏然大徳二年秋八月十九日以疾薨于位享年四十有五其年某月某日還葬于大都宛平縣郎山之原王性剛直而善扵自持雖異巳者莫能伺其間隙由是始卒無疵然喜汲引人物凡所甄拔後多知名王之配曰呼都克追封安慶王夫人子男三人曰呼喇岱江浙等處行中書省平章政事曰塔沁御史中丞曰茂巴爾斯南陽府逹嚕噶齊女一人曰茂海適翰林學士承旨都木逹孫男九人托音納爾陜西諸道行御史臺御史大夫努都爾噶同知都䕶府事衮諾爾由江浙等處行中書省平章政事擢江南諸道行御史臺御史中丞今以榮禄大夫為上都留守兼本路都總管府逹嚕噶齊某某某臣溍竊觀自昔君臣際㑹之盛或策勲扵行陣之間或訏謨于廟朝之上未始不各效其所長若王之出入將相豐功茂烈彌久益彰葢亦鮮矣是宜没而不亡克承天寵慶流後裔與國家相為無窮者也垂于竹帛被于弦歌光在邦家豈徒賁其丘隧而已乎銘曰氣運合一實生偉人惟材之完出武入文聖神御天誕受方國猶有江流限夫南北赫赫元戎上所倚毗仡仡虎臣左之右之潛師宵濟拔鞭勇徃訖成儶功光膺上賞乃居屏翰乃登廟廊身屬櫜鞬取彼叛王旄頭豹尾凱旋京闕分兵後拒剪其餘孽將指東藩假以便宜力止訛言俾民不迷權姦擅國簧鼓聖聽朝綱紊弛民不堪命白發其私靡所覆藏揚于大廷解弦易張肅持政柄坐鎮南服枹鼓不鳴家給人足庶遄其歸衮衣繡裳胡不憗遺奄其淪亡時逾四紀綿綿世胄咸濟其美賜履之舊瞻彼郎山有封斯崇生氣凜然拱木清風念舊報功褒美有詔申勅詞臣薦此碑號朝列大夫僉通政院事贈榮祿大夫河南江北等處行中書省平章政事柱國追封魯國公札拉爾公神道碑今上皇帝至正元年詔贈故朝列大夫僉通政院事伯勒格特穆爾為資善大夫河南江北等處行中書省右丞上䕶軍追封魯郡公八年加贈榮禄大夫河南江北等處行中書省平章政事柱國追封魯國公嗣子資政院使臣多爾濟巴勒與大司徒臣雅克布哈同侍上於經筵十年四月十九日上復用臣雅克布哈奏命翰林侍講學士臣溍銘其神道之碑别敕治書侍御史臣期頥篆其額以賜臣多爾濟巴勒使書而刻焉臣溍謹按史臣危素所述公行狀公諱伯勒格特穆爾系出札拉爾氏六世祖諱崆根果斡事太祖皇帝従征岱酬黙爾竒斯奈曼諸部奈曼已降而復畔徃討之太祖馬􅉵遂以己所乗馬奉太祖歩戰而死贈推忠效節保大佐運功臣太師開府儀同三司上柱國追封魯國王諡忠宣妣庫克追封魯國王夫人五世祖穆呼哩従太祖皇帝滅克哷王汗太祖既踐天位以為左萬户従破金入燕専征遼東西諸郡詔授太師國王都行省承制行事建牙于燕以經畧中原趙魏齊魯晉秦之地悉平贈體仁開國輔世佐命功臣太師開府儀同三司上柱國追封魯國王諡忠武妣布哈爾追封魯國王夫人髙祖諱博囉嗣國王奉太祖皇帝命帥師取西夏銀肅二州走武仙扵河北降李全扵山東贈純誠開濟保徳輔運功臣太師開府儀同三司上柱國追封魯國王諡忠定妣布濟克追封魯國王夫人曽祖諱蘇肯徹爾嗣國王従太宗皇帝攻鳯翔破宋兵扵河南攻宋棗陽入郢州贈宣忠同徳翊運守正功臣太師開府儀同三司上柱國追封魯國王諡忠烈妣某氏特黙呼圖克追封魯國王夫人祖諱納延性謙和而好學以賢能稱憲宗皇帝擇忠烈王諸子中可襲爵者深屬意焉力辭曰臣兄呼喇濟長上曰朕固知之恐其柔弱不勝重任耳叩頭涕泣卒請以王爵歸其兄而代之理軍國庶務呼喇濟嗣為國王事無鉅細必咨而後行居常誨羣従子姪曰昔我先太師國王躬擐甲胄出入矢石之間四十餘年乃集大功賞延後裔恩至渥也爾曹慎勿驕逸以隳前人之令名其敬戒之哉初世祖皇帝在潜邸與之論事敷陳大義多所開悟援引典故尤習上以為可大用因稱之曰色辰色辰者華言大賢也竟未及用而卒甚可悼焉今贈中奉大夫遼陽等處行中書省參知政事䕶軍追封魯郡公妣烏嚕氏蘇爾台追封魯郡夫人考諱碩徳世祖皇帝踐阼之初自遼西召入宿衛與語大恱顧謂近臣曰碩徳通敏如此乃燕有子矣命典朝儀宗藩戚里争訟弗决者必使決之咸服其公正上嘗問右丞相魯國忠憲王曰卿族中可繼卿者為誰對曰性行淳雅智辨明正無踰碩徳上深然之㑹始建通政院即命以嘉議大夫同知院事考地里之逺近以立傳置差民力之髙下以賦財用一日所奏數事無不聽納因言遼陽女真之東沃濟濟喇敏二族之人數入㓂内地宜遣親臣設驛以通之上難其人僉言碩徳元勲世胄識慮深長可使也上恐其憚扵行召問之對曰先臣當國家肇造之初不避鋒刃萬死一生以身狥國陛下不以臣年少愚戇俾效驅䇿臣請行上喜賜御宴對衣以遣之女真舊土有碩逹勒逹萬户府兵民乏食廷議賑以衣糧有司廢格不下羣訴于公令追所侵匿以給之人賴以全者甚衆東征元帥府道路險阻巖石錯立盛夏水活乃可行舟冬則以犬駕杷行氷上地無禾黍以魚代食乃為相山川形勢除道以通徃来人以為便沃濟濟喇敏僻居海島不知禮義而鎮守之者撫御乖方因以致㓂乃檄諸萬户列壁近地據其要衝使諭之曰朝廷為汝等逺人不霑教化自作弗靖故遣使来切責有司而存恤汝等令安其生業苟能改過遷善則為聖世之良民否則盡誅無赦由是脅従者皆降遁于島中者則遣招之第戮其渠魁餘無所問宋之朝士有以使事留京師而不肯易其衣冠者坐徙開元適與之遇為言扵上得自便後更見識擢為文學侍從之臣還朝上勞之曰碩徳不血一刃而使一方遂安不負朕所委任矣賜玊笠頂連珠束帶且曰他日思所以處卿也扈駕親征乃顔戰屢捷所俘獲輒以賜之宗王居西域者有異謀上聞之召問曰卿東行甫還得無勞乎然非卿孰可為朕使西方者對曰臣不佞幸以勲閥之裔為國世臣邉陲重事故當任責賴陛下威靈東土之民今已馴化願備一介之使宣布徳意扵西人上尤喜賜宴加幣以餞如東使時西域知其世家子又聞其賢迎勞愈恭乃諭宻㫖為道太祖聖訓及前賢之嘉言詳明激切發扵至誠咸歎服曰真天使也既還中道屬疾有㫖趣之入見問以西事奏對甚悉上顧左右曰汝輩苟出使當以碩徳為法特賜珠濟遜衣以旌之疾竟不起今贈推忠宣恵寧逺功臣中奉大夫遼陽等處行中書省參知政事䕶軍追封魯郡公諡忠敏加贈資善大夫嶺北等處行中書省右丞上䕶軍功號封諡如故先是嘗獲玉璽其文曰受命于天既夀永昌盖厯代所寳傳國璽也疾亟未及上獻夫人鴻吉哩氏托克托津因御史中丞崔公彧以進于徽仁裕聖皇后既而成宗皇帝入繼大統以為兹實受命之符厚賚焉今追封魯郡夫人公蚤孤太夫人教以國書有㣲過必責之輒欣然而改刻意扵學孜孜不倦甫成童太夫人有疾衣不解帶者旬月藥必親嘗成宗遣尚醫視之或言昔人有刲股療親疾者公聞之則退詣私室刲肉七臠以和藥疾愈公丰姿凝粹而器量宏達嘗燕客家僮滌玉杯誤墮地而碎坐客驚視而公神色自若衆莫不嘆服逮事仁宗皇帝眷遇尤渥擢居通政俾世父官上嘗問周文王父母及其所以興侍臣未有對者公言之甚詳上為之俯聽賜以巵酒奨諭之曰卿蒙古人中儒者也公扵先世所分食邑平其徭役而恤其貧乏在官恒以律身報國為務論議可否不避嫌疑居五年而終于位公生扵至元二十三年某月某日薨於延祐四年閏月某日享年三十有二訃聞上當宁而嘆曰天胡奪予良臣之遽也命賻以鈔萬五千貫仍降璽書存䕶其家公先塋在興和遼陽道逺弗克以昭穆序葬遂以其年三月某日奉柩葬檀州仁豐鄉潮水西呉嘉㑹配阿爾拉氏布圖庫黙色追封魯郡夫人加封魯國夫人子男一人多爾濟巴勒公殁時方在襁褓中既長力學自立由尚衣奉御授工部郎中遷太府少監擢監察御史入奎章閣厯供奉承制侍書學士遂為翰林學士遷大宗正府伊克扎爾古齊出為江北淮東道肅政亷訪使江南行御史臺治書侍御史江西行中書省左丞入為資正院使拜中書省參知政事進右丞遷御史中丞改江南行御史臺御史中丞拜遼陽行中書省平章政事以太常禮儀院使召遷中政院使今為榮禄大夫資正院使提調宣文閣知經筵事兼虎符海西遼東道哈斯罕等處打捕鷹房齊哩克昆萬户府達嚕噶齊提調拱衛司事女二人長適遜多氏實哩由裕宗皇帝位下集賽官為資善大夫同知徽政院事其先曰齊拉衮與忠武王同事太祖號四傑者也次適頁穆氏博囉特穆爾朝散大夫同僉太常禮儀院事孫男三人特古斯特穆爾圗沁特穆爾呼都克布哈臣溍竊觀自昔受命之君必有不世出之臣任股肱心膂之寄以弼成大業故其子孫能與太平守文之主共天下之福惟扎拉爾氏有大功於帝室世享王封大㕘始敦行禮讓而不敢先其兄右轄辨章之世其官又止扵一命由其有而不居故其積也愈厚餘慶所鍾在于後人是故資正公以清忠粹徳昭受上知致位一品疏恩三世兹又賜以碑號昭示罔極幽光潜徳闇然日章久欝必發理之常也臣溍鄙陋荒落不能敷揚聖意褒大遺烈承詔書辭無任戰栗銘曰天啓興運篤生元臣勲在盟府慶流後昆於穆魯公逺有系序四世五王逮公大父遺榮弗居以奉其兄不世其爵世其忠貞傳子及孫乃躋膴仕守夫一官再世不徙公少恱學以至孝稱淵乎雅度喜愠不形材諝則多小試輒効人方傒公謀謨廊廟嗇不使平遽以考終委祉後賢大亢其宗寵靈所加襚以衮職刻宻為章告于𤣥宅有開其先自王而公有復其始履兹故封申錫頌辭用垂不朽河山之誓相為永久宣徽使太保定國忠亮公神道碑故榮禄大夫宣徽使逹實宻以延祐四年九月五日薨于位享年六十越三日葬于京城東杜樹辛莊其明年制贈推誠定力守正功臣太保金紫光禄大夫上柱國追封定國公諡忠亮又六年史臣禮部尚書曹元用始奉敕撰次公行業以為神道之碑又二十四年是為今天子至正八年夏四月九日上御興聖殿西便殿翰林學士承㫖臣岳柱為奏請命臣溍繼元用為之銘以賜其家俾刻焉謹按公諱逹實宻其先西域人系出哈喇婁氏曽祖瑪穆特贈集賢學士正奉大夫䕶軍追封中山郡公祖阿里贈資徳大夫司農卿上䕶軍追封中山郡公父哈濟贈榮禄大夫司徒柱國追封定國公曽祖妣塔塔爾氏祖妣囬回氏並中山郡夫人妣阿爾徳哷濟達氏定國夫人初集賢公在西域為其國之近臣素倜儻有大志知天命之有歸當太祖皇帝正大位之六年嵗在辛未奉其國主阿爾斯蘭来覲于龍居河司農公前卒乃以司徒公為質子時年尚㓜上命育于春坊稍長事太宗皇帝為博囉齊博囉齊盖古内饔之職最為親宻司徒公以恭謹尤被寵遇扈従西征有功妻以河西貴族定國夫人也世祖皇帝取南詔伐宋司徒公皆與在行尋以疾文公少襲父職為博囉齊世祖甚愛重之甞侍上左右極論阿哈瑪特尚書省之政蠧國病民上怒而斥之曰無預若事公徐對曰犬馬知報其主臣世荷國恩事有闗扵治亂安敢坐視而不言其後阿哈瑪特死尚書省罷上乃思其直賜以玉環及鈔二千五百緡且諭㫖後有所知其盡言無諱従討叛王納延有功妻以名族女塔塔爾氏仍賜良馬白金佩服珍異之物杭愛之役督餉餽扵雲中晉王軍乏食給以米數千石師還以専擅待罪上善其有識量而知權變嘉歎不已賜白金百兩鈔千五百緡公因奏草青畜肥之日尚賖今所給未充恐終不免轉死請増給以半年之食上従之衆賴以安㑹復立尚書省公以前有㫖得盡言遂指陳其非便言尤剴切暨僧格伏誅而其言皆驗詔賜宅一區固辭乃賜玉環及燕服以旌其忠禮遇之厚有加扵前成宗臨御之初以奉議大夫領供膳司事叛王海都稱兵内向車駕親征倍道兼行晝夜不息士卒已疲而後軍不繼公諌曰獨徃恐生他虞宜徐行俟衆大集而後進乃可為萬全之䇿上韙其言後數日戰大捷海都敗走凱旋而歸第功行賞賜以田三百畆㝷擢司農丞進職為卿與其子瑪努勒侍上疾扵卧内連數月衣不解帶疾少間賜以鈔二萬五千緍成宗賔天公北迓武宗皇帝於野馬川歸正宸極仁宗在儲闈以公先朝舊人奏為中書參知政事仍兼司農卿賜以金帶犀帶七寳笠珠帽珠衣金五十兩田二千畆仁宗踐阼首命僉宣徽院事同列以出納不謹陷扵私罪公獨不汙其事仍充舊職厯副使同知院事遂為其院使累階榮禄大夫甞侍坐侑食問以典故従容奏對委曲詳盡深稱上㫖賜三帶海東白鶻且命國工為之繪像其取重如此俄以疾不能朝遣尚醫診視竟不可為臨終告其諸子曰人之隕其世業者必自貪與奢始汝等能兢兢自持不苟取不妄用恒以忠君報國尊祖睦族為念吾死無憾矣語畢而逝公持身介潔寛厚愛人輕財樂施人有忿争構怨得一言莫不為之釋然咸稱其長者元配納蘇瑪勒氏婦徳母儀族黨稱焉生三子一女前公二十九年卒封定國夫人繼室即世祖所賜塔塔爾氏尤篤扵慈愛視三子如已出亦封定國夫人子男三人長瑪努勒累官河南江北等處行中書省平章政事今以翰林學士承㫖榮禄大夫致仕次實都資善大夫上都留守兼本路都總管府達嚕噶齊後公十八年卒次竒納資善大夫同知宣徽院事孫男六人伊埒岱爾闌遺少監噶必齊同知河東都轉運鹽使司事某某某某曽孫男八人臣溍奉詔書詞謹悉取前史臣所述公平生大槩備著之而申之以銘于以昭示聖天子之追録舊功不以久近為間百世之下何日而忘之哉銘曰惟皇建極立賢無方左右侍従咸懐忠良猗歟定公啓家西域肇自髙曽歸于有徳奉其所事共惟帝臣荷天之寵傳及子孫逮公而昌懐材自奮出従征伐入陪顧問宻勿告猷連拄大姦不以所長守夫一官乃位列卿乃居政路乃賛國徽綴班台輔身後之榮赫其龍光惟帝念功雖逺弗忘屬辭比事儒臣之職是不一書薦以新刻遼陽等處行中書省左丞額琳沁公神道碑故遼陽行省左丞額琳沁以至正七年冬十月二十有二日薨于位年五十有二訃聞天子為之嗟悼不已知樞宻院臣婁章額琳沁之弟適宿衛禁中上弔慰之詔有司䕶送其䘮還葬遂以八年春三月二十有四日葬于真定欒城先塋之次而神道之碑久未有銘其年冬十月十有二日上御明仁殿樞宻臣僚入對殿中知院事昂吉爾臣呼遜臣額森特穆爾等皆婁章之同列乃代為奏請上既可其奏遂傳㫖翰林命侍講學士臣溍為文學士承㫖臣起巖書丹别敕禮部尚書臣台哈布哈篆其額臣溍謹按公諱額琳沁輝和爾人上世為其國之君長國中有两樹合而生癭剖其癭得五嬰兒四兒死而第五兒獨存以為神異而敬事之因妻以女而讓以國約為世緍而秉其國政其國主即今髙昌王之所自出也公五世祖之官為徳濟必里克呼圖克譯言智福大相也四世祖蘇爾約蘇托果琳之官為烏嚕諤齊譯言大臣也父子俱従其國主来歸于我太祖皇帝蘇爾約蘇托果琳尤見親幸未嘗輒去左右従西征有功令侍睿宗皇帝扵藩邸莊聖皇后子事之以為斷事官真定睿宗分地遂以為達嚕噶齊俾世襲其職曽祖諱巴勒丹銀青榮禄大夫大司徒祖諱琳沁事世祖皇帝為榮禄大夫中書平章政事考諱察納事仁宗皇帝為金紫光禄大夫陕西行御史臺御史大夫至治中入為通政使用新制換榮禄大夫泰定間終扵光禄大夫中書平章政事公㓜敏慧不喜與羣兒狎長者偶見其飲酒責之曰是兒少嗜飲他日可覲其成立乎公聞之即絶飲而深自飭厲年逾二十為英宗皇帝御位下筆且齊泰定初為内八府宰相髙麗嗣王阿南逹實哩既襲位其従父弟諤勒哲圖愬于上曰我父兄也彼父弟也鳥得為王阿南逹實哩来朝遂留弗遣而收其印章至是有㫖命公以阿南逹實哩復國公具宣徳意以告其人闔境之内無不恱服初公弟婁章従明宗皇帝北狩間闗虎口調䕶聖躬親幸無與比大駕還自朔漠公與一二人臣奉皇帝璽綬逺迓于格根察罕上大恱奬諭之曰卿祖父克有勲烈兄弟備殫勤勞忠孝萃扵一門惟子一人汝嘉即除翰林學士資善大夫蒙古教官之選壅滯已久俾幕僚閲其牘而一清之故事藩王入朝従翰林求進止餽遺交錯悉拒弗受遣使諸王必慎擇其人未甞辱命今天子嗣位之初擢資政大夫河東山西道肅政亷訪使召還除通政院使奉詔廵視驛傳公不憚險逺厯實喇哈斯達巴抵鴻和爾穆稜之地事有當更革隨宜處置人咸便之大同東勝州之呉欒永興焉牛三驛牧馬草地為諸人所侵冒訟久弗決公被㫖按問得其實十二鄉之人百有餘家冒耕其地已十六七年一旦同聲辭服願返所侵地公為正其經界而緩其厯年之租賦公家三世領通政院事每以扶殘拯弊為務遇灾沴必奏請加恤之後使者或牽扵勢而不能行其所欲為皆歎服曰非琳沁平章子孫世其官不可也感公徳者相與樹碑扵欒陽驛以頌羙焉遷山東東西道宣慰使鈔法之不通鹽法之為民害者悉建白而更張之嵗旱有禱輒應形於歌謡事聞有詔奨諭俾仍舊職而升其位序扵帥座之首未㡬淮潁羣盗竊發鄰郡騷然沂莒滕嶧四州當其衝民被害尤酷上命公捕治之時同僚悉移疾避去公獨任閫事使至即行不宿命扵家若豫備然宣靖王㝷遣集賽台十人與諸郡兵来従至邳州境内遇海寧賊兵二百官軍皆解散公僅與十二人當其首賊且擊且射賦衆披靡追奔逐北十餘里斬首七十餘級其黨皆創殘而潰公亦以矢盡回沂州收兵復出徃来逐捕殺獲不可數計俄拜遼陽等處行中書省左丞公曰代者未至我安可辭其責諜知盗在膠州整兵行至沂水而代者至乃還後人賴公區畫素定故不勞餘力而掃除其遺孽遼陽久不雨民聞公至曰是在山東能致雨者吾屬無憂矣公視事之日梁應禱而雨民饑則為之設法以勸分薄闗市之征以通商旅米價頓平人無艱食之患公才智出扵天性操守得扵家傳遇事立決嚴不失扵苛寛不失扵縦所至有聲在遼東三年鎮之以静識者以為得大臣體遽以一疾不起人尤痛傷焉夫人布延金貴族完顔氏陕西行中書省右丞嘉琿逹之女累封范陽郡夫人柔嘉貞順克盡婦道見稱于姻族公兄弟十人兄曰班布爾實中奉大夫河東山西道宣慰使曰羅和弟曰婁章光禄大夫知樞宻院事曰楚多爾中奉大夫真定路總管府達嚕噶齊曰訥哷圖資善大夫宫傅曰達爾罕曰羅羅中奉大夫江東建康道肅政亷訪使曰實默圖缺大夫中書叅知政事曰巴延特穆爾朝散大夫光禄少卿班布爾實羅和達爾罕羅羅皆前卒夫人以公䘮至知院公率諸弟逆于通州而葬扵京城南佛舍摧慕號泣哀動路人其既葬也夫人自真定使来告于知院公曰兹幸獲襄大事而公殁無遺𦙍恐其行能勞烈久遂湮没盍思所以圖其不朽扵是知院公諗于僚友以聞夫人可謂賢有識矣龍光下賁炳耀泉壤公其庶㡬無憾矣乎銘曰聖神受命萬邦来同羣才雲合咸在彀中惟公之先夙陪禁近地官之貴疏榮一品積慶所鍾篤生後賢再世辨章相業是傳公方盛年峻躋内相升華文苑為時雅望出持使節風采振揚昭宣皇度肅政官常奉貢修職布徳施令傳置所達國之大政總以専使患夫才難夫孰如公克世其官来旬来宣保兹東土潢池弄兵公奮厥武以寡敵衆莫我敢嬰餘威所加氛祲廓清簡在上衷進位丞弼殿于大藩民用寧壹盍遄其歸使秉事樞奄其逝矣當宁欷歔公不有子公多兄弟承詔勒銘垂示無止資徳大夫陕西諸道行御史臺御史中丞董公神道碑故陕西諸道行御史臺御史中丞董公既殁且葬二十年而墓隧之石未有刻辭至正十年夏四月九日皇帝御興聖殿東便殿治書侍御史臣羅羅奏請命翰林侍講學士臣溍為之銘資政院使臣多爾濟巴勒書其文治書侍御史臣期頥篆其額以賜焉臣溍謹按公諱士恭字肅卿姓董氏真定之藁城人贈光禄大夫大司徒趙國宣懿公諱昕公曽祖考也龍虎衛上将軍監軍右副元帥知中山府事贈推忠翊運効節功臣太傅開府儀同三司上柱國趙國忠烈公諱俊公祖考也資徳大夫典瑞卿僉樞宻院事贈體仁保徳佐運功臣太師開府儀同三司上柱國趙國正獻公諱文忠公考也妣顧氏趙國夫人公生而端重確實人末嘗見其嬉笑狎昵正獻公薨世祖皇帝甚悼惜之召見其諸子公年甫十三従長兄清獻公士珍至上前命返徃行于庭中見其氣宇凝粹正色斂容周旋中度大竒之自是出入禁闥無間問曽學射否對曰陛下統一四海功成治定無事扵武况漢人挟兵有禁故臣於弓矢之事未之學也上頋左右曰其父祖扵國家有大勲勞非他漢人比即賜以弓矢仍命董氏之族悉弛其禁公既長入備宿衛為尚奉御従成宗皇帝至賽音布拉克方俾道流設黄籙大醮以公純誠恭謹命領其事及代祀嶽瀆復命稱㫖益被奨眷忠烈公九子正獻次居八世祖恒呼之曰八哥而不名正獻五子公最㓜成宗見公如見正獻因以察罕八哥呼之其見親禮如此大徳九年特授奉議大夫典瑞少監十一年有位公下者中書奏升為太監上怒曰董少監本居上乃不升何耶特命升太監進階正議大夫公再辭而後就職宫車宴駕親王有覬覦神器者亟欲得符璽公横身堅守至廢寝食仁宗入平内難公奉御寳以進詢其姓名以父名對仁宗大恱俾司舊職武宗皇帝既正大統賜以黄金帶以旌其忠至大元年典瑞升為院即拜公中奉大夫同知典瑞院事二年有𠡠樹碑先塋賜以鈔十萬緍辭至再三止受其半訖事悉分其餘扵親鄰一毫不以他用四年出為江南諸道行御史䑓侍御史處事務舉大綱不為苛細人服其知體仁宗嗣位皇慶二年典瑞為監如故圖任舊人無以易公乃拜公資徳大夫典瑞卿俾僚幕佩金字圓牌馳驛敦請公既至適有皇族位公下者公辭曰臣以庸陋尸位惶恐未安矧敢居宗室之上乎願處其下上坐寢殿遣中使促之曰朕以卿勲舊之子故兹委任其毋多讓待卿署事然後視朝公不得已乃拜命入謝上嘉奨曰老成君子也嘗問民間所疾苦以薄斂省刑對問臣子之道以忠孝對由是愈見信任清獻公薨扵開平特給乗傳俾公䕶䘮還葬盖異數也延祐二年復立陕西諸道行御史臺以公為侍御史王曰董士恭忠勤篤實宜加升擢乃以公為御史中丞太師阿斯罕以丞相行省陕西嘗有㫖命之迎接便服不拜俄一日詔下肩輿登堂北面而坐衆皆惡其無禮而畏其勢燄無敢以為言者公厲聲曰天子憐公以足疾賜公便服不拜而已今坐扵堂上而使衆官具公服羅拜扵堂下不敬孰甚焉叱左右去其肩輿明日諸察官踵門謝曰微公一言紀綱墜矣我曹誠可愧既而有以尸位自劾者嵗大旱公齋沐潜禱于九龍池而雨嵗即大熟俄謝病而歸僚屬追至灞橋遮留之公不為止皆垂泣而還累擢河北河南江北淮東兩道亷訪使俱不赴優㳺田里杜門謝客與世相忘十五年如一日雖家事一無所問嘗語所親曰吾渉厯官途東馳西騖不遑寧處今幸獲役閑以詩書教子孫而樂餘年平生之願也竟不復出而以考終公生扵至元十五年三月三日卒扵至順元年三月三日享年五十有三以其月十五日葬扵藁城九門先塋之次娶張氏中書左丞贈太師忠宣公文謙公之女封某夫人前十年卒繼喬氏封某夫人子男二人長守讓大中大夫東昌路總管次守訓缺大夫中書工部司程女三人長適劉文鐸次適武衛親軍都指揮使鄭某次適廣東道宣慰使司都元帥府都事蘇樞孫男二人錞鍷女二人公質貎魁竒性度坦夷慎威儀寡言語以謙退自處而臨事善㫁識見過人平生不登權貴人之門上眷雖渥未老而休人莫不歎慕之而公初不自以為髙也臣溍忝以非才承乏執筆𨽻太史氏頃嵗被㫖纂脩功臣傳董氏一門豐功盛烈見扵登載者皆幸與聞兹又承詔嗣為公碑考公平生制行詩所謂好是正直書所謂世篤忠貞易所謂謙謙君子盖兼之矣冝其光膺眷倚為國親臣勲徳之著至扵久而人不能忘也顧鄙陋衰朽莫能上副聖天子寵嘉老成之意稽首獻文無任戰慄銘曰董氏之先世著勲庸蟬聫四葉逮于公躬公生相閥蚤有令聞従容入對弗極于進陟降左右日侍燕閒命以典瑞實惟世官國有危疑保其重器完歸于上靡容窺伺人惟求舊由監而卿温其天語褒以老成公居外䑓肅持風紀昭受主知遂長御史重臣貴倨人莫敢言公顯斥之朝廷乃尊奉身而退時止則止洊頒使節公不為起深居獨樂十有五年委順而化式歸其全史臣勒銘朂爾後嗣敬承天休世濟其羙御史中丞贈推誠佐治濟羙功臣榮禄大夫河南江北等處行中書省平章政事柱國追封兾國公諡忠肅董公神道碑至正八年春二月制贈故御史中丞董公守簡推誠佐治濟羙功臣榮禄大夫河南江北等處行中書省平章政事柱國追封冀國公諡忠肅中書宰臣既奉制付外施行夏四月丙子復奏請并賜以神道之碑上可其奏敕翰林直學士臣溍為之銘河南江北行中書省左丞臣守誠禮部尚書臣期頥書篆以賜焉臣溍頓首受命而退公兄子太常禮儀院判官鑰以其孤鎧祥事未畢代為奉集賢侍講學士蘓天爵所述行狀授溍曰請以備采擇臣溍謹按董氏世居真定之藁城公諱守簡字子敬曽祖諱俊龍虎衛上将軍右副元帥知中山府事贈推忠翊運効節功臣太傅開府儀同三司上柱國追封趙國公諡忠烈祖諱文忠資徳大夫典瑞卿僉書樞宻院事贈體仁保徳佐運功臣太師開府儀同三司上柱國追封趙國公諡正獻考諱士珍資政大夫御史中丞贈純誠肅政功臣太傅開府儀同三司上柱國追封趙國公諡清獻三世並有傳在國史曽祖妣李氏祖妣顧氏妣柴氏俱従封趙國夫人公年甫弱冠入偹宿衛克遵祖父之訓畨直不踰晷刻歩武必中尺度仁宗皇帝察其忠謹特命為集賢侍讀學士公辭曰臣幸以家世之舊給事内廷臣之學行猶不及臣兄守中况國家肇置集賢資其徳義以輔翼聖明臣實不足當其選上曰朕素知卿家法崇謙讓今為卿成之公兄方官扵典瑞乃特遷之集賢而授公朝列大夫僉典瑞院事以代其兄官長有善謔者見公舉止端重數為俚語以誚之上曰董僉院儒者勿嫚侮也上嘗賜公以真徳秀所著大學衍義時承平多暇近侍間進以酒公因引衍義之説以諫上嘉納焉英宗皇帝嗣位禁衛周宻非元勲貴戚不得入見獨公出入無間一日上問卿平居何好何習亦善射乎對曰臣聞諸父師曰為臣當盡忠為子當盡孝竊好其意患未之能習弓矢之事雖甞習之非所好也上恱有名駞良馬錦幣之賜公奉詔禱祠秦蜀山川而還上問来何遲對曰道經陕西見民多飢死移文行省開倉廩以賑之故来也後然不能無専擅之罪上曰卿朕之汲黯也亟加賞賚眷遇彌渥丐外遷嘉議大夫淮安路總管為治務以平易近民而民自不能欺土豪或挟其黨與恣為暴横公痛繩以法民乃獲安嵗大旱條列荒政便宜驛聞未及俟報首以禄廪倡僚屬及富家捐錢出粟土著之人則給以錢使不失其業旁郡流移而至者則為粥以食之慮衆之所聚易生疫癘則處以閑曠髙爽之地死則收瘞焉既而朝廷講救荒之政下令募民入粟補官公益得盡其心而不憂扵用之不繼職田皆棄弗取曰吾為天子牧民寧忍坐視其飢而獨飽乎䢴溝水涸運道弗通發官帑僦工䟽浚之因使貧民得食其力公私咸以為便既而水旱相仍有禱輒應民以免扵捐瘠未㡬徙汴梁總管郡人挽留不得行單騎由他道而去汴梁為大河以南一都㑹事至叢劇公操約馭詳廷無留訟齊人官于汴而不返者有弟利其家貲迫寡嫂破冡出其柩歸葬扵鄉嫂弗欲而莫能止也則匿其夫遺骨之一體弟訴之弟下嫂于獄鄰有豪家覬以賤價得其田宅乃共賄獄卒殺其嫂而以病死聞公探得其情事乃白弟及豪家獄卒皆論死宛丘有惡少為宗族閭里害其同黨乗衆怒殺之而誘其妻以迯事覺有司逮惡少族人當以殺人之罪公閲其牘詰吏曰惡少既死其妻安在吏不能對乃捕其黨及所誘妻至則一訊具服遂釋其族人汴人以為神明公治兩郡所至必大興學校以化民不徒善綜理庻務而已擢海北海南亷訪使廣西徭人竊發不時官軍莫能制徒侵暴居人湖湘間尤困扵飛芻輓粟民無寧嵗公劾罷其總兵官行省左丞諸軍肅然用命其地悉平遷江淮財賦都總管或疑公有不屑為公恪共其職無少憚人乃知公未易淺窺也擢江東亷訪使以疾告歸居無何召為大都路都總管兼大興尹辭不赴特遣中使賜以上樽強起之既入見上面諭曰朕深知卿淮安汴梁之政京師雖浩穰以卿之才為之無難也輦轂之下豪右多挟勢以撓法有犯者公一無所貸威聲大振聞者無不震讋期月而政成除樞宻院判官擢山東亷訪使未行拜中奉大夫陕西行中書省叅知政事以疾辭擢浙西亷訪使召除侍御史拜資善大夫湖廣行中書省左丞俄改拜江南行御史䑓御史中丞先是創建龍翔集慶寺雜取土田器物之籍扵官者以給之故平章政事張蔡公别業以𨽻焉被㫖復以歸于張氏有司猶豫觀望弗即奉行公既至立命歸之召還拜御史中丞用人但取其忠實惡以訐為直以察為明不動聲色而保完正氣其識量逺矣居數月拜中書左丞公力辭曰臣以非才忝備官使受任以来夙夜戰兢恒恐隳祖父之遺業而負國家之至恩况中書出治之本丞轄列於執政何敢貪冒寵榮而不自揆乎上曰此朕志素定卿其勉思報効可也公既視事以畿甸之民阻飢白于丞相出京倉粟二十萬石下其直以濟之慮四方之逺耳目有所不及則遣官分道撫問而存恤之時宰執惟公為漢人畫禦灾之䇿至忘寝食形容為之枯槁新進士當授官而銓曹言恐礙入粟補官者公曰朝廷下詔求賢将以為公卿大夫之儲苟急扵彼而緩扵此人将以獻䇿不如獻粟為口實而貽笑扵天下後世矣衆無以對乃授進士官如故事有司患盜欲重其法公曰民貧故為盗不求所以使之不為盗而淫刑以逞豈善政乎或謂頃嵗汴人搆亂首惡固已伏誅而連坐者獄猶未竟此盗所以滋也公曰罪人已得州縣奉行文書容有不能辨其真偽者非可盡以首従論且事在赦前豈可使國家失信扵人而無以安反側乎當坐者百餘人皆釋不問以左丞知經筵事仍總裁遼金元三史及三史成公自中書奏上之未㡬復拜御史中丞進階榮禄大夫公援舊比固辭上再三勉諭乃拜受至正六年夏四月大駕時廵上京公扈従至幄殿上解御服以賜命居大都留䑓五月庚子以疾薨于位享年五十有五臨終告其子鎧曰我在中書時皇上賜以先清獻公神道之碑而久未及刻我死汝亟為之言訖而逝訃聞上為之震悼賻以鈔二萬五千緡仍令有司䕶視其歸葬遂以六月癸酉葬藁城九門之東髙里先塋公資禀沈毅履行淳篤生将相家而未始豢扵貴驕清獻公家法素嚴公居侍旁循循雅飭早渉書傳不煩師授而大意已瞭然心目之間盖其所養與草茅凢下固自不侔也忠烈家庭之訓曰吾少遭多難長遇明時樹立勲名皆朝廷聖徳神功之所及今老矣無能為也汝等當思亷慎不欺以報國家或以貪墨敗官則非吾子孫死亦不得従葬先兆宜謹識之公佩服不敢忘故居官以清白著聞家無留貲僅蓄書數萬卷俸禄不侈扵自奉惟䘮祭則致其豐待宗族羣従以恩吉凶皆有所給教子必延名師里中孤寒之子亦使就學接公卿士庶咸有禮度故殁之日無貴賤少長莫不痛惜焉公娶烏氏國朝名士沖之女於經史無不通動必協扵閫範累封趙國夫人子男二人長鉞内供奉見謂能稱其家不幸前卒次即鎧好學而有立當用廕補官未命女二長適秘書監丞鄭鄈次適崇福司丞張某若稽古昔帝王之興必有豪傑起而應之率資其力以成大業至於第功行賞剖符受封傳子及孫保其世禄重侯累将未為乏人若夫異材間出繼世象賢秉忠懐誠以承休徳書于史䇿號曰名臣求之近世如董氏一門者未見其比也當金之末造忠烈公灼知天命擁衆来歸與金人戰死濉水上而金亦㝷滅其後正獻公與其伯兄忠獻公文炳仲兄忠穆公文用俱以勲臣子従征雲南又従伐宋濟江而還暨再出師忠獻遂與丞相淮王巴延同取宋而定天下于一際時承平忠穆既以耆徳元老總䑓綱掌帝制正獻復以上所親信入尚符寳由郎而卿逾二十年子孫世嗣其職而公在典瑞厯兩朝不遷他官御史中丞位望尤為尊重自忠穆至公父子兄弟居是官者六人可不謂昭代衣冠盛事乎江漢之詩曰無曰予小子召公是似肇敏戎公用錫爾祉公正色立朝始終一節増光前烈形于賛書天子之命公與宣王之命召虎殆無以異公雖死猶生也臣溍鈆槧末學固不敢竊自附扵大雅之詩人欽承詔㫖序次本末抑亦庶㡬無媿辭者矣銘曰世其家者雖古或希顯允董氏有之似之天造方新聖作物覩豪傑之興克歸真主篤生後賢卒其伐功皇靈所加四方来同河山帶礪勲在盟府正笏垂紳以文易武逮公父子遺烈是承翊扶熈運保其盈成公滋益恭委蛇進退陟降左右踐敡中外菟符龍節未究所施乃預樞莞乃佐宰司乃長御史整齊憲度峻陟崇階丕昭異數一鑑之亡哀動帝宸拊髀曰嘻茲予世臣錫之宻章下賁𤣥宅申以頌詞樹此貞石翰林侍講學士中奉大夫知制誥同修國史同知經筵事追封豫章郡公諡文安揭公神道碑至正七年夏四月辛夘皇帝時廵上京秋七月丙戌御慈仁殿文學侍從之臣咸就列以備頋問當宁憫焉興念舊人以故翰林侍講學士揭傒斯神道之碑未立俾同知樞密院事臣世傑班傳詔于學士承㫖臣岳柱命直學士臣溍為之文仍勑河南江北等處行中書省左丞臣守誠禮部尚書臣期頥書篆以賜焉臣溍蒙恩起自休退懼志慮之凋落無能發揚聖天子敬故尊賢之意承命震惕莫知所為然竊自念忝以詞臣執筆𨽻太史氏不敢控辭謹按前脩撰劉聞所上容䑓之狀及前學士承㫖歐陽𤣥所為幽堂之銘公諱傒斯字曼碩掲之得姓出扵楚司掲氏者以官出扵漢安道侯掲陽定者以邑出扵漢陽信侯劉掲者以名唐末有為檢校尚書左僕射使持節袁州諸軍事守袁州刺史者曰鎮始家于袁與居盱江者曰瑱居豫章者曰稹同祖司掲而言姓氏者或謂當祖安道侯汝寧之族則又别祖陽信世逺譜軼莫得而詳公扵稹為缺世孫占籍豫章之豐城豐城今富州也自曽祖光朝而下三世俱弗仕以公貴故祖惟聰累贈嘉議大夫禮部尚書上輕車都尉追封豫章郡侯考来成累贈中奉大夫江西等處行中書省參知政事䕶軍追封豫章郡公初朝廷罷羣臣贈典特賜公號貞文先生至是又奉㫖為建書院因所賜號以為額祖妣黄氏何氏妣黄氏並追封豫章郡夫人公生而頴悟年十二三讀書已能窺見古人為學大意家貧不能負笈逺㳺父子自為師友刻苦奮厲窮晝夜不少懈涵濡既久經史百氏無不貫通發為文辭咸中矩度同里年相埒者多敬畏而師事焉年二十餘稍出㳺湘漢間湖南帥趙文惠公淇素號知人一見輒驚異曰他日翰苑名流也程楚公鉅夫涿郡盧公摯前後持湖北使者節程公竒其才妻以従妺仁宗踐阼之初程公在翰林公至京師因舘扵其門執賔主之禮甚謹人不知為肺腑之親也盧公尤愛其文亟表薦之方是時東南文章鉅工若鄧文肅公文原袁文清公桷蜀郡虞公集咸萃于輦下公與臨江范椁浦城楊載繼至以文墨議論與相頡頏而公名最為暴著受知中書李韓公孟集賢王文定公約翰林趙文敏公孟頫元文敏公明善而全平章岳柱禮遇尤至相為推輓不遺餘力延祐元年由布衣入翰林為國史院編脩官李公以政府兼史舘觀公所撰功臣列傳撫卷歎曰此方謂之史筆他人真謄吏牘耳三年陞應奉翰林文字同知制誥仍兼編脩四年遷國子助教用本院奏留居舊職五年謁告南歸泰定元年以元官召俄丁内艱公十年間三應奉翰林扵翰林朝廷之事臺閣之儀靡不閑習王公毎謂與公談治道大起人意授之以政無施不可也天厯二年文宗始聚勲戚大臣之子孫于奎章閣而教之命學士院擇可為之師者得十餘人而無以易公乃擢公授經郎閣在興聖殿西公蚤作必徒歩先諸侍臣而至諸貴㳺来受業者謀合錢為貰馬公微聞之輒自置一馬㝷復鬻之示不欲以己為人累而已其後去公座下而入侍帷幄者皆為國之重臣公未甞假以為聲援視之泊如也上時坐閣中有所咨訪奏對稱㫖恒以字呼之而不名中書薦用儒臣必問之曰其才何如掲曼頋間出公所上太平政要四十九章示䑓臣曰此朕授經郎掲曼碩所進卿等試觀之其見親重如此豐城地不産金官府惑扵姦民之言為募淘金户三百家而以其人總之散徃他郡采金以獻嵗課自四兩累増至四十九兩有竒其人既死而三百户者所存無什一又貧不能聊生有司責民之役扵官者代輸其金民多以是破産因公所上政要及之遂蠲其征人賴以甦至順元年預修皇朝經世大典上覽公所撰憲典顧謂近臣曰此非唐律乎超授藝文監丞叅檢校書籍事且屢稱公純實欲器使之而竟不果用元統元年今皇帝入正大統召對便殿慰諭良久命賜以諸王所服表裏各一躬自辨識乃以授焉一日入直奎章閣上適至左右奉法書名畫珍玩器物以進公厯陳其制作之年世與其人之氏名為之坐閲移時至元元年遷翰林侍制兼國史院編脩官四年拜集賢直學士先是儒學官赴吏部銓必移集賢考較其所業院下扵國子監監下於博士吏文稽滯動經累月公請奏更其法以事付本院屬官人以為便五年奉㫖函香祠北嶽濟凟南鎮竣事可缺便道西還丞相太師秦王令集賢促公亟回以疾固辭六年上親擢公奎章閣供奉學士聞命即日就道未至改翰林直學士知制誥同修國史至正元年肇開經筵首以公兼經筵官二年陞侍講學士知制誥同修國史同知經筵事公階自缺郎缺遷至中順大夫其為侍講階當與品對而新格超陞不越二等獨公不為例缺四等轉九階為中奉大夫實異數也經筵無専官曰缺曰知多宰執大臣微辭奥義率屬公訂定然後以進所言徃徃寓獻替之誠務以禆益治道上嘉其忠懇數出金織紋段以賜之三年以年七十致其事而去詔遣使追及於漷南上表力辭㝷復遣使奉上樽諭㫖還撰明宗皇帝神御殿碑文成賜楮幣萬緡白金五十兩中宫所賜白金數亦如之求去不許命脱脱右丞相及諸執政面諭公毋行公曰使掲傒斯有一得之獻諸公用其言而天下蒙其利雖死於此不恨不然何益之有丞相因問方今政治何先公曰儲才為先養之於位望未隆之時而用之於周宻庶務之後則無乏財廢事之患矣他日集議於朝堂公抗言當兼行新舊銅錢以救鈔法之弊執政持不可公言之益力事雖不行丞相以公不阿獨心敬之有詔修遼金宋三史以平章政事而下暨公等六人為總裁官而以右丞相為都總裁丞相問修史以何為本公曰用人為本有學問文章而不知史事者不可與有學問文章知史事而心術不正者不可與用人之道又當以心術為本也公既領史事每與僚屬言欲求作史之法湏求作史之意古人作史善雖小必録惡雖小必記不然何以示勸戒乎自是毅然以筆削自任凡政事之得失人材之賢否一切律以是非之公至於物論之不齊必力與之辯求歸於至當而止四年遼史成以進有㫖奬諭仍俾早成金宋二史公感激知遇惟恐無以稱塞辰入酉出憊不敢休㑹盛夏雨潦襆被宿舘中得寒疾返寓舍甫七日而遽不起公卿大夫士聞者無不馳徃哭之盡哀省院䑓部寺監而下咸致賻有差時方有使者至自上京燕勞史局以公故為改燕日使者以聞上為之嗟悼以楮幣一萬緡賜其家仍給驛劵具官舸送其柩歸江南公少處窮約事親菽水粗具而能得其歡心曰有禄入服食稍踰於前輒愀然曰吾親未嘗享此也故其平生清儉至老不渝與兄弟有無相通始終無間言子弟有過不加顯責奴僕得罪亦寛容之人問之曰長上遇下稍見苛急後生缺習暴戾不得不以身教也公立朝雖居散地而恒急於得士考鄉試者二考㑹試者一為廷試讀巻官者二考國子公試者七所甄㧞後多知名御史建白用㑹試終場鄉試次牓舉人為教官廟堂以咨於公力賛成之由是士無遺才之憾公喜汲引後進而不能俯徇時流郡縣有一亷吏稱之寧過其實聞吏之貪墨病民亦不曲為之揜覆達官大人意有不合終身不造其門雖見軋而不悔間寫其不平於文字間人或疑泰甚公曰言當如是不必慮也公為文叙事嚴整而精覈持論一主於理語簡而潔詩長於古樂府選體清婉麗宻而不失乎情性之正律詩偉然有盛唐風善楷書而尤工於行草國家大典冊及元勲茂徳當得銘者必以命公人子欲顯其親者莫不假公文以為重仙翁釋子殊邦絶域慕公名而得其片言隻字者皆寳而傳之暮年求文者衆寝食為廢殊不以為厭然亦不苟作有郡守諷其民奉金為夀求紀政績公頗知其人斥而去之未㡬其人果以賄敗客有為人謁文而私其金者他客發其事公曰已受之矣人尤服公雅量有文集若干巻行於世公薨於至正四年秋七月戊戌享年七十有一以六年秋九月甲子葬富州富城鄉富陂之原制贈䕶軍追封豫章郡公諡文安有勲爵而無官階有司失之也元配李氏繼即程氏大中大夫同知湖北道宣慰司事嚴卿之女並追封豫章郡夫人子男二長汯李氏出國學上舍生今用公廕當補官未命次廣陽生七年矣女一人適楊湘盖人才之生必於興運其以文事與時而奮恒在乎重熈累洽之餘惟養之厚而用之不亟故其望實彌久而益著非僥倖於一旦坐致顯融者可同日而語也公以庶士起逺方而徊翔於清途三十年晚乃蔚為儒宗文師荐膺眷遇勤事以死大明在上照臨所及故舊不遺播之聲詩垂於無極不亦生榮死哀矣乎銘曰於穆世皇遐不作人豐芑之澤燕及後昆在仁廟時郡獻俁俁出入左右經文緯武公居其間佩玉長裾載筆以従其行徐徐厯事四朝乃登延閣乃司論説乃掌述作清問所及字而不名公滋益恭不挟不矜逮今昌辰峻躋邇列翩其逺引萬夫莫遏天子有命式遄公歸重煩以事俾職訓辭明明天子不自神聖廣厦細氊公言是聽稽古圖治監觀後王公能敬承大啓厥藏發潜闡幽騐諸成敗斟酌典謨用存勸戒竒聞異見參錯偎并公所折衷信而有徴藉夫衆功訖于絶筆克成公志公死不没人孰不仕孰完於公始卒無疵而以豐終敬故尊賢天子之徳詞臣奉詔薦于樂石文獻集巻十上欽定四庫全書文獻集卷十下元黄溍撰碑文鄧公神道碑至正九年夏四月二十日知經筵事臣多爾濟巴勒同知經筵事臣額森呼圖克臣溍等進講于明仁殿臣多爾濟巴勒額森呼圗克奏鄧文原經筵舊臣歴事累朝備極榮遇兹又顯受聖恩贈封定諡墓上之石宜賜刻文上既可其奏命臣溍為之銘别敕翰林學士承㫖臣起巖篆其額臣額森呼圗克請就令臣多爾濟巴勒書丹上復如其請乃退而以前史臣范梈之狀授臣溍臣溍謹按故嶺北湖南道肅政廉訪使鄧公諱文原字善之曾祖從黼妣楊氏祖昭祖累贈嘉議大夫成都路總管上輕車都尉追封南陽郡侯妣羅氏南陽郡夫人考漳累贈中奉大夫四川等處行中書省參知政事䕶軍追封南陽郡公妣孫氏游氏並南陽郡夫人其先由長安徙資中乂徙綿之彰明杭為宋行都南陽郡公避蜀兵來依焉故今為杭州人公六嵗入小學九嵗從三山楊先生受春秋十五以流寓取漕薦暨科舉事廢遂一意務為聖賢之學行益修業益茂開門授徒户屨常滿中州士大夫多慕而與之交徐文獻公琰髙文簡公克恭知公尤深王參政巨濟素刻深與公語亦嚴憚之巨濟後以事繫獄自悔不用公言初用江浙行中書省辟署杭州儒學正秩滿調崇徳州儒學教授用薦者擢應奉翰林文字將仕郎同知制誥兼國史院編修官承㫖閻文康公復於竂友少所假借公獨見推重凡大撰著必屬焉由應奉升修撰成宗即位就任轉從仕郎成宗崩預纂修實録姚文公燧王文肅公構並為承㫖持見不同閱公所具藳互有指擿公不與辨第令櫝藏以俟後數日二公取視之皆莫能易一字以儒林郎出為江浙等處儒學提舉教人先學行而後文藝士習為之丕變召除國子司業建白修明學政而樂因循憚改作者與之論不合遂移疾去仁宗即位詔以科目取士江浙行中書省檄公考延祐元年鄉舉公以朝廷立法之初多采考亭朱氏貢舉私議慮逺方之士未悉上意大書其文揭示之由是士無復踵異時塲屋之弊尋以翰林待制承直郎兼國史院編修官召臺臣交章舉之擢承徳郎僉江南浙西道肅政廉訪司事湖州民有抵夜禁者被執而遁追者及之剚刃左脅其兄問殺汝者誰曰白帽青衣而長身者也語畢即死其兄訴之有司歸罪於直初更張福兒坐繫三嵗公閱其牘曰白帽青衣姑勿問福兒身不滿六尺未見其長且福兒用左手傷何以在右命覆勘之真殺人者張彈壓也建徳戴汝惟被盜已捕寘獄中而夜有火其居者失汝帷所在公曰此有以也責有司推治得汝惟尸於水濵及其妻謀殺夫狀人以為神江隂飢民稱貸於富家不得則持火往取榖誤焚其屋十三人所分榖皆不滿五升有司悉當以強盜公謂此非其情也時庾死者已半餘皆杖而遣之平江僧訢總管府判官理熙納其賂既誣服而公適至探得其情杖僧釋熙移僉江東建康道肅政廉訪司事寧國諸路茶課初止三千餘錠累増至十八萬錠皆鑿空取之民間民受誣抵法則轉運司得以失覺察擅加罪五品以下官州縣長吏皆重足而立公至而提舉茶事者適以賄敗乃為設法而漸去其弊且建言宜罷茶司而使郡縣領之饒州有告欺隠官糧者事連數百人累嵗不決公曰此不難知以官租為民田交易而抄户時以之定差徭經理時以之定租税耳命據籍為定訟遂息小吏有結為兄弟持官府短長者號五虎杖而流之人莫不稱快有甥盜其舅家財者以贓滿罪至死公曰贓五十錠盜惟二人其一人所分止五錠何也録之得其實所盜十三錠而已遂以減死論徽州民偽造楮幣於僧舍有避雨者適見之其人懼事洩因啖以利而止之使為烘焙獄具當死公曰造偽當死者其等有七烘焙當何坐宜比行使加等杖罪事聞于朝報如公言徽州民謝蘭家貧其從子囘貸以錢而倍取其息又利其田宅而欲構害之家僮死囘使告蘭殺之公察其寃釋蘭坐囘天方旱而雨士子或為私書以非考亭之學公命毁其書曰吾以息邪説也江浙行中書省復移行御史臺檄公考延祐七年鄉舉得今翰林侍讀學士台哈布哈以為舉首既上春官果為廷對第一士論翕服拜集賢直學士奉訓大夫以地震應詔論弭灾之道謂今天下士師非才惟受成於吏死囚嵗上刑曹類延緩不報庾死者多宜慎選理官死囚應決即決寃即釋之河北流民復業朝廷雖令計口給緡錢而有司奉行不至宜㑹計海運糧支發之羨餘隨處置倉以備凶年而賑之又申言茶法之害民乞併罷轉運司以息人怨感天和時論韙之進奉政大夫兼國子祭酒依前集賢直學士被㫖知泰定元年貢舉及上親䇿多士于廷仍㑭充讀巻官有詔開經筵特命中書平章政事張蔡公珪翰林學士吴文正公澄及公入侍其見知遇如此大駕時巡公當扈從苦脾疾就醫於京師遂乞謝事南歸嵗餘召拜翰林侍講學士中奉大夫知制誥同修國史未行擢嶺北湖南道肅政廉訪使以疾不起天厯元年五月二十二日薨于杭州私第之正寢享年七十以其年七月十三日葬湖州徳清縣千秋鄉百竂山之麓太常初議以莊康易公名今天子始用公門人集賢大學士馮公思温之請特贈公中奉大夫江浙等處行中書省參知政事䕶軍追封南陽郡公改諡文肅娶徐氏封南陽郡夫人前公一月卒合葬焉子男一人衍用公廕為承務郎江浙等處儒學副提舉後公缺年卒女二人適石洞書院山長史公埜司徒府掾史戴孟淳孫男一人萊孫公蚤慧稍長能自植立外家游氏自清獻公似相宋理宗門户輝赫公未始挾以自矜又嘗客於故后族謝氏家視華靡豪縱事漠如也公丰姿凝粹氣貌純明内嚴而外恕議論若不可犯至於以文相接以恩相加未嘗不使人心悦而誠服平居善處窮約奉巳常薄待人常厚諸生有病而以槖中金託於公者曰萬一死願以歸吾親其死也或竊以去公買金以付其親而終不言安南入貢以黄金丹砂象齒為私覿之禮公却之其人曰清白物耳公曰爾物雖清白我受之則汚也所至僦屋以居四壁蕭然晚乃捐俸貲買宅一區將以佚其老而疾亟矣公於經史百氏之書無不究極其根柢為文精深典雅東南遺老凋落既盡文章之柄悉歸焉及在朝廷施于訓誥者温潤而有體志於簡冊者確實而有徴詩尤簡古而麗逸凡所著有讀易類編若干巻内制集若干巻素履齋藁若干巻行於世工於筆札與趙魏公孟頫齊名徽仁裕聖皇后命以泥金書大藏經公應聘率門人前集賢侍制班惟志等二十人北上竣事二十人皆賞官而公不預第隨牒調補教授一州後乃以文學政事昭被主知而至大官前後從游無慮數百人惟御史中丞王公士熙與馮公思温位最顯其受業上庠而掇巍科躋膴仕有名於時者尤多不可遽數也始公校藝鄉闈臣溍誤辱薦名及公再主文衡臣溍遂忝預執筆兹又獲載筆𨽻太史氏欽承明詔勒文公碑不敢以菲陋荒疎伏闕控辭謹拜手稽首序而銘之銘曰井絡之靈實鍾後賢展也鄧公受材孔全公方盛年盤桓山澤翔而後集靡徐靡亟負其所韞時而出之學為儒宗政為吏師其學斯何蜚英文苑鋪張皇猷裁成帝典𢎞敷教道模範國人談經氊厦堯舜吾君其政斯何肅將使指扶善遏惡以樹風紀鼓之舞之士氣以振輅車所届獄無寃民聖門四科公兼其二學以從政匪有二致國之老成天子所毗公不為起乘化而歸門生奉詔薦此樂石庶無媿辭過者必式御史中丞贈資政大夫中書右丞上䕶軍追封平陽郡公諡文靖徐公神道碑公諱毅字伯𢎞姓徐氏世為平陽趙城人家于霍峰鄉石明里髙祖諱澤曾祖諱閏皆力本尚義值金季之亂晦迹弗耀入皇朝始有出而仕者祖諱玊由元帥府都提控歴崞縣提領岢嵐州長官終於河東南路提舉常平倉事御史中丞王公博文銘其墓累贈嘉議大夫上輕車都尉追封平陽郡侯祖妣髙氏平陽郡夫人考諱徳舉由尚書省掾出為平陽路轉運司經歴終於太原路鹽使司提舉翰林學士承㫖姚公燧銘其墓累贈中奉大夫䕶軍追封平陽郡公妣盧氏邢氏並平陽郡夫人公盧夫人出也幼頴異丱角受業於魏國許文正公磨礲浸礶日長月益以清方勁正為衆所嚴憚莫不以逺大期之弱冠辟缺掾調同知檀州事當國者急於賦歛督責甚峻郡縣長吏奉承如恐弗及公獨不阿其意惟務布徳澤以甦疲瘵人稱其有古循吏風世祖皇帝聞其名擢監察御史上言江南新附未久宜安集流亡以固民心京師天下根本宜蠲除地稅以厚民生檢覈灾傷宜以時而發倉廪之儲捐山澤之利申明酒禁以修荒政鰥寡孤獨宜有養民所疾苦宜遣使詢問方今庶政姑息中書親細務而宰相失體六部僚屬多非其人因陳省臺為治之要及憲司事宜監治官吏當加儆戒不可因人之誣言而升降察官行樞密院行大司農司行通政院及尚書省理筭受賞進官者皆可罷又以日食地震乞罷諸行省四川妄啟邊釁交阯虚勞王師獻榮以邀功生事者宜勿聽官軍承襲皆膏粱子弟未嘗知兵當别議立法增國子之貟重敎官之選以興學校治宗廟以崇祀典修國史以存故實設朝立班不可全無流品之分實封陳言母使苟為進身之計它如選用官吏減錢糧之費理㛰田之訟馬禁水利鹽鈔諸法其弊當救者前後所奏七十餘疏其言後多施行世祖賔天上封事于太皇太后皇太后曰四海不可一日無君大行皇帝奄棄天下已五日矣苟非早定大筞萬一或啟姦覦變生不測實可寒心皇孫撫軍朔漠先帝既授以皇太子寳聖意可知伏願明諭宗藩大臣叶謀推戴遣使奉迎歸正大統上以副先帝之遺意下以慰四海萬民之所屬望廷議韙之成宗皇帝既踐天位首請早正東朝尊號以嚴孝養因言陛下方虚心求治而大臣不肯任事人主之職在論一相今宰相貟太多論議不一伯顔乃先帝舊臣留以遺陛下宜亟相之為治不在過求髙逺但當遵守舊制其要有四親賢逺佞信賞必罰而已又伏闕上言建立儲貳敦睦宗藩選任臺諫敎習親軍勿事西南夷而專備北邊赦不可數等十事所上疏又二十餘上皆嘉納焉擢僉陜西漢中道肅政廉訪司事未上改吏部貟外郎時選曹事多壅滯公不懼權勢凡銓量注擬必考其資歴察其才品人皆悦服奉詔使甘肅給軍需糴買轉輸規措有法事集而民不擾除僉河東山西道肅政廉訪司事閱所部獄囚而得其寃狀所釋五百餘人時稱明允召為徽政院長史舊例臺察於徽政之事一無所問公謂法者天下之公器宜共遵而行之臺察者執法之司何獨不得與聞徽政之事乎有與公不相能者力詆之公即謝去尋除樞密院經歴贊決事機申嚴號令本兵者賴其佽助為多遷御史臺都事改右司郎中除陜西行臺治書侍御史並以外艱不赴服除召為左司郎中夙夜匪懈彌綸庶政損益進退必中其度列曹咸取則焉擢治書侍御史柄臣欲構害御史郭章公力為之辨有沮之者事竟報聞公以言不行自引去召還授陜西漢中道肅政廉訪使闗右地接羌戎人多強悍號稱難治公柔之以恩而懾之以威土俗為之丕變入為刑部尚書上言自昔有國家者必定律令使有司知所遵守方今承平日久宜參酌古今立一代之成法上可其奏仍命總其事方次第就緒未及上而改授河北河南道肅政廉訪使無何復入為刑部尚書擢侍御史除僉樞密院事仁宗皇帝在儲闈素知其有公輔之器及正位宸極擢江南行臺侍御史遷燕南河北道肅政廉訪使召赴闕遂參議中書省事頃之拜陜西諸道行御史臺御史中丞力辭而歸每謂人生未老得閒乃為貴吾年周六甲歴事四朝恒以無能補報為懼安敢昧止足之戒乎延祐元年十二月二十六日以疾薨于里第之正寢享年六十有一卜以某年某月某日葬某鄉某之原公累階資善大夫訃聞上嗟悼不已詔特贈資政大夫中書右丞上䕶軍追封平陽郡公諡文靖仍命詞臣為贊書以褒寵之娶裴氏封平陽郡夫人子男一人宗義亞中大夫衡州路總管女四人長適常徳路總管裴宗文次適姜某夫亡年未三十即歸居父母家今已七十餘次適朝列大夫曹州尹麻鄘次適敦武校尉缺搉茶提舉王竒孫男二人俶僖公遺書有奏議五巻詩文三巻翰林學士呉公澄為之序惟公以純實之資克成正學遭逢聖代為時名臣雖雅志恬退造次不忘於愛君愛國光膺茂渥生榮死哀不亦宜乎公殁之嵗某始舉進士至京師後三十有五年公孫俶以墓隧之碑未建介翰林修撰王宗哲以銘來屬某雖不及游公之門而覿其光儀聆其謦欬讀公之書而尚論其世君臣之際何其盛哉序而銘諸史臣之職也曷敢以不敏辭銘曰惟公之先隠顯以時再世外官不大厥施委其餘祉伊公之貽公初筮仕華問四馳擢寘臺端用副倚毗作帝耳目為國蓍龜宫車晚出人心危疑盡言無避神器有歸出將使指風紀是持入綴從班獻納論思乃隮宥府乃陪宰司訏謨逺猷贊襄萬幾峻陟文階執法大微胡然逺引莫可馽鞿公身在外忠愛不衰庶公復來赤舄衮衣遺表上聞當宁齎咨一鳳之嗚六龍以飛申錫寵褒厥有制詞有封若堂昭以銘詩墓碑格菴先生趙公阡表格菴先生趙公宋執政也公之志業未及展盡於一時而淑艾之私有足惠幸乎百世讀其書者知為吾先生而已盖自考亭朱子合四書而為之説其微辭奥㫖散出於門人所紀録者莫克互見公始采集以為纂疏今四方學者既家有其書以故弗論若公之世系出處固不可俾後之君子無述也按趙氏之先薊人齊國公迴遷居洛齊公之子是為韓忠獻王族大以衍𣲖分而三居亳者曰光禄卿期乂遷處之縉雲由光禄三世至公之曾祖考諱濟贈太子太保博平郡公祖考諱診贈太子太傅東萊郡公考諱雷以再薦于鄉特贈開府儀同三司少傅衛國公妣田氏贈蘄國太夫人公諱順孫字和仲八嵗能誦説九經嘉定十五年賜童子出身真文忠公見而竒之謂少傅曰大君之門者必此子也公不以自矜益務親師取友而求其所未至朝淬夕礪幾三十年乃以春秋試于鄉于禮部皆第一淳祐十年賜進士出身調太平州學教授秩滿差江東常平司幹官未上改臨安府學教授召試除祕書省正字兼景獻府教授陞校書郎添差通判婺州以内憂去咸淳改元入為祕書郎兼崇政殿説書公因進講言今兹建元伊始正治亂相承之機度宗竦聴諭公曰卿老儒議論似富弼蘇軾公退有㫖擢監察御史仍兼説書歴右正言左司諫遂為殿中侍御史皆兼侍講進侍御史兼侍讀公久當言路凡日食震電水火為災必援据經傳及累朝故實為危亡可畏之説隨事致戒時帑藏枵乏而人主不知宫掖汰侈而大臣不問公疏奏者八面奏者三謂周官九式均節財用冢宰實總之今之大臣未聞過而問也豈不曰錢榖出入當如陳平問之主者乎大臣自處不在周公下而以陳平為足法乎真宗嘗令三司具中外錢榖大數陳恕以天子富於春秋若知府庫充實恐生侈心竟不進恕慮先朝知其有臣慮陛下不知其無也度宗不以為忤令内外諸司條具申省以聞公又言内廷之帑不可輕發恩賞之濫有所謂特除特轉特補特贈者不可輕徇庶僚上殿過為瑟縮專求瑣細以備對揚當申儆之以格習諛踵陋之風累疏乞召洪天錫陳宗禮陳宜中還居言職劾龔日升昬鄙不宜為察官它所薦湯漢李伯玉何基徐宗仁吕圻歐陽守道吕大圭等數十人多朝廷宿望及當世知名士度宗皆嘉納焉美人楊氏進封淑妃公率同列言美人父楊纘上遺表未半月進封之命已下獨不念其有葛覃之情蓼莪之感乎疏入遣中使問公以正謝之期降制之日何時而可俄又宣諭欲以百日為制公復奏請以期年為期時雖不能悉如公言猶久之迺成禮謝堂以從官導㫖樞庭出入宫禁權傾中外公奏外戚用事漢祚中微長此不已禍有不可勝言者歴疏其姦於榻前以去就爭之度宗諭解至再公執之益堅卒免堂官堂之弟垕以節鉞奉朝請居近市其家僮曰伺於闤闠間細民以物求售輒攘取之公奏其狀度宗以東朝故猶豫不報公抗疏不已卒罷垕朝請仍徙其居賈似道以太傅平章軍國重事公力陳其買田變楮之弊乞討論之似道上章自辨且求謝事㑹其姪蕃世守廣徳負勢貪虐公奏黜之似道滋不悦公屢以疾丐去皆不允新宫之建議毁民廬以廣衢路雖用公疏令帥漕兩司相度指定奏聞而帥漕希㫖持兩端之説公再疏言力爭堅挽於事將形之初者耳目官之責隂消潛格於人不知之中者有股肱之大臣在今之師臣相臣有諫玉清昭應如王旦之密䟽乎似道復上章自辨且乞骸骨公亦以疾丐去除吏部侍郎兼國子祭酒兼同修國史實録院同修撰仍兼侍讀公猶不自安求去益力遂以顯文閣侍制知平江府兼淮浙發運使四年八月也先是郡庾赤立率以夏初徴民租公謂古者十月納禾稼今先期半載民何以堪僉曰此例行之三十年不然將有乏興之憂公不聽首以俸入及例巻所供助糴本而抑浮費以繼之糴幾二十萬斛迄免預徴郡既大治創學道書院俾諸生肄業焉五年復以吏部侍郎召尋陞尚書兼職如故於是似道方諱言邊事言援襄者尤惡之公之入對首言今所謂危急存亡之秋母曰端平失襄他時可以復襄今日之事與端平異不亟援襄禍至無日許翰有言治世諱危亡之事而不諱危亡之言亂世諱危亡之言而不諱危亡之事人臣知危亡而不言則人主處危亡而不知矣入則無法家拂士出則無敵國外患者國恒亡今敵國外患有古之所無而法家拂士無古之所有臣甚為國家廪廪也度宗為愀然變色似道笑曰此書生腐語爾襄縱不守何至不可立國遽以亡言不亦甚乎公雖莫能與似道合而似道以公時望所屬每倚重焉六年由吏部尚書拜端明殿學士同簽書樞密院事進簽書院事兼權參知政事八年同知樞密院事兼參知政事如故公自躋政地數建守備之策似道自詭知兵終不以為意焉丞相廷鸞辭位去公獨知省院印度宗欲遂拜公右揆兼元樞公聞之嘆曰不早用吾言國將亡而吾相吾其為張悌矣比降麻公適中末疾乃弗果拜中使傳㫖宣問趣御醫診視旁午於道疾少間除資政殿大學士提舉臨安府洞霄宫仍書御扇出尚方物以寵其行公舟次富陽謂所知曰吾一疾勝二十四考矣十年依舊職知福州福建安撫使為州民代輸夏秋二税錢以緍計者四十餘萬而寛催特放蠲減之數禮士犒軍之費不與焉代還之日其士人爭以詩文誦遺愛軍民焚香夾道持綵旗擁車不忍去者數千人公既歸知時事不可為憂懣成疾醫以藥進公麾使去曰吾可死矣以至元十三年四月二十又三日薨于里第之正寢夀六十有二某年某月某日葬縣南鄉憩雲之原公階止太中大夫爵止縉雲郡開國公食邑二千五百户食實封五百户配胡氏贈魏郡夫人子男三人長曰鞏次曰瑾曰華惟華以承奉郎直秘閣終鞏仕皇朝歴南劎建昌邵武福信五路總管積官通議大夫贈兩浙都轉運鹽使上輕車都尉追封天水郡侯諡懋康瑾承事郎南劎路光澤縣尹女一人婿曰東平吕汲孫男八人長曰桂承徳郎湖州路烏程縣尹次曰楠曰機曰棣曰權曰椅曰某曰某女八人長適懐逺大將軍河南屯田萬户陳䕫次適葉可大應大圭陳璋胡衡陳允徳杜龍幼在室曾孫男七人女三人𤣥孫男五人公幼孤謹於事母而持身以嚴嗜好殊簡薄踐敡中外餘二十年家無留貲焉初少傅師事考亭門人滕先生璘授以尊所聞集公既脱去場屋遲次里居因以得於家庭者遡求考亭之原委纂疏所由作也後雖成書猶不廢考訂至易簀乃已公處館職秉史筆者或質所疑輒口占其本末以授之其博敏又如此公奏草可見者二十有九所著惟四書纂疏行於世近思録精義若干巻孝宗繫年録若干巻中興名臣言行録若干巻文集若干巻並藏於家公位二府法宜有諡于太常有傳於國史而公之殁也兩宫北上九浹旬矣後五十有五年公之孫機以墓隧之石未有刻文爰以狀授溍俾譔次以備闕軼溍於公纂疏之書童而習之而我曾大父户部府君乂與公有同年好施及後人不敢以不敏辭惟公夙受主知以言事官論是非殿陛上方嚮用而輒自引去晚執事樞國步已棘范希文修京城之策不用於慶厯李伯紀經制兩河之策不用於建炎而公援襄之策不用於咸淳天之所棄孰能興之是誠有非人力所及者奉身而退以全其歸公之自處則可無憾矣銘曰道之不行託于空言顯顯趙公則既有聞言路之闢衆正所聚山川出雲膏澤在下夫豈弗逢止或尼之瀆則不告斂藏蓍龜善非為名禮進義退靖共夙夜罔間外内有命來覲宵衣以須蹇蹇匪躬終始弗渝孰尸其功不自為政時遊廟堂勞以二柄念彼多壘載瞻四方曰其殆而繫于苞桑執之仇仇聽之藐藐獨安其危而以為樂大厦之騫孰持孰扶當宁曰噫其遂相予天胡嗇之弗俾卒相迺以晉陽為國保障允矣明哲歸潔其身碩果不食曰惟斯文若昔大臣飾終有禮諡在奉常傳在太史公則不逮公多遺書銘以昭之過者式諸濟南髙氏先塋碑國朝之制官七品以上咸得貤贈其先所以廣考而勸忠也觀夫世數之異等級之殊而其積累之薄厚可得而徴焉泰定元年冬濟南髙公以亞中大夫鎮江路總管致仕品第三有司援典故以聞被㫖追贈二代信乎其徳厚流光者矣按髙氏世居棣州無棣縣之幸禮村殁因葬其地盖其先出於齊公子髙以名為氏譜牒墜逸系緒莫詳今所居則猶故齊地也公之曾祖考曰滄州鹽山縣主簿諱輪祖考曰滄州孔目官諱憲今贈中順大夫同知某路總管府事騎都尉追封渤海郡伯祖妣李氏渤海郡君考曰宣武將軍管軍總管諱璋今累贈亞中大夫某路總管輕車都尉追封渤海郡侯妣趙氏王氏並渤海郡夫人由鹽山府君而下三世俱有仕籍而志局于位厥施未光貽慶垂祉鍾于後人公實承之公名仁字夀之少以材推擇為吏㑹天兵南伐署招討司提控案牘歴萬户府知事辟湖廣行中書省掾從征安南討兩江羣蠻有勞受知丞相順徳忠獻王因攜以入覲既而丞相改莅江浙行中書省奏以為檢校官尋遷左石司都事時同僚多以酒榷鹽莢之利自汙簿問其事者以公厲獨清之操更見識拔剡上擢中書工部主事俄復入江浙行中書省為左右司貟外郎除江西行中書省理問官治蒙山銀賦之病民者捕寧都土豪之亡命者興利去害績用尤著廷議公以踐敡滋久將疇其民庸授吴江州知州下車未幾訟簡役均田里無事乃大飭三皇孔子廟去之日州人相與立石以紀遺愛部使者以最聞授嘉興路總管府治中時列郡方祠奉帝師凡庀材用召匠傭壹出於民力公獨諭浮屠氏之籍於白雲宗者俾任其役官無一粟一毫民無半餉之勞而祠事以蕆部使者復以最聞先是公數捧省檄行旁近郡以丹陽金壇故有公田虚額請悉蠲之而取他羨田補其入又以松江東鄉水利久廢田不宜稻請去故所賦米而用土産菽粟代其輸事皆施行兩郡之人莫不便之年甫七十即乞謝事不俟報而歸吴門别業居焉至是遂休致之請應追錫之命而公之妻楊氏贈渤海郡夫人劉氏封渤海郡夫人公䖍奉制書永懐明發展省墓下祭告如禮退自惟念宜有以昭上恩紀世徳乃伻來徴文為銘溍聞古之為銘者必斟酌先祖之美而自著其名焉所以示後世法也謹敘次髙氏之世家名爵與公之志行官業而銘以繫之銘曰顯顯髙氏齊文之昭代祀則緜莫守其祧不有厚徳孰復乎始蟬聨三葉躋于膴仕胡卒不耀不震以轟儲厥義方嗣人之承展也嗣人是續是似服勤中外時踰四紀乃濟其美乃揚其名罔有失墜以荷寵靈煌煌天書下賁𤣥宅發其幽潛昭融烜赫辛禮之原巋焉豐碑琢而銘諸以代鼎彛百世之下視此遺刻維考維忠永𦙍無極吴府君碑泰定元年嘉興吴君漢傑以所居官品第七用著令得請于朝追贈其顯考府君承事郎温州路同知瑞安州事仍封其母陳氏妻陶氏皆宜人厥明年漢傑用舉者以本官署五品職於是府君累贈奉訓大夫江浙等處行中書省理問所相副官飛騎尉追封嘉興縣男陳宜人陶宜人並累封嘉興縣君漢傑祗奉命書齋肅以告已事而退竊自念言所以致是者實先人積累之效福慶衍溢賁及生存國之寵靈非孱焉不肖所克負荷宜紀世徳以承天休垂示後嗣永永無極爰以四明黄向之狀來謁文溍惟府君之里居世緒年夀卒葬列於吴興趙公所為誌趣操行事施予惠利播於永康胡公所為銘庸敢掇取其大者以為植徳儲祉之符而顯誌之府君姓吴氏諱森字君茂其先汝南人後徙居嘉興祖實父澤並宦事宋為水軍正將君少襲武弁以㳂海制置使李公曾伯辟署準備差使仕而未顯功伐弗揚國朝至元間以征東行中書省右丞相范公文虎薦任管軍千户遭時承平始遂逺引初府君既失所怙悉推貲産以歸二兄鞠其弟妹逮有家室推是志也達之鄉鄰飢有米粟寒有纊繒病有藥餌死有棺槥舟梁道路修除惟時輟田四百畝闢書塾聚閭巷子弟延師儒以教之由是人知有學有司狀其顛末移部使者覈實以上中書用近比署其門曰義士云其寢疾也遺命捐種户逋租猶三千石春秋六十有四以皇慶二年五月癸酉委順而終窆于所居西北之麟瑞里於是嵗行既周矣府君有子四人長曰漢英從仕郎平江等處財賦提舉已卒漢傑其第三子承事郎温台等處海運副千户今方以財顯融於時貤恩所及未艾也嗚呼君子之為善非以近名而名隨之表立景附聲振響從有不期而至者矣然其蓄也厚則其奮也不亟易曰積善之家必有餘慶吴氏其成於積而出於有餘者乎銘曰皇諏古制引敷孝治疏封班秩咸錫爾類顯顯府君匪以子貴啟慶自躬曰有吾義其義斯何在物為利由家而鄉弗屯其施單夫窶人幼童弱稚室無凍餒俗有孝弟為而不居嗣人之遺乃播乃穫乃引勿替有命自天下飾丘隧赫其龍光松栢衣被勗哉嗣人無敢失墜便蕃申錫如川方至增崇本始覃及來裔尚不一書斟酌祭器故民應公碑公姓應氏諱普字徳施錢唐人年六十有九以大徳八年七月某甲子卒明年二月乙酉葬縣西履泰鄉棲霞嶺北之花塢其配胡氏年八十有一以天厯元年三月某甲子卒四月丁酉合葬焉今國子司業韓公鏞時以使者行部為立石采漢碑式大書其首曰元故民應公之墓而未有刻辭公之子本以書來京師諗于溍曰發幽潛以起衰懦觀人風者之事也吾子以文字為職業幸序而銘諸按應氏之先汴人政和進士確南渡時來錢唐遂家焉逮公六世矣公少失所怙依外氏習為舉子業非其志也尋棄去而讀孫吴書能通其意述將畧一篇慨然欲以竒節偉行非常之功自奮聞彭文子余毅夫之為人心竊慕之薄遊江淮間以策干制置使李公廷芝李公見其魁缺峻整談論娓娓而竒之俾以進武校尉居幕下當是時内則權臣擅事外則疆圉日蹙諸將多解體公知無所効其力乃辭歸亡何而徳祐失國李公亦死矣至元間凡異時有仕籍者往往持故所受告身詣京師乞換授公獨晦匿不肯自言峩冠大裙逍遥城市中日以教弟子接賔客為事閭巷細人無以自業者時貸以錢而不責其息人多徳之胡氏名族女性端謹不喜為容飾以勤儉佐公理其内公既殁撫其幼孤至于成人有子男一人本也女四適周某錢某周某郎某孫男四材偉俊華初楊君載未弱冠公識其為佳士俾本與共學楊君後以布衣登史館尋擢進士第本猶落魄不偶故集賢大學士王公約嘗薦之而本既老矣才今方以鄉貢進士起君子之澤或者未艾乎銘曰古稱平世士無功名胡有其逢而不有成括囊以俟際于文明傳子及孫復用一經有揭墓門不爵而勞繫此刻辭以鴻其聲墓碣董秉彞墓碣嗚呼是惟秉彞之墓始予識秉彞鄞江上秉彞方妙年論議亹亹庶幾能以古人自任者由是數與之游别去僅三嵗而復求秉彞於鄞則秉彞死矣嗚呼悲夫秉彞名復禮姓董氏世為奉化州人自曾祖庭堅祖成柏至其父潤無仕者秉彞少嗜書不以貧輟其學故衣敗絮無以禦寒擁紙被挾冊坐竟日人莫見其有不堪之色嘗從鄉先生魯月卿為舉子業試有司不中遂不復踐塲屋益取經史百氏之言鈎微擿隠而求極其根柢間出以為歌詩雜文皆清麗古雅可喜故翰林侍講學士袁公甚器重之其父晚得痰疾老母弱弟姊妹之未有家者居處服食婚嫁之須一資於秉彞而後具秉彞未嘗少戚戚以動其父母之意其父母亦驩然以忘其憂人以為難鄞胡氏父子素善秉彞為治舍館俾子弟師事之秉彞深自刻苦與之相摩勵激切夜參半隔墻燈火明滅猶隠隠聞讀書聲雖憊不自休因以成疾度不可起則歸與其父母訣竟以泰定三年九月五日卒於家年三十有三未娶無子以弟驥為之後父命也賴胡氏為買棺乃克以歛袁公為發粟他朋游及方外交又相與合錢為助始克以其年十一月五日返葬于某鄉西圃先墓之次其友汪君敏徳以書來曰秉彞死且葬子知秉彞者宜為銘胡氏既買石以俟矣嗚呼悲夫千里駒不出皁櫪人知其國馬而未始見其千里也故予於秉彞不敢遽以所可見者為已足獨哀其年之嗇志之未究而死及之序而銘諸有不得苟讓者矣嗚呼悲夫銘曰生不予前死不予後夫孰尸之俾其父母不得以為子而予不得以為友也嗚呼陳子中墓碣子中涿州陳氏名中因以為字年三十有六至順四年六月丙寅終于杭州之寓舍卜以某年月日祔葬于湖州烏程縣菁山下先墓之側其友哲理野臺筮仕為丹徒適以事如杭買石屬予以銘嗚呼予固不可無一言以慰子中於地下抑豈忍言之哉初子中合其同志五六人從予南屏山中丹徒亦在焉欲相率推予為之師予謝不可則皆曰諾然猶有以父兄之雅故執子弟禮者予視子中則畏友也子中每篝燈挾冊而坐恒至四鼓蚤作殊無憊色其析理據事毫髮不苟間出以為文皆精深縝密可喜而子中莫敢自謂已足不肯急於求售向之五六人者或擢奉常第或以賢書上春官子中獨未嘗一踐場屋去年始走京師就試於鄉闈考官得其文將寘之前列尋復以其説為疑竟棄弗録子中退自有司嶇﨑四千里負笈南還抵家一月而有母憂又兩月俄以暴病一夕不起嗚呼子中而止於斯耶天者之難必而殃慶不以其類乃若是耶子中之大父徳用晦跡弗任父讓故任連江縣尹以奉直大夫杭州路總管府判官致仕盖其先久占籍于涿由直公仕江南遂家焉母李氏張氏妻亦張氏外家之女也子男一人女一人皆尚幼異時翰林侍講學士巴西鄧公嘗為子中扁所居室曰庸齋子中請予為之銘予未及為而遽銘其冢上之石嗚呼悲夫銘曰原田兮沃沃匪重兮斯穋樹之同兮或以弗熟異天之忍予兮胡彼培而此覆子無憂兮不復神之聴之兮後其式榖蔣君墓碣溍弱冠時及石先生之門聞先生當宋景定咸淳間執弟子禮者恒以百數顧生晚不得厠其列然竊心慕之先生沒十有六年而某為諸暨州判官始識蔣君陶朱山中叩其師友之淵源則執弟子禮於先生者也君不以輩行自髙言必稱同門若嘗與游與居者焉會有詔賜髙年帛郡檄某奉以從事某方蹐君之門而君已死將葬其子果以狀來謁銘某不得辭按狀君諱明龍字飛卿姓蔣氏由漢兖州刺史詡二十四世至唐尚書左丞洌又十七世至宋國子監主簿某監簿生處州教授頴教授生國子助教翥助教之子曰一徳君之髙祖也曾祖諱嗣興祖諱允恭父諱亨之皆不仕其自宜興徒越之諸暨迨君九世矣君先娶姜氏前三十七年卒有子一人果也後娶楊氏有女二人長適胡一中起進士為紹興録事次適趙深孫男三人初助教君無恙時有異僧突入其室示以八字曰傳燈佛祖湼槃㑹人揖而與之語弗顧而去他日以其言驗之夀畧如瞿曇氏其殁則雙林唱滅之後一日也自是君之祖若父得夀同殁之日又同君之死也夢其父曰燈燈續傳不自我後不自我先寤而謂果曰吾先世之聞於浮屠氏者固非所敢知以今之年明之日徴之殆與吾夢協吾其逝矣即索紙筆為書與親友訣翌旦正襟危坐奄然而化泰定四年二月十六日也享年八十有一葬以某年某月某日墓在某鄉某原銘曰有生之不齊兮實命自天修不可強促兮短不可苟延天胡厚君之家兮賦予之獨專死之日兮生之年一門四世兮弗後弗先吾固知命可受兮不可傳天者之難必兮執則其然于嗟乎君兮尚歸夫全墓表石先生墓表先生石氏諱一鼇字晉卿世為婺之義烏人至大四年年八十有二卒明年十有二月壬申葬賈山之原嗚呼先生宋景定甲子鄉貢進士也人莫或用為其稱而稱之必曰先生者先生學者之共尊衆人之同慕也初徐文清公倡道丹谿上及門者或仕或不仕皆時聞人文清之學盖親得於考亭而祕書丞王君世傑則有得於文清者也先生少受業于監榷貨務都茶場王君若訥既又從祕丞君游學日以茂實大而聲逺負笈而至執弟子禮者亡慮數百人然自祕丞君以來惟用舉子業相授受故先生之門名賢書升學館者相望其髙第或據乙科最後榷貨君之孫龍澤遂為成淳甲戌進士第一人國朝以材學顯榮於時者猶彬彬焉識與不識咸以是為先生之盛至其端緒之㣲藴奥之邃世固未必盡知之也盖先生晚而覃思於易著互言總論十巻其為説不皆本於徐氏凡文清之教曰命曰性曰心曰中曰誠曰仁微辭奥義或尚有託乎嗚呼昔者子貢盖歎孔子之文章而以性與天道為不可得聞竊意今之稱先生者雖其文章猶莫得而聞也顧以是瑣瑣者為其盛耶吾見其為先生之累而已嗚呼有足哀乎夫所謂同尊而共慕者其果出於此乎彼乎溍生也後幸獲執弟子禮而不及與夫數百人者羣游並進於先生十巻之書復未能與有聞焉間乃掇其棄餘以充有司之求向之累先生者閱四十年而固在也嗚呼不又可哀乎夫使先生之道卒揜遏而弗揚者誰與溍實懼焉謹次其師友源流揭表墓道庶來者之求先生無以彼易此而徐氏之傳不終寥寥也先生之世出行事具於塜上之銘壙中之誌兹不著至哀無文至敬不飾故亦弗復為之辭蛟峰先生阡表故宋禮部尚書方公歷事三朝為時名臣宋亡晦迹弗仕學者因其自號稱之曰蛟峰先生如隠者焉在世祖時旁招遺老以待咨訪詔御史中丞崔彧𧺫公於家辭疾不赴以髙夀終今天子稽古圗治誕命儒臣刋定前史以監觀其得失而有司莫能奉公事狀以聞竟不為立傳書已上而某與公曾孫道壑適同在史館因得公言行之詳乃摭其大要而序次之以授道壑㑭刻石為阡表庸備史之闕文謹按方氏睦之淳安人公曾祖汝翼贈宣教郎祖謙贈朝散郎父鎔封奉直大夫母邵氏贈令人公初名夢魁淳祐十年理宗臨軒筞士覽公所對敷陳鯁直親擢為進士第一賜名達辰故公以君賜為字用例補京官簽平江軍節度判官㕔公事寳祐元年召為秘書省正字升校書郎引疾去官除著作佐郎未命知寧國府未上並以言者罷開慶元年召為著作郎兼權尚左郎官居無何復以言者罷除知婺州以外臺奏寢新命除知嘉興府未上改知瑞州甫及期亦皆以言者罷咸淳元年召為司封郎官兼國史院編修官實録院檢討官兼直舍人院累遷秘書少監起居舍人三年出為江南東路提㸃刑獄公事徙江南西路計度轉運副使五年入權兵部侍郎同修國史實録院同修撰兼侍讀七年知貢舉竣事除吏部侍郎丁内憂服闋以侍左侍郎召辭不赴自是不復出徳祐元年除京湖四川宣撫司參謀官權户部尚書改禮部尚書俱以父疾辭遂丁外憂此公所閲之官也秘閣修撰父之職也承事郎轉至中奉大夫公之階也某縣開國男食邑三百户公之爵也鄭丞相清之秉政御筆以雷變徹樂減膳恤刑獄而獨無求言一條中外傳聞以為廟堂監謗之術及兩察官以忤清之去國公亟扣閽上書力言之且謂所貴乎大臣者以道事君不可則止今君嗣未定不能贊之敵國佯遁無以備之貨臣聚歛土木方新顛而不扶危而不持則具臣而已聞其屢疏丐間留之者愈堅攻之者愈衆此非所以愛之時公猶在期集所而未官也上特優容之賈丞相似道制置兩淮海州喪師更以捷聞公上疏言海州之事三尺童子皆能言之而閫臣以敗為勝陛下曲狥其意出御筆令學士院降詔奬諭之豈不知而受其欺耶抑已知而姑以揜外觀而自欺耶願陛下急收囘御筆以解萬世之議而免外國之笑借曰萬世之議未暇恤隣敵笑我何以立國乎公之取怒於似道自此始理宗在位日久務摠攬權綱政多從中出羣憸乘時弄威福之柄公上疏曰當大本猶豫之秋豈無旁睨蜉蝣之撼甫節之燄燄難度其心平勃之屹屹當儲其後乂曰天下有貧州縣而無貧太守有貧國家而無貧邸第南司貧而北司之應奉不貧百姓貧而緇黄之窟宅不貧至於挾小才以濟大貪者近親有依憑焉宫中有承受焉左右有游譽焉陛下以得之左右者出自聖斷而用之曰吾自除吏也不知有從旁竊威福者矣乂曰京有尹畿有漕所以培䕶根本愛養命脈邇年居是官者不過為奄豎輩一大承受耳無名宣頭真偽莫詰非時取索隠匿莫稽仇士良謂天子不可令間暇若以財貨聲色蠧其心使無暇更及它事然後吾輩可以得志今此曹遑遑汲汲求適吾意者正士良之筞也帥漕兩司疲於應奉帑庾赤立萬一畿甸之内有一旦警急何所趣辦何所倚伏乎願斷自今日止營繕省宣索而司不急之應辦悉停之左石並縁需索之有例者悉閣之然後可以救兩司之貧為緩急之備也上頗感悟而土木之功不為少輟公復因論邊事屢及之有曰善處急者不以急亦不以暇古之謀人國於江左者莫窘於淮淝而談笑奕棋莫迫於新亭而從容就席固不以急也外示談笑而内有以神其指授之略陽示從容而隂有以伐其璧後之謀所謂暇者豈真暇哉又曰吾有以自謀而不以鄰國之存亡為安危則不依於人吾有以自備而不以敵國之緩急為喜懼則不制於人苟以彼之存者為安緩者為喜萬一鄰敵陽示安枕以紿我而假敵以道臍可噬乎又曰今與敵對境我無一日謀敵而敵無一日不謀我彼所築者金城鉄壁我所築者土妖血山彼所築者奪我地為之我所築者奪民地為之其言切中當時玩細娱而不圖大患之病尋上疏極陳備邊之筞曰以必爭之規模奪浮光然後可以全兩淮而保長江以必死之規模守樊襄然後可以拒光化而全江陵夫淮之猶可守可耕者以有一綫之河也今涉河而築浮光乃吾户内若屯於斯耕於斯敎訓於斯日夜出騎以撓我淮東西俱不可耕矣雖堅城閉壁而坐於禁制不得動矣為吾之計當勉諭淮閫盡力以爭浮光則兩淮猶可安枕也萬一樊襄不牢彼反奪之則江陵孤注尚足恃哉為吾之計當擇荆之猛將責以必死之規模守樊襄則北可拒光化南可全江陵一則思所以奪其地二則思所以爭其民則對壘之勝負決當在此而不在彼矣識者謂公此疏真活國之良劑朝廷不能用以至於亡而公言無不驗重為之太息焉御史洪天錫劾内官盧允升董宋臣不行而去公移書宰相勉以行申屠嘉之事且杭疏援膏肓二豎為喻曰何陛下愛其國不如愛二豎之甚乎漢唐之季建置天子在奄豎掌握罪大惡極朝廷不能誅之天下必有起而誅之者漢之宦官陳蕃竇武爭之不勝并州之將操戈而殪之唐之宦官宋申錫攻之不勝河中之帥移兵而屠之小人之在君側操心何所不至其所以不敢動於内者蓋有所憚於外若外不足憚則無忌憚之心生而無君之惡動矣言尤激烈上覽之不悦公遂稱疾求去丁大全方以臺長用事欲鉤致諸賢公見幾而作謁告徑行董丞相槐勸公不必逺引公曰丞相且自照管越數月果為大全所繫而去吴公潛拜左丞相公亦召還㑹國子博士徐庚金等言大全雖去相位而六賊尚存乞誅之以謝天下上諭潛不當汲引庚金等議論紛紜潛於榻前自辨上為之歛容而隙自此開先是鄂渚危急上命似道提師江陵似道奏請下流兵權潛奏鄂以上既屬似道鄂以下宜屬趙葵上不從徑以下流併聴似道節制凡似道密奏外廷不得預聞上反以不知邊報為潛罪及廷臣奏忠王之立人心所屬潛獨不然姦謀叵測潛遂罷相中外惴惴疑必有後命公上疏曰天下之所同好我獨惡之天下之所同非我獨是之則為人上者亦難知矣大抵上易則下親上難則下畏下親則上安下畏則上孤窘急而求之一緩而遣之號呼而進之一唯而退之旁觀沮縮何以作人任事之氣乎上問為誰公奏臣不敢直指願陛下曲囘天怒以安中外上乃首肯而榻前欵密之言外廷無聞知者既而似道入相希指論公者章連上矣度宗即位公乃還朝一見甚喜欲大用之公乞命朝臣為知縣以重其事權專以均田稅正版籍均力役勸農桑崇孝悌訓士卒除盜賊為考課之法有㫖從所奏後沮不行此公之忠讜見於立朝者也信州措置軍糧失宜召亂朝廷以江東臬事付公聞命就道及境或來言城中事勸公偃旗息鼓而過公笑不答即日單騎入州決獄一城肅然密戒能事者訪得亂卒姓名禽其兇渠逆黨悉寘于法事平有詔褒諭比公於韓魏公云公於它獄事莫不盡其情故一路無寃民而盜賊屏息及將漕江西有獻議於廟堂請以銅錢一當十委公自江西行之公抗言其不便而止講行賑糶以救民飢乞蠲和糴以甦民病有女妖以左道感衆隣郡愚民十百成羣踵門徼福公杖而流之由是遂息此公之績用見於出使者也蓋似道柄國十有六年公屏居者十年諫則不行言則不聴而施于有政者又厪厪若是此有志之士所以羨其際逢之盛而惜其設施之未究也公天禀卓絶於書無所不讀而㑹於理學以為歸宿自為幕職官至秉麾持節所至以敎化為先務暇日輟從容庠序間授學者以求端用力之方自躬行上起自人倫日用上起婺之東陽有好事者創義學迎致公為之師從游者數百人閩人林光世夤縁宦豎而賜出身及為浙東常平使者首劾公不當俯就義學之招婺州之命由是而寢公遂即家建塾以私淑其徒後以從官侍經帷每事啟沃以格君心度宗眷遇之甚至問公講授之所賜御書扁額曰石峽書院仍賜手詔褒寵之江南新附鄉冦猖獗官舍民居盡燬而書院巋然刼火之餘葺治既完諸生稍稍來集倡明正道以致知力行名其堂以仁義禮智名其齋時所在士風穨靡公所以振起而作新之者成効甚著此則公自任以師道之重期於繼往聖而開來學者也公所著有孝經章句一巻易外傳圖說五巻尚書釋傳四巻中庸大學釋傳三巻格物入門一巻行於世公人物魁岸聲音如鐘磊落若青天白日渾淪醇厚不見涯涘觀書至老不廢視紛華盛麗事蔑如也侍諸父昆弟子姪各盡其禮接物以誠而無不悦服不為察察而自莫能欺公卒於至元二十八年正月三日享年七十有一以三十年三月二十九日葬于縣西之安谿娶趙氏封令人再娶朱氏子男三人長梁太學生次棟次楍入皇朝並以儒起家棟月泉書院山長楍長洲縣學敎諭然皆恬於進取不有顯秩女三人長適修職郎無為軍無為縣主簿徐敏中次適武學生項雄飛次適邵元廷孫男四人女三人曾孫男七人女一人棟之孫道壑以至順元年擢進士第今自翰林國史院編修官出為嘉興路總管府推官階某郎石峽書院既領於有司而設師弟子員道壑病其痹迫弗稱乃以公之故居廣其基址而新其棟宇絃誦之聲不減公在時先儒有言道不行百世無善治道不傳千載無真儒公之道雖不行於當時而其學有以傳於後世夫何憾乎溍之曾大父在曹府君實公榜中進士託斯文之雅故於公門四世百年矣今所述乃學士大夫之公言非溍之私言也來者尚有考焉盤峯先生墓表睦之桐廬有隠君子曰盤峰先生以至大三年正月八日卒年六十有七越七年乃克葬于縣北大隠阡先墓之次延祐三年十一月某日也去年秋某以退休之餘被命復出艤舟桐廬驛先生之孫裕來謁曰吾祖之葬予之鄉先生方公鳳既為誌于𤣥堂而未有以表諸封隧今三十有三年矣懼愈久人無得而稱焉敢惟子也請昔在宋季先生之外舅將作少監朱公杰與溍之曾大父户部府君仕同朝居同里先生於溍為大父行溍年十六七即參陪於杖屨之末先生古貌野服髙談雄辨四座盡傾每語當世事及前代故實亹亹不倦然喜汲引後進有如溍之無所肖似猶不以凡子見遇每折行輩以相傾下興懐疇昔夢寐不忘竊願以一言自託於先生不可得而溍亦老矣矧以裕重有請乎先生少力學工於文辭嘗攜所業贄見内翰劉公克莊大竒之由是名動州邑弱冠游太學登咸淳四年甲科賜進士及第調衢州軍事判官用龍飛恩階文林郎居官有廉能聲大參家公鉉翁詳刑浙左雅知先生所至輒挽以自隨獄事悉委焉屬部之民有縱火殺人者株連坐繫甚衆嵗久不決先生探得其情多所平反它疑獄經先生詳讞無不服其明允衢俗好鬬不相能則弄兵以相讐先生被郡檄徧行村落戒諭之皆委刀劎為良民蜀名卿史公繩祖僑寓是邦先生暇日輒相與研究先儒性理之學為士者往往聞其緒言而有所開悟故相留公夢炎郡人也愛先生才且賢欲以女歸之先生不可乃已秩滿辟御前軍器所幹辦公事未幾國破而家亦燬先生避地萬山中草棲露宿若與世隔久之乃歸而稍復其故宇為終焉之計程公鉅夫以侍御史將使指南來求遺逸之士得先生以應詔先生固辭弗能強也留公入覲後為吏部尚書所薦前進士七人獨王公龍澤起為行臺監察御史而先生甘老於布衣桐君古隠者廬於東峰指桐為姓縣以得名先生居東峰之下西望漢嚴子陵釣臺唐方𤣥英白雲原僅數十里山峙川流儀刑如在先生徘徊其間慨然以古人之風節自期與鄉先生袁公易魏公新之為三友袁魏云亡先生踦孤孑立如鼎一足意有不適咄咄書空而已家公當運祚之垂絶以使事如京師久留河間先生數致書候安否既得歸年已八十先生徒步往見之握手道舊故輒相對欷歔泣下前郡守方公囘既奉版圖上於職方復以總管兼府尹終更猶留居久乃去前後十有二年先生不一造其門後與之邂逅于錢唐始恨識先生晚賦詩媿謝焉先生屬纊前二日猶與親友劇談盡數刻精神無少憒眊亦足見其所養有素矣孔子曰殷有三仁焉説者以為人臣之義莫易明於死節莫難明於去國而屈辱用晦者亦所難辯宋之亡也先生不在其位而未始行乎患難不降其志而卒以明哲保身從容於出處去就之際而不至於屈辱其善用晦者歟盖人之難能亦非人之所難辯是用因其迹以推其心之所存論次而表顯之庶百世之下有觀感而興起者焉其言行之詳誌所載已具兹不復贅先生姓孫氏諱潼發字帝錫一字君文盤峰其别號也先世由婺之金華徙桐廬遂為睦人髙祖顯曾祖寳祖漕貢進士廉父承奉郎致仕之才母孺人方氏妻朱氏子男二人濬誼女二人適施昉毛元孫男若干人女若干人曾孫男若干人女若干人先生所著述散見於學者之家子死孫幼久未克裒聚彚次以行惟手編前賢紀詠桐君事曰桐君山集者人多傳之翰林待制栁公墓表公諱貫字道傳姓栁氏其先由展季仕魯食采栁下因以為姓子孫居河東者在唐為官族宋南渡初有自解徙杭者生子曰森又自杭徙婺之浦江家於縣西烏蜀山歴四世至公之曾祖考諱藴俱韜晦弗仕而寓迹於醫祖考諱補之迪功郎嘉興府崇徳縣主簿考諱金忠翊郎髙郵軍髙郵縣令入皇朝以公貴贈奉訓大夫淮安路泗州知州飛騎尉追封浦江縣男妣俞氏追封浦江縣君公之生也外大父閣門俞公葵暨泗州府君同擢右科進士第因命之曰贊義取兩文易兩武贊於今文為貫故公自署其名為貫云公幼有異質頴悟過人嘗侍泗州府君謁神祠得旁人所遺金珠可直萬緡密伺其人復至而還之泗州府君大驚知其器量不凡期以逺到丱嵗遣受經於同郡金先生履祥即能究其㫖趣而於微辭奥義多所發揮既又執弟子禮於同里方先生鳳括吴先生思齊粤謝先生翺三先生隠者以風節行義相髙間出為古文歌詩皆憂深思逺慷慨激烈卓然絶出於流俗清標雅韻人所瞻慕公左右周旋日漸月漬不自知其與之俱化也杭於宋為故都向之宿儒遺老猶有存者公徧游其門無不折行輩與為忘年交而與紫陽方先生囘淮隂龔先生開南陽仇先生逺句章戴先生表元降山牟先生應龍永康胡先生之純長孺兄弟交尤密往來咨叩無虚日凡學問之本末文獻源流歴歴如指諸掌發於論議言必有徴不徒事浮藻以追世好也諸公亦往往喜為之延譽由是名聞於一時初東平王公侯持使者節按察屬部大舉學政敎官之備員充位者一切謝遣之更延致前代賢士大夫之老於文學者補其處於是泗州府君為之起而主敎於鄉邑公在侍側王公一見輒加器重亟稱薦之公年甫弱冠殊未有仕進意後十有餘年始以察舉為江山縣學教諭又為昌國州學正江山乃川阻山窮處昌國則邈焉雲海島嶼間公不鄙夷其人所至日與為士者敷陳仁義道徳之説人多化之用累考赴選集於京師中書左丞張公思明首令子弟來就學達官大人得公又皆竒其才公例當教授一州用薦者特授湖廣等處儒學副提舉未上改擢國子助敎階將仕佐郎由助教為博士轉將仕郎前後在弟子列者千餘人業成而仕後多知名遷徴事郎太常博士時方承平稽古禮文之事次弟並舉遇有所討論公援據詳洽權古今之宜而為之折𠂻廷議莫不服其精當沅州嵗貢包茅四十匭茅輕舟摇多致覆溺公請附以它貢物鎮其舟至今以為便勲戚大臣請諡者數十家文移山積久格不行公悉為考行易名以上凡三月而畢臨江守李侯倜為部使者所劾它使者力辯其誣後終於大官當得諡其家求於諡議中毋及臨江事公曰著其事而白其非辜安可没乎其子乃歎服柄國者欲以其祖配食孔子廟衆莫敢忤公獨毅然持不可而止有神降于洺郡長吏列上儀曹乞加封爵公以為神姦能皷民不治將為亂宜下所部禁戢之儀曹符本郡如公言監察御史馬公祖常薦公才任風憲章再上皆不報丐外以文林郎為江西等處儒學提舉視事伊始吏循舊比以例卷進嵗為米八十石公斥去之後來莫有敢追襲其弊者龍興郡學久廢公為新其棟宇聘名儒為學者師士風以之復振道士作廟屋侵學地東湖書院田為僧所據者三百二十畝悉奪而歸之它書院不籍於官者無慮數十舊設主領一員司其金榖之出納公命勿設而以其事分𨽻所在學官豐城尸教席者不任職士子因持其短長交訐互訐公折以片言而各當其罪莫不心服修漢先賢徐孺子墓立宋髙士蘇雲卿祠古碑碣所紀有闗於名教者必訪求而重刻之苟可以扶世導民者無不為也南康倉吏坐株連逮繫百餘人公被行省及憲府檄讞其獄鉤擿隠伏而得其情所平反甚衆人尤服其長於政事秩滿而歸杜門不出者十有餘年自號烏蜀山人扁其齋曰静儉室廬僅庇風雨饘粥時或不給處之裕如若將終身焉今天子更化之初登用儒雅而中朝諸老多已凋落近臣以公名聞于上乃以翰林待制承務郎兼國史院編修官起公於家公幡然出見使者退謂人曰吾老矣忝列職禁林儻縁次對而獲陳堯舜之道以禆聖政之萬一豈非幸歟㑹有詔復行貢舉法留主文衡於鄉闈竣事乃行到官僅八閱月俄以疾卒于寓舍至正二年十一月九日也享年七十有三省臺院監皆來致賻集賢吴大學士直方國子吴博士師道並敦鄉曲之義共經紀其喪事靈輀南還諸公引紼陳奠於都門之外道路之人咸為咨嗟隕涕夫人盛氏累封浦江縣君前公十二年卒以三年十二月二十三日合葬于縣通化鄉荆山之原子男三人長卣次同次因孫男三人秬頴穆秬早夭𨽻以父命用公廕入官未調女一人公氣韻沈黙局量堅凝平居未嘗見其疾言遽色雖有桀驁者亦皆望之而意銷孝友本乎天性弟實出後外家俞氏遇之恩意彌篤讀書博覽強記自經史百氏至於國家之典章故實兵刑律歴數術方技異教外書靡所不通故其文涵肆演迤舂容紆餘才完而氣充事詳而詞覈蔚然成一家言老不廢詩視少作尤古硬竒逸而意味淵永後學之士争傳誦之工篆籕楷法善鑒定古彞器書畫而别其真贗晚益沈潛於理學以為歸宿之地焉所著書有近思録廣輯三卷字系二巻金石竹帛遺文若干巻烏蜀山房類藁二十巻公之葬也御史中丞張公起巖以居胄監時夙有同寮之雅故既為之銘納壙中鹵等復奉門人宋濂之狀屬溍為之表揭于冢上溍與公居同郡學同志辱游於公最久知公為最深所以圖公於不朽者溍之責也是用弗讓書而授之㑭刻焉其辭曰栁居河東為唐望宗從宋南遷再世外官公生其季逮今盛際以文易武承考之意延祐初元朝多俊賢公游其間翺翔後先于于而來列于庶位詩書禮樂孰非吾事由中而外退也委蛇遺世獨立一紀于兹國之老成日益淪謝鋒車在門公不俟駕有懐欲陳堯舜吾君輪當次對乃以計聞乘化而行公乎奚憾士林盡傷失其一鑑斯文未喪儀刑具存表以石章刻在墓門張子長墓表上即位之十一年分命儒臣纂修遼金宋三史今師相以監修國史領都總裁既進擬收擢遺逸之士四人以兩院次對之職㑭參筆削仍奏辟子長為本府長史使者奉驛券行四千里求得子長於金華山中力辭不拜四方之士莫不髙其風後五年申命史臣纂修本朝后妃功臣傳於是山林特起之招皆正除入館俾預討論子長名在五人之列以翰林修撰儒林郎同知制誥兼國史院編修官召復避不就使指有嚴不得已為之起行至武林驛卒辭而歸士益以是髙之子長之才之美過絶人逺甚其無媿於前修可傳於來世者則不在彼而在此也子長姓張氏樞其名子長其字幼聰慧爽朗受教於父屏巖先生而外家潘氏蓄書數萬卷金石遺文千餘巻子長盡取而讀之過目輒不忘且能通其大意年十四五肆筆成章頃刻數千言嘗作小臣策譏宋髙宗忘親事讐而追為之定復兩宫之計以為當時狃於宴安莫有知出此者時前代遺老多尚存無不降歎弱齡益自愛重杜門不妄出頗易視當世直欲方駕於古人同郡之士與之交者可以僂數暇日寓情巵酒意氣豁然視餘子蔑如也海内賢士及名卿才大夫至於是邦皆以得見為幸或問以古今㳂革政治得失咸樂告之宇宙之分合禮樂之廢興以至帝號官名嵗月後先皆無所脱誤每及一人則其世系閥閱與才質之良窳歴歴如指諸掌論事後當成敗不旋踵皆騐初東萊吕成公倡道於婺不幸天不假以年故婺之言性理悉本於紫陽朱文公由文公五傳為白雲許先生子長少先生二十二嵗先生偶見之漫叩以漢髙帝何以取天下輒應口而對出入紀傳貫穿鉤引語蟬聨不能休先生大竒之閱數日子長以書上謁先生答書朂缺道期之以大成子長請就弟子列先生不可始終以朋友待之自是子長益斂華蓄鋭趍於平實學日以粹其能不失乎進退之正者學力所至也凡為文務推明經史以扶翼教道不喜作琱琢侈靡諂諛戯豫放浪無實之言謂學春秋者必始於三傳而其義例互有不同乃辯折其是非㑹通其歸趣參以儒先之説裁以至當之論為三傳歸一義三十巻又謂啖氏於春秋卓然有見於千載之下而陸氏繼之所纂春秋㣲㫖以朱墨别三傳之當否嵗久漫滅寢失其真乃重加考訂為三傳朱墨本若干巻言有未周意有未暢則出新義以補之金之鉅儒大寧敬先生有春秋備忘久未及行於世暨入國朝先生之諸孫公儼以憲節來涖於婺槖其藳請子長為之校讐乃因近臣以聞而刻焉謂三國之正閏固不待辯自古國必有號史亦從其實而書之漢之為漢未嘗稱蜀陳夀欲帝魏而以晉承其統遂以蜀易漢抑此所以伸彼也夀父獲罪於諸葛武侯而夀又為武侯子瞻所薄故於武侯之駿功偉烈多略弗著而武侯再挫司馬懿亦没而不及内以報私憾外以為時諱也譙周夀之所師力贊後主納欵於魏賣降覆國夀不以為非反善其策餘所書往往類是乃糾其疵謬之害義正其繁簡之失宜為刋定三國志六十五巻又别撰漢本紀列傳附以魏吴載紀為續後漢書七十三巻三國之臣有能致節於其君者舊史或諱不書或書而失其實或僅見於異代之史皆為更定而於漢事必備載以詳正統或一事數説必參訂使歸于一是非疑似抑揚予奪咸有論著繫于各篇之後名曰訓志經筵檢討危君素言子長是書立義精密可資勸講朝廷為下本郡取而上之宣文閣藏焉它所著有林下竊議一巻曲江張公年譜一巻謂宋之亡也將相羣臣伏節死義者固已有傳在史氏卑官下士吏卒女婦之死者多史所弗録乃詢諸故老旁采稗官得若干人為宋季逸事若干巻平昔所作歌詩箴銘贊頌碑記序説誌狀之屬有敝帚編若干巻其言閎深浩愽而峻厲潔清援据精切而論議純正尤長於叙事而扶善遏惡率能使人有所感發懲創至於微辭奥義又有未易以淺窺者大抵其文主於氣氣命於志志立於學故言無所苟出處之際無不克踐其言江西鄉闈嘗奉書幣迎致子長司其文衡返其幣而却其請蓋塲屋之文非子長之所謂文也子長之先占籍臨海唐乾寧間避地來徙遂為婺之東陽人宋末稍有出而仕者曾祖日新承節郎祖友諒迪功郎父觀光屏巖先生也娶金華潘氏又自東陽徙家金華先生少游太學徳祐納土從三宫北上用執政薦授婺州路儒學敎授階將仕郎仍刻印以給之婺歸皇朝之後有學自先生始在官十年改調紹興路平準行用庫大使循新例換將仕佐郎以母老不赴遂弗仕家食者文獻集巻十下
