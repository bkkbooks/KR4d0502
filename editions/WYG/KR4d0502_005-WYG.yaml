body:
  text: 文獻集卷五元黄溍撰序陳茂卿詩集序詩之為用其微矣乎輶軒之使不至而挾飛霞簸明月者徒以自怡於萬物之表而已夫音奏之悲涼意象之荒忽初若澶漫無屬至其使幽人狷士有適而不懟或者舒揚振道之益猶有資乎覽者顧謂其如瑤華琪樹世所罕見探而有之或嗇於用若吾亡友陳茂卿之為詩其亦所謂瑤華琪樹者非耶茂卿平居惴惴寡言容貌不能動人生三十年未嘗一踰里門以死故時無識茂卿者而茂卿之自窮亦果矣自予與之交而善而弗獲窺其奥茂卿既死訪遺槀其家亦竟無得蓋以殉葬焉因追次嚮所僅聞而可知者為五七言古律詩如千篇嗚呼茂卿縁情序事清邃激越其嗇於用與否予固莫得而知載而傳之四海之大千歲之久烏知其不有合也而茂卿孑孑焉自窮如此有可為追惜而悼慕乎然予聞之荆山之韞豐城之閟必有俟以彰其用雖玉烟劔氣非窮山腐壤之所堙滅物之顯晦固繫其逢哉序而藏之庸俟知者不復苟為讓也送葉審言詩後序嗚呼四民失其業久矣而莫士為甚非謂夫賤且拘之為病也饋膳以厚之給復以優之所養有古之所無而所就無古之所有何哉蓋昔之生齒衆矣未有不使以士君子自為者而今也惟以其占籍為斷焉耳方儒服俎豆蝟然勃興而秀人碩士不得業乎其間者比肩而是彼施施焉于于焉逸居飽食而肆其力于負販技巧者豈亦少哉幸而有能砥礪激發稍自出以售於世或者且將縻之以簿書束之以律令使之伏其所長而效其所短譬猶任劉累以飯牛責卞莊以搏彘抑又失其業之大者也若吾葉君幼而學壯而行未始一日而去夫黨庠術序可謂能不失其業矣乎然予觀君之用其材奮乎若騎而爭險于猱狖也躍乎若丸飛而矢决也歘乎若揚飄風簸鉅海而髙颿大舶出没後先也儁稱媺譽踊溢未巳庸詎知不有奪其業而用之儒服俎豆之外者邪今方由吾烏傷教官以秩滿去吾烏傷之士咸相與侈為歌詩以識其别而鄉先生朱公序之備矣予固有志於士君子而重失其業者能弗歆羡而贊慕乎雖然予懼夫奪之者之將至也姑因末簡而私焉以著吾志庶幾乎君無輕於去就而若予之有所羡慕也哉夫以君之絶藝殊能宜有不止於豢龍刺虎者若將以戲游出之則非予所知也送孔周卿序昔者七十子之徒蓋以有若為似夫子而師事之矣他日雖以不能對諸子之問叱避而退其記言之書終不敢字稱之而猶必曰有子焉彼其失孔子未久也於質貌之偶同者且尊慕之如此則凡後孔子千百歲而生而見夫隆顙者升脣者圩頂者河目者面如蒙倛者將皆趨而拜之不暇况其子若孫之克肖者乎厥今孔氏之族日大以蕃其能服詩禮如伯魚原性命如子思者予雖莫得而悉識距夫子五十四世有名某字周卿者予所識也周卿主教吾烏傷三年矣當以秩滿升去烏傷之士莫不華其行而恡其去予竊以為孔子之道如天之無専覆地之無獨載日月之不擇物而照顧豈私其家者邪誠令流風餘澤之所存必孔子謂宜列之公台建之方岳俾諸大夫國人咸有所寓其尊慕焉可也又豈一州一邑所得而私邪詩曰雖無老成人尚有典刑予固未敢遽以吾周卿為賢於有子不猶愈乎隆顙升脣圩頂河目面如蒙倛之偶同者邪周卿行矣予之屬望於周卿也厚矣凡離曠之思愛助之意既形于羣公之篇什故予獨論其所貴乎孔氏者如此云送徐生序異時為舉子業者劬躬苦思敝敝焉穿穴乎經史百氏之書憊不得休垢不暇沐然後能以其藝角强而取勝幸而有能自拔於千萬人之中莫不籯糧笥書呻呼踊躍合乎京師以鬬其一日之技或者屢進而輒弗利又未嘗不闔戸塞竇益淬其鋒鍔而望更進焉國家愛士不欲使卒廢乃為之定制凡得舉十有五年者俾輒試於禮部又十有五年而遂升之天子之庭于是天子亦且閔其老而以故事特予之一官幸者乃得為縣文學其勤且久如此而今也一更訓蒙之識輒升而居其任可不謂大幸與夫一考之勞非有三十年之逺環十數童子而授之句讀非有抗千萬人之難也而又有官稱之美禄食之富豈若夫冒險途觸畏景挈挈然亟徃亟返連蹇困踣沈鬱而無聊者哉逸用其力而厚食其報是宜吾黨之士摻觚擘牋以歆豔乎徐生之去也况夫嘗自拔于千萬人之中而不得一官以慰其勤且久者能無所致其歎慕之意乎予獨以為向之求于生者十數童子而已耳一旦峩冠大裾于于揚揚執經以升于髙座則人之期君將有大於童子之所求者矣惟生無幸其所易而忽其所難則雖掉臂於金馬揚眉於石渠而無怍焉可也尚何文學掾之足云珠玉在前予無以復進敢道其所望于生者置諸篇端云送養直師序始吾聞浮屠氏稱其道奭然不與孔子異而世儒恒譏其去尊卑略貴賤無君臣禮其果然哉厥今薄海外内郡縣所寘主僧之官輒與角立凡府署之崇傔從之盛徃徃視守令而其徒卑躬曲意聽命承事之有加焉吾于是知尊卑貴賤不可卒廢而浮屠氏果無以獨異于人也夫何世儒又有訾乎其用於時者以為釋氏之子宜捐貨財毁衣服木茹澗飲以求其所謂道誠不宜逐逐然惟印組之為務也嗟乎是不亦責人終無已乎且古之生人必有君也而一人不能以獨理也必將斂其賢者能者而授以事則夫賢且能者宜為世之所不捨矣浮屠氏寧于是而復與人異情邪若直師之負材傑驁庶㡬不見捨于其徒者也今方出而官於甬東甬東之人苟𨽻于僧籍者望其來而聽命承事之久矣是宜于簿書號令之外有以淑其衆矣其行也猶有冀乎吾徒一言以為贈夫豈自歉于其道而思有異聞乎傳曰大哉乾元萬物資始此人之所以為性而道之所以為本也其為本不二故浮屠氏不能苟為異也而吾且安取異哉顧其蒙詬于世者不可以無辨焉耳甬東之文學掾曰栁君者吾友也試徃諗之其以吾言為弗畔矣乎石臺紀遊詩序寧海多大山其髙或俯視雲雨名於仙經地志者天門閬風丹丘桐栢而南田號曰福地好事者率病其幽逺險絶莫適至顧獨喜遊石臺石臺距縣治僅五里所山皆土阜非有竒巖峭峰水泉花藥竹箭之美由山足縁坡陀蛇行穿灌莽而上至其脊乃有巨石五六相積壓如累器物其頂上隆然正方而平劣可坐十人旁睨四山屛嶂離列東北山缺處海霞島霧縹緲可睹也臺之勝止是特以卑近而易即凡觀遊者恒用為稱首予佐縣之又明年始合耆俊之士登斯臺抉剔蔽翳求昔人之遺刻既漫滅不可識唯慶元諸老題詠故在徘徊久之望東麓杉松蒼翠甍桶隱隱或曰是謂南園道院乃款而休焉因相與飲酒賦詩抵暮而去蓋忘其為山之卑地之近也孰使予樂焉而無志乎其髙且逺者非兹臺也邪然予聞古君子雖甚陋必有游息之物以養其觀聽而發其意慮卑髙逺近物之不齊者也夫苟無累乎物斯異方而同得者也詩所以志兹遊之得序而歸之南園以為石臺故事聯珠續集序鄞故多官族而傳世之久者稱蔣氏蔣氏之起家在太平興國初至寳元康定中家始大有累官金紫光禄大夫者其子當元符崇寧間咸起進士至大官世禄所逮且三葉最後有起進士為嘉熙言官者至刑部尚書最貴顯尚書之猶子亦起進士為將作監主簿有名咸淳時此將氏世次之可見者也溍生也後弗及睹夫衣冠之盛過其家而訪焉則髙文大冊散落已久所可徴者獨其詩而已竊惟古者載籍所記大辭令大褒貶存于書春秋而其流風遺俗形于詠歌謠誦之間纎悉委曲見於詩為最備善謔寤言馳驅灑埽葵棗𤓰壺苴荼之食為事至微為物至細聖人以之列於三百五篇之中與文王清廟之什並傳而不廢者厥㫖深矣而况宋三百年蔣氏實與之相終始誦其詩而尚論其世流風遺俗猶足以槩見豈可忽哉凡其為詩斷自開禧以前有三徑聯珠集宣獻樓公既為之序將作主簿君之子昭先復纂次其續集俾溍序之昭先今方以儒入官引而勿替蔣氏之世澤未艾也後復有續是集者秉筆之士尚不一書方先生詩集序黍離麥秀其為音之哀以思一也黍離出於周之大夫而與文王清廟俱傳者雒鼎未遷風雖變猶有所繫也麥秀出於商之仁人義士而不與猗那長發並存者亳社已屋風不止於變且莫知所繋也夫既無所繫矣而其辭見于今卒不泯者豈非所謂民之性先王之澤歟然則先生之詩固君子所不廢也先生在勝國時未及仕而運去祚移抢其遺經隱於仙華山之陽窮深極密殆與世隔久之稍出遊浙東西州遇遺民故老於殘山剩水間徃徃握手歔欷低回而不忍去縁情託物發為聲歌凡日用動息居游合散耳目之所屬靡不有以寓其意而物理之盈虗人事之通塞至於得失廢興之迹皆可槩見故其語多危苦激切不暇如他文人藻飾濃麗以為工也先生殁其音遂絶蓋至是而百年之耆舊盡矣先生有友二人曰吳氏善父曰謝氏臯父素以風節行誼相髙而皆前先生死先生二子樗梓懼時無知先生者不敢輒以遺稾示人柳君道傳方官于太常自以遊先生門最早知其不朽者甚悉既緘辭銘其墓且探其家藏摘五七言古律詩三百八十篇釐為九卷屬永嘉尹趙敬叔刻寘縣齋以溍幸嘗及先生之門伻來俾為之序夫誦其詩而欲知其人必也尚論其世先生之盛年不得從周大夫之後晚乃於商之仁人義士而有志焉不亦悲乎此溍所為掩卷太息而不已也異時龔公聖予見先生於錢塘覽所賦詩識以二十二言曰由本論之在人倫不在人事等而上之在天地不在古今言先生之詩者無以易此矣溍復何云哉先生方氏諱鳳字韶父婺浦江人年夀卒葬具如墓銘此不著見山集序予始聞餘姚人亟稱見山先生然莫得其所以稱也他日過歴山之陽乃識先生又得先生所為詩嗚呼兹其所以為先生與先生葉氏初名某宋咸淳甲戌禮部正奏名於是枋國者方務隔絶後進筆墨豪縷之異抉擿無少貸先生竟不得奉大對罷遣而歸其明年枋臣南還又明年而三宫北上矣先生既倀倀然無所售其技重山密林窮居而獨游餘四十年凡古今事㑹人物至於卉木魚蟲之細目觸而心接壹發於詩故老往往不忍讀後生聞之漫不省為何等語宜其莫知所以稱先生也大雅曰芃芃棫樸薪之槱之又曰勉勉我王綱紀四方夫薪槱山材也綱紀大業也而詩人始終致意焉一士之失得若無預乎廢興存亡古之人固不謂然也先生之詩既不得升歌為清廟欲為薪之槱之之棫樸又不可得而為空谷之白駒而遂為黍離是果孰使之耶必有執其咎者雖然黍離之大夫當周之東猶有禄食而服事焉視先生所處抑異矣感深者難忘習久者易變不亦人之常情哉而先生之志未嘗以淺深久近為異於此見禮義之澤民之性情有不與物俱化者其格力之卑健語意之妍拙所未暇論也送曹順甫序曹君順甫與予居同郡且同舉教官予訖不調而順甫用累考序遷為温學正其行也㑹予以督運吏書滿歸自海壖順甫謂予幸以一言識其别於是距予與順甫同舉時二十又三年矣劣弱無似不能使其學與日俱進詎有以増益順甫之所未至哉然嘗從鄉先生聞乾淳師友之盛未始不歎其人物之聚學術之散也蓋婺之學陳氏先事功唐氏尚經制吕氏善性理三家者唯吕氏為得其宗而獨傳至於人自為書角立競起吕氏終莫能挈而合之也其在温則王道甫之慷慨名義嘗合於陳氏矣而其言無傳焉陳君舉本薛士隆上下古今而和齊斟酌之以綜世變為說不皆與唐氏合其廑存者亦莫之傳也葉正則推鄭景望周恭叔以達于程氏若與吕氏同所自出至其根柢六經折衷諸子剖析秦漢訖于五季凡所論述無一合於吕氏其傳之久且不廢者直文而已學固弗與焉三代之聖人逺矣於大道隳裂之餘而能必尊其所聞必行其所知豈非卓然獨立而不懼者乎是未可以専私蔽錮為其詬病也冢鉅淪没晚後無所依風承響接第以世之所共傳為信遂使散者不可復合不傳者日就泯墜安知紛然不同之中有混然大同者在耶夫考師友源流之自務合乎聖人之本統以壹諸生之道德學校之重事也故予取以為順甫告是雖非有以増益順甫之所未至其望于順甫則厚矣他日順甫歸休而與予游於鄉校尚挹其緒論以袪所惑焉送東川書院陳山長序古之釋奠于先師者必本其學之所自出而各自祭之非其師弗學也非其學弗祭也今之言師友者孰不知求儒先之書而為其說讀若漢嚴子陵諸葛孔明晉王逸少陶元亮唐陸敬輿白樂天諸人言談不及于性命其遺文之僅有者非世所用以說讀也或者猶相率尊師焉而尸祝之不廢得不以其髙風盛烈使夫人觀感而興起有非說讀之所及歟予友陳君以選為東川學者師而元亮東川之先師也元亮於書未嘗務為甚解而其死生去就之際浩然無所滯碍不亦知道之君子哉二三子之從君登斯堂也不知學元亮者祭非其學也舎元亮而他學焉者學非其師也而所謂五柳先生傳桃花源記歸去來兮辭等篇固不可以說讀為也蓋予聞之古有憲老而無乞言憲者儀刑其德而已問而答焉其次也有講焉有聽焉又其次也講而未必聽焉則末如之何矣君誠能令二三子知所觀感興起而以古人自任以千載自期一洗尋常說讀之陋斯善學元亮者也詩曰髙山仰止景行行止豈惟學元亮者為然乎庸因君之行書其所與君語者以附贈言之末云爾周易集說序周易集說四十卷纂圖二卷古占法一卷林屋山人俞氏述其為說大抵祖程邵而宗朱古今諸儒之言之善有所弗遺也而其己意亦以附見焉其是非取舎不合於聖人者寡矣蓋古者三易皆掌於大卜四學之教詩書禮樂而已孔子晚乃好易其與七十子之徒難疑答問固未有以易為言者易在秦猶為卜筮之書漢興言易自田何始何之傳為施孟梁丘其别出為焦贛為費直贛専於陰陽占察之術而直惟以彖象文言等十篇解上下經至唐貞觀中又斷然俾學者以王韓為師費氏藉以僅存焦氏又廢矣談者率以為理學近于費數學近於焦而不知河南兩先生之精詣獨得有非漢儒所及知者未可置同異於其間也考亭夫子合兩先生之學以為書七十子之徒所未聞於孔子者三尺之童咸得誦而稱之嗚呼盡之矣今傳其書僅百年述作之士不阿以為同則矯以為異其所望於來哲者果若是耶竊嘗聞之善立言者不必出於古不必不出於古也非有異焉則其書可無作也非有同焉則其書亦不能以獨傳也惟夫同不為阿異不為矯斯言之善者也俞氏其有焉是用為之序以著其是非取舎之不謬於聖人者由其學之源委如此讀之者所宜知也字鍳序古之小學有六藝焉學之者必自數而書而樂而射御而禮其為法至詳且密其為事又皆有次第而無敢以捷疾取朝夕之效士生其時自㓜至於成人非是六物者不以役於四體接於心思磨礲長養之有其素故其進而博之以大學之教咸有以成其材而就其實詩所謂成人有德小子有造者也小學之廢久矣近世大儒始采古經傳緝以為書學者誦其言徒知有六藝之目而未嘗身習其事其習焉而不廢者書而已而又昧形聲事意轉借之辨迷文字子母音聲之原然則雖書亦廢矣聖賢之託於簡䇿以傳者魯魚亥豕其存㡬何後生小子方且玩思空言髙談性命而以為資身譁世之具切近之意微誇傲之氣勝此士之所以成材就實如古者少也吳郡李生文仲年未弱冠本說文作字鑑若干篇誠有志於小學者豈不猶行古之道哉雖然此小學也以生之有志於古又能弗失其為學之次第如此則夫從事於大人之學以成就其材實者無患乎不古若也子夏曰君子之道孰先傳焉孰後倦焉予于生則有望矣庸識諸篇端以為之序云法書類要序君子之學必始於六藝書其一也古之人於鑠金凝土弓車皮玊畫繢之事雖藝成而下莫不有法而書之法無述焉蓋其於書三歲而一同之考其文而已偏正工拙有不足論也厥今學士大夫生乎書同文之時游心藝事者得以暇日審其偏正而辨其工拙盍可無以著其法哉是宜得之者不食而大叫見之者搥胷而嘔血夫何臨學之家率隨人以作計徇於今之厚而徴於古之略也予年十七八時嘗得所謂書苑菁華者窮晝夜而觀之因取其所不録而雜出於史氏百家之言者次第以為臨池拾遺記然以所見未博無能補其闕軼之一二焉後三十年乃獲觀錢塘吳君所輯法書類要其多至於二十又五卷書之為法備矣盡矣惜夫歲月之慆邁而予之不能從事於此也君不鄙屬予以序予聞之孟子蓋曰大匠誨人必以䂓矩學者亦必以䂓矩然而又曰梓匠輪輿能與人䂓矩不能使人巧士君子之游於藝與百工之事異乎知乎此則思過半矣敢援以為序庸俟覽者詳焉陸氏藏書目録序吳郡陸君居闤闠中四壁之外輒與賈區直君殊不以為溷一榻蕭然環以古今書凡若干卷自經史傳記下至權謀數術汜勝虞初旁行敷落百家衆技之文􅌨比而鱗次入其室如登羣玉之府而探蓬萊道家之名山焉忘其為居之隘也君既第其篇帙部分類别為之目録以便覽者且屬予使序之夫稻梁稷黍魚肉果蔬人所資以為生養之具不可一日缺者也得之足以飽而不足以極天下之味言珍異之味至豹胎猩脣封熊之蹯可以為美矣而非可常致以給朝夕之須彼水草小蟲蜩范蚳蝸野果之實人所易致而未必皆知好其味也世蓋有嗜書若嗜飲食者顧所嗜之不同而有不可得兼耳君其兼而取之者耶倚相之所讀今也夫人而讀之韓宣子之所見今也夫人而見之延陵季子之所觀今也夫人而觀之世之不可缺者君固不敢専而有也蘭臺之所不掌金匱之所不藏世莫之致與夫可致而莫之好焉者君亦未始以為我之得私也然則君之志曷嘗不欲與世同其嗜乎此目録之所由作也抑予聞之老子曰五味令人口爽好竒之士苟游於君而獲其所嗜焉染指而出足矣尚無以秦人之炙易吾之炙也哉錢氏科名録序溍觀宋中興登科記未嘗不為之掩卷太息也嗟夫彼為舉子業者營營汲汲積其晝夜之勤至於獲自進於有司而升于天子之廷固千萬人所共嘆羡其光榮而以為不可企及者也今去之逺者不二百年數其氏名而泯没無聞者已什七八幸而以材能致通顯有績用可考見傳子若孫鮮不失其業者若夫大賢君子所以垂世而不朽又非必恃科目以為存也是不亦可深長思乎通川錢氏四世九十年間第進士者二人特奏名一人貢禮部者十有四人待補太學生者十有二人迨國朝著取士令有名以道字子原者首應詔名賢書何昔之泯没無聞者衆而錢氏之世彌久益振也意其積累以致此必有出乎科目之外者矣豈非古所謂君子之澤哉子原之伯祖藉田令與溍之曾大父戸部府君俱淳祐庚戌進士故子原以錢氏科名録示溍使為之序而溍顧謂科名有不足獨恃者其有望也夫其亦以自警也夫送王照磨詩序頃歲有司以浙東西鹽筴法久而弊議更用官糶之法如淮南法制下其事行中書擇可任倉氏之出納者得濟南王君以涖於四明蓋君嘗掾六察以為非君莫宜當其選也居亡何中臺復奏署君海南憲府掌故豈以為向之瑣瑣者未足盡其才耶嶺海去天萬里民生之休戚吏治之得失誠有大於出納之事者矣國家宵旰求忠賢智能之助用興太平侍從近臣為君知己非直如狗監之知子虗而已君之陟清華陪禁密固可旦夕待天下事不又有大於嶺海間者乎未知一掌故果足以盡君之才否也抑予聞之古之仕者行其志達其道焉斯已爾成康盛時皮角筋骨之斂貨賄人民牛馬兵器珍異之市皆掌於再命之士陳肆辨物量度成賈四命之大夫實長而司之為法至詳且密為事至煩且勞而莫有以不得其志為憾焉者故其詩曰藹藹王多吉士維君子使媚于天子又曰藹藹王多吉人維君子命媚于庶人不然則汲都尉之恥縣令而薄郡守蕭太傅之雅意本朝其於道之窮達何如哉予幸以督運吏託官聯於君觀君之敏而裕周而通使有以竭其才必不苟動其志枉其道也是故於君之去不敢遽以世俗相華耀者為諛說而獨識其屬望之私於羣公篇什之端焉送鄭生序今之官于學校者自職教一縣等而至於胄監之長貳咸有師道焉胄監位尊而秩厚非鴻德駿望莫能居之若夫縣教官率選署於閫外累其月至九十始得上名銓曹補郡文學而與醫卜執技者齒滿六歲乃得預流内銓其閲歴之勤且久如此老生宿學既無所事乎其間有志之士苟資以自進固不得俟乎强而仕矣蓋古之為師必取之仕焉而已者而今也一以諉之未及强仕之人不亦任之輕而責之重乎餘姚鄭生妙年好脩再試于有司輒不合方退而職教于剡是特資以為進而非的然以師道自處也雖然吾懼夫人之以師求子也抑予聞之古者學官不必自為師國學之政總于大司樂而論說于東序者有大司成焉司樂勿専也鄉學之政總于大司徒而朝夕坐於閭塾者有父師焉有少師焉司徒勿親也說者曰父師少師皆仕焉而已者又曰父師司城司城豈亦仕焉而已者邪是故官有職而師無職官以法師以道也吾子誠不以今之法廢古之道剡之鄉先生仕焉而已者宜為子起矣他日剡父老舉以相告曰吾剡之得師自鄭君始顧不韙歟生之行有日凡朋從咸以詩送之而屬予以序故予為道其職分之宜為者以告之鄭氏義門詩序浦陽鄭氏聚族而居者八世有司為請于中書而旌表之號曰義門且復其家力役之征俾無有所與今集賢直學士揭公實為之記一時聞人往徃賦詩以美之謂予與鄭氏居同郡知鄭氏者宜莫予若因屬予以序予家距鄭氏不兩舎而近納交鄭氏父兄子弟間歲行己再周其知之固深矣集賢公之所稱述豈有愧辭乎抑予聞之古有合族之道非士庶人所得行而親親之仁無貴賤一也合族莫重於立宗立宗之法或五世而遷或百世而不遷五世而遷聖人不以為失於薄百世而不遷聖人不以為過於厚遷以辨其異不遷以統其同二者蓋並行而不相悖也若夫數百千指聚居而食雖古公侯之家皆所無有而後世士庶人之家乃或有之可不謂難矣哉是宜史不絶書而上之人所宜褒嘉之者遂著于令逮至我朝史臣序禮典為目三十有二而旌表居其一然則凡可以勸親親者又聖人之所不廢也兹非所謂禮以義起者邪鄭氏於古人合族之道夫亦有取其義云爾褒嘉所及有司奉為著令從事而未克上其狀於太史氏予輒弗辭而次第其詩本諸作者之意系于末簡庸俟夫陳詩以觀民風者焉夏生文槀序予筮仕寧海之歲屬當大比凡充賦者八十有五人惟夏君洪參年最少其年之最髙者曰陳先生大有先生宋咸淳乙丑進士入國朝嘗以將仕佐郎教授處州春秋七十有四矣予止先生毋行先生不聽遂上其名于郡府俄有専使持省檄起先生為考官先生又不就卒就試有司已而與夏君俱不合先生既歸老越溪上夏君亦棄舉子業而肆其力于古文蓋與予别十有六年乃相見錢塘示予以所為文一編曰邯鄲步者予為之展玩不已向令以區區之得失少累其志能使才隨年長若是否乎夏君一出不售輒逺引而去視先生誠若太早計然較之摧折困踣於場屋老死而不悔者孰得孰失有不待辨也故予於夏君之文不屑屑焉鈎摭其片言隻字為之品評而獨論次其生平之大槩如此他日夏君年益邁志益堅文當益醇覽者尚因予言而有考焉送王雲卿教授詩序昔朱文公與張宣公吕成公生同時且同以聖人之道為己任而傳洛學者獨推朱氏為大宗文憲王公則朱學之世嫡也吕氏王氏皆以故宰相家為吾邦之望王氏之族尤大以衍其不奪於富貴卓然有所樹立以表見于世者固不乏人而文憲訖能自任以斯道之重不亦豪傑之士哉溍生也後不得及其門而事之間嘗獲升玉齋之堂而接其聲光辭氣未始不爽然自失山川搖落而百年之喬木欝乎蒼蒼過而息焉猶為之低徊而不忍去魯多君子流澤未艾也玉齋之子是為雲卿與其羣從俱以材見用於時而雲卿得睦之文學掾睦學蓋吕公過化之地乃今朝廷右文興治朱氏之書方盛行雲卿又以文憲諸孫補吕公故處睦之人士得不有求異聞于雲卿者乎抑吕公之居睦學張公實領郡寄吕公自謂莫逆而無間也皇上盛徳明詔有司慎擇守令以嘉惠黎庶安知今之二千石非張公其人歟以家庭淑艾之私為賢師帥承流宣化之助雲卿所宜盡心也雲卿行凡朋從咸以詩送之溍不佞輒本其父兄師友源流之懿而道其不可不以古人自任者為之序若夫土風之美雲山江水觀游之樂厥有篇什兹不復云送吳良貴詩序異時浦陽方先生館同里吳氏括吳先生善父粤謝先生臯父咸在焉三先生隱者以風節行誼為人所尊師後進之士爭親炙之而良貴有聞於私淑為多方是時學者未有場屋之累得以古道相切磋論文析理窮極根柢間出其緒餘更唱迭和於風月寂寥之鄉亦足以陶寫其性靈三先生杖屨所臨一言一笑無非教也元貞丙申予幸獲執弟子禮見方先生僊華山之下退又辱與良貴游俯仰之間垂四十年先生已不可作一時之人物星離雲散或隨牒逺方與時浮沈或以名字著聞入通朝籍或浩然獨往於重山密林不復與世接而予亦老於州縣聲迹邈焉不相及久矣今年秋廼聞良貴將主教於稽山朋舊皆為詩以送之嗟夫良貴宦家也祖父俱仕而未大顯不能無望良貴以其所就之實少自見於世良貴顧獨逡廵逺引恬處下列瞠若諸公之後年踰五十猶為所謂山長者焉名不上於三銓秩不滿于百石豈其祖父之所望哉雖然良貴之得于三先生者非干禄之學也惟不必於仕故崇臺邃館不以為慕惟不必於不仕故寒齋冷廡不以為厭其出處之際慮之審矣吾黨無所復進其愛助之言姑為之詩以志其離合不亦可乎自方先生之子夀甫而下詩凡若干篇道其故舊以為之序庶幾作者之意也送應教諭詩序古之為師友者非徒有所嚴憚切磋其相與之際至親且樂也蓋夫人之少也既游于黨庠術序而其以賢能興於鄉也必還使長而治之逮夫老而不仕則又朝夕坐於閭塾而為之師以教其子弟歲時射飲讀法之事莫不相與從容揖讓升降酬酢奔走出入乎其間士生斯時自少而至壯且老固未有久去乎學者雖以公侯之貴任君師之重為士者不敢以其尊而弗親之也故其詩曰無小無大從公于邁又曰載色載笑匪怒伊教由是言之則其師友之親且樂何如哉是以及其衰也詩人猶歌之曰縱我不往子寧不來蓋師廢民散而流風遺俗有未泯也古者學校之盛非後世所及者豈獨其道之隆法之密乎蓋亦相接以粲然之文相愛以驩然之恩薰陶鼔舞優柔而厭飫之有以興起其良心而成就其德性焉爾今之士既不必羣居於學主教事者又皆以資格序遷而不能久於其職不幸有如荀卿所謂子游氏之賤儒且將盻盻焉疾視其長上尚安望其親且樂耶黄巖應君署吾邑教官以秩滿當受代邑之人士咸惜其去相率賦詩以道其離合之思大篇短章亹亹而不已非其親且樂至於久而不厭何以得此歟予故諸生也忝被官使不得從先生長者之後日與應君相周旋以寓其親且樂之情竊喜應君之得於其人者為不易又以見夫土風士俗視他邑為猶近於古也乃為本諸詩人之㫖以序作者之意且志予愧云送汪生序始予既知學頗思自拔於流俗而患夫窮鄉下邑塊焉獨處無從考質以袪所惑聞錢塘古㑹府號稱衣冠之聚宿儒遺老猶有存者則籝糧笥書踰濤江而西幸而有所接識然以違親越鄉不能久與居與游間獲聆緒言之一二終未至盡大觀而無憾也毎誦昌黎韓氏所志歐陽詹何蕃事未嘗不有槩於予心嗟乎詹以求道而去其親蕃以其親故不得安居以卒其業此兩人者雖若各行其志夫亦有所不得已焉爾為士而生於師廢民散之後何其不幸歟四明汪生少從其父宦游西州而及諸公之門揚秋濤于學海攬夕秀于詞林有日矣今方奉晨昏於信之玉山信固名郡異時東南文獻多在焉其學者又往往先經術而後文藝屬兹昌辰崇椎而黜浮三歲大比褎然前列必信之士也生入則有色養之歡出則有師資之益斂其華而就其實在此行矣是蓋詹與蕃所欲而不可得者矧如予之孤陋能無所歆羡乎惟生知自慶幸而期無愧于詹與蕃則予所望也輒抒鄙懷以為臨别贈言之首云李節婦詩序節婦馮氏名易安大名南樂人山東東西道提刑按察使開之孫湖州録事汝弼之子武寧縣尹李君如忠之繼室也李氏故為金之宦家今占籍東平汶上髙祖曰仲略山東路按察使曽祖曰景雲御史中丞祖曰先永昌令父曰定國朝至元間從下江南因寄家于越君初娶探馬赤氏有子曰某生十年而特黙齊氏卒録事君時任越之筦庫以節婦歸焉僅再期君遽以疾卒大德某年四月某甲子也君垂殁時語節婦曰吾已矣爾其奈何節婦引刀斷髪誓靡他方是時節婦年二十有七其子二人任甫一歲伏方娠後兩月始生汶上之族及特黙齊氏之家聞君死多留貲合内外屬南來悉取其蓄聚而攜其子某以去節婦一聽其所為弗與較四壁蕭然室惟兩柩而已閭巷之人莫不哀之節婦有姨母事山陰尉李君良佐頼其力奉柩葬城東北蕺山下録事君念無以資衣食將嫁之節婦爪其面流血以死自誓録事君知不可奪為養女求贅壻以周給之蓋其嫠居者十有九年二子既克有成立乃以泰定元年春遷李君暨特黙齊氏之柩返葬汶上先塋之次中書平章政事王公實為之銘於是南北聲問阻絶已久宗姻里黨意其必已更適人或疑為死矣聞其來皆大驚太息至泣下節婦俾任留奉丘隴而與伏來越上以存江南之祀一時名人多為賦詩屬予以序予惟方今德教流洽俗化淳美女婦能以義自守而見褒表者無地無之其遭值變故始也能居人之所不堪終也能伸己之欲為若馮氏者幾何人哉庸直書其事于卷首俾覽者知其賢與他見褒表者固不侔也賛美之辭則篇什存焉送楊知州序諸暨古望縣也國朝以其戸口殷大易縣為州仕焉者往往憚其俗險而不易治務出聲威以臨之恩意日益衰薄愚民無知苦吏急而不自安始有懷疑飾詐投隙而起者本其所以致此由御之乖其方非人性然也異時之賢守有為之樹碑者有為之立祠者好德之心曷嘗一日亡况是州之人或出而以材顯或處而以尚義稱其學者又能讀書為文辭取進士俗豈盡不美治之豈誠不易哉特患夫為政者莫知以平易近民耳楊侯其知以平易近民者歟侯仕於京師最久補外得汝州政成又徙諸暨其治汝如在京師治諸暨如在汝不以地之逺近俗之厚薄變其志居之三歲未始鄙夷其民一切除去苛嬈而與之相安于其事不致疑于形迹之間而人自不欺向所謂愚而無知者亦靡然從其化蓋平易近民之效也孔子曰子欲善而民善矣詎不信夫侯以秩滿將還京師僚友士民咸惜其不可留凡工文者共為詩送之而屬予以序予嘗忝佐是州侯至而予已去不得與侯從容周旋以挹其餘風姑以所知序之如此他可稱述而予不及知者此不具送八元凱序班固為漢儒林傳凡經術之士登載甚悉序稱公卿大夫士吏彬彬多文學之士西京人材衆盛蓋可想見至所傳循吏不過六人文翁通春秋而以郡縣吏見察舉朱邑起嗇夫黄霸入錢榖得官皆其後乃舉賢良始以明經進而終列於循吏者龔遂召信臣而已何文學之士衆盛如彼而其為循吏止若是邪粤自先朝著貢舉令廣延茂士充於列位其以材猷陪廟論以節槩持風紀以雄文碩學藻飾皇度而模範國人者漢之公卿大夫不得専美也偏州下邑居官可紀無媿古循吏者吾元凱浦江之政殆庶幾焉元凱由胄監生擢進士第二人為郎祕省再轉而長是邑清白之德形于造次不自表以為名其治務簡易遇人有恩而人莫敢䙝用法不至峻急刻深而姦豪讋伏或自愧悔歸于善良暇日則脩庠序之事化其民以文雅是可謂有古循吏風歟否夫以西京人材之衆盛内明經進而列於循吏者僅兩人此兩人者皆二千石得専制郡事千數百年之下文法滋密民俗浸媮而元凱能以一邑行其志又難矣元凱為浦江滿三歲而去浦江之隱君子曰方樗夀甫者予友也善為詩而不苟出獨于元凱之行率士人賦詩以送之且以書俾予序其首予觀元凱固不止百里材矧今明良相逢一旦疇其民庸而圖任之則元凱之所施當有大於兹邑者雖然黄霸三公也班固以其材長於治民特寘之循吏之列輒因序詩併著元凱之為人以俟他日傳循吏者采擇焉送髙承之詩序古之世其家業而不隕者非傳珪襲組之謂也氣澤之僅存風聲之未泯是有賴焉時方承平衣冠鼎盛孰不知自振飭以久有其光榮逮夫運去物改故家喬木㡬何不與海桑俱化而晚生後出如芝蘭之在階庭不以雨露之弗及而輟其萌芽求之於今固不多得也臨邛髙氏兄弟當宋之季大叅以文學顯沔州以忠節著其歸後魏氏者是為文靖公道德論議世所師尊而沔州之子又起世科躋政路百年之門戸嘗烜赫矣有名繼忠字承之者於沔州為曽孫生乎異代之後懷其材不苟自售而與時浮湛於韋布之間顧獨惓惓焉家世源流之舊凡遺文故實片辭隻字蔵護惟謹蓋承之欲世其世業者有不在彼而在此也頃予與承之相見鄞江上聞承之將出而游於京師王公貴人誠為之知己則髙氏之衣冠蟬聨奕葉當復自承之始豈直保其氣澤續其風聲而已承之行有日朋從皆為賦詩而徴予言為之序愛莫助之詩人之㫖也勿替引之承之勉乎哉文獻集卷五
