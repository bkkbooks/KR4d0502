body:
  text: 文獻集卷八上元黄溍撰墓記八世祖墓重建石表記宋黄府君諱景珪字叔寳婺之浦江人溍八世祖也府君父諱昉字明仲母于氏墓在縣西花橋之南而府君墓在縣北之後店夫人朱氏子一人諱琳娶宗忠簡公澤之女弟始家于義烏是為溍之七世祖孫三人伯曰璣仲曰益其季諱中輔則溍之六世祖也自是族日以大舊譜所載間有脱畧其可見者曾孫萬頃昭祖紹祖公顯公煥無咎少亮潛之揚祖九人諱紹祖者於溍為五世祖𤣥孫伯謹簡天夀慕韓某伯昌必大伯信夢符伯恭三畏伯紀桂發維介子唐英綱縝十八人諱伯信者於溍為四世祖累贈朝散郎朝散公有子三人長諱夢炎朝散大夫行太常丞兼樞宻院編修官兼權左曹郎官以朝請大夫致仕次忠翊郎權安慶府望江縣令焱次太學生熒朝請公未第時嘗刻石表府君墓年世殊邈或竊取其石而去或㨿其墓垣外餘地而有之太學生之孫可久望江令之孫可傳等始按其籍悉復故地遂伐石重建此表俾溍志于下方溍朝請公之曾孫承節郎諱堮之孫皇贈中順大夫同僉大常禮儀院事江夏郡伯諱鑄之子其生也後無從備聞上世事府君之年夀卒葬與凡行事雖逸其傳而子孫衆多有以彰積善之餘慶是謂叙次世系訖于功緦譜所弗具莫能詳也袒免而下今又六世譜之所及百五十人亦不得而盡著焉至正七年春二月甲子八世孫溍謹記先祖墓銘石表記嗚呼是為吾祖考黄公祖妣徐夫人之墓自我先人奉柩合葬于兹十年而溍誤玷科名叨塵官使又二十有八年乃得請而致其事德薄位卑所以榮其先者寵數有限後四年欽奉上㫖起自退休入直翰林備員侍講始用著令得推恩二代比年兩膺錫命公初贈中順大夫禮部侍郎上騎都尉追封江夏郡伯再贈嘉議大夫禮部尚書上輕車都尉追封江夏郡侯夫人亦自江夏郡君進封江夏郡夫人惟黄氏􅄔大姓由金華散處它郡者仕宋多致顯官而公七世祖諱昉六世祖諱景珪仍居婺之浦江五世祖諱琳娶忠簡公女弟又徙義焉而為其縣人未有出而仕者髙祖諱中輔以文學行義知名轉運使薦于朝將授以官命垂下而卒曾祖諱紹祖復隠弗仕祖諱伯信迪功郎累贈朝散郎妣宗氏忠簡四世諸孫女累封安人考諱夢炎淳祐十年進士仕至朝散大夫行太常丞兼樞宻院編修官兼權左曹郎官以朝請大夫致仕妣陳氏方氏陳氏贈宜人有子曰垓方氏實生公諱堮朝請公第二子也朝請公遇明禋當任子輒推以與其姪故公兄弟無用廕入官者公僅以進納補承節郎而不及禄生於嘉熙四年六月二十四日卒於今大德八年五月二十四日享年六十有五夫人東陽徐氏曾祖諱楠祖諱炘考諱彬淳祐七年進士嘗以奉議郎行國子正與朝請公並入淮西淮東制幕為主管機宜文字㑹改建兩淮宣閫又同辟幹辦公事故以夫人來歸而公以疾廢夫人安於命分育我先人為子以保其世業三從之義靡所缺虧生於淳祐四年八月一日卒於今大德七年八月二十四日享年六十墓在縣東北崇德鄉東埜之原與先塋相望葬以十年八月贈封之制下則至正七年十月八年十二月也一子即我先人諱鑄用朝請公遺澤補將仕郎宋亡遂絶意仕進後五十年乃以恩受封終於從仕郎温州路樂清縣尹今累贈中奉大夫江浙等處行中書省叅知政事護軍追封江夏郡公孫男五長即溍次漙次浩為朝請公長女之子劉應龜後更名鼎次次滋為朝請公長男垓之子頥後女三適賈師夔劉咸生劉拱辰曾孫男六檮橒梓樞杞楨女二適陳克讓劉道泰𤣥孫男八璨瓊璋瑞瑄琛瑭珹女三嗚呼昔歐陽文忠公作龍岡阡表於卜吉六十年之後自以為非敢緩也盖有待也溍衰謝之餘繼罹憂患苟存視息以終天年寜復有所待乎詔使在門義不俟駕龍光赫奕有隕自天褒大顯榮賁及泉壤則文忠所謂遲速有時不克有於躬而足以表見於後世庇頼其子孫者也䖍奉命書展告𤣥宅感慕涕泣不知所云姑序其梗槩于兹石表嗚呼來者尚有以知其所自而永永不忘哉至正元年八月一日孫男溍謹記先考墓誌銘後記二首先君既葬且免䘮溍起自草土復從薦紳之後因得乞誌銘書篆於同年三鉅工顧以縻身下列久未克歸入石既䝉恩外補以先夫人春秋髙不俟引年納禄而歸將礱石以刻而奄罹大故惟先君荐膺崇贈祠版已屢改題誌銘書篆不宜尚仍其舊先夫人之葬僅序嵗月納諸壙而未有以昭示于後人溍憂患餘生退休田里無繇奔走俯伏大人君子之門以請懼因循廢缺愈重不孝之罪謹以其文摹勒上石而以其所不書與未及書者悉系于石隂初朝請府君之姊適從事郎昭慶軍節度掌書記王公囦金嘉熙戊戌進士有女作配于儒林郎兩浙西路提舉常平茶鹽司幹辦公事丁公應復實生我先君年十有二朝請府君見而竒之承節府君以疾廢遂俾育先君為子儒林公世居吴興朝奉郎伯虎嘉定癸未進士於公為考中大夫直寳謨閣太府少卿曄慶元丙辰進士於公為祖公方以考舉及格侍班而德祐失國公亦失世禄家日益落先君迎致侍養終身嵗時為位以祭惟謹此誌之不書者也童氏金華大姓先夫人之曽大父恮迪功郎臨安府錢唐縣尉大父必遇迪功郎紹興府嵊縣主簿父承信公娶俞氏以寳祐四年六月十九日生先夫人年二十歸于先君後先君十二年卒至正三年六月二十三日也享年八十有八其年八月二十七日奉柩祔于先君之右先君受封五年卒官七溍自國子博士出為江浙等處儒學提舉始贈先君奉政大夫祕書監丞驍騎尉追封義烏縣子先夫人進封義烏縣太君溍之婦王氏昭慶書記公曽孫女亦自宜人加封義烏縣君溍既得謝而廷議妙東𤣥臣付以史事旁招疏賤俾預討論使者及門先夫人之殯在堂已九日矣服除乃拜祕書少監致社之命累贈先君中順大夫同僉太常禮儀院事上騎都尉追封江夏郡伯先夫人追封江夏郡君孫男檮已卒梓國子學生今用䕃赴吏部銓女嫁惠州學正陳克讓者亦已卒次嫁劉道泰曾孫男又三璋瑞瑄女一此誌之未及書者也然所謂考其所自出者盖有不容盡冺所謂贈典日隆者固逆知其可必溍是用推述而備著之先君之嘉言懿行先夫人之淑德令儀雖非不肖孤所能稱道祖父姻亞官封卒葬之詳來者或有稽焉至正五年十二月十五日男溍謹記溍立石未幾而被上㫖落致仕入直翰林備員侍講比嵗累䝉推恩褒及於二代承節府君初贈中順大夫禮部尚書上輕車都尉追封江夏郡侯徐夫人初追封江夏郡君再追封江夏郡夫人先君加贈集賢直學士亞中大夫輕車都尉追封江夏郡侯再加中奉大夫江浙等處行中書省叅知政事護軍追封江夏郡公先夫人兩追封皆江夏郡夫人溍之婦王氏亦兩封江夏郡夫人間者溍以衰朽乞身而退克親奉帝制展告以禮俄復拜召還之命未遑有所登載兹幸得請歸守先隴乃序次其畧附見于石隂之下方曾孫闕文二琛唐珹女二𤣥孫男一道永至正十年七月七日男溍謹記外舅王公墓記外舅王公之殁遺命屬溍誌于幽堂溍方竊食輦下既䝉恩外補乞身而退俄被㫖落致仕復玷朝行及得謝而歸則奉襄大事已久溍亦老而耄及之矣念他日不可無以藉手見公於地下謹封書其所可知者俾揭于墓之原公諱桂字仲芳姓王氏月谿其自號也其先汳人宋渡江初五世祖琳避地南來家于婺之東陽暨四世祖徽咸弗仕曾祖諱師伋以子貴累贈中奉大夫妣宗氏京城留守兼開封尹贈觀文殿學士忠簡公澤四世諸孫女通判衢州䕫之曾孫女累贈令人寳章閣學士劉公克莊銘其墓祖諱囦金嘉熙戊戌甲科進士授從事郎昭慶軍節度掌書記未上而暴卒妣黄氏我髙祖贈朝散郎諱伯信之女曾祖太常丞樞宻院編脩官左曹郎官朝請大夫致仕諱夢炎之姊朝散與中奉為友婿故以長女為其家婦考諱沂文林郎監沿江制置副使司造場妣張氏初昭慶入奉大對臚唱之日太師魯國喬文惠公行簡為首相立殿上退遣吏賀曰當以衣缽相傳盖謂其居同里同以四十餘為殿試第五人也而不料其竟不及禄母弟曰鎔前十年已擢龍飛第踐敭所至内則郎曹寺監外則監司帥守終於中奉大夫直煥章閣荆湖南路計度轉運副使撫兄子如己子由是文林以恩補官公夲宗氏子令人之從孫也煥章遵母命俾為文林後亦以恩補將仕郎公生長宦家自少親炙諸老痛洗綺紈子弟侈靡之習而刻意於學為文操筆立就若不經思而藹然有前輩典型尤工於歌詩樂府駢四儷六之語善楷書端勁方嚴得顔柳遺法南嶽有鎮南之殿四大字乃煥章將漕時令公代作迄今猶存人莫知為公之筆也隨侍宦游歴七閩三湘且久留江上多所見聞遭時艱虞頗慨然欲以事功自奮際今聖代四海合一分命重臣生鎮南服號曰行省承制署公處州麗水縣主簿公不敢辭受而不赴自是絶意於仕進徙居别室開門授徒生計日哀簞瓢自適安常處順既夀而康重紀至元之五年某月某日不疾而卒享年八十有八有四書訓詁十卷詩文雜藁十卷隨筆一卷娶李氏寳謨閣直學士吏部尚書大同從曽孫女前公十有七年卒子男二人長武次復並為外家李氏婿武後公某卒復今獨承其家女五人長即溍妻累封江夏郡夫人溍之曾祖姑歸於昭慶王氏以女歸於溍篤世姻也次適李法尚書四世嫡孫次適何德光次適吕潮某州司法參軍友德四世孫次適何德澗孫男二人坦塤坦亦已卒女一人凡子孫若壻若外孫男女合三十有二人先是煥章葬縣北甘泉鄉廣陵寺之後山搆祠宇割田四十畮有畸俾寺守之而僧悉以田質錢於富民公銖積寸累贖而還之晨香夕燈之須頼以無闕公又以昭慶墓在縣南之東姜族子或竊其地劵售於豪家有司弗能直文林墓在縣南之桐川又數毁於盗遂卜地於煥章墓東南之唐塢遷兩世闕四䘮及内子之柩以昭穆序葬仍虛其左以為夀藏旁置冡舎名之曰繼菴示子孫使勿替其承也公既殁二子以至正某年某月某日奉柩即公所自為􅝩槨安厝焉始公命溍銘外姑之葬而自銘其夀藏曰生吾順兮殁吾寜魂氣超騰兮風露青㝠佳山佳水兮佳城欝欝吁嗟兮吾其寓形此室銘成而不及自誌其平生夲末爰以屬於溍惟公之盛年有官而無位晚復抗志事外故其素藴不少槩見於設施溍所書若甚簡畧而皆有可徴不敢效世俗巧飾誣言以為欺也至於系序官伐姻婭之詳雖細勿遺不暇一一裁以古書法而去其繁冗誠懼夫後之人日逺日忘也過而覽者幸無誚焉至正十三年冬十有二月二十七日庚申壻翰林侍講學士中奉大夫知制誥同修國史同知經筵事黄溍謹記銘勤有堂銘皇錫下人展也良貴能者守之罔敢怠棄惟勤為常非有為異及身而誠萬物皆備其勤斯何殀夀以之雖休勿休伊誠之思其有斯何匪我也私不物於物而誠之為孰劬而躬閔勉朝夕封吝殖驕執為已得一元黙運其生職職天德之修人道之極猗君之為厥志允臧式敬爾承勿助勿忘閑邪存誠充實輝光我曷振之勤銘兹堂兼善齋銘墨貴兼愛儒者擯之詎曰此道我之得私必由其夲以及其支相古先民孰為我師莫窮匪顔莫逹匪伊何志何學朝斯夕斯乾之善世則罔敢知坤之積善尚其孶孳止也以所動也以時毋慕千里忽于毫釐仁如夷吾或羞其卑為善有術視我銘詩腴晦齋銘王君仲致以腴晦名其齋盖有取乎考亭朱子冠而字之祝辭云爾夫所謂人晦於身神明内腴者復而通也今乃援其辭而左之者通而復也仲致來徴銘為之銘曰惟皇播物終始一誠屈信相推乃色乃形有出於幽以豐而亨有入斯息明夷之貞而通而復與時偕行展也王君斂其華英退藏于宻以觀其生與造物者游神之廷曰予庶幾天之性情我遏相之式彰兹銘息菴銘上人允兹扁其菴曰息因以自號盖扁以章所息之處號以表能息之人能所相為無窮吾未見其息也上人來徴銘為之銘曰謂菴非人孰累於名謂人非菴名孰與嬰所息者境能息者智菴邪人邪依正不二刹􅄼之頃能所雙亡十刼何短一息何長勿生癆勞而止中路咄兹草菴非汝住處圓硯銘翼之家藏王使君所貽圓硯有白文貫其腹銘曰黑之守處也久白之不湼歸也潔興讓堂銘何君貞立起進士官七品法當封父母及妻父以讓於其祖妻以讓於其祖母有司如其請以聞貤恩既行乃扁所居之堂曰興讓名人鉅公樂道其事紀載而誦詠焉君出以示予因系之以銘曰讓之為義推已所有木水本源則有所受子承其考婦繼其姑家之積慶匪我有餘嗟嗟末俗借鉏取帚孰視爾民俾歸于厚施由親始千乗可輕義以起禮善不近名皇仁在上孝子不匱奕其龍光恩榮備至爰建稱號樹之風聲一家之讓國人其興作為銘詩薦此樂石匪私其家維以勸德方齋銘鄱陽胡君以方齋扁讀書之室而俾其子益來徴銘為之銘曰輿之方輪以圓而相資鑿之方枘以圓而相違天下之方盡于五寸之矩所不能盡者物情之不齊是故君子方以正已之度圓以任物之宜主至靜以為德不自毁于腓隨匪惡圓而喜方諒所秉之莫移爾息爾藏矩範在兹無矜而名尚允蹈之青石硯銘雪竇方丈所蓄青石硯德夀故物也銘曰匪琥其白匪璋其赤夫蒼蒼者天之正色韞匱而藏守之以黑毋曰兹宋之隕石也恒德齋銘易之為義隨時變通有不變者確乎其中是曰恒性人之固有充為恒德不息則久聖人之道久而化成由其不息是之謂恒惟君法天下偕行偕極惟臣承君咸有一德繄公之先國之元臣篤生後賢左右聖君吾儕小人朝不及夕夫孰如公自強不息體之既立其用必行措諸事業乃恒之亨允懐于兹益謹其度與國同休以永終譽墓誌銘張君妻趙氏墓誌銘溍為諸暨州判官之明年得一士曰張復盖䘮其母踰再閏猶哀慕不已益求時之聞人為詩若文以杼無窮之悲焉竊嘗取而閲之非直其母為可稱道其父之事尤有足紀者夫型善以勸俗長民者之責也溍幸以末學與聞有政庸掇其繫乎人之大倫者為銘以畀之銘曰於粤之墟句無之里孰望其地曰有張氏軫君之名君實其字羣居太學五載不第文不在兹運去物改白刃可蹈惟義所在爰有賢配克儷其美名曰與婉胄出燕邸五世祖詪疏封安定從伯祖光典領宗正􅘊惟伯父以文藝著兩制八座累膺異數父曰希㙠進食京秩出宰桂平千室之邑其叔父埊亦主外藏流芳奕葉後先相望展也令淑婦德是履守節自誓嫠居四紀至治初年龍集壬戌三月之朏翼日而卒上距始生五百甲子男復暨頥訖葬以禮吁嗟復也終身之慕􅎭服既除祥琴弗御父也義士母也節婦不有孝子曷顯父母繄長民者宜存風勵顧慙不敏承乏下吏瞻彼西莊丸丸松栢勒辭相哀用勸凡百江浙行中書省左右司都事劉君墓誌銘君姓劉氏諱濟字仲源河間肅寜人大父法静父元皆弗仕至君始以東江場同管勾遷昌國正監管勾入御史臺為宣使肅政亷訪司立選授江南浙西道管勾承發架閣兼照磨以照磨劾其使貪縱不法事聞使坐斥去君亦以秩滿調婺州路司獄有余甲者以貧自鬻為人奴勢家子慕甲妻美弗能得㑹其主病死金華道上因誣甲殺主而奪其妻吏既傳致成獄君直其寃破械出之蘭溪民王乙為怨家所殺乙親戚兩人將訢其事怨家懼更屬吏捕治兩人謂乙私其妻實共殺乙頼君言徙其獄旁郡兩人得不死它以事株連若鍛鍊無得而久繫者君悉為剖析所活十有四人所縱遣八十餘人永康大姓以睚眦之怨毆人至死有司弗敢詰反抵告者罪君求得其情乃收案殺人者宣慰使而下以受賕曲法敗者五十餘人用舉者復入江南諸道行御史臺為令史丁父憂服除授湖州路總管府經歴於是天子方用言者悉徙江浙行中書省郎中以下它官更取材望補其處君以選擢左右司都事且追用平反超陞承德郎到官明日而卒延祐元年七月二日也得年五十有五其孤汝珪等將奉柩歸肅寜以某年某月某日葬縣東安仁鄉長城之原泣謂溍子辱游於先人最久宜知先人盍有述溍婺人也幸能道君為獄官時事它宜傳者詎止是耶史稱于公為郡决曹决獄平今所見獨孝婦不殺姑一事而太守莫能聼至令抱具獄哭而去然則君亦足以不朽矣謹次而為之銘君娶曹氏次林氏子男三人汝桂汝楫汝弼女三人長適同郡韓梓道餘在室孫男若干人女若干人銘曰孰降其材而奪其施孰受之器而易其宜百畸一逢孰終尼之維善無小維官無卑考事列辭式昭厥垂真定路深州知州致仕劉公墓誌銘公姓劉氏諱守讓字謙甫其先由大父立而上世為汴人金末父信避地真定因家焉故今為冀州南宫縣人母李氏有五男子公其季也公年甫踰弱冠入祕書監為奏差尋又入御史臺為殿中司知班久之擢浙東海右道肅政亷訪司管勾承發架閣庫兼照磨時方新使名以正憲度將指者皆名卿參佐悉取材望公妙年首膺其選深自砥勵以求報稱間以慮囚攝使事行郡邑懲姦貪省寃滯接引善類所至有聲居七年乃代去調婺州路總管府知事俄復入江南諸道行御史臺為令史調霍州靈石縣尹未上丁内艱服闋改慶元路平凖行用庫提領秩滿以奉訓大夫真定路深州知州致仕至順二年十二月十五日以疾卒于鄞之寓舍得夀七十有五公長髯秀眉容止言論閑雅不迫有古君子風善屬文尤喜為歌詩以其自號扁所居室曰夲齋琴樽圖史羅列左右退食則宴息其中客至與談中原文獻之舊娓娓不倦性亷退不急於進取每詣京師輒自赴吏部銓俛首常調殊無難色其任筦庫也分帥閫乗亷車者皆公故等夷見公必與均禮公執其分守滋益恭仕既久而家愈落殁之日頼故舊致賻禭乃克以斂其清約如此娶鄭氏張氏皆先卒子男五人長元以公䕃為晉寜路石樓縣尉次貞祐某某女三人長適管軍而户孫毅夫次未行次適孫某孫男三人女一人初公母氏卒于建鄴葬城西之清凉山元等將以某年某月某日奉公柩葬其左貞來俾某為之銘始公佐憲府某因公行部以諸生禮見公未嘗以凡子遇我自是周旋公父子間殆四十年銘非溍其誰為之雖不文不敢辭也公家世之詳約齋劉公實誌之此不著銘曰人孰不仕易失者時嘆老嗟卑百喙一辭猗與劉公蚤有令聞素乎其位無喜無愠澤及後人惟德之符我銘孔昭以勵鄙夫福州路總管贈嘉議大夫太府卿上輕車都尉追封天水郡侯諡景惠趙公墓誌銘公姓趙氏諱執中字景賢世為趙州晉寜縣人祖謙趙州都自父珣將仕郎亳州萬户府經歴至元初太尉河南武定王為征南都元帥合䝉古漢軍擊襄陽公時年未弱冠以推擇為吏𨽻河南統軍司從築白河口鹿門新城元帥察公材可用因寘之幕府公雖主治文書不專以鈎摭趣辦為務日與士卒同冐矢石未嘗辭難凡軍中大計亦徃徃由公關説用久次陞提控案牘歴行中書樞宻兩府椽太師淮安忠武王以右丞相行中書省事復署公為屬時襄陽已下丞相總諸軍水陸並進公與在行從諸將轉戰而前既渡江取鄂州丞相提舟師順流而下俾公從平章政事楚國武定公分治省事移書諭降荆湖諸州軍十三年春丞相至臨安以宋版圖來上計功行賞公自省提控令史拜中順大夫夀昌府知府行同知真州路總管府事久之用例解所佩金符句容武毅王時在樞宻丞相言公於渡江有勞且嘗䝉上恩備官使宜因其舊職序進之武毅以聞得不以有司常法限其資級改朝列大夫同知泉州路總管府事用薦者以朝散大夫為南雄路總管除中順大夫福建等路都轉運鹽使秩滿以少中大夫為福州路總管至大二年九月某日卒於官享年七十公之在泉州也盗起安溪掠大洋川據石盤頭勢張甚守將莫知所為公單騎直抵其處群盗大驚公徐曉以禍福則相與羅拜願貸死公因撫定之後皆為良民盖公久居兵間聲望已著故能使之讋服如此其以省檄閲漳州金榖也得羡錢五千緡米萬石其為轉運也患富啇交埸吏受鹽不以法命以竹器如法實鹽而倣福之南臺列倉于漳泉興化以貯之持引就受鹽者無所容其弊嵗得羡鹽五千九百引其善理財又如此惜夫久在外服其政迹有非談者所能悉知也夫人王氏劉氏皆先公卒子男七人長曰鉉以公廕入仕今為承務郎婺州路東陽縣尹孫男七人絃等既以四年十月某日奉公暨夫人之柩合葬寜晉縣村先塋之次後若干年始得請於朝贈公嘉議大夫太府卿上輕車都尉追封天水郡侯諡景惠仍贈夫人天水郡夫人爰以書來願得銘昭揭墓道溍惟人材之生必于興運匪特將相重臣兩有文武其僚吏亦一時之選也千載之下尚論其世知有伊吕蕭曹而已其能因事附見於䇿書者幾何人哉然則趙公之事固不可無述也乃弗辭而銘之銘曰嗚呼趙公受材孔良斂藏不耀出其豪芒貔貅百萬長鎩鉤㦸公於其間持以文墨豈無悍強畏此簡書飈騰電擊靡亟靡徐江流湯湯其險莫測投鞭而往歸數爾獲孰發而蹤其功也人公罔敢知國有元臣元臣之賢天子之聖曰弗汝遺視汝初命公材則多無適不宜魚符龍節未究厥施尚其嗣人克圖不朽馳書謁辭式告永久亞中大夫漢陽知府致仕盧公墓誌銘公諱克治字仲敬姓盧氏其先由范陽徙河隂徙滑之胙城曽祖諱某祖諱鉉皆不仕考諱璉甞佐開州軍事因家焉故又為開州人公少負志氣稍長知讀書慨然思自奮發於功名至元十三年從軍取淮甸有勞入淮東都元帥府為令史厥明年國家㡳定南服論次功賞授承務郎漢陽府判官時郡邑新附人心匈匈凡所以布宣上德撫慰綏集之者公之力居多換從仕郎龍興路總管府經歴用察官及部使者薦擢江西行尚書中書兩省左右司都事以材敏見知於參知政事東平徐公亡何以事乗傳入奏京師遷江浙行中書省左右司都事於是徐公方持部使者節蒞浙右亟剡上乞署公臺職未報而公去為兩浙都轉運鹽副使東南財計莫重於鹽莢先是恒以嵗賦減耗為憂公䂓措有法自常算外得羡鹽八萬九百引以最聞除知平江常熟州下車牒訴坌集公談笑立决吏畏服如神有以強盗坐繫者公探其獄以為此愚民無知因客舟漂抵旁近地而利其菽粟耳非有首事合謀受分之驗不可悉置之死僚佐疑不决後竟如公言獲減免者三十有九人嵗饑諭大家使賑其不能自食者民用無轉徙既又以為水利未復則旱澇之患不可去乃行視許浦福山諸水之故道湮廢不治者十有六募民浚導之如其舊為水門以時其蓄泄之宜而閉縱之凡役工一百一十四萬所食米以石計者三萬四千四百鹽以斤計者一萬九千九百官無毫末之費而民得其利不以為病也田里既以無事乃大治學舍凡廟像器服之不如法者易而新之田租之冐沒者理而復歸之其所以嘉惠是州者閲五載如一日㑹朝廷以沒入朱張家財物悉歸於官擇可任出内之寄者或言前簿録朱張家時公嘗被檄與聞其事乃命公綰銀章為江浙等處財賦都總管以涖焉常熟之人皆重惜其去相率為生祠且請于前史官聊城周君作文以記之有司具實以聞除知建康溧水州其治如在常熟引年以知漢陽府致仕累階亞中大大公素薄於榮利既謝事居吴中一室翛然日與賔客以觴詠相娱樂至治三年十二月二十六日以疾卒得夀七十有四夫人李氏與公生同嵗先十二年卒以泰定某年某月某日合葬開之濮陽縣黄斌原子男四人長曰恂奉議大夫晉寜路潞州知州兼管夲州諸軍奥魯勸農事次忱蚤卒次惺次悦女三人長適福建都轉運鹽使司奏差劉徴餘未行孫男二人保僧閏僧孫女二人俱㓜公為詩曰琴川集者若干卷曰錢唐集者若干卷並藏於家惟盧氏望范陽號稱官族其别於開有任叅知政事追封范陽郡公諡文昭者曰克柔公之伯兄也文昭之子景今江隂州尹豆以文章家知名終於翰林待制而公又有潞州以為之子方興而未艾也是不可無使來者知積累之自潞州以公行實來徴銘謹序而銘之銘曰奕奕盧宗世有顯人繇公兄弟弗墜益振公之受材孔敏且裕載而四馳以徃用譽胡既遇矣不究于施曰予其休退也委蛇勾吴之墟言游之里遺愛在人匪逺伊邇人孰不仕孰完於公始卒無疵而以豐終公不三事公則有子揚詩墓門垂示無止霽峯李先生墓誌銘先生諱洧孫字甫山姓李氏其先出唐宗室燉煌房五代時避地越之三界三界者㑹稽上虞嵊三邑之衝也廼益東南至台之寜海家焉曽大父穆宋迪功郎大父開之弗仕父演與同里葉公夢鼎俱受業直龍圖閣鄭公霖葉公後由太學釋褐至丞相先生之父故為布衣人知其宜有後矣先生早嵗即能讀父書既成人師事太學博士舒公津學日以進方是時覉旅之士得羣試于漕司號曰寓試就試者動以萬數嵗甲子先生年二十有二以詞賦中其選第一聞者咸歎竒之已而上春官不合鄉先逹右司郎官陳公緯憐其才宦游所至恒引以自近癸酉更以國子生預奏名遂擢甲戌進士第授迪功郎黄州司户參軍未上而黄州以版圖歸職方先生棲遲海濵者餘二十年有終焉之志郡府或以先生名剡上先生為強起詣京師述大都賦以獻時大德二年也居亡何而歸六年廼得杭州路儒學教授延祐兀年以選為江浙同考試官三年以從仕郎台州路黄巖州判官致仕天厯二年三月二十八日卒於家上距生年癸卯得夀八十有七上以至順某年某月某日葬朱開鄉何山之原元配王氏先五十一年卒祔葬董公山先墓繼胡氏先十二年卒與先生合葬焉子男四人長槼以先生致仕恩今為某官次榘次大德蚤卒次㮚孫男十一人炯炫燧炳􅂱灼嗣忠嗣􅒮炤烜煇凡先生為學官教人有法其較文稱賢主司至於興壞補弊出内之謹直其細耳故侍御史馮公翼甞薦先生可臺職不報先生盖仕而未顯固學者因其自號尊之曰霽峰先生云先生所著詩賦賛頌箴銘表啟碑誌序說總若干卷唯大都賦今行于世重修台州圗經列于官書溍以先生較文鄉闈之嵗忝備薦送筮仕之始適在先生所居邑而獲以禮見先生之将葬也榘與溍遇於錢唐泣且言願得銘刻石塚上溍雖不敏誼不敢辭銘曰嗚呼先生兮世孰予知山之幽幽兮食有蕨薇謂世無知兮終不我遺大龜寳玉兮其陳以時褻味雖厚兮弗實鼎彛鼓缶而歌兮日昃之離何虧何成兮式全吾歸清風拱木兮百年之思樹此貞石兮昭薦刻辭楊仲𢎞墓誌銘仲𢎞既卒之明年溍往哭焉其友壻蔣堂代致八嵗孤選之言曰先人之葬非先生莫宜為銘此先人治命也敢奉以請惟先生哀而許之溍不敢不諾也初溍與仲𢎞不相識輒以書締文字交凡五年始識仲𢎞後十有一年乃與仲𢎞同舉進士又八年而仲𢎞死矣嗚呼其忍執筆而銘諸仲𢎞諱載姓楊氏其先建州浦城人上距宋翰林學士文公凡十一世曾祖有雍祖祐之皆有隠德父起潛補京學諸生因家於杭故又為杭州人仲𢎞少孤事母季氏盡孝而有禮年幾四十不仕田理問用之得其文薦之行中書舉茂材異等不行周御史景遠強之至京師俄以母䘮去賈户部國英數言其材能于朝遂以布衣召入擢翰林國史院編修官與修武宗實録書成褒賜甚厚居亡何調管領係官海船萬户府照磨兼提控案牘於是仁宗在御方以科目取天下士仲𢎞首應詔登延祐二年進士乙科用有官恩例視第一人授承務郎饒州路同知浮梁州事秩滿遷儒林郎寜國路總管府推官未上以至治三年八月十五日卒得年五十有三泰定某年某月某日葬杭州錢塘縣某鄉某原娶瞿氏子男三人長即選也次遵次迪俱㓜仲𢎞平居性和易然於論議臧否未嘗有所假借其游從皆當世偉人吴興趙公在翰林尤愛重之亟稱其所為文由是仲𢎞名益聞諸公間盖仲𢎞於書無所不讀而其文益以氣為主毫端亹亹縱横鉅細無不如其意之所欲出譬如長風怒䑺一瞬千里至於畸㟁之縈折舷欹柁側亦未始有所留礙也凡所譔著未及詮次以行而人多傳誦之溍嘗評其文博而敏直而不肆仲𢎞亦謂溍曰子之文氣有未充也然已密矣溍每歎服其言今已矣無與共論斯事矣嗚呼而尚忍銘諸姑述其槩以慰吾亡友於地下云爾銘曰嗚呼仲𢎞而止於斯孰昌其氣之死不衰優優其辭不屈不枝有寜一宫文冡在兹過者必式考予銘詩張𢎞道墓誌銘𢎞道其沒於杭其子正䝉奉柩還山隂而狀其世叙官閥來求銘以葬予與𢎞道同對大廷同校文江西又同校文江浙未卒事而𢎞道移疾丐休致去臥翔鸞佛舎竟不起悲夫尚忍銘諸雖然知𢎞道者莫予若也銘非予將誰屬𢎞道諱士元姓張氏𢎞道字也𢎞道生宦家而自其少時不習貴游子弟嬉戱事稍長從鄉先生黄君受毛氏詩為舉子業場屋事廢士之志于禄仕者率投牒求察舉補儒學官𢎞道恬然不以動其意左簞右瓢幾四十年㑹有詔行貢舉法有司廼起𢎞道使就試遂以延祐二年賜同進士出身歴將仕郎慶元路鄞縣丞從仕郎池州路貴池縣尹承事郎太平路總管府經厯用致仕授承直郎同知鈆山州事命下𢎞道已卒其卒以天厯二年十月二十日夀六十有四葬以至順某年某月某日墓在承務鄉某山之原𢎞道為人内秀朗而外朴疎所學務平實其居官以樂易稱未始求赫赫名眩流俗嘗平反貴池殺人獄亦不自以為功也由是吏弗忍欺而民思之部使者考其績交章以聞事格不下代𢎞道為鄞貴池者皆𢎞道初持江浙文衡時進士人尤以為盛事云𢎞道世越人髙祖澤宋孝宗龍飛進士由侍御史諫議大夫至兵部尚書後以寳謨閣直學士食祠禄其行事見髙公似孫所為碑文曾祖璧通直郎簽書武安軍節度判官㕔公事祖厚之承直郎温州樂清縣尉父續古將仕郎入國朝以𢎞道官七品贈從仕郎處州路慶元縣尹母趙氏知西外宗正事少師不邌之曽孫女妻胡氏太府卿直敷文閣大初之孫女今以贈若封並為宜人子男一人正䝉也當以廕得官未調予聞𢎞道垂屬纊猶力疾坐語精爽殊不亂其所存必有過人者然則予之知𢎞道抑末矣銘曰樹之既同有穫而弗充不贏于躬獨以嗇終後其豐黄彦實墓誌銘彦實諱叔英明慈溪黄氏年五十有五以泰定四年九月某日卒于鄞明年九月庚申葬餘姚之竹山溍異時與彦實游彦實言今天下文章鉅工知我者惟伯長伯長必先我死我死于其銘我伯長故翰林侍講學士袁文清公也溍藐焉晚出於文清無能為役彦實乃欲以之承其乏耶而孰知溍之哭文清僅踰月又哭彦實邪溍雖不敏彦實之言詎可忘耶初朝廷既新貢舉法而場屋事久廢老生宿學多已物故後進之士無所依承則相率之彦實受弟子業凡彦實所指授取科名預薦書相望否者亦且去而補儒學官人皆為彦實喜而彦實顧不能少自貶以就有司之繩尺訖無所遇合以死人又莫不深悲之其知彦實者若是而已至於彦實之所存知之者未必盡也彦實之先大夫文潔先生宋寳祐丙辰文天祥榜進士負材能尚氣節而甚邃於經術所著書世多有之盖先生之學壹以躬行為夲故在朝著見為忠鯁而分符握節所至舉其職業風采凛然先生三子俱克紹其家學而彦實最少介然特立不務為苟同尤酷肖焉文清稱彦實少游故都見世所稱知名人率脂韋自保祕惋恨無可與語酒酣氣雄謂海宇方宴安休明宜取天下事置念慮以入計畫否則搜抉險幽浩然為萬里游遇不遇命也未幾泝米石上漢江西游荆襄厯觀用武關要荒榛廢壘猶有能言昔時得失益慷慨自振而所見公卿大夫與布衣之士則皆與昔交游者無大異於是治其居曰戇菴閉門讀書益不妄交嗟乎彦實之於天下獨以文清為知已而文清之言如此彦實所存固可槩見也彼以是瑣瑣者為彦實置欣戚焉何哉彦實嘗為晉陵宣城蕪湖三學教諭又為和靖采石兩院山長間以茂異遣詣中書弗果行彦實殊不以小試為亦不以不大用為詘也彦實於經史百氏之書過目輒成誦為文儁㧞偉麗意氣奔放若不可禦而要其歸能弗畔於道有戇菴暇筆三卷詩文雜著總二十卷藏於家彦實之曾大父曰世堯大父曰奉議郎一鶚父曰朝奉大夫宗正少卿震文潔盖門人私諡云母趙氏封安人而彦實沈出也娶岑氏先卒再娶王氏子男一曰祖德女二長嫁岑可久而夭次未行銘曰物之不齊雜糅錯出惡妍喜媸千古一律德人天游不物於物尚無有已孰得為失惟浩然之死是不沒磊落軒昻峥嶸突兀發其遺編猶見髣髴寫以石章用告幽室青陽縣尹徐君墓誌銘君諱泰亨字和甫姓徐氏其先衢州龍游之徐系出偃王而代祀遼邈莫詳其世次君曾大父曰誼甫有隠德大父曰克威以疾廢里豪乗間兼并其家生事日削父曰進始成童能隠忍激勵卒自奮以致完厚然喜施予又樂道人善以長者稱初娶越邵氏因徙家蕭山之漁浦尋又徙餘杭而占籍焉繼娶陸氏俱無子其子男二人女一人皆李氏出君最長德祐元年從父避兵踰濤江夜夢神人告曰趣返否且及難既寤遂西還已而兵從東方來人皆曰天既俾徐氏有後又謹護之積善之報將在是乎君性篤厚而遇事警敏少嗜學能為詞賦既又從師受經用舉者試吏平江精思竭力雖憊不休人或譏其過君曰事無小不可忽也軍校有不法事在郡府君視其牘議不少貸漕運官屬恃其品級已髙尤恣横凡姦私殺虐執事者率畏憚不敢竟其獄君一一具上論如律民間以匿朱張財物多無辜坐逮者君力為辨析免男女為奴婢者若干人憲府以時所引用斷例不一求文學吏整比之君定自中統訖大德為之綱目條分理貫簡而易求約而可守覽者便之既書滿行中書省署君歸安縣典史白雲宗僧沈某冐名爵凌官府有牾其意者兩人將置之死地兩人之怨家私鄰女不得殺以滅口棄尸桑林中事覺隂使以他辭引兩人傅致其罪君將直其寃吏持不可曰此沈公意孰敢拒也君盡立羣吏于前語之曰吾能死不能濫殺以求媚於人㑹使者行部君卒白出之沈之徒有僧某者通民家婦為其夫所毆而銜之適有遭刼殺者賊弗得僧為飛書誣其夫及有他怨隙者七人故以書堕邏卒家七人中或以罪黥卒得之曰此警跡也因捕治不疑君察其寃而七人者苦卒虐莫敢易辭君命去其杻械始垂泣自言令以左驗已具難之君服弊衣佯為賣卜至其處悉得七人以已物實贓狀取其家餘絲布數升析縷以比無不合釡竈及他物存者又合僧乃服罪七人者得直已而獲真賊於武康人始歎服焉縣獄舊有以兄醉死弟自經死誣平人者獄已成君親為訪求其實悉生之鄰縣安吉有逐其妻之子而夜死於盗者意其子也巡官捕繫而煆煉成獄且取它衣物為證君為蹤跡其事或驚懼以實自首乃出其子而坐巡卒及行貨者屬嵗大侵君夙夜施其拯救之術凡所給寜過厚曰無以法害吾仁也已代去省臺猶以荒政委之陞平陽州提控案牘以内憂去服除遷海道都漕運萬户府提控案牘方次里居而經理法行君以書論田不實役不均之弊累數千言宰臣領其要者得書大喜俾乗傳白於行省時列郡守咸以田事期集爭欲得君以佐其事君佐常州又佐池州所行一如其言他郡咸取法焉未幾以漕事至京師中書奏君以九品官仍為夲府提控案牘兼照磨承發架閣漕法利病下至占候探測著海運紀原七卷後有掠其美以自名者非夲書也尋復以漕事至京師詣都堂獻書數萬言條陳漕運之弊當更張者十事執政得書移行省用其七至今頼之久之以職官入福建帥幕田令史為提控采列郡圖籍撰福建總目若干卷用例授將仕佐郎建德路總管府知事言當世宜急行者其要六府上其事轉逹於中書雖不報而隠然用其説人或指曰是徐某所嘗言者時朝廷方選用重臣宣撫兩浙江東君摭時政闕失關大體者為九䇿以獻㑹其使遷他官不果行用覃恩授承事郎池州路青陽縣尹為治務教養其民縣人方某為割地以廣學宫章某為捐地以建惠民局有司嵗徴民輸荒田租為田千四百頃人甚苦之君寘為之限募民墾闢教以修方置閘而覈見田歸其實行視它民田之阻山瀕江者俾因地埶為蓄泄以備旱澇嵗饑則出已俸倡衆以賑之民有告四十人同發其廪粟者吏欲凖強盗論君曰吾方憂其死而食之彼乃以求生而抵重禁當用法外意可也悉笞而遣之旁郡邑事類此有庾死者憲府聞君議召其長吏切責焉鄰縣銅陵人爭魚池三十年君數語而决尤以是受知於上官滿代而歸留居吴之閶門無復仕進意結廬植花竹日與賔客觴酒賦詩或乗興獨往倘佯山水間自號可可道人元統元年六月忽搆疾諸子懼或請禱君止之曰吾猶未也果有異則止藥弗服時是矣已而有瘳久之乃以痁命止藥作遺書及戒其子佛事不必作親舊致賻不可受湏臾端坐言曰年六十五不為天官正七品不為小得正而斃焉幸矣言訖而逝十月六日也享年六十有五娶謝氏先二十九年卒繼潘氏子男五人曰震餘杭縣學教諭曰恒出後德清鍾氏曰濟曰孚曰艮紹興和靖書院山長女一人適章光祖孫男五人思誠思恭思温思義思文女五人俱未行震等遵治命以其年十一月某日歸葬錢唐石屋鄉先墓之後初君未及仕而父沒哀慟至頓絶母氏卒于官弟晉亨以憂病惑君曲盡調護之力焉君讀書務以致用不屑屑於章句作詩善體物寫情凡所著有端夲書忠報録自警録可可抄書各一卷厯仕集二卷效方三卷及家譜詩集並藏於家吏學大綱折獄比事各十卷行於世而所謂海運紀原福建總録皆列于官書予方樂聞君行事而艮以狀來謁銘敢不諾銘曰儒者之效久矣弗白矯矯徐君秉兹諒直施于有政藹焉厥績胡不卒施而有遺䇿勒銘告哀用表𤣥宅松江嘉定等處海運千户楊君墓誌銘楊氏之先世有顯人宋之盛時有自閩而越自越而吴居澉浦者累世以材武取貴仕入國朝仕益顯最號鉅族今以占籍為嘉興人君諱樞字伯機贈中憲大夫松江府知府上騎都尉追封𢎞農郡伯春之曽孫福建道安撫使贈懐逺大將軍池州路總管輕車都尉追封𢎞農郡侯發之孫嘉議大夫杭州路總管致仕梓之第二子母陸氏所生母徐氏陸以封徐以贈並為𢎞農郡夫人徐夫人温之宦家女生君甫數嵗而沒陸夫人撫君不啻如已出君警敏長而喜學一不以他嗜好接于心自刮摩豪習謹厚自將未嘗有綺紈子弟態其處家雖米鹽細務皆有法僕𨽻輩無敢以其年少而易之諸公貴人多稱其能大德五年君年甫十九致用院俾以官夲船浮海至西洋遇親王合贊所遣使臣􅄼懐等如京師遂載之以來􅄼懐等朝貢事畢請仍以君護送西還丞相哈喇哈斯達爾罕如其請奏授君忠顯校尉海運副千户佩金符與俱行以八年發京師十一年乃至其登陸處曰忽魯模思云是役也君往來長風巨浪中厯五星霜凡舟楫糗糧物器之須一出于君不以煩有司既又用私錢市其土物白馬黑犬琥珀蒲萄酒蕃鹽之屬以進平章政事察􅄼等引見宸慶殿而退方議旌擢以酬其勞而君以前在海上感瘴毒疾作而歸至大二年也閲七寒暑疾乃間尋丁陸夫人憂家食者二十載益練逹於世故絶圭角破崖岸因自號黙黙道人泰定四年始用薦者起家為昭信校尉常熟江隂等處海運副千户居官以亷介稱被省檄給慶紹温台漕輓之直力剗宿蠧棓剋之弊絶無所容天厯二年部運抵直沽倉適疾復作在告滿百日歸就醫于杭之私廨疾愈劇不可為俄陞松江嘉定等處海運千户命下君已卒至順二年八月十四日其卒之日也享年四十有九娶劉氏南渡名將太師鄜王光世之裔前四年卒贈嘉興縣君初君有三子俱未齔而夭奉父命以弟之子元徳為之子後乃有子曰元誠君卒時元誠生二年矣元德卜以元統二年正月某日襄祔事于泊櫓山先塋東百歩與嘉興縣君兆合君從父兄朝列大夫同知集慶路總管府事清孫實誌其壙而墓道之石未有所刻元德以狀來謁銘乃序而銘之序所不能悉者誌文可互見也君平生所賦詩有遺藁藏于家銘曰弗私于佚維時之逢弗疚于用維才之通有伉其門堂構則崇其播其穫乃嗇不豐尚其嗣人勿替益隆琢石以竢表兹幽宫茶陵州判官許君墓誌銘茶陵州判官許君既卒其友危君素曽君堅奉書若狀來徴銘以葬嗚呼溍於君同年生也安敢以不敏辭君諱晉孫字伯昭其先汳人宋南渡後徙建昌曽祖通某州團練使祖開進義校尉父炎仕國朝為欝林州儒學教授母車氏君弱冠遊京師或介以謁趙文敏公又因文敏徧游大人先生之門以薦者被㫖補國子學生一時名師儒皆大竒之博士姚公尤器重焉㑹有詔設科取士君首以諸生擢延祐二年進士第上方好儒進士當得官者悉命畀便近地以寵榮其初遇君用是得建昌之南城縣丞天燈寺僧甲與乙有私怨欲殺之既操刀入其室值乙將㸑捧所炊米而出驚仆於地奴走救得脱甲即以刀自刺連呼殺人且訴於縣獄已具君閲其牘曰捧米復能手殺人耶卒直之太平山中有竊浮圗氏四果之名以為教者文衣髙座日臨其徒泉南廣東慕而趨之金帛填委所聚男女恒數百千人不法之狀暴聞於官而吏置弗問君謂是將詿誤吾民為大姦亟列上於郡杖其首百其風遂哀凡君之處事精敏而剛果多此類藍田鄉民訟爭屋新城縣民訟爭山皆久不决郡併以新城事委君聞君决事平或以屋歸其主或以山交相讓其能使民化服又如此郡守初怒君不阿數摧沮之君奉所受命書詣府曰上下相承以禮而已某不善事上官則有罪乞免去府僚既諭止君守亦愧悔而加禮焉尋以南城例不得置丞改贑州録事其治如在南城時包銀令下君鈎校物力之薄厚以應令民用不擾紋錦局吏竄毁匠籍而牽連追呼濫及民伍君白於郡發架閣舊籍證之其弊以絶豪民憚君之政不便於已詣部使者誣以他事郡長貳素知君率其屬以去就明之部使者大驚訊之果誣也秩滿調湖州路長興州判官未上丁車夫人憂居䘮壹用古禮服除殊無仕進意有司以聞乃以茶陵州判官起君於家行及境病暍歸居久之復以病疫而卒至順三年三月六日也得年四十有五階止承事郎葬以某年某月某日墓在南城某鄉某原君性介特而羣居踆踆卑讓待儕輩如父兄與人言不苟為容悦然亦不以訐為直其在南城官廨去家近日步出視事後雖居它官因不畜馬市薪菜自烹飪而食畧無難色權貴人有遺以美衣數襲者受而弗服也君筮仕後始學于内翰臨川吴公每以及門晚為憾其為文無曼辭詭辨而多骨鯁之言詩尚藴藉未病前一日夢為詩云至道難聞嵗年晚聖賢不作後世亂詰旦語人曰吾詩辭意甚悲殆不類平生作及曽君求遺藁其家所夢詩在焉嗚呼其可哀也已君妻南豐趙氏有子一人曰章初君之季弟鼎孫卒後一嵗趙夫人卒又一嵗君遂卒甫四日仲弟益孫亦卒不兩月欝林府君卒今存者惟一子嗚呼是不又可哀也夫銘曰將聖之門政學殊科兼取其長君材則多殃慶非類報施何以未定者天君尚有子江浙儒學副提舉致仕龔先生墓誌銘先生諱璛字子敬姓龔氏宋鄉貢進士贈大中大夫諱炳之曽孫祕閣脩撰太常少卿贈通議大夫諱基先之孫中奉大夫直寳謨閣司農卿諱潗之子曽祖妣周氏祖妣葛氏並贈碩人妣周氏贈宜人初大中府君以避兵自髙郵徙鎮江卒葬城西五州山子孫因占籍為鎮江人迨先生以宦游久留平江又家焉先生少聰敏稍長能屬文德祐内附士大夫居班行者例遣北上司農府君以列卿在遣中行至莘縣不食而卒先生悲不自勝暨成人呼其弟理語之曰國亡家破吾兄弟又少孤不能以力振起門户獨不可學為儒無辱先訓乎由是共刻意於學日以㣲辭奥義自相叩擊其文字交視莫公崙俞公德鄰為丈人行而與戴公表元仇公逺胡公長孺盛公彪為忘年友聲譽藉甚人稱其兄弟曰楚兩龔以比漢之兩龔云東平徐公持浙右憲節聞其名辟寘幕下尋舉教官厯平江之和靜學道兩書院山長以累考合格當赴吏部銓大名髙公時叅預外省先生以書論役法之弊公得書喜曰子有用之材持文書來我為子取教授先生謝曰執政大臣以進贒退不肖為職天下士如某者能一一力致哉誠推是心寒畯之幸公聞其言愈敬異之御史周公馳僉亷訪司事鄭公雲翼交薦先生宜在館閣皆不報用例調寜國路儒學教授秩滿遷主信之上饒簿以所生母蔣氏憂不赴服除授袁之宜春丞其階再轉俱將仕郎先生笑曰五十年猶故吾耶盖先生異時以門䕃補官亦將仕郎也在官嵗餘移疾上休致之請遂以從仕郎江浙等處儒學副提舉致仕命下先生已卒于宜春其卒以至順二年十一月十七日享年六十有六臨終猶強飯正襟危坐命筆作三皇廟記俄投筆謂家人曰汝輩且去吾將少休頃之氣息奄奄而逝先生家事素薄客至不問有無倒壺命飲與之談前代故實娓娓不倦至為先生論説毫分縷析必使厭所欲乃已兩持鄉闈文衡號明有司門生弟子彬彬以材自見稱之者不以官而曰先生云其在和靜復侵田若干畝在寜國徴逋租為錢十二萬五千緡刻春秋大學等十九書以惠學者而宜春之政役均訟平部使者以為能數委以事顧以涖治之日淺其所藴蓄有未悉展也娶周氏知江州德化縣方叔之女子男一曰魯女二適陳方夏景行孫男二曰宣曰宜女二俱㓜魯以其年十二月返柩于鎮江明年五月十六日葬五州山先墓東南若干步奉先生子婿陳方狀來謁銘狀稱先生材識足以超軼古人而忠厚不自已之情未忍斬然遽變其先世承傳之舊故其為言卓偉殊絶自成一家然亦未嘗不從容乎䂓矩繩墨中晚年學益醇鋒鍔都盡其進脩之實或未易淺言也嗚呼苟非方從先生之久且親孰能知之若是歟先生所著詩文魯既彚次成若干卷因先生自名其齋者目之曰存悔齋藁云銘曰龔初來南以士升太常司農遂世卿今孰嗣者宜春丞既仕弗進用文鳴立言成家樹風聲擺落凡近趨髙明有來侁侁揚其馨金鑑亡矣疇依承陳辭相哀垂百齡刻兹方珉告𤣥扃奉訓大夫武昌路諸色人匠提舉漆君墓誌銘君姓漆氏諱榮祖字仲華古有漆氏而孔子弟子漆雕開之後亦或為漆君盖其裔也曽大父世昌居江之瑞昌大父文興徙興國之永興又徙太平之當塗而占籍黄池父永成宋將仕郎君仕皇朝厯黄池建康杭州三織染局副使稍遷武昌路諸色人匠提舉初階進義副尉用先贒子孫改將仕佐郎累陞奉訓大夫年踰六袠輒致仕而去君少敏於學敦行孝弟將仕君殁負土成墳松栢皆手植與兄弟分財均兄及弟前卒經紀其家事無遺力若未始異居者尤喜周人之急嵗饑則為發粟病則與藥死則與棺里有叢冡積久而暴露為聚而化之如浮屠法鄉鄰多頼焉居官所至克脩其職業執藝事者咸精其能其在建康以貢輸詣京師者皆再䝉恩錫賚甚厚以為榮惜其所處非要地品級已優而績用未顯也異時將仕君遊青山之保和菴以為兹謝公𤣥暉舊宅不宜使久廢不治買田二十畝畀其徒至君又益以田四十有五畝而祠將仕君於廡下里人羅君記之將仕君封樹在新埂去家僅一里所君謀於兄弟割田若干畝以給嵗時汎掃之須前進士汪君記之瑞蓮生墓前方池中前進士夏君記之興國先隴鄰於雙泉寺君捐錢千二百五十緡為興茶利其徒創置祠宇守視墓域惟謹故集賢直學士貢公記之君嘗延羽流為將仕君蕆醮事感八鶴來下述黄籙儀因著其靈應之實今天師張公𤣥教大宗師吴公序之故翰林學士承㫖姚文公之使江東也愛君沈靜寡言進退閑雅為製其號曰可心其為一時鉅公引重如此君之才雖不大見於世觀其所與而其人可知也同里廣教寺法堂久未建君歸自武昌慨然以營造為己任閲兩寒暑而堂成用錢以緡計者若干一出於己仍施田百畝以資他日繕葺之費住持僧德逺以瞿曇氏示現之日為登堂説法緇白四衆咸㑹君忽顧謂其子興宗曰吾事已畢將行矣明日竟以疾不起聞者嘆異焉君生於前至元辛未二月十一日卒於後至元丙子四月九日得年六十有六明年丁丑八月十日葬新埂將仕君墓之左娶史氏次索氏子男一興宗也䕃授寜國路織染局使女一嫁故相吴許公之𤣥孫鍇孫男一女六其葬也興宗不逺四千里俾以狀來乞銘廼按狀所載序而銘之銘曰繄君之先惟漆雕氏受業聖門而不苟仕君於所祖匪襲其迹仕不擇禄由由自得孰遄其歸年未及謝展也達生委順而化仕而能止沒宜有後刻辭石章式示永久文獻集卷八上欽定四庫全書文獻集卷八下元黄溍撰奉議大夫同知諸路金玉人匠總管府事傅公墓誌銘故奉議大夫同知諸路金玉人匠總管府事傅公既卒且葬三十有六年而冡上之石未有刻辭公之孫亨貞皆嘗從予游及予承乏居國學又適在弟子列而亨取上京鄉薦第一予所與聞也縁斯文之雅故將其父命以隱君嚴威之狀來謁銘按狀公諱進字仲闕其先燕人祖曰德父曰榮祖當金之季始去燕居雲中晦迹弗耀而獨稍出其藝以自見被遇憲宗於和林錫金符長其同列六十人以備宿衞世祖建國開平驛致其家屬因占籍焉公生而穎異氣貎甚偉孝友出其天性與人交以信有士君子之風至元二十五年世祖選用世勞以為金銀器盒提舉久次當改調而儕軰中無以易公大德三年官將仕郎八年官承事郎凡再陟其階俾居舊職十一年乃遷奉訓大夫諸路金玉匠人府副總管尋以至大四年陞奉議大夫同知府事公服勤三朝每制器以進無不稱㫖賞賚優渥不可勝計仍特為降璽書存護其家實異恩也至于裁抑竒巧崇尚質素又未嘗不寓執藝以諌之意識者賢之皇慶元年正月十九日以疾卒于官享年六十有一世祖之定都于燕也公慨然曰燕故吾土祖父魂魄能無思乎吾歸其時矣乃卜居今京城積慶里而奉祖父暨母吳氏之柩葬城西十里樊村漆園之原公卒遂葬其墓次夫人陶氏宣德人有懿行善理其家後公二十三年卒元統二年三月二十日也其年四月四日合葬焉子男一人曰賢佐仁宗欲使疇其先業特授承事郎陽山瑪瑙提舉今以累遷為行諸路金玉人匠總管積階嘉議大夫孫男三人亨以鄉貢擢第為將仕郎太常禮儀院太祝貞以國子釋褐為從仕郎章佩監知事庸國子學生曽孫男二人女二人蓋金之將亡中原雲擾衣冠世族強者戮弱者俘為自全之計者或乘時崛起爭相長雄而使人莫敢犯或自混於雜流而取容一時然恃其力而以暴陵人有仁心者所不忍為惟百工之事有以利用而無害於義故君子寧屑為之公後雖藉是有位序而恒若以為歉嘗語人曰吾家再世遭時艱虞而隱於一藝豈往而不返者耶今天下一家死生相保而吾祖父乃不及見承平之盛賫志以沒子孫誠知之必有能自拔以昌吾門者矣於是陶夫人亦力贊公以教子為務嘉議公之官于金玉行府也留錢唐久之故所知位丞相出臨江浙略勢分而與居與游視疇昔無異從容一語未嘗輒及其私慎重如此得於家庭者可知矣亨與貞又皆生盛時蒙菁莪豐芑之餘澤而以儒起家公至是復何憾哉序而銘之庻以慰公於地下云爾銘曰九官濟濟疇若予工帝曰咨垂實先䕫龍降及中古為民者四人思擇術貴德賤藝惟公父子靡適弗通出此入彼與時汙隆曰予之先家有詩禮夫豈世官倉庾為氏亦既有時有子有孫迄用一經守為顓門兆兹幽墟尾箕之野列星之英後有興者胡景吕先生墓誌銘諸暨之鄉先生曰胡君景吕以泰定三年十一月二日卒年八十有二致和元年某月某日葬某鄉某原於是先生之子三人無在者前葬其孫鏈蹐門泣以告曰吾祖葬有日以鏈之藐焉不肖而持重服奉大事懼無以振吾祖於幽執事苟矜而畀之銘吾祖雖死不沒矣惟某之曽祖户部府君之外孫劉君應龜在太學與先生俱允蹈齋生某生也後顧嘗受學於劉君而獲知先生兹又仕于先生之鄉而及與先生接銘固不敢辭按胡氏世為越之諸暨人渭先生之名景吕其字也曽大父煒弗仕大父士英累封通直郎父杲承議郎江南東路轉運司主管文字用年勞賜緋衣銀魚母王氏封孺人先生㓜有異質孳孳問學尤謹於踐履入太學輒為私試第一居歲餘承議公以内憂觧職先生﨑嶇扶侍絶江而東㑹天兵南下學廢士散先生奉承議公彷徉山澤間未始頃刻去左右承議公得以優游恣肆歗歌息偃囂然以樂隤然以委乎至順而忘其老者以先生能為之子也先生既隱居田里無復當世志乃益致其力於經史百氏之言而務極其旨趣手書危坐雖老無少懈為文一主乎理至於詩歌儷語率不苟有雞肋集若干卷藏于家娶樓氏先若干年卒子男三人曰􅚇曰玖曰玶亦俱卒孫男五人女一人適同里方洵曽孫男六人女一人先是里中為舉子業者多來學於先生從孫一中實在列一中之上春官也交游皆以詩送之時先生病已革猶口占為序引迨一中取進士得鄉郡録事以歸而先生不及待矣一中每言之必為掩涕為之銘以貽其嗣人亦以慰一中無窮之思也銘曰不辱以承其先不倦以開其後志則已遂而不居其有兹聖賢之所自盡先生尚與之參不朽也袁通甫墓誌銘吳之隱君子曰袁君諱易字通甫其先當宋有起進士為京朝官者曰仲賢始家於汴仲賢之後曰京西提刑珦於君為五世祖南渡時卒葬於吳因家焉故今為平江人曽大父曰璡樂其地衍沃買田築室長洲之蛟龍浦躬耕而食以布衣終大父曰祐之承節郎監廬州都稅務父曰樞國史實録院檢閱文字皆仕而未顯至君復不樂仕進東平徐公持部使者節聞君名延見與語大悅將薦之于朝君力謝不可徐公益賢之已而行中書省署君石洞山長君乃欣然就職既歸卒隱弗仕即所居西偏為堂曰靜春壅水咸池周于四隅池上累石如山芰荷蒲葦竹梅松桂蘭菊香草之屬敷榮繚繞而其外則左江右湖禽魚飛泳于煙波莽蒼間堂中有書萬卷悉君手中所校定客至輒相與縱飲劇談留連竟夕乃已君丰姿秀朗每雨止風収挾小舟以筆牀茶竈古玩器自隨逍遥容與扣舷而歌望之者識其為世外人君少敏于學藴積之素俱發於詩未始高談性命以師道自任至其在石洞推明雙峰之說上及于考亭諸生昔所未聞莫不敬服焉君所為詩有靜堂集若干卷龔氏子敬為之序謂近半山而漁陽鮮于公稱其閒遠清麗稍加精密少陵不難到其為一時人推重如此吳興趙公嘗取汝南先賢傳所記漢司徒袁公臥雪事寫為圖以遺君且曰予作此圖正以通甫好修之士景慕其高節爾則君之人品固不問可知君母趙氏濮安懿王八世孫女妻奚氏子男四人長震次泰次晉皆張出次驄陳出女五人長許適金大聲未行而卒次適顧天麟仲振孫顧正許德明孫男三人孫女二人俱㓜君卒以大德十年十一月二十六日得年四十有五其年十二月二十四日葬長洲東吳鄉赭墩先墓之次後二十有八年是為元統二年於是君長子震已死泰及晉實始伐石以狀來謁銘泰好學而有文稱其家者也銘曰居之熙熙行之施施世非我遺我有不為寤言歌之其聲也希昭昭其􅂷表以刻辭鄉貢進士項君墓誌銘至元二十年秋九月庚申宋台州鄉貢進士項君良才卒葬以二十六年春三月丙申後二十一年君之子鼎亦卒又二十一年是為至順二年鼎之子炯始以狀徴銘于金華黄某銘曰台之項氏所祖莫詳丹徒尉斯肇見有唐斯仙居人㑹昌進士其鳴以詩著稱史氏斯後曰勝實七葉孫勝之子佑當宋寶元復自永嘉徙於臨海卜居章安幾三百載佑後三葉曰處士璣為君曽祖不耀於時負土葬親廬墓三紀商公飛卿傳於私史祖惠父駰克謹其承惠本胡氏處士之甥君初名珪易以諱曰公望者始冠之字君少學詩事胡公良惠之從子作守莆陽晚所執業時之師表白雲先生金氏安道君善説詩不務苟同曰以二南始乎國風中以王風錯於鄭衞著周興衰厥有微意檜曹之末至豳而終否泰剥復循環不窮繼是有作斯為雅頌孔子之衰周公不夢維彼黍離我心之憂如醉如噎曷能興周小戎駟鐵風槩雄偉周之為秦噫乎悕矣君性寛厚而無脂韋亦不面斥人之是非握手屏處懇言所以聞者謝服去非求是鄉鄰有訟必質於君忿䦧之銷由君片言郡二千石王公華甫洎楊公棟咸加推許王公在郡政多便宜經界義倉以給餉饋桴鼓甫息瘡痍未瘳家無圭撮積負山丘移符趣辦吏卒旁午君為代輸竭其貲聚舍北一里大山崇崇火光如射洪發其中陷者百家死者數百或陷不死身交木石君捐私槖以募壯夫排木抉石活者千餘祭其死者用浮屠法譌言不驚人鬼帖帖君處親舊有施予恩下逮輿𨽻莫不訢訢堂有雙桂處士手植王公卿尹扁字經尺君弟英才與君齊名並薦于鄉雙桂之徵君既預薦而不及禄終於布衣壽六十六墓在縣東保樂西鄉安仁鳯山先塋之旁君娶于霍子泰蚤世繼室以張有子男二其長即鼎以孝友聞對策鄉校力詆權臣胡公在朝博士著作教授王宫時君舊學鼎以公故補官廸功準遣臬臺浙水之東次曰大有㓜居侍側從君避兵為游卒得卒欲剚君以身蔽焉卒駭而止竟獲兩全其女有三壻曰王牧程萃黄愷率皆士族孫男六人炯以文稱次則道唯道中道成成歸釋氏不列于次已次道心士寧其季女則有五壻亦名門曽孫男十其女七人炯曰六歲吾祖以沒豐貎整容猶記髣髴坐南窗下大樹如山授炯古詩置炯膝間母曰小兒勿勤長者吾祖曰嘻兹吾孫也言已哽塞炯矒莫知先人以告乃知其悲嗚呼吾祖望炯非淺沒五十年不有論譔杜甫之沒餘四十年賴孫嗣業求銘以傳炯實闒茸不自砥勵挈挈道路與嗣業類輒援前比乞為銘章尚俾吾祖沒而不亡銘杜甫者丞相元稹某何人斯敢告不敏炯拜且泣曰無固辭庸掇其語播此聲詩為言則俚而近於質刻諸方珉永賁幽室道一書院山長戚君墓誌銘君諱象祖字性傳姓戚字世為婺人戚氏在楚丘者實宋之世家而婺之有戚氏南渡後始著袁州府君如琥與其從兄如圭如玉並受業東萊吕氏如圭如玉既連起進士乾道淳熙間府君亦擢紹興庚戌進士第由國子博士出知袁州積階朝奉郎追贈其父約為奉議郎而其子宋祥以蔭補官為從政郎廣德軍司法參軍君袁州府君之曽孫廣德府君之孫也父曰紹入國朝隠居弗仕同志之士相與號為貞孝先生君天性質直無崖岸不喜為聰明機巧少服家庭之訓甘於淡泊目不識富貴家華靡事弱冠師事王公元章益達於命義杜門不妄出環堵蕭然有書數十百卷隤然自放處城郭如山林間也用是尊官顯人鮮能知之大德中年幾五十乃用舉者得東陽縣學教諭遷紹興之和靜書院山長年未七十輒求致仕吏部以例弗許復用為信之道一書院山長訖辭不就夫人義烏朱氏鄉貢進士環之女初君之祖父皆娶于朱氏鄉貢進士君之弟六合令周謂君可妻以夫人歸焉江南之始附也愚民多匈匈不自安君以祖母素嬰心疾慮其驚悸疾愈劇白于父避地蒻陽山頃之又依外氏居義烏之赤岸君適有遠行而大盗及境夫人獨挈㓜稚返于故廬外氏亡奴以脇從將汙其主賴夫人先事奪其狡計而免於禍姻黨咸歎異焉其後家毁于菑夫人力相君作室如其舊而君厭於囂煩遂僑居永康之太平其子宗仁為象州陽壽縣龍門廵檢以死君念其去家萬里殞于瘴鄉哀之不置屢形於歌詩夫人尤過乎哀竟以成疾至順元年十二月庚午卒于太平之寓舍享年七十有四君自是忽忽不樂因泛舟遍省先墓俄感痁疾以薦祥事于夫人之日卒於赤岸之别業三月十二月某甲子也享年七十有八子男二長即宗仁其卒前君七年次崇僧學于許君益之能知經而有文稱其家者也女二長適朱震亨鄉貢進士君之孫次適吕梓孫男六女四崇僧遵治命卜宅兆于義烏明義鄉竹澤之原葬以四年閏三月某甲子乃自其鄉之前山遷夫人柩合葬焉某之視君盖父行也而辱為忘年交君平居罕與人接而遇某特厚甚崇僧蹐門俾為之銘併誌夫人事某實知君不敢辭銘曰維養也晦以尊其生維居也安以篤其承維歸也潔以昭其成名之弗晰德則孔有維以有之用諗爾後胡君墓誌銘鄞胡君以至治二年六月甲午卒年七十有三其又明年某月某日葬城西南六十里亭嶺下前事諸孤衰絰哭奉董生復禮之狀踵門再拜請文為銘予為之答拜且辭則又再拜固以請乃次而銘之按狀君諱珙字伯玉本費氏子生七年後胡氏胡氏自君之曽大父祖季大父桂發父德潤皆未有仕籍至君始以材見推擇為郡列曹掾非好事也用久次司郡倉積勞當序遷輒棄不就其居家奉母孝率子弟治田廬生產悉有法有餘財未嘗資以為俚俗華靡豪縱事尊官顯人慕而與之交不肯為翕翕熱然於故舊煦煦有恩歲時閭巷相過雖賤夫㓜童必踆踆然與為禮有疑其矯飾者迨君病革姻黨朋從來問候度且弗起咸有戚色君纊息􅂷絶猶舉手加額曰惶恐惶恐疑者乃釋然服其出於至誠君平生無他好玩獨嗜蓄古法書名畫持以售者歸其直累百金無所靳晚益聚書搆精舍小溪上延師儒教諸孫為舉子業葬地實在其西十里君所自辨定也盖君於管郭之學甚邃云君娶鍾氏子男六人曰元堅曰元垕曰元垚曰元基曰元堂曰元圭女一人未笄孫男十有三人女十人曽孫男二人嗚呼予聞有隱德者必有後觀君之自信獨樂非能以利澤昭被于人而子孫茂衍若是宜有隱德矣其所恃以為不朽者獨銘也哉銘曰維古宅兆視占從違允矣胡君蔽志不疑我擇我藏匪卦于蓍有封斯隆有潛弗輝有斐其銘嗣人之思鄱陽朱君墓誌銘鄱陽朱君既卒而其孫坦舉進士來京師踵門納謁拜且言坦之充賦有司也大父方屬疾語坦曰昔吾祖盖兩貢于鄉晚厪以恩補官主浮梁縣學故吾之少也慨焉思自奮於科目而場屋事遽廢逮國朝復以科目取天下士而吾已老前人之發而未舒者將有望於汝行矣勉旃無以吾為念也坦銜訓就道尋屬預薦名而大父竟不及待顧乃挈挈然籝糧笥書而來者庶幾獲綴下列以酬先志夫何場屋又廢而莫之舉願刻銘冡上之石用慰大父於地下謹奉先友程翔之狀以為子也請某哀其言亟為之答拜而不敢拒也按狀朱氏世居鄱陽之堯山里號著族君之曽祖世顯弗仕祖應復主學君也父泳涯亦弗仕君諱明普字升朝自號止善天性醇厚父殁事母孝與二弟異居而無間言子姪有過必從容告諭使自愧悔其靜重沉黙若有不可犯之色至與人交未嘗不務為卑讓春秋既高族人在父兄行者以十數為之執子弟禮不少衰母喪猶致毁歲時祀事身親饋奠惟謹初江南新附大家多踣於徭役君獨能隨時俯仰與物無忤門户賴以不墜歲侵輒發粟以惠貧乏人多德之所居負山瞰湖君暮年幅巾黎杖倘佯煙光水色間足不涉城府藏書數千卷躭玩至忘寢食取古語大書屋壁曰吾聚書多矣必有好學者為吾子孫此所以識鄉先生吳君仲迂程君時登吳君存並以所學教授君俾諸孫從之游而往來叩撃焉名勝士欵門必留連彌日盡歡乃已有以善地理學來見者館榖之不厭或勸預相地為樂丘則應之曰生事死葬人子之職吾安用蚤為哉遇仙翁釋子雖不眩於其說亦不深斥之也同里闕戸山有僧廬先達多講學其中君捐錢葺治以為諸孫游息之所曰吾欲其趾美前賢耳君生於宋開慶元年四月十四日卒於今元統三年七月二十二日享年七十有七以某年某月某日葬某鄉某原娶鮑氏子男二長勲某官次某未仕女二孫男五長即坦次蚤夭次垕次塤次祐女四曽孫男五女一凡狀所述可見者如此嗚呼道之汙隆科目不預焉而君之志則有足悲者某竊聞之荀卿子曰皓天不復憂無彊也千秋必反古之常也弟子勉學天不闕也銘以慰君亦以朂其後人銘曰朱以國氏後支分名于一經用顓門父菑子播逮厥孫不以無年輟耕耘果之云剥有本根惟革既故鼎乃新天者之定能勝人食報豈必于其身作詩可徴我所聞揭辭石章慰營魂馮君墓誌銘閩馮君既卒且葬二十又五年其子庭玉始以書來曰先人之葬久矣而冡上之石未知所刻若有俟也吾子不以庭玉之不肖而辱與之交失今弗圖懼寖逺或墜闕以重不孝之罪敢奉狀以請惟矜而畀之銘按狀君諱華字君重福州閩縣人曽祖世則祖寅宋大學生父汝箕母朱氏君少力學工為文從父伯震深器重之伯震在太學君不逺千里負笈從之游所接識皆一時鉅儒望士由是學益博文益竒嘗以漕薦上春官不合將南歸道梗于兵乃即太湖上授弟子業至元十三年大軍下常州有以君名聞其主帥者即日延見問撫安之術版受南劒州儒學教授君私竊以歸養為喜而受之竟不果行因留君為宜興人終其身不復言仕進所居室曰龜峰示不忘故山也以大德四年十一月三日卒得年六十某月十三日葬清泉鄉黄川之蓮花塢娶吳氏子男一人庭玉也孫男三人女二人君平生所著有四書直解若干卷文三卷詩五卷樂府一卷藏於家馮氏之先在唐有延珍者當廣明之亂以勤王功至銀青光禄大夫上柱國杜陵侯入宋久未有顯者十一世孫允中受業考亭朱子之門始以儒起家為道州寧逺縣尉而伯震與從弟惟尹俱太學生惟尹之弟惟說與伯震先後擢進士第君雖以隱約終而有庭玉為之子庶幾能亢其宗者叙而銘之所以俟也銘曰馮奮于閩由杜陵君史軼其傳綸言具存子孫則蕃不有世禄散處劒邵為三大族孰振以文曰維閩宗逮君之身乃嗇弗隆爾公爾侯必復其始我銘孔昭琢石以俟吕君墓誌銘君諱權字子義姓吕氏婺之永康人諱埜者於君為曽大父諱茂者於君為大父至元間嘗宰鄉邑後輒隱弗仕父名汲母朱氏君㓜習於禮度以簡靜自持不妄言笑服用無華飾然其立志果鋭遇事機警母沒時年甫十三能佐父理家益練達於世故撫弟妹尤雍睦有恩大父深愛之指以語客曰是兒他日必亢吾宗㑹貢舉法行君慨然思奮拔以自見而雅不欲溺意俗學聞鄉先生許益之講道入華山中負笈往從之游考質玩覃思或竟夕不寐儕軰推其精勤君娶胡氏有子曰炳蚤夭因以哀致疾庸醫投藥過差久弗效泰定三年秋疾少間有司強使就試鄉闈適疾復作而止沉痾荏苒閱十四寒暑浸成衰弱以天厯二年八月辛夘卒於家得年三十有八將終告其父曰生不得盡人子之道死又無後請以弟機之子烜嗣父如其言而命之始君自書其夢中之語曰青璧雖萬里白雲只三尋莫知何義至是以其年之脩短驗之若有數然君所為詩文皆不苟而無留藁其父卜以元統元年十一月己酉葬君于義烏雙林鄉往山之原哀其有用而不試有作而不傳無以慰前人之望自誌其壙累數百言猶以為未足復俾予即其􅉎石系以刻辭予雖不及識君而辱與其父有雅故知其言良信乃掇取誌所述序而銘之銘曰受材之美兮逢時之昌良工範我兮游夫康莊嗇不使年兮遏而莫揚訊之故老兮我夢何祥昭回在上兮草木承光隕珠重泉兮幽幽其藏父老子㓜兮天之蒼蒼孰紓其哀兮薦此石章秋江黄君墓誌銘君姓黄氏諱一清字清夫徽之休寧人初李韓公以中書平章政事知貢舉某用門生禮拜公里第君在焉别去二十有五年而君之子晉踵門泣且言君已沒持黄竹廵檢程君之狀以銘為請按狀君曽大父拱大父振逺並能施惠其里中見謂長者父元珪蚤卒母吳氏守節自誓内事舅姑外資諸子使為學君亦痛自飭勵期無愧於古人年逾四十始游京師久之無所知名洎李公以舊學相仁宗賢才彚進而君以母老不忍去母告之曰汝父夙有志四方而今已矣汝其忘之乎君乃幡然復入京師謁李公君古貌長身鬚髯如㦸寛衣高冠容止簡率又作吳語左右多目笑之公望見大驚異即下執其手延之上座時公門下皆名人顯士而君以布衣居其間恒與公亢禮坐客莫出其右隱然名動京師君以秋江自號而李公自號秋谷遺君詩有君釣秋江月我耕秋谷雲逃名君笑我伴食我慚君之句朝野傳誦滿口内翰趙文敏公既寫以為圖且謂不宜使清時有遺才力薦之當路諸公以君深於易通陰陽家言欲用為杭州教授君笑曰吾以布衣締交相國榮孰大焉持此足以復吾親矣竟辭歸築山房摘李公詩語為扁名以見志公欣然遣以錢助之宣徽王公奉使江東過君山房因圖其隱居十景以去其為當世所重如此君嘗以母病籲天願減已年益母壽夜夢人語之曰有老嫗來當得藥明日果有老嫗來授以啗蜜法而無從得蜜君往乞諸旁近村民家還遇虎君駭曰我死不足惜如母何虎熟視逡廵而去集賢大學士陳公言是家母為節婦子為孝子宜旌表以風四方事下有司署其家及里門皆曰節孝國朝徽人得旌表者自君母子始其後君有母之喪走京師乞銘於閣學虞公以葬張蔡公時當國問士於韓公式以君對且要與俱詣公恨相見之晚即欲擢寘館閣君以葬母辭公知不可奪則為詩以送之終喪復至京師遍謝前為銘及哀挽者趙魯公在中書素善君卒欲用之集賢亦舉君為儒學提舉君歎曰昔親在且不仕今尚須禄仕耶遂去入玉蓮山中搆精舍將老焉故人完顔君守贛奉幣馬迎致郡齋居歲餘俄思歸艤舟未發適值始生之日飲而歡抵暮疾作旦起奄然而逝至元三年八月九日也享年七十有五贛守為具衣衾買棺以歛而二子從行者奉柩以還卜某年某月某日葬藍田山之原娶張氏前十三年卒子男五人曰俊淮安屯田副提舉亦已卒曰晉有家學今為徽州教授曰紹為仲氏一鶚後曰勝曰芳女二人長適行金玉總管府知事汪洪次適俞榮孫男五人女三人君性疎曠好客不厭處鄉鄰有恩不喜言人短而常推禍福成敗之幾開人為善其在京師所主皆朝廷重臣每有所諮訪未嘗出以語人所薦士亦不以為己德累朝元老臺閣名公至於卑官下僚新進之士無不與之交其死也無不悲之某竊觀昔人去就之際出者或未能無累於物處者或專務使影響昧昧不聞於人此二者皆過也若夫進不狥人退不絶物如君者盖鮮矣而某安足以知之姑摭狀所述為之銘以紓其嗣人之哀思云爾銘曰士之懷才難得者時逢時之來患莫已知亦既有時又有知己胡有不為而止於此處非吾介出非吾通自信不疑卒蹈厥中發揚在上其藏在下銘以昭之用慰來者外姑夫人李氏墓誌銘至治二年春二月外姑夫人李氏寢疾革某屬以職事走鄞江上法不得為私親去其月乙丑夫人疾竟不起外舅王公自東陽以訃至鄞某既為位哭且使致奠已外舅復以書來曰吾婦葬有日矣若能為我銘其下棺之石猶涖執綍也惟我顯祖考昭慶節度書記府君夫人黄氏墓在姜族子或以其地劵鬻諸富人有司弗能直我顯考文林府君夫人張氏墓在桐川又數毁於盗將以十有一月丙申奉柩改葬縣北甘泉鄉唐塢我叔祖湖南轉運副使煥章府君墓在東南若干步而以吾婦祔焉煥章府君之葬嘗捐田若干畮有畸畀廣陵寺以給歲時饋薦汛掃百役之費寺弗能有也吾扣已槖得錢若干緡以復田俾歸其舊其併為我誌之嗚呼夫人諱某字某姓李氏世為婺之東陽人宋吏部尚書大同之從孫女曽大父諱某大父諱某父諱某母某氏夫人㓜聰慧能知文史非直善剪製縷結事年二十歸王氏外舅用煥章府君恩補官將仕郎兩家門户方貴盛夫人自守卑約未始以侈靡驕縱有所缺虧逮德祐内附外舅既失世禄行省版授處州麗水縣主簿復辭不就家日益落夫人身治細微絲蓄粒聚以畢婚嫁白首宴娛無異處貴盛時臨終猶不廢櫛沐夷然而逝享年七十有二子男二人曰武曰復女五人壻曰黄溍李法何涓吕潮何潤孫男二人曰坦曰塤嗚呼溍不敏無以褒叙令淑受命書辭聊以抒哀思云爾嗚呼銘曰猗與夫人承貞則秉心初終用無斁泰吾不豐約不嗇曰婦之吉恒其德適爾祖姑返𤣥宅勒兹方珉詔罔極前承務郎王公墓誌銘公諱昌世字昭甫姓王氏其先汴人宋武經大夫保信軍承宣使安道公高祖也建炎初扈蹕南渡乾道間始定居于鄞曽祖諱晞亮朝散大夫祖諱撝嘉定癸未進士任朝請大夫尚書吏部郎中兼國史院編修官實録院檢討官兼崇政殿說書贈正奉大夫考諱應麟淳祐辛丑進士仕至朝請大夫禮部尚書兼給事中兼直學士院兼同修國史實録院同修撰兼侍讀妣鄭氏李氏以贈舒氏以封並為碩人公㓜端粹齠齔時已仡然有巨人之志不屑與羣兒狎長益純慤視貴游華靡事漠如也用尚書公恩補承務郎未及禄而宗社已墟尚書公杜門不出朝夕坐堂上取經史諸書講解論辨公甫十歲帖帖聽受無倦自是於先賢名理之言羣公經制之說至世變之推移治道之體統古今禮典之因革殊聞異見靡不究悉尚書公所著述公蒐輯考訂贊助為多蓄書萬餘卷燬于火露抄雪纂至忘寢食書以復完為文一發于本實世俗風情月狀語皆所不道尤精於易筮占吉凶之驗如前知亦其誠之所致云國朝承平既久故家子弟以攀附致顯榮者不可選紀尚書公名重當世諸公謂宜録其嗣人以表盛德薦章交上公力辭曰士之大節嗣守為難敬身所以敬親肥遯所以無不利矧以介直之資與世寡諧倘得讀父書求己志以畢此生足矣不願乎外也公性孝友舒碩人臥病十年粥藥必親調治不解帶動逾月逮其既沒哀毁過制歲時家祭尤致其謹姊貧無所歸扶其㓜穉相依者二十年歲饑斗米十千給疏屬數口家素儉薄中分先疇之半以畀族人尚有怨疾不已而為計傾之者公靜以處變訖保其遺緒有伐墓木者禁不可則捐厚貲以塞其欲有私粥其田及稱貸而弗償者一無所問有竊其物而捕得者公曰彼迫於饑苦乃爾吾不忍寘以法竟舍之公平居不自表暴與人交無鉤距重然諾亦不苟為阿附人被患難救之必力邑有訟連坐者衆已誣服而莫敢自言公為言之卒直其寃有遇盗而加罪旁人者公謂曰汝欲得而物耳吾與汝償之已而果得真盗人服其長者公老益康健俄一夕感微疾將愈值舒碩人諱日力疾行事疾復作遂以泰定四年三月九日卒享年六十有一卒之日人咸為之盡傷流涕曰厚德君子亡矣娶楊氏朝議大夫知肇慶府珏之孫女子男二人厚孫寧孫女一人適楊祖厚孫男三人陞同孫騭女一人嘗戒二子曰務學以實勿事虛文持身以誠勿循詭道母以貧忘古禮母以卑墜家聲二子奉以周旋訖能有立公晚自稱靜學居士有文集二十卷名靜學藁藏於家公之葬以天厯元年十二月九日墓在鄞縣陽堂鄉同􅓝先塋之側其葬也宣閫都司曹公愚以先世之雅故狀公行甚具而未及著于石章於是厚孫馳書於某以銘為屬某竊惟宋季文學侍從之臣言博物洽聞者必曰厚齋先生厚齋尚書公别號也尚書公於書無不讀記誦絶人且練習臺閣故事有不知必問焉暮年深自晦匿不與世接而東南學者以為宋三百年文獻所存莫不翕然宗之尚書公殁幸公克謹其傳遺文逸事有足徴者上方稽古圖治用言者建白収召諸儒撰定三史使命旁午蒐羅前聞而公之不起已久此尤四方士大夫所共歎息痛悼者也銘其可無作乎某晚陋不足以知公序而銘之姑以慰其嗣人云爾銘曰二代之禮世逺莫徴嗚呼後王尚有老成文獻所存公實敬承右文稽古際今休明論撰之司史臣是膺孰無望公以時飛鳴抱器歸周旅于大廷贊其筆削作為一經公則已逝曰吾其寧有謹其藏有伏必興惟文有家昭以兹銘信州路總管府判官謝公墓誌銘公諱晟孫字唐卿姓謝氏宋丞相太師魯惠正王四世孫也其先占籍台之臨海後以魯王孫女作配于穆陵賜第錢塘因家焉曽祖諱渠伯朝奉大夫贈太師追封衛王諡恭簡祖諱奕昌少保保寧軍節度使祁國公贈太師追封魏王諡莊憲考諱塈兵郎侍郎換保寧軍節度使贈開府儀同三司諡懿敏妣魏氏通義郡夫人公㓜聰慧稍長能自檢飭刮磨綺紈之習而自齒於韋衣咸淳間用世澤入官至太社令德祐間差通判安吉州除軍器少監累階朝散郎入國朝用近臣薦授承務郎信州路總管判官公拜命即辭不赴閻公復為翰長徐公琰為中執法二公皆中州大老慎許可或舉公可直詞林或舉公可佐憲府其見引重如此而公終不以仕進屑其意扁所居堂曰退樂蓄書數千卷日以教子為務公性素樂易善與人交尊官大人來江南者若馬公紹董公文用高公克恭李公衎無不慕而與之游公為商略古今間語及承平故事亹亹不倦遇風日清美輒與勝流韻士酣嬉於水光山色間所為詩直以寫其胷中之趣不苟事藻飾求媚俗也公既無累於物益自厚以尊其生百年之耆舊凋落殆盡而公巋然獨存耄期之歲童顔不衰知之者愛其有老成之典型不知者疑其神仙中人也家適燬于災公一不問惟恨弗克保先世之遺書故物因感微疾以至正二年七月二十四日卒享年八十有六娶趙氏諱由禕宋觀文殿學士太師忠惠公與慧之孫女封恭人先四十八年卒子男六人長菜老用公恩為福州路連江縣名聞鄉廵檢次池武昌路儒學教授未上而有公憂次沆為伯父昇孫後次汶蚤卒次泌為季父曇孫後次浩女三人孫男三人栻枃與權女二人曽孫男三人女一人初趙恭人葬湖州德清縣永和鄉方山之原至是菜老等以其年十二月某日奉公柩合葬方山遵治命也諸孫中枃尤為公所鍾愛未始頃刻去左右年甫三十有三公卒後十有七日亦卒即公墓旁祔葬焉公與溍之先人生同歲溍每造公未嘗廢子弟禮而公讓不肯當以某為忘年友公次子池縁疇昔之雅故致書及狀來徴銘於某謹備著狀所述為之序而考次公平生出處大略得其時行時止從容去就之際可無媿於古君子者播諸銘詩用昭示于不朽千載之下寧不有尚論其世而知其人者乎銘曰謝公恂恂昔之王孫際今興運共惟帝臣有命自天公拜稽首禮進義退不居其有樂以忘憂泳游聖時既壽而康卒全其歸委祉于家燕及嗣續文獻之傳夫豈不足論撰初終有銘幽墟最公平生孰宜特書士之大節莫先出處發其幽潛式示永古奉議大夫御史臺都事李公墓誌銘公諱拱辰字廷弼姓李氏世為磁州人其先居邯鄲曽祖儀仕皇朝為滏陽令因家焉祖彀以駙馬都尉特黙台分封磁為其大匠局提領父著世其官剛果敏達為衆工所嚴憚積勞陞某官進秩七品後以公貴贈承德郎母張氏封恭人有子三人公其長也㓜聰慧甫成童能自力於學既襲父職歎曰是可以行吾所學耶輒棄去游京師成宗時以善譯語得備宿衛大德三年秋授承事郎高郵府判官高郵初為路𨽻淮東宣慰司後更為散府揚州路而宣慰司役屬之如故吏民咸以為病公白于奉使宣闕謂復𨽻宣慰司便因俾公驛聞中書奏可之揚為㑹府歲所需藁秸阻於牐埭而經涉重湖遇水涸冰堅尤苦於負荷公言通泰如臯諸州縣水運為易且所入已足用請盡免焉㑹福院所設營田提舉司厲民最甚用公言罷去而責成於有司民力以紓甓杜等三十六湖隄僅如綫間有衝決則道路絶而禾稼災公先事為備修除以時而民不知有役吏胥冗濫則汰斥之暇日則率僚屬入學聽講有餘力則倡衆繕完公宇使一新去之日如始至焉至大元年秋遷紹興路新昌縣尹歲饑道殣相望公稽貧民之數老弱者賑給之少壯者俾富家収而傭之疾疫者救療之所全活甚衆患經界之不正則考覈其實而圖其地形書其保甲編次鱗集印分兩劵間官執其左戸執其右鬻產則劵隨之隱沒詭併之弊無所容而賦役以均邑去郡逺而舟檝不通民疲於輸粮公請以土產布代其入餘為邑儲手書訓飭之辭俾人知遷善逺罪土俗惑於陰陽拘忌親死至數十年不葬公下令不葬其親者以不孝論不旬日而葬者以十數有所追呼必循舊法遣牌為信民以不擾有鬬爭悉送耆長使質其是非而戒諭焉或諉以鄰境不決之獄凡所平反無不服其明允官府既日以無事乃大修孔子廟而新其學舍至於縣廨驛亭川梁逵路有廢舉人誦其政以為創縣以來四百年間未之有也皇慶二年春陞承直郎湖州路歸安縣尹邑附於郡事多掣肘公守法不附有爭家財而骨肉相戕者諭以天理感悟而去有以死獄誣平民者折以片言遂服其辜京師貴近有指邑民之妻為其逃婢者中使督捕甚急公不為遣卒歸其夫每歲二稅先期至者輒勞以羊酒人皆知勸莫敢自後前是圭田多荒責里胥代輸其租公屏吏卒步入阡陌間視地之肥瘠定為歲入之數募有力者使墾種之有㫖經理田土奉行者率務増加以為功公不苟隨聽民自占主者以所増田僅百五十頃議倍加其賦公曰吾官可棄民不可病也卒從公言仍其舊省臺交章舉公廉能延祐四年夏除承德郎中書户部司計六年夏擢監察御史於是仁宗臨御日久天下已安已治而不自神聖樂聞讜言時適有結交權貴人假藥術以媒進者躐遷翰林學士承旨公曰承旨任親地密處諸學士上彼何修而得此將何以贊書命待顧問乎同列相視噤不敢出一語公獨奮然奏劾之上初不以為忤㑹内府市薪炭司出納者侵官尅民私其錢十萬餘緡公發其奸章再上未報解印綬徑去羣憸因得投其隙誣奏以所按不實召致詰問賴近臣力救而止上尋悟是年冬即以公僉福建閩海道肅政廉訪司事仍進三品為奉議大夫以外艱不赴七年冬復拜監察御史英宗在儲邸夙聞公名至治二年春特除公御史臺都事公持文墨議論以正憲度人服其知大體未幾以内憂去遂卒于家泰定元年三月二日也享年五十有七其年六月十八日祔葬于北庸鄉之先塋公持身嚴恪而待人謙和處族姻里黨各盡其道樂稱人之善苟有過必面折之周人之急一無所靳居清要而不忘丘壑自號平墅以見其志平生嗜杜工部詩顔太師書亦意氣之所合不特愛其辭翰之美而已歴官三十年家無留貲治一府二縣興利除害靡有遺力所至咸為樹碑以紀遺愛其立乎臺端抗言無隱真古之遺直哉公葬二十有四年而墓隧之石未有刻文其子益懼愈久且墜逸奉本省照磨官劉金暨同知磁州事張公衍所為狀俾某序次而為之銘某竊觀公在朝廷上下之際相成如此誠千載之一時謹摭狀所述序其行治之詳而著其大節於銘詩用昭示乎方來非徒以見公之賢盖將以明先帝之聖德於無窮也公娶安氏追封滏陽縣君興國忠敏公之孫人匠局某官裕之女以至順二年五月九日卒其年六月十九日合葬焉子男一人即益也用公廕入官由永嘉縣主簿辟行省掾史擢本省檢校官累階承事郎女三人長適馮思敬次適監察御史董搏霄次未行卒孫男四人女四人銘曰陽為君子其德必剛惟有其時績用乃揚侃侃李公蚤膺殊遇既疇民庸遂踐朝著來居帝旁耳目之司摧奸撃彊脫畧細微危言正色匪躬之故不可則止奉身而去當守寤歎式遄其歸公去復來衆正所依百壬斂避豈公之力休休有容繄帝之德上方用公乃不有年拱木清風生氣凛然人亦有言君仁臣直勒銘兹碑敢告凡百青田縣尉鄭君墓誌銘青田縣尉鄭君既沒且葬三十有七年其子大和乃以書來曰先君子之葬已久冡上之石未有刻文四子惟大和最長而獨後死大和年今八十恐一旦溘先朝露無以見先人於地下謹奉狀以請幸而畀之銘死且不憾夫終者人所易忽逺者人所易忘大和於其親能無所忽忘如此厚之至也其何敢辭按狀鄭氏之先家睦州宋元符中有徙婺之浦江者兄弟三人其季曰淮為鄉之善士人稱其所居里曰仁義里淮之子曰煦曰熙曰照照之子曰綺明春秋榖梁學綺之子曰聞聞之子曰運運之子曰政則君之父也君諱德璋字子振少通敏長益自樹立居家著雍睦之行勤身率下盡力於生業能使貲過其舊然未始以富而不由禮晨興必具衣冠詣祠堂展謁退坐一室隨事鉅細處之咸中肯綮夜則秉燭呼子弟誦孝悌故實倣象山陸氏制訓辭百餘言每月旦望令子弟一人讀之家人悉拜而聽之咸淳末國勢日蹙愚民幸變往往歗儔侣依山林投間竊發人罹其毒散走避匿空村無煙火動數十里君以計誘致倡亂者縛送有司集同里作砦栅以防其餘黨之奔突人乃獲安常平使者王公霖龍行部嘉其捍衞鄉井之功以聞于朝㑹處之青田大盗數起即以君為青田尉君度時事不可為辭不赴至元間江南新附兵燹之餘居人乏食賴君以居者甚衆君素以剛直與物多忤里胥或誣陷以不測之罪當㑹逮揚州君兄德珪抱君哭曰彼所欲害者我也無預爾事我往折以片言則姦狀白矣爾去其如彼何言訖詭以他故出就吏君垂泣而追之至揚州兄已死仰天號慟絶而復蘇者數四負其柩歸葬廬于墓者再期兄子文嗣㓜病僂不良于行鞠之愈于己子且為娶於名族君雖老語及揚州事猶為之嗚咽不已君廣顙豐下身長七尺餘風神峻整性尤方嚴子弟聞謦欬皆斂手正容步履不敢肆也晚忽喪明六年而終君之寢疾也大和方效官使于鄱陽亟歸則殆將屬纊大和輒泣問齊家之道君張目厲聲曰母聽婦言乃瞑大德乙巳九月七日也享年六十有一明年二月二日大和等遵治命奉柩葬于家南二百步東明山娶黄氏子男四人長即大和某官次文泰次文厚次文轟女一人孫男九人孫女三人曽孫男二十二人女九人𤣥孫男三人初君之高祖始合其族同居而共食傳之再世纘承惟謹逮君復考舊規擴而大之文嗣及大和兄弟又能率羣子姓修其業而不墜有司為請于中書而旌表之號曰義門嗟夫世之仁人君子推其親親之心以及於民物者固多矣有如君家代不乏人迓續其遺述休於無窮者幾希銘以彰君之德亦以朂其嗣人云爾銘曰鄭以國氏支分于睦來家浦陽大合其族惟君家教曰孝與悌軫夫顛連雖死弗辟君材則多宜有位序排患釋難而卒無取洸洸義聲撼于州邑有伉其門子孫蟄蟄孰云君子其澤五世勿替引之是在來裔安陽韓先生墓誌銘先生諱性字明善姓韓氏其先相之安陽人宋司徒兼侍中贈尚書令魏忠獻王生某官某某生某官某某生左司郎中膺胄扈蹕南渡始家于越膺胄生某官某則先生之高祖也曽祖諱楚卿贈中奉大夫祖諱識中奉大夫直徽猷閣考諱翼甫朝奉郎大理寺主簿學者尊之曰詢齋先生曽祖妣何氏祖妣章氏並贈令人妣趙氏封恭人先生天資凝粹而警敏七歲讀書數行俱下日記萬言九歲通小戴禮作義操筆立就文意蒼古老生宿學皆歎異焉國朝取宋嚮之在班行者多携故所受告勑入換新命寺簿公獨挈家絶江而東杜門不交人事以聖賢之道自樂於是科舉事廢先生周旋家庭間益得肆其力於為己之學無何寺簿公以疾不起先生甫十二歲執喪如成人識者謂韓氏有子矣先生既弱冠博綜羣籍自經史至諸子百家靡不極其津涯究其根柢而於近世儒先性理之說尤深造其閫域秉心制行表裏如一不徒馳騁於空言而已婦翁國子監書庫官徐公天祐號賢有德與先生自為師友不敢待以尋常子壻之禮永康胡之綱仍仲之純穆仲長孺汲仲並以學行相高於先生為内兄弟而齒差長間以微辭奥義相叩撃三人咸自以為他日當有所不及前代遺老若王尚書應麟俞御史浙文章大家若四明戴表元師初往往折行軰以先生為忘年交同里與先生游最密者唐珏玉潛王易簡理得吕同老復初皆一時名士而王監簿英孫禮遇之甚至每値風日清美或同挾策於雲門禹穴或共榜舟於耶溪鏡湖逍遥容與彌日忘返望之者疑其為世外人先生之文博達雋偉而變化不測人苐見其如竒葩珍木不擇地而發魚龍出沒隱顯後先以為可喜可愕而莫知夫山之所以高海之所以深也延祐初有詔以科目取士四方學者不逺千里負笈而來以文法為請先生語之曰今之貢舉悉本朱文公私議欲為貢舉之文而不知文公之學可乎四書六經千載不傳之學自程氏兩夫子至文公而發明無餘藴矣顧力行如何耳有德者必有言施之場屋直其末事豈有他法哉盖先生之文一主於理凡經其口授指畫不為甚高論而義理自勝不期文之工而不能不工以應有司之求亦未始不合其繩尺預薦送取科級者彬彬多佳士焉先生操履純固體備至和日與世應動必中節任斯道之重而不苟立標榜為名高人自化服之負高世之志而謙恭不伐不見其崖岸人自樂親之士有一善必為之延譽不已及辨析是非則毅然有不可犯之色平居不問家有無自奉簡約而好周人之窮買地數百畝於山陰巖谷中死無所歸者給以棺槥聚瘞其處韓氏渡江時有仕籍者尚八九十人散處諸郡而越族為特盛家法之嚴族義之厚迄今弗變者先生實表帥焉先生出無輿馬僕御所過負者息肩行者避道巷夫街叟爭前迎揖童穉厮役咸稱之曰韓先生韓先生云先生盖生乎杭而居乎越曰安陽者本其舊也先是完顔公貞分持使節出按屬部聞先生名舉為慈湖書院山長先生謝曰幸有先人之敝廬可庇風雨薄田可具饘粥讀書砥行無媿古人足矣禄仕非所願也受而不起暮年愈自韜晦而未嘗忘情斯世張公㫒王公克敬于公九思前後為郡皆良二千石政事有所未達輒虚已咨訪先生從容開導洞中肯綮多所裨益有陰被其賜者矣平章政事趙凉公首以先生名聞于上後十餘歲門人李齊以進士第一為御史南闕舉其行義而先生逝矣先生素康強垂歿之際初無所疾苦諸生列侍左右以文字就正者累數十百篇日晏少休俄得上氣疾進諸子戒之曰我且死若等其善自持言已瞳子上下瞭然頃之氣息奄奄夷然而逝先生之卒以至正元年五月七日享年七十有六聞者無間尊官庻士方外之交相與嗟悼掩涕如喪所親其為當世歸重如此配徐氏有淑德而善理其家先生得不以米鹽碎務嬰其心而能成其業者内助之力為多先二十年卒子男四人長傳之次徴之次衡之臨之女三人適全公升張正䝉高璿孫男四人女二人傳之等卜以年七月十日奉柩葬㑹稽縣太平鄉白木原先塋之次而以門人夏泰亨之狀屬某為之銘昔曽文定公論古之世其道德者漢有袁氏楊氏陳氏唐有栁氏竊考宋三百年故宰相家克世其道德未有如吕氏韓氏久而益振者也吕氏自許公八世而東萊先生出於中興盛世韓氏自魏王八世乃得先生於運去物改之後故家喬木不與海桑俱化而文獻所存有足徴者豈偶然哉某衰朽之餘意長語短抑亦可以無媿辭矣先生之遺書有禮記說若干卷書辨疑一卷詩釋音一卷文集曰五雲漫藁者十二卷並行於世續郡志八卷藏於有司至於天文地理醫藥卜筮浮圖老子之書雖無所不通然以非世教所急故其論著無傳焉銘曰烈烈魏王古社稷臣來家于南自其曽孫五世而昌受材孔碩不世以官世其道德真知實踐學貫天人積中發外大振於文化行其家施及來學乃輯前聞以開後覺朝多鉅儒稽古作經一鑑之亡文獻孰徴揚其幽光薦此樂石嗚呼休哉君子之澤白雲許先生墓誌銘先生諱謙字益之姓許氏其先占籍京兆之興平後有官於吳者因家焉九世祖延壽宋刑部尚書六世祖寔元豐間始居笠澤尋又徙婺為金華縣人曽祖諱經國祖諱應龍皆弗仕考諱觥淳祐丁未進士卒官宣教郎主管三省樞密院架閣文字無子以從父兄貢士君日宣之次子嗣即先生也先生天資高嶷甫能言貢士君之夫人陶氏授以孝經論語入耳輒不忘五歲就學莊重如成人宋亡家毁貢士君相繼淪沒先生稍長僑居城闉借書於人以四部分而讀之雖疾恙不廢所涉向博知解且至既開門授徒而猶有所疑無所從質聞仁山金先生講道蘭江上委已而學焉金先生曰士之為學若五味之在和醯鹽既加則酸醎頓異子來見我已三日而猶夫人也豈吾之學無以感發於子耶先生聞之惕然於是金先生年七十先生三十有一矣請不拘常序就弟子列而所居相距尚逺㑹金先生設教於吕成公祠下乃獲便於參扣金先生嘗告之曰吾儒之學理一而分殊理不患其不一所難者分殊耳先生由是致其辨於分之殊而要其歸於理之一又嘗告之曰聖人之道中而已矣先生由是事事求夫中者而用之金先生歿先生益肆充闡多所自得自謂吾非有大過人惟為學之功無間斷耳先生制行甚嚴而所以應世者不膠於古不流於俗介而不驕通而不隨身在草萊而心存當世大德十一年歲在丁未熒惑入南斗句已而行先生以為災在吳越竊深憂之是歲大侵先生貌加瘠或問曰先生豈食不足耶先生曰今公私匱竭道殣相望吾能獨飽耶其處心盖如此而素志冲澹以道自樂念東憲府聞先生名而不察其志辟以為掾避弗就肅政廉訪使劉公庭直舉茂材異等副使趙公宏偉舉遺逸亦皆固辭趙公在南臺命除舍館迎致先生將使衆僚多士有所矜式欣然為之起而不久留也先生既東還以目疾倦於應接屏迹入華山中學者翕然籝粮笥書而從居再歲以兄子喪而歸户屨尤多逺而幽冀齊魯近而荆揚吳越皆百舍重趼而至先生之教以五性人倫為本以開明心術變化氣質為先以為己為立心之要以分辨義利為處事之制至誠諄悉内外殫盡嘗曰已或有知使人亦知之豈不快哉或有所問難而辭不能自達則為之言其所欲言而解其所惑討論講貫終日無倦攝其麄踈入於密微聞者方傾耳聽受而其出愈真切惰者作之銳者抑之拘者開之放者約之為學者師垂四十年著録殆千餘人隨其材分咸有所得達官富人之子望閭而驕氣自消踐庭而禮容自飭四方之士無賢不肖以不及門為恥搢紳先生至於是邦必即其家存問焉或訪以典禮政事先生觀其㑹通而為之折衷聞者無不厭服省臺諸公若王公士熙耿公煥王公克敬鄭公允中李公端吳公燾趙公天綱陳公思謙趙公仲仁前後列其行義于中朝鄉闈主司曹集賢鑑楊翰林剛中亦率同院剡上其名于省闥郡復以遺逸應詔先生終不為動仍紀至元之元年屬當大比諉先生以文衡亦莫之能致也嘗謂吾非必於隱以為名高仕止惟其時耳晚年尤以涵養本原為上務講授之餘齋居凝然一日瞑目坐堂上門人弗知也徑入焉則問其無人乎先生之側拱立久之先生顧而徐言曰爾在斯耶其習於靜定久而安焉可知也先生以早孤不逮事架閣公及其夫人韓氏而事陶夫人克盡厥職兄璟性剛嚴委曲承順怡怡如也時氏姊有子而貧無以為養迎歸奉之終身鍾愛二子而教飭有方冠婚喪祭賔客之禮必盡其情文既老而益艱瘁僦屋以居有田不足具饘粥而處之裕如門人吕權蔣𤣥金涓方為先生買田築室而先生逝矣先生素多疾金先生病革徒步往省之會大雪中寒濕及奔兄璟喪於廣信疾増劇不良于行疾少間而神更清茂三年冬十月疾復作謂其子元日伯兄以是月二十三日卒我死殆與之同日乎及是日正衣冠而坐戒元以孝於母友於弟元復請所欲言先生曰吾平日訓爾多矣至此復何言門人朱震亨進曰先生視稍偏矣先生更肅容端視頃之視微暝遂卒享年六十有八娶朱氏承直郎廣德路總管府推官天與之女子男二人長即元次亨以為兄璟後先生葬以其明年春正月壬寅墓在縣西北婺女鄉安期里交友来赴者若干人門人以義制服者若干人合泉布營葬事因其自號而題表曰白雲先生許公之墓其又明年學者相率上狀郡府祠先生于學官僉肅政亷訪司事杜公秉彛建請贈官賜諡未報先生於書無不觀窮探聖微蘄於必得雖殘文羡語皆不敢忽有不可通則不敢強於先儒之說有所未安亦不敢苟同也讀四書章句集註有叢說二十卷敷繹義理惟務平實每戒學者曰士之為學當以聖人為準的至於進修利鈍則視已之力量何如然必得聖人之心而後可學聖人之事舍其書何以得其心乎聖賢之心盡在四書而四書之義備於朱子顧其立言辭約意廣讀者或得其詞而不能悉究其義或以一偏之致自異而初不知未離其範圍世之詆訾貿亂務為新竒者其弊正坐此耳始余三四讀自以為瞭然已而不能無惑久若有得覺其意初不與已異愈久而所得愈深與已意合者亦大異於初矣童而習之白首不知其要領者何限其可以易心求之哉讀詩集傳有名物鈔八卷正其音釋考其名物度數以補先儒之未備仍存其逸義旁採逺援而以已意終之讀書集傳有叢說六卷時有與蔡氏不能盡合者每誦金先生之言曰自我言之則為忠臣自他人言之則為䜛賊要歸於是而已其言春秋三傳有温故管窺若干卷間以春秋大義數十百條與友人張君樞極論之皆傳註所未發於三禮則參伍考訂求聖人制作之意以翼成朱子之説其語學者必順天地之理酌古今之宜使通於上下皆可遵用又嘗句讀九經儀禮三傳而於其宏綱要旨錯簡衍文悉别以鉛黄朱墨意有所明則表見之其後友人吳君師道得吕成公㸃校儀禮視先生所定不同者十有三條而已其與先儒意見脗合如此有老儒自以為善言易力詆程子先生與之反覆辨論辭詳義正老儒語塞乃謝曰不意子之於易若是其精也先生中年以還仰觀俯察益有見於陰陽往來升降消長闔闢之故謂伏羲之經廣大悉備文王周公孔子之辭乃其傳註六爻之義特發凡舉例耳諸儒於象辭變占各有攸尚要不可舉此而廢彼也然獨未有所論述豈不以孔子晚始好易孟子深於易而不言易乎其觀史有治忽幾微若干卷倣史家年經國緯之法起大皥氏訖宋元祐元年秋九月尚書左僕射司馬光卒備其世數總其年歲原其興亡著其善惡盖以為光卒則宋之治不可復興誠一代理亂之幾故附於續經而書孔子卒之義以致其意也書成以示張君樞為言運祚之延促豈必推之天命猶有人事焉漢之大儒言災異皆欲近修人事上答天變况聖賢之培植基本祈天永命者哉有國家者不可不仁民盖以此也先生於天文地理典章制度食貨刑法字學音韻醫經數術靡不該貫一事一物可為博文多識之助者必謹志之至於釋老之言亦皆洞究其藴謂學者孰不曰闢異端苟不深探其隱而識其所以然能辨其同異别其是非也幾希凡其書俱已行於世述作之大意則見於序引文多不得以盡載有三傳義例讀書記皆藁立而未完諸生有日聞雜記未及詮次其藏於家者有詩文若干卷文主於理詩尤得風人之旨有自省編晝之所為夜必書之殆疾革始絶筆云金先生所致論語孟子考證資治通鑑前編皆未遑刋定垂殁以屬之先生今二書得以大備而盛行先生力也自聖賢不作師道久廢宋初學者有師始於海陵胡公先生六世祖受業於海陵號稱能以師法終始者逮二程子起而倡聖學以淑諸人朱子又溯流窮源折衷羣言而統一其歸使學者有所據以從事由是師道大備文定何公既得朱子之傳於其高弟文肅黄公而文憲王公於文定則師友之金先生又學於文憲而及登文定之門者也三先生皆婺人學者推原統緒必以三先生為朱子之世適先生出於三先生之鄉而克任其承傳之重遭逢聖代治教休明三先生之學卒以大顯於世然則程子之道得朱子而復明朱子之道至先生益尊先生之功大矣先生葬已十年而元以張君樞之狀俾溍為之銘溍之少也無所識知莫能從先生遊於高明之域奔走汨沒不知老之將至而爲庸人之歸鄙陋之言何足形容有道者氣象乎重惟先生之交游多已凋謝而溍偶獨後死義不得辭也敢悉取狀所述序其首而為之銘以系于左方銘曰道學之傳天下為公婺之儒先獨得其宗鉅人迭興踵武相接逮于先生綿綿四葉先生之學能自得師實踐之功出乎真知萬殊之差無微不析一本之同㑹歸有極酬酢萬變必用其中涵養本原以敬始終際兹休明力扶正學聞風而來罔間南朔春陽時雨隨地發生洪纎高下咸仰曲成廸惟前人學有師法克生後賢規重矩疊先生有作彌大而昌師嚴道尊于昔有光先生之身斯道所寄視其安否以為隆替天胡不憗不訖耄期山頽木壞人將疇依不亡者存遺書孔有文不在兹尚啓爾後文獻集卷八下
